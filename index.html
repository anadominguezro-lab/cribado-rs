tients and rarely other adverse effects. This review found there was not enough evidence to say if one method of manipulation is better than another, or that manipulation is needed."}, {"id": 436, "title": "Equipo de salud, sentimientos y manejo del dolor: reflejos de un modelo", "authors": "Collao Aviles, Carmen G", "journal": "Gac méd espirit", "year": "2001", "vol": "3(supl.2)", "doi": "", "abstract": "El niño que es hospitalizado, independiente de la causa que origine la internación, va a sentir dolor, ya sea, por los procedimientos médicos o de enfermería que puedan ser dolorosos. Para buscar estrategias docentes que permitan afianzar los aspectos positivos de esta temática y modificar los negativos se realizó este trabajo como resultado de la recopilación de las opiniones que emiten los alumnos de la primera promoción de licenciados en Enfermería de la Universidad de Antofagasta, sobre el manejo del dolor, especialmente en el niño, y que hace, al respecto, el equipo de salud del Hospital Regional de Antofagasta. Se obtuvo que el modelo que reflejan los profesionales a los estudiantes, no expresan siempre una conducta coherente, oportuna y equitativa, con la experiencia de dolor que vive el paciente. La impresión que observan los estudiantes de enfermería, de un equipo de salud indiferente, poco preocupado e incluso sintiendo rabia e ira con las quejas de dolor de un paciente, les hace proclive a repetir los mismos sentimientos y las mismas conductas, aun cuando la universidad les haya entregado otra perspectiva(AU)"}, {"id": 437, "title": "Cuidados afectivos de los recién nacidos sometidos a procedimientos dolorosos", "authors": "Molsalve R., Elena; González Rodríguez, Rina Yolanda", "journal": "Pediatr. día", "year": "2000", "vol": "16(5):353-4", "doi": "", "abstract": ""}, {"id": 438, "title": "Las acciones de enfermería otorgadas frente al dolor de los recién nacidos de término sanos o con problemas de adaptación sometidos a punciones", "authors": "Araya Gutiérrez, Alejandra; Monzalve Flores, Elena", "journal": "", "year": "1999", "vol": "112-112", "doi": "", "abstract": "El presente estudio descriptivo tiene como propósito conocer las acciones de enfermería (asistenciales, afectivas y de indicación a la madre), frente al dolor de los recién nacidos sanos o con problemas de adaptación a la vida extrauterina, sometidos a punciones en dos unidades de puericultura. Las acciones se dividieron en : antes, durante y después de las punciones de tipo venosa e intradérmica. Las que se relacionaron con las características sociodemográficas de las enfermeras. Los resultados obtenidos señalan que: En la mayoría (>0=77.7 por ciento) de las punciones, se realizaron más acciones relacionados con la preparación del ambiente físico y la técnica de punción que con respecto a las acciones de tipo afectiva y de indicación a la madre (<0=46.3 por ciento) y ( 36 por ciento) respectivamente. Con relación a las diferencias de las acciones de enfermería entre los tipos de punción, en general, se realizaron más acciones (17,2 por ciento) de tipo afectiva en la punción venosa"}, {"id": 439, "title": "Las infecciones respiratorias agudas", "authors": "Bolivia. Centro de Multiservicios Educativos", "journal": "Brigadas Estudiantiles de Salud. Cartilla Educativa", "year": "1999", "vol": "5:18-18", "doi": "", "abstract": "La tos, la fiebre, el moco verde, el catarro, la ronquera, la nariz tapada, el dolor de oídos, el dolor de garganta, las dificultades para respirar y el malestar general son síntomas de las IRA"}, {"id": 440, "title": "[Using tools for pain perception assessment in hospitalized pre-school children undergoing painful procedures].", "authors": "Rossato, L M; Angelo, M", "journal": "Rev Esc Enferm USP", "year": "1999", "vol": "33(3):236-49", "doi": "", "abstract": "The aim of this study was evaluate the utilization of tools for pain perception assessment in 41 hospitalized pre-school children submitted to painful procedures: care of wounds or blood extraction. The utilized tools were the faces scale, behavioral indicators and words which describe the pain. Most of the pre-schoolers understood and correctly answered to the faces scale, which can be noticed by the crescent movement 0 (no pain) 4 (maximum pain) during the choice of faces before and after the painful procedure. Crying, immortality and forehead wrinkling were the predominant behavioral indicators, intensified during the procedure. Pre-schoolers verbalizations about their pain showed up to be concrete terms or evaluative-indicative nature, resulting in variable or weakly precise concepts."}, {"id": 441, "title": "[Communications by health professionals to patients undergoing diagnostic tests with new technologies].", "authors": "Lopes, C L; Barbosa, M A; Teixeira, M E et al.", "journal": "Rev Bras Enferm", "year": "1998", "vol": "51(1):53-62", "doi": "", "abstract": "Descriptive exploratory study with quanti-qualitative approach accomplished at public and private net units in Goiânia--GO from August to September, 1997 aiming at observing clients understanding of communication of the professionals who perform high technology exams and identifying whether any orientation provided to clients about the exams that are to be performed and their impressions during their performance. The population is of clients of both sexes who have undergone high technology diagnosis examinations. The data have been collected by the authors and research aids through semistructured interviews among the study subject clients. By the results, we have concluded that the majority of the clienta does not receive any orientation, lacked information about the exam that is to be performed for several reasons, including fear of the unknown. Communication was restrict. Fear of pain, of the result, discomfort have also been reported."}, {"id": 442, "title": "[The student's page. The nursing student caring for a child with chronic pain: report of experiences].", "authors": "Lunardelo, S R", "journal": "Rev Lat Am Enfermagem", "year": "1998", "vol": "6(5):111-2", "doi": "", "abstract": ""}, {"id": 443, "title": "Manejo del dolor en el post operatorio del paciente pediátrico", "authors": "Mejía Díaz, Vilma Andrea", "journal": "Pediatría (Santiago de Chile)", "year": "1998", "vol": "41(3/4):88-92", "doi": "", "abstract": "El propósito de este estudio fue conocer como se maneja el dolor en el niño pos operado, con el fin de optimizar la acción de enfermería y planificar estrategias educativas orientadas a los padres y el equipo de salud, que colaboran en esta atención. Se seleccionó al azar una muestra de 50 niños mayores de 5 años, que se encontraban dentro de los 3 primeros días del post operatorio. El 92 por ciento de ellos manifestó dolor durante este período y mayoritariamente en la primeras 24 horas. 90 por ciento calmó su dolor con administración de analgésicos, siendo de mayor uso el Nefersilvía endovenosa continua y cada 8 horas. El 48 por ciento de los niños, recibió información previa sobre manejo del dolor y el 60 por ciento fue acompañado por la madre en la hospitalización. Los profesionales que intervinieron en el manejo del dolor, fueron el médico y la enfermera. Se registró preferentemente la indicación de analgesia y su administración. Se concluye que el niño debe terner accseso al mejor nivel de alivio del dolor en el post operatorio, con la acción integrada del equipo de salud y capacitación de los padres y personal que colabora en esta situación"}, {"id": 444, "title": "[Pain in children with cancer: models of evaluation].", "authors": "Torritesi, P; Vendrúsculo, D M", "journal": "Rev Lat Am Enfermagem", "year": "1998", "vol": "6(4):49-55", "doi": "", "abstract": "Control and alleviation of pain in the care to children with cancer are objects of nursing concern in the search for interventions that are able to minimize or avoid physical-emotional problems in these children. Medical, psychological and nursing literatures describe pain through physiological, emotional, behavioural and environmental aspects in several models of scales of pain evaluation and control. This study describes some models of evaluation of pain in children and presents the adaptation of the Scale Model of Visual Analogy of Faces by McGrath (1990), as an instrument to be used in nursing care to children with cancer. Although the literature utilized on this study gives emphasis on the evaluation and control of pain in children with cancer, we verify the viability of applying this model by nursing in other situations of pain."}, {"id": 445, "title": "Atención ambulatoria del niño (normas) 1997", "authors": "Chaco. Ministerio de Salud Pública; Unicef Argentina", "journal": "", "year": "1997", "vol": "204-204", "doi": "", "abstract": "Consultas durante la infancia y adolescencia. Evaluación del crecimiento y nutrición del niño menor de 6 años. Evaluación del desarrollo psicomotor del niño menor de 5 años. Lactancia materna y alimentación del niño. Vacunas. Infecciones respiratorias agudas. Enfermedades diarreicas. Anemias carenciales. Parasitosis intestinal"}, {"id": 446, "title": "Gastritis por helicobacter pylori en niños", "authors": "Nacimba, César; Aman, Marisol; Bucheli, María", "journal": "", "year": "", "vol": "11-11", "doi": "", "abstract": "En la presente revisión bibiográfica hemos recopilado los datos más relevantes de investigaciones hechas en su mayoría en países con más experiencia en este tema, y se ha dado énfasis en lo que se refiere a las bases moleculares que permiten la histopatogenia causada por el HP en la mucosa gástrica, se revisa también los métodos de diagnóstico y tratamiento mejor aplicables a los niños."}];

let decisions = {};
let currentFilter = 'todos';
let currentReviewer = '';
let openCards = new Set();
let hideDecided = true;
let temporarilyVisible = new Set(); // keep EXCLUIR cards visible until motivo is selected // hide decided articles by default
let saveQueue = {};
let isSaving = false;
let dataLoaded = false;

// ── Sync ──────────────────────────────────────────────────────────────────────
function setSync(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('syncMsg').textContent = msg;
}

// ── Load decisions from Sheets ────────────────────────────────────────────────
async function loadDecisions(silent=false) {
  if (!silent) setSync('loading', 'Cargando datos...');
  try {
    const r = await fetch(SCRIPT + '?action=read&t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const rows = j.data || [];
    decisions = {};
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const id = parseInt(row[0]);
      if (!id || isNaN(id)) continue;
      decisions[id] = {
        R1: { dec: String(row[2]||'').trim(), mot: String(row[3]||'').trim() },
        R2: { dec: String(row[4]||'').trim(), mot: String(row[5]||'').trim() }
      };
    }
    dataLoaded = true;
    setSync('ok', 'Sincronizado ✓');
    updateStats();
    renderList();
  } catch(e) {
    setSync('error', 'Error de conexión — reintentando en 10s');
    setTimeout(() => loadDecisions(), 10000);
  }
}

// ── Save queue ────────────────────────────────────────────────────────────────
function queueSave(id, reviewer, dec, mot) {
  const key = id + '_' + reviewer;
  saveQueue[key] = { id, reviewer, dec, mot };
  if (!isSaving) processSaveQueue();
}

async function processSaveQueue() {
  isSaving = true;
  while (Object.keys(saveQueue).length > 0) {
    const key = Object.keys(saveQueue)[0];
    const item = saveQueue[key];
    delete saveQueue[key];
    setSync('loading', 'Guardando...');
    try {
      const row = item.id + 1;
      const colDec = item.reviewer === 'R1' ? 3 : 5;
      const colMot = item.reviewer === 'R1' ? 4 : 6;
      await fetch(`${SCRIPT}?action=write&row=${row}&col=${colDec}&value=${encodeURIComponent(item.dec)}`);
      await fetch(`${SCRIPT}?action=write&row=${row}&col=${colMot}&value=${encodeURIComponent(item.mot)}`);
      setSync('ok', 'Guardado ✓');
    } catch(e) {
      setSync('error', 'Error al guardar — reintentando');
      saveQueue[key] = item;
      await new Promise(r => setTimeout(r, 3000));
    }
  }
  isSaving = false;
}

// ── Decisions ─────────────────────────────────────────────────────────────────
function getDec(id, rev) {
  if (!decisions[id] || !decisions[id][rev]) return { dec:'', mot:'' };
  return decisions[id][rev];
}

function setDec(id, rev, dec, mot) {
  if (!decisions[id]) decisions[id] = { R1:{dec:'',mot:''}, R2:{dec:'',mot:''} };
  decisions[id][rev] = { dec, mot };
  queueSave(id, rev, dec, mot);
  updateStats();
}

function hasConflict(id) {
  if (!decisions[id]) return false;
  const d1 = decisions[id].R1?.dec || '';
  const d2 = decisions[id].R2?.dec || '';
  return d1 && d2 && d1 !== d2;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function onReviewerChange() {
  currentReviewer = document.getElementById('revSel').value;
  updateStats();
  renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderList();
}

function updateStats() {
  if (!currentReviewer || !dataLoaded) return;
  let inc=0, exc=0, dud=0;
  ARTICLES.forEach(a => {
    const d = getDec(a.id, currentReviewer).dec;
    if (d==='INCLUIR') inc++;
    else if (d==='EXCLUIR') exc++;
    else if (d==='DUDOSO') dud++;
  });
  const total = ARTICLES.length;
  const pend = total - inc - exc - dud;
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stIncluir').textContent = inc;
  document.getElementById('stExcluir').textContent = exc;
  document.getElementById('stDudoso').textContent = dud;
  document.getElementById('stPend').textContent = pend;
  document.getElementById('progBar').style.width = Math.round((total-pend)/total*100)+'%';
}

function toggleHideDecided() {
  hideDecided = !hideDecided;
  const btn = document.getElementById('toggleHideBtn');
  if (hideDecided) {
    btn.textContent = '👁 Mostrar cribados';
    btn.classList.remove('active');
  } else {
    btn.textContent = '🙈 Ocultar cribados';
    btn.classList.add('active');
  }
  renderList();
}

function renderList() {
  const container = document.getElementById('articleList');

  // Not loaded yet
  if (!dataLoaded) {
    container.innerHTML = '<div class="empty"><div class="spinner"></div><p style="color:#718096;font-size:14px;">Cargando datos del servidor...</p></div>';
    return;
  }

  // No reviewer selected
  if (!currentReviewer) {
    container.innerHTML = '<div class="empty"><p class="empty-title">Selecciona tu perfil para empezar</p><p class="empty-sub">Elige tu nombre en el desplegable de revisora.</p></div>';
    return;
  }

  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = ARTICLES.filter(a => {
    const d = getDec(a.id, currentReviewer).dec;
    // Hide decided articles by default unless filter is active or temporarily visible
    if (hideDecided && currentFilter === 'todos' && d !== '' && !temporarilyVisible.has(a.id)) return false;
    if (currentFilter === 'pendiente' && d !== '') return false;
    if (currentFilter === 'INCLUIR' && d !== 'INCLUIR') return false;
    if (currentFilter === 'EXCLUIR' && d !== 'EXCLUIR') return false;
    if (currentFilter === 'DUDOSO' && d !== 'DUDOSO') return false;
    if (currentFilter === 'conflicto' && !hasConflict(a.id)) return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.authors.toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    const msg = hideDecided && currentFilter === 'todos'
      ? '<p class="empty-title">¡Todo cribado!</p><p class="empty-sub">No quedan artículos pendientes. Pulsa "Mostrar cribados" para revisar las decisiones tomadas.</p>'
      : '<p class="empty-title">Sin resultados</p><p class="empty-sub">No hay artículos con los filtros seleccionados.</p>';
    container.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  const scrollY = window.scrollY;

  container.innerHTML = filtered.map(a => {
    const myD = getDec(a.id, currentReviewer);
    const dec = myD.dec;
    const mot = myD.mot;
    const cardCls = dec==='INCLUIR'?'di':dec==='EXCLUIR'?'de':dec==='DUDOSO'?'dd':'';
    const motivoOpts = MOTIVOS.map(m =>
      `<option value="${m}" ${mot===m?'selected':''}>${m||'— Motivo de exclusión —'}</option>`
    ).join('');
    const metaParts = [];
    if (a.authors) metaParts.push(esc(a.authors));
    if (a.journal) metaParts.push(`<i>${esc(a.journal)}</i>`);
    if (a.year) metaParts.push(a.year);
    if (a.vol) metaParts.push(a.vol);
    if (a.doi) metaParts.push(`DOI: ${a.doi.substring(0,45)}`);

    return `<div class="card ${cardCls}" id="c${a.id}">
      <div class="card-head" onclick="toggleCard(${a.id})">
        <div class="card-num">#${a.id}${!a.title || a.title.includes('[Not Available]') ? ' <span style="font-size:10px;background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:4px;margin-left:4px;">⚠ Sin título</span>' : ''}</div>
        <div class="card-title" style="user-select:text;">${a.title && !a.title.includes('[Not Available]') ? esc(a.title) : '<span style="color:#9CA3AF;font-style:italic;">Título no disponible — buscar por DOI</span>'}</div>
        <div class="card-meta">${metaParts.join(' · ')}</div>
      </div>
      <div class="card-body" id="b${a.id}">
        ${a.abstract
          ? `<div class="abstract" style="user-select:text;">${esc(a.abstract)}</div>`
          : `<div class="no-abs">⚠ Resumen no disponible — consultar fuente original</div>`}
        <div style="height:10px"></div>
      </div>
      <div class="card-footer">
        <span class="dec-label">Decisión (${currentReviewer}):</span>
        <button class="btn btn-i ${dec==='INCLUIR'?'sel':''}" onclick="decide(${a.id},'INCLUIR')">✓ Incluir</button>
        <button class="btn btn-e ${dec==='EXCLUIR'?'sel':''}" onclick="decide(${a.id},'EXCLUIR')">✗ Excluir</button>
        <button class="btn btn-d ${dec==='DUDOSO'?'sel':''}" onclick="decide(${a.id},'DUDOSO')">? Dudoso</button>
        ${dec==='EXCLUIR'?`<select class="motivo-sel" id="m${a.id}" onchange="saveMot(${a.id})">${motivoOpts}</select>`:''}
        <span class="saving" id="sv${a.id}">✓ Guardado</span>
      </div>
    </div>`;
  }).join('');

  // Restore open abstracts and scroll
  openCards.forEach(id => {
    const b = document.getElementById('b'+id);
    if (b) b.classList.add('open');
  });
  window.scrollTo(0, scrollY);
}

function toggleCard(id) {
  const body = document.getElementById('b'+id);
  if (!body) return;
  body.classList.toggle('open');
  if (body.classList.contains('open')) openCards.add(id);
  else openCards.delete(id);
}

function decide(id, dec) {
  if (!currentReviewer) { alert('Selecciona tu perfil primero.'); return; }
  const cur = getDec(id, currentReviewer);
  const newDec = cur.dec === dec ? '' : dec;
  const newMot = newDec === 'EXCLUIR' ? cur.mot : '';
  setDec(id, currentReviewer, newDec, newMot);

  // If EXCLUIR: keep card visible so user can select motivo before it disappears
  if (newDec === 'EXCLUIR' && hideDecided) {
    temporarilyVisible.add(id);
    renderList();
    setTimeout(() => {
      const sv = document.getElementById('sv'+id);
      if (sv) { sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),2000); }
      // Focus the motivo dropdown
      const sel = document.getElementById('m'+id);
      if (sel) {
        sel.focus();
        sel.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    }, 50);
  } else {
    temporarilyVisible.delete(id);
    renderList();
    setTimeout(() => {
      const sv = document.getElementById('sv'+id);
      if (sv) { sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),2000); }
    }, 50);
  }
}

function saveMot(id) {
  if (!currentReviewer) return;
  const mot = document.getElementById('m'+id)?.value || '';
  const cur = getDec(id, currentReviewer);
  setDec(id, currentReviewer, cur.dec, mot);
  // Once motivo is selected, allow card to be hidden
  if (mot && mot !== '') {
    temporarilyVisible.delete(id);
    if (hideDecided) {
      setTimeout(() => renderList(), 800); // small delay so user sees the selection
    }
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV() {
  if (!currentReviewer) { alert('Selecciona tu perfil primero.'); return; }
  const toExp = ARTICLES.filter(a => {
    const d = getDec(a.id, currentReviewer).dec;
    return d==='INCLUIR' || d==='DUDOSO';
  });
  if (toExp.length===0) { alert('No hay artículos marcados como Incluir o Dudoso todavía.'); return; }
  let csv = 'ID,Título,Autores,Revista,Año,Vol/Pág,DOI,Decisión R1,Motivo R1,Decisión R2,Motivo R2\n';
  toExp.forEach(a => {
    const d1 = getDec(a.id,'R1');
    const d2 = getDec(a.id,'R2');
    const row = [a.id,a.title,a.authors,a.journal,a.year,a.vol,a.doi,d1.dec,d1.mot,d2.dec,d2.mot]
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`)
      .join(',');
    csv += row + '\n';
  });
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='para_texto_completo.csv'; a.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDecisions();
// Auto-refresh every 90 seconds to sync other reviewer's changes
setInterval(() => { if (!isSaving) loadDecisions(true); }, 90000);
</script>
</body>
