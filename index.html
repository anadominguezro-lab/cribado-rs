rodutos comparados ao Biobrane® foram: tratamento padrão (Intrasite&#8482;, Acticoat&#8482; e Duoderm®), Sulfadiazina de Prata, Duoderm® e TransCyte&#8482;. A cobertura Biobrane® demonstrou resultados positivos na cicatrização completa, no tempo de cicatrização, na redução da dor e menor tempo de hospitalização. A redução da área lesada não foi abordada pelos estudos primários. O desfecho eventos adversos, passível de metanálise, evidenciou complicações mais frequentes no grupo Biobrane® (RR=1,25; 95% CI=0,42 a 3,70; p-valor=0,178; I2=42), no entanto, sem significância estatística. A certeza para recomendação foi classificada como muito baixa (risco de viés, inconsistência e imprecisão), devido ao número amostral reduzido, poucos estudos, desenhos estudos com alto risco de viés, e resultados com dados inconsistentes para agrupamento em metanálise. As evidências disponíveis para orientar decisões sobre o uso do Biobrane® em queimaduras de espessura parcial em pacientes pediátricos ainda são escassas e insuficientes para recomendar o seu uso rotineiro. Sugere-se a realização de ensaios clínicos randomizados, com maior tamanho amostral, com descrição da forma de randomização, sigilo de alocação e o mascaramento da equipe responsável pela realização do tratamento e dos avaliadores dos resultados. A fim de diminuir o risco de viés, contribuir na tomada de decisão e na prática assistencial para o tratamento de queimaduras em pacientes pediátricos."}, {"id": 269, "title": "Pain Control Interventions in Preterm Neonates: A Randomized Controlled Trial.", "authors": "Shukla, Vivek V.; Bansal, Satvik; Nimbalkar, Archana et al.", "journal": "Indian pediatrics", "year": "2018", "vol": "55(4):292-296", "doi": "", "abstract": "OBJECTIVE: To compare individual efficacy and additive effects of pain control interventions in preterm neonates. DESIGN: Randomized controlled trial. SETTING:  Level-3 University affiliated neonatal intensive care unit. PARTICIPANTS: 200  neonates (26-36 wk gestational age) requiring heel-prick for bedside glucose  assessment. Exclusion criteria were neurologic impairment and critical illness  precluding study interventions. INTERVENTION: Neonates were randomly assigned to  Kangaroo mother care with Music therapy, Music therapy, Kangaroo Mother care or  Control (no additional intervention) groups. All groups received expressed breast  milk with cup and spoon as a baseline pain control intervention. MAIN OUTCOME  MEASURES: Assessment of pain using Premature Infant Pain Profile (PIPP) score on  recorded videos. RESULTS: The mean (SD) birth weight and gestational age of the  neonates was 1.9 (0.3) kg and 34 (2.3) wk, respectively. Analysis of variance  showed significant difference in total PIPP score across groups (P<0.001).  Post-hoc comparisons using Sheffe's test revealed that the mean (SD) total PIPP  score was significantly lower in Kangaroo mother care group [7.7 (3.9) vs. 11.5  (3.4), 95% CI(-5.9, -1.7), P<0.001] as well as Kangaroo mother care with Music  therapy group [8.5 (3.2) vs. 11.5 (3.4), 95%CI (-5.1, -0.9), P=0.001] as compared  to Control group. PIPP score was not significantly different between Control  group and Music therapy group. CONCLUSIONS: Kangaroo mother care with and without  Music therapy (with expressed breast milk) significantly reduces pain on  heel-prick as compared to expressed breast milk alone. Kangaroo mother care with  expressed breast milk should be the first choice as a method for pain control in  preterm neonates."}, {"id": 270, "title": "Efficacy of the Buzzy System for pain relief during venipuncture in children: a randomized controlled trial.", "authors": "Susam, Volkan; Friedel, Marie; Basile, Patrizia et al.", "journal": "Acta bio-medica : Atenei Parmensis", "year": "2018", "vol": "89(6-S):6-16", "doi": "10.23750/abm.v89i6-S.7378", "abstract": "BACKGROUND AND AIM OF THE WORK: procedural pain is a significant issue for paediatric patients. In particular, needle pain is amongst the most stressful for  children. Studies revealed that a large number of children do not receive  adequate pain prevention during the procedures. Neglecting the prevention of  needle pain can cause several psychological effects such as anxiety and phobias,  and increase perceptions of pain in the future. We aimed to verify the efficacy  of Buzzy System in reducing pain during venipuncture. METHODS: A randomized  control trial was conducted among 72 children aged 3 to 10 years undergoing  venipuncture. Children were randomly assigned to The Buzzy with distraction cards  group (experimental group) or to \"magic gloves\" group (control group). Perception  of pain was measured through the Visual Analogue Scale (VAS), the Wong-Baker  Scale (WBS) and the Numeric Rating Scale (NRS). RESULTS: Sixty-four children  participated in the study, 34 in the experimental group and 30 in the control  group. The experimental group showed significantly lower levels of pain (p=.039;  95% CI: -2,11; -0,06) in terms of the mean=3.65±2.011; median=3, compared to the  control group (mean: 4.67±2.14, median=4). Caregivers were satisfied with the  Buzzy System. CONCLUSION: The Buzzy System combined to distraction cards showed a  greater reduction of perceived pain than \"magic glove\" technique. This study  underlines the importance of active involvement of caregivers during procedural  pain in children. Pediatric nurses have an important role in empowering children  and caregivers to be interactive during venipunctures."}, {"id": 271, "title": "Effectiveness of a hospital-based postnatal parent education intervention about pain management during infant vaccination: a randomized controlled trial.", "authors": "Taddio, Anna; Shah, Vibhuti; Bucci, Lucie et al.", "journal": "CMAJ : Canadian Medical Association journal = journal de l'Association medicale canadienne", "year": "2018", "vol": "190(42):E1245-E1252", "doi": "10.1503/cmaj.180175", "abstract": "BACKGROUND: Parents have reported that they want to learn how to reduce pain in infants during vaccinations. Our objective was to compare different levels of  intensity of postnatal education about pain mitigation on parental self-reported  use of interventions at future infant vaccinations. METHODS: We conducted a  longitudinal, 3-group parallel, add-on, randomized controlled trial on the  postnatal ward of a hospital. New mothers, unaware of the hypothesis, were  randomly assigned to 1 of 3 intervention groups and 3 follow-up groups (i.e., 9  groups, 3 × 3). The 3 intervention groups were control (general immunization  information), pain pamphlet (pain mitigation information), and pain pamphlet and  pain video (pain mitigation information). Both pain mitigation education groups  also received general immunization information. The 3 follow-up groups were 2-,  4- and 6-month infant vaccinations. Mothers reported use of breastfeeding,  sucrose and topical anesthetics during infant vaccinations in a telephone survey.  RESULTS: Of 3420 participants, follow-up was available for 2549 (75%): 36.1%,  34.2% and 29.7% reported on pain mitigation practices at 2-, 4- and 6-month  vaccinations, respectively (p = 0.9). Maternal characteristics did not differ (p  > 0.05): mean age, 33.6 years; 58% were primipara. Utilization of any  intervention (breastfeeding, sucrose or topical anesthetics) was 53.2%, 61.4% and  63.0% for control, pain pamphlet, and pain pamphlet and pain video groups,  respectively (p < 0.001); both pain education groups had higher utilization than  the control group, but did not differ from one another. Uptake differed among  intervention groups at 2 and 4 months but not at 6 months. INTERPRETATION:  Hospital-based postnatal education increased parental use of pain interventions  at infant vaccinations and can be added to existing education. TRIAL  REGISTRATION: ClinicalTrials.gov, no. NCT01937143."}, {"id": 272, "title": "Vivências no processo de parturição: antagonismo entre o desejo e o medo", "authors": "Teixeira, Selma Villas Boas; Silva, Carolline Fontes Campos de Souza; Silva, Leila Rangel da et al.", "journal": "Rev. Pesqui. (Univ. Fed. Estado Rio J., Online)", "year": "2018", "vol": "10(4):1103-1110", "doi": "10.9789/2175-5361.2018.v10i4.1103-1110", "abstract": "Objetivo: Discutir a vivência de mulheres no processo de parturição. Método: Estudo descritivo, qualitativo, realizado em um Centro Municipal de Saúde no Rio de Janeiro, em 2015, com 17 mulheres com até 42 dias de pós-parto. Empregou-se a técnica de entrevista semiestruturada e a técnica de análise de conteúdo na modalidade temático-categorial. Resultados: As participantes são multíparas, o parto realizado em maternidades públicas, e não receberam orientação no pré-natal sobre a parturição. Sentiram-se acolhidas, relacionaram a dor das contrações uterinas ao sofrimento físico, durante o trabalho de parto tiveram a opção de ingerir alimentos e água, adotaram a posição de litotomia, e o parceiro participou como acompanhante. Os profissionais de saúde, todavia, assumiram uma postura de controle sobre seus corpos no processo de parturição. Conclusão: Os resultados ratificam a importância de os casais serem orientados sobre a gestação e o parto, para que possam vivenciá-los de forma ativa e segura"}, {"id": 273, "title": "Effectiveness of vibratory stimulation on needle-related procedural pain in children: a systematic review protocol.", "authors": "Ueki, Shingo; Yamagami, Yuki; Makimoto, Kiyoko", "journal": "JBI database of systematic reviews and implementation reports", "year": "2018", "vol": "16(4):825-830", "doi": "10.11124/JBISRIR-2017-003453", "abstract": "The objective of this systematic review is to identify, evaluate and synthesize evidence on the effectiveness of vibratory stimulation to reduce needle-related  procedural pain in children aged 18 years and under.The review will address the  following question: Is vibratory stimulation effective in reducing needle-related  procedural pain in children aged 18 years and under, in comparison with no  stimulation for needle-related procedures?"}, {"id": 274, "title": "Facilidades e dificuldades encontradas pelas puérperas para amamentar", "authors": "Urbanetto, Priscila Daniele Gonçalves; Gomes, Giovana Calcagno; Costa, Aline Rodrigues et al.", "journal": "Rev. Pesqui. (Univ. Fed. Estado Rio J., Online)", "year": "2018", "vol": "10(2):399-405", "doi": "10.9789/2175-5361.2018.v10i2.399-405", "abstract": "Objective: this study aimed to know the facilities and difficulties encountered by postpartum to breastfeed. Method: It was a descriptive, exploratory study of qualitative approach. Participants were 11 postpartum from a University Hospital in southern Brazil. Data were collected through interviews and analyzed by thematic analysis technique. As facilities it was found the creation of the bond between the mother and baby, affective touch, correct grasp, good milk production and the practicality of breast-feeding. As difficulties the need to return to work, complications such pain, cracks in the nipple, delay in the milk letdown, discomfort, engorgement, baby gets drowsy, sucks several times or reject the breast. Conclusion: It is concluded that the nurse should provide support and information necessary for the puerperal and directing practices that minimize the difficulties in the breastfeeding to prevent the weaning."}, {"id": 275, "title": "Effectiveness of Sucrose Used Routinely for Pain Relief and Neonatal Clinical Risk in Preterm Infants: A Nonrandomized Study.", "authors": "Valeri, Beatriz O.; Gaspardo, Cláudia M.; Martinez, Francisco E. et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(8):713-722", "doi": "10.1097/AJP.0000000000000584", "abstract": "BACKGROUND: Preterm infants (PI) requiring the neonatal intensive care unit are exposed to early repetitive pain/distress. Little is known about how pain relief  strategies interact with infants' clinical health status, such as severity of  illness with pain responses. This study aimed to examine main and interactive  effects of routine sucrose intervention and neonatal clinical risk (NCR) on  biobehavioral pain reactivity-recovery in PI during painful blood collection  procedures. METHODS: Very low birth weight PI (<1500 g; n=104) were assigned to  low and high clinical risk groups, according to the Clinical Risk Index for  Babies. Sucrose group (n=52) received sucrose solution (25%; 0.5 mL/kg) 2 minutes  before the procedures and control group received standard care. Biobehavioral  pain reactivity-recovery was assessed according to the Neonatal Facial Coding  System, sleep-wake state scale, crying time, and heart rate at 5 phases  (baseline, antisepsis, puncture (P), recovery-dressing, and recovery-resting  [R]). Repeated measure ANOVA with mixed-design was performed considering pain  assessment phases, intervention group, and NCR. RESULTS: Independent of NCR,  sucrose presented main effect in decreasing neonates' facial activity pain  responses and crying time, during P and R. Independent of NCR level or routine  sucrose intervention, all neonates displayed activated state in P and decreased  biobehavioral responses in R phase. Although no sucrose or NCR effects were  observed on physiological reactivity, all neonates exhibited physiological  recovery 10 minutes after P, reaching the same heart rate patterns as the  baseline. CONCLUSIONS: Independent of NCR level, sucrose intervention for pain  relief during acute painful procedures was effective to reduce pain intensity and  increase biobehavioral regulation."}, {"id": 276, "title": "Acute Pediatric Pain Management in the Primary Care Office.", "authors": "Villacres, Sindy; Chumpitazi, Corrie E.", "journal": "Pediatric annals", "year": "2018", "vol": "47(3):e124-e129", "doi": "10.3928/19382359-20180222-01", "abstract": "Pain is a chief complaint in children seeking medical care, yet it may also be experienced in evaluation and treatment during office visits. Inadequate relief  of children's procedural pain and distress not only affects the experience of the  children and their parents, but also adversely affects procedural outcomes.  Despite increasing awareness and research, management of procedural pain and  anxiety in children is often inadequate. In addition, parent and patient  satisfaction is often tied to pain management. Development of a pain management  plan must be systematic, individualized, and multimodal. We present a review of  nonpharmacologic modalities, topical and oral analgesic agents, and intranasal  adjuncts for use in routine outpatient practice. [Pediatr Ann.  2018;47(3):e124-e129.]."}, {"id": 277, "title": "Is caregiver refusal of analgesics a barrier to pediatric emergency pain management? A cross-sectional study in two Canadian centres.", "authors": "Whiston, Caroline; Ali, Samina; Wright, Bruce et al.", "journal": "CJEM", "year": "2018", "vol": "20(6):892-902", "doi": "10.1017/cem.2018.11", "abstract": "OBJECTIVES: The suboptimal provision of analgesia to children in the emergency department (ED) is well-described. A yet unexplored barrier is caregiver or child  refusal of analgesia. We sought to evaluate the frequency of caregiver/child  acceptance of analgesia offered in the ED. METHODS: We conducted a two-centre  cross-sectional study of 743 caregivers of children 4–17 years presenting to the  pediatric ED with an acutely painful condition using a survey and medical record  review. The primary outcome was the proportion of children/caregiver pairs who  accepted analgesia in the ED. RESULTS: The median (IQR) age of children was 11  (7) years, and 339/743 (45.6%) were female. The overall survey response rate was  73% (743/1018). In the 24 hours preceding ED arrival, the median (IQR) maximal  pain score rated by children and caregivers was 8/10 (4) and 5/10 (2),  respectively, and 30.4% (226/743) of caregivers offered analgesia. In the ED,  children reported a median (IQR) pain score of 8/10 (2) and 54.9% (408/743) were  offered analgesia. When offered in the ED, analgesia was accepted by 91%  (373/408). Overall, 55.7% (414/743) of children received some form of analgesia.  CONCLUSIONS: Most caregivers/children accept analgesia when offered by ED  personnel, suggesting refusal is not a major barrier to optimal management of  children’s pain and highlighting the importance of ED personnel in encouraging  adequate analgesia. A large proportion of children in pain are not offered  analgesia by caregivers or ED personnel. Educational strategies for recognizing  and treating pain should be directed at children, caregivers, and ED personnel."}, {"id": 278, "title": "Brazilian Neonatal Nurses' Palliative Care Experiences.", "authors": "de Castro de Oliveira, Fernanda; Cleveland, Lisa M; Darilek, Umber et al.", "journal": "J Perinat Neonatal Nurs", "year": "2018", "vol": "32(4):E3-E10", "doi": "10.1097/JPN.0000000000000361", "abstract": "The purpose of palliative care (PC) is to minimize suffering and improve quality of life. Although PC has been well studied, the experience of neonatal intensive care unit (NICU) nurses in Brazil, where little PC training is provided, requires further investigation. The objective of this study was to explore the PC experiences of Brazilian NICU nurses. An exploratory, qualitative, descriptive study was conducted using semistructured, individual interviews with NICU nurses. This study was conducted in a 30-bed NICU in a teaching hospital in Sao Paulo, Brazil. A convenience sample of registered nurses (N = 9) was recruited. Interviews were recorded and transcribed verbatim, and thematic analysis was used to analyze the data. Four themes were identified: (a) living with the grief, (b) identifying with the family, (c) providing humane care, and (d) feeling unprepared. Nurses experienced intense grief while providing PC. They closely identified with the families and aimed to provide humane care that respected the families' values and the infants as human beings. The nurses also felt they lacked adequate training in PC and expressed a need for additional education and emotional support. NICU nurses need adequate education and emotional support to ensure quality nursing care for this vulnerable population of infants and their families."}, {"id": 279, "title": "Optimising pain management in children with acute otitis media through a primary care-based multifaceted educational intervention: study protocol for a cluster  randomised controlled trial.", "authors": "van Uum, Rick T.; Venekamp, Roderick P.; Sjoukes, Alies et al.", "journal": "Trials", "year": "2018", "vol": "19(1):501", "doi": "10.1186/s13063-018-2880-4", "abstract": "BACKGROUND: Whilst current guidelines highlight the importance of pain management for children with acute otitis media (AOM), there is evidence to suggest that  this is not implemented in everyday practice. We have developed a primary  care-based multifaceted educational intervention to optimise pain management in  children with AOM, and we trial its clinical and cost effectiveness. METHODS:  This cluster randomised controlled trial aims to recruit 250 children aged  6 months to 10 years presenting with AOM to general practitioners (GPs) in 30  primary care centres (PCCs) across the Netherlands. GPs in the PCCs allocated to  the intervention group receive a blended GP educational programme (online and  face-to-face training). The intervention asks GPs to proactively discuss pain  management with parents using an information leaflet, and to prescribe  paracetamol and ibuprofen according to current guidelines. GPs in both groups  complete an online module illustrating various otoscopic images to standardise  AOM diagnosis. GPs in the PCCs allocated to the control group do not receive any  further training and provide 'care as usual'. During the 4-week follow-up,  parents complete a symptom diary. The primary outcome is the difference in  parent-reported mean earache scores over the first 3 days. Secondary outcomes  include both number of days with earache and fever, GP re-consultations for AOM,  antibiotic prescriptions, and costs. Analysis will be by intention-to-treat.  DISCUSSION: The optimal use of analgesics through the multifaceted intervention  may provide symptom relief and thereby reduce re-consultations and antibiotic  prescriptions in children with AOM. TRIAL REGISTRATION: Netherlands Trial  Register, NTR4920 . Registered on 19 December 2014."}, {"id": 280, "title": "Acute kidney injury during a pediatric sickle cell vaso-occlusive pain crisis.", "authors": "Baddam, Sujatha; Aban, Inmaculada; Hilliard, Lee et al.", "journal": "Pediatric nephrology (Berlin, Germany)", "year": "2017", "vol": "32(8):1451-1456", "doi": "10.1007/s00467-017-3623-6", "abstract": "BACKGROUND: Patients who develop sickle cell disease (SCD) nephropathy are at a high risk for mortality. The pathophysiology of vaso-occlusive pain crisis may  contribute to acute kidney injury (AKI). Non-steroidal anti-inflammatory drugs,  known inducers of AKI, are used to treat pain crises. Multiple gaps exist in the  knowledge about the impact of AKI in SCD. METHODS: We conducted a 2-year  retrospective review of AKI events in patients admitted for vaso-occlusive  crisis. AKI was defined by an increase of ≥0.3 mg/dL or 50% in serum creatinine  from baseline. Laboratory values and ketorolac administration by days and dose  (mg/kg) were identified from hospital records. A generalized mixed effects model  for binary outcomes evaluated AKI based on laboratory variables and ketorolac  administration. A generalized mixed Poisson effects model analyzed the  association of AKI with hospital length of stay. RESULTS: Thirty-three out of 197  admissions for vaso-occlusive pain crisis (17%) were associated with AKI.  Fifty-two percent of the cases presented to the Emergency Room (ER) with AKI.  Every one unit decrease in hemoglobin from baseline to admission increased the  risk of AKI by 49%. Among patients who received ketorolac for pain, both total  days and doses of ketorolac were associated with AKI. Finally, patients with pain  and AKI required longer periods of hospitalization than patients without AKI.  CONCLUSION: Acute kidney injury during sickle cell pain crisis is common and may  be an important modifiable risk factor for developing chronic kidney disease  (CKD). Further studies are needed to determine the impact of nephrotoxic  medications on progressive SCD nephropathy."}, {"id": 281, "title": "Distraction Kits for Pain Management of Children Undergoing Painful Procedures in the Emergency Department: A Pilot Study.", "authors": "Ballard, Ariane; Le May, Sylvie; Khadra, Christelle et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2017", "vol": "18(6):418-426", "doi": "10.1016/j.pmn.2017.08.001", "abstract": "To assess the feasibility, usefulness, and acceptability of using distraction kits, tailored to age, for procedural pain management of young children visiting  the emergency department and requiring a needle-related procedure. A  pre-experimental design was piloted. A kit, tailored to age (infants-toddlers: 3  months-2 years; preschoolers: 3-5 years), was provided to parents before their  child's needle-related procedure. Data was collected to assess feasibility,  usefulness, and acceptability of the kits by parents and nurses. Pain was  measured pre-, peri-, and postprocedure using the Face, Legs, Activity, Cry,  Consolability scale. A total of 25 infants and toddlers (mean age:  1.4 ± .7 years) and 25 preschoolers (mean age: 4.0 ± .9) participated in the  study. Parents and nurses considered the kits useful and acceptable for  distraction in the emergency department, especially in the postprocedural period.  Addition of more animated and interactive toys to the kits was suggested. In the  infants-toddlers group, mean pain scores were 1.6 ± 2.5 preprocedure, 7.1 ± 3.0  periprocedure, and 2.5 ± 2.5 postprocedure. In the preschoolers group, mean pain  scores were 1.6 ± 3.0 preprocedure, 4.8 ± 3.4 periprocedure, and 2.0 ± 3.2  postprocedure. Distraction kits were deemed useful and acceptable by parents and  emergency nurses. They are an interesting nonpharmacologic option for nurses to  distract children, giving them a sense of control over their pain and improving  their hospital experience. Future research should address the feasibility of  distraction kits for a broader population of patients and a variety of painful  procedures."}, {"id": 282, "title": "Breast-Feeding Analgesia in Infants: An Update on the Current State of Evidence.", "authors": "Benoit, Britney; Martin-Misener, Ruth; Latimer, Margot et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):145-159", "doi": "10.1097/JPN.0000000000000253", "abstract": "To provide an updated synthesis of the current state of the evidence for the effectiveness of breast-feeding and expressed breast milk feeding in reducing  procedural pain in preterm and full-term born infants. A systematic search of key  electronic databases (PubMed, CINAHL, EMBASE) was completed. Of the 1032  abstracts screened, 21 were found eligible for inclusion. Fifteen studies  reported on the use of breast-feeding or expressed breast milk in full-term  infants and 6 reported on preterm infants. Direct breast-feeding was more  effective than maternal holding, maternal skin-to-skin contact, topical  anesthetics, and music therapy, and was as or more effective than sweet tasting  solutions in full-term infants. Expressed breast milk was not consistently found  to reduce pain response in full-term or preterm infants. Studies generally had  moderate to high risk of bias. There is sufficient evidence to recommend direct  breast-feeding for procedural pain management in full-term infants. Based on  current evidence, expressed breast milk alone should not be considered an  adequate intervention."}, {"id": 283, "title": "Dimensioning of painful procedures and interventions for acute pain relief in premature infants", "authors": "Bonutti, Deise Petean; Daré, Mariana Firmino; Castral, Thaíla Corrêa et al.", "journal": "Rev. latinoam. enferm. (Online)", "year": "2017", "vol": "25:e2917-e2917", "doi": "10.1590/1518-8345.1387.2917", "abstract": "ABSTRACT  Objective: to dimension the exposure of premature infants to painful procedures, relating the distribution of the exposure to contextual factors, as well as to describe the pharmacological and non-pharmacological interventions health professionals use during the first two weeks of the infant's hospitalization at two neonatal services.  Method: descriptive-exploratory study in which the professionals registered the painful procedures and pain relief interventions on a specific form in the patient file.  Results: the daily average of the 89 premature infants was 5.37 painful procedures, corresponding to 6.56 during the first week of hospitalization and 4.18 during the second week (p&lt;0.0001). The most frequent procedures were nasal/oral (35.85%) and tracheal aspirations (17.17%). The children under invasive ventilation were the most exposed to painful procedures (71.2%). Only 44.9% of the painful procedures received some intervention for the purpose of pain relief, the most frequent being sucrose (78.21%) and continuing sedation (19.82%).  Conclusion: acute pain was undertreated at these neonatal services, recommending greater sensitization of the team for the effective use of the existing protocol and implementation of other knowledge transfer strategies to improve neonatal pain management."}, {"id": 284, "title": "Blood Sampling in Newborns: A Systematic Review of YouTube Videos.", "authors": "Bueno, Mariana; Nishi, Érika Tihemi; Costa, Taine et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):160-165", "doi": "10.1097/JPN.0000000000000254", "abstract": "Objective of this study was to conduct a systematic review of YouTube videos showing neonatal blood sampling, and to evaluate pain management and comforting  interventions used. Selected videos were consumer- or professional-produced  videos showing human newborns undergoing heel lancing or venipuncture for blood  sampling, videos showing the entire blood sampling procedure (from the first  attempt or puncture to the time of application of a cotton ball or bandage),  publication date prior to October 2014, Portuguese titles, available audio.  Search terms included \"neonate,\" \"newborn,\" \"neonatal screening,\" and \"blood  collection.\" Two reviewers independently screened the videos and extracted the  following data. A total of 13 140 videos were retrieved, of which 1354 were  further evaluated, and 68 were included. Videos were mostly consumer produced  (97%). Heel lancing was performed in 62 (91%). Forty-nine infants (72%) were held  by an adult during the procedure. Median pain score immediately after puncture  was 4 (interquartile range [IQR] = 0-5), and median length of cry throughout the  procedure was 61 seconds (IQR = 88). Breastfeeding (3%) and swaddling (1.5%) were  rarely implemented. Posted YouTube videos in Portuguese of newborns undergoing  blood collection demonstrate minimal use of pain treatment, and maximal distress  during procedures. Knowledge translation strategies are needed to implement  effective measures for neonatal pain relief and comfort."}, {"id": 285, "title": "The Effectiveness of Distraction as Procedural Pain Management Technique in Pediatric Oncology Patients: A Meta-analysis and Systematic Review.", "authors": "Bukola, Ibitoye M.; Paula, Dawson", "journal": "Journal of pain and symptom management", "year": "2017", "vol": "54(4):589-600.e1", "doi": "10.1016/j.jpainsymman.2017.07.006", "abstract": "CONTEXT: Diagnostic tests and treatment regimens for pediatric cancers involve invasive and painful procedures. Effective management of such pain has been shown  to be suboptimal in many parts of the world, often because of the cost and  limited availability of appropriate medications. Current evidence suggests that  distraction (a relatively low-cost technique) is a promising intervention for  procedural pain management. There is, however, limited evidence demonstrating its  effectiveness in pediatric oncology patients. OBJECTIVES: A systematic review was  conducted to ascertain the effectiveness of distraction as a procedural pain  management technique in pediatric oncology patients. METHODS: Using a  comprehensive search strategy, MEDLINE, PsycINFO, Cochrane Library, AMED, CINAHL,  Web of Science, and EMBASE electronic databases were searched for studies  comparing distraction techniques to standard care/any intervention. Using the  selected studies, a systematic review and meta-analysis of randomized controlled  trials was conducted. RESULTS: Two hundred ninety-nine studies were identified,  with seven randomized control trials identified as eligible for inclusion. Pain  was assessed using self-report, observer-report, and physiological measures. A  meta-analysis of four studies showed distraction as effective in reducing  procedural pain, based on self-reported pain. A meta-analysis of three studies,  based on pulse rates, demonstrated similar results. For observer-reported pain,  limited evidence supported the effectiveness of distraction. CONCLUSION: This  systematic review demonstrates that distraction is a promising intervention for  procedural pain. Future research should assess effectiveness of distraction in  varied populations, to explore evidence of cultural influences on pain  expression, measurement, and management approaches."}, {"id": 286, "title": "Computer tablet distraction reduces pain and anxiety in pediatric burn patients undergoing hydrotherapy: A randomized trial.", "authors": "Burns-Nader, Sherwood; Joe, Lindsay; Pinion, Kelly", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2017", "vol": "43(6):1203-1211", "doi": "10.1016/j.burns.2017.02.015", "abstract": "BACKGROUND: Distraction is often used in conjunction with analgesics to minimize pain in pediatric burn patients during treatment procedures. Computer tablets  provide many options for distraction items in one tool and are often used during  medical procedures. Few studies have examined the effectiveness of tablet  distraction in improving the care of pediatric burn patients. AIM: This study  examines the effectiveness of tablet distraction provided by a child life  specialist to minimize pain and anxiety in pediatric burn patients undergoing  hydrotherapy. METHODS: Thirty pediatric patients (4-12) undergoing hydrotherapy  for the treatment of burns participated in this randomized clinical trial. The  tablet distraction group received tablet distraction provided by a child life  specialist while those in the control group received standard care. Pain was  assessed through self-reports and observation reports. Anxiety was assessed  through behavioral observations. Length of procedure was also recorded. RESULTS:  Nurses reported significantly less pain for the tablet distraction group compared  to the control group. There was no significant difference between groups on  self-reported pain. The tablet distraction group displayed significantly less  anxiety during the procedure compared to the control group. Also, the tablet  distraction group returned to baseline after the procedure while those in the  control group displayed higher anxiety post-procedure. There was no difference in  the length of the procedure between groups. CONCLUSIONS: These findings suggest  tablet distraction provided by a child life specialist may be an effective method  for improving pain and anxiety in children undergoing hydrotherapy treatment for  burns."}, {"id": 287, "title": "Atitudes dos profissionais de saúde na avaliação e tratamento da dor neonatala", "authors": "Christoffel, Marialda Moreira; Castral, Thaila Corrêa; Daré, Mariana Firmino et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2017", "vol": "21(1):1-8", "doi": "", "abstract": ""}, {"id": 288, "title": "Acute Pain Management in Hospitalized Children.", "authors": "Dancel, Ria; Liles, Edmund Allen; Fiore, Darren", "journal": "Reviews on recent clinical trials", "year": "2017", "vol": "12(4):277-283", "doi": "10.2174/1574887112666170816151232", "abstract": "BACKGROUND: Acute pain in hospitalized pediatric patients is prevalent. Recent shifts in the paradigm of pediatric acute pain management focus less on reliance  on opioids, due to their adverse side effects and risk of dependence, and more on  multimodal pain management. OBJECTIVE: We sought to review the most recent  studies on acute pain management in hospitalized pediatric patients. METHOD: We  searched the Cochrane Database and PubMed for articles published in the past five  years regarding the treatment of acute pain in pediatric patients focusing on  large randomized or quasirandomized controlled trials, cohort trials, and  meta-analyses. RESULTS: We categorized results into non-pharmacological,  localized, non-opiate pharmacological, and opiate based therapies. Recent studies  show that environmental and non-pharmacological methods of pain management are  efficacious in infants. School aged children benefit from active distraction more  than passive distraction. Needleless methods of introducing lidocaine locally  alleviate the pain associated with many procedures to which hospitalized children  are exposed. The shift towards use of nonopiate pharmacology focuses on novel  means of utilizing older medications, such as intravenous parecoxib, inhaled  methoxyflurane, and sublingual ketorolac or tramadol and the avoidance of  codeine. CONCLUSION: Acute pediatric pain management has changed to emphasize  multimodal and multidisciplinary therapy. In all children, non-pharmacological  therapies should be employed routinely. Given the myriad tools available,  pediatric acute pain services have developed in order to integrate more advanced  treatments such as nerve blocks and infusions of centrally acting pain  modulators."}, {"id": 289, "title": "Olfactive stimulation interventions for managing procedural pain in preterm and full-term neonates: a systematic review protocol.", "authors": "De Clifford-Faugère, Gwenaëlle; Lavallée, Andréane; Aita, Marilyn", "journal": "Systematic reviews", "year": "2017", "vol": "6(1):203", "doi": "10.1186/s13643-017-0589-1", "abstract": "BACKGROUND: While hospitalized in the NICU, preterm neonates undergo many painful procedures. This may be the same for full-term neonates when longer  hospitalization is required. Untreated and repeated pain has short-term as well  as long-term consequences for these neonates. Pharmacological pain management  methods have many limitations in their applications for both preterm and  full-term neonates. A combination of different non-pharmacological methods is  recommended for pain management. The effect of olfactive stimulation as a  non-pharmacological pain management method was investigated by a few studies in  the past years with premature and term neonates, but no systematic review has  been conducted. The objective of this systematic review is to evaluate the effect  of olfactive stimulation intervention on the pain response of preterm and  full-term neonates during painful procedures. METHODS: An electronic search will  be conducted in various databases such as PubMed (1946 to date), MEDLINE (1946 to  date), CINAHL (1981 to date), Embase (1947 to date), PsycINFO (1806 to date), Web  of Science (1945 to date), CENTRAL and Scopus (1960 to date), and Proquest,  without restriction for the year of publication. Only studies published in  English or French will be included. The search will be conducted using the  following three concepts: pain, odors, and neonates. Selection of articles, data  extraction, and assessment of risk of bias will be conducted by two independent  researchers. A third researcher will intervene in case of disagreement. According  to the availability of studies and data homogeneity, the results will be combined  to perform a meta-analysis, or they will be described by a narrative synthesis.  DISCUSSION: This systematic review will provide light on the current state of  knowledge on the effectiveness of olfactive stimulation interventions for  managing pain in preterm and full-term neonates. This review will guide clinical  practice as well as research to improve preterm and full-term neonates' pain  management and prevent short-term and long-term complications caused by pain.  SYSTEMATIC REVIEW REGISTRATION: PROSPERO CRD42017058021."}, {"id": 290, "title": "Validação da Échelle Douleur Inconfort Nouveau-Né para a cultura brasileira", "authors": "Dias, Flávia de Souza Barbosa; Gasparino, Renata Cristina; Carmona, Elenice Valentim et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2017", "vol": "51:e03285-e03285", "doi": "10.1590/s1980-220x2017008603285", "abstract": "RESUMO  Objetivo  Avaliar a confiabilidade e a validade da versão brasileira da Échelle Douleur Inconfort Nouveau-Né, que mensura a dor prolongada em recém-nascidos.  Método  Estudo metodológico realizado junto com recém-nascidos. Para a coleta foram utilizadas as versões brasileiras da Échelle Douleur Inconfort Nouveau-Né e da Children's and Infants' Postoperative Pain Scale. Para a confiabilidade, foram consideradas a equivalência, mensurada pela concordância entre observadores, e a homogeneidade. Para avaliar a validade, foi considerada a abordagem de construto convergente correlacionando as versões brasileiras da Échelle Douleur Inconfort Nouveau-Né e da Children's and Infants' Postoperative Pain Scale.  Resultados  Compuseram a amostra final 96 recém-nascidos. Na avaliação da confiabilidade, o coeficiente de concordância entre observadores variou entre 0,64 e 0,85 para os itens que compõem o instrumento e 0,96 para o escore total. O alfa de Cronbach foi de 0,82. Na avaliação da validade convergente, o coeficiente de correlação de Spearman entre os valores encontrados para as duas escalas foi de 0,79 (p&lt; 0,0001).  Conclusão  A versão brasileira da Échelle Douleur Inconfort Nouveau-Né é um instrumento confiável e válido para avaliar a dor prolongada em recém-nascidos."}, {"id": 291, "title": "Comparison of effect of kangaroo mother care, breastfeeding and swaddling on Bacillus Calmette-Guerin vaccination pain score in healthy term neonates by a  clinical trial.", "authors": "Fallah, Razieh; Naserzadeh, Naeimah; Ferdosian, Farzad et al.", "journal": "The journal of maternal-fetal & neonatal medicine : the official journal of the European Association of Perinatal Medicine, the Federation of Asia and Oceania  Perinatal Societies, the International Society of Perinatal Obstetricians", "year": "2017", "vol": "30(10):1147-1150", "doi": "10.1080/14767058.2016.1205030", "abstract": "BACKGROUND/AIM: The purpose of this research was to compare the analgesic effect of kangaroo mother care (KMC), breastfeeding and swaddling in Bacillus  Calmette-Guerin (BCG) vaccination in term neonates. METHODS: In a randomized 120  healthy term neonates who received routine BCG vaccination in the first day of  their life are distributed into three groups. In group 1, neonates breastfed two  minutes before, during and one minute after BCG vaccination. In group 2, neonates  received KMC 10 minutes before, during and one minute after vaccination and in  group 3, they were swaddled 10 minutes before, during and one minute after  vaccination. Primary outcomes included pain score during, one minute and two  minutes after BCG vaccination and obtaining pain score of less than three during  vaccination . RESULTS: Pain scores during, one minute and two minutes after  vaccination in group 1 were lower than in groups 2 and 3. Group 1 had higher  success rate in painless vaccination and had lower crying duration in comparison  to another groups (p < 0.05) Conclusion: Breastfeeding was more effective than  KMC and swaddling in reduction of BCG vaccination pain in healthy term neonates."}, {"id": 292, "title": "Preterm newborn pain research review.", "authors": "Field, Tiffany", "journal": "Infant behavior & development", "year": "2017", "vol": "49:141-150", "doi": "10.1016/j.infbeh.2017.09.002", "abstract": "This narrative review is based on a literature search of PubMed and PsycINFO for research on preterm newborn pain published during the last ten years. The high  prevalence of painful procedures being performed with preterm newborns without  analgesia (79%), with a median of 75 painful procedures being received during  hospitalization and as many as 51 painful procedures per day highlights the  importance of this problem. This review covers the pain assessments that have  been developed, the short-term effects of the painful procedures, the longer-term  developmental outcomes and the pharmacological and alternative therapies that  have been researched. The most immediate effects reported for repeated painful  procedures include increased heart rate, oxidative stress and cortisol as well as  decreased vagal activity. Lower body weight and head circumference have been  noted at 32 weeks gestation. Blunted cortisol reactivity to stressors has been  reported for three-month-olds and thinner gray matter in 21 of 66 cerebral  regions and motor and cognitive developmental delays have been noted as early as  eight months. Longer-term outcomes have been reported at school age including  less cortical thickness, lower vagal activity, delayed visual- perceptual  development, lower IQs and internalizing behavior. Pharmacological interventions  and their side effects and non-pharmacological therapies are also reviewed  including sucrose, milk and nonnutritive sucking which have been effective but  thought to negatively affect breast-feeding. Full-body interventions have  included tucking, swaddling, kangaroo care and massage therapy. Although these  have been effective for alleviating immediate pain during invasive procedures,  research is lacking on the routine use of these therapies for reducing long-term  pain effects. Further, additional randomized controlled replication studies are  needed."}, {"id": 293, "title": "Four steps to eliminate or reduce pain in children caused by needles (part 1).", "authors": "Friedrichsdorf, Stefan J.", "journal": "Pain management", "year": "2017", "vol": "7(2):89-94", "doi": "10.2217/pmt-2016-0050", "abstract": "Dr Stefan Friedrichsdorf speaks to Jade Parker, Commissioning Editor: Stefan J Friedrichsdorf, MD, is medical director of the Department of Pain Medicine,  Palliative Care and Integrative Medicine at Children's Hospitals and Clinics of  Minnesota, Minneapolis/St Paul, MN, USA, home to one of the largest and most  comprehensive programs of its kind in the country. The interdisciplinary pain  team is devoted to prevent and treat acute, procedural, neuropathic,  psycho-social-spiritual, visceral, and chronic/complex pain for all inpatients  and outpatients in close collaboration with all pediatric subspecialties at  Children's Minnesota. The palliative care team also provides holistic care for  pediatric patients with life-threatening diseases and adds an extra layer of  support to the care of children with serious illness and their families.  Integrative medicine provides and teaches integrative ('non-pharmacological')  therapies, such as massage, acupuncture/acupressure, biofeedback, aromatherapy  and self-hypnosis, to provide care that promotes optimal health and supports the  highest level of functioning in all individual children's activities. Children's  Minnesota became the first children's hospital to system-wide implement a  \"Children's Comfort Promise: We promise to do everything to prevent and treat  pain,\" resulting in decrease or elimination of needle pain caused by  vaccinations, blood draws, intravenous access, and injections in more than  200,000 children annually."}, {"id": 294, "title": "Be Sweet to Babies During Painful Procedures: A Pilot Evaluation of a Parent-Targeted Video.", "authors": "Harrison, Denise; Larocque, Catherine; Reszel, Jessica et al.", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2017", "vol": "17(5):372-380", "doi": "10.1097/ANC.0000000000000425", "abstract": "BACKGROUND: Breastfeeding (BF), skin-to-skin care (SSC), and sucrose effectively reduce babies' pain during newborn blood work, but these strategies are  infrequently used. Our team developed a parent-targeted video intervention  showing the effectiveness of the 3 pain management strategies. PURPOSE: To  evaluate neonatal intensive care unit (NICU) parents' (1) baseline knowledge and  previous use of BF, SSC, and sucrose for procedural pain management; (2)  intention to advocate/use BF, SSC, or sucrose for their infants' future blood  work after viewing the video; (3) intention to recommend the video to other  parents; and (4) perceptions of the video and identify areas for improvement.  METHODS: Cross-sectional survey of parents in an NICU. RESULTS: Fifty parents  were enrolled: 33 mothers and 17 fathers. More than two-thirds (68%) of parents  had prior knowledge of analgesic effects of sucrose; knowledge of SSC and BF as  pain-reduction strategies was lower: 44% and 34%, respectively. Eighty-six  percent of parents felt the video was the right length; 7 (14%) felt the video  was too long. After viewing the video, 96% of parents intended to advocate for  BF, SSC, or sucrose for pain management and 88% parents would recommend the video  to other parents. IMPLICATIONS FOR PRACTICE: The video is acceptable to parents,  is feasible to deliver to parents in an NICU, and has potential to increase  parents' intent to advocate for pain management strategies for their infants.  IMPLICATIONS FOR RESEARCH: Future studies are required to evaluate the  effectiveness of this parent-targeted intervention on increasing actual use of  pain management in clinical practice."}, {"id": 295, "title": "Pain Management During Newborn Screening: Using YouTube to Disseminate Effective Pain Management Strategies.", "authors": "Harrison, Denise; Reszel, Jessica; Dagg, Bill et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):172-177", "doi": "10.1097/JPN.0000000000000255", "abstract": "To assess the reach, acceptability, and effect of the BSweet2Babies video showing breast-feeding, skin-to-skin care, and sucrose during blood sampling on intention  to recommend the video or advocate for use of the interventions. In July 2014,  the video and an electronic survey were produced and posted. After 1 year, the  online viewer survey responses and YouTube analytics were analyzed. One year  after posting, the BSweet2Babies video had 10 879 views from 125 countries and  187 (1.7%) viewers completed the survey. Most respondents were aware of the  analgesic effects of breast-feeding, skin-to-skin care, and sucrose. Nearly all  respondents (n = 158, 92%) found the BSweet2Babies video to be a helpful resource  and 146 (84%) answered that they would recommend the video to others. After  viewing the video, 183 (98%) respondents answered that they would advocate for 1  or more of the interventions. The BSweet2Babies video showing effective pain  treatment during blood sampling had a large reach but a very small response rate  for the survey. Therefore, analysis of acceptability and effect on intention to  recommend the video and advocate for the interventions depicted are limited.  Further research is warranted to explore how to best evaluate videos delivered  through social media and to determine the effect of the video to promote  knowledge translation into clinical practice."}, {"id": 296, "title": "Preterm infants exhibited less pain during a heel stick when they were played the same music their mothers listened to during pregnancy.", "authors": "Kurdahi Badr, Lina; Demerjian, Taline; Daaboul, Tania et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2017", "vol": "106(3):438-445", "doi": "10.1111/apa.13666", "abstract": "AIM: Playing music during painful procedures has shown inconsistent benefits for preterm infants. This study observed preterm infants during a heel stick  procedure to assess whether listening to the music their mothers listened to  during pregnancy had any impact on their pain and physiological and behavioural  parameters. METHODS: We randomly exposed 42 preterm infants, with a mean  gestational age of 31.8 ± 2.79 weeks, to the music their mothers listened to  during pregnancy, recorded lullabies and no music, before, during and after a  heel stick. Pain responses were measured using the Neonatal Pain, Agitation and  Sedation Scale (N-PASS), and physiological and behavioural responses were  recorded by a nurse blinded to the intervention. RESULTS: N-PASS pain scores were  lowest during mothers' music, with a mean of 1.40 (±1.28), compared to 2.33  (±1.64) for no music and 1.62 (±2.27) for the lullabies [F(3/121) = 4.86, p =  0.009]. Physiological parameters were not significantly different between the  conditions. During the mothers' music, infants spent more time in a quiet alert  state, with a significant decrease in their respiratory rates. CONCLUSION: The  music mothers listened to during pregnancy was more beneficial for preterm  infants, as it decreased pain and improved behavioural states during a heel  stick."}, {"id": 297, "title": "Temporal daily associations among sleep and pain in treatment-seeking youth with acute musculoskeletal pain.", "authors": "Lewandowski Holley, Amy; Rabbitts, Jennifer; Zhou, Chuan et al.", "journal": "Journal of behavioral medicine", "year": "2017", "vol": "40(4):675-681", "doi": "10.1007/s10865-017-9847-x", "abstract": "Sleep is an important health risk factor. In the context of pediatric chronic pain, sleep is often impaired and temporal daily associations link sleep  deficiency to subsequent increased pain. It is unknown whether similar temporal  relationships exist for youth with acute pain. Thus, we characterized sleep in  youth with acute musculoskeletal (MSK) pain to examine daily sleep-pain  associations. Participants were 67 youth (10-17 years) with acute MSK pain  (<1 month duration). Youth underwent eight nights of actigraphic sleep monitoring  and completed twice daily pain diaries. Generalized linear models tested  nighttime sleep as a predictor of morning pain, and evening pain as a predictor  of nighttime sleep. Shorter sleep duration and poorer sleep quality predicted  higher morning pain intensity. However, evening pain did not predict nighttime  sleep, suggesting the strongest temporal association is in the direction of sleep  deficiency impacting next-day pain, as has been found in prior research in youth  with chronic pain."}, {"id": 298, "title": "Analgesia in the Premature Neonate: Walking the Tightrope Requires a Great Team.", "authors": "McPherson, Christopher; Smith, Joan R.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):99-100", "doi": "10.1097/JPN.0000000000000245", "abstract": ""}, {"id": 299, "title": "Non-pharmacological measures in preterm newborns submitted to arterial puncture.", "authors": "Melo, Gleicia Martins de; Cardoso, Maria Vera Lúcia Moreira Leitão", "journal": "Rev Bras Enferm", "year": "2017", "vol": "70(2):317-325", "doi": "10.1590/0034-7167-2016-0003", "abstract": "OBJECTIVE: to assess pain in preterm newborns and to compare the neonatal and therapeutic variables with the total scores of the Neonatal Facial Coding System of preterm newborns submitted to arterial puncture exposed to music and 25% oral glucose. METHOD: a comparative study with 48 recordings of preterm newborns - Group 1, music (26); Group 2, glucose 25% (22) - individually analyzed by three trained nurses, after Kappa of at least 80%. RESULTS: the variables and the pain scores of the groups did not present statistical significance (p < 0.05) according to the Neonatal Facial Coding System. 80.8% of the preterm infants in Group 1 had a higher quantitative score &#8805; 3 in the neonatal variables (gender, type of delivery), and therapeutic variables (type of oxygen therapy, place of hospitalization, type of puncture). CONCLUSION: There was no difference when comparing the music and glucose 25% groups and the variables studied."}, {"id": 300, "title": "When alternative female Kangaroo care is provided by other immediate postpartum mothers, it reduces postprocedural pain in preterm babies more than swaddling.", "authors": "Murmu, Jitendranath; Venkatnarayan, Kannan; Thapar, Rajeev Kumar et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2017", "vol": "106(3):411-415", "doi": "10.1111/apa.13716", "abstract": "AIM: Research on alternative female Kangaroo care (KC) has been hampered by high maternal refusal rates. We assessed the efficacy of Kangaroo mother care (KMC),  alternative KC provided by other postpartum mothers and swaddling for  postprocedural pain relief in preterm babies. METHODS: The study was carried out  in a tertiary armed forces hospital, where mothers did not have support from  other female relatives and other postpartum mothers agreed to act as alternative  female KC providers. We exposed 51 stable preterm neonates, with a gestational  age of 30-36 weeks, to KMC, alternative female KC and swaddling for 30 minutes  before heel lancing. The outcome measures included the Preterm Infant Pain  Profile (PIPP) scores at 30 seconds and the time taken for the heart rate to  return to baseline. RESULTS: The mean PIPP scores were lower with KMC (10.59) and  alternative female KC (11.24) than swaddling (12.96) and heart rate normalisation  took 111, 117 and 149 seconds respectively. The p values were <0.001 for  individual groups and outcomes. KMC fared better than alternative female KC for  both pain (p = 0.045) and heart rate (p = 0.013). CONCLUSION: Providing KMC and  alternative female KC before heel lancing resulted in better pain relief than  swaddling."}, {"id": 301, "title": "Audiovisual distraction for pain relief in paediatric inpatients: A crossover study.", "authors": "Oliveira, N. C. A. C.; Santos, J. L. F.; Linhares, M. B. M.", "journal": "European journal of pain (London, England)", "year": "2017", "vol": "21(1):178-187", "doi": "10.1002/ejp.915", "abstract": "BACKGROUND: Pain is a stressful experience that can have a negative impact on child development. The aim of this crossover study was to examine the efficacy of  audiovisual distraction for acute pain relief in paediatric inpatients. METHOD:  The sample comprised 40 inpatients (6-11 years) who underwent painful puncture  procedures. The participants were randomized into two groups, and all children  received the intervention and served as their own controls. Stress and  pain-catastrophizing assessments were initially performed using the Child Stress  Scale and Pain Catastrophizing Scale for Children, with the aim of controlling  these variables. The pain assessment was performed using a Visual Analog Scale  and the Faces Pain Scale-Revised after the painful procedures. Group 1 received  audiovisual distraction before and during the puncture procedure, which was  performed again without intervention on another day. The procedure was reversed  in Group 2. Audiovisual distraction used animated short films. A 2 × 2 × 2  analysis of variance for 2 × 2 crossover study was performed, with a 5% level of  statistical significance. RESULTS: The two groups had similar baseline measures  of stress and pain catastrophizing. A significant difference was found between  periods with and without distraction in both groups, in which scores on both pain  scales were lower during distraction compared with no intervention. The sequence  of exposure to the distraction intervention in both groups and first versus  second painful procedure during which the distraction was performed also  significantly influenced the efficacy of the distraction intervention.  CONCLUSION: Audiovisual distraction effectively reduced the intensity of pain  perception in paediatric inpatients. SIGNIFICANCE: The crossover study design  provides a better understanding of the power effects of distraction for acute  pain management. Audiovisual distraction was a powerful and effective  non-pharmacological intervention for pain relief in paediatric inpatients. The  effects were detected in subsequent acute painful procedures."}, {"id": 302, "title": "Experiences of acute pain in children who present to a healthcare facility for treatment: a systematic review of qualitative evidence.", "authors": "Pope, Nicole; Tallon, Mary; McConigley, Ruth et al.", "journal": "JBI database of systematic reviews and implementation reports", "year": "2017", "vol": "15(6):1612-1644", "doi": "10.11124/JBISRIR-2016-003029", "abstract": "BACKGROUND: Pain is a universal and complex phenomenon that is personal, subjective and specific. Despite growing knowledge in pediatric pain, management  of children's pain remains sub-optimal and is linked to negative behavioral and  physiological consequences later in life. As there is no synthesis of these  studies, it was timely to undertake a systematic review. OBJECTIVES: To identify,  evaluate and synthesize the existing qualitative evidence on children's  experiences of acute pain, including pain management, within a healthcare  facility. INCLUSION CRITERIA TYPES OF PARTICIPANTS: Children aged four to 18  years (inclusive) attending a healthcare facility who experienced acute pain  associated with any injury, medical condition or treatment. PHENOMENA OF  INTEREST: Children's experiences and perceptions of their acute pain, pain  management and expectations of others in managing their pain. Studies on  children's experiences of pain in the postoperative context were excluded as a  systematic review exploring this phenomenon had previously been published.  Studies reporting on children's experiences of chronic pain were also excluded.  CONTEXT: Any healthcare facility including general practitioners' surgeries,  hospitals, emergency departments and outpatient clinics. TYPES OF STUDIES:  Qualitative studies including phenomenology, grounded theory, ethnography, action  research and feminist research designs. SEARCH STRATEGY: Using a three-step  search strategy, databases were searched in December 2015 to identify both  published and unpublished articles from 2000 to 2015. Studies published in  languages other than English were excluded. METHODOLOGICAL QUALITY: All studies  that met the inclusion criteria were assessed by at least two independent  reviewers for methodological quality using a standardized critical appraisal tool  from the Joanna Briggs Institute Qualitative Assessment and Review Instrument  (JBI-QARI). DATA EXTRACTION: Data were extracted from the papers included in the  review using standardized data extraction tool from JBI-QARI. DATA SYNTHESIS:  Findings were pooled using JBI-QARI. Findings were rated according to their level  of credibility and categorized based on similarity in meaning and then were  subjected to a meta-synthesis. RESULTS: Four studies were included in this  review. Two meta-syntheses were generated from five categories based on 21  findings: first, children can express their pain experiences in terms of cause,  location, meaning and quality. Children's pain experiences include both physical  and psychological dimensions. Children's pain experiences are influenced by their  previous pain experiences, pain expectations and sociocultural factors. Second,  children use a range of cognitive/behavioral and sensory/physical self-soothing  strategies not only to help manage their pain, but also rely on the actions and  presence of others as helpers when they are in pain. CONCLUSION: Children's pain  is a multi-dimensional complex phenomenon relying upon a multi-modal approach to  management. Children as young as four years are capable of articulating their  pain in terms of location, intensity and depth. The way children perceive,  express and respond to pain is shaped by sociocultural factors, previous pain  experiences and their expectations of pain. Children, parents and healthcare  professionals play an important role in managing children's pain experiences."}, {"id": 303, "title": "História em quadradinhos: tecnologia em saúde para a humanização da assistência à criança hospitalizada", "authors": "Rolim, Karla Maria Carneiro; Pinheiro, Carlon Washington; Magalhães, Fernanda Jorge et al.", "journal": "Referecia", "year": "2017", "vol": "IV(14):69-78", "doi": "", "abstract": ""}, {"id": 304, "title": "Dolor del recién nacido expuesto a procedimientos de enfermería en la unidad de neonatología de un hospital clínico chileno", "authors": "San Martín, Daniela; Valenzuela, Sandra; Huaiquian, Julia et al.", "journal": "Enferm Global", "year": "2017", "vol": "16(4):1-12", "doi": "", "abstract": ""}, {"id": 305, "title": "A Randomized Trial to Evaluate the Effect of Two Topical Anesthetics on Pain Response During Frenotomy in Young Infants.", "authors": "Shavit, Itai; Peri-Front, Yael; Rosen-Walther, Anda et al.", "journal": "Pain medicine (Malden, Mass.)", "year": "2017", "vol": "18(2):356-362", "doi": "10.1093/pm/pnw097", "abstract": "OBJECTIVE: To examine the comparative effectiveness of two topical anesthetics in controlling the pain associated with tongue-tie release (frenotomy) in young  infants. DESIGN: Randomized trial. SETTING: A Pediatric Craniofacial Clinic.  SUBJECTS: Forty-two infants who were referred for frenotomy were randomly  allocated to receive the topical anesthetic gel 2% tetracaine or 20% benzocaine  applied prior to frenotomy. Frenotomies were videotaped. The primary outcome  measure was the Neonatal Facial Coding System (NFCS) score. Secondary outcome  measures included cry duration and a visual analog scale (VAS) assessed by the  parents. RESULTS: The two groups were comparable with regard to weight, age,  gender, previous painful experience, and last feeding time. Median NFCS scores  prior to frenotomy in the tetracaine and the benzocaine groups were 4.5 (IQR:  0.75–10.2) and 3.5 (IQR: 0–9.5), respectively (P = 0.89, 95% CI −3 to 4). During  frenotomy, median NFCS score increased to 28 (IQR: 24.5–30.25) in the tetracaine  group (P < 0.0001, median difference −22, 95% CI −24.5 to −19), and to 28 (IQR:  26–30) in the benzocaine group (P < 0.0001, median difference −23, 95% CI −27 to  −17). Mean cry durations in the tetracaine and the benzocaine groups were  69.4 seconds and 63.9 seconds, respectively (P = 0.32, 95% CI −47 to 15), and  mean VAS scores were 57.2 and 58.2, respectively (P = 0.89, 95% CI −15.2 to  13.4). CONCLUSIONS: These topical anesthetics seem ineffective in controlling the  pain associated with frenotomy. Clinicians should continue to search for an  effective treatment for this procedure."}, {"id": 306, "title": "Assessment and management of pain in newborns hospitalized in a Neonatal Intensive Care Unit: a cross-sectional study.", "authors": "Sposito, Natália Pinheiro Braga; Rossato, Lisabelle Mariano; Bueno, Mariana et al.", "journal": "Rev Lat Am Enfermagem", "year": "2017", "vol": "25:e2931-e2931", "doi": "10.1590/1518-8345.1665.2931", "abstract": "OBJECTIVE:: to determine the frequency of pain, to verify the measures adopted for pain relief during the first seven days of hospitalization in the Neonatal Intensive Care Unit and to identify the type and frequency of invasive procedures to which newborns are submitted. METHOD:: cross-sectional retrospective study. Out of the 188 hospitalizations occurred during the 12-month period, 171 were included in the study. The data were collected from the charts and the presence of pain was analyzed based on the Neonatal Infant Pain Scale and on nursing notes suggestions of pain. For statistical analysis, the Statistical Package for the Social Sciences was used, and the significance level was set at 5%. RESULTS:: there was at least one record of pain in 50.3% of the hospitalizations, according to the pain scale adopted or nursing note. The newborns underwent a mean of 6.6 invasive procedures per day. Only 32.5% of the pain records resulted in the adoption of pharmacological or non-pharmacological intervention for pain relief. CONCLUSION:: newborns are frequently exposed to pain and the low frequency of pharmacological or non-pharmacological interventions reinforces the undertreatment of this condition. OBJETIVO:: determinar a frequência de dor e verificar as medidas realizadas para seu alívio durante os sete primeiros dias de internação na Unidade de Terapia Intensiva Neonatal, bem como identificar o tipo e frequência de procedimentos invasivos aos quais os recém-nascidos foram submetidos. MÉTODO:: estudo retrospectivo transversal. Das 188 internações ocorridas no período estipulado de 12 meses, 171 foram incluídas na pesquisa. Os dados foram coletados a partir dos prontuários e a presença de dor foi analisada tanto com base na escala de dor Neonatal Infant Pain Scale quanto mediante anotação de enfermagem sugestiva de dor. Para análise estatística, utilizou-se o programa Statistical Package for the Social Sciences, adotando-se nível de significância de 5%. RESULTADOS:: em 50,3% das internações houve ao menos um registro de dor, conforme escala de dor adotada ou anotação de enfermagem. Os recém-nascidos foram submetidos à média de 6,6 procedimentos invasivos por dia. Apenas 32,5% dos registros de dor resultaram na adoção de condutas farmacológicas ou não farmacológicas para seu alívio. CONCLUSÃO:: observa-se que os recém-nascidos são frequentemente expostos à dor e a baixa frequência de intervenções farmacológicas ou não farmacológicas reforça o subtratamento dessa condição. OBJETIVO:: determinar la frecuencia del dolor, comprobar las medidas tomadas para su alivio durante los siete primeros días de internación en una Unidad de Terapia Intensiva Neonatal e identificar el tipo de procedimientos invasivos y la frecuencia a que se sometieron los recién nacidos. MÉTODO:: estudio retrospectivo transversal. De las 188 internaciones realizadas en el período estipulado de 12 meses, se incluyeron 171 en la investigación. Los datos se recolectaron a partir de los prontuarios; la presencia de dolor se analizó según la Escala de Valorización del Dolor en el Neonato (Neonatal Infant Pain Scale) y las notas de enfermería sobre el dolor. Para el análisis estadístico, se utilizó el programa 'Paquete estadístico para las ciencias sociales' (Statistical Package for the Social Sciences), adoptándose el nivel de significación del 5%. RESULTADOS:: en el 50,3% de las internaciones hubo al menos un registro de dolor, según la escala de dolor adoptada o las notas de la enfermería. Se sometió a los recién nacidos a un promedio de 6,6 procedimientos invasivos por día. Sólo el 32,5% de los registros de dolor resultaron en la adopción de conductas farmacológicas o no farmacológicas para su alivio. CONCLUSIÓN:: se observa que los recién nacidos a menudo están expuestos al dolor, y la frecuencia baja de intervenciones farmacológicas o de las no farmacológicas refuerza el subtratamiento de dicha condición."}, {"id": 307, "title": "Avaliação e manejo da dor em recém-nascidos internados em Unidade de Terapia Intensiva Neonatal: estudo transversal", "authors": "Sposito, Natália Pinheiro Braga; Rossato, Lisabelle Mariano; Bueno, Mariana et al.", "journal": "Rev Lat Am Enfermagem", "year": "2017", "vol": "25:1-9", "doi": "", "abstract": ""}, {"id": 308, "title": "Updates in Pediatric Regional Anesthesia and Its Role in the Treatment of Acute Pain in the Ambulatory Setting.", "authors": "Stein, Alecia L. S.; Baumgard, Dorothea; Del Rio, Isis et al.", "journal": "Current pain and headache reports", "year": "2017", "vol": "21(2):11", "doi": "10.1007/s11916-017-0614-z", "abstract": "PURPOSE OF REVIEW: The purpose of this review is to summarize the latest advances in pediatric regional anesthesia with special emphasis on its role in the  ambulatory surgical setting. RECENT FINDINGS: Undertreated pain in children  following ambulatory surgery is not a rare occurrence and it is associated with  increased morbidity and significant psychosocial harm. Use of regional anesthesia  as part of the anesthetic approach in the ambulatory setting is safe when  performed on children under general anesthesia and inclusion of certain adjuncts  improves block outcomes. Ultrasonographic visualization during blockade improves  safety and prolongs duration. Ambulatory continuous nerve blocks in older  children are safe, efficacious, and associated with high patient and caregiver  satisfaction rates. In the ever-growing field of pediatric same-day surgery, safe  and efficient flow through the perioperative period necessitates use of a  multimodal approach, of which regional anesthesia is but one important component.  Perioperative complications are minimized with less opioid use, and yet  appropriate pain management must be ensured. Pediatric regional anesthesia has  been shown to be exceedingly safe under general anesthesia. Findings demonstrate  that advances in ultrasound technology have contributed to safer and  longer-lasting analgesia. It facilitates the development of new methods by which  regional anesthesia can improve postoperative analgesia in children upon  discharge and beyond."}, {"id": 309, "title": "Relative effectiveness of additive pain interventions during vaccination in infants.", "authors": "Taddio, Anna; Riddell, Rebecca Pillai; Ipp, Moshe et al.", "journal": "CMAJ : Canadian Medical Association journal = journal de l'Association medicale canadienne", "year": "2017", "vol": "189(6):E227-E234", "doi": "10.1503/cmaj.160542", "abstract": "BACKGROUND: Vaccine injections can cause acute pain and distress in infants, which can contribute to dissatisfaction with the vaccination experience and  vaccine hesitancy. We sought to compare the effectiveness of additive pain  interventions administered consistently during vaccine injections in the first  year of life. METHODS: We conducted a multicentre, longitudinal, double-blind,  add-on, randomized controlled trial. Healthy infants were randomly assigned to 1  of 4 levels of pain management for all vaccine injections at 2, 4, 6 and 12  months: (i) placebo control; (ii) parent-directed video education about infant  soothing; (iii) the video plus sucrose administered orally or (iv) the video plus  sucrose plus liposomal lidocaine applied topically. All infants benefit from  injection techniques that minimize pain. We used a double-dummy design; hence all  parents watched a video (active psychological intervention or placebo) and all  infants received oral solution (sucrose or placebo) and topical cream (lidocaine  or placebo). We assessed infant distress during 3 phases - preinjection  (baseline), vaccine injection (needle), and 1 minute postinjection (recovery) -  using the Modified Behavioural Pain Scale (range 0-10). We compared scores  between groups and across infant ages using a mixed-model repeated-measures  analysis. RESULTS: A total of 352 infants participated in the study, from Jan.  17, 2012, to Feb. 2, 2016. Demographics did not differ among intervention groups  (p > 0.05). Baseline pain scores did not differ among intervention groups (p =  0.4), but did differ across ages (p < 0.001). Needle pain scores differed among  groups (p = 0.003) and across ages (p < 0.001). The mean (± standard deviation)  needle score was 6.3 (± 0.8) in the video-sucrose-lidocaine group compared with  6.7 (± 0.8) in each of the other groups. There were no other between-group  differences. Recovery scores did not differ among groups (p = 0.98), but did  differ across ages (p < 0.001). INTERPRETATION: Only liposomal lidocaine provided  consistent analgesia within an additive pain intervention regimen during  vaccinations in infants. Trial registration: ClinicalTrials.gov, no. NCT01503060."}, {"id": 310, "title": "Topical anaesthetics for pain control during repair of dermal laceration", "authors": "Tayeb, BO; Eidelman, A; Eidelman, CL et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2017", "vol": "2", "doi": "10.1002/14651858.CD005364.pub3", "abstract": "Abstract - Background Topical local anaesthetics provide effective analgesia for patients undergoing numerous superficial procedures, including repair of dermal lacerations. The need for cocaine in topical anaesthetic formulations has been questioned because of concern about adverse effects, thus novel preparations of cocaine‐free anaesthetics have been developed. This review was originally published in 2011 and has been updated in 2017. Objectives To assess whether benefits of non‐invasive topical anaesthetic application occur at the expense of decreased analgesic efficacy. To compare the efficacy of various single‐component or multi‐component topical anaesthetic agents for repair of dermal lacerations. To determine the clinical necessity for topical application of the ester anaesthetic, cocaine. Search methods For this updated review, we searched the following databases: Cochrane Central Register of Controlled Trials (CENTRAL; 2016, Issue 11), Cumulative Index to Nursing and Allied Health Literature (CINAHL; 2010 to December 2016), Embase (2010 to December 2016) and MEDLINE (2010 to December 2016). We did not limit this search by language or format of publication. We contacted manufacturers, international scientific societies and researchers in the field. Weemailed selected journalsand reviewed meta‐registers of ongoing trials. For the previous version of this review, we searched these databases to November 2010. Selection criteria We included randomized controlled trials (RCTs) that evaluated the efficacy and safety of topical anaesthetics for repair of dermal laceration in adult and paediatric participants. Data collection and analysis Two review authors independently assessed trial quality and extracted data. We contacted study authors for additional information when needed. We collected adverse event information from trial reports. We assessed methodological risk of bias for each included study and employed the GRADE approach to assess the overall quality of the evidence. Main results The present updated review included 25 RCTs involving 3278 participants. The small number of trials in each comparison group and the heterogeneity of outcome measures precluded quantitative analysis of data for all but one outcome: pain intensity. In two pooled studies, the mean self‐reported visual analogue scale (VAS; 0 to 100 mm) score for topical prilocaine‐phenylephrine (PP) was higher than the mean self‐reported VAS (0 to 100 mm) score for topical tetracaine‐epinephrine‐cocaine (TAC) by 5.59 points (95% confidence interval (CI) 2.16 to 13.35). Most trials that compared infiltrated and topical anaesthetics were at high risk of bias, which is likely to have affected their results. Researchers found that several cocaine‐free topical anaesthetics provided effective analgesic efficacy. However, data regarding the efficacy of each topical agent are based mostly on single comparisons in trials with unclear or high risk of bias. Mild, self‐limited erythematous skin induration occurred in one of 1042 participants who had undergone application of TAC. Investigators reported no serious complications among any of the participants treated with cocaine‐based or cocaine‐free topical anaesthetics. The overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Authors' conclusions We have found two new studies published since the last version of this review was prepared. We have added these studies to those previously included and have conducted an updated analysis, which resulted in the same review conclusions as were presented previously. Mostly descriptive analysis indicates that topical anaesthetics may offer an efficacious, non‐invasive means of providing analgesia before suturing of dermal lacerations. Use of cocaine‐based topical anaesthetics might be hard to justify, given the availability of other effective topical anaesthetics without cocaine. However, the overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Plain language summary Local anaesthesia (numbing medicine) that is directly applied to the skin can provide pain control for repair of skin lacerations Background : Pain control during suturing of torn skin is generally achieved by injecting medication into the skin (infiltration) to numb the area. This injection itself may cause pain, but topical anaesthetics are applied directly to the skin and are painless to administer. Cocaine was one of the first anaesthetics to be successfully applied topically. Concerns over adverse effects of cocaine, its potential misuse and the administrative burden of dispensing a controlled substance led to the development of cocaine‐free topical anaesthetics. Multiple cocaine‐free topical anaesthetics have been found to provide effective anaesthesia for repair of
