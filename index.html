e, LILACS, IBECS e BDENF. A amostra foi constituída por 17 estudos clínicos, sem delimitação geográfica, temporal ou de idioma. A análise foi realizada de forma descritiva, sendo ainda utilizada a classificação do nível de evidência para caracterizar as produções incluídas. Resultados: A dor constituiu o principal parâmetro de avaliação, especialmente durante a após procedimentos invasivos, sendo mensurada por meio de escalas de medida, assim como de parâmetros comportamentais e laboratoriais. As principais intervenções identificadas foram expressas pelo método canguru e pela amamentação que predominaram na maioria dos estudos incluídos. Outras estratégias evidenciadas envolveram a voz materna e a educação digital em saúde dos familiares. Todas as intervenções identificadas foram descritas como importante método não farmacológico para redução da dor, resultando no controle da duração e da intensidade do choro, da frequência, do nível basal de cortisol e da saturação de oxigênio. Conclusão: A participação materna e familiar pode ser considerada uma importante estratégia não farmacológica para alívio da dor no recém-nascido, estando relacionada a melhorias das condições fisiológicas, laboratoriais e comportamentais durante e após procedimentos dolorosos"}, {"id": 40, "title": "The management of paediatric acute pain in Spain in 2021: Results of a national survey among paediatric anaesthesiologists.", "authors": "Reinoso-Barbero, F.; López-López, R.; Cárceles Barón, M. D. et al.", "journal": "Revista espanola de anestesiologia y reanimacion", "year": "2024", "vol": "71(4):282-290", "doi": "10.1016/j.redare.2024.02.016", "abstract": "OBJECTIVE: To improve knowledge about routine clinical practice in the management of paediatric acute pain in Spain. METHODS: A telematic survey was conducted via  the Internet on a representative sample of healthcare professionals involved in  the management of paediatric acute pain (specifically anaesthesiologists) in  Spain. The survey included 28 questions about their usual clinical practice in  the assessment and treatment of acute pain, and also training and organisational  aspects in paediatric acute pain. RESULTS: The survey was completed during March  2021 by 150 specialists in anaesthesiology. The respondents widely experienced in  the management of acute paediatric pain (mean years of experience: 14.3: SD:  7.8), essentially in acute postoperative pain (97% of cases). Although 80%  routinely used validated paediatric acute pain assessment scales, only 2.6% used  specific scales adapted for patients with cognitive impairment. Most of the  respondents routinely used analgesic drugs such as paracetamol (99%) or  metamizole (92%), but only 84% complemented these drugs with a loco-regional  blocking technique or other non-steroidal anti-inflammatory drugs (62%).  Furthermore, only 62.7% acknowledged having received specific training in  paediatric acute pain, only 45% followed hospital institutional protocols, and a  scant 28% did so through paediatric pain units. CONCLUSIONS: The survey  identified important points for improvement in the training and organisation of  acute pain management in Spanish paediatric patients."}, {"id": 41, "title": "Impact of virtual reality on peri-interventional pain, anxiety and distress in a pediatric oncology outpatient clinic: a randomized controlled trial.", "authors": "Reitze, Alicia; Voigt, Marie; Klawonn, Frank et al.", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):501", "doi": "10.1186/s12887-024-04952-3", "abstract": "PURPOSE: Pain and anxiety-inducing interventions have a major impact on pediatric patients. Pain reduction by virtual reality (VR) during port and vein punctures  is well studied. This study investigates peri-interventional reduction of pain,  anxiety and distress using VR compared to the standard of care (SOC) in a  pediatric oncology outpatient clinic. METHODS: In a randomized, controlled  cross-over design, patients aged 6-18 years experience potentially painful  interventions accompanied by VR. Observational instruments include NRS, FPS-r,  BAADS, mYPAS-SF, PedsQL and SSKJ3-8R. All patients undergo two observations: SOC  (A) and VR (B) in a randomized order. In addition, parents and staff are  interviewed. Specific conditions for VR in an outpatient clinic setting derived  from interprofessional focus group discussion are being explored. RESULTS:  Between July 2021 and December 2022 57 eligible patients were included and  randomized to the orders A/B (n = 28) and B/A (n = 29). Thirty-eight patients  completed both observations. Characteristics in both groups did not differ  significantly. More than half of the patients had no previous experience with VR,  5% decided to discontinue VR prematurely. Peri-interventional pain, anxiety and  distress were significantly reduced by VR compared with SOC. 71% of patients and  76% of parents perceived punctures with VR to be more relaxed than previous ones.  95% of patients perceived fun with VR goggles. Detailed questionnaires on  individual stress and anxiety were returned from 26 of 38 patients. Focus group  discussion with staff yielded evidence for successful implementation of VR in an  outpatient clinic. CONCLUSIONS: The present study shows that VR can be used for  peri-interventional reduction of pain, anxiety, and distress in the special  environment of a pediatric outpatient clinic. Specific conditions must be met for  successful implementation. Further studies are needed to identify particularly  susceptible patients and to illuminate alternatives for distraction that are  feasible to implement with limited resources. TRIAL REGISTRATION NUMBER:  (ClinicalTrials.gov ID): NCT06235723; 01/02/2024; retrospectively registered.  This study adheres to the standard checklist of CONSORT guidelines."}, {"id": 42, "title": "Comparative Efficacy of Breastfeeding or Feeding of Breast Milk on Blood Sampling Pain Relief in Full-Term Neonates: A Systematic Review and Meta-Analysis.", "authors": "Shi, Chengpeng; Tang, Jie; Li, Wei et al.", "journal": "Breastfeeding medicine : the official journal of the Academy of Breastfeeding Medicine", "year": "2024", "vol": "19(2):81-90", "doi": "10.1089/bfm.2023.0233", "abstract": "Objectives: To evaluate the efficacy of breastfeeding or feeding of breast milk in reducing blood sampling pain in full-term neonates by comparing with other  intervention measures. Methods: Related literature was searched from PubMed,  EMBASE, Web of Science, and Cochrane Central Register of Controlled Trials  (Central). Only randomized controlled trials (RCTs), which reported the effect of  breastfeeding or feeding of breast milk on blood sampling pain in full-term  neonates, were eligible. The primary outcome was set as pain score on scales, and  the secondary outcomes as physiological and behavioral indicators. The risk of  bias in included studies was assessed by the Cochrane Collaboration's tool. Data  analysis was performed using RevMan 5.4.1. Main Results: A total of 17 RCTs were  included. Breastfeeding showed a stronger effectiveness in reducing blood  sampling pain, compared with nonintervention, placebo, mother's holding, breast  milk odor, mother's heartbeat, music therapy, skin-to-skin, and Eutectic Mixture  of Local Anesthetics ointment. However, the efficacy of glucose or sucrose  (12.5%-30% concentration) seems better than breastfeeding. When compared with  other interventions, feeding of breast milk yielded different results. Its effect  was only stronger than placebo (sterile water or distilled water), massage, or  nonintervention. Conclusions: Breastfeeding might be effective for alleviating  blood sampling pain in full-term neonates. Its effect is second only to that of  glucose/sucrose. The efficacy of feeding of breast milk in reducing blood  sampling pain in full-term neonates might not be guaranteed."}, {"id": 43, "title": "Pain management in hospitalized children: unveiling barriers from the nursing perspective.", "authors": "Souza, Danton Matheus de; Lestinge, Giovanna Sanches; Carvalho, Joese Aparecida et al.", "journal": "Rev Gaucha Enferm", "year": "2024", "vol": "45:e20230151-e20230151", "doi": "10.1590/1983-1447.2024.20230151.en", "abstract": "OBJECTIVE: To understand nursing team perceptions about the barriers in pain management in the care of hospitalized children. METHOD: Descriptive-exploratory study, with a qualitative approach, conducted with eight nurses and seven nursing technicians. Data were collected at the Universidade de São Paulo University Hospital, between June and September 2022, through individual interviews, analyzed from the perspective of thematic content analysis and in the light of Symbolic Interactionism. RESULTS: The following categories emerged: 1) Knowledge translation: is pain management actuallyperformed? and 2) Reflecting changes: how to achieve the potential of pain management? Professionals have theoretical knowledge about pain management, however, they listed numerous barriers at each stage, mainly related to institutional routine, and, when reflecting on this context, they indicated the need for an institutional protocol. FINAL CONSIDERATIONS: Barriers stand out from theoretical knowledge and make pain management for hospitalized children disregarded. Knowing this context is relevant forimplementing change strategies."}, {"id": 44, "title": "Morphine versus hydromorphone in pediatrics: a narrative review of latest indications and optimal use in neonates and children.", "authors": "Spénard, Sarah; Metras, Marie-Elaine; Gélinas, Charles et al.", "journal": "Minerva pediatrics", "year": "2024", "vol": "76(6):777-789", "doi": "10.23736/S2724-5276.23.07275-0", "abstract": "The management of pain in pediatrics is multimodal and includes non-pharmacologic and pharmacologic approaches. Opioids, and particularly morphine and  hydromorphone, are frequently used to treat moderate-to-severe pain. The goals of  this review are to describe the pharmacological characteristics of both drugs, to  cover the latest evidence of their respective indications, and to promote their  safe use in pediatrics. Morphine is the most studied opioid in children and is  known to be safe and effective. Morphine and hydromorphone can be used to manage  acute pain and are usually avoided when treating chronic non-cancer pain. Current  evidence suggests that both opioids have a similar efficacy and adverse effect  profile. Hydromorphone has not been studied in neonates but in some centers, it  has been used instead of morphine for certain patients. In palliative care, the  use of opioids is often indicated and their benefits extend beyond analgesia;  indications include treatment of central neuropathic pain in children with severe  neurologic impairment and treatment of respiratory distress in the imminently  dying patients. The longstanding belief that the use of well-titrated opioids  hastens death should be abandoned as robust evidence has shown the opposite. With  the current opioid crisis, a responsible use of opioids should be promoted,  including limiting the opioid prescription to the patient's anticipated needs,  optimizing a multimodal analgesic plan including the use of non-pharmacological  measures and non-opioid medications, and providing information on safe storage  and disposal to patients and families. More data is needed to better guide the  use of morphine and hydromorphone in children."}, {"id": 45, "title": "The implementation of infant pain practice change resource to improve infant procedural pain practices: a hybrid type 1 effectiveness-implementation study.", "authors": "Stevens, Bonnie; Bueno, Mariana; Barwick, Melanie et al.", "journal": "Pain", "year": "2024", "vol": "166(7):1587-1596", "doi": "10.1097/j.pain.0000000000003496", "abstract": "Implementation of infant pain practice change (ImPaC) is a multifaceted web-based resource to support pain practice change in neonatal intensive care unit (NICU).  We evaluated the (1) intervention effectiveness and (2) implementation  effectiveness of ImPaC using a hybrid type 1 effectiveness-implementation study  (ie, cluster randomized controlled trial and longitudinal descriptive study).  Eligible level 2 and 3 Canadian NICUs were randomized to intervention (INT) or  waitlisted to usual care (UC) for 6 months. We assessed the number of painful  procedures, proportion of procedures accompanied by valid assessment and  evidence-based treatment, and pain intensity to determine intervention  effectiveness using intention-to-treat (ITT) and wait-list (WL) analyses.  Implementation feasibility and fidelity were explored. Twenty-three NICUs  participated (12 INT, 11 UC). Thirty infants/NICU were included in the ITT (INT =  354, UC = 325) and the WL (INT = 678, UC = 325) analyses. In the ITT analysis,  the average number of painful procedures/infant/day was lower in the INT group  [2.62 (±3.47) vs 3.85 (±4.13), P < 0.001] than in the UC group. Pain assessment  was greater in the INT group (34.7% vs 25.5%, P < 0.001) and pain intensity  scores were lower [1.47 (1.25) vs 1.86 (1.97); P = 0.029]. Similarly, in the WL  analysis, there were fewer painful procedures/infant/day [3.11 (±3.98) vs 3.85  (±4.13), P = 0.003] and increased pain assessment (30.4% vs 25.5%, P = 0.0001)  and treatment (31.2% vs 24.0%, P < 0.001) in the INT group. Feasibility and  implementation fidelity were associated with improved clinical outcomes."}, {"id": 46, "title": "Impact of a Strategy for Improving Early Management of Acute Pain in the Pediatric Emergency Department.", "authors": "Storch-De-Gracia, Pilar; Salido, Débora; Molina, Alberto et al.", "journal": "Pediatric emergency care", "year": "2024", "vol": "40(7):521-526", "doi": "10.1097/PEC.0000000000003199", "abstract": "OBJECTIVES: The objective of this study was to measure the impact of an intervention on pain treatment in a pediatric emergency department (ED). The  application of interventions to improve pain management in DE has demonstrated  diverse effects so far, most of them successful. METHODS: This is a  quasi-experimental before-and-after, longitudinal, prospective study.Patients  were collected between January 2020 and December 2021. Principal outcome was the  number of patients with moderate or severe pain who received analgesia before 30  minutes to the ED arrival. The intervention consisted of several training  sessions for nursing staff, pediatricians, and trauma physicians. RESULTS: A  total of 515 patients were enrolled, 230 during preintervention period and 285  during postintervention period. The percentage of patients receiving analgesia  before 30 minutes increased from 24% to 29% and before 60 minutes increased from  31% to 42%. Time to analgesia administration decreased from 43 to 39 minutes.Only  254 patients (49%) received analgesia at some point during their stay in the ED,  137 (26.6%) before 30 minutes and 193 (37.5%) before 60 minutes. The probability  of receiving analgesia was greater in patients seen by a pediatrician rather than  an orthopedist (59%-37%). Metamizole was the most commonly used drug (48%),  followed by ibuprofen and acetaminophen. CONCLUSIONS: The application strategies  to enhance early pain treatment in the ED can improve analgesia administration.  Training strategies aimed at healthcare personnel working in the ED can change  the way they work and achieve clear benefits for the patient. The treatment of  pain in the ED should begin as soon as possible, and in this objective, the  involvement of the nursing staff is a priority, because they are the professional  who has the best opportunity for the detection and treatment of pain from the  moment of triage."}, {"id": 47, "title": "Nonpharmacological Interventions to Mitigate Procedural Pain in the NICU: An Integrative Review.", "authors": "Sutton, Rana; Lemermeyer, Gillian", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2024", "vol": "24(4):364-373", "doi": "10.1097/ANC.0000000000001164", "abstract": "BACKGROUND: Small infants experience a myriad of stimuli while in the Neonatal Intensive Care Unit (NICU), with many being painful or stressful experiences,  although medically necessary. PURPOSE: To determine what is known about  nonpharmacological developmental care interventions used in the NICU to mitigate  procedural pain of infants born under 32 weeks gestation. SEARCH/STRATEGY: Five  electronic databases were searched: Medline, CINAHL, Scopus, Embase and the  Cochrane Library. The inclusion criteria were as follows: experimental and  nonexperimental studies from all publication years with infants born at less than  32 weeks gestational age; peer-reviewed research articles studying  nonpharmacological interventions such as skin-to-skin care, facilitated tucking,  nonnutritive sucking, hand hugs, and swaddling; and English language articles.  Our search yielded 1435 articles. After the elimination of 736 duplicates, a  further 570 were deemed irrelevant based on their abstract/titles. Then, 124  full-text articles were analyzed with our inclusion and exclusion criteria.  FINDINGS: Twenty-seven studies were reviewed. Sucrose, facilitated tucking,  pacifier, skin-to-skin care, and human milk appeared to lessen pain experienced  during heel sticks, suctioning, nasogastric tube insertions, and echocardiograms.  All nonpharmacological interventions failed to prove efficacious to adequately  manage pain during retinopathy of prematurity (ROP) examinations. IMPLICATIONS  FOR PRACTICE: Evidence review demonstrates that healthcare practitioners should  use nonpharmacological measures to help prevent pain from day-to-day procedures  in the NICU including heel sticks, nasogastric tube insertions, suctioning,  echocardiograms, and subcutaneous injections. IMPLICATIONS FOR RESEARCH: Future  research is necessary to better understand and measure how pain is manifested by  very small premature infants. Specific research on mitigating the pain of  examinations for retinopathy of prematurity is also needed."}, {"id": 48, "title": "Barriers and facilitators to using procedural pain treatments in pediatric patients (under 1 year old): protocol for a mixed studies systematic review with  a narrative synthesis.", "authors": "Yan, Chunji; Hu, Jiale; Kang, Jiamin et al.", "journal": "Systematic reviews", "year": "2024", "vol": "13(1):287", "doi": "10.1186/s13643-024-02713-y", "abstract": "BACKGROUND: The management of procedural pain in pediatric patients under 1 year old is crucial but often inadequately addressed in clinical practice. Despite  proven evidence-based interventions like skin-to-skin contact, sweet solutions,  and breastfeeding, their implementation remains sporadic. This systematic review  aims to uncover the barriers and facilitators to adopting these interventions,  leveraging the Consolidated Framework for Implementation Research (CFIR) to  provide a structured analysis. METHODS: This review will examine primary studies  identifying barriers or facilitators to the use of procedural pain treatments in  pediatric patients under 1 year old, imposing no restrictions on the publication  year or language. A thorough search will cover databases such as MEDLINE (Ovid),  Embase, CINAHL, PsycINFO, Web of Science, and Scopus. The Mixed Methods Appraisal  Tool (MMAT) will be utilized for quality assessment. The CFIR framework will  serve to categorize and analyze the identified barriers and facilitators, using  narrative synthesis for data integration. DISCUSSION: Applying the CFIR framework  allows for a comprehensive and systematic review of the factors influencing the  implementation of procedural pain management strategies in pediatric care. By  identifying key barriers and facilitators through this lens, the review will  guide the development of targeted interventions aimed at enhancing the adoption  of evidence-based pain treatments. Such strategic interventions are essential for  bridging the gap between research findings and clinical practice, potentially  improving the effectiveness and efficiency of pain management for pediatric  patients. SYSTEMATIC REVIEW REGISTRATION: PROSPERO CRD42022322319."}, {"id": 49, "title": "Pain management associated with arteriovenous fistula cannulation among children undergoing haemodialysis: Systematic review.", "authors": "Zukhra, Ririn Muthia; Wanda, Dessie", "journal": "JPMA. The Journal of the Pakistan Medical Association", "year": "2024", "vol": "74(5 (Supple-5)):S78-S83", "doi": "10.47391/JPMA.Ind-RInC-21", "abstract": "OBJECTIVE: To evaluate studies related to pain management associated with arteriovenous fistula cannulation among children. METHODS: The systematic review  comprised literature search on Embase, ProQuest, Science Direct, Scopus,  SpringerLink and Wiley Online databases for studies published in English between  1998 and 2021. The search used key words, including pain management OR analgesia  AND child OR paediatric AND haemodialysis OR dialysis AND arteriovenous fistula  OR arteriovenous fistula cannulation OR fistula needle OR arteriovenous fistula  insertion OR needle insertion. The quality of the studies was evaluated using the  Joana Briggs Institute checklist. General characteristics of the and pain  outcomes were noted. RESULTS: Of the 2,877 studies initially identified, 8(0.27%)  were analysed; 7(87.5%) quasi-experimental and 1(12.5%) randomised controlled  trial. Overall, there were 283 participants aged 6-18 years. The strategies used  for reducing arteriovenous fistula puncture-related pain among children  undergoing haemodialysis included cryotherapy, lidocaine agents, virtual reality  (VR), guided visualisation, balloon inflation, aromatherapy, and other programmed  distractions. The strategies had a positive effect on reducing arteriovenous  fistula cannulation-related pain among children. CONCLUSION: Non-pharmacological  pain management is an easier, simpler, inexpensive and more effective method of  atraumatic care among children undergoing haemodialysis."}, {"id": 50, "title": "Parental involvement in mitigating procedural pain for infants using non-pharmacological approaches.", "authors": "Çamur, Zühal", "journal": "Evidence-based nursing", "year": "2024", "vol": "27(4):143", "doi": "10.1136/ebnurs-2023-103757", "abstract": ""}, {"id": 51, "title": "Effectiveness of ShotBlocker application on reducing the pain of needle-related procedures in children: A systematic review and meta-analysis.", "authors": "İyi, Zahide; İşler, Ayşegül; Özer, Zeynep", "journal": "Journal of pediatric nursing", "year": "2024", "vol": "78:e438-e447", "doi": "10.1016/j.pedn.2024.08.006", "abstract": "PROBLEM: Needle-related procedures are quite common throughout life, especially during childhood. Pain caused by these procedures is the most common  complication. ShotBlocker is an alternative non-pharmacological method to reduce  pain during injection-related procedures. However, the effectiveness of the  ShotBlocker application in children for reducing pain needle-related procedures  remains unclear. This review aimed to evaluate the effectiveness of ShotBlocker  application on pain during needle-related procedures in children from Randomized  Controlled Trials. ELIGIBILITY CRITERIA: Eight electronic databases were searched  until November 2023 for articles published in English. The methodological quality  and evidence strength were appraised using the Cochrane Risk of Bias 2 tool and  the GRADE approach. A random-effects model was used to determine the effect of  the ShotBlocker application on pain levels. The review included results involving  assessments from the child, parents, and an observer in pain evaluation. SAMPLE:  A total of nine studies with 1205 children patients were included. RESULTS: The  evaluation data showed that ShotBlocker application significantly reduced the  pain caused by needle-related procedures in children. The Cochrane GRADE approach  showed moderate level evidence for the effect of ShotBlocker application on pain  during needle procedures. CONCLUSIONS: As a result of the studies included in  this meta-analysis, it was determined that ShotBlocker application significantly  reduced the pain caused by needle-related procedures in children. IMPLICATIONS:  ShotBlocker, a non-pharmacological method, can be used by pediatric nurses to  reduce pain during needle-related procedures in children. Randomized controlled  studies with well-designed methods are needed to create strong evidence in this  field."}, {"id": 52, "title": "Factors Influencing Parental Decision-Making Regarding Analgesia for Children with Musculoskeletal Injury-Related Pain: A Qualitative Study.", "authors": "Ali, Samina; Dworsky-Fried, Zoë; Moir, Mackenzie et al.", "journal": "The Journal of pediatrics", "year": "2023", "vol": "258:113405", "doi": "10.1016/j.jpeds.2023.113405", "abstract": "OBJECTIVES: To explore and understand parental decision-making relating to acute pain management for their children presenting to the emergency department. STUDY  DESIGN: This study employed one-on-one semistructured interviews. Parents of  children with acute musculoskeletal injuries were recruited from 3 Canadian  pediatric emergency departments. Interviews were conducted via telephone from  June 2019 to March 2021. Verbatim transcription and thematic analyses occurred  concurrently with data collection, supporting data saturation and theory  development considerations. RESULTS: Twenty-seven interviews were completed. Five  major themes regarding pain care emerged: (1) my child's comfort is a priority,  (2) every situation is unique, (3) opioids only if necessary, (4) considerations  when choosing opioids, and (5) pain research is important. Overall, parents were  highly comfortable with their assessment of their child's pain. Participants'  willingness to use opioid analgesia for their children was primarily dependent on  perceptions of injury and pain severity. Opioid-averse and opioid-accepting  families had similar considerations when making analgesic decisions but weighed  risks and benefits differently. CONCLUSIONS: Parents assess and manage their  children's pain globally and multimodally, with comfort being prioritized. For  most parents, the desire to relieve their children's pain outweighed concerns of  substance use disorder, misuse, and adverse events when making decisions about  opioid analgesia for short-term use. These results can inform evidence-based  family-centered approaches to co-decision-making of analgesic plans for children  with acute pain."}, {"id": 53, "title": "The effect of using maternal voice, white noise, and holding combination interventions on the heel stick sampling.", "authors": "Apaydin Cirik, Vildan; Gül, Uğur; Kihtir, Zeynep et al.", "journal": "Journal of pediatric nursing", "year": "2023", "vol": "70:1-11", "doi": "10.1016/j.pedn.2023.01.005", "abstract": "BACKGROUND: Heel stick sampling, a common procedure in newborns, causes acute pain. AIMS: This study aims to measure the outcome of five various  non-pharmacologic pain relief groups; maternal voice, white noise, holding,  maternal voice+holding, and white noise+holding. METHODS: The study is an open  label, randomized controlled trial. A total of 178 newborns were included in this  study. Newborns were randomly allocated to each group; white noise (n = 31),  maternal voice (n = 31), holding (n = 30), white noise+holding (n = 29), maternal  voice+holding (n = 28), and control (n = 29) interventions. Newborns' pain  responses were evaluated using the Neonatal Infant Pain Scale (NIPS), and the  Premature Infant Pain Profile (PIPP). The primary measured outcomes were the  newborns' pain levels, while the secondary outcomes were the heart rate and  changes in oxygen saturation. The mean values of pain in neonates between groups  were evaluated one minute before (Phase1), during (Phase2), and one minute after  (Phase3) the procedure. RESULTS: The research results are given with comparisons  in three time periods (Phase1, Phase2 and Phase3). White noise and white  noise+holding were found to have the lowest mean NIPS and PIPP score (p < 0.001).  The mean heart rate was found to be the lowest in the white noise+holding group  (p < 0.001). There was no significant difference between the groups in terms of  oxygen saturation score (p = 0.453). CONCLUSION: The white noise+holding applied  to newborns during heel stick sampling were effective in pain reduction. Nurses  and midwives can use white noise+holding method. IMPLICATIONS TO PRACTICE: These  results contribute to the pain management of newborns."}, {"id": 54, "title": "Effectiveness of non-immersive virtual reality in the management of procedure-related pain in preschool children: a randomized clinical trial.", "authors": "Camacho-Cruz, Jhon; Palacios-Ariza, María A.; Orrego-Celestino, Luisa et al.", "journal": "European journal of pediatrics", "year": "2023", "vol": "182(9):4103-4112", "doi": "10.1007/s00431-023-05070-5", "abstract": "The objective of this study is to assess the effectiveness of non-immersive virtual reality as a pain-distraction measure in children between the ages of 3  and 5 years undergoing painful injection procedures in an outpatient setting. We  carried out a randomized, unmasked clinical trial in children undergoing  venipuncture or intramuscular injection procedures. Patients were randomized to a  distraction virtual reality video or standard care. After the procedure, three  independent observers (parents, researchers, nursing staff) rated pain on the  LLANTO pain scale. We recruited 122 subjects, half of which were randomized to  virtual reality. The median age was of approximately 60 months (IQR: 15 months),  and the sample was balanced with regard to sex. There were significant  differences in LLANTO scales scores between the VR subjects and controls  of - 3.34 (95% CI - 4.15; - 2.54), - 3.02 (95% CI - 3.90; - 2.14), and - 2.98  (95% CI - 3.87; - 2.09), as rated by parents, researchers, and nursing staff,  respectively. Agreement between raters was high for all three types of observers,  with Cohen Kappas over 0.79 in all cases. Bivariate analysis showed reductions in  the risk of obtaining higher scores in the LLANTO scale. Linear regression models  showed a reduction of approximately 3 points in the scale, regardless of the type  of observer. These models were adjusted for sex, age, kind of procedure, use of  prior analgesia, and recruitment center. CONCLUSIONS: Non-immersive virtual  reality is an effective adjunctive therapy for the reduction of pain in children  undergoing painful injection procedures in an outpatient setting. This strategy  may be used to improve the quality of care in pediatric outpatient services.  TRIAL REGISTRATION: ClinicalTrials.gov Identifier: NCT03985930 (Registered June  14, 2019). WHAT IS KNOWN: •The use of immersive virtual reality (VR) has been  described as an effective adjunctive distraction method during painful procedures  in children over 5 years. WHAT IS NEW: •The utility of non-immersive VR in  children below that age is not yet clear. This randomized clinical trial  comparing non-immersive VR vs. standard care showed an average reduction of three  points in the LLANTO pain scale favoring non-immersive VR. Non-immersive VR is an  effective and inexpensive non-pharmacological technique that reduces fear and  pain in pediatric patients."}, {"id": 55, "title": "Sensorial saturation improves infants' procedure-related pain behaviour in the cardiac intensive care unit: A quasi-experimental study.", "authors": "Choi, Yuri; Choi, Eun Kyoung; Lee, Hyejung et al.", "journal": "Australian critical care : official journal of the Confederation of Australian Critical Care Nurses", "year": "2023", "vol": "36(2):232-238", "doi": "10.1016/j.aucc.2022.01.004", "abstract": "BACKGROUND: Painful procedures are unavoidable when providing critical care to infants in intensive care units. These adverse experiences during infancy can  lead to later hyperalgesia and poor neurodevelopmental outcomes. Thus,  appropriate interventions are required to relieve infant pain during these  procedures. OBJECTIVES: This study evaluated the effectiveness of sensorial  saturation in reducing pain for infants during jugular central venous catheter  removal procedures in intensive care units. METHODS: This study involved a  quasi-experimental, repeated-measures design. Data were collected from  participants sequentially recruited from April to June 2019 (control period) and  July to September 2019 (experimental period). Participants included 78 infants  younger than 1 year with congenital heart disease. The control group (n = 38)  received a general nursing intervention using swaddling, a common child-care  practice that consists of wrapping infants to restrict movements, whereas the  experimental group (n = 40) received sensorial saturation using oral sugar, body  massage, and verbal interaction. Infants' physiological reactions to procedural  pain were measured by changes in heart rate, oxygen saturation, and respiratory  rate. Infants' procedural pain and behavioural indicators were measured using the  Modified Behavioural Pain Scale. Data were analysed using descriptive statistics,  independent t-tests, χ(2) tests, and repeated-measures analysis of variance.  RESULTS: Compared with the control group, the experimental group had lower heart  rates (F = 53.15, p < .001), respiratory rates (F = 15.19, p < .001), and  behavioural pain scores (F = 45.21, p < .001), both during and after the  procedure. CONCLUSIONS: Sensorial saturation can be used as a nursing  intervention in infants. Given the many invasive procedures that are part of  infant clinical care, sensorial saturation may be a safe analgesic alternative.  The findings of this study could lead to the development of evidence-based  clinical practice guidelines for the nonpharmacological management of acute pain  in infants."}, {"id": 56, "title": "Pain Management in Pediatric Burns: A Review of the Science behind It.", "authors": "Ciornei, Bogdan; David, Vlad Laurentiu; Popescu, Diana et al.", "journal": "Global health, epidemiology and genomics", "year": "2023", "vol": "2023:9950870", "doi": "10.1155/2023/9950870", "abstract": "Pediatric burns are a significant medical issue that can have long-term effects on various aspects of a child's health and well-being. Pain management in  pediatric burns is a crucial aspect of treatment to ensure the comfort and  well-being of young patients. The causes and risk factors for pediatric burns  vary depending on various factors, such as geographical location, socioeconomic  status, and cultural practices. Assessing pain in pediatric patients, especially  during burn injury treatment, poses several challenges. These challenges stem  from various factors, including the age and developmental stage of the child, the  nature of burn injuries, and the limitations of pain assessment tools. In  pediatric pain management, various pain assessment tools and scales are used to  evaluate and measure pain in children. These tools are designed to account for  the unique challenges of assessing pain in pediatric patients, including their  age, developmental stage, and ability to communicate effectively. Pain can have  significant physical, emotional, and psychological consequences for pediatric  patients. It can interfere with their ability to engage in daily activities,  disrupt sleep patterns, and negatively affect their mood and behavior. Untreated  pain can also lead to increased stress, anxiety, and fear, which can further  exacerbate the pain experience. Acute pain, which is short-term and typically  associated with injury or illness, can disrupt a child's ability to engage in  physical activities and impede their overall recovery process. On the other hand,  chronic pain, which persists for an extended period, can have long-lasting  effects on physical functioning and quality of life in children. The  psychological consequences of burns can persist long after the physical wounds  have healed, leading to ongoing emotional distress and impaired functioning.  Multimodal pain management, which involves the use of multiple interventions or  medications targeting different aspects of the pain pathway, has gained  recognition as an effective approach for managing pain in both children and  adults. However, it is important to consider the specific needs and  considerations of pediatric patients when developing evidence-based guidelines  for multimodal pain management in this population. Over the years, there have  been significant advances in pediatric pain research and technology, leading to a  better understanding of pain mechanisms and the development of innovative  approaches to assess and treat pain in children. Overall, pain management in  pediatric burns requires a multidisciplinary approach that combines pharmacologic  and nonpharmacologic interventions."}, {"id": 57, "title": "Estratégias utilizadas pela equipe de enfermagem para preparar a criança e a família na realização de procedimentos dolorosos", "authors": "Costa, Cibelle Tiphane de Sousa", "journal": "", "year": "2023", "vol": "86 p-86 p", "doi": "", "abstract": "Introdução: A percepção da equipe de enfermagem é fundamental para avaliar e tratar a dor da criança hospitalizada. Por meio da observação e comunicação com a criança e sua família, os profissionais de enfermagem podem identificar a intensidade da dor e adequação do tratamento de acordo com as necessidades individuais de cada paciente. Uma abordagem empática e sensível é essencial para garantir o bem-estar da criança durante sua hospitalização. Objetivo: Compreender quais estratégias de intervenção a equipe de enfermagem (enfermeiros, técnicos e auxiliares) utiliza para preparar a criança e a família para a realização de procedimentos dolorosos durante a internação. Metodologia: Estudo exploratório descritivo com abordagem qualitativa realizada na unidade de internação pediátrica do Hospital Universitário da Universidade de São Paulo. A coleta de dados foi realizada através da observação não-participante e entrevistas semiestruturadas aos profissionais de enfermagem do setor. A análise dos dados foi apoiada no referencial metodológico Análise Temática e na abordagem teórica o Cuidado Centrado na Família. Resultados: Os dados foram organizados em dois temas e cinco subtemas. 1. Perspectiva teórica: A família como agente de cuidado nos procedimentos dolorosos; 2. Perspectiva prática: Vivências, desafios e estratégias de inserção da família nos procedimentos dolorosos. O tema 1 detectou as falas que consideravam a família como agente de cuidados, destacavam como ela era parte integrante do cuidado em saúde e sua influência no bem-estar da criança. Isso possibilitava ao profissional utilizar os preceitos do CCF, com abordagem mais humana e promovendo melhoria da qualidade doa atendimento. Para o tema 2 apoiou-se nas falas que se referem às vivências, desafios e estratégias de inserção da família em procedimentos dolorosos, sendo crucial para a implementação efetiva desse modelo de cuidado. Buscou-se entender as dificuldades que podem surgir durante o processo e quais estratégias foram desenvolvidas para superá-las, pois é uma oportunidade para promover a segurança e o bem-estar do paciente, além de fortalecer o vínculo entre a equipe de saúde, a criança e a família. Destaca-se também quais estratégias farmacológicas e não farmacológicas utilizavam para minimizar a dor da criança. Conclusão: Foi verificado que, mesmo em uma instituição que adota os princípios de inclusão familiar em todo o processo de cuidado, é necessário o treinamento contínuo da equipe para que possa evitar a execução automatizada de tarefas, a fim de manter na equipe de enfermagem a postura educacional com a família e, consequentemente, fornecer alívio à criança em procedimentos dolorosos, minimizando os riscos de traumas que o procedimento na internação possa trazer."}, {"id": 58, "title": "Development, evaluation and adaptation of a critical realism informed theory of procedural pain management in preterm infants: The PAIN-Neo theory.", "authors": "De Clifford-Faugère, Gwenaëlle; Aita, Marilyn; Arbour, Caroline et al.", "journal": "Journal of advanced nursing", "year": "2023", "vol": "79(6):2155-2166", "doi": "10.1111/jan.15525", "abstract": "AIM: To present the development, evaluation and adaptation of the PAIN-Neo theory. DESIGN: Theory development. DATA SOURCES: A review of literature was  conduct from 1980 to 2021. RESULTS: Using a critical realism paradigm, this paper  presents the PAIN-Neo theory, which was developed from an analysis of existing  theoretical perspectives on paediatric procedural pain, empirical studies  conducted with preterm infants, and the research team's pain management  expertise. The theory was then empirically tested and fine-tuned. IMPLICATIONS  FOR NURSING: The PAIN-Neo theory highlights that the neonatal nurse is part of a  larger picture as she is influenced by factors related to her unit, hospital and  country of practice. This theory emphasizes the importance of parental  involvement in pain management, which is consistent with family-centred nursing  practices. CONCLUSION: The PAIN-Neo theory reflects the complexity of pain  management nursing. This theory is innovative and specific enough to guide  practice, structure research projects and contribute to the body of knowledge in  the discipline of nursing."}, {"id": 59, "title": "Regional Anesthesia for Acute Pain Treatment in Pre-Hospital and In-Hospital Emergency Medicine.", "authors": "Fichtner, Andreas; Schrofner-Brunner, Benedikt; Magath, Tina et al.", "journal": "Deutsches Arzteblatt international", "year": "2023", "vol": "120(48):815-822", "doi": "10.3238/arztebl.m2023.0221", "abstract": "BACKGROUND: More than half of all emergency department patients seek help for acute pain, which is usually of musculoskeletal origin. Acute pain is often  inadequately treated even today, particularly in children and in older patients.  In this study, we assess the potential role of regional anesthetic methods in  improving the treatment of pain in the preclinical and clinical emergency  setting. METHODS: Pain-related reasons for admission were identified and  quantified from emergency admission data. A structured literature search was  carried out for clinical studies on the treatment of pain in the emergency  setting, and a before-and-after comparison of the pain relief achieved with  established vs. newer regional anesthetic methods was performed. RESULTS: 43% of  emergency patients presented with acute musculoskeletal pain. The literature  search yielded 3732 hits for screening; data on entity-specific pain therapy  spectra were extracted from 153 studies and presented for the main pain regions.  The degree of pain relief obtained through regional anesthetic procedures, on a  nominal rating scale from 0 to 10, was 4 to 7 points for acute back and chest  wall pain, >6 for shoulder pain, 5 to 7 for hand and forearm injuries, and >4 for  hip fractures. These results were as good as, or better than, those obtained by  analgesia/sedation with strong opioids. CONCLUSION: Modern regional anesthetic  techniques can improve acute pain management in the emergency department and, to  some extent, in the pre-hospital setting as well. Pain relief with these  techniques is quantifiably better than with strong opioids in some clinical  situations; moreover, there is evidence of further advantages including process  optimization and fewer complications. Data for comparative study remain scarce  because of a lack of standardization."}, {"id": 60, "title": "Minor painful procedures in extremely preterm infants admitted to a tertiary neonatal intensive care unit: Opportunities to improve pain mitigation.", "authors": "Fulkoski, Nick; Kecskes, Zsuzsoka; Chaudhari, Tejasvi", "journal": "Journal of paediatrics and child health", "year": "2023", "vol": "59(3):542-547", "doi": "10.1111/jpc.16352", "abstract": "AIM: This study aims to characterise current pain management practices in extremely preterm infants (gestational age less than or equal to 28 weeks)  admitted to neonatal intensive care unit (NICU). METHODS: Retrospective audit  pertaining to patient characteristics, as well as minor painful procedures (MPP),  pain mitigation and pain scoring in 25 extremely preterm infants admitted to a  tertiary NICU in 2016 over the first 14 days of NICU admission. Opportunities to  bundle MPP were identified according to pre-specified criteria. Bayley Scales of  Infant Development, Third Edition (BSID-III) cognitive, language and motor  composite scores were available from the neurodevelopmental follow-up clinic at  12- and 24-months of corrected age. Linear mixed methods regression was used to  examine for correlation between increased exposure to MPP and BSID-III scores at  follow-up. RESULTS: Extremely preterm infants underwent an average of  11.24 ± 4.12 MPP per day for the first 14 days of NICU admission. Opportunities  to bundle MPP were missed 75.98% (408/537) of the time; most of these were  invasive blood collections. A total of 12.2% (481/3933) of MPP occurred within  4 h of pharmacological or non-pharmacological pain mitigation. BSID-III motor  composite score was associated with an 11.75 (95% confidence interval 1.99,  21.27) decrease in patients experiencing more than or equal to the third quartile  of MPP in the 14 days post-NICU admission (P = 0.0329, n = 42). Association was  not found for BSID-III cognitive and language composite scores. CONCLUSIONS:  There is readily scope for quality improvement initiatives to reduce harm in  extremely preterm infants admitted to NICU."}, {"id": 61, "title": "The Importance of Managing Acute Pain in the Neonatal Intensive Care Unit Context.", "authors": "Hashemi, Haleh; Cohen, Estreya; Riddell, Rebecca Pillai", "journal": "Indian pediatrics", "year": "2023", "vol": "60(11):887-888", "doi": "", "abstract": ""}, {"id": 62, "title": "Virtual reality and noise canceling headphone distraction during pediatric dermatologic procedures.", "authors": "Jaquez, Sasha D.; Haller, Courtney N.; England, Maryann E. et al.", "journal": "Pediatric dermatology", "year": "2023", "vol": "40(6):1161-1163", "doi": "10.1111/pde.15401", "abstract": "Pain and anxiety related to medical procedures have long been recognized as a significant healthcare concern. If a patient's procedural pain and anxiety are  not addressed, long-term physical and psychological sequelae including increased  perceived pain, anxiety, disruptive behavior, trauma reactions, or refusal of  future procedures can occur. The objective of our study was to assess the utility  of a virtual reality (VR) headset or noise-canceling headphones (HP) compared to  treatment as usual (TAU) in reducing pain and anxiety during pediatric  dermatology procedures. Results indicated a significant difference between pre-  versus post-procedure anxiety in the VR and HP groups but not the TAU group  suggesting non-pharmacologic technology-based interventions such as VR and  headphones may reduce patients' anxiety during pediatric dermatology procedures."}, {"id": 63, "title": "Maternal voice reduces procedural pain in neonates: A meta-analysis of randomized controlled trials.", "authors": "Jin, Lingwen; Zhang, Jing; Yang, Xin et al.", "journal": "Medicine", "year": "2023", "vol": "102(12):e33060", "doi": "10.1097/MD.0000000000033060", "abstract": "BACKGROUND: Procedural pain management is a very important part in the clinical care of neonates. We aimed to conduct a meta-analysis to evaluate the effects of  maternal voice on neonatal procedural pain, to provide insights to the clinical  pain care of neonates. METHODS: Two researchers independently searched PubMed,  EMBASE, The Cochrane Library, CINAHL, Web of Science, China Biomedical Literature  Database, China National Knowledge Infrastructure, Wanfang and Weipu Database for  randomized controlled trials (RCTs) involving the effects of maternal voice on  the procedural pain of neonates up to October 25, 2022. Two investigators  screened the literature based on the inclusion and exclusion criteria and  evaluated the methodological quality of the inclusion study. RevMan 5.3 software  was used for the meta-analysis. RESULTS: A total of 8 RCTs with a total of 584  neonates were included. Our meta-analysis indicated that maternal voice reduces  the pain score (SMD = -0.60, 95% CI: -0.81 to -0.39) and heart rate (SMD = -0.81,  95% CI: -1.44 to -0.18) and increases the comfort level (SMD = -0.47, 95% CI:  -0.83 to -0.11) and blood oxygen saturation (SMD = 0.70, 95% CI: 0.03-1.38)  during procedure (all P < .05). Moreover, maternal voice reduces the pain score  (SMD = -0.58, 95% CI: -0.88 to -0.28) and heart rate (SMD = -0.44, 95% CI: -0.75  to -0.12) and increases the blood oxygen saturation (SMD = 0.41, 95% CI: 0.00 to  -0.82) after procedure (all P < .05). No publication biases were detected by the  funnel plots and Egger tests (all P > .05). CONCLUSION: Maternal voice is  beneficial to reduce procedural pain and improve the physiological indicators in  neonates. It is still necessary to conduct high-quality, large sample studies in  the future to further elucidate the effect of maternal voice on neonatal pain  care."}, {"id": 64, "title": "Systemic opioid regimens for postoperative pain in neonates", "authors": "Kinoshita, M; Borges do Nascimento, IJ; Styrmisdóttir, L et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2023", "vol": "4", "doi": "10.1002/14651858.CD015016.pub3", "abstract": "Abstract - Background Postoperative pain clinical management in neonates has always been a challenging medical issue. Worldwide, several systemic opioid regimens are available for pediatricians, neonatologists, and general practitioners to control pain in neonates undergoing surgical procedures. However, the most effective and safe regimen is still unknown in the current body of literature. Objectives To determine the effects of different regimens of systemic opioid analgesics in neonates submitted to surgery on all‐cause mortality, pain, and significant neurodevelopmental disability. Potentially assessed regimens might include: different doses of the same opioid, different routes of administration of the same opioid, continuous infusion versus bolus administration, or 'as needed' administration versus 'as scheduled' administration. Search methods Searches were conducted in June 2022 using the following databases: Cochrane Central Register of Controlled Trials [CENTRAL], PubMed, and CINAHL. Trial registration records were identified via CENTRAL and an independent search of the ISRCTN registry. Selection criteria We included randomized controlled trials (RCTs), quasi‐randomized, cluster‐randomized, and cross‐over controlled trials evaluating systemic opioid regimens' effects on postoperative pain in neonates (pre‐term or full‐term). We considered suitable for inclusion: I) studies evaluating different doses of the same opioid; 2) studies evaluating different routes of administration of the same opioid; 3) studies evaluating the effectiveness of continuous infusion versus bolus infusion; and 4) studies establishing an assessment of an 'as needed' administration versus 'as scheduled' administration. Data collection and analysis According to Cochrane methods, two investigators independently screened retrieved records, extracted data, and appraised the risk of bias. We stratified meta‐analysis by the type of intervention: studies evaluating the use of opioids for postoperative pain in neonates through continuous infusion versus bolus infusion and studies assessing the 'as needed' administration versus 'as scheduled' administration. We used the fixed‐effect model with risk ratio (RR) for dichotomous data and mean difference (MD), standardized mean difference (SMD), median, and interquartile range (IQR) for continuous data. Finally, we used the GRADEpro approach for primary outcomes to evaluate the quality of the evidence across included studies. Main results In this review, we included seven randomized controlled clinical trials (504 infants) from 1996 to 2020. We identified no studies comparing different doses of the same opioid, or different routes. The administration of continuous opioid infusion versus bolus administration of opioids was evaluated in six studies, while one study compared 'as needed' versus 'as scheduled' administration of morphine given by parents or nurses. Overall, the effectiveness of continuous infusion of opioids over bolus infusion as measured by the visual analog scale (MD 0.00, 95% confidence interval (CI) ‐0.23 to 0.23; 133 participants, 2 studies; I² = 0); or using the COMFORT scale (MD ‐0.07, 95% CI ‐0.89 to 0.75; 133 participants, 2 studies; I² = 0), remains unclear due to study designs' limitations, such as the unclear risk of attrition, reporting bias, and imprecision among reported results (very low certainty of the evidence).  None of the included studies reported data on other clinically important outcomes such as all‐cause mortality rate during hospitalization, major neurodevelopmental disability, the incidence of severe retinopathy of prematurity or intraventricular hemorrhage, and cognitive‐ and educational‐related outcomes.  Authors' conclusions Limited evidence is available on continuous infusion compared to intermittent boluses of systemic opioids. We are uncertain whether continuous opioid infusion reduces pain compared with intermittent opioid boluses; none of the studies reported the other primary outcomes of this review, i.e. all‐cause mortality during initial hospitalization, significant neurodevelopmental disability, or cognitive and educational outcomes among children older than five years old. Only one small study reported on morphine infusion with parent‐ or nurse‐controlled analgesia. Plain language summary How effective and safe are systemic opioids for postoperative pain control and management in neonates? Review Question How effective and safe are systemic opioids for reducing newborn babies' pain after surgery? Background Neonates (babies in the first four weeks after birth) may undergo surgery (operations) or surgical procedures. Like adults, babies experience pain, and this pain must be managed (reduced) after surgery. Opioids are pain‐relieving medications. Examples of opioids are codeine and morphine. Opioids work by interacting with opioid receptors in the body and reducing feelings of pain. Opioids affect the whole body system and this is why this review refers to them as systemic opioids. Opioids can be given to babies in a few ways, by different routes. One route is by using a needle injected into a vein; this is called parenteral drug administration. Another way (or route) is to place a medication in the baby's mouth, under the tongue or with a tube. These types of drug delivery are called enteral administration. Opioids, like most drugs, can be given at different strengths (dosages). Opioids can be given continuously (without stopping), or on and off over a period of time (intermittently). All of these things together, how the opioid is given to the baby, how often the opioid is given, and the strength of the opioid, create what is called a drug regimen. This review aims to evaluate how different opioid regimens affect babies. Key results This review included seven studies involving 504 babies. We identified no studies comparing different doses of the same opioid. We identified no studies comparing different routes to delivery of opioids. Six studies compared continuous opioid administration versus intermittent opioid administration. One study assessed the use of continuous morphine infusion compared with a parent‐ or nurse‐controlled administration. Based on the studies we found that we were unable to determine whether continuous or intermittent opioid regimens are better for controlling babies' pain. Since we did not find studies comparing different dosages of opioids, we do not know which dosage is better for reducing babies' pain. Since we did not find studies comparing different routes of opioid administration, we do not know if parenteral is better than enteral for reducing babies' pain. Considering the body of literature evaluated, the effectiveness of continuous systemic opioid infusion compared with intermittent systemic opioid administration is still undetermined. We are uncertain about the effectiveness of continuous systemic opioid administration and intermittent opioid administration in reducing the pain. We searched for studies that were available up to 10 June 2022."}, {"id": 65, "title": "Effectiveness of virtual reality in managing pain and anxiety in adults during periprocedural period: a systematic review and meta-analysis.", "authors": "Kodvavi, Muhammad Suraim; Asghar, Mustafa Ali; Ghaffar, Rimmel Abdul et al.", "journal": "Langenbeck's archives of surgery", "year": "2023", "vol": "408(1):301", "doi": "10.1007/s00423-023-03046-5", "abstract": "PURPOSE: Patients undergoing medical procedures often experience pain and anxiety. These periprocedural outcomes can be overcome by providing a distraction  using virtual reality (VR), decreasing their perception. VR has proved effective  in reducing pediatric pain and anxiety; however, limited studies have confirmed  its effectiveness in adults. We performed a systematic review and meta-analysis  on the effectiveness of VR, as opposed to standard care, in reducing  periprocedural pain and anxiety in adults. METHODS: A systematic search of  randomized controlled trials was conducted using the databases of MEDLINE,  Cochrane CENTRAL, and Scopus. Trials involving patients (> 18 years) undergoing  elective medical procedures conducted with or without local anesthesia and  participating in VR therapy were included. Primary outcomes were pre-procedural  anxiety, post-procedural anxiety, and intra-procedural pain. Pre-procedural pain,  post-procedural pain, and intra-procedural anxiety were secondary outcomes.  RESULTS: Data from 10 studies shortlisted for inclusion revealed no significant  association between the use of VR and lower pre-procedural anxiety compared to  standard care (p > 0.05) (SMD = -0.02, 95% CI = -0.18 - 0.14, P = 0.81) but  demonstrated that the use of VR was significantly associated with a reduction in  post-procedural anxiety (SMD = -0.73, 95% CI = -1.08 - -0.39, P < 0.0001),  intra-procedural pain (SMD = -0.61, 95% CI = -1.18 - -0.04, P = 0.04), and  post-procedural pain (SMD = -0.25, 95% CI = -0.44 - -0.05, P = 0.01). CONCLUSION:  The use of VR caused a significant reduction in post-procedural anxiety,  intra-procedural pain, and post-procedural pain in adults undergoing medical  procedures, although the findings were insignificant concerning pre-procedural  anxiety."}, {"id": 66, "title": "Acute pain treatment of children in the Danish emergency departments.", "authors": "Krusenstjerna-Hafstrøm, Maria Nyhøj; Jensen, Claus Sixtus; Kirkegaard, Hans et al.", "journal": "Danish medical journal", "year": "2023", "vol": "70(3):A09220540", "doi": "", "abstract": "INTRODUCTION: Preconditions for good pain treatment in children include education and guidelines. This study investigated whether the guidelines on acute pain  treatment of children in Danish emergency departments reflected the national  guideline, examined the knowledge and use of guidelines, and explored the  approach adopted to treating pain in children. METHODS: This cross-sectional  study consisted of two parts. Part I compared the guidelines in each emergency  department with a national guideline; Part II was a structured interview with the  emergency department doctors regarding their approach to treating pain in  children. RESULTS: Several guidelines did not include pain assessment, dose  schedules and non-pharmacological methods as recommended in the national  guideline. The doctors knew where to find the guidelines, but a considerable  share of them did not use the guidelines. Most doctors felt competent in treating  children, but reported a reluctance to using opioids and reported using pain  assessment irregularly. CONCLUSION: The Danish guidelines on acute pain treatment  of children in many emergency departments vary compared with the national  guideline. We found that several doctors do not use the guidelines, are reluctant  to use opioids and do not use pain assessment. We suggest a thorough  implementation of a national guideline in emergency departments to standardise  pain treatment. FUNDING: none. TRIAL REGISTRATION: not relevant."}, {"id": 67, "title": "Procedural pain assessment in neonates at risk of neonatal opioid withdrawal syndrome: a scoping review protocol.", "authors": "Lavergne, Julianna; Langman, Erin; Mansell, Deborah et al.", "journal": "JBI evidence synthesis", "year": "2023", "vol": "21(10):2107-2114", "doi": "10.11124/JBIES-22-00414", "abstract": "OBJECTIVE: The objective of this review is to identify evidence on pain assessment during acute procedures in hospitalized neonates at risk of neonatal  opioid withdrawal syndrome (NOWS). INTRODUCTION: While all neonates are routinely  exposed to various painful procedures, neonates at risk of NOWS have longer  hospital stays and are exposed to multiple painful procedures. NOWS occurs when a  neonate is born to a birth parent who identifies as having sustained opioid use  (such as morphine or methadone) during pregnancy. Accurate pain assessment and  management during painful procedures is critical for minimizing the  well-documented adverse effects of unmanaged pain in neonates. While pain  indicators and composite pain scores are valid and reliable for healthy neonates,  there is no review of evidence regarding procedural pain assessment in neonates  at risk of NOWS. INCLUSION CRITERIA: Eligible studies will include those  reporting on hospitalized pre-term and full-term neonates at risk of NOWS having  pain assessments (ie, behavioral indicators, physiological indicators, validated  composite pain scores) during and/or after exposure to an acute painful  procedure. METHODS: This review will follow the JBI scoping review methodology.  Databases to be searched will include MEDLINE (Ovid), CINAHL (EBSCO), Embase,  PsyclNFO (EBSCO), and Scopus. The relevant data will be extracted by 2 reviewers  using a modified JBI extraction tool. The results will be summarized in narrative  and tabular format, including the components of participants, concept, and  context (PCC). REVIEW REGISTRATION: Open Science Framework https://osf.io/fka8s ."}, {"id": 68, "title": "Effect of a Virtual Reality Environment Using a Domed Ceiling Screen on Procedural Pain During Intravenous Placement in Young Children: A Randomized  Clinical Trial.", "authors": "Lee, Ha Ni; Park, Joong Wan; Hwang, Soyun et al.", "journal": "JAMA pediatrics", "year": "2023", "vol": "177(1):25-31", "doi": "10.1001/jamapediatrics.2022.4426", "abstract": "IMPORTANCE: Distraction using virtual reality (VR) has been found to provide a clinically significant reduction in the experience of pain during various painful  procedures. Commercially available VR systems usually require the user to wear a  head-mounted display helmet, which can be challenging for young children, and  whether VR can reduce pain during intravenous (IV) placement in young children is  currently unknown. OBJECTIVE: To determine whether a VR environment using a novel  domed ceiling screen reduces distress among children over the course of IV  placement compared with standard care in a pediatric emergency department.  DESIGN, SETTING, AND PARTICIPANTS: This randomized clinical trial was conducted  from June 3, 2020, to February 8, 2021, at an urban tertiary academic children's  hospital. Included were children aged 6 months to 4 years undergoing IV placement  in the pediatric emergency department. INTERVENTION: Children in the intervention  group lay on a bed to experience a VR animation using a domed ceiling screen  during the IV placement procedure, which was performed as usual. Children in the  control group also lay on a bed during the procedure but did not view a VR  animation. MAIN OUTCOMES AND MEASURES: The primary outcome was pain scores  measured using the Face, Legs, Activity, Cry, and Consolability (FLACC) scale at  4 time points during IV placement: immediately after the child lay down on the  bed (T1), the moment the tourniquet was applied (T2), the moment a sterile  alcohol swab was applied (T3), and the moment the needle penetrated the skin  (T4). RESULTS: Of the 88 children included in the final analysis, 44 received VR  distraction (median [IQR] age, 24.0 [14.5-44.0] months; 27 boys [61.4%]), and 44  received standard care (median [IQR] age, 23.0 [15.0-40.0] months; 26 boys  [59.1%]). The median [IQR] FLACC scores at T4 were 6.0 (1.8-7.5) in the  intervention group and 7.0 (5.5-7.8) in the control group. The ordinal logistic  regression model showed that children in the VR intervention group vs the control  group had a lower probability of higher FLACC scores (odds ratio, 0.53; 95% CI,  0.28-0.99; P = .046). CONCLUSIONS AND RELEVANCE: The findings of this trial  indicate that displaying VR using a domed ceiling screen may be an effective  distraction method that reduces distress in young children undergoing IV  placement. TRIAL REGISTRATION: isrctn.org Identifier: KCT0005122."}, {"id": 69, "title": "Evaluation of procedural pain for neonates in a neonatal intensive care unit: a single-centre study.", "authors": "Luo, Feixiang; Zhu, Huaiyu; Mei, Lingli et al.", "journal": "BMJ paediatrics open", "year": "2023", "vol": "7(1)", "doi": "10.1136/bmjpo-2023-002107", "abstract": "BACKGROUND: To evaluate the procedural pain experienced by neonates in a neonatal intensive care unit (NICU) setting and determine the corresponding pain grades.  METHODS: Two experienced nurses independently used the Neonatal Infant Pain Scale  (NIPS) to evaluate the neonatal pain during procedures taking place in the  tertiary NICU and two level-two neonatal care units in the Children's Hospital of  Zhejiang University School of Medicine. The mean and distribution of NIPS pain  scores and the corresponding pain grades of participants when experiencing  clinical painful procedures were analysed. RESULTS: A total of 957 neonates  exposed to 15 common clinical painful procedures were included in the study. The  clinical painful procedures experienced by 957 participants could be divided into  three groups: severe pain (NIPS score 5-7: peripheral intravenous cannulation,  arterial catheterisation, arterial blood sampling, peripherally inserted central  catheter placement and nasopharyngeal suctioning), mild to moderate pain (NIPS  score 3-4: finger prick, intramuscular injection, adhesive removal, endotracheal  intubation suctioning, heel prick, lumbar puncture and subcutaneous injection)  and no pain to mild pain (NIPS score 0-2: gastric tube insertion, enema and  intravenous injection). CONCLUSIONS: The neonatal pain response to clinical  procedures in NICU had certain pattern and preintervention drug analgesia could  be taken for painful procedures with clustered high NIPS pain scores. Meanwhile,  full coverage non-drug pain relief measures could be taken for procedures that  are with scattered pain scores, and real-time pain evaluation should be provided  to determine whether further drug analgesia is required."}, {"id": 70, "title": "Desenvolvimento de aplicativo móvel para predição do risco de lesão por pressão: escala de glamorgan", "authors": "Mastrodomenico, Natália Vidoto; Vocci, Marcelli Cristine; Arruda, Clara Fumes et al.", "journal": "Nursing (Ed. bras., Impr.)", "year": "2023", "vol": "26(302):9766-9770", "doi": "10.36489/nursing.2023v26i302p9766-9770", "abstract": "Objetivo: Desenvolver um aplicativo móvel que utilize a Escala de Glamorgan para prever o risco de lesões por pressão em pacientes pediátricos, no cuidado à beira do leito. Método: Trata-se de um estudo metodológico para o desenvolvimento de um aplicativo móvel visando a predição do risco de lesão por pressão pela Escala de Glamorgan, com base no referencial metodológico  de  Cook  &  Dupras.  Resultados:  Seguindo  as  etapas  estabelecidas  pelo  referencial  metodológico,  concluímos  o  desenvolvimento  do  aplicativo  móvel  em  saúde  intitulado  \"LPP  -  Escala  de  Glamorgan\".  O  aplicativo  é  composto  por  cinco  abas  que  fornecem  informações  relevantes  sobre  a  avaliação  e  prevenção  de  lesões  por  pressão.  Conclusão:  O  aplicativo  foi  desenvolvido conforme as etapas estabelecidas no referencial metodológico. Além disso, foi incluída uma aba específica para facilitar a aplicação rápida e intuitiva da Escala de Glamorgan por enfermeiros durante o atendimento à beira do leito.(AU)"}, {"id": 71, "title": "Procedural Pain Management During Tenotomy for Congenital Talipes Equinovarus.", "authors": "Moss, Kate N.; Hennessy, Pamela A.; McCormick, Marianne et al.", "journal": "Clinical pediatrics", "year": "2023", "vol": "62(5):409-414", "doi": "10.1177/00099228221131688", "abstract": "The majority of infants with congenital talipes equinovarus (CTEV) require tenotomy of the tendoachilles. The pain response of this procedure in the awake  infant has not been previously reported. In this observational study, multimodal  pain management strategies, including oral sucrose, oral paracetamol, topical  anesthetic, local anesthetic, a pacifier (dummy), and swaddling, were used.  Physiological responses and pain were recorded. Pain was rated out of 10 at  regular intervals, using the Face, Legs, Activity, Cry, and Consolability (FLACC)  scale. Ninety-one infants (65 men, mean age = 53 days, range = 19-217 days) were  observed. At baseline, median FLACC, heart rate (HR), and oxygen saturation  (Spo(2)) were 1, 159, and 97% respectively. Peak median FLACC and HR were 9 and  200, respectively, and lowest median Spo(2) was 92%. The median (interquartile  range) time for FLACC to return to 3 or less was 2 (2-5) minutes. Achilles  tenotomy for CTEV in the awake infant is associated with high pain levels despite  provision of multimodal pain relief measures."}, {"id": 72, "title": "Eficacia del óxido nitroso como sedoanalgesia en pacientes pediátricos para procedimientos menores en áreas de hospitalización y urgencias", "authors": "Méndez López, Cathaysa; García Hernández, María Noelia", "journal": "Revista ROL de enfermería", "year": "2023", "vol": "46(5):308-319", "doi": "", "abstract": ""}, {"id": 73, "title": "Active production of music as distraction for venipuncture in children and adolescents: a randomized clinical trial.", "authors": "Obersnel, Marco; Nardin, Bianca; Canepari, Elisa et al.", "journal": "European journal of pediatrics", "year": "2023", "vol": "182(12):5455-5463", "doi": "10.1007/s00431-023-05227-2", "abstract": "More than 50% of children report considerable pain during venipuncture or intravenous cannulation. Despite the tools and techniques may be employed to  reduce pain and distress in everyday clinical practice, the care offered is  frequently insufficient. Music's potential effect in healthcare settings has  received increasing attention. This study aimed to verify if the active  production of music with a Leap Motion Controller could help decreasing pain and  distress during venipuncture in children and adolescents. We conducted an  open-label randomized controlled clinical trial with parallel arms. Children aged  8 to 17 were enrolled at the blood-drawing center of the Institute for Maternal  and Child Health IRCCS Burlo Garofolo of Trieste, Italy. We hypothesized that in  order to demonstrate an adequate improvement in the pain score in the  intervention group, at least 200 children, 100 in each group, were needed, with  alpha 5% and 1-beta 80%. Differences between the groups were evaluated with the  nonparametric Mann-Whitney U-test. The subjects were randomly assigned either to  the active production of music group or to the standard of care group. The  primary outcome was the median self-reported procedural pain score between  experimental and standard of care group. Secondary outcomes were: the median pain  and distress scores according to parental judgment and operators' judgment  between the experimental and control group. Three hundred subjects entered the  study and were randomized, 150 in the active production of music group and 150 in  the standard of care group. Median self-reported pain scores were 1 (0-2) in the  active production of music group and 2 (1-2) in the standard of care group and  this difference was statistically significant (p = 0.0016). Median procedural  distress was 1 (0-3) in the active production of music group and 3 (1-6) in the  standard of care group, according to parental judgment, and this difference was  statistically significant (p = 0.0000016). CONCLUSION: This research showed that  the active production of music is a valuable distraction technique to decrease  venipuncture related pain and distress in children and adolescents. TRIAL  REGISTRATION: The study protocol was registered with ClinicalTrial.gov (June  28([th]) 2022, NCT05441241) before the start of the subjects' enrolment. WHAT IS  KNOWN: • The benefits of music on pain and anxiety are well known and have been  tested during different painful procedures. • The effect of active production of  music has never been tested in children during venipuncture. WHAT IS NEW: • In  our study median self-reported pain scores and median procedural distress,  according to parental judgment, were lower in the active production of music  group than in the standard of care group and these differences were statistically  significant."}, {"id": 74, "title": "Effect of Acupressure on Procedural Pain in Children: A Systematic Review.", "authors": "Ogul, Tanju; Yildiz, Suzan", "journal": "Journal of perianesthesia nursing : official journal of the American Society of PeriAnesthesia Nurses", "year": "2023", "vol": "38(6):930-937.e1", "doi": "10.1016/j.jopan.2023.01.023", "abstract": "PURPOSE: Acupressure is a complementary treatment method performed using fingers and hands to maintain the body's energy balance by stimulating acupuncture  points. In recent studies, acupressure has been widely used for minimally  invasive procedural (venous assess, intravenous (IV) cannulation, intramuscular  injection, heel lancing) pain management in children. This study aims to  systematically review the studies that evaluate the effectiveness of acupressure  on minimally invasive procedural pain in children. DESIGN: This study is a  systematic review of literature. METHODS: Studies were obtained by screening  literature on this topic using the databases PubMed, EBSCO, Scopus, Google  Scholar and Cochrane Central Register of Controlled Trials. The keywords  \"Acupressure,\" \"Child,\" \"Pain,\" and \"Procedural\" were used when screening the  literature. The studies selected were those published from January 1, 2000 to  January 1, 2022 that met the inclusion and exclusion criteria. The PRISMA  checklist was used when performing this systematic review. The Oxford Center for  Evidence-Based Medicine Levels of Evidence Working Group (2011) table was used to  assess the level of evidence. The procedures for this systematic review were  preregistered in the PROSPERO (CRD42022320155) database. FINDINGS: Of the 12,624  records identified, 10 nursing studies that met the research selection criteria  were included in the advanced analysis. These papers were further reviewed for  their study design, adequacy of randomization and concealment of allocation,  blinding of participants, interventions, and outcome measurements. CONCLUSIONS:  Acupressure has been shown to be effective in relieving minimally invasive  procedural pain in children. This review begins to establish a credible evidence  base for the use of acupressure in minimally invasive procedural pain relief in  pediatric age groups. The implication for nurses includes incorporating  acupressure into their practice as an alternative therapy for children who suffer  from minimally invasive procedural pain."}, {"id": 75, "title": "Effectiveness of technology-based interventions compared with other non-pharmacological interventions for relieving procedural pain in hospitalized  neonates: a systematic review.", "authors": "Palomaa, Anna-Kaija; Huhtala, Saija; Tuomikoski, Anna-Maria et al.", "journal": "JBI evidence synthesis", "year": "2023", "vol": "21(8):1549-1581", "doi": "10.11124/JBIES-22-00179", "abstract": "OBJECTIVE: The objective of this review was to evaluate the effectiveness of technology-based interventions for relieving procedural pain among hospitalized  neonates compared with other non-pharmacological interventions. INTRODUCTION:  Neonates who require hospital care often experience acute pain during medical  procedures. The current best practice for relieving pain in neonates is the use  of non-pharmacological interventions, such as oral solutions or  intervention-based human touch. Technological solutions (eg, games, eHealth  applications, mechanical vibrators) have become more commonplace in pediatric  pain management over recent years; however, there is a sizeable knowledge gap  around how effective technology-based interventions are for relieving pain in  neonates. INCLUSION CRITERIA: This review considered experimental trials that  include technology-based, non-pharmacological interventions for relieving  procedural pain among hospitalized neonates. The primary outcomes of interest  include pain response to a procedure measured by a pain assessment scale  validated for neonates, behavioral indicators, and changes in physiological  indicators. METHODS: The search strategy aimed to identify both published and  unpublished studies. MEDLINE (PubMed), CINAHL (EBSCOhost), Scopus, Cochrane  Central Register of Controlled Trials, MedNar, and EBSCO Open Dissertations  databases were searched for studies published in English, Finnish, or Swedish.  Critical appraisal and data extraction were conducted by 2 independent  researchers who adhered to JBI methodology. Meta-analysis could not be performed  due to considerable heterogeneity in the studies; as a result, the findings are  presented narratively. RESULTS: A total of 10 randomized controlled trials  involving 618 children were included in the review. The staff members delivering  the interventions and the outcome assessors were not blinded in all of the  studies, which introduced a potential risk of bias. The presented  technology-based interventions were diverse, including laser acupuncture,  noninvasive electrical stimulation of acupuncture points, robot platform,  vibratory stimulation, recorded maternal voice, and recorded intrauterine voice.  In the studies, pain was measured using validated pain scales, behavioral  indicators, and physiological variables. In the studies in which pain was  assessed with a validated pain measure (N=8), technology-based pain relief was  significantly more effective than the comparator in 2 studies, whereas no  statistically significant differences were observed in 4 studies and the  technology-based intervention was less effective than the comparator in 2  studies. CONCLUSIONS: The effectiveness of technology-based interventions in  relieving neonatal pain, either as a standalone method or in combination with  another non-pharmacological method, was mixed. Further rese
