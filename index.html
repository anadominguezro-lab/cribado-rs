100%]) in the VR group answered that they would  prefer VR as a distraction for a later procedure, a borderline significant result  compared with that of the control group (26 of 31 [84.9%]). No significant  difference was found in pain scores and procedural times between the 2 groups.  The number of adverse effects was low, with no significant difference between the  2 groups. CONCLUSIONS: We found no difference in pain scores but higher  satisfaction when using VR versus standard care as part of a multimodal approach  for management of procedural pain in children."}, {"id": 227, "title": "[Design and application of mobile soothing screen for dressing change of children with burns of limb].", "authors": "Wu, W. W.; Cheng, D.; Cai, D. et al.", "journal": "Zhonghua shao shang za zhi = Zhonghua shaoshang zazhi = Chinese journal of burns", "year": "2019", "vol": "35(8):624-625", "doi": "10.3760/cma.j.issn.1009-2587.2019.08.016", "abstract": "Children with burns often have uncooperative behaviors such as crying and struggling when changing dressing because of pain and fear, which affects  dressing change of medical staff and increases the psychological burden of the  family members of children and dressing change personnel. In order to solve the  above problems, the author's team designs and makes the mobile soothing screen  for pediatric dressing change. Dressing change personnel are isolated from the  children's sight through the screen's shielding function, and the children's  favorite program showed on the tablet computer attracts the children's attention.  The wound dressing change is completed by using the disposal window on the  screen, which has good clinical application effects."}, {"id": 228, "title": "Opioids in the Management of Acute Pediatric Pain: An Update in a Time of Crisis.", "authors": "Yaster, Myron; Reid, Ashley L.; Cohen, Mindy N. et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(6):487-496", "doi": "10.1097/AJP.0000000000000709", "abstract": "Management of acute pain in children is fundamental to our practice. Its myriad benefits include reduced suffering, improved patient satisfaction, more rapid  recovery, and a reduced risk of developing postsurgical chronic pain. Although a  multimodal analgesic approach is now routinely used, informed and judicious use  of opioid receptor agonists remains crucial in this treatment paradigm, as long  as the benefits and risks are fully understood. Further, an ongoing public health  response to the current opioid crisis is required to help prevent new cases of  opioid addiction, identify opioid-addicted individuals, and ensure access to  effective opioid addiction treatment, while at the same time continuing to safely  meet the needs of patients experiencing pain."}, {"id": 229, "title": "The effect of hospital clown nurse on children's compliance to burn dressing change.", "authors": "Yildirim, Meltem; Koroglu, Ecem; Yucel, Cagla et al.", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2019", "vol": "45(1):190-198", "doi": "10.1016/j.burns.2018.08.033", "abstract": "BACKGROUND AND AIM: Pediatric burn injury is a traumatic experience which affects the child both physically and psychologically. Following the burn injury,  repetitive dressing changes are one of the main problems, and to manage the level  of distress caused this procedure, various distraction strategies are being used.  However, the effect of hospital clown during burn dressing change among children  has not been studied before. Therefore, the present study aimed to investigate  the effect of hospital clown-nurse on children's compliance to burn dressing  change. METHODS: This randomized controlled experimental study was conducted with  50 children between 3-7years. There were 25 children in the experimental group  and 25 children in the control group. In the intervention group, clown-nurse  accompanied the child during burn dressing change while the children in the  control group received standard care without hospital clown. Children's  behavioral reactions were observed during dressing change. CONCLUSIONS: Children  in the intervention group had better compliance to burn dressing change, in other  words, they cried and/or yelled less, they were more active, had better mood,  better communication and interaction with the accompanying parent and the nurse.  In addition, older children in the experimental group had better compliance to  the burn dressing change."}, {"id": 230, "title": "Children Listening to Music or Watching Cartoons During ER Procedures: A RCT.", "authors": "van der Heijden, Marianne J. E.; Mevius, Hiske; van der Heijde, Nicky et al.", "journal": "Journal of pediatric psychology", "year": "2019", "vol": "44(10):1151-1162", "doi": "10.1093/jpepsy/jsz066", "abstract": "OBJECTIVE: This study aims to determine if listening to music and watching cartoons are effective to distract children from pain and distress during  procedures in the emergency room (ER). METHODS: This study is a single-center,  3-armed, superiority randomized controlled trial comparing listening to music,  watching cartoons, and standard care during ER procedures in children aged  3-13 years. The primary outcome was pain measured from video footage with the  Alder Hey Triage Pain Score (AHTPS). Children older than 4 years self-reported  pain with the Faces Pain Scale-Revised (FPS-R). The secondary outcome was  distress measured with the Observational Scale of Behavioral Distress-revised  (OSBD-r). Another indicator of distress was heart rate. RESULTS: Data of 191  participants were analyzed for the 3 groups: music (n = 75), cartoon (n = 62),  and control (n = 54). The median age was 7.3 years (4.9-9.7). In multivariable  analysis, pain assessed with the AHTPS was significantly lower (B = -1.173, 95%  confidence interval -1.953, -0.394, p = .003) in the music group than in the  control groups. Across the 3 groups, 108 children self-reported pain with the  FPS-R after the procedure. The scores were lowest in the music group, but the  differences between groups were not significant (p = .077). OSBD-r distress  scores assigned during the procedures were not significantly different between  the 3 groups (p = .55). Heart rate directly after the procedure was not  statistically significantly different between the 3 groups (p = .83).  CONCLUSIONS: Listening to recorded music is a beneficial distraction for children  experiencing pain during ER procedures, whereas watching cartoons did not seem to  reduce pain or distress."}, {"id": 231, "title": "[Pain management in Neonatology].", "authors": "", "journal": "Archivos argentinos de pediatria", "year": "2019", "vol": "117(5):S180-S19", "doi": "10.5546/aap.2019.S180", "abstract": "The recognition of the existence of pain in infants hospitalized in the Neonatal Intensive Care Units makes it necessary to reach consensus on prevention,  assessment and treatment strategies. Acute pain produces adverse changes in the  short term and chronic pain alters the response systems to stress and impacts on  neurodevelopment. The objective of this pain management agreement is to unify  criteria of attention of these patients in different situations that generate  pain and stress that they face during their hospitalization. There are validated  scales to assess pain and guide appropriate strategies for its approach that  include measures of comprehensive or nonpharmacological care and pharmacological  care that we will review."}, {"id": 232, "title": "Clinical Practice Guideline: Needle-Related or Minor Procedural Pain in Pediatric Patients.", "authors": "", "journal": "Journal of emergency nursing", "year": "2019", "vol": "45(4):437.e1-437.e32", "doi": "10.1016/j.jen.2019.05.015", "abstract": ""}, {"id": 233, "title": "Cuidado del dolor en el neonato: eficacia de la leche materna o sacarosa", "authors": "", "journal": "Rev. Aladefe", "year": "2019", "vol": "9(4):48-60", "doi": "", "abstract": ""}, {"id": 234, "title": "Be Sweet to Babies: evaluation of an instructional video on neonatal pain management by nurses.", "authors": "Almeida, Hellen Caroline Carneiro de; Candido, Ligyana Korki de; Harrison, Denise et al.", "journal": "Revista da Escola de Enfermagem da U S P", "year": "2018", "vol": "52:e03313", "doi": "10.1590/S1980-220X2017033903313", "abstract": "OBJECTIVE: To describe the profile of nurses who work in hospital units that care for newborns; to verify nurses' prior knowledge on breastfeeding, skin-to-skin  care and sweet tasting solutions for neonatal procedural pain relief; and to  evaluate nurses' perceptions on the feasibility, acceptability and usefulness of  the Portuguese version of the \"Be Sweet to Babies\" video. METHOD: A  cross-sectional study conducted in four units of a university affiliated hospital  in São Paulo. Forty-five (45) nurses who answered the questionnaire and watched  the video were included. Thirty-eight (38) nurses subsequently evaluated the  video. Descriptive statistics were used to analyze the variables, in addition to  content analysis of the open question. RESULTS: Forty-five (45) nurses  participated in the study; 97.4% were aware of the analgesic strategies, and  after watching the video nurses reported that they intend to use or encourage the  use of these strategies during painful procedures. All participants would  recommend the video to other professionals, and considered the resource as  useful, easy to understand and easy to apply in real situations. CONCLUSION:  Nurses are aware of the analgesic strategies and they considered the video as a  feasible, acceptable and useful tool for knowledge translation to health care  providers, which can also favor parental involvement in their children's pain  management."}, {"id": 235, "title": "Effectiveness of Skin-to-Skin Care for Procedure-Related Pain in Newborns.", "authors": "Baird, Drew; Bybel, Michael", "journal": "American family physician", "year": "2018", "vol": "97(3):170-171", "doi": "", "abstract": ""}, {"id": 236, "title": "Efficacy of the Buzzy® device for pain management of children during needle-related procedures: a systematic review protocol.", "authors": "Ballard, Ariane; Khadra, Christelle; Adler, Samara et al.", "journal": "Systematic reviews", "year": "2018", "vol": "7(1):78", "doi": "10.1186/s13643-018-0738-1", "abstract": "BACKGROUND: Needle-related procedures are the most important source of pain in children in hospital setting. Unmanaged pain could result in short- and long-term  physiological, psychological, and emotional consequences. Although the efficacy  of numerous interventions has been evaluated, procedural pain management is often  suboptimal in children undergoing needle-related procedures. The main objective  of this systematic review is to examine the evidence for the efficacy of the  Buzzy® device for needle-related procedural pain in children. METHODS: An  electronic search will be conducted in the following databases: CENTRAL, PubMed,  MEDLINE, EMBASE, PsycInfo, and CINAHL. There will be no restriction regarding the  language, date of publication, and publication status. Eligible studies will be  randomized controlled trials using the Buzzy® device for pain management in  children undergoing needle-related procedures. Selection of studies, data  extraction and management, assessment of risk of bias and quality of evidence  will be performed by two independent reviewers. A third researcher will be  consulted in case of discrepancies. Depending on the availability and quality of  the data as well as clinical and statistical heterogeneity, a meta-analysis will  be performed. Otherwise, findings will be qualitatively reported. DISCUSSION:  This will be the first systematic review to examine the efficacy of the Buzzy®  device on pain management of children during needle-related procedures. Results  of this review will guide clinical practice and recommendations for further  research to improve procedural pediatric pain management. SYSTEMATIC REVIEW  REGISTRATION: PROSPERO CRD42017076531."}, {"id": 237, "title": "Avaliação dos fatores associados ao trauma mamilar", "authors": "Barbosa, Diana Manfré; Caliman, Manuela Zandonade; Alvarenga, Sandra Cristina et al.", "journal": "Rev. pesqui. cuid. fundam. (Online)", "year": "2018", "vol": "10(4):1063-1069", "doi": "10.9789/2175-5361.2018.v10i4.1063-1069", "abstract": "Objetivo: Avaliar os fatores associados ao trauma mamilar. Método: Estudo seccional realizado em alojamento conjunto com todas as puérperas e os recém-nascidos internados no período de julho a agosto de 2014. Resultados: Foram avaliadas 73 puérperas e 76 recém-nascidos (três gemelares). Verificou-se associação significativa entre trauma mamilar e dor ou ardência pós-mamada (0.000), orientação no pré-natal (0.016) e número de consultas no pré-natal (0.018), sendo que mesmo as puérperas que tiveram sete ou mais consultas de pré-natal apresentaram trauma mamilar. Conclusão: Esse estudo reforça a importância das orientações e do preparo para amamentação iniciarem no período da gestação, para que a mulher conheça as possíveis complicações e suas formas de prevenção e tratamento. Dessa forma, a gestante poderá sentir-se preparada para amamentar o seu filho, evitando o aparecimento de traumas e lesões"}, {"id": 238, "title": "Pain perception in NICU: a pilot questionnaire.", "authors": "Bellieni, C. V.; Tei, M.; Cornacchione, S. et al.", "journal": "The journal of maternal-fetal & neonatal medicine : the official journal of the European Association of Perinatal Medicine, the Federation of Asia and Oceania  Perinatal Societies, the International Society of Perinatal Obstetricians", "year": "2018", "vol": "31(14):1921-1923", "doi": "10.1080/14767058.2017.1332038", "abstract": "PURPOSE: Neonatal pain management has made a great step forward over the last several years. Despite the drafting of International guidelines, an  under-treatment of neonatal pain is still reported. MATERIALS AND METHODS:  Medical and paramedical personnel working in five Italian NICUs were asked to  complete a questionnaire about pain management. The questionnaire was comprised  of three sections: (i) brief explanation of the purpose; (ii) demographic  information, including age, profession, religious beliefs, and hospital level;  (iii) questionnaire about pain management and prevention. RESULTS: One-hundred  and forty caregivers participated in this study. Non-pharmacological analgesia  during heel prick or venipuncture was used by 64% and 60% of them, respectively;  topical analgesia was performed in 13% of venipunctures; no analgesia was used in  30% of cases for both heel prick and venipuncture. In the case of lumbar  puncture, 35% of participants used topical analgesia, 15% non-pharmacological  approach, 10% opioids, and 6% intravenous paracetamol. While 65% of participants  gave a score of 4 out of 5 about the importance of pain treatment, 39% of them  reported that in their department no pain scales were used. CONCLUSIONS: Pain  treatment in these NICUs is still far to be optimal. This nonetheless reflects a  worldwide trend, which requires more attention on pain prevention, assessment,  and treatment."}, {"id": 239, "title": "Cognitive Dissonance and Pediatric Procedural Pain Management: A Concept Clarification.", "authors": "Bice, April A.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2018", "vol": "19(3):230-237", "doi": "10.1016/j.pmn.2017.07.005", "abstract": "BACKGROUND: Pediatric nurses have often reported that pain management is a vital part of patient care. Evidence, however, suggests pediatric procedural pain  treatments are often underused. Cognitive dissonance, the mental conflict leading  to unpleasant thoughts and or feelings, may be related to this evidence-based gap  found between what pediatric nurses claim about procedural pain management (that  it is important) and what they actually do (underutilize pain treatments).  OBJECTIVE: The purpose of this manuscript is to clarify and further develop the  concept of cognitive dissonance in terms of its relationship to nurses' mental  struggles with underutilization of pediatric procedural pain treatments. A more  relevant and extended definition of cognitive dissonance is presented. DESIGN:  The concept of cognitive dissonance was examined using Rodgers' evolutionary  concept analysis approach/framework. Analysis Methods: Through a six-step process  of concept identification, setting and sample identification, data collection,  data analysis, and future implication discussion, a more accurate and  representative definition of cognitive dissonance is described. Databases used  included CINAHL, Google Scholar, PsycINFO, ERIC, and PubMed. Seminal, recent, and  relevant works were included in the review to adequately develop and clarify the  concept. CONCLUSIONS: Procedural pain management breech among pediatric nurses is  proposed to occur before the mental conflict produced. The unpleasant mental  conflict created after the breech is followed by the nurse's determination to  reduce mental conflict through attitude change followed by cognition change,  which more closely reflects his or her behavior."}, {"id": 240, "title": "Psychological interventions for needle‐related procedural pain and distress in children and adolescents", "authors": "Birnie, KA; Noel, M; Chambers, CT et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2018", "vol": "10", "doi": "10.1002/14651858.CD005179.pub4", "abstract": "Abstract - Background This is the second update of a Cochrane Review (Issue 4, 2006). Pain and distress from needle‐related procedures are common during childhood and can be reduced through use of psychological interventions (cognitive or behavioral strategies, or both). Our first review update (Issue 10, 2013) showed efficacy of distraction and hypnosis for needle‐related pain and distress in children and adolescents. Objectives To assess the efficacy of psychological interventions for needle‐related procedural pain and distress in children and adolescents. Search methods We searched six electronic databases for relevant trials: Cochrane Central Register of Controlled Trials (CENTRAL); MEDLINE; PsycINFO; Embase; Web of Science (ISI Web of Knowledge); and Cumulative Index to Nursing and Allied Health Literature (CINAHL). We sent requests for additional studies to pediatric pain and child health electronic listservs. We also searched registries for relevant completed trials:  clinicaltrials.gov ; and World Health Organization International Clinical Trials Registry Platform ( www.who.int.trialsearch) . We conducted searches up to September 2017 to identify records published since the last review update in 2013. Selection criteria We included peer‐reviewed published randomized controlled trials (RCTs) with at least five participants per study arm, comparing a psychological intervention with a control or comparison group. Trials involved children aged two to 19 years undergoing any needle‐related medical procedure. Data collection and analysis Two review authors extracted data and assessed risks of bias using the Cochrane 'Risk of bias' tool. We examined pain and distress assessed by child self‐report, observer global report, and behavioral measurement (primary outcomes). We also examined any reported physiological outcomes and adverse events (secondary outcomes). We used meta‐analysis to assess the efficacy of identified psychological interventions relative to a comparator (i.e. no treatment, other active treatment, treatment as usual, or waitlist) for each outcome separately. We used Review Manager 5 software to compute standardized mean differences (SMDs) with 95% confidence intervals (CIs), and GRADE to assess the quality of the evidence. Main results We included 59 trials (20 new for this update) with 5550 participants. Needle procedures primarily included venipuncture, intravenous insertion, and vaccine injections. Studies included children aged two to 19 years, with few trials focused on adolescents. The most common psychological interventions were distraction (n = 32), combined cognitive behavioral therapy (CBT; n = 18), and hypnosis (n = 8). Preparation/information (n = 4), breathing (n = 4), suggestion (n = 3), and memory alteration (n = 1) were also included. Control groups were often 'standard care', which varied across studies. Across all studies, 'Risk of bias' scores indicated several domains at high or unclear risk, most notably allocation concealment, blinding of participants and outcome assessment, and selective reporting. We downgraded the quality of evidence largely due to serious study limitations, inconsistency, and imprecision. Very low‐ to low‐quality evidence supported the efficacy of distraction for self‐reported pain (n = 30, 2802 participants; SMD −0.56, 95% CI −0.78 to −0.33) and distress (n = 4, 426 participants; SMD −0.82, 95% CI −1.45 to −0.18), observer‐reported pain (n = 11, 1512 participants; SMD −0.62, 95% CI −1.00 to −0.23) and distress (n = 5, 1067 participants; SMD −0.72, 95% CI −1.41 to −0.03), and behavioral distress (n = 7, 500 participants; SMD −0.44, 95% CI −0.84 to −0.04). Distraction was not efficacious for behavioral pain (n = 4, 309 participants; SMD −0.33, 95% CI −0.69 to 0.03). Very low‐quality evidence indicated hypnosis was efficacious for reducing self‐reported pain (n = 5, 176 participants; SMD −1.40, 95% CI −2.32 to −0.48) and distress (n = 5, 176 participants; SMD −2.53, 95% CI −3.93 to −1.12), and behavioral distress (n = 6, 193 participants; SMD −1.15, 95% CI −1.76 to −0.53), but not behavioral pain (n = 2, 69 participants; SMD −0.38, 95% CI −1.57 to 0.81). No studies assessed hypnosis for observer‐reported pain and only one study assessed observer‐reported distress. Very low‐ to low‐quality evidence supported the efficacy of combined CBT for observer‐reported pain (n = 4, 385 participants; SMD −0.52, 95% CI −0.73 to −0.30) and behavioral distress (n = 11, 1105 participants; SMD −0.40, 95% CI −0.67 to −0.14), but not self‐reported pain (n = 14, 1359 participants; SMD −0.27, 95% CI −0.58 to 0.03), self‐reported distress (n = 6, 234 participants; SMD −0.26, 95% CI −0.56 to 0.04), observer‐reported distress (n = 6, 765 participants; SMD 0.08, 95% CI −0.34 to 0.50), or behavioral pain (n = 2, 95 participants; SMD −0.65, 95% CI −2.36 to 1.06). Very low‐quality evidence showed efficacy of breathing interventions for self‐reported pain (n = 4, 298 participants; SMD −1.04, 95% CI −1.86 to −0.22), but there were too few studies for meta‐analysis of other outcomes. Very low‐quality evidence revealed no effect for preparation/information (n = 4, 313 participants) or suggestion (n = 3, 218 participants) for any pain or distress outcome. Given only a single trial, we could draw no conclusions about memory alteration. Adverse events of respiratory difficulties were only reported in one breathing intervention. Authors' conclusions We identified evidence supporting the efficacy of distraction, hypnosis, combined CBT, and breathing interventions for reducing children’s needle‐related pain or distress, or both. Support for the efficacy of combined CBT and breathing interventions is new from our last review update due to the availability of new evidence. The quality of trials and overall evidence remains low to very low, underscoring the need for improved methodological rigor and trial reporting. Despite low‐quality evidence, the potential benefits of reduced pain or distress or both support the evidence in favor of using these interventions in clinical practice. Plain language summary Psychological strategies to reduce pain and distress for children and adolescents getting needles Bottom line Psychological strategies help reduce children's pain, distress, and fear of needles. Distraction and hypnosis are helpful, although specific breathing (such as inflating a balloon), and combining multiple psychological strategies can also help. Background Psychological strategies affect how children think or what they do before, during, or after a needle. They can be used by children or with support from parents or medical staff, like nurses, psychologists, or child life specialists. The information applies to children aged from two to 19 years who are healthy or ill, undergoing all types of needle procedures at the hospital, in a clinic, or at school. Key results For this update, in September 2017, we searched for clinical trials looking at psychological strategies for reducing pain and distress of children and teens getting a needle. We found 59 trials including 5550 children and teens. Twenty of these trials were new for this update. We found six psychological strategies, four of which help reduce children's pain and distress during needles. These include distraction, hypnosis, specific breathing, and combining multiple strategies (‘combined cognitive behavioral’). Ways to distract children and teens during needles include reading, watching a movie, listening to music, playing video games, or virtual reality. Hypnosis involves deep relaxation and imagery, and is usually taught to a child by a trained professional. Examples of strategies that can be combined include distraction, breathing, relaxation, positive thoughts, having the child learn or practice the steps of the needle procedure, and coaching parents about ways to support their child. Other psychological strategies have been tested but do not seem helpful on their own. For example, children do not have less pain or distress when they are only told what is going to happen before or during the needle ('providing information or preparation or both) or when someone merely suggests to the child that something is being done to help them. One other strategy is helping children to remember their previous needles more positively. There is not enough information yet to know if this is helpful. Quality of evidence We rated the quality of the evidence from studies using four levels: very low, low, moderate, or high. The quality of the evidence from this review is very low to low, as results may be biased by including only small numbers of children or by children knowing what psychological intervention they received. This means that we are uncertain about the results."}, {"id": 241, "title": "Usability Testing of an Interactive Virtual Reality Distraction Intervention to Reduce Procedural Pain in Children and Adolescents With Cancer [Formula: see  text].", "authors": "Birnie, Kathryn A.; Kulandaivelu, Yalinie; Jibb, Lindsay et al.", "journal": "Journal of pediatric oncology nursing : official journal of the Association of Pediatric Oncology Nurses", "year": "2018", "vol": "35(6):406-416", "doi": "10.1177/1043454218782138", "abstract": "PURPOSE: Needle procedures are among the most distressing aspects of pediatric cancer-related treatment. Virtual reality (VR) distraction offers promise for  needle-related pain and distress given its highly immersive and interactive  virtual environment. This study assessed the usability (ease of use and  understanding, acceptability) of a custom VR intervention for children with  cancer undergoing implantable venous access device (IVAD) needle insertion.  METHOD: Three iterative cycles of mixed-method usability testing with  semistructured interviews were undertaken to refine the VR. RESULTS: Participants  included 17 children and adolescents (8-18 years old) with cancer who used the VR  intervention prior to or during IVAD access. Most participants reported the VR as  easy to use (82%) and understand (94%), and would like to use it during  subsequent needle procedures (94%). Based on usability testing, refinements were  made to VR hardware, software, and clinical implementation. Refinements focused  on increasing responsiveness, interaction, and immersion of the VR program,  reducing head movement for VR interaction, and enabling participant alerts to  steps of the procedure by clinical staff. No adverse events of nausea or  dizziness were reported. CONCLUSIONS: The VR intervention was deemed acceptable  and safe. Next steps include assessing feasibility and effectiveness of the VR  intervention for pain and distress."}, {"id": 242, "title": "Signs and symptoms in Gaucher Disease: priority nursing diagnoses", "authors": "Breigeiron, Márcia Koja; Moraes, Vitória da Costa; Coelho, Janice Carneiro", "journal": "Rev. Bras. Enferm. (Online)", "year": "2018", "vol": "71(1):104-110", "doi": "10.1590/0034-7167-2016-0434", "abstract": "ABSTRACT  Objective: Identify the signs and symptoms of patients with Gaucher Disease, inferring possible priority nursing diagnoses.  Method: Cross-sectional study, developed in a specialized laboratory, between 2013 and 2015. The sample (n = 91) comprised the records of patients with genetic diagnosis for Gaucher Disease. The study respected research norms.  Results: Prevalence of female sex (57.1%), age at diagnosis between 0 and 10 years, and origin from the Southeast Region of Brazil were prevalent. Hematologic changes, bone pain, hepatomegaly, splenomegaly, and fatigue were the most recurrent signs and symptoms. The inferred diagnoses for the studied population were: Risk for bleeding; Fatigue; Chronic pain and Acute pain; Impaired physical mobility; Imbalanced nutrition: less than body requirements; and Risk for Developmental Delay.  Conclusion: The establishment of Priority Nursing Diagnoses based on signs and symptoms makes it possible to achieve expected outcomes for each individual in the care context."}, {"id": 243, "title": "Evaluation of a parent-targeted video in Portuguese to improve pain management practices in neonates.", "authors": "Bueno, Mariana; Costa, Rebeca Nogueira; de Camargo, Patrícia Ponce et al.", "journal": "Journal of clinical nursing", "year": "2018", "vol": "27(5-6):1153-1159", "doi": "10.1111/jocn.14147", "abstract": "AIMS AND OBJECTIVES: To assess parents' knowledge on breastfeeding, skin to skin care and sweet solutions as neonatal analgesic strategies, and to evaluate  parents' perception on the feasibility, acceptability and usefulness of the  Portuguese version of the \"Be Sweet to Babies\" video. BACKGROUND: Neonatal pain  management during blood sampling is suboptimal, and knowledge translation  strategies are needed to improve clinical practices. The \"Be Sweet to Babies\"  video is a parent-targeted knowledge translation tool that shows the  effectiveness of breastfeeding, skin to skin contact and sweet solutions for  procedural pain relief. DESIGN: Cross-sectional study. METHODS: Parents of  infants hospitalised in an intensive care unit watched the video during their  infants' hospitalisation and then answered a survey. Descriptive analyses of the  data were performed. RESULTS: Hundred parents were included. The majority did not  know about the analgesic effects of breastfeeding (80%), skin to skin contact  (69%) and sweet solutions (93%), and a limited number of parents stated their  infants had received the strategies during painful procedures (7%, 11%, 2%,  respectively). After watching the video, all (100%) parents intended to use or to  advocate for one of the strategies; most (90%) of the parents would use any of  the methods. All parents (100%) would recommend the video and considered the  video useful, easy to understand, easy to apply in real scenarios. Length of the  video was considered as ideal by 92%. CONCLUSIONS: The Portuguese version of the  \"Be Sweet to Babies\" video is feasible, acceptable and useful for parental  education and is a persuasive knowledge translation tool. Further studies are  needed to evaluate the effects of this parent-targeted intervention on the  implementation of the analgesic strategies during clinical care. RELEVANCE TO  CLINICAL PRACTICE: This article highlights the importance of exploring  evidence-based knowledge translation tools for improving neonatal care and  outcomes."}, {"id": 244, "title": "The Feasibility of Using the BrightHearts Biofeedback-Assisted Relaxation Application for the Management of Pediatric Procedural Pain: A Pilot Study.", "authors": "Burton, Karen L. O.; Morrow, Angela M.; Beswick, Brooke V. et al.", "journal": "Pain practice : the official journal of World Institute of Pain", "year": "2018", "vol": "18(8):979-987", "doi": "10.1111/papr.12696", "abstract": "OBJECTIVE: The objective of this pilot study was to assess the acceptability and feasibility of using BrightHearts, a biofeedback-assisted relaxation application  (app), in children undergoing painful procedures. METHODS: Thirty children 7 to  18 years of age undergoing a medical procedure (peripheral blood collection,  botulinum toxin injection, or intravenous cannula insertion) participated.  Participants used BrightHearts, a heart rate-controlled biofeedback-assisted  relaxation training app delivered via an iPad with heart rate measured through a  pulse oximeter worn on the ear or thumb. Feasibility was assessed through  observations and patient, parent/carer, and healthcare professional feedback.  Patient, parent/carer, and healthcare professional satisfaction with BrightHearts  was rated using investigator-developed surveys. RESULTS: Eighty-three percent of  child participants reported that they found BrightHearts helpful during the  procedure and that they would use BrightHearts again. All parents and 96% of  healthcare professionals indicated they would use BrightHearts again. Sixty-four  percent of healthcare providers perceived that BrightHearts assisted with the  ease of performing the procedure. Qualitative analyses found 2 themes: (1)  BrightHearts calms through providing distraction and biofeedback and (2) the  impact of BrightHearts on the procedure. CONCLUSIONS: This pilot study  demonstrates the feasibility of using biofeedback-assisted relaxation delivered  via the BrightHearts app in children undergoing peripheral blood collection and  cannulation. Future studies are required to evaluate BrightHearts' efficacy in  reducing pain and anxiety during painful procedures and distinguish the effects  of a biofeedback-mediated app from distraction."}, {"id": 245, "title": "The pain of children with sickle cell disease: the nursing approach.", "authors": "Campelo, Lívia Maria Nunes; Oliveira, Nayara Fernandes; Magalhães, Juliana Macêdo et al.", "journal": "Rev Bras Enferm", "year": "2018", "vol": "71(suppl 3):1381-1387", "doi": "10.1590/0034-7167-2016-0648", "abstract": "OBJECTIVE: To describe how nurses identify the pain in children with sickle cell disease (SCD) and to list the strategies used by them in the evaluation and control of pain. METHOD: This is a qualitative, descriptive and exploratory research, performed through semi-structured interviews with 13 nurses. The interviews were transcribed and after this process the qualitative data were organized according to thematic analysis. RESULTS: This study showed that the nurses can identify pain in children with SCD from the signals they emit, such as: constant crying, restlessness, facial expressions and verbal reports. Pain is difficult to evaluate due to the lack of instruments, such as a pain scale. For pain control they use emotional support, promotion of comfort and the administration of drugs prescribed by the doctor. FINAL CONSIDERATIONS: The nurses recognize the pain of the child and use pharmacological and non-pharmacological methods to control it but have difficulties to assess it."}, {"id": 246, "title": "Percepción del personal de enfermería sobre el manejo del dolor en neonatos", "authors": "Collados-Gómez, L; Camacho-Vicente, V; Gonzalez-Villava, M et al.", "journal": "Enferm Intensiva", "year": "2018", "vol": "29(1):41-47", "doi": "", "abstract": ""}, {"id": 247, "title": "Comparing N-PASS and NIPS: Improving Pain Measurement in the Neonate.", "authors": "Desai, Amita; Aucott, Susan; Frank, Karen et al.", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2018", "vol": "18(4):260-266", "doi": "10.1097/ANC.0000000000000521", "abstract": "BACKGROUND: Proper assessment of pain is essential to allow for safe and compassionate care of infants in the neonatal intensive care unit (NICU). The  Neonatal Infant Pain Scale (NIPS) used in an urban level IV NICU addresses acute  pain but may not adequately measure chronic neonatal pain. PURPOSE: The purpose  of this quality improvement study was to improve acute and chronic pain  measurements for neonates in an NICU through implementation of the Neonatal Pain,  Agitation, and Sedation Scale (N-PASS). METHODS/SEARCH STRATEGY: An evidence  search for a comprehensive tool to assess neonatal pain in the setting of a  45-bed level IV NICU was completed. The N-PASS was found to be inclusive of  measuring acute and chronic neonatal pain. Participants for a quality improvement  study, including NICU nurses and providers, were educated on the N-PASS. Nurses  documented in the N-PASS and the NIPS during routine pain assessments for NICU  infants for comparison. Participants completed a survey assessing knowledge of  the N-PASS. FINDINGS/RESULTS: When compared, the N-PASS generated 98% of pain  scores greater than the NIPS. Surveys demonstrated an increase in staff knowledge  for the N-PASS. IMPLICATIONS FOR PRACTICE: Implementation of a multidimensional  pain tool that measures acute and chronic pain is essential for proper pain  assessment. Providers can manage neonatal pain when accurate documentation is  available. IMPLICATIONS FOR RESEARCH: Further research evaluating guided  management of acute and chronic pain scores on the N-PASS would aid hospital  policies on therapies for neonatal pain."}, {"id": 248, "title": "Validation of Greek Versions of the Neonatal Infant Pain Scale and Premature Infant Pain Profile in Neonatal Intensive Care Unit.", "authors": "Dionysakopoulou, Christina; Giannakopoulou, Margarita; Lianou, Loukia et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2018", "vol": "19(3):313-319", "doi": "10.1016/j.pmn.2017.05.008", "abstract": "BACKGROUND: The Neonatal Infant Pain Scale and the Premature Infant Pain Profile have been used widely in neonatal intensive care units for pain assessment. AIM:  This study reports the evaluation and validation of these scales in full-term  newborns who were hospitalized in two Greek neonatal intensive care units.  Evaluation and validation of the Neonatal Infant Pain Scale and the Premature  Infant Pain Profile in full-term newborns who were hospitalized in two Greek  neonatal intensive care units. MATERIALS AND METHODS: This is a cross-sectional  study. Two neonatal intensive care units at a large General Children's Hospital  in Greece. A total of 81 full-term newborns. This cross-sectional study was  conducted in two neonatal intensive care units at a large General Children's  Hospital in Greece. We studied 81 full-term newborns, who were exposed to various  painful routine procedures. A single measurement was taken from each neonate. Two  observers were present during each procedure and evaluated pain using both the  Neonatal Infant Pain Scale and Premature Infant Pain Profile. Internal  consistency coefficient Cronbach's α, internal class agreement coefficient, and κ  factor were appropriately measured. RESULTS: The weighting of the Neonatal Infant  Pain Scale and Premature Infant Pain Profile pointed out an excellent coherence  between the two scales and agreement among the researchers. The internal  consistency coefficient Cronbach's α was >.8 and the internal class agreement  coefficient was >.98 for both scales, which indicates an excellent consistency  between scales. The κ factor for Neonatal Infant Pain Scale was >.73 and for the  Premature Infant Pain Profile it was >.6, which indicates a significant agreement  among investigators. CONCLUSIONS: The Neonatal Infant Pain Scale and Premature  Infant Pain Profile were successfully adjusted in Greek standards with  reliability between the scales and among the researchers. Moreover, they  constitute reliable tools for the evaluation of neonatal procedural pain in  full-term newborns in Greece."}, {"id": 249, "title": "Pain-Relieving Interventions for Retinopathy of Prematurity: A Meta-analysis.", "authors": "Disher, Timothy; Cameron, Chris; Mitra, Souvik et al.", "journal": "Pediatrics", "year": "2018", "vol": "142(1):e20180401", "doi": "10.1542/peds.2018-0401", "abstract": "CONTEXT: Retinopathy of prematurity eye examinations conducted in the neonatal intensive care. OBJECTIVE: To combine randomized trials of pain-relieving  interventions for retinopathy of prematurity examinations using network  meta-analysis. DATA SOURCES: Systematic review and network meta-analysis of  Medline, Embase, Cochrane Central Register of Controlled Trials, Web of Science,  and the World Health Organization International Clinical Trials Registry  Platform. All databases were searched from inception to February 2017. STUDY  SELECTION: Abstract and title screen and full-text screening were conducted  independently by 2 reviewers. DATA EXTRACTION: Data were extracted by 2 reviewers  and pooled with random effect models if the number of trials within a comparison  was sufficient. The primary outcome was pain during the examination period;  secondary outcomes were pain after the examination, physiologic response, and  adverse events. RESULTS: Twenty-nine studies (N = 1487) were included. Topical  anesthetic (TA) combined with sweet taste and an adjunct intervention (eg,  nonnutritive sucking) had the highest probability of being the optimal treatment  (mean difference [95% credible interval] versus TA alone = -3.67 [-5.86 to  -1.47]; surface under the cumulative ranking curve = 0.86). Secondary outcomes  were sparsely reported (2-4 studies, N = 90-248) but supported sweet-tasting  solutions with or without adjunct interventions as optimal. LIMITATIONS:  Limitations included moderate heterogeneity in pain assessment reactivity phase  and severe heterogeneity in the regulation phase. CONCLUSIONS: Multisensory  interventions including sweet taste is likely the optimal treatment for reducing  pain resulting from eye examinations in preterm infants. No interventions were  effective in absolute terms."}, {"id": 250, "title": "Acute pain management in children: challenges and recent improvements.", "authors": "Ferland, Catherine E.; Vega, Eduardo; Ingelmo, Pablo M.", "journal": "Current opinion in anaesthesiology", "year": "2018", "vol": "31(3):327-332", "doi": "10.1097/ACO.0000000000000579", "abstract": "PURPOSE OF REVIEW: The evidence regarding the efficacy of analgesics available to guide postoperative pain treatment in pediatric patients is limited. Opioid  medications are very often an important component of pediatric postoperative pain  treatment but have been associated with perioperative complications. We will  focus on initiatives aiming to provide effective treatment minimizing the use of  opioids and preventing the long-term consequences of pain. RECENT FINDINGS:  Interpatient variability in postoperative pain is currently managed by applying  protocols or by trial and error, thus often leading to patients being either  undertreated or overtreated. Few evidence-based reports are available to guide  the use of opioid medications in children, including the prescription of opioids  after hospital discharge. Using combinations of nonopioid analgesics in a  multimodal approach may limit the need for opioids, thus decreasing the risk of  toxicity and dose-related side effects. There is a lack of adequate research in  this field, and more specifically on identifying which patient is at higher risk  of poor postoperative pain management. SUMMARY: Treatment options have evolved in  recent years, including the combinations of multimodal regimens and regional  anesthetic techniques. Using combinations of nonopioid analgesics in a multimodal  approach may limit the need for opioids."}, {"id": 251, "title": "Procedural Pain during Insertion of a Continuous Glucose Monitoring Device in Preterm Infants.", "authors": "Galderisi, Alfonso; Lago, Paola; Steil, Garry M. et al.", "journal": "The Journal of pediatrics", "year": "2018", "vol": "200:261-264.e1", "doi": "10.1016/j.jpeds.2018.03.040", "abstract": "Procedural pain was compared between the insertion of a continuous glucose monitoring sensor and heel stick using the Premature Infant Pain Profile in a  single-blinded controlled trial in preterm infants (≤32 weeks of gestation or  birth weight ≤1500 g) (ClinicalTrials.govNCT02583776). Continuous glucose  monitoring insertion was associated with lower pain scores compared with the heel  stick."}, {"id": 252, "title": "Effectiveness of non-pharmacological measures for reducing pain and fear in children during venipuncture in the emergency department: a vibrating cold  devices versus distraction.", "authors": "García-Aracil, Noelia; Ramos-Pichardo, Juan Diego; Castejón-de la Encina, María Elena et al.", "journal": "Emergencias : revista de la Sociedad Espanola de Medicina de Emergencias", "year": "2018", "vol": "30(3):182-185", "doi": "", "abstract": "OBJECTIVES: To assess the effectiveness of a physical method of managing pain and fear in children and anxiety in the accompanying adult during venous puncture in  the emergency department. MATERIAL AND METHODS: Quasi-experimental study of 3  groups: one group used a combination of directed distraction by means of a  vibration device with ice pack, a second group received only distraction, and no  strategy was used in the third. RESULTS: Pain and adult anxiety were similar in  the 2 groups in which a pain management strategy was applied. Pain and adult  anxiety were greater when no strategy was adopted. We detected no differences in  the level of the children's fear. CONCLUSION: Directed distraction can be useful  for managing pain in children and it reduces the anxiety experienced by  accompanying adults. The use of a vibration device with ice does not add  benefits. Fear is not reduced by any of these measures."}, {"id": 253, "title": "Is Virtual Reality Ready for Prime Time in the Medical Space? A Randomized Control Trial of Pediatric Virtual Reality for Acute Procedural Pain Management.", "authors": "Gold, Jeffrey I.; Mahrer, Nicole E.", "journal": "Journal of pediatric psychology", "year": "2018", "vol": "43(3):266-275", "doi": "10.1093/jpepsy/jsx129", "abstract": "OBJECTIVE: To conduct a randomized control trial to evaluate the feasibility and efficacy of virtual reality (VR) compared with standard of care (SOC) for  reducing pain, anxiety, and improving satisfaction associated with blood draw in  children ages 10-21 years. METHODS: In total, 143 triads (patients, their  caregiver, and the phlebotomist) were recruited in outpatient phlebotomy at a  pediatric hospital and randomized to receive either VR or SOC when undergoing  routine blood draw. Patients and caregivers completed preprocedural and  postprocedural standardized measures of pain, anxiety, and satisfaction, and  phlebotomists reported about the patient's experience during the procedure.  RESULTS: Findings showed that VR significantly reduced acute procedural pain and  anxiety compared with SOC. A significant interaction between patient-reported  anxiety sensitivity and treatment condition indicated that patients undergoing  routine blood draw benefit more from VR intervention when they are more fearful  of physiological sensations related to anxiety. Patients and caregivers in the VR  condition reported high levels of satisfaction with the procedure. CONCLUSION: VR  is feasible, tolerated, and well-liked by patients, caregivers, and phlebotomists  alike for routine blood draw. Given the immersive and engaging nature of the VR  experience, VR has the capacity to act as a preventive intervention transforming  the blood draw experience into a less distressing, potentially pain-free routine  medical procedure, particularly for pediatric patients with high anxiety  sensitivity. VR holds promise to reduce negative health outcomes for children and  reduce distress in caregivers, while facilitating increased satisfaction and  throughput in hectic outpatient phlebotomy clinics."}, {"id": 254, "title": "The analgesic effect of non-pharmacological interventions to reduce procedural pain in preterm neonates.", "authors": "Hsieh, Kao-Hsian; Chen, Shu-Jen; Tsao, Pei-Chen et al.", "journal": "Pediatrics and neonatology", "year": "2018", "vol": "59(1):71-76", "doi": "10.1016/j.pedneo.2017.02.001", "abstract": "BACKGROUND: Painful procedures are unavoidable in the medical care of preterm babies. The unpleasant experience during the neonatal period may contribute to  hyperalgesia and poor neurodevelopment outcome later. Seeking effective  interventions to reduce pain are strongly indicated for these very small  premature babies. The aim of this study is to investigate if instilling breast  milk (BM) or dextrose water into oral cavity can reduce the procedural pain of  heel stick for preterm babies. METHODS: This is a prospective study; 20 premature  neonates are enrolled. Each study case received heel stick 4 times. BM, 10%  dextrose water (D10W), distilled water (placebo) and nothing (control group) were  given one after the other in random order to the same patient before heel stick.  Premature infant pain profile (PIPP) was used to assess the pain scores. The  whole process consisted of 4 sections: a baseline period for 1 min, intervention  period for 1 min, heel stick period for 20 s, and recovery period for 5 min. The  primary outcome is to compare the PIPP scores in the 4 groups. RESULTS: Totally  20 babies completed this study. Median gestational age was 32 weeks 2 days (26  weeks 4 days-35 weeks 6 days) and median birth body weight was 1596 g  (766-2435 g). The median PIPP scores and interquartile range at each time period  were listed in the context. There are significant differences between BM/control  group at all time periods, between BM/placebo group at 30-60 s, 1-2 min, and  2-3 min, and between D10W/control group at 0-30 s, 30-60 s, 3-4 min, and 4-5 min.  There are no significant differences between BM/D10W, D10W/placebo, and  placebo/control groups at any time periods. CONCLUSION: Giving something with  taste such as BM or D10W is safe and effective in reducing the procedural pain of  heel stick in preterm neonates; BM is the priority."}, {"id": 255, "title": "Acute Procedural Pain in Children: Intervention With the Hospital Clown.", "authors": "Kristensen, Helle Nygaard; Lundbye-Christensen, Søren; Haslund-Thomsen, Helle et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(11):1032-1038", "doi": "10.1097/AJP.0000000000000625", "abstract": "INTRODUCTION: Hospitalized children often describe needle-related procedures as the worst pain possible and such procedures may be emotionally traumatic. The use  of hospital clowns (HCs) related to painful medical procedures in children may  offer pain relief, but this has not been systematically evaluated. The objective  of this study was to assess the effect of a therapeutic clown in comparison with  standard care on the experience of pain in children receiving venipuncture.  MATERIALS AND METHODS: A sample of 116 children aged 4 to 15 years consecutively  admitted to the hospital was allocated to either the experimental (presence of  HC) or control group (standard care) before venipuncture. Self-reported pain  after the procedure was assessed using the Faces Pain Scale combined with a 0 to  10 Numerical Rating Scale. Separate analysis was conducted in age groups from 4  to 6 (N=37) and 7 to 15 (N=74) years. RESULTS: Without the clown present, the  mean pain score (2.7±2.8) was not significantly different between the 2 age  groups. Children aged 7 to 15 years had lower pain scores when the clown was  present compared with the control group (P=0.025). Children aged 4 to 6 years had  higher pain scores with the clown present, although the difference was not  statistically significant (P=0.054). Children with pain (N=49) or previous  experiences with venipuncture (N=56) did not score pain significantly  differently. DISCUSSION: Assessing the pain experience of children receiving  venipuncture with the presence of an HC indicates a pain relieving effect for  children older than 6 years. However, future studies should carefully study the  effects on younger children where mixed effects may be present."}, {"id": 256, "title": "Children's satisfaction and dissatisfaction with pain management in a Pediatric Emergency Department", "authors": "Lima, Débora Astolfo de; Rossato, Lisabelle Mariano; Guedes, Danila Maria Batista et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2018", "vol": "52:e03373-e03373", "doi": "10.1590/s1980-220x2017044503373", "abstract": "ABSTRACT  Objective:  To understand children's satisfaction and dissatisfaction with pain management in the pediatric emergency department.  Method:  Exploratory-descriptive qualitative study performed with children between 6 and 12 years of age and use of semi-structured interviews and thematic analysis of data.  Results:  Nineteen children were interviewed. The results were organized in two themes: Theme 1 - Satisfaction perceived by children regarding pain management, which included three subthemes, namely: Priority care and quick pain relief, Basic needs met and Embracement by the team; and Theme 2 - Dissatisfaction perceived by children regarding pain management, which included three subthemes: Painful procedures, Uncomfortable environment and Delay in pain relief.  Conclusion:  Children's satisfaction with pain management was observed to be much more than pain relief or priority service, and also included the pediatric emergency department environment and embracement by the team. Care should be directed to children's singularities, that is, a care built from the understanding of the experience from children's point of view."}, {"id": 257, "title": "Satisfação e insatisfação da criança acerca do manejo da dor em um Pronto-Socorro Infantil [Satisfacción e insatisfacción del niño acerca del manejo del dolor en Urgencias Infantiles]", "authors": "Lima, Débora Astolfo de; Rossato, Lisabelle Mariano; Guedes, Danila Maria Batista et al.", "journal": "Rev Esc Enferm USP", "year": "2018", "vol": "52:1-7", "doi": "", "abstract": ""}, {"id": 258, "title": "Low dose ketamine versus morphine for acute severe vaso occlusive pain in children: a randomized controlled trial.", "authors": "Lubega, Felix Anthony; DeSilva, Mithrika S.; Munube, Deogratias et al.", "journal": "Scandinavian journal of pain", "year": "2018", "vol": "18(1):19-27", "doi": "10.1515/sjpain-2017-0140", "abstract": "BACKGROUND AND AIMS: Acute pain episodes associated with sickle cell disease (SCD) are very difficult to manage effectively. Opioid tolerance and side effects  have been major roadblocks in our ability to provide these patients with adequate  pain relief. Ketamine is cheap, widely safe, readily available drug, with  analgesic effects at sub-anesthetic doses and has been used in wide range of  surgeries, pediatric burns dressing change and cancer related pain however,  literature concerning its use in sickle cell crises is still limited in our  setting. This study aimed to establish if 1 mg/kg of intravenous ketamine is non  inferior to intravenous morphine 0.1 mg/kg in severe SCD-associated pain.  METHODS: We performed an institutional review board-approved randomized,  prospective, double-blinded, active-control, non-inferiority trial at the  national referral sickle cell center. Children between 7 and 18 years of age with  severe painful sickle cell crisis, defined by numerical rating scale score of  greater or equal to 7 were enrolled. Patients were consented and randomized to  receive, either IV ketamine (LDK) 1 mg/kg or IV morphine (MOR) 0.1 mg/kg as an  infusion over 10 min. The primary endpoint is maximal change in Numerical Rating  Scale (NRS) pain score. Secondary outcomes were, incidence of adverse effects,  optimal time to and duration of action of ketamine and incidence of treatment  failures by treatment group. A clinically meaningful difference in validated pain  scores was defined as 1.3 units. Assuming both treatments are on average equal, a  sample size of 240 patients (120 per group) provided 95% power to demonstrate  that IV LDK is non-inferior to IV morphine with a 0.05 level of significance and  a 10% non-inferiority margin. All analyses were based on a modified intention to  treat. This trial was registered with clinicaltrials.gov NCT02434939. RESULTS:  Two hundred and forty patients were enrolled (LDK120, MOR120). Demographic  variables and baseline NRS scores (8.9 vs. 9.2) were similar. LDK was comparable  to MOR in the maximum change in NRS scores, 66.4% vs. 61.3% (MD 5.5; 95% CI -2.2  to -13.2). Time to achieve maximum reduction in NRS pain scores was at 19.8 min  for LDK and 34.1 min for MOR. The average duration of action for LDK was 60 min.  MOR had more patients still at maximum effect at 120 min (45.8% vs. 37.5%; RR  1.2; 95% CI 0.9-1.7). LDK patients were 11.3 times more likely to develop side  effects, though were transient, anticipated and non-life threatening (37.5% vs.  3.3%). MOR had significantly more treatment failures 40% vs. 28.3% (RR 0.7; 95%  CI 0.5-1.03, p=0.07) Vital signs and sedation scores were similar in both groups.  CONCLUSIONS: Intravenous LDK at 1 mg/kg provides comparable analgesic  effectiveness as IV MOR in the acute treatment of severe painful sickle cell  crisis in children in the day care sickle cell center. However, it is associated  with a high incidence of several transient, non-life threatening mild side  effects. IMPLICATIONS: Intravenous ketamine at 1 mg/kg can be a reliable  alternative to morphine in the management of severe painful sickle cell crisis  especially in a resource limited area where morphine is not readily available."}, {"id": 259, "title": "Oral Sucrose for Pain Relief During Clubfoot Casting: A Double-Blinded Randomized Controlled Trial.", "authors": "Milbrandt, Todd; Kryscio, Richard; Muchow, Ryan et al.", "journal": "Journal of pediatric orthopedics", "year": "2018", "vol": "38(8):430-435", "doi": "10.1097/BPO.0000000000000845", "abstract": "BACKGROUND: Idiopathic clubfoot treatment is treated by manipulation and casting utilizing the Ponseti technique which can make the infant fussy and irritable.  The goal of this study was to determine which intervention could decrease this  pain response in infants undergoing Ponseti casting for idiopathic clubfeet. Our  hypothesis was that the administration of oral sucrose solution or milk would be  the most effective in accomplishing that goal. METHODS: We conducted a  double-blinded randomized controlled trial at a tertiary pediatric orthopaedic  center on 33 children (average age=17.94 d; SD=20.51 d) undergoing clubfoot  manipulation and casting and their guardians. Each cast was considered a new  event and was randomized to an oral 20% sucrose solution (S), water (W), or milk  (M) in a bottle (breast or nonbreast). We assessed the Neonatal Infant Pain Scale  (NIPS), heart rate, and oxygen saturation before, during, and after the casting.  RESULTS: A total of 131 casts were randomized and 118 analyzed (37 M, 42 S, 39  W). Each child underwent an average of 3.97 casts (SD=1.74). There were no  significant differences seen between the groups before casting in their mean NIPS  score (M=2.2; SD=2.38, S=1.84, SD=2.18, W=1.61, SD=2.12). However during casting,  mean NIPS score for both milk, 0.91 (SD=1.26, P=0.0005) and sucrose, 0.64  (SD=1.27, P<0.0001) were significantly less than water, 2.27 (SD=2.03) but not  different from each other (P=0.33). Postcasting, the sucrose NIPS score, 0.69  (SD=1.53) continued to be significantly less than milk, 2.11 (SD=2.37, P=0.0065.  There was no correlation between heart rate or oxygen saturation and NIPS.  CONCLUSIONS: Sucrose solution and milk during Ponseti casting and manipulation  were effective in decreasing the pain response in children undergoing  manipulation and casting for clubfeet. The sucrose solution administration  continued the pain relief into the postcasting period. In addition to the  benefits of improving the patient experience during casting, a less irritable  child may result in better casting. LEVEL OF EVIDENCE: Level 1 evidence."}, {"id": 260, "title": "Interactive Versus Passive Distraction and Parent Psychoeducation as Pain Management Techniques During Pediatric Venepuncture: A Randomized Controlled  Trial.", "authors": "Newell, Anna; Keane, Jennifer; McGuire, Brian E. et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(11):1008-1016", "doi": "10.1097/AJP.0000000000000628", "abstract": "OBJECTIVES: The aim of the current research was to compare the relative efficacy of interactive and passive distraction, with or without parental psychoeducation,  on child pain and distress during a venepuncture. We also compared the effect of  parental psychoeducation on parental distress, knowledge of distraction  strategies, and engagement in distraction. MATERIALS AND METHODS: This  cross-sectional study included 213 children scheduled for a venepuncture, and one  of their parents, who were randomly allocated to 1 of 4 conditions; interactive  distraction, passive distraction, interactive distraction with parent  psychoeducation, and passive distraction with parent psychoeducation. Analyses of  covariances were used to investigate the impact of distraction type and the use  of parent psychoeducation on child and parent pain-related outcome variables.  RESULTS: Statistical analyses revealed no significant differences between groups  for child-reported pain and distress. The parents of children who received  interactive distraction reported significantly higher levels of distress than the  parents of children who received passive distraction. Parents who received parent  psychoeducation had a significantly higher level of knowledge than parents who  did not receive psychoeducation, but did not engage in more effective pain  management behavior. CONCLUSIONS: The results indicated that distraction type did  not have a significantly different influence on child pain-related outcome  variables. In addition, while psychoeducation was demonstrated to be effective in  increasing parental knowledge, it was not sufficient to change parental behavior."}, {"id": 261, "title": "Tecnologias de enfermagem no manejo da dor em recém-nascidos na unidade de terapia intensiva neonatal", "authors": "Nóbrega, Amanda Santana de Medeiros; Cantalice, Anajás da Silva Cardoso; Cerqueira, Ana Carolina Dantas Rocha et al.", "journal": "Enferm. foco (Brasília)", "year": "2018", "vol": "9(2):66-72", "doi": "10.21675/2357-707X.2018.v9.n2.1083", "abstract": "Objetivo: verificar tecnologias de enfermagem utilizadas no manejo da dor em recém-nascidos de uma Unidade de Terapia Intensiva Neonatal. Metodologia: pesquisa quantitativa, descritiva, exploratória, realizada em uma Maternidade Pública Estadual no interior da Paraíba, com 12 técnicos de enfermagem e 5 enfermeiros. Utilizado um questionário estruturado para coleta de dados e a análise feita por meio do Microsoft Excel. Resultados: foi observado que a utilização de escalas de dor não faz parte da rotina e o choro foi o parâmetro mais utilizado para reconhecer a dor no neonato. Conclusão: é necessário ampliar as discussões sobre essa temática a partir da sistematização e educação permanente nos serviços de cuidados intensivos ao neonato."}, {"id": 262, "title": "A frequência da dor no recém-nascido durante a utilização do CPAP nasal", "authors": "Ornellas, Talita Nunes dos Santos", "journal": "", "year": "2018", "vol": "113-113", "doi": "", "abstract": "Objetivos: analisar a frequência da dor em recém-nascidos durante a utilização do CPAP nasal; descrever o modo de utilização do CPAP nasal nos recém-nascidos e descrever a associação entre o manuseio da pronga nasal e a presença de dor. Metodologia: trata-se de um estudo transversal, realizado no Instituto Nacional de Saúde da Mulher, da Criança e do Adolescente Fernandes Figueira, localizado no município do Rio de Janeiro. Esta pesquisa foi submetida ao Comitê de Ética em Pesquisa com Seres Humanos da Instituição da pesquisa em consonância com o estabelecido na Resolução nº 466/2012 do Conselho Nacional de Saúde e aprovada com a CAAE nº 64231317.5.0000.5269. Foram avaliados oito recém-nascidos em uso de CPAP nasal internados durante o período da coleta de dados, que foi de junho a novembro de 2017. A coleta de dados foi realizada com base na filmagem dos recém-nascidos participantes do estudo que foi feita durante o período diurno, por seis horas corridas. Cada RN participou da pesquisa apenas uma vez ao logo de sua internação, isto é, ele foi filmado somente em um único momento. Foi realizada uma avaliação da utilização do CPAP nasal pelo recém-nascido, através de um checklist. Para avaliação da dor durante a utilização do CPAP nasal foi aplicada a escala NFCS. Para garantir a associação temporal entre a utilização do CPAP nasal e a dor, a avaliação pelo checklist e pela NFCS foram feitas sempre no mesmo momento. Em todos os momentos que houve uma inadequação na utilização do CPAP nasal (prevista no checklist) ou uma reinserção da pronga, tanto o checklist quanto a NFCS foram aplicados. Foi realizada uma análise descritiva. Para uma melhor avaliação dos dados, o vídeo foi analisado por duas pessoas: pela pesquisadora e pela assistente da pesquisa. Resultados: foi observado que houve um grande número de não conformidades com a utilização do CPAP nasal descritas, e um elevado número de eventos dolorosos durante a utilização do CPAP nasal, com um total de 185 observações, ou seja, em 61,08% houve a presença de dor nas observações registradas de não conformidade. Dentre essas não conformidades na utilização do CPAP destaca-se o grande número de reinserções e de posicionamento inadequado. Conclusão: de acordo com o que foi observado neste estudo pode-se concluir que o uso do CPAP nasal nos RNs esteve associado à dor provocou dor. Os fatores mais relevantes foram o posicionamento inadequado e a reinserção da pronga. Diante dos resultados obtidos é preciso melhorar a prática no que diz respeito à vigilância do RN em uso do CPAP nasal, considerando o elevado grau de dor identificado pela escala NFCS, relacionadas ao posicionamento inadequado. Em relação às reinserções deve-se sempre pensar e fazer cumprir o manejo de dor (contenção, sucção não nutritiva e solução adocicada) durante uma reinserção programada."}, {"id": 263, "title": "Paediatric Pain Medicine: Pain Differences, Recognition and Coping Acute Procedural Pain in Paediatric Emergency Room.", "authors": "Pancekauskaitė, Gabija; Jankauskaitė, Lina", "journal": "Medicina (Kaunas, Lithuania)", "year": "2018", "vol": "54(6)", "doi": "10.3390/medicina54060094", "abstract": "Paediatric pain and its assessment and management are challenging for medical professionals, especially in an urgent care environment. Patients in a paediatric  emergency room (PER) often undergo painful procedures which are an additional  source of distress, anxiety, and pain. Paediatric procedural pain is often  underestimated and neglected because of various myths, beliefs, and difficulties  in its evaluation and treatment. However, it is very different from other origins  of pain as it can be preventable. It is known that neonates and children can feel  pain and that it has long-term effects that last through childhood into  adulthood. There are a variety of pain assessment tools for children and they  should be chosen according to the patient's age, developmental stage,  communication skills, and medical condition. Psychological factors such as PER  environment, preprocedural preparation, and parental involvement should also be  considered. There are proven methods to reduce a patient's pain and anxiety  during different procedures in PER. Distraction techniques such as music,  videogames, virtual reality, or simple talk about movies, friends, or hobbies as  well as cutaneous stimulation, vibration, cooling sprays, or devices are  effective to alleviate procedural pain and anxiety. A choice of distraction  technique should be individualized, selecting children who could benefit from  nonpharmacological pain treatment methods or tools. Nonpharmacological pain  management may reduce dosage of pain medication or exclude pharmacological pain  management. Most nonpharmacological treatment methods are cheap, easily  accessible, and safe to use on every child, so it should always be a first choice  when planning a patient's care. The aim of this review is to provide a summary of  paediatric pain features, along with their physiology, assessment, management,  and to highlight the importance and efficacy of nonpharmacological pain  management in an urgent paediatric care setting."}, {"id": 264, "title": "Needle-related pain and distress management during needle-related procedures in children with and without intellectual disability.", "authors": "Pascolo, Paola; Peri, Francesca; Montico, Marcella et al.", "journal": "European journal of pediatrics", "year": "2018", "vol": "177(12):1753-1760", "doi": "10.1007/s00431-018-3237-4", "abstract": "Children with intellectual disability frequently undergo needle-related procedures for diagnosis or treatment. Nevertheless, only a few studies deal with  pain and distress management during the procedure in this population of children.  This study aimed to investigate the number of anxiety and pain management  techniques performed during needle procedure in children with intellectual  disability (cases) compared to a population of children without intellectual  disability (controls). This multicenter cohort study was performed from July 2016  to January 2018 in the pediatric ward of four urban hospitals in Italy. Eligible  subjects were children with and without intellectual disability, from 4 to  17 years old, who needed venipuncture or intravenous cannulation for diagnosis or  treatment. Use of topical anesthesia, distraction techniques, and physical or  verbal comfort during procedures were recorded. Pain and anxiety scores were also  recorded. Forty-seven cases and 94 controls were recruited. Three pain- and  anxiety-relieving techniques were performed during the procedure in 12 (25%)  cases and in 10 controls (11%); two techniques were performed in 23 (50%) cases  and in 26 (28%) controls; 12 (25%) cases and 52 (55%) controls received only  one.Conclusion: In this series, children with intellectual disability received  significantly more relieving techniques, but experienced more pain and anxiety  when compared to children without intellectual disability. What is Known: •  Children with intellectual disability experience more episodes of pain than  cognitively healthy ones, and almost 10% of these episodes are due to medical  procedures. What is New: • Children with intellectual disability despite  receiving more relieving techniques during a needle-related procedure experienced  more pain and anxiety when compared to healthy children."}, {"id": 265, "title": "Impact of early analgesia on hospitalization outcomes for sickle cell pain crisis.", "authors": "Payne, Jason; Aban, Inmaculada; Hilliard, Lee M. et al.", "journal": "Pediatric blood & cancer", "year": "2018", "vol": "65(12):e27420", "doi": "10.1002/pbc.27420", "abstract": "BACKGROUND: Painful events are the leading cause of hospitalizations for patients with sickle cell disease. Individualized pain plans targeting patient-specific  maximum opioid dosing may shorten hospitalization length and are recommended by  national guidelines. Prior to implementing individualized sickle cell pain plans,  we tested the hypothesis that a shorter time to achieve a maximum opioid dose  would improve hospitalization outcomes. PROCEDURE: Two-year IRB-approved,  retrospective study of pediatric patients admitted for vaso-occlusive crisis  (VOC). We recorded the emergency department admission time, order entry time for  the maximum opioid dose during the hospitalization, and time of discharge  orders.  We categorized patients as infrequent if they required <3 admissions for  VOC over two years and patients as frequent if they required ≥3 admissions for  VOC over two years. To account for multiple admissions, generalized linear  modeling was performed. RESULTS: We identified 236 admissions for acute pain  observed in 108 patients. Achieving an earlier maximum opioid dose was  significantly associated with shorter length of hospitalization for frequent and  infrequent pain patients (both P ≤ 0.0001). As total hospitalization length can  be impacted by the time a maximum opioid order was placed, we also analyzed  hospitalization length after the maximum opioid order was placed. Frequent pain  patients who achieved earlier analgesia had a significantly shorter  hospitalization from the time the maximum opioid order was placed (P = 0.03)  while no association was found for infrequent pain patients (P = 0.84).  CONCLUSIONS: Early achievement of maximum analgesia improved hospitalization  outcomes and warrant further investigation in prospective studies of  individualized pain plans."}, {"id": 266, "title": "Pain Experience in a US Children's Hospital: A Point Prevalence Survey Undertaken After the Implementation of a System-Wide Protocol to Eliminate or Decrease Pain  Caused by Needles.", "authors": "Postier, Andrea C.; Eull, Donna; Schulz, Craig et al.", "journal": "Hospital pediatrics", "year": "2018", "vol": "8(9):515-523", "doi": "10.1542/hpeds.2018-0039", "abstract": "OBJECTIVES: Pain in hospitalized children remains under-assessed and undertreated. With this study, we aim to describe results from a repeat  single-day, hospital-wide survey of children's pain and its treatment after the  initiation of a hospital-wide quality improvement initiative used to reduce or  eliminate pain caused by needle procedures. METHODS: All patients and parents  listed on the inpatient morning census, in emergency department and outpatient  surgery registration lists, were invited to participate in a brief single-day  point prevalence survey of their experience with pain and its management in the  hospital setting. Results were compared with a survey conducted 2 years earlier,  before implementation of a system-wide Children's Comfort Promise needle pain  treatment and prevention protocol. RESULTS: A total of 194 children and their  parents participated in the current survey. A higher percentage of children  reported having no pain compared with the previous survey (33% vs 24%; P = .07;  not significant) and fewer experienced severe pain (score ≥7 out of 10). Fewer  children identified pain caused by needles as the cause of the worst pain (21% vs  30%), although it remained the highest reported cause of the most painful  experience overall. The number of pain management strategies administered and  offered to children with needle pain (distraction, positioning, numbing cream,  and sucrose and/or breastfeeding for infants) increased. CONCLUSIONS: The  implementation of a mandatory Comfort Promise protocol used to minimize or  prevent pain caused by elective needle procedures was associated with a  significant reduction in overall pain prevalence and improved use of  evidence-based practices for needle pain management."}, {"id": 267, "title": "Featured Article: The ABCDs of Pain Management: A Double-Blind Randomized Controlled Trial Examining the Impact of a Brief Educational Video on Infants'  and Toddlers' Pain Scores and Parent Soothing Behavior.", "authors": "Riddell, Rebecca Pillai; O'Neill, Monica C.; Campbell, Lauren et al.", "journal": "Journal of pediatric psychology", "year": "2018", "vol": "43(3):224-233", "doi": "10.1093/jpepsy/jsx122", "abstract": "OBJECTIVES: To test the efficacy of a brief behavioral pain management strategy (The ABCDs of Needle Pain Management), delivered via video, on infants' and  toddlers' pain scores and on parental soothing behavior. METHODS: This was a  double-blind, parallel trial design. Parent-child dyads (N = 128) were recruited  before their child's 6-month (infant) or 18-month (toddler) vaccination in a  pediatric clinic and randomly assigned to watch a 5-min treatment video or a  placebo video. The primary outcome was the Modified Behavior Pain Scale (Taddio  et al., Journal of Pain and Symptom Management, 10, pp. 456-463, 1995), coded  during four epochs (Pain Reactivity, Pain Regulation 1 min, Pain Regulation  2 min, and Pain Regulation 3 min) after the last vaccination needle. Secondary  analyses examined parental use of distraction, rocking, and physical comforting  over this same time period. RESULTS: Results demonstrated a treatment effect for  toddlers (18-month-olds) for the Pain Regulation 1 (d = 0.84) and Pain Regulation  2 (d = 0.76) postvaccination scores. Secondary analyses found differences in  parental rocking and physical comforting between treatment conditions and between  age-groups (d's = 0.37-0.54). CONCLUSIONS: The ABCD pain management strategy  delivered via video was an effective way to reduce toddler pain after vaccination  and increase parental use of rocking and physical comforting. The treatment  effect was not demonstrated with infants."}, {"id": 268, "title": "Efetividade da cobertura de silicone no tratamento de queimaduras em pacientes pediátricos: revisão sistemática", "authors": "Santos, Priscila Mattos dos", "journal": "", "year": "2018", "vol": "141-141", "doi": "", "abstract": "Resumo: O tratamento de queimaduras de espessura parcial em pacientes pediátricos é complexo e doloroso, a fragilidade da criança é um fator agravante na conduta a ser instituída. Preza-se a atenção e a promoção do vínculo familiar, reduzir a dor, danos estéticos e traumas do processo de hospitalização. O presente trabalho objetiva sintetizar as evidências sobre a efetividade da cobertura de silicone, nylon com colágeno (Biobrane®), comparado a qualquer outro tipo de cobertura, agentes tópicos ou placebos, no tratamento de queimaduras de espessura parcial em pacientes pediátricos em qualquer ambiente de cuidado. Esta revisão sistemática segue as recomendações do Instituto Joanna Briggs, e seu protocolo foi publicado no PROSPERO sob número: CRD42018102565. Incluíram-se ensaios clínicos randomizados com os seguintes critérios: inglês, português ou espanhol, publicados entre 1979 e 2018, pacientes pediátricos (0-18 anos) portadores de queimaduras de espessura parcial que fizessem uso da intervenção Biobrane®. Os desfechos de interesse foram: cicatrização completa; tempo de cicatrização; redução da área lesada; dor; tempo de hospitalização e eventos adversos. Os estudos foram identificados por meio das bases de dados de estudos publicados: MEDLINE, CINAHL, Embase, Web of Science, LILACS; em bases de estudos não publicados; por registros de ensaios clínicos randomizados; e busca manual no período de março a maio de 2018, com busca livre em novembro de 2018. Os critérios de elegibilidade e a avaliação da qualidade metodológica foram aplicados por dois revisores e um terceiro revisor, em caso de discordância. Os dados foram sintetizados de forma narrativa e quantitativa, e a qualidade das evidências classificadas pelo GRADE. Identificou-se 400 publicações e 5 estudos foram incluídos para síntese. Os p
