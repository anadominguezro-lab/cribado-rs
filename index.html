  "E9 — Texto completo no disponible"];

const ARTICLES = [{"id": 1, "title": "Evaluation of ketorolac ceiling dose effects in pediatric patients in the emergency department.", "authors": "Bindseil, Isabelle; Soderstrom, Rhynn; Balmat, Ryan", "journal": "The American journal of emergency medicine", "year": "2025", "vol": "89:139-143", "doi": "10.1016/j.ajem.2024.12.011", "abstract": "BACKGROUND: The use of ketorolac for analgesia in the emergency department is a common practice for pediatric patients. There is a lack of guidance on optimal  dosing to limit the risk of side effects especially in pediatric patients. The  standard dosing is weight based with a cap at 30 mg, a dose which is higher than  the typical max used for adult patients. The objective of this study is to  compare the analgesic effect of intravenous ketorolac at doses of 15 mg versus  doses greater than 15 mg. METHODS: This retrospective observational study was  performed at a single-center, pediatric tertiary academic medical center. A  system-generated report identified patients with an order for IV ketorolac within  the ED from July 2021 to July 2022. Pediatric patients presenting to the ED with  acute pain and being treated with monotherapy ketorolac for analgesia at a  minimum dose of 15 mg were included. The primary outcome of this study evaluated  the change in pain score in patients receiving one dose of ketorolac dosed at  15 mg as compared to doses greater than 15 mg. RESULTS: Our study population  included 599 patients receiving ketorolac IV in the ED with baseline demographics  similar between groups. For the primary outcome there was no statistically  significant difference in the number of patients with a decrease in pain score  between patient groups (p = 0.84). CONCLUSION: This retrospective review  demonstrates an association of similar analgesic effects using a capped dose of  15 mg of IV ketorolac as compared to larger doses in pediatric patients admitted  to the ED."}, {"id": 2, "title": "A Narrative Review of Pain in Pediatric Oncology: The Opioid Option for Procedural and Surgical Pain.", "authors": "Hall, Elizabeth A.; Shelton, Chasity M.; Hagemann, Tracy M. et al.", "journal": "Paediatric drugs", "year": "2025", "vol": "27(1):19-39", "doi": "10.1007/s40272-024-00654-6", "abstract": "This narrative review examines the evolving role of opioids in managing procedural and surgical pain in pediatric oncology patients. The review evaluates  studies on opioid use across various oncological surgeries including thoracic,  abdominal, orthopedic, and neurosurgical procedures, as well as for common  painful procedures such as bone marrow aspirations and lumbar punctures. While  opioids remain important for acute procedural and postoperative pain management  in pediatric oncology patients, there is an increasing emphasis on multimodal,  opioid-sparing approaches. The evidence presented within this review highlights  the growing focus on judicious postoperative opioid prescribing to mitigate risks  of adverse effects and persistent use or potential misuse. The review synthesizes  findings from studies investigating various analgesic regimens, including the use  of regional anesthesia techniques like epidural analgesia and peripheral nerve  blocks, which have shown promise in reducing opioid requirements. For procedural  pain, the review explores the efficacy of combining opioids with sedatives like  midazolam or propofol, as well as the potential of ketamine as an opioid-sparing  alternative. Key findings indicate that opioid-sparing techniques can effectively  reduce overall opioid consumption without compromising pain control or patient  satisfaction. Several studies demonstrated that regional anesthesia techniques  and non-opioid adjuncts can significantly lower postoperative opioid requirements  across various surgical procedures. For procedural pain, ketamine-based regimens  often showed comparable or superior pain control to opioid-based approaches, with  some studies reporting better patient satisfaction. This review also addresses  the importance of tailored postoperative opioid prescribing, with some studies  presenting algorithms to predict outpatient opioid needs more accurately. These  approaches aim to ensure adequate pain control while minimizing excess opioid  dispensing."}, {"id": 3, "title": "[Translating evidence: pain treatment in newborns, infants, and toddlers during needle-related procedures : German version].", "authors": "Harrison, Denise; Bueno, Mariana", "journal": "Schmerz (Berlin, Germany)", "year": "2025", "vol": "39(2):89-98", "doi": "10.1007/s00482-024-00797-y", "abstract": "INTRODUCTION: Treatment of pain in preterm, sick, and healthy newborns and infants and toddlers (up to 2 years of age) is consistently reported to be  inadequate, and effective strategies are poorly implemented. OBJECTIVES: To  present existing evidence of effective pain treatment strategies during  needle-related procedures and to highlight initiatives focused on translating  evidence into practice. METHODS: This Clinical Update focuses on the 2022  International Association for the Study of Pain Global Year for Translating Pain  Knowledge to Practice in the specific population of newborns, infants, and  toddlers. Best evidence is reviewed, and existing knowledge translation  strategies and programs available to implement evidence into practice are  presented. RESULTS: Effective strategies for newborn and young infants during  frequently occurring needle procedures include small volumes of sweet solutions,  breastfeeding, or skin-to-skin care when feasible and culturally acceptable. In  addition, strategies such as nonnutritive sucking, positioning, swaddling, gentle  touch, facilitated tucking, and secure holding can be used. For toddlers, the  evidence is less robust, and discerning between pain and distress is challenging.  However, strategies recommended for needlerelated procedures include upright  secure comfort holding by parents/caregivers, age-appropriate distraction, and  topical anesthetics. Translation of effective pain management needs to involve  the family, who need to be supported and empowered to comfort their child during  painful procedures. Organizational, nationwide, and global initiatives aimed at  improving implementation of effective pain treatments exist. CONCLUSION: There is  evidence of effective pain management strategies for newborns, infants, and  toddlers, and a great deal of effort is being made to translate knowledge into  action."}, {"id": 4, "title": "Frenillo lingual, anquiloglosia y lactancia materna", "authors": "Rossato, Norma E", "journal": "Arch. argent. pediatr", "year": "2025", "vol": "123(1):e202410507-e202410507", "doi": "10.5546/aap.2024-10507", "abstract": "Entre 1997 y 2012 los diagnósticos de anquiloglosia y la indicación de frenotomía aumentaron Ë800 %. Alrededor del 38 % de los casos diagnosticados son intervenidos quirúrgicamente. La promoción de la lactancia materna incluye la evaluación de antecedentes hereditarios y personales maternos de lactancia, estructura mamaria, fisiología endocrinológica, equilibrio emocional de la madre, técnica de amamantamiento, calidad y cantidad de leche, capacidad del recién nacido de prenderse y succionar. La frenotomía estaría indicada cuando la restricción de la función lingual provoca dificultades que no se han resuelto luego de una evaluación exhaustiva y del asesoramiento para corregir otras causas encontradas. Las frenotomía puede tener complicaciones: problemas en la alimentación, respiratorios, dolor, pérdida de peso, daños vasculares o nerviosos, y retraso en el diagnóstico de otras patologías subyacentes. No siempre soluciona las dificultades de la lactancia. El trabajo en equipo interdisciplinario disminuye la frecuencia de las frenotomías innecesarias."}, {"id": 5, "title": "The lingual frenulum, ankyloglossia, and breastfeeding.", "authors": "Rossato, Norma E", "journal": "Arch Argent Pediatr", "year": "2025", "vol": "123(1):e202410507-e202410507", "doi": "10.5546/aap.2024-10507.eng", "abstract": "Between 1997 and 2012, the diagnoses of ankyloglossia and the indication for frenotomy increased by Ë800%. About 38% of diagnosed cases are surgically treated. Breastfeeding promotion includes evaluating maternal hereditary and personal history of breastfeeding, breast structure, endocrinological physiology, emotional well-being of the mother, breastfeeding technique, quality and quantity of milk, and the newborn's ability to latch on and suckle. Frenotomy would be indicated when restriction of tongue function causes difficulties that have not resolved after thorough evaluation and counseling to correct other causes. Frenotomy can have complications: feeding and respiratory difficulties, pain, weight loss, vascular or nerve damage, and delayed diagnosis of other underlying pathologies. It does not always solve breastfeeding difficulties. Interdisciplinary teamwork reduces the frequency of unnecessary frenotomies."}, {"id": 6, "title": "The effectiveness of cryotherapy and cooled topical anesthesia compared with conventional topical anesthesia in alleviating intraoral injection pain: A  systematic review and meta-analysis.", "authors": "Saeedi, Pooya; Sarraf Shirazi, Alireza; Ghorbani, Mahsa", "journal": "International journal of paediatric dentistry", "year": "2025", "vol": "35(4):655-674", "doi": "10.1111/ipd.13275", "abstract": "BACKGROUND: Injection pain remains a significant concern in dental procedures, often leading to patient anxiety and reluctance to seek necessary care. AIM: This  study aimed to assess the effectiveness of cryotherapy in reducing injection pain  compared with topical anesthesia during intraoral local anesthesia. DESIGN:  MEDLINE, Web of Science, EMBASE, Scopus, and Cochrane's CENTRAL databases were  searched up to November 2023. Inclusion criteria involved randomized clinical  trials aligned with the PICO question. Study selection, data extraction, and risk  of bias assessment using the ROB-2 tool were performed. The results were  synthesized through a random-effects inverse variance meta-analysis. The primary  outcomes assessed were the Visual Analogue Scale (VAS) and Sound Eye Motor (SEM).  Subgroup analysis was conducted for children and adults. RESULTS: In the  meta-analysis, 31 RCTs involving 2470 subjects were included. Twenty-seven  studies demonstrated cryotherapy's significant superiority over topical  anesthesia in reducing injection pain via VAS in adults (p = .01), children (p =  .01), and combined age groups (p < .001). Additionally, cryotherapy significantly  outperformed topical anesthesia in reducing pain via SEM in children (p = .04)  and combined age groups (p = .03) across 13 studies, with no significant  difference in adults (p = .51). Furthermore, cooled topical anesthesia also  outperformed room temperature topical anesthesia (p < .001). The certainty of the  results, however, is of very low quality. CONCLUSIONS: Our results indicate that  cryotherapy significantly reduces injection pain compared with topical  anesthesia, especially in children and combined age groups, but is less effective  in adults. Additionally, cooled topical anesthesia is more effective than room  temperature topical anesthesia. Thus, cryotherapy is a and potentially superior  alternative to topical anesthesia, particularly for children."}, {"id": 7, "title": "Efficacy and safety of the Valsalva maneuver in relieving venipuncture pain in children and adults: A systematic review and meta-analysis.", "authors": "Shi, Haoning; Li, Xia; Huang, Xiaotong et al.", "journal": "The journal of vascular access", "year": "2025", "vol": "26(1):40-54", "doi": "10.1177/11297298241231903", "abstract": "Venipuncture is a common invasive clinical procedure, and pain management during puncture has been of interest to healthcare professionals. The purpose of this  systematic review and meta-analysis was to evaluate the efficacy and safety of  the Valsalva maneuver (VM) for the relief of venipuncture pain in children and  adults. PubMed, Embase, Web of Science, Cochrane Library, CNKI, Wanfang, VIP  database, and CBM were searched from inception to December 2023 for all available  randomized controlled trials (RCTs) that evaluated the impact of VM on  venipuncture. Two reviewers independently performed study selection, data  extraction, and risk of bias assessment. Continuous variables were analyzed by  mean differences (MD) or standardized mean differences (SMD), whereas dichotomous  variables were analyzed by risk ratios (RR). A total of 22 studies involving 1740  participants were included. The pooled results showed that VM relieved pain  intensity during venipuncture in children (SMD = -0.89, 95% CI = -1.47 to -0.30,  p = 0.003) and adults (SMD = -1.11, 95% CI = -1.46 to -0.77, p < 0.00001),  reduced anxiety intensity (SMD = -1.07, 95% CI = -1.68 to -0.47, p = 0.0005), and  shortened puncture time (MD = -13.52, 95% CI = -21.14 to -5.90, p = 0.0005).  There was no significant difference in the success rate of venous cannulation,  MAP, HR, or incidence of adverse events in subjects who performed VM compared to  controls. VM was an effective and safe method of pain management that reduced  pain intensity during venipuncture in children and adults without significant  adverse effects. The results of this meta-analysis need to be further validated  by more rigorous and larger RCTs."}, {"id": 8, "title": "Acceptability and Usability of Smileyscope Virtual Reality for Paediatric Pain Management During Burn Procedures: Perspectives of Patients, Carers and  Clinicians.", "authors": "Storey, Kristen; Dimanopoulos, Tanesha A.; Plummer, Karin et al.", "journal": "Journal of advanced nursing", "year": "2025", "vol": "81(3):1568-1582", "doi": "10.1111/jan.16417", "abstract": "AIM: To explore clinician, child and parent acceptability and usability of the Smileyscope VR device in the context of addressing the unique pain and distress  needs of young burn patients. DESIGN: A survey comprising closed and open-ended  questions. METHOD: Descriptive statistics analysed participant characteristics,  pain and analgesia. Qualitative content was collected from April 2022-August 2022  and analysed to identify barriers and enablers. Categories were then mapped onto  the Capabilities, Opportunities and Motivation-Behaviour Wheel (COM-B) framework.  RESULTS: Smileyscope was found to be effective for reducing pain and anxiety  during dressing changes by both patients (n = 39) and parents (n = 37).  Clinicians (n = 35) reported high self-efficacy and willingness to reuse the  device. However, concerns arose regarding the device's fit and the need for  age-appropriate programmes. CONCLUSION: Smileyscope demonstrated promise in  reducing procedural pain and distress. The device is well accepted by all  participants implying ease of implementation. Feedback suggests further program  development and fitting optimisation is required. IMPLICATIONS FOR THE PROFESSION  AND/OR PATIENT CARE: Improved procedural pain has proven to decrease wound  healing times, decreasing possible need for further scar management and long-term  consequences after sustaining a burn injury. Smileyscope use in rural hospitals  presents valuable opportunities for optimising early paediatric burn pain.  IMPACT: Increased burn pain can delay wound healing and have long term physical  and psychological impact on patients. Smileyscope was well received within this  cohort; however, improvements in device design and programmes were suggested.  This study shows the potential for use of Smileyscope as a non-pharmacological  approach to improving paediatric burn pain and distress. PATIENT OR PUBLIC  CONTRIBUTION: While our study included patients, parents and clinicians as  research participants, there was no patient or public contribution in the design  or conduct of the study, analysis or interpretation of the data."}, {"id": 9, "title": "Multisensory stimulation to reduce procedural pain in retinopathy of prematurity: A randomized controlled trial.", "authors": "Tasdemir, Halil Ibrahim", "journal": "Nursing in critical care", "year": "2025", "vol": "30(4):e13200", "doi": "10.1111/nicc.13200", "abstract": "BACKGROUND: Retinopathy is frequently seen in the neonatal intensive care unit (NICU), and its examination is a painful procedure for infants. AIM: This  randomized active-controlled trial aimed to investigate the impact of  multisensory stimulation (MSS) on neonatal pain during retinopathy of prematurity  (ROP) examinations, in comparison with a white noise (WN) and control group  receiving standard care. STUDY DESIGN: Conducted as a three-arm, randomized  controlled trial, the study was implemented in the NICU of a local university  hospital. Recruitment spanned from July 2023 to November 2023, with preterm  infants (gestational age < 37 weeks) randomly assigned to either a MSS, WN or a  control group. MSS components included visual, auditory, tactile, olfactory and  gustatory stimuli, all designed to create a synergistic, comforting environment  for the infant during the procedure. Procedural pain, heart rate and oxygen  saturation were assessed at various stages before and after ROP examinations.  RESULTS: Analysis of 90 participants revealed that the MSS group exhibited lower  Premature Infant Pain Profile (PIPP) scores than the WN and control groups (mean  difference: -2.12, 95% confidence interval [CI]: -2.62 to -1.62; odds ratio [OR]:  0.004, 95% CI [0.001, 0.012], p < 0.001). Additionally, heart rates were  significantly lower in the MSS group (mean difference: -15.3 beats/min, 95% CI:  -20.5 to -10.1; OR: 0.025, 95% CI [0.008, 0.073], p < .001) and oxygen saturation  levels were higher (mean difference: 3.2%, 95% CI: 1.8% to 4.6%; OR: 1.12, 95% CI  [1.05, 1.20], p < .001) than in the other groups. CONCLUSIONS: MSS emerges as a  favourable, safe and non-pharmacological intervention for pain management in ROP  and similar procedures. RELEVANCE TO CLINICAL PRACTICE: Multisensory stimulation  can be effectively integrated into the routine care provided by critical care  nurses during retinopathy of prematurity examinations in preterm infants. This  non-pharmacological intervention offers a practical approach for critical care  nurses to reduce procedural pain and improve physiological stability in this  vulnerable population."}, {"id": 10, "title": "Strategies to minimize procedure-related pain and anxiety: lessons from pediatric dermatology.", "authors": "Abouchaleh, Nadine; Bayart, Cheryl", "journal": "Current opinion in pediatrics", "year": "2024", "vol": "36(4):406-410", "doi": "10.1097/MOP.0000000000001371", "abstract": "PURPOSE OF REVIEW: Recent studies have suggested that prolonged or repeated episodes of general anesthesia early in childhood may adversely affect  neurodevelopment. This, combined with rising healthcare costs and decreasing  access, has sparked interest in performing pediatric procedures in the office  setting when possible. It is essential to address the physical and psychological  discomfort that often accompany this experience, particularly in children. RECENT  FINDINGS: Healthcare providers performing procedures on children can draw from a  spectrum of established techniques, new technology, and novel use of medications  to decrease peri-procedural pain and anxiety. These techniques include  distraction, optimization of local anesthesia, and mild to moderate sedation.  SUMMARY: We recommend using a combination of techniques to minimize pain and  anxiety to improve safety, decrease healthcare costs, improve patient experience,  and prevent childhood trauma and persistent negative perception of the healthcare  system."}, {"id": 11, "title": "Animated video reduces pain and anxiety during pin removal in children with supracondylar humerus fractures: a randomized controlled trial.", "authors": "Akan, İhsan; Bacaksız, Tayfun; Bozoğlan, Muhammet et al.", "journal": "Archives of orthopaedic and trauma surgery", "year": "2024", "vol": "144(9):4293-4301", "doi": "10.1007/s00402-024-05527-8", "abstract": "INTRODUCTION: The aim of this study; is to determine the level of pain and anxiety experienced by pediatric patients with operated humeral supracondylar  fractures during pin removal, and to investigate the effectiveness of animated  video impressions. MATERIALS AND METHODS: This randomized controlled study  included 180 patients aged between 4 and 12 years. The patients were divided into  four groups: Group 1-control; Group 2-watched the introductory animation video  before the procedure; Group 3-using analgesic before the procedure (ibuprofen  10 mg/kg); Group 4-watched the introductory animation video and used analgesic  before the procedure. To assess pain before randomization, before-during-after  procedure, and at outpatient clinic controls; the Wong-Baker Pain Scale (WBS),  modified CHEOPS (Children's Hospital of Eastern Ontario Pain Scale), and the  child's heart rate were used. To assess anxiety; the Children's Anxiety Meter  (CAM), The Short State Anxiety Inventory Scale (SAIS), and The Children's Emotion  Management Scales (CEMS) were used. RESULTS: While a significant difference was  detected between the groups in the tests performed at certain intervals  (p < 0.001), no significant difference was detected between Groups 1-3 and Groups  2-4. The Modified CHEOPS and CEMS values obtained during the procedure showed  significant variability between the groups (p < 0.001). Similarly, While a  significant difference was detected between the groups in the WBS scores measured  during the procedure (p < 0.001), it was observed that there was no significant  relationship between Groups 1-3 and Groups 2-4 (p = 0.892, p = 0.820).  CONCLUSIONS: Watching an introductory animated video before pin removal is an  effective method to relieve the anxiety and pain felt in children with  supracondylar fractures."}, {"id": 12, "title": "Music for pain relief of minor procedures in term neonates.", "authors": "Anbalagan, Saminathan; Velasquez, Juan H.; Staufert Gutierrez, Denisse et al.", "journal": "Pediatric research", "year": "2024", "vol": "95(3):679-683", "doi": "10.1038/s41390-023-02746-4", "abstract": "BACKGROUND: Music for neonatal pain has not been exclusively studied in term neonates in a well-designed trial compared to the standard of care. This study  aims to assess the effectiveness of music intervention as an adjuvant in  relieving acute pain in term newborns undergoing minor painful procedures.  METHODS: This randomized, controlled, blinded trial included any term neonate  undergoing heel prick. Both control and intervention groups received oral sucrose  2 min before heel prick. Intervention group was exposed to 'Bedtime Mozart'  lullaby recorded music via bedside speakers. Pain was measured using Neonatal  Infant Pain Scale (NIPS) at 1-min intervals. Investigators were blinded using  noise-canceling headphones that played random music. RESULTS: A total of 100  neonates were enrolled. Mean gestational age was 39.2 weeks, and mean duration of  the procedure was 113 s. Music group was found to have significantly lower pain  scores [OR = 0.42 (0.31, 0.56), p < 0.001]. Baseline NIPS scores were similar  across groups and there was no interaction effect between groups and time. When  NIPS were categorized as pain and no pain, there continued to be statistically  significant lower NIPS scores in the music group (p < 0.001). CONCLUSION:  Recorded music, in addition to sucrose, is efficacious in reducing pain,  encouraging its use in term neonates. IMPACT: Recorded music effectively reduces  pain induced by minor procedures in term neonates. Clinical studies have shown  that live and recorded music induces changes in vital signs and pain scores in  the NICU's predominantly preterm population. Most of these studies were also  conducted in the white ethnic population. Our study objectively proves reduction  in pain scores by using recorded music in a randomized, controlled, blinded study  of predominantly non-white, term neonates. Recorded music is effective in  reducing acute pain in term neonates and can be widely used even in low-resource  nurseries."}, {"id": 13, "title": "Implementation of the WHO standards to assess quality of care for children with acute pain in EDs: findings of a multicentre study (CHOICE) in Italy.", "authors": "Balestra, Elia; Cozzi, Giorgio; Sforzi, Idanna et al.", "journal": "BMJ paediatrics open", "year": "2024", "vol": "8(Suppl 7)", "doi": "10.1136/bmjpo-2024-002610", "abstract": "BACKGROUND: There is little experience on the use of the WHO Standards for improving the quality of care (QOC) for children. We describe the use of four  prioritised WHO Standard-based Quality Measures to assess the provision of care  for children with pain in emergency departments (EDs). METHODS: In a multicentre  observational study in 10 EDs with different characteristics in Italy, we  collected data on 3355 children accessing the EDs between January 2019 and  December 2020. The association between children and facility characteristics and  quality measures was analysed through multivariate analyses. RESULTS: The  proportion of children whose pain was measured was 68.7% (n=2305), with extreme  variations across different centres (from 0.0% to 99.8%, p<0.001). The proportion  of children treated for pain was 28.9% (n=970) again with a wide range  (5.3%-56.3%, p<0.001). The difference between the frequency of children with pain  measured and pain treated varied widely between the facilities (ranging from  -24.3 to 82). Children with moderate and severe pain were more frequently treated  (48.9% and 62.9% of cases, respectively), although with large variations across  centres (ranges: 0%-74.8% and 0%-100% respectively, p<0.001). After correction  for children's characteristics, the variable more strongly associated with  analysed outcomes was the facility which the child accessed for care. Being a  facility in Northern Italy was associated with a higher rate of pain measurement  (67.3%-95% CI: 39.9% to 94.6%, p<0.001) compared with facilities in South Italy  (-22.1% lower (95% CI: -41.7% to -2.50%, p=0.03). CONCLUSIONS: The use of few WHO  Standard-based measures related to pain can help identifying priority gaps in QOC  for children and in monitoring it over time. There is a need for more  implementation research to establish which are the most sustainable and effective  interventions to improve the QOC for acute pain in children."}, {"id": 14, "title": "Pediatric regional anesthesia and acute pain management: State of the art.", "authors": "Barnett, Natalie R.; Hagen, John G.; Kattail, Deepa", "journal": "Best practice & research. Clinical anaesthesiology", "year": "2024", "vol": "38(2):135-144", "doi": "10.1016/j.bpa.2024.05.003", "abstract": "Pediatric regional anesthesia has been in existence for over 125 years, but significant progress and widespread use has occurred in the last few decades,  with the increasing availability of ultrasound guidance. Evidence supporting the  safety of regional anesthesia when performed under general anesthesia has also  allowed the field to flourish. Newer techniques allow for more precise nerve  blockade and in general this has resulted in more peripheral blocks replacing  central blocks, such as caudal epidurals and spinal anesthesia. Current  controversial topics in the field include the method of obtaining loss of  resistance when placing epidural catheters, the role of regional anesthesia in  compartment syndrome and post-hypospadias repair complications, and utility of  test doses."}, {"id": 15, "title": "High-Dose Opioid Prescribing in Individuals with Acute Pain: Assessing the Effects of US State Opioid Policies.", "authors": "Bradford, Ashley C.; Nguyen, Thuy; Schulson, Lucy et al.", "journal": "Journal of general internal medicine", "year": "2024", "vol": "39(14):2689-2697", "doi": "10.1007/s11606-024-08947-9", "abstract": "BACKGROUND: How state opioid policy environments with multiple concurrent policies affect opioid prescribing to individuals with acute pain is unknown.  OBJECTIVE: To examine how prescription drug monitoring programs (PDMPs), pain  management clinic regulations, initial prescription duration limits, and  mandatory continued medical education affected total and high-dose prescribing.  DESIGN: A county-level multiple-policy difference-in-difference event study  framework. SUBJECTS: A total of 2,425,643 individuals in a large national  commercial insurance deidentified claims database (aged 12-64 years) with acute  pain diagnoses and opioid prescriptions from 2007 to 2019. MAIN MEASURES: The  total number of acute pain opioid treatment episodes and number of episodes  containing high-dose (> 90 morphine equivalent daily dosage (MEDD))  prescriptions. KEY RESULTS: Approximately 7.5% of acute pain episodes were  categorized as high-dose episodes. Prescription duration limits were associated  with increases in the number of total episodes; no other policy was found to have  a significant impact. Beginning five quarters after implementation, counties in  states with pain management clinic regulations experienced a sustained 50%  relative decline in the number of episodes containing > 90 MEDD prescriptions (95  CIs: (Q5: - 0.506, - 0.144; Q12: - 1.000, - 0.290)). Mandated continuing medical  education regarding the treatment of pain was associated with a 50-75% relative  increase in number of high-dose episodes following the first year-and-a-half of  enactment (95 CIs: (Q7: 0.351, 0.869; Q12: 0.413, 1.107)). Initial prescription  duration limits were associated with an initial relative reduction of 25% in  high-dose prescribing, with the effect increasing over time (95 CI:  (Q12: - 0.967, - 0.335). There was no evidence that PDMPs affected high-dose  opioids dispensed to individuals with acute pain. Other high-risk prescribing  indicators were explored as well; no consistent policy impacts were found.  CONCLUSIONS: State opioid policies may have differential effects on high-dose  opioid dispensing in individuals with acute pain. Policymakers should consider  effectiveness of individual policies in the presence of other opioid policies to  address the ongoing opioid crisis."}, {"id": 16, "title": "A scoping review of the epidemiology and treatment of painful procedures in hospitalized neonates: What has changed in the past three decades?", "authors": "Bueno, Mariana; Rao, Megha; Aujla, Prabhlin et al.", "journal": "European journal of pain (London, England)", "year": "2024", "vol": "28(9):1468-1485", "doi": "10.1002/ejp.2294", "abstract": "BACKGROUND: Care of newborns hospitalized in the neonatal intensive care unit (NICU) includes multiple painful procedures/day. Epidemiologic studies have  reported the frequency and nature of procedures and treatment interventions.  However, evidence on the changing trends in the nature and frequency of neonatal  pain procedures or treatments over time is absent or inconclusive. We aimed to  determine the frequency and nature of painful procedures/neonate/day in the NICU.  DATABASES AND DATA TREATMENT: MEDLINE and Embase searches were conducted from  database inception to July 2023. Studies that reported the nature and frequency  of painful procedures and associated pain treatments in neonates were included.  Standard inverse-variance random-effects meta-analyses were used to combine  studies. Heterogeneity between studies was quantified using the I(2) statistic.  RESULTS: Of 2622 unique citations, 64 full-text articles were reviewed; 23 were  included. Six additional studies identified in a previous review, and six  publications from reference lists were added, resulting in 35 studies. The mean  number of painful procedures/neonate/day was 7.38 (95% CI 5.60, 9.17; range <2 to  17). Although the frequency of painful procedures in more recent studies was  reduced, it was not statistically significant (p = 0.16). Painful procedures were  more frequent during longer observation periods. Needle-related procedures were  most common and did not change over time. Procedure-related treatment was  suboptimal and inconsistently reported. CONCLUSIONS: Frequency of painful  procedures in the NICU has shown a clinically important decrease but has not  significantly changed over time. A paradigm shift moving responsibility from  providers to systems in changing pain practices in the NICU is required.  SIGNIFICANCE STATEMENT: The decrease in the daily frequency of painful procedures  in hospitalized neonates might be clinically relevant but is not yet  statistically significant. Pain treatment is insufficiently documented and  reported. This lack of progress in neonatal care might be a result of the  complexity of defining pain and stress; inconsistencies in determining the burden  of procedural pain; the influence of barriers and facilitators on practice  change; and the focus on an individual rather than system responsibility for pain  prevention and treatment."}, {"id": 17, "title": "A fase terminal do filho com câncer: percepções dos profissionais hospitalares", "authors": "Caires, Susana; Antunes, Maria da Conceição; Faria, Maria Augusta et al.", "journal": "Psicol. ciênc. prof", "year": "2024", "vol": "44:e258183-e258183", "doi": "10.1590/1982-3703003258183", "abstract": "O confronto com o câncer de um filho e a percepção da sua morte como inevitável dão lugar a experiências parentais relevantes para a pesquisa científica. Este estudo teve como objetivo investigar, por meio da percepção dos profissionais hospitalares, o modo como os pais experienciam a fase terminal e fim de vida do filho com câncer para melhor compreender os processos psicoemocionais experienciados por esses pais diante da cronicidade da doença e da morte do filho. No sentido de alcançar esse objetivo, realizou-se um estudo qualitativo de tipo fenomenológico envolvendo 17 profissionais de dois hospitais portugueses de referência em oncologia pediátrica. Os dados foram recolhidos com recurso a um guia de entrevista semiestruturada. Na percepção dos profissionais hospitalares, os resultados evidenciam que esses pais experienciam múltiplas dificuldades e preocupações na fase terminal da doença do filho e no pós-morte, bem como um sofrimento extremo e desestruturação biopsicossocial e espiritual na família. O conhecimento aprofundado da fenomenologia desses processos é essencial para o desenho e a implementação de intervenções emocionais, cognitivas, comportamentais e sociais mais ajustadas às dificuldades e preocupações parentais vividas no fim de vida e pós-morte.(AU)"}, {"id": 18, "title": "Paracetamol and ibuprofen fixed-dose combination for the management of acute mild-to-moderate pain in children: strengthening and enhancing of result of  Nominal Group Technique through Delphi consensus.", "authors": "Castagno, Emanuele; Parri, Niccolò; D'Avino, Antonio et al.", "journal": "Italian journal of pediatrics", "year": "2024", "vol": "50(1):223", "doi": "10.1186/s13052-024-01791-x", "abstract": "BACKGROUND: Paracetamol and ibuprofen are the most commonly used drugs for pain treatment in children and their combination has shown improved analgesic effect  compared to treatment with either drug alone. Current literature lacks specific  guidelines regarding the settings in which this combination should be adopted.  METHODS: The survey, conducted with Delphi methodology, involved 75 hospital and  outpatient pediatricians with clinical experience in the management of pain in  children. Pediatricians involved were asked to validate or not the results of the  previous NominalGroup Tecnique (NGT) consensus and thus specify the optimal  clinical settings in which the paracetamol/ibuprofen fixed-dose combination could  be adopted. RESULTS: The results confirm the importance of the fixed-dose  paracetamol and ibuprofen combination for the control of mild-to-moderate acute  pain in children. Particularly, this association seems to be appropriate in case  of headache, earache, odontalgia and musculoskeletal pain, and in specific  settings such as post-operative and post-procedural pain. The broadening of the  panel brought to slight variations in clinical management practices between  hospital and outpatient specialists. Nonetheless, overall consensus supports the  notion that the fixed dose combination is more efficacious than monotherapies and  it is well tolerated. Moreover, experts unanimously agree on the usefulness of  the combination for caregivers, leading to improved adherence and effectiveness.  CONCLUSIONS: Both the NGT consensus and the broader Delphi consensus confirm the  usefulness of the paracetamol-ibuprofen fixed-dose combination in pediatric pain.  This is attributed to its superior effectiveness compared to monotherapies, a  good tolerability profile, and improved compliance and ease of use. Some pain  settings related to chronic, inflammatory and rheumatological pathologies remain  to be investigated to evaluate the use of this combination."}, {"id": 19, "title": "A review and bibliometric analysis of global research on non-pharmacologic management for neonatal and infant procedural pain.", "authors": "Chen, Xin; Li, Ruoyu; Xiong, Anqi et al.", "journal": "Medicine", "year": "2024", "vol": "103(48):e40552", "doi": "10.1097/MD.0000000000040552", "abstract": "Repeated and prolonged exposure to pain can impair neurodevelopmental, behavioral, and cognitive outcomes in newborns. Effective pain management of  newborns is essential, but there is no comprehensive analysis of the status of  neonatal pain non-pharmacologic management research. Original publications  related to the non-pharmacological management of neonatal pain were obtained from  the Web of Science Core Collection (WOSCC) between 1989 and 2024. CiteSpace and  VOSviewer were used to extract information about countries/regions, institutions,  authors, keywords, and references to identify and analyze the research hotspots  and trends in this field. 1331 authors from 51 countries and 548 institutions  published studies on the non-pharmacological management of neonatal pain between  1989 and 2024, with the number of publications showing an overall upward trend.  Canada emerged as the leading country in terms of publication volume, with the  University of Toronto and The Hospital for Sick Children identified as key  research institutions. High-frequency keywords included \"procedural pain,\"  \"management,\" \"sucrose,\" \"analgesia,\" and \"preterm infant,\" resulting in 11  clusters. Keyword emergence analysis revealed that \"neonatal pain,\" \"analgesia,\"  \"oral sucrose,\" and \"oral glucose\" were research hotpots. Analysis of highly  cited papers showed that the most referenced articles were published in the  Clinical Journal of Pain. Researchers' interest in neonatal procedural pain has  increased significantly over the past 30 years. This article can serve as a  theoretical reference for future research on mild to moderate pain in neonates  and infants, and it can provide ideas for exploring novel and secure pain  management strategies."}, {"id": 20, "title": "Opioid use disorder in pediatric populations: considerations for perioperative pain management and precision opioid analgesia.", "authors": "Chen, Yun Han; Xenitidis, Anastasios; Hoffmann, Paul et al.", "journal": "Expert review of clinical pharmacology", "year": "2024", "vol": "17(5-6):455-465", "doi": "10.1080/17512433.2024.2343915", "abstract": "INTRODUCTION: Opioids are commonly used for perioperative analgesia, yet children still suffer high rates of severe post-surgical pain and opioid-related adverse  effects. Persistent and severe acute surgical pain greatly increases the child's  chances of chronic surgical pain, long-term opioid use, and opioid use disorder.  AREAS COVERED: Enhanced recovery after surgery (ERAS) protocols are often  inadequate in treating a child's severe surgical pain. Research suggests that  'older' and longer-acting opioids such as methadone are providing better methods  to treat acute post-surgical pain. Studies indicate that lower repetitive  methadone doses can decrease the incidence of chronic persistent surgical pain  (CPSP). Ongoing research explores genetic components influencing severe surgical  pain, inadequate opioid analgesia, and opioid use disorder. This new genetic  research coupled with better utilization of opioids in the perioperative setting  provides hope in personalizing surgical pain management, reducing pain, opioid  use, adverse effects, and helping the fight against the opioid pandemic. EXPERT  OPINION: The opioid and analgesic pharmacogenomics approach can proactively  'tailor' a perioperative analgesic plan to each patient based on underlying  polygenic risks. This transition from population-based knowledge of pain medicine  to individual patient knowledge can transform acute pain medicine and greatly  reduce the opioid epidemic's socioeconomic, personal, and psychological strains  globally."}, {"id": 21, "title": "The effect of maternal voice and non-nutritional sucking on repeated procedural pain of heel prick in neonates: a quasi-experimental study.", "authors": "Chen, Yushuang; Zhou, Leshan; Tan, Yanjuan", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):256", "doi": "10.1186/s12887-024-04738-7", "abstract": "BACKGROUND: Neonates in the neonatal intensive care unit undergo frequent painful procedures. It is essential to reduce pain using safe and feasible methods.  PURPOSE: To evaluate the effects of non-nutritional sucking, mother's voice, or  non-nutritional sucking combined with mother's voice on repeated procedural pain  in hospitalized neonates. METHODS: A quasi-experimental study was conducted in  which 141 neonates were selected in a hospital in Changsha, China. Newborns were  divided into four groups: non-nutritional sucking (NNS) (n = 35), maternal voice  (MV) (n = 35), NNS + MV (n = 34), and control (n = 37) groups. The Preterm Infant  Pain Profile-Revised Scale (PIPP-R) was used to assess pain. RESULTS: During the  heel prick, the heart rate value and blood oxygen saturation were significantly  different between the groups (P < 0.05). Both non-nutritional sucking and  maternal voice significantly reduced PIPP-R pain scores of hospitalized newborns  (P < 0.05). The pain-relief effect was more robust in the combined group than in  other groups. CONCLUSIONS: This study showed that both non-nutritional sucking  and the mother's voice alleviated repeated procedural pain in neonates.  Therefore, these interventions can be used as alternatives to reduce repeated  procedural pain."}, {"id": 22, "title": "Virtual Reality Distraction for Needle-Related Pain and Distress in Children: A Multicenter Randomized Controlled Trial.", "authors": "Czub, Marcin; Serrano-Ibáñez, Elena R.; Piskorz, Joanna et al.", "journal": "Cyberpsychology, behavior and social networking", "year": "2024", "vol": "27(6):409-419", "doi": "10.1089/cyber.2023.0454", "abstract": "This international multicenter randomized controlled trial aimed to compare the effectiveness of virtual reality (VR) distraction with an identical non-VR game  in reducing needle-related pain and anxiety in children undergoing venous blood  draw. The study involved 304 children aged 5-9 years undergoing a blood draw  procedure, randomly allocated to one of three groups: VR distraction, non-VR  distraction, and control group (usual care). The distraction task was based on  the Multiple Object Tracking (MOT) paradigm, and the game was identical in design  and gameplay for both VR and non-VR distraction groups. The primary outcome was  self-reported pain intensity using the Faces Pain Scale-Revised (FPS-R).  Secondary outcomes included child distress, attention/distraction to the blood  draw, and parent and medical staff satisfaction with procedure. Analyses were  conducted using analysis of variance and multivariable linear regression models.  The results showed that VR distraction and non-VR distraction performed  similarly, showing large effect sizes compared with standard care. There was no  significant difference between the two types of distraction. The study's findings  suggest that VR and non-VR distraction are similarly effective in reducing  needle-related pain and anxiety in children undergoing venous blood draw. This is  the first well-powered study comparing modern VR distraction with an identical  task displayed on a smartphone or monitor screen. The study's results have  important implications for using VR in clinical settings and suggest that  investing in expensive VR equipment for acute pain management may not be  necessary. The study protocol was pre-registered on Open Science Framework at  https://osf.io/frsyc."}, {"id": 23, "title": "Virtual Reality Distraction Is No Better Than Simple Distraction Techniques for Reducing Pain and Anxiety During Pediatric Orthopaedic Outpatient Procedures: A  Randomized Controlled Trial.", "authors": "Fabricant, Peter D.; Gross, Preston W.; Mackie, Alexandra T. et al.", "journal": "Clinical orthopaedics and related research", "year": "2024", "vol": "482(5):854-863", "doi": "10.1097/CORR.0000000000002889", "abstract": "BACKGROUND: In-office procedures can be painful and anxiety-provoking for pediatric patients. Minimizing such pain and anxiety in children improves the  patient experience and promotes a rewarding and productive  patient-caregiver-provider relationship, which may for some young patients be  their first memorable encounter with the healthcare system. Although virtual  reality (VR) techniques have proven to be helpful in minimizing pain and anxiety  during procedures in pediatric intensive care settings, it remains unclear how VR  affects objective and subjective measures of pain and anxiety in children  undergoing in-office orthopaedic procedures such as cast removal or percutaneous  pin removal after fracture healing. QUESTIONS/PURPOSES: Is a VR gaming simulation  more effective than either of two forms of noninteractive visual distraction (VR  goggles or tablet computer displaying a noninteractive video) for reducing (1)  objective measures of pain and anxiety and (2) subjective measures of pain and  anxiety in children undergoing in-office cast removal or percutaneous pin  removal? METHODS: This study was a randomized controlled trial with two parallel,  separately analyzed cohorts: children undergoing in-office cast removal or  in-office percutaneous pin removal at a single urban tertiary institution. We  approached eligible patients who were scheduled to undergo outpatient cast or  percutaneous pin removal and who met prespecified inclusion criteria. We enrolled  until 105 patients were available for analysis in each of the cast removal and  pin removal cohorts. Of note, the study institution was in an urban epicenter of  the coronavirus-19 pandemic, and clinical research was paused sporadically, which  resulted in a longer-than-expected enrollment period. In the cast removal cohort,  all patients were eligible for inclusion and were enrolled and randomized into  one of three groups: VR gaming simulation (n = 37), VR goggles with a  noninteractive video (n = 36), or a tablet computer with the same noninteractive  video (n = 40). Eleven percent (4), 8% (3), and 3% (1) withdrew from each of the  three intervention groups, respectively. In the pin removal cohort, all patients  were eligible for inclusion and were enrolled and randomized into the same three  groups (37, 44, and 41 patients, respectively). In the pin removal group, 14%  (5), 18% (8), and 10% (4) withdrew from each of the three intervention groups,  respectively. In all, 235 patients were enrolled in the study and 210 patients  (mean ± SD age 9 ± 3 years; 48% [100] girls) were included in the final analyses.  There were no clinically important differences in age, gender, preprocedure pain,  or anxiety among the intervention groups. Primary outcomes included  preprocedure-to-maximum heart rate increase (objective measure) and preprocedure  and postprocedure pain and anxiety using a VAS (subjective measures). One-way  ANOVA and Bonferroni-adjusted pairwise comparisons were used to calculate  between-group differences for the primary outcomes. RESULTS: There were no  intervention-level groupwise differences between VR goggles with an interactive  game, VR goggles with a noninteractive video, or the tablet computer with the  same video in preprocedure-to-maximum heart rate increase in the cast removal  cohort (18 ± 21 bpm versus 14 ± 11 bpm versus 20 ± 16 bpm, respectively; largest  mean difference -6 bpm [95% CI -16 to 3]; p = 0.36) or pin removal cohort (27 ±  20 bpm versus 23 ± 12 bpm versus 24 ± 19 bpm, respectively; largest mean  difference 4 bpm [95% CI -7 to 14]; p = 0.99). Similarly, there were no  intervention-level groupwise differences in preprocedure to postprocedure VAS  pain in the cast removal cohort (1 ± 1 versus 1 ± 2 versus 0 ± 2, respectively;  largest mean difference 0 points [95% CI 0 to 1]; p = 0.89) or pin removal cohort  (0 ± 3 versus 2 ± 3 versus 0 ± 3 points, respectively; largest mean difference 1  point [95% CI 0 to 3]; p = 0.13). Finally, there were no intervention-level  groupwise differences between the same intervention groups in preprocedure to  postprocedure VAS anxiety in the cast removal cohort (-2 ± 2 versus -1 ± 2 versus  -1 ± 2 points, respectively; largest mean difference -1 point [95% CI -2 to 1]; p  = 0.63) or pin removal cohort (-3 ± 3 versus -4 ± 4 versus -3 ± 3 points,  respectively; largest mean difference -1 point [95% CI -2 to 1]; p = 0.99).  CONCLUSION: During in-office cast and pin removal in pediatric patients, simple  distraction techniques such as tablet video viewing are as effective as  higher-fidelity VR headset video and interactive games in minimizing objective  measures of procedural pain and subjective measures of pain and anxiety. Because  of these findings and because of the associated costs, implementation logistics,  and variable tolerance by young patients, widespread use of VR distraction  techniques in the pediatric orthopaedic outpatient setting is unnecessary. LEVEL  OF EVIDENCE: Level I, therapeutic study."}, {"id": 24, "title": "Updates From the Other Side of the Drape: Recent Advances in Multimodal Pain Management and Opioid Reduction Among Pediatric Surgical Patients.", "authors": "Franklin, Andrew D.; Tsao, KuoJen; Barq, Rabab et al.", "journal": "Journal of pediatric surgery", "year": "2024", "vol": "59(7):1297-1303", "doi": "10.1016/j.jpedsurg.2024.03.027", "abstract": "As the management of acute pain for children undergoing surgical procedures as well as recognition of the short and long term risks of exposure to opioids has  evolved, multimodal and multidisciplinary approaches using organized pathways has  resulted in improved perioperative outcomes and patient satisfaction. In this  2023 symposium held at the American Academy of Pediatrics on Surgery meeting, a  multidisciplinary discussion on current enhanced recovery after surgery pathways,  alternate methods of effective pain control and education and advocacy efforts  for opioid reduction were discussed, and highlights are included in this article."}, {"id": 25, "title": "Diagnósticos e intervenções de enfermagem em crianças em pósoperatório imediato de queiloplastia", "authors": "Galdino, Monique de Fátima Gregório; Batista, Nayara Tomazi; Martinez, Ana Flávia et al.", "journal": "Enferm. foco (Brasília)", "year": "2024", "vol": "15:1-7", "doi": "10.21675/2357-707X.2024.v15.e-202430", "abstract": "Objetivo: identificar os principais diagnósticos e intervenções de enfermagem em crianças em pós-operatório imediato de queiloplastia. Métodos: estudo documental e retrospectivo, desenvolvido entre março e agosto de 2020, em um hospital público, de nível terciário, referência no tratamento de pacientes com anomalias craniofaciais e síndromes relacionadas. Utilizou-se o Referencial Teórico das Necessidades Humanas Básicas. Referente ao Processo de Enfermagem, foram considerados dados do histórico de enfermagem e, a partir deles, os diagnósticos e as intervenções, por meio das taxonomias da NANDA Internacional e da Nursing Intervention Classification, respectivamente. Utilizou-se a análise estatística descritiva. Resultados: a amostra constou de 78 prontuários. Predominaram as necessidades psicobiológicas: oxigenação, hidratação, nutrição, eliminação, integridade cutâneo-mucosa e física, percepção dolorosa e ambiental. Foram identificados 11 diagnósticos de enfermagem, sendo seis com foco no problema e cinco de risco. Elencaram-se ainda, 14 intervenções de enfermagem. Conclusão: a utilização dos Sistemas de Linguagens Padronizadas norteou a identificação dos diagnósticos e intervenções de enfermagem, subsidiando o raciocínio clínico para a construção e organização do cuidado. (AU)"}, {"id": 26, "title": "Non-pharmacological interventions to reduce procedural needle pain in children (6-12 years): A systematic review.", "authors": "Guillari, Assunta; Giordano, Vincenza; Catone, Maria et al.", "journal": "Journal of pediatric nursing", "year": "2024", "vol": "78:e102-e116", "doi": "10.1016/j.pedn.2024.06.025", "abstract": "PROBLEM: Children of different age groups frequently undergo painful procedures involving needles, which can be a source of significant discomfort. Regrettably,  this aspect of care often receives insufficient attention from healthcare  professionals. The existing literature proposes several methodologies for  managing procedural pain, with nonpharmacological techniques being particularly  promising. These techniques should be adapted to the patient's age, but  literature predominantly emphasizes their use with infants. Thus, it is necessary  to evaluate their effectiveness in diverse age groups. Consequently, the purpose  of this systematic review is to identify non-pharmacological interventions used  to prevent needle-related procedural pain in children (age group 6-12 years).  ELIGIBILITY CRITERIA: Primary studies in English language on non-pharmacological  interventions in children aged 6-12 years undergoing needle-related procedures  found on PubMed, CINAHL and Embase. SAMPLE: A total of 18 studies were included.  RESULTS: The results indicate the potential application of various  non-pharmacological techniques, with distraction methods standing out. These  techniques include activities like utilizing cards, watching cartoons, employing  virtual reality and playing video games. CONCLUSIONS: Children's procedural pain  represents a significant challenge in treatment plans. Literature offers several  approaches, including nonpharmacologic methods, to control this problem.  Prioritizing procedural pain management is critical both at clinical and  organizational levels to improve the quality of pediatric care. IMPLICATIONS:  These findings offer different options to support clinical practice, holding the  potential to enhance the quality of patient care."}, {"id": 27, "title": "Optimizing pediatric periprocedural pain management part I-Evolving ethics and topical anesthetics.", "authors": "Henkel, Emily D.; Haller, Courtney N.; Diaz, Lucia Z. et al.", "journal": "Pediatric dermatology", "year": "2024", "vol": "41(4):577-587", "doi": "10.1111/pde.15635", "abstract": "Pediatric procedure-related pain management is often incompletely understood, inadequately addressed, and critical in influencing a child's lifelong  relationship with the larger health care community. We highlight the evolution of  ethics and expectations around optimizing periprocedural pain management as a  fundamental human right. We investigate the state-of-the-art of topical  anesthetics, reviewing their mechanisms of action and providing comparisons of  their relative safety and efficacy data to help guide clinical selection. In  total, this two-part review offers a combination of conventional approaches and  innovative techniques that should be used multimodally-in series and in  parallel-to help optimize pain management and provide alternatives to sedation  medication and general anesthesia."}, {"id": 28, "title": "Optimizing pediatric periprocedural pain management part II-Adjunct therapies to support the use of infiltrative anesthetics.", "authors": "Henkel, Emily D.; Haller, Courtney N.; Diaz, Lucia Z. et al.", "journal": "Pediatric dermatology", "year": "2024", "vol": "41(4):588-598", "doi": "10.1111/pde.15677", "abstract": "Pediatric procedure-related pain management is often incompletely understood, inadequately addressed, and critical in influencing a child's lifelong  relationship with the larger healthcare community. We present a comprehensive  review of infiltrative anesthetics, including a comparison of their mechanisms of  action and relative safety and efficacy data to help guide clinical selection. We  also describe the multimodal utilization of adjunct therapies-in series and in  parallel-to support the optimization of pediatric periprocedural pain management,  enhance the patient experience, and provide alternatives to sedation medication  and general anesthesia."}, {"id": 29, "title": "Parenting pain away: Quasi-experimental study of an eHealth learning platform to evaluate acceptability, feasibility, and utilisation of parent-led pain  management.", "authors": "Hughes, Brianna; Martin-Misener, Ruth; Latimer, Margot et al.", "journal": "Scandinavian journal of caring sciences", "year": "2024", "vol": "38(4):960-972", "doi": "10.1111/scs.13297", "abstract": "AIM: To evaluate the impact of an eHealth educational resource about infant procedural pain management, given during the prenatal period, on feasibility,  acceptability, knowledge, self-efficacy, and involvement. BACKGROUND: Routine  health care requires newborns to have painful procedures (e.g., intramuscular  injection). The impacts of untreated pain in neonates are widely recognised but  adoption of effective procedural pain management strategies in clinical practice  varies. There is clear evidence supporting the effectiveness of parent-led pain  management during procedures (e.g., skin-to-skin care) and reputable resources to  raise awareness among parents are warranted. Our team co-created Parenting Pain  Away, a website to equip parents with evidence to assist with managing the pain  of procedures and empower them to be involved. METHODS: A quasi-experimental  evaluation using a pre/post intervention design with low-risk expectant parents.  RESULTS: Of the 41 participants, before intervention exposure participants were  familiar or had used skin-to-skin care (n = 33), breastfeeding (n = 30) and  sucrose (n = 13) as pain management. Most participants (n = 38) desired more  information on how to be involved. Providing access to Parenting Pain Away during  pregnancy was supported and participants ranked the website above average using  the System Usability Scale. Parenting Pain Away did not have a statistically  significant influence on outcomes. Participants reported variation in clinical  support with parent-led pain management. CONCLUSION: A multifaceted approach is  recommended to maintain infant procedural pain management. IMPLICATIONS FOR THE  PROFESSION AND PATIENT CARE: Equipping parents with knowledge related to infant  pain management using an eHealth approach satisfied their information desires.  The study findings are important considerations for perinatal care providers,  policy makers, and families to finally achieve adequate procedural pain  management. REPORTING METHOD: This study used the STROBE checklist, adhering to  EQUATOR guidelines. PATIENT AND PUBLIC CONTRIBUTION: A stakeholder group  (expectant parents, parents, perinatal researchers, clinicians, and  administrators) was created to inform the study design and intervention."}, {"id": 30, "title": "[Not Available].", "authors": "Jbebli, Elhem; Jbeli, Yosra; Ben Farhat, Rawia et al.", "journal": "La Tunisie medicale", "year": "2024", "vol": "102(10):677-681", "doi": "10.62438/tunismed.v102i10.4934", "abstract": "INTRODUCTION: Virtual reality is being used more and more in the healthcare field, particularly during treatment. In the context of pain management, the  question arises as to the effectiveness of using virtual reality during care in  reducing the perception of procedural pain. AIM: To study the impact of using  virtual reality on the perception of procedural pain and on the course of care in  pediatric oncology. METHODS: A quasi-experimental, matched-case-control study  conducted at the pediatric oncology unit of the Tunis Children's Hospital over a  three-month period. Each child had two nursing care : with and without the use of  virtual reality. RESULTS: Thirty-two children were enrolled. The sex ratio was  0.88. The edia nage was 96 ± 49 months. The care provided was peripheral venous  line insertion (53%), blood sampling (32%) and port-a-catheter puncture (15%).  The use of virtual reality significantly reduced heart rate (p<0.0001),  respiratory rate (p<0.0001) and pain perception (p<0.0001). Workload was reduced,  as evidenced by a drop in the duration of nursing care (p<0.0001) and in the  number of people needed to carry out care (p<0.0001). CONCLUSIONS: Virtual  reality is a good non-pharmacological alternative for procedural pain control in  a pediatric oncology unit."}, {"id": 31, "title": "Comparing novel virtual reality and nursing standard care on burn wound care pain in adolescents: A randomized controlled trial.", "authors": "Jeffs, Debra A.; Spray, Beverly J.; Baxley, Lauren et al.", "journal": "Journal for specialists in pediatric nursing : JSPN", "year": "2024", "vol": "29(1):e12419", "doi": "10.1111/jspn.12419", "abstract": "PURPOSE: This study compared the effectiveness of age-appropriate, high technology, interactive virtual reality (VR) distraction with standard care (SC)  provided by the nurse on adolescents' acute procedural pain intensity perception  during burn wound care treatment in the ambulatory clinic setting. DESIGN: This  randomized controlled trial included 43 adolescents ages 10-21 from the  ambulatory burn clinic of a large children's hospital. METHODS: Blinded study  participants were randomly assigned to either VR or SC (non-significantly  different, current mean burn surface area, 1.3 and 1.7, respectively) during the  first burn wound care procedure in the burn clinic. Blinded research staff  collected pre-procedure data including Spielberger's State-Trait Anxiety  Inventory and postprocedure wound care pain intensity using the Adolescent  Pediatric Pain Tool. A total of 41 participants completed all study procedures.  RESULTS: No statistically significant difference in burn wound care procedural  pain was noted between the VR and SC groups after adjusting for several factors.  Pre-procedure state and trait anxiety correlated with reported pre-procedure  pain. Wound care pain was found to be significantly associated with pre-wound  care pain score, time from original burn to clinic burn care treatment, and  length of wound care treatment. These factors accounted for approximately 45% of  the variation in pain scores during wound care treatment. PRACTICE IMPLICATIONS:  VR distraction can be a useful pain management strategy but may not take the  place of the unique nurse-patient relationship that occurs during clinical  encounters. Tailoring pain management during burn wound care requires  consideration of anxiety, time from the burn injury to the wound care procedure,  length of time of the wound care procedure, and pretreatment pain level. Knowing  patients' needs, desires, and temperaments along with the specifics about the  healthcare procedures are critical to formulating individualized care plans that  may or may not include VR. Newer technology, such as easier-to-use, less  expensive VR, may assist with translation into practice making its clinical use  more routine."}, {"id": 32, "title": "Effectiveness and safety of Buzzy device in needle-related procedures for children under twelve years of age: A systematic review and meta-analysis.", "authors": "Jin, Faguang; Wang, Xiaofang; Qi, Maomao et al.", "journal": "Medicine", "year": "2024", "vol": "103(15):e37522", "doi": "10.1097/MD.0000000000037522", "abstract": "BACKGROUND: Pain transcends simple physiology, encompassing biological, emotional, psychological, and social facets. Children show pronounced immediate  and enduring responses to pain-related procedures. The aim of this meta-analysis  is to investigate the efficacy and safety of the Buzzy device for needle-related  procedures in children aged twelve years or younger. METHODS: PubMed, Web of  Science, and Embase were searched from inception to July 2023. Only randomized  controlled trials utilizing the Buzzy device for needle-related procedures in  children under twelve years old were included. Two reviewers independently  conducted study selection, data extraction, and risk of bias assessment.  Random-effects models were utilized, and analyses were performed using mean  differences or standardized mean differences as well as risk ratios. RESULTS: A  total of 19 studies were included, involving 2846 participants (Buzzy = 1095,  Control = 1751). Compared to no intervention, the Buzzy device significantly  reduced pain response [self-report SMD = -1.90 (-2.45, -1.36), parental  SMD = -3.04 (-4.09, -1.99), observer SMD = -2.88 (-3.75, -2.02)] and anxiety  scores [self-report SMD = -1.97 (-3.05, -0.88), parental SMD = -2.01 (-2.93,  -1.08), observer SMD = -1.92 (-2.64, -1.19)]. Compared to virtual reality (VR),  the Buzzy device reduced self-reported anxiety levels SMD = -0.47 (-0.77, -0.17),  and compared to distraction cards, the Buzzy device reduced parental and  observer-reported pain [parental SMD = -0.85 (-1.22, -0.48), observer SMD = -0.70  (-1.00, -0.40)] and anxiety [parental SMD = -0.96 (-1.46, -0.47), observer  SMD = -0.91 (-1.40, -0.42)]. Subgroup analysis results showed that procedure  type, patient age, measurement scales used, and distance of operation were not  the reason of heterogeneity. The summarized first puncture attempt success rate  did not differ from other interventions. There were no significant adverse events  in the included studies. CONCLUSION: The Buzzy device reduces pain and anxiety in  children during needle procedures, ensuring success and safety. Additionally, the  effectiveness of the Buzzy device in reducing pain during venipuncture is  superior when compared to its effectiveness during intramuscular injections."}, {"id": 33, "title": "Management of Procedural Pain and Anxiety in Youth With Autism Spectrum Disorder: A Scoping Review.", "authors": "Leblanc, Laurence; Genest, Christine; Villemaire, Jade et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2024", "vol": "25(3):265-284", "doi": "10.1016/j.pmn.2024.02.004", "abstract": "BACKGROUND: Although there is a body of literature on the implementation of interventions to manage procedural pain and anxiety in youth with autism spectrum  disorders (ASD), we found no literature presenting the current state of knowledge  on this topic. OBJECTIVES: To review the state of knowledge on interventions for  the management of procedural pain and anxiety in children and adolescents with  ASD. METHOD: A scoping review using PRISMA-ScR was conducted. DATA SOURCES:  PubMed, MEDLINE, all EBM reviews, Embase, APA PsychInfo, EBSCO CINAHL, and  ProQuest Dissertations and Theses Global databases were searched. Gray literature  was also searched. ANALYSIS METHOD: Braun and Clarke's (2006) model for thematic  analysis in psychology was used to synthesize the search results. RESULTS: Thirty  articles were selected. Analysis of the extracted data revealed four elements of  intervention for better management of procedural pain and anxiety in the study  population: 1) characteristics of the procedure and the immediate environment; 2)  parent-child interactions; 3) health care provider-child interactions; and 4)  direct pharmacological and nonpharmacological interventions. IMPLICATIONS FOR  NURSING PRACTICE: Nurses must be able to implement appropriate interventions for  the management of procedural pain and anxiety in youth with an autism spectrum  disorder."}, {"id": 34, "title": "Utilization of local pressure devices in pain management during injections: scoping review", "authors": "Moura, Jefferson Wildes da Silva; Bitencourt, Aline de Souza; Silva, Thiago Lopes et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2024", "vol": "77(3):e20230399-e20230399", "doi": "10.1590/0034-7167-2023-0399", "abstract": "ABSTRACT  Objective: to map scientific evidence regarding the use of local pressure devices in pain relief during injection procedures in patients.  Methods: scoping review, following the recommendations of the JBI Manual for Evidence Synthesis and PRISMA-ScR, with searches conducted in the PubMed, EMBASE, CINAHL, LILACS, and PsycINFO databases, without temporal restrictions and with a cutoff date of March 2023.  Results: a total of 1,514 studies were identified, with 20 articles included in the final sample. The ShotBlocker® device was utilized during subcutaneous and intramuscular injections in children and adults, proving beneficial in reducing pain, anxiety, and fear associated with the procedure.  Final considerations: the ShotBlocker® is a low-cost, easy-to-use device that can enhance nursing clinical practice during painful procedures. However, studies involving the Brazilian Pikluc® device are scarce. Further research involving both local pressure devices is recommended."}, {"id": 35, "title": "The feasibility of a Swiss complex interprofessional intervention to improve the management of procedural pain in neonates in the Finnish context: A qualitative  study.", "authors": "Mäki-Asiala, Mariaana; Balice-Bourgois, Colette; Axelin, Anna et al.", "journal": "Scandinavian journal of caring sciences", "year": "2024", "vol": "38(4):1005-1017", "doi": "10.1111/scs.13298", "abstract": "AIM: To evaluate the feasibility of the Swiss complex interprofessional intervention, NEODOL© (NEOnato DOLore), for improving the management of  procedural pain in neonates in the Finnish context. BACKGROUND: Interprofessional  collaboration is important for all professionals involved in the care of neonates  and for neonates' parents, to understand the appropriate use of  non-pharmacological and/or pharmacological methods for each pain situation and  how to assess pain in real-life situations. Appropriate methods of pain relief  for neonates should be preferred as they protect the development of the neonate's  brain. DESIGN: A descriptive qualitative design. METHOD: Data were collected  through semi-structured focus group discussions following the Medical Research  Council's framework for evaluation of complex interventions, in this case NEODOL©  which aims to improve the procedural pain management of neonates. A purposive  sample (n = 13) included eleven professionals representing various professions  within Finnish Neonatal Intensive Care Units and two parents of infants who have  received care in a Neonatal Intensive Care Unit. Data were analysed using  inductive content analysis, and the results were reported in accordance with the  COREQ guidelines. RESULTS: Professionals' and parents' evaluations suggest that  NEODOL© is feasible, because it is consistent and addresses a current need. They  assessed its overall content to be relevant and accessible, and its components to  be internally coherent. However, they emphasise the need for further evaluation  and refinement of the intervention to achieve the desired outcomes and  cost-effectiveness. CONCLUSIONS: While NEODOL© is considered feasible, it  requires further evaluation and refinement in the local context of each hospital  before implementation."}, {"id": 36, "title": "Comment on 'Intervention strategies for white noise alleviating procedural pain in newborns: A systematic review'.", "authors": "Ou, Guangshun; Zhang, Xuesong", "journal": "Journal of clinical nursing", "year": "2024", "vol": "33(9):3784-3785", "doi": "10.1111/jocn.17145", "abstract": ""}, {"id": 37, "title": "The efficacy of socially assistive robots in improving children's pain and negative affectivity during needle-based invasive treatment: A systematic review  and meta-analysis.", "authors": "Pan, Xin-Yun; Bi, Xuan-Yi; Nong, Yan-Ning et al.", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):643", "doi": "10.1186/s12887-024-05116-z", "abstract": "BACKGROUND: The ability of socially assistive robots (SARs) to treat dementia and Alzheimer's disease has been verified. Currently, to increase the range of their  application, there is an increasing amount of interest in using SARs to relieve  pain and negative emotions among children in routine medical settings. However,  there is little consensus regarding the use of these robots. OBJECTIVE: This  study aimed to evaluate the effect of SARs on pain and negative affectivity among  children undergoing invasive needle-based procedures. DESIGN: This study was a  systematic review and meta-analysis of randomized controlled trials that was  conducted in accordance with the Cochrane Handbook guidelines. METHODS: The  PubMed, CINAHL, Web of Science, Cochrane Library, Embase, CNKI, and WanFang  databases were searched from inception to January 2024 to identify relevant  randomized controlled trials (RCTs). We used the Cochrane Risk of Bias tool 2.0  (RoB2.0) to assess the risk of bias among the included studies, and we used  RevMan 5.4 software to conduct the meta-analysis. The Grading of Recommendations,  Assessment, Development, and Evaluation (GRADE) framework was used to assess the  quality of the evidence. RESULTS: Ten RCTs involving 815 pediatric subjects were  selected for this review and reported outcomes related to pain and emotions  during IV placement, port needle insertion, flu vaccination, blood sampling, and  dental treatment. Children undergoing needle-related procedures with SARs  reported less anxiety (SMD= -0.36; 95% CI= -0.64, -0.09) and fewer distressed  avoidance behaviors (SMD= -0.67; 95% CI= -1.04, -0.30) than did those receiving  typical care. There were nonsignificant differences between these groups in terms  of in pain (SMD = -0.02; 95% CI = - 0.81, 0.78) and fear (SMD = 0.38; 95% CI=  -0.06, 0.82). The results of exploratory subgroup analyses revealed no  statistically significant differences based on the intervention type of robots or  anesthetic use. CONCLUSIONS: The use of SARs is a promising intervention method  for alleviating anxiety and distress among children undergoing needle-related  procedures. However, additional high-quality randomized controlled trials are  needed to further validate these conclusions. TRIAL REGISTRATION: The protocol of  this study has been registered in the database PROSPERO (registration ID:  CRD42023413279)."}, {"id": 38, "title": "Evaluation of pain-alleviating strategies during allergy shots (subcutaneous immunotherapy): a randomized controlled pilot study.", "authors": "Pfieffer, J.; Wehmeier, K.; Gee, K. et al.", "journal": "European annals of allergy and clinical immunology", "year": "2024", "vol": "56(3):128-136", "doi": "10.23822/EurAnnACI.1764-1489.312", "abstract": "Background. Subcutaneous immunotherapy (SCIT) is a potential disease-modifying therapy effective for treatment of various allergic disorders. Pain and fear are  common concerns of children, which can pose stress and result in negative  experiences. The purpose of this study was to evaluate and compare the  effectiveness of three marketed distraction devices and ethyl chloride spray (a  routinely used topical anesthetic agent for painful procedures), the current  clinical standard of care in reducing the perception of needle pain during SCIT  administration in children. Methods. 40 children, aged 4-17 years, receiving SCIT  with use of one of three alternative pain therapies or with standard practice  were enrolled. Participants were randomly assigned to one of the pain-modifying  interventions. The three interventional groups were ShotBlocker(®) (Bionix,  Toledo, OH, USA), Buzzy(®) I (Pain Care Labs, Atlanta, GA, USA) (vibration only),  and Buzzy(®) II (vibration with ice). Control group was ethyl chloride spray. The  study consisted of two visits during SCIT administration process. Results. Of  these 40 children, 12 received the ShotBlocker, 8 received the Buzzy I, 11  received the Buzzy II, and 9 received ethyl chloride spray (control group).  Conclusions. There were no significant differences found between each of the  distraction devices and between the control group. Type II error/false negative  finding cannot be ruled out because of a small sample. Therefore, we cannot  conclude that no true difference exists between each distraction device and the  control group simply because of occurrence of a non-significant P-value in our  study."}, {"id": 39, "title": "Efeitos das relações familiares no manejo da dor em recém-nascido: revisão integrativa", "authors": "Prado, Tamires de Assis Vasconcellos; Leonello, Daniela de Castro Barbosa; Lelis, Beatriz Dutra Brazão et al.", "journal": "Rev. Enferm. Atual In Derme", "year": "2024", "vol": "98(2)", "doi": "10.31011/reaid-2024-v.98-n.2-art.2232", "abstract": "Objetivo: Analisar, na literatura, os efeitos das relações familiares no manejo da dor em recém-nascidos. Método: Revisão sistemática com busca e seleção nas seguintes bases de dados: MEDLINE, SCOPUS, Embase, Web of Scienc
