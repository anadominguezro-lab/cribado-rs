0492", "abstract": "Resumo  Objetivo  Compreender a experiência da empatia de enfermeiras com os recém-nascidos hospitalizados em Unidade de Terapia Intensiva Neonatal.  Métodos  Pesquisa fenomenológica hermenêutica. Foram realizadas 11 entrevistas com enfermeiras de uma Unidade de Terapia Intensiva Neonatal, localizada em Cuiabá/Mato Grosso, Brasil. A coleta ocorreu entre maio e agosto de 2018. Os dados foram analisados de acordo com a análise temática proposta por Max van Manen.  Resultados  As enfermeiras interagem com diversos recém-nascidos durante seu trabalho, destas interações somente algumas ganharam a especificidade de serem significadas como empáticas. Na empatia, as enfermeiras são mobilizadas pelo significado que atribuem à experiência de ver o neonato na incubadora, dentre estes, destacam-se o sentido de ter ou não afeto materno, a leitura da expressão do choro, a carga de procedimentos dolorosos sofrida pelo recém-nascido, o tempo de internação e a identificação da dor. A conduta que as enfermeiras tiveram ao serem empáticas expressa uma centralidade afetiva com o uso do corpo que dá colo, conversa, acaricia, toca, em parte pela tentativa de suprir a ausência do afeto das mães.  Conclusão  Evidencia-se o trabalho subjetivo da enfermeira nos episódios de empatia, e suas potencialidades em tornar o cuidado de enfermagem humanizado para os recém-nascidos hospitalizados, bem como os desafios e limitações que a empatia pode trazer ao trabalho das enfermeiras."}, {"id": 103, "title": "Evidence-Based Nursing Practices for the Prevention of Newborn Procedural Pain in Neonatal Intensive Therapy-An Exploratory Study.", "authors": "Popowicz, Hanna; Kwiecień-Jaguś, Katarzyna; Mędrzycka-Dąbrowska, Wioletta et al.", "journal": "International journal of environmental research and public health", "year": "2022", "vol": "19(19)", "doi": "10.3390/ijerph191912075", "abstract": "BACKGROUND: Due to the progress in neonatology, in particular, in the past three decades, the mortality rate among patients of intensive care units has decreased.  However, this is connected not only with newborns needing to stay longer in the  unit, but also with the exposure of newborns to many painful procedures and  stresses. Lack of or insufficient pain prevention has a negative impact on the  sensory or locomotor development of newborns. Despite the presence of guidelines  based on scientific evidence, the use of pharmacological and non-pharmacological  pain-management methods in newborns is still insufficient. AIM: The aim of the  study was to: identify the knowledge nurses/midwives have of recommended  non-pharmacological and/or pharmacological methods, in particular, in relation to  medical intervention procedures; assess the interventions for pain relief applied  by midwives/nurses most often in their clinical practice; examine the role of  age, general work experience, education level and years of work of medical  professionals on a neonatal ward, as well as the referral level of a unit, versus  the application of pharmacological and non-pharmacological methods. METHODS: A  descriptive and quantitative study conducted in 2019 among Polish nurses/midwives  working at neonatal intensive care units. RESULTS: The analysis of the material  reflected the deficit of knowledge and the insufficient daily use of recommended  pain-relief measures among the respondents. CONCLUSIONS: The interpretation of  data indicates that despite the clear and easily available recommendations of  scientific societies concerning the mode of conduct in particular medical  procedures, medical personnel do not apply those recommendations in their  everyday practice. It is necessary to plan and implement education strategies for  nurses/midwives on standard pain-management interventions during painful medical  procedures."}, {"id": 104, "title": "Uso da realidade virtual durante a punção venosa em crianças hospitalizadas: estudo descritivo", "authors": "Ribeiro, Daiane Lopes; Barbieri, Aline; Uema, Roberta Tognollo Borotta et al.", "journal": "Online braz. j. nurs. (Online)", "year": "2022", "vol": "21:e20226588-e20226588", "doi": "10.17665/1676-4285.20226588", "abstract": "OBJETIVO: Descrever o uso da realidade virtual durante a punção venosa em crianças hospitalizadas. MÉTODO: Estudo descritivo, de abordagem quantitativa, realizado por meio de observação da punção venosa em crianças em uso de óculos de realidade virtual, em uma unidade de internação pediátrica de um hospital da região noroeste do Paraná. Os dados foram coletados no período de agosto a setembro de 2019. RESULTADOS: Foram observadas 16 crianças com idades entre quatro e oito anos que receberam o procedimento concomitante ao uso dos óculos. Os escores de dor foram predominantemente leves em ambas as faixas etárias e o comportamento psicotomotor mais evidenciado foi um desconforto pequeno. CONCLUSÃO: O estudo demonstrou que as punções realizadas com o uso da realidade virtual apresentaram escores de dor leves e no tangente ao manejo da dor, seu uso pode ser uma alternativa benéfica dentro da assistência pediátrica na realização de procedimentos dolorosos."}, {"id": 105, "title": "Multisensory stimulation as a non-pharmacological intervention for neonates undergoing painful procedures: A scoping review.", "authors": "Sharma, N.; Samuel, A. J.", "journal": "Journal of neonatal-perinatal medicine", "year": "2022", "vol": "15(4):677-687", "doi": "10.3233/NPM-221087", "abstract": "AIM: The aim of this review is to identify available evidence on MSS practices as a pain-relieving intervention among neonates undergoing a repetitive painful  procedure. METHODS: Searches were performed in the following databases: PubMed/  MEDLINE, SCOPUS, CINAHL, and the physiotherapy evidence database (PEDro). A total  of eight studies were identified, among them; studies related to MSS in relieving  neonatal procedural pain were conducted only in three countries only. RESULTS:  Data collected from the identified studies were extracted by two independent  reviewers, and were synthesized quantitatively, and qualitatively. Eight studies  involving six hundred and eighty-six neonates in three countries were identified  in the search. Among them, six were randomized controlled trials, and two were  observational studies. The study results highlighted that implementation of MSS  as a non-pharmacological pain-relieving intervention follows a similar protocol  among the reviewed articles, but varies by who administers MSS (Physiotherapists/  Nurses/Mothers) in neonates undergoing repetitive painful procedures.  INTERPRETATION: Standardized MSS protocol should be followed globally along with  its implementation for reducing procedural pain among neonates and also to  promote good clinical practice in neonatal intensive care unit (NICU) settings.  Future research could determine the effects of standardized MSS protocol either  with or without other non-pharmacological interventions among neonates undergoing  painful procedures."}, {"id": 106, "title": "A randomized controlled trial on virtual reality distraction during venous cannulation in young children.", "authors": "Thybo, Kasper H.; Friis, Susanne M.; Aagaard, Gitte et al.", "journal": "Acta anaesthesiologica Scandinavica", "year": "2022", "vol": "66(9):1077-1082", "doi": "10.1111/aas.14120", "abstract": "BACKGROUND AND OBJECTIVES: Pain management in children is often inadequate, and the single most common painful procedure in children who are hospitalized is  needle procedures. Virtual reality (VR) has been shown to decrease anxiety and  pain in children undergoing painful procedures primarily in children from the age  of 7 years. Our aim for this study is to investigate patient satisfaction and  pain reduction by using a three-dimensional VR interactive game as a distraction  in 4-7 years old children during venous cannulation. METHODS: In this randomized  clinical trial, we enrolled 106 children aged 4-7 years who were scheduled for  venous cannulation. Patients assigned to the control group were adherent to  standard of care, including topical numbing cream, positioning, and distraction  in this group by games of choice on a tablet/smartphone. In the study group,  children were adherent to standard of care and were distracted by an interactive  VR game. Primary outcomes were patient satisfaction and the procedural pain  assessed by using Wong-Baker Faces Pain Rating Scale; secondary outcomes were the  procedural time and any adverse events. RESULTS: We found an overall high level  of patient satisfaction with our regime of topical numbing cream, positioning,  and distraction. The primary outcome of pain during the procedure was median  20 mm (IQR 0-40) and 20 mm (IQR 0-55) (Wong-Baker 0-100 mm) in the VR group and  the control group, respectively (difference: 0 mm, 95%CI: 0-20, p = .19). No  significant difference was found in procedural times. The number of adverse  effects was low, with no significant difference between the two groups.  CONCLUSIONS: VR distraction is an acceptable form of distraction for children  4-7 years old when combined with topical numbing cream and positioning during  preoperative venous cannulation. No difference was found between VR- and  smartphone/tablet distraction."}, {"id": 107, "title": "Effects of Distraction on Reducing Pain During Invasive Procedures in Children with Cancer: A Systematic Review and Meta-Analysis.", "authors": "Tran Thi, Thu Hang; Konara Mudiyanselage, Sriyani Padmalatha; Huang, Mei-Chih", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2022", "vol": "23(3):281-292", "doi": "10.1016/j.pmn.2021.12.002", "abstract": "BACKGROUND: Distraction is a known behavioral intervention that is widely used for pain management in the pediatric population. However, there is a shortage of  reviews reporting the efficacy of distraction for procedural pain reduction in  pediatric oncology settings. AIM: To determine the current evidence on the  effects of distraction on procedural pain in children with cancer. DESIGN: This  systematic review and meta-analysis was undertaken according to the Preferred  Reporting Items for Systematic Reviews and Meta-Analyses guidelines SETTINGS: Six  different databases from 1990 to June 2019. METHOD: A literature search was  conducted to identify the effects of distraction on procedural pain reduction in  children with cancer. A meta-analysis was undertaken along with applying a mixed  effect model to quantify the standardized mean difference in the 95% confidence  interval (CI) as the overall effects. RESULTS: Ten randomized controlled trials  were included. Distraction during an invasive procedure had a large effect on  pain intensity (-0.92, 95% CI -1.48 to -0.36, p = .001) and on needle insertion  as well (-1.12, 95% CI -1.52 to -0.72, p = .000), but only a moderate effect on  lumbar puncture procedures (-0.57, 95% CI -1.02 to -0.12, p = .012). Uncertain  effects on pain relief showed up in a virtual reality (VR) distraction (-0.93,  95% CI -2.63 to 0.76, p = .28) and during active distraction (-0.72, 95% CI -1.48  to 0.03, p = .06). CONCLUSIONS: Distraction is an efficacious intervention to  reduce procedural pain during needle insertion or lumbar puncture procedures in  children with cancer. However, the efficacy of active distraction and VR remain  uncertain. Future research should focus on specific comparisons of different  forms of distractions with larger sample sizes."}, {"id": 108, "title": "Construção de um bundle para alívio da dor na punção arterial norteado pela Tradução do Conhecimento", "authors": "Uema, Roberta Tognollo Borotta; Shibukawa, Bianca Machado Cruz; Rissi, Gabrieli Patricio et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2022", "vol": "26:e20220181-e20220181", "doi": "10.1590/2177-9465-ean-2022-0181pt", "abstract": "RESUMO  Objetivo descrever o processo de construção e estratégias de implementação de um bundle para alívio da dor durante a punção arterial do bebê hospitalizado.  Métodos estudo de abordagem qualitativa feito em uma unidade de terapia intensiva neonatal, por meio de rodas de conversa realizadas com a equipe de enfermagem. A coleta dos dados ocorreu de fevereiro a maio de 2019.  Resultados os encontros levaram à construção de um bundle composto por quatro itens, formatado ludicamente e que deveria ser anexado à incubadora, previamente à realização da punção.  Conclusões e Implicações para a prática o processo estimulou a reflexão crítica acerca da própria prática e os profissionais referiram ao uso do bundle como algo possível dentro da unidade, mediante um planejamento para sua inclusão na rotina assistencial. O estudo é pioneiro e apresenta caráter de inovação ao utilizar o bundle para aliviar algo multifacetado como a dor no período neonatal. Apesar de ser algo criado especificamente para a punção arterial, o mesmo pode ser aplicado em demais procedimentos que potencialmente geram dor aguda, uma vez que o foco principal é sempre minimizar o desconforto sentido pelo bebê."}, {"id": 109, "title": "Error traps in acute pain management in children.", "authors": "Vecchione, Tricia M.; Agarwal, Rita; Monitto, Constance L.", "journal": "Paediatric anaesthesia", "year": "2022", "vol": "32(9):982-992", "doi": "10.1111/pan.14514", "abstract": "Providing effective acute pain management to hospitalized children can help improve outcomes, decrease length of stay, and increase patient and parental  satisfaction. Error traps (circumstances that lead to erroneous actions or  undesirable consequences) can result in inadequately controlled pain, unnecessary  side effects, and adverse events. This article highlights five error traps  encountered when managing acute pain in children. They include failure to  appropriately assess pain, optimally utilize regional anesthesia, select suitable  systemic analgesics, identify and treat medication-related side effects, and  consider patient characteristics when choosing medication or dosing route. These  issues are easily addressed when the clinician is cognizant of ways to  anticipate, identify, and mitigate or avoid these errors."}, {"id": 110, "title": "NIH's Helping to End Addiction Long-term(SM) Initiative (NIH HEAL Initiative) Clinical Pain Management Common Data Element Program.", "authors": "Wandner, Laura Dover; Domenichiello, Anthony F.; Beierlein, Jennifer et al.", "journal": "The journal of pain", "year": "2022", "vol": "23(3):370-378", "doi": "10.1016/j.jpain.2021.08.005", "abstract": "The Helping to End Addiction Long-term Initiative (NIH HEAL Initiative) is an aggressive trans-NIH effort to speed solutions to stem the national opioid public  health crisis, including through improved pain management. Toward this end, the  NIH HEAL Initiative launched a common data element (CDE) program to ensure that  NIH-funded clinical pain research studies would collect data in a standardized  way. NIH HEAL Initiative staff launched a process to determine which pain-related  core domains should be assessed by every clinical pain study and what  questionnaires are required to ensure that the data is collected uniformly. The  process involved multiple literature reviews, and consultation with experts  inside and outside of NIH and the investigators conducting studies funded by the  initiative. Ultimately, 9 core pain domains, and questionnaires to measure them,  were chosen for studies examining acute pain and chronic pain in adults and  pediatric populations. These were augmented with dozens of study-specific  supplemental questionnaires to enable uniform data collection methods of outcomes  outside of the core domains. The selection of core domains will ensure that  valuable clinical pain data generated by the initiative is standardized, useable  for secondary data analysis, and useful for guiding future research, clinical  practice decisions, and policymaking. PERSPECTIVE: The NIH HEAL Initiative  launched a common data element program to ensure that NIH-funded clinical pain  research studies would collect data in a standardized way. Nine core pain domains  and questionnaires to measure them were chosen for studies examining acute pain  and chronic pain in adults and pediatric populations."}, {"id": 111, "title": "A randomized trial of robot-based distraction to reduce children's distress and pain during intravenous insertion in the emergency department.", "authors": "Ali, Samina; Manaloor, Robin; Ma, Keon et al.", "journal": "CJEM", "year": "2021", "vol": "23(1):85-93", "doi": "10.1007/s43678-020-00023-5", "abstract": "OBJECTIVES: Our objectives were to evaluate the effectiveness of humanoid robot-based distraction on reducing distress and pain in children undergoing  intravenous insertion. METHODS: A two-arm, open-label randomized controlled trial  was conducted April 2017-May 2018, in a pediatric emergency department (ED). A  sample of 86 children aged 6-11 years who required intravenous insertion were  recruited. Exclusion criteria included hearing/visual impairments, neurocognitive  delay, sensory impairment to pain, previous enrollment, and ED clinical staff  discretion. Outcome measures included the Observed Scale of Behavioral  Distress-Revised (OSBD-R) (distress) and the Faces Pain Scale-Revised (FPS-R)  (pain). RESULTS: Of the 86 children recruited (median age 9 years, IQR 7,10); 55%  (47/86) were male, 9% (7/82) were premature, 82% (67/82) had a previous ED visit,  31% (25/82) had a previous hospitalization and 78% (64/82) had previous  intravenous insertion. Ninety-six percent (78/81) received topical anesthetic  prior to intravenous insertion. Total OSBD-R distress score was 1.49 ± 2.36  (standard care) versus 0.78 ± 1.32 (robot) (p < 0.05). FPS-R pain score was 4  (IQR 2,6) (standard care) versus 2 (IQR 0,4) (robot) (p = 0.13). Parental anxiety  immediately after the procedure was 36.7 (11.1) (standard care) versus 31.3 (8.5)  (robot) (p = 0.04). Parents were more satisfied with pain management in the  robotic distraction group (95% vs 72% very satisfied) (p = 0.002). CONCLUSIONS:  Humanoid robot-based distraction therapy is associated with a modest positive  impact on child distress for pediatric intravenous insertion, but not pain. It  can be considered a potential tool in the ED toolkit for procedural  pain-associated distress reduction. CLINICAL TRIAL REGISTRATION:  Clinicaltrials.gov Identifier: NCT02997631."}, {"id": 112, "title": "Recent Applications of Virtual Reality for the Management of Pain in Burn and Pediatric Patients.", "authors": "Ang, Samuel P.; Montuori, Michael; Trimba, Yuriy et al.", "journal": "Current pain and headache reports", "year": "2021", "vol": "25(1):4", "doi": "10.1007/s11916-020-00917-0", "abstract": "PURPOSE OF REVIEW: Virtual reality, via integration of immersive visual and auditory modalities, offers an innovative approach to pain management. The  purpose of this review is to investigate the clinical application of virutal  reality as an adjunct analgesic to standard of care, particularly in pediatric  and burn patients. RECENT FINDINGS: Although relatively new, virtual reality has  been successfully implemented in a wide range of clinical scenarios for  educational, diagnostic, and therapeutic purposes. Most recent literature  supports the use of this adjunct analgesic in reducing pain intensity for  pediatric and burn patients undergoing acute, painful procedures. This summative  review demonstrates the efficacy of virtual reality in altering pain perception  by decreasing pain and increasing functionality among pediatric and burn  patients. However, large, multi-center randomized controlled trials are still  warranted to generalize these findings to more diverse patient demographics and  medical scenarios."}, {"id": 113, "title": "Pediatric Pain Remains Undertreated.", "authors": "Beal, Judy A.", "journal": "MCN. The American journal of maternal child nursing", "year": "2021", "vol": "46(5):300", "doi": "10.1097/NMC.0000000000000745", "abstract": ""}, {"id": 114, "title": "Evaluation of Pain in the Pediatric Emergency Department and the Request of Analgesia.", "authors": "Bergeron, Jennifer; Bailey, Benoit", "journal": "Pediatric emergency care", "year": "2021", "vol": "37(7):e356-e359", "doi": "10.1097/PEC.0000000000002475", "abstract": "OBJECTIVES: To determine the acute pain level associated with request for analgesia by children and their parents in the pediatric emergency department  (ED) when pain was assessed by verbal numeric scale (VNS), visual analog scale  (VAS), and verbal rating scale (VRS). METHODS: A secondary analysis of a  prospective cohort study using a sample of children aged 8 to 17 presenting to  the ED with acute pain. Patients and their parents were asked to quantify the  child's pain on the VNS, VAS, and VRS. Scores for patients and parents who  answered \"yes\" to the request of analgesia were compared with those responding  \"no.\" RESULTS: A total of 202 patients aged 12.2 ± 2.6 years were enrolled. The  median levels of pain associated with a request of analgesia and no request for  analgesia by the patient were: 6.0 (4.0-7.4) and 5.0 (3.0-6.0) (Δ 1.0; 95%  confidence interval [CI], 0.5-2.0) for the VNS; 5.7 (3.9-7.2) and 4.3 (2.6-5.8)  (Δ 1.3; 95% CI, 0.6-1.9) for the VAS; and 2.0 (2.0-2.0) and 2.0 (1.0-2.0) (Δ 0.0;  95% CI, 0.0-0.0) for the VRS. CONCLUSIONS: Children who requested analgesia had  higher pain scores on the VNS and the VAS, than those who did not request  analgesia. No difference was demonstrated with the VRS. The pain scores between  the analgesia request categories could overlap. This suggests that children seen  in the ED should be asked if they want analgesia to decrease their acute pain."}, {"id": 115, "title": "A Randomized Controlled Trial of Virtual Reality in Awake Minor Pediatric Plastic Surgery Procedures.", "authors": "Clerc, Paul G. B.; Arneja, Jugpal S.; Zwimpfer, Charlotte M. et al.", "journal": "Plastic and reconstructive surgery", "year": "2021", "vol": "148(2):400-408", "doi": "10.1097/PRS.0000000000008196", "abstract": "BACKGROUND: Virtual reality has been used to alleviate pain and anxiety in a variety of medical procedures. The authors sought to explore the effects of  virtual reality in common awake minor plastic surgery procedures where children  may experience discomfort. METHODS: A randomized controlled trial compared  virtual reality to standard-of-care distraction among children aged 6 to 16 years  undergoing awake minor plastic surgery procedures at a quaternary children's  hospital. Primary outcome was change in Faces Pain Scale-Revised pain score, and  secondary outcomes included change in Venham Situational Anxiety Scale score,  procedure duration, administration of local anesthetic, and pain/anxiety  management satisfaction. RESULTS: Mean pain and anxiety scores were similar in  both groups (p = 0.60 and p = 0.18, respectively), and procedure duration was  shorter with virtual reality (22 minutes versus 29 minutes; p = 0.002). Duration  remained shorter in a linear regression model accounting for procedure type (p =  0.01). Similar proportions of children received additional local anesthetic after  the initial dose (virtual reality, n = 6; standard of care, n = 9; p = 0.19) and  median pain management satisfaction was similar (virtual reality, 9 of 10;  standard of care, 9 of 10; p = 0.41). Median anxiety management satisfaction was  similar (virtual reality, 9 of 10; standard of care, 9 of 10; p = 0.05). Younger  children reported more \"fun\" than older children with virtual reality (p = 0.02).  Surgeons reported interest \"using virtual reality again\" in 83 percent of cases.  CONCLUSIONS: The use of virtual reality for awake pediatric plastic surgery  reduced procedure time but not pain or anxiety compared to standard of care in  children aged 6 to 16 years. Virtual reality was safe and well-liked and should  be considered as an additional tool. Increased efficiency may allow more cases to  be performed. CLINICAL QUESTION/LEVEL OF EVIDENCE: Therapeutic, II."}, {"id": 116, "title": "Percepção da criança hospitalizada acerca do brinquedo terapêutico instrucional na terapia intravenosa", "authors": "Coelho, Hercules Pereira; Souza, Gilberto dos Santos Dias de; Freitas, Victor Hamilton da Silva et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2021", "vol": "25(3):e20200353-e20200353", "doi": "10.1590/2177-9465-ean-2020-0353", "abstract": "Resumo  Objetivo analisar a percepção da criança hospitalizada quanto ao uso do brinquedo terapêutico instrucional no preparo para a terapia intravenosa.  Método estudo descritivo, com abordagem qualitativa, realizado em um hospital pediátrico público no município de Juazeiro do Norte - Ceará, entre os meses de julho a setembro de 2019. Participaram do estudo 31 crianças em idade pré-escolar e escolar. Os dados foram coletados por meio de uma entrevista semiestruturada e, posteriormente, analisados por meio do software IRAMUTEQ.  Resultados diante da percepção das crianças acerca da terapia intravenosa, foi averiguado que elas compreenderam a técnica a partir da utilização do brinquedo terapêutico instrucional. Quando a criança tem a oportunidade de brincar e dramatizar a terapia intravenosa, por meio do brinquedo terapêutico instrucional, a ansiedade, a dor, a angústia, a solidão, o medo e o choro são atenuados.  Conclusões e implicações para a prática orientar as crianças quanto à realização da terapia intravenosa favorece sua compreensão quanto aos reais benefícios desta técnica para a sua saúde, possibilitando, ainda, a compreensão do enfermeiro quanto às condições que representam riscos para a criança e intervenha em tempo hábil por meio da utilização de estratégias que favoreçam a recuperação da saúde e a minimização de traumas subsequentes advindos da hospitalização."}, {"id": 117, "title": "Perspectives of Aging Adults Who Frequently Seek Emergency Department Care.", "authors": "Colorafi, Karen; Thomas, Amy; Wilson, Marian et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2021", "vol": "22(2):184-190", "doi": "10.1016/j.pmn.2020.10.003", "abstract": "BACKGROUND: The number of people managing chronic conditions is growing with the rapidly aging population. Visits to the emergency department are steadily rising,  but little is known about the rationale of those seeking emergent care. AIMS: The  goal of this study was to better understand, from the patients' perspective, the  reasons for seeking care in an emergency department setting. DESIGN: A  qualitative descriptive design was used to interview aging adults with at least  two chronic conditions who made three or more visits to the emergency department  within a year. PARTICIPANTS/SUBJECTS: The eight-person sample was 88% female and  75% white, with an average age of 54 years. METHODS: Participant interviews were  conducted with a semistructured interview guide. Conventional content analysis  was used to examine words and phrases in professionally transcribed documents.  Qualitative methods for testing and confirming conclusions were performed.  RESULTS: We discovered that aging adults visit the emergency department to seek  relief from unrelenting pain and to overcome barriers to receiving treatment for  pain in ambulatory settings. Participants reported feeling judged when seeking  emergency department care for pain management. CONCLUSIONS: Participants  described emergency department care as the only option in response to several  barriers to healthcare access. Most commonly, emergency department care was  sought when relief from persistent or acute pain was required. One way to reduce  strain on EDs from pain-related visits is to manage patients with persistent pain  more proactively in their community environment."}, {"id": 118, "title": "Cognitive Behavior Therapy Tailored to Anxiety Symptoms Improves Pediatric Functional Abdominal Pain Outcomes: A Randomized Clinical Trial.", "authors": "Cunningham, Natoshia R; Kalomiris, Anne; Peugh, James et al.", "journal": "J Pediatr", "year": "2021", "vol": "230:62-70.e3", "doi": "10.1016/j.jpeds.2020.10.060", "abstract": "OBJECTIVES: To evaluate the feasibility of a stepped care model, and establish the effect of a tailored cognitive behavioral therapy, the Aim to Decrease Anxiety and Pain Treatment (ADAPT), compared with standard medical treatment as usual on pain-related outcomes and anxiety. STUDY DESIGN: Eligible patients between the ages of 9 and 14 years with functional abdominal pain disorders (n = 139) received enhanced usual care during their medical visit to a gastroenterologist. Those that failed to respond to enhanced usual care were randomized to receive either a tailored cognitive behavioral therapy (ADAPT) plus medical treatment as usual, or medical treatment as usual only. ADAPT dose (4 sessions of pain management or 6 sessions of pain and anxiety management) was based on presence of clinically significant anxiety. Outcomes included feasibility, based on recruitment and retention rates. Response to ADAPT plus medical treatment as usual vs medical treatment as usual on pain-related outcomes and anxiety measures was also investigated using a structural equation modeling equivalent of a MANCOVA. Anxiety levels and ADAPT dose as moderators of treatment effects were also explored. RESULTS: Based on recruitment and retention rates, stepped care was feasible. Enhanced usual care was effective for only 8% of youth. Participants randomized to ADAPT plus medical treatment as usual showed significantly greater improvements in pain-related disability, but not pain levels, and greater improvements in anxiety symptoms compared with those randomized to medical treatment as usual only. Anxiety and ADAPT treatment dose did not moderate the effect of treatment on disability nor pain. CONCLUSIONS: Tailoring care based on patient need may be optimal for maximizing the use of limited psychotherapeutic resources while enhancing care. TRIAL REGISTRATION: ClinicalTrials.gov: NCT03134950."}, {"id": 119, "title": "Repercussões do cuidado transpessoal mediado pelo Reiki em familiares de crianças com doença falciforme", "authors": "Dantas Mürbeck, Amarry; Lima Falcão Do Vale, Paulo Roberto; Bezerra Do Amaral, Juliana et al.", "journal": "Cienc. enferm. (En línea)", "year": "2021", "vol": "27:13-13", "doi": "10.29393/cs27-13rdap50013", "abstract": "RESUMO Objetivo: Descrever as repercussões do cuidado transpessoal mediados pelo Reiki em familiares de crianças com doença falciforme. Material e Métodos: Pesquisa Convergente Assistencial, pautada na Teoria do Cuidado Humano de Jean Watson, realizado em município da Bahia, Brasil, entre agosto e outubro de 2016, onde sete familiares de crianças com a doença falciforme receberam terapia Reiki por 40 minutos por seis semanas consecutivas e responderam a entrevistas semiestruturadas antes e após as sessões. Resultados: Os participantes perceberam benefícios relacionados com a diminuição de sintomas como cefaleia, fadiga, dores abdominais, cólicas, tremores no corpo, constipação intestinal e diarreia; outros efeitos foram sobre o self como diminuição do estresse e ansiedade, conexão com Deus e renovação da fé, prática de hábitos saudáveis, melhor sociabilidade, aumento da autoestima, melhora dos lapsos da memória recente e busca do equilíbrio e paz; ocorreram ainda repercussões sobre a interação com a criança, relacionamento com familiares e eliminação do pensamento de abandono do lar. Conclusões: O cuidado transpessoal mediado pelo Reiki pode ser utilizado para prevenção, reabilitação e paliativo. Ele reúne conteúdo teórico-metodológico para ser incluído no processo de trabalho da equipe de enfermagem. A Teoria do Cuidado Humano em conjunto com as práticas de cuidado integrativas e complementares de saúde afasta a Enfermagem do modelo tecnicista e amplia a autonomia da enfermeira para tomada de decisões no cuidado às famílias em processos de adoecimento crônico."}, {"id": 120, "title": "Massage therapy as a non-pharmacological analgesia for procedural pain in neonates: A scoping review.", "authors": "Fitri, Siti Yuyun Rahayu; Nasution, Siti Khadijah; Nurhidayah, Ikeu et al.", "journal": "Complementary therapies in medicine", "year": "2021", "vol": "59:102735", "doi": "10.1016/j.ctim.2021.102735", "abstract": "INTRODUCTION: Neonates who undergo painful medical procedures should be given analgesics to reduce future adverse risks. The evidence for massage therapy (MT)  as an analgesic method still varies, both in its terminology and implementation.  Only a few studies on this topic have been conducted using a standardised trial  approach. This review can thus become the basis for better future research.  OBJECTIVE: This review aims to identify literature on MT practices as a method to  manage or control pain in neonates undergoing painful procedures. METHODS: The  methodology for this review followed the JBI scoping review methodology  guidelines. Searches were performed in several databases: MEDLINE (PubMed),  CINAHL (EBSCO), Scopus (Elsevier) and EMBASE. Data collected were then extracted  by two independent reviewers, synthesised and presented in the form of tables and  narratives. RESULTS: Fifteen studies involving a total of 1,058 neonates in nine  countries were identified in the search as meeting the criteria set for this  review. One study was a comparative study, five were quasi-experiment studies and  nine were randomised control trials (RCT). CONCLUSION: The implementation of  massage as a non-pharmacological analgesic method for neonates undergoing painful  procedures varied among the reviewed studies. Differences were identified in  terms of the body part massaged, the duration and intensity of the massage, the  level of pressure and the combination of massage with other methods. All studies  presented positive results for reducing pain intensity in neonates undergoing  procedural pain. Therefore, it is crucial that the method used for giving massage  should be practical, accurate and safe."}, {"id": 121, "title": "Positioning Effects for Procedural Pain Relief in NICU: Systematic Review.", "authors": "Francisco, Anilsa Suraya Pedro Gaspar; Montemezzo, Dayane; Ribeiro, Simone Nascimento Dos Santos et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2021", "vol": "22(2):121-132", "doi": "10.1016/j.pmn.2020.07.006", "abstract": "OBJECTIVES: To systematically review the literature regarding the effectiveness of different positioning methods for procedural pain relief in neonates admitted  to the Neonatal Intensive Care Unit (NICU). DESIGN: A systemized search of the  literature was carried out by means of two independent evaluators through the  systematic search of electronic index databases. DATA SOURCES: A search for  relevant studies was performed in four databases (Medline, Web of Science,  Scopus, and BVS-BIREME). REVIEW/ANALYSIS METHODS: Manual searches were conducted  on suitable references from the included articles, and 1,941 publications were  eligible for the analysis. The flowchart for the articles' selection was based on  Preferred Reporting Items for Systematic Reviews and Meta-Analyses  (PRISMA) criteria, and in relation to bias risks according to the Physiotherapy  Evidence Database (PEDro) scale. RESULTS: Based on the inclusion criteria, only  20 publications remained. According to the PEDro scale, 75% of the studies  presented good methodological quality, with scores between 6 and 8, and 5% scored  ≤4 points. None of them were blinded in relation to the therapies, but all of  them performed intergroup statistical comparisons. According to the results of  this review, we recommend facilitated tucking by parents (FTP) in NICU of at  least 30 minutes duration, starting 15 minutes before, during the painful  procedure, and 15 minutes after to relieve pain and to stabilize the  physiological, hormonal, and behavioral responses of the newborns. CONCLUSIONS:  Positioning should be used as a nonpharmacological strategy for procedural pain  relief in newborns. This review showed that facilitated tucking by parents for  30 minutes was the best position for pain relief in premature newborns during  procedures in the NICU. Positioning is recommended as a nonpharmacological method  for pain relief; FTP of at least 30 minutes duration should be the first  positioning choice during procedures in the NICU."}, {"id": 122, "title": "Effect of combined pharmacological, behavioral, and physical interventions for procedural pain on salivary cortisol and neurobehavioral development in preterm  infants: a randomized controlled trial.", "authors": "Gao, Haixia; Xu, Guihua; Li, Fang et al.", "journal": "Pain", "year": "2021", "vol": "162(1):253-262", "doi": "10.1097/j.pain.0000000000002015", "abstract": "Repeated procedural pain may lead to increased secretion of cortisol and future neurobehavioral development disorders in preterm infants. Changes in the cortisol  level may mediate the effect of neonatal repetitive procedural pain on altered  childhood neurobehavioral development in preterm infants. However, few studies  have investigated the effect of combined pharmacological, behavioral, and  physical interventions over repeated painful procedures on pain response,  cortisol level, and neurobehavioral development. This study examined (1) the  efficacy and safety of sucrose combined with massage, music, non-nutritive  sucking, and gentle human touch to treat preterm infants with repeated procedural  pain; (2) the cortisol level at discharge from the neonatal intensive care unit  (NICU); (3) neurobehavioral development at 40 weeks' corrected gestational age;  and (4) the potential mediating effect of the cortisol level in the combined  interventions on neurobehavioral development. Stable preterm infants (n = 76)  were randomized to receive routine care or combined interventions across repeated  painful procedures throughout their NICU stay. The Premature Infant Pain Profile  scores in the early, middle, and late periods of the NICU stay were measured, as  were the basal salivary cortisol level at admission and discharge, the Neonatal  Behavioral Neurological Assessment score at 40 weeks' corrected gestational age,  and the incidence of adverse effects during the study period. Our findings  indicated that the combined interventions remained efficacious and safe for  reducing repeated procedural pain, decreased the cortisol level at discharge, and  promoted early neurobehavioral development in preterm infants. This effect may  have been mediated through decreased cortisol levels and reduced repeated  procedural pain."}, {"id": 123, "title": "Cognitive load and the effectiveness of distraction for acute pain in children.", "authors": "Gaultney, Wendy M.; Dahlquist, Lynnda M.; Quiton, Raimi L.", "journal": "European journal of pain (London, England)", "year": "2021", "vol": "25(7):1568-1582", "doi": "10.1002/ejp.1770", "abstract": "BACKGROUND: Distraction tasks that place continuous, high demand on executive resources have been shown to reduce pain intensity and pain unpleasantness  ratings in some healthy adult samples. We examined the effects of a high-demand  'working memory' 1-back task compared to a low-demand 'motor control' task on  pain intensity and unpleasantness ratings in healthy children. Additionally,  dispositional mindfulness was examined to explore the mechanisms of distraction  on the affective processing of pain. METHODS: Fifty-seven children (9-13 years  old) experienced three randomly presented heat levels (not painful, slightly  painful, moderately painful) during two distraction conditions involving  different levels of cognitive load (a high load 'working memory' task and a low  load 'motor' control task) in counter-balanced order. Children completed measures  of dispositional mindfulness, and attentional control and emotional control.  RESULTS: As predicted, children's pain intensity and pain unpleasantness ratings  were lower in the high load condition compared to the low load condition. These  differences were amplified in the moderately painful heat trials. In contrast  with predictions, dispositional mindfulness did not significantly predict the  effectiveness of distraction. Dispositional mindfulness was significantly related  to measures of children's attentional and emotional control abilities; however,  an exploratory serial mediation model did not produce significant indirect or  overall effects to suggest a strong influence of mindfulness on the effectiveness  of distraction. CONCLUSIONS: Results demonstrate that distraction that places  higher demand on executive resources is more effective for acute pain management  for children. Further research is needed to explore cognitive and affective  moderators of the effectiveness of distraction for children. SIGNIFICANCE: This  study is one of the first to demonstrate that working-memory engagement can  attenuate pain intensity and pain unpleasantness in children aged 9-13. The  findings suggest that distraction tasks used in clinical settings for moderately  painful medical procedures may benefit more children if they are adequately  demanding of cognitive resources."}, {"id": 124, "title": "The effect of virtual reality on pain, fear, and anxiety during access of a port with huber needle in pediatric hematology-oncology patients: Randomized  controlled trial.", "authors": "Gerçeker, Gülçin Özalp; Bektaş, Murat; Aydınok, Yeşim et al.", "journal": "European journal of oncology nursing : the official journal of European Oncology Nursing Society", "year": "2021", "vol": "50:101886", "doi": "10.1016/j.ejon.2020.101886", "abstract": "PURPOSE: Port needle insertions are painful and distressing for Pediatric Hematology-Oncology patients. Virtual Reality (VR) can be used during  needle-related procedures in these patients. This study aimed to investigate the  effect of VR distraction during access to the venous port with a Huber needle in  reducing needle-related pain, fear, and anxiety of children and adolescents with  cancer. METHODS: This randomized controlled study used a parallel trial design  guided by the CONSORT checklist. The sample of children (n = 42) was allocated to  the VR group (n = 21) and the control group (n = 21). Port needle-related pain  was assessed using the Wong-Baker Faces Pain Rating Scale after the procedure.  Before and after the port needle insertion procedure, anxiety and fear assessed  using self- and parent-report using the Children's Anxiety Meter and Child Fear  Scale. The primary outcome was the patient-reported pain scores after the  procedure and fear and anxiety scores before and after the procedure. Pain,  anxiety, and fear scores of the two groups and within groups were analyzed and  also Spearman correlation analysis was used. RESULTS: Self-reported pain scores  of patients in the VR and control group were 2.4 ± 1.8 and 5.3 ± 1.8,  respectively. This study found a statistically significant difference between  groups in pain scores (p < .001). A statistically significant difference was  found between groups according to the self- and parent-reported fear and anxiety  scores after the procedure. Self-reported fear scores in the VR and control group  were 0.8 ± 0.9, 2.0 ± 1.0, self-reported anxiety scores were 2.9 ± 2.0,  5.4 ± 2.0, respectively (p < .001). CONCLUSION: Virtual reality is an effective  distraction method in reducing port needle-related pain, fear, and anxiety in  Pediatric Hematology-Oncology patients. ClinicalTrials.gov NCT04093154."}, {"id": 125, "title": "Effect of an Immersive Virtual Reality Intervention on Pain and Anxiety Associated With Peripheral Intravenous Catheter Placement in the Pediatric  Setting: A Randomized Clinical Trial.", "authors": "Gold, Jeffrey I.; SooHoo, Michelle; Laikin, Andrea M. et al.", "journal": "JAMA network open", "year": "2021", "vol": "4(8):e2122569", "doi": "10.1001/jamanetworkopen.2021.22569", "abstract": "IMPORTANCE: The inclusion of digital therapeutics (eg, virtual reality [VR] systems) for the management of pain and anxiety associated with routine acutely  painful medical procedures may have a substantial impact on treatment adherence  and improve long-term health outcomes among young patients. OBJECTIVE: To  determine whether a VR intervention decreases pain and anxiety among patients  undergoing peripheral intravenous catheter (PIVC) placement compared with  standard care in the pediatric setting. DESIGN, SETTING, AND PARTICIPANTS: This  randomized clinical trial was conducted from April 12, 2017, to July 24, 2019,  among 107 patients aged 10 to 21 years who were undergoing PIVC placement in 2  clinical settings (a radiology department and an infusion center) at an urban  pediatric academic medical center in the US. Patients, caregivers, and clinicians  completed pre-PIVC and post-PIVC placement questionnaires measuring patient pain,  anxiety, and anxiety sensitivity; only participants with complete data from  before and after PIVC placment were included in the analyses. INTERVENTIONS:  Patients were randomized to receive standard care (simple distraction techniques  [eg, music, coloring, singing, and talking] and the application of numbing cream)  or a VR intervention using a balanced computer-generated randomization scheme  stratified by sex. All patients who received the VR intervention were offered  concurrent standard care; however, VR plus standard care was not specifically  examined. MAIN OUTCOMES AND MEASURES: Primary outcomes were patient pain  (measured by the Faces Pain Scale-Revised) and anxiety (measured by a visual  analogue scale) reported by the patient, caregiver, and clinician after PIVC  placement. Outcomes were analyzed using generalized linear modeling with backward  stepwise selection for final model building. RESULTS: A total of 107 patients  (median age, 14.7 years [interquartile range, 12.8-16.9 years]; 63 male  participants [58.9%]) completed the clinical trial; 54 patients received standard  care, and 53 patients also received the VR intervention. Patients who received  the VR intervention compared with standard care had significantly lower mean  post-PIVC anxiety scores when patient-reported (1.85 points [95% CI, 1.28-2.41  points] vs 3.14 points [95% CI, 2.59-3.68 points]; P < .001) and  clinician-reported (2.04 points [95% CI, 1.37-2.71 points] vs 3.34 points [95%  CI, 2.69-3.99 points]; P = .002). Patients in the VR group vs the standard care  group also had significantly lower mean post-PIVC pain scores when  patient-reported (1.34 points [95% CI, 0.63-2.05 points] vs 2.54 points [95% CI,  1.78-3.30 points]; P = .002), caregiver-reported (1.87 points [95% CI, 0.99-2.76  points] vs 3.01 points [95% CI. 1.98-4.03 points]; P = .04), and  clinician-reported (2.05 points [95% CI, 1.47-2.63 points] vs 3.59 points [95%  CI, 2.97-4.22 points]; P < .001). Aside from lower levels of baseline pain and  anxiety, no demographic variables among patients in the VR group were associated  with lower levels of post-PIVC pain and anxiety. CONCLUSIONS AND RELEVANCE: In  this randomized clinical trial, patients undergoing PIVC placement who received a  VR intervention experienced significantly less anxiety and pain compared with  those who received standard care. The use of patient, caregiver, and clinician  data provided a variety of subjective information, as well as observable and  objective data regarding perceived pain and anxiety beyond patient reporting  alone. TRIAL REGISTRATION: ClinicalTrials.gov Identifier: CHLA-15-00549."}, {"id": 126, "title": "Using Social Media to Disseminate Effective Pain Treatments for Newborns During Needle-Related Painful Procedures in China.", "authors": "Hu, Jiale; Xue, Feng; Zhou, Yiyan et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2021", "vol": "35(4):E50-E57", "doi": "10.1097/JPN.0000000000000602", "abstract": "Social media has become a powerful approach to disseminating evidence to knowledge users. The BSweet2Babies video was developed in multiple languages  showing the effectiveness of sweet solutions, skin-to-skin care, and  breastfeeding during newborn painful procedures. This study aimed to disseminate  the BSweet2Babies video in Chinese through social media platform of WeChat in  China; evaluate the reach, acceptability, and recommendation of the video; and  assess viewers' previous knowledge and experience of using the 3 strategies and  intention to use these strategies in the future. Multiple dissemination  strategies were used to maximize views for a 6-month dissemination period. The  video received 19 812 views, 4306 \"thumbs,\" and 671 participants completed  surveys. Of the survey respondents, 393 were parents. Most respondents did not  know these strategies and did not use or help parents use any of them. More  healthcare professionals than parents intended to use or advocate for sweet  solutions and breastfeeding. More healthcare professionals rated that the 3  strategies were easy to apply in real-life situations, but more parents evaluated  that the length of the video was too long. Social media in China can be a  promising approach to disseminating evidence on neonatal procedural pain  treatments to healthcare professionals and the public."}, {"id": 127, "title": "Low-Dose Ketamine Infusion as Adjuvant Therapy during an Acute Pain Crisis in Pediatric Patients.", "authors": "Li, Cecilia; Doellner, Courtney; Leis, Aleda et al.", "journal": "Journal of pain & palliative care pharmacotherapy", "year": "2021", "vol": "35(1):31-37", "doi": "10.1080/15360288.2021.1873216", "abstract": "Recent studies in pediatric patients have suggested that ketamine, an N-methyl-D-aspartate receptor (NMDA) antagonist, given at sub-anesthetic doses  can effectively decrease pain scores, provide analgesic effects, and in some  cases, reduce opioid requirements. Our study aims to assess impact of low-dose  ketamine on reducing pain scores and total opioid requirements during an acute  pain crisis in pediatric patients. From November 2016 to December 2018, eight  patients between the ages of 2 and 17 years admitted to the pediatric intensive  care unit (PICU) were treated with LDK infusions to manage severe,  opioid-refractory, acute pain crises. Subjective pain scores and total morphine  milligram equivalent (MME) intake before, during, and after ketamine infusion  were collected through a structured chart review. Overall, the addition of  ketamine appeared to reduce subjective pain scores and opioid requirements. Two  patients were in palliative care and expired shortly after ketamine was started  and two patients were discharged within 48 hours of LDK infusion cessation.  Ketamine seemed to reduce heart rate and had no appreciable effect on respiratory  rate, blood pressure, or oxygen saturation. Hallucination was reported in one  patient which resolved upon dose reduction. LDK infusion could be considered as  an adjuvant therapy to optimize pain control in pediatric patients experiencing  acute pain crises. Further investigation with a larger patient population is  warranted to establish the effects of LDK on pain improvement and reducing total  opioid requirements."}, {"id": 128, "title": "Virtual Reality to Reduce Procedural Pain During IV Insertion in the Pediatric Emergency Department: A Pilot Randomized Controlled Trial.", "authors": "Litwin, Sasha P.; Nguyen, Cynthia; Hundert, Amos et al.", "journal": "The Clinical journal of pain", "year": "2021", "vol": "37(2):94-101", "doi": "10.1097/AJP.0000000000000894", "abstract": "OBJECTIVE: The objective of this study was to evaluate the feasibility of using virtual reality (VR) for distraction during intravenous (IV) insertion in the  pediatric emergency department (ED) and of conducting a full-scale randomized  controlled trial. MATERIALS AND METHODS: Children aged 8 to 17 years old  attending a tertiary care pediatric ED were randomized to interactive VR or an  attention control (video on a tablet) for distraction during their IV insertion.  Feasibility was determined by recruitment rates, acceptability of the  intervention, response rates to outcome measures, and safety or technical  problems. Satisfaction questionnaires and pain, fear, and distress scores were  completed by the child, caregiver, nurse, and research assistant. Immersion in  the intervention was rated by the child. Heart rate was measured. RESULTS:  Children were recruited between February 2018 and May 2019. A total of 116  children were screened and 72.3% of eligible children were enrolled. Overall, 60  children were randomized to either VR (n=32) or attention control (n=28).  Children, caregivers, and nurses were highly satisfied with both distraction  methods. There were no significant safety, technical, or equipment issues. There  was minimal disruption to clinical workflow in both groups due to study  protocols. There was a clinically significant reduction in pain in the VR group.  There was no significant difference in fear or distress. Children reported higher  immersion in the VR environment. Heart rate increase from baseline was higher in  the VR group. DISCUSSION: Our data support the feasibility of using VR for  distraction during IV insertion and of conducting a full-scale randomized  controlled trial. Identifying eligible patients and minimizing the number of  outcome measures will be important considerations for future research."}, {"id": 129, "title": "Contato pele a pele e amamentação no alívio da dor do recém-nascido submetido à punção do calcanhar no alojamento conjunto: estudo piloto de ensaio clínico randomizado", "authors": "Magesti, Bruna Nunes", "journal": "", "year": "2021", "vol": "202-202", "doi": "", "abstract": "Introdução: Durante sua permanência no alojamento conjunto, o recém-nascido é submetido a diversos procedimentos considerados dolorosos, sendo a punção do calcanhar um dos mais dolorosos e mais realizados em recém-nascidos saudáveis e a termo. Com isso, é importante tratar a dor em recém-nascidos para reduzir qualquer impacto negativo no desenvolvimento e funcionamento do cérebro em longo prazo. Objetivos: Comparar o efeito do contato pele a pele e da amamentação isolados nas respostas de dor através do tempo basal, em recém-nascidos a termo submetidos à punção do calcanhar para verificação da glicemia no alojamento conjunto. Metodologia: Trata-se de um estudo piloto de ensaio clínico randomizado, realizado no período de setembro de 2019 a março de 2020, no alojamento conjunto de uma Maternidade Escola localizada no Rio de Janeiro com amostra de 18 recém-nascidos alocados no grupo intervenção (contato pele a pele) ou grupo controle ativo (amamentação). O estudo foi composto por três períodos: período basal, período de intervenção e período pós-punção. A face dos recém-nascidos foi filmada durante todas os períodos da coleta de dados para posterior análise através dos movimentos faciais fronte saliente, fenda palpebral estreitada e sulco nasolabial aprofundado. A frequência cardíaca e a saturação de oxigênio também foram monitoradas e posteriormente avaliadas. Os dados foram analisados através de estatística descritiva e inferencial utilizando o Programa estatístico R® versão 4.0.3. O estudo foi aprovado pelos Comitês de Ética em Pesquisa da instituição proponente e da coparticipante com os números dos pareceres 3.192.251 e 3.210.073, respectivamente, e encontra-se registrado na Plataforma Registro Brasileiro de Ensaios Clínicos com o registro RBR-5trktfy. Resultados: Dos 46 recém-nascidos elegíveis, 18 foram incluídos no estudo, sendo 09 alocados no grupo intervenção e 09 no grupo controle ativo. No grupo intervenção pode-se observar diferença significativa na frequência cardíaca máxima durante o período de intervenção em relação ao período basal, indicando que houve um aumento da frequência cardíaca máxima enquanto em contato pele a pele. No grupo controle ativo, não houve diferença significativa na frequência cardíaca máxima quando comparado o período de intervenção com o período basal. Já no período pós-punção, ambos os grupos apresentaram diferença significativa para a frequência cardíaca máxima quando comparada aos níveis apresentados no período basal. Em ambos os grupos, a saturação de oxigênio mínima foi significativamente diferente no período de intervenção quando comparado ao período basal. Porém, observou-se que a saturação de oxigênio retornou aos níveis apresentados no período basal somente no grupo contato pele a pele. Constatou-se que a intervenção contato pele a pele diminuiu a média de saturação de oxigênio quando comparado à intervenção amamentação. Pode-se afirmar que os recém-nascidos do grupo contato pele a pele tiveram um aumento significativo na média de tempo dos movimentos faciais fronte saliente e sulco nasolabial aprofundado quando comparados aos do grupo amamentação. Conclusão: Não houve diferença significativa entre as intervenções contato pele a pele e amamentação para as variáveis fisiológicas e para as variáveis comportamentais. Portanto, deve-se estimular cada vez mais a utilização do contato pele a pele e da amamentação como medidas não farmacológicas para o alívio da dor dos recém-nascidos que se encontram no alojamento conjunto."}, {"id": 130, "title": "Effects of Sucrose and Nonnutritive Sucking on Pain Behavior in Neonates and Infants undergoing Wound Dressing after Surgery: A Randomized Controlled Trial.", "authors": "Mandee, Sahatsa; Buachai, Kusuma; Aroonpruksakul, Naiyana et al.", "journal": "European journal of pediatric surgery : official journal of Austrian Association of Pediatric Surgery ... [et al] = Zeitschrift fur Kinderchirurgie", "year": "2021", "vol": "31(5):439-444", "doi": "10.1055/s-0040-1716883", "abstract": "INTRODUCTION:  Wound dressing, a procedure that pediatric patients are commonly exposed to postoperatively, can cause strong physiological and pain behavioral  responses despite being brief. This study evaluated the effects of using 24%  sucrose plus a pacifier versus a pacifier alone to reduce the pain response from  dressing wounds in neonates and infants. MATERIALS AND METHODS:  Thirty-two  neonates and infants who underwent surgery and required postoperative wound  dressing were randomized to a pacifier group (n = 16) and a 24% sucrose plus  pacifier group (\"sucrose group\"; n = 16). Demographic data, crying time, and pain  behaviors were recorded using a video recorder. The pain behaviors were assessed  independently using the neonatal infant pain scale (NIPS) by three assessors, who  were expert in pediatric pain assessment and blinded to the subject allocations.  RESULTS:  Participants in the sucrose group were older than those in the pacifier  group (6.19 ± 2.95 vs. 3.88 ± 3.2 months). While there were no differences in the  NIPS scores of the two groups at 30, 120, and 240 seconds, the incidence of  moderate-to-severe pain was lower in the sucrose group than the pacifier group at  120 seconds (37.5 vs. 50%). The crying time was lower in the sucrose group, but  without statistical significance. CONCLUSION:  The 24% sucrose plus pacifier was  not superior to the pacifier alone in decreasing pain behavioral responses.  Dressing wound pain produced a high-intensity pain behavioral response. A pain  management strategy should be developed to lessen the postoperative procedural  pain in pediatric patients."}, {"id": 131, "title": "Cuidado e desenvolvimento do recém-nascido prematuro em unidade de terapia intensiva neonatal: revisão de escopo", "authors": "Martins, Karoline Petricio; Freire, Márcia Helena de Souza; Pechepiura, Elaine Priscila et al.", "journal": "REME rev. min. enferm", "year": "2021", "vol": "25:e1414-e1414", "doi": "10.5935/1415.2762.20210062", "abstract": "RESUMO  Objetivo: identificar as evidências sobre o cuidado desenvolvimental de recém-nascidos prematuros em unidade de terapia intensiva neonatal.  Método: revisão de escopo, conforme as diretrizes do Instituto Joanna Briggs® e do PRISMA-ScR. Realizou-se a busca em três bases de dados, Pubmed/MEDLINE, SCOPUS e Web of Science, mediante descritores e sinônimos. A coleta de dados ocorreu de agosto de 2019 a janeiro de 2020.  Resultados: incluíram-se 15 estudos, publicados entre 1997 e 2018. Identificou-se a abordagem direta ao Programa Individualizado de Avaliação e Cuidados Centrados no Desenvolvimento (NIDCAP) em três estudos, os demais discorrem sobre a filosofia do cuidado e apresentam estratégias comumente recomendadas pelo programa, sem descrevê-las, a exemplo: uso de sacarose durante procedimentos dolorosos; desenvolvimento de protocolo de cuidados; Método Canguru; música; redução da dor e do estresse durante o exame de retinopatia; voz materna; e método de banho enrolado.  Conclusão: quanto aos efeitos das estratégias desenvolvimentais aplicadas, observou-se melhora no desenvolvimento cerebral, na competência funcional e na qualidade de vida dos neonatos muito prematuros, minimizando as influências ambientais negativas. Reitera-se que a família é parte essencial do cuidado desenvolvimental, assim como o envolvimento responsável da equipe de Enfermagem que deve ser norteado pelas diretrizes da filosofia do cuidado."}, {"id": 132, "title": "Oxycodone target concentration dosing for acute pain in children.", "authors": "Morse, James D.; Hannam, Jacqueline A.; Anderson, Brian J. et al.", "journal": "Paediatric anaesthesia", "year": "2021", "vol": "31(12):1325-1331", "doi": "10.1111/pan.14282", "abstract": "BACKGROUND: Oxycodone pharmacokinetics have been described in premature neonates through to obese adults. Covariate influences have been accounted for using  allometry (size) and maturation of oxycodone clearance with age. The target  concentration is dependent on pain intensity that may differ over pain duration  or between individuals. METHODS: We assumed a target concentration of  35 mcg.L(-1) (acceptable range ±20%) to be associated with adequate analgesia  without increased risk of adverse effects from respiratory depression.  Pharmacokinetic simulation was used to estimate dose in neonates through to obese  adults given intravenous or parenteral oxycodone. RESULTS: There were 84% of  simulated oxycodone concentrations within the acceptable range during maintenance  dosing. Variability around the simulated target concentration decreased with age.  The maturation of oxycodone clearance is reflected in changes to  context-sensitive halftime where clearance is immature in neonates compared with  older children and adults. The intravenous loading and maintenance doses for a  typical 5-year-old child are 100 mcg.kg(-1) and 33 mcg.kg(-1) .h(-1) . In a  typical adult, the loading dose is 100 mcg.kg(-1) and maintenance dose  23 mcg.kg(-1) .h(-1) . CONCLUSION: Simulation was used to suggest loading and  maintenance doses to attain an oxycodone concentration of 35 mcg.L(-1) predicted  in adults. Although the covariates age and weight contribute 92% variability for  clearance, there remains variability accounting for 16% of concentrations outside  the target range. Duration of analgesic effect after ceasing infusion is  anticipated to be longer in neonates where context-sensitive halftime is greater  than older children and adults."}, {"id": 133, "title": "Distraction in the Emergency department using Virtual reality for INtravenous procedures in Children to Improve comfort (DEVINCI): a pilot pragmatic randomized  controlled trial.", "authors": "Osmanlliu, Esli; Trottier, Evelyne D.; Bailey, Benoit et al.", "journal": "CJEM", "year": "2021", "vol": "23(1):94-102", "doi": "10.1007/s43678-020-00006-6", "abstract": "OBJECTIVES: Intravenous (IV) procedures cause pain and distress in the pediatric emergency department (ED). We studied the feasibility and acceptability of  virtual reality distraction for patient comfort during intravenous procedures.  METHODS: Children were randomized to a control (standard care) or intervention  group (standard care + virtual reality). Thresholds for feasibility and  acceptability (primary outcomes) were determined through a priori established  criteria. The level of procedural pain (principal clinical outcome) and distress,  as well as memory of pain at 24 h were collected and reported as medians (Q1, Q3)  for each group. RESULTS: 63 patients were enrolled, with a high rate of  recruitment (78.8%) and game completion (90.3%). Patients, parents and,  healthcare providers reported high satisfaction levels. There were no serious  adverse events. Five of the 30 patients (16.7%) exposed to virtual reality  reported mild side effects. Self-reported procedural pain (verbal numerical  rating scale: 3 (1, 6)/10 vs 3 (1, 5.5)/10, p = 0.75) was similar between groups.  Further exploratory clinical measures were reported for the intervention and  control groups, respectively: self-rated distress during the procedure (Child  Fear Scale: 1 (0, 2)/4 vs 2 (0, 3)/4); distress evaluated by proxy during the  procedure (Procedure Behavior Check List: 8 (8, 9)/40 vs 10 (8, 15)/40); memory  of pain at 24 h (VNRS: 2 (1, 3)/10 vs 4 (2, 6.5)/10). CONCLUSION: The addition of  virtual reality to standard care is feasible and acceptable for pain and distress  management during IV procedures in the pediatric ED. Occasional mild,  self-resolving side effects were observed in the intervention group.  Self-reported pain during the procedure was similar between groups.  CLINICALTRIALS. GOV IDENTIFIER: NCT03750578."}, {"id": 134, "title": "Métodos Não Farmacológicos para o Manejo da Dor em Oncologia Pediátrica: Evidências da Literatura", "authors": "Paes, Thaís Victor; Silva-Rodrigues, Fernanda Machado; Ávila, Lívia Keismanas de", "journal": "Rev. bras. cancerol", "year": "2021", "vol": "67(2):e-031027", "doi": "10.32635/2176-9745.RBC.2021v67n2.1027", "abstract": "Introdução:  A  dor  em  crianças  com  doenças  malignas  relaciona-se  à  própria  doença  ou  aos  procedimentos  diagnóstico-terapêuticos.  Independentemente da causa, a criança deve ter a sua dor adequadamente tratada. Acredita-se que o controle adequado da dor ocorra em  70%  a  90%  dos  casos,  quando  se  empregam  terapias  específicas,  incluindo-se  a  combinação  de  analgésicos  e  intervenções  não  farmacológicas. Objetivo: Identificar na literatura especializada métodos não farmacológicos atuais para o manejo da dor em oncologia pediátrica. Método: Revisão integrativa da literatura, com artigos selecionados entre os anos de 2008 e 2018, nas bases de dados Biblioteca Virtual em Saúde (BVS), PubMed, Web of Science e Cumulative Index to Nursing and Allied Health Literature (CINAHL). Analisaram-se 11 artigos, selecionados com base nas recomendações do Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA).Resultados: Três categorias sintetizaram os principais resultados, a saber: dor em oncologia pediátrica e instrumentos de avaliação; benefícios das terapias complementares para o manejo da dor oncológica pediátrica; e efeitos adversos das terapias complementares. Conclusão: Considerando-se a dor como um sintoma debilitante para a população pediátrica em tratamento oncológico, é necessário que as avaliações feitas pelos profissionais da saúde sejam fidedignas às suas características para o manejo adequado. O manejo da dor não se limita apenas às terapias farmacológicas, algumas intervenções levantadas podem complementar a ação dos medicamentos para pacientes, com vistas a minimizar a dor e o sofrimento vivenciado por esses pacientes, além de evitar a tolerância e a sobrecarga do organismo, decorrente do uso excessivo de analgésicos."}, {"id": 135, "title": "Effectiveness of technology-based interventions compared with other non-pharmacological interventions for relieving procedural pain in hospitalized  neonates: a systematic review protocol.", "authors": "Palomaa, Anna-Kaija; Tuomikoski, Anna-Maria; Huhtala, Saija et al.", "journal": "JBI evidence synthesis", "year": "2021", "vol": "19(10):2770-2776", "doi": "10.11124/JBIES-21-00010", "abstract": "OBJECTIVE: The objective of this review is to evaluate the effectiveness of technology-based interventions in relieving procedural pain in hospitalized  neonates compared with other non-pharmacological interventions. INTRODUCTION:  Neonates requiring hospital care often experience acute pain during medical  procedures. The current best practice for relieving pain in neonates is the use  of non-pharmacological interventions, such as oral solutions or  intervention-based human touch. Technological solutions (such as games, eHealth  applications, and mechanical vibrators) have become more commonplace in pediatric  pain management over recent years. However, there is a knowledge gap about how  effective technology-based interventions are at relieving pain in neonates.  INCLUSION CRITERIA: This review will consider experimental trials that include  technology-based non-pharmacological interventions for relieving procedural pain  in hospitalized neonates. Primary outcomes of interest include pain response to a  procedure measured by a validated pain assessment scale for neonates, behavioral  indicators, and/or changes in physiological indicators. METHODS: MEDLINE (Ovid),  CINAHL (EBSCO), Scopus (Elsevier), Cochrane Central Register of Controlled  Trials, and the MEDIC databases will be searched for studies published in  English, Finnish, and Swedish. Critical appraisal and data extraction will be  conducted by two independent researchers following JBI methodology. Quantitative  data will be pooled in statistical meta-analyses. If statistical analysis is not  possible, the findings will be reported narratively. SYSTEMATIC REVIEW  REGISTRATION: PROSPERO CRD42021254218."}, {"id": 136, "title": "Brinquedo terapêutico para crianças com Diabetes Mellitus tipo I: intervenções no domicílio [Juguete terapéutico para niños con Diabetes Mellitus tipo I: intervenciones en el hogar]", "authors": "Pedrinho, Leticia Roberta; Shibukawa, Bianca Machado Cruz; Rissi, Gabrieli Patricio et al.", "journal": "", "year": "2021", "vol": "25(3):1-9", "doi": "", "abstract": ""}, {"id": 137, "title": "A Cross-Sectional Review of Pain Management Interventions Used for Painful Pediatric Blood Draw Procedures in Hospital.", "authors": "Revell, Jennifer; Backman, Chantal; Vasily, Susan et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2021", "vol": "22(5):645-651", "doi": "10.1016/j.pmn.2021.03.001", "abstract": "BACKGROUND: Hospitalized children continue to experience procedural pain due to inconsistent implementation of readily available, evidence-based pain  interventions. AIMS: To explore the prevalence of painful blood-testing  procedures, pain management interventions, child-caregiver perceptions of  effectiveness of, and satisfaction with, pain interventions, and adherence to  best practice guidelines. DESIGN: A single-site cross-sectional study using a  combination of child-caregiver interviews and chart reviews for hospitalized  children, 0-18 years. METHODS: Interviews gathered information about the child's  most recent blood test, procedural pain management intervention use, and  participant perceptions of effectiveness of and satisfaction with these  interventions. Concurrently, patient charts were reviewed for procedure  documentation and pain management strategies used, including topical anesthetic  and oral sucrose orders. Data were analyzed using descriptive statistics.  RESULTS: Fifty children were included. At the time of data collection, 34 (68%)  had experienced painful blood-testing procedures during their current admission.  Pharmacologic pain interventions were documented for only 7 (21%) procedures and  were often inconsistent with participant reports. Almost all interview  respondents (n = 31, 91%) identified at least one pain intervention for the  child's most recent painful blood-test. Twenty (59%) participants perceived pain  interventions as effective and most were satisfied with utilized interventions  (n = 27, 79%). CONCLUSIONS: A multi-modal procedural pain management approach was  infrequently used and documented, highlighting undertreatment based on  recommended practices and guidelines. Perceived intervention effectiveness and  satisfaction with pain management were however found to be relatively high."}, {"id": 138, "title": "Using sensor-fusion and machine-learning algorithms to assess acute pain in non-verbal infants: a study protocol.", "authors": "Roué, Jean-Michel; Morag, Iris; Haddad, Wassim M. et al.", "journal": "BMJ open", "year": "2021", "vol": "11(1):e039292", "doi": "10.1136/bmjopen-2020-039292", "abstract": "INTRODUCTION: Objective pain assessment in non-verbal populations is clinically challenging due to their inability to express their pain via self-report.  Repetitive exposures to acute or prolonged pain lead to clinical instability,  with long-term behavioural and cognitive sequelae in newborn infants. Strong  analgesics are also associated with medical complications, potential  neurotoxicity and altered brain development. Pain scores performed by bedside  nurses provide subjective, observer-dependent assessments rather than objective  data for infant pain management; the required observations are labour intensive,  difficult to perform by a nurse who is concurrently performing the procedure and  increase the nursing workload. Multimodal pain assessment, using sensor-fusion  and machine-learning algorithms, can provide a patient-centred,  context-dependent, observer-independent and objective pain measure. METHODS AND  ANALYSIS: In newborns undergoing painful procedures, we use facial  electromyography to record facial muscle activity-related infant pain, ECG to  examine heart rate (HR) changes and HR variability, electrodermal activity (skin  conductance) to measure catecholamine-induced palmar sweating, changes in oxygen  saturations and skin perfusion, and electroencephalography using active  electrodes to assess brain activity in real time. This multimodal approach has  the potential to improve the accuracy of pain assessment in non-verbal infants  and may even allow continuous pain monitoring at the bedside. The feasibility of  this approach will be evaluated in an observational prospective study of  clinically required painful procedures in 60 preterm and term newborns, and  infants aged 6 months or less. ETHICS AND DISSEMINATION: The Institutional Review  Board of the Stanford University approved the protocol. Study findings will be  published in peer-reviewed journals, presented at scientific meetings, taught via  webinars, podcasts and video tutorials, and listed on academic/scientific  websites. Future studies will validate and refine this approach using the minimum  number of sensors required to assess neonatal/infant pain. TRIAL REGISTRATION  NUMBER: ClinicalTrials.gov Registry (NCT03330496)."}, {"id": 139, "title": "Virtual reality distraction during pediatric intravenous line placement in the emergency department: A prospective randomized comparison study.", "authors": "Schlechter, Anna K.; Whitaker, Winnie; Iyer, Sujit et al.", "journal": "The American journal of emergency medicine", "year": "2021", "vol": "44:296-299", "doi": "10.1016/j.ajem.2020.04.009", "abstract": "OBJECTIVE: To evaluate the efficacy of virtual reality distraction (VR) during intravenous line (IV) placement in a pediatric emergency department to increase  first-attempt IV success. Secondary endpoints included median time to successful  IV placement, patient pain and anxiety scores, and an evaluation of  characteristics of patients in whom VR is well tolerated. STUDY DESIGN: This was  a randomized controlled trial at a tertiary pediatric emergency department,  enrolling patients aged 4-17 years who required IV placement. Patients were  enrolled only when child life specialists were unavailable. The primary endpoint  was first attempt IV success. RESULTS: A total of 116 subjects were enrolled, 58  were randomly assigned to the VR group and 58 were assigned to the standard of  care (SOC) group. 115 subjects completed the trial and were analyzed. First  attempt IV success rates were similar between the groups (VR = 81%,  standard = 84.2%, p = .65). Number of IV attempts and changes in pain and anxiety  scores were also similar between the groups. The median time to successful IV  placement was shorter in the VR group (78 vs 104 seconds) but this difference was  not statistically significant (p = .21). Overall the VR headset was tolerated by  79% of subjects assigned to that group. The only significant predictor of headset  tolerance was older age (P = .02). CONCLUSIONS: VR distraction for IV placement  in the Pediatric Emergency Department shows similar efficacy to standard  distraction techniques and appears to be well tolerated."}, {"id": 140, "title": "Sentimentos de pré-adolescentes e adolescentes quanto à vacinação contra o papilomavirus humano", "authors": "Silva, Patrick Leonardo Nogueira da", "journal": "Nursing (Ed. bras., Impr.)", "year": "2021", "vol": "24(273):5299-5310", "doi": "10.36489/nursing.2021v24i273p5299-5310", "abstract": "Objetivo: identificar os sentimentos de pré-adolescentes e adolescentes quanto à vacinação contra o papilomavirus humano. Método: trata-se de um estudo fenomenológico, com abordagem qualitativa, realizado com 10 participantes, sendo pré- adolescentes e adolescentes, cujas quais foram vacinadas na sala de vacina de uma Unidade Básica de Saúde de um município de Minas Gerais. Os depoimentos foram gravados e transcritos na íntegra para posterior análise. O tratamento dos dados se deu por meio de Análise de Conteúdo. Resultados: a maioria das entrevistadas atribuiu à significação da vacinação relacionada ao fato de prevenir o câncer de colo uterino. O desconhecimento sobre a finalidade da vacina HPV fica em evidência em alguns depoimentos. O medo da vacina também ficou em evidência, tendo como justificativa o fato de ser injeção, da dor, da agulha e por medo da reação. Como medidas de prevenção, foram citadas o uso de preservativo e a ida periódica ao ginecologista. Seis das participantes não souberam informar nenhuma medida de prevenção contra o papilomavirus humano. Conclusão: as participantes do estudo entendem a importância da vacinação  contra  o  papilomavirus  humano,  embora  seis  participantes,  bem  como  suas  famílias,  informaram  ter  receio  pela  dor  da  vacinação ou possíveis eventos adversos pós-vacinais.(AU)"}, {"id": 141, "title": "Intervenções não farmacológicas no controle da dor em recém-nascidos pré-termo: conhecimento da equipe de enfermagem", "authors": "Silva, Shalimar Farias da; Rolim, Karla Maria Carneiro; Albuquerque, Firmina Hermelinda Saldanha et al.", "journal": "Nursing (Ed. bras., Impr.)", "year": "2021", "vol": "24(278):5892-5901", "doi": "10.36489/nursing.2021v24i278p5892-5901", "abstract": "Objetivo: Investigar o conhecimento da equipe de enfermagem sobre o manejo não farmacológico da dor e descrever os principais métodos não farmacológicos para o manejo da dor em recém-nascidos pré-termo sob cuidados intensivos. Método: Estudo exploratório-descritivo, com abordagem qualitativa, realizado em Unidade de Terapia Intensiva, de Fortaleza-CE, Brasil, cuja coleta de dados foi realizada de julho a agosto de 2018, por meio de entrevista e observação dos cuidados de enfermagem aos neonatos. Participaram duas enfermeiras e seis técnicas de
