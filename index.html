rante a instalação, pela equipe de enfermagem, do CPAP nasal em recém-nascidos prematuros; e demonstrar que o uso da sucção não nutritiva, concomitantemente à instalação do CPAP nasal, pode ser considerado uma tecnologia de enfermagem. A população alvo foi constituída por 20 recém-nascidos prematuros, submetidos à instalação ou reinstalação do referido artefato, totalizando 30 procedimentos. Os recém-nascidos foram distribuídos, aleatoriamente, em dois grupos, controle e experimental, em que a sucção não nutritiva foi oferecida, o mesmo não acontecendo com o grupo controle. As reações de dor foram mensuradas pela escala de NIPS. Em 100% dos procedimentos concomitantes à sucção não nutritiva, os recém-nascidos não sentiram dor; 100% dos recém-nascidos demonstraram dor quando não era oferecida a referida sucção. Conclui-se que o procedimento pode ser classificado como uma tecnologia do cuidado de enfermagem."}, {"id": 384, "title": "Nerve blocks for initial pain management of femoral fractures in children", "authors": "Black, KJL; Bevan, CA; Murphy, NG et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2013", "vol": "12", "doi": "10.1002/14651858.CD009587.pub2", "abstract": "Abstract - Background Children and adolescents with femoral fractures are almost always admitted to hospital. They invariably start their hospital experience in the Emergency Department, often requiring transfer to a specialist children's hospital. They require analgesia or anaesthesia so that radiographs can be obtained and for management of their fractures. The initial care process involves from two to six transfers from stretcher to stretcher/imaging/operating‐suite table or hospital bed within the first few hours, so prompt pain relief is essential. Systemic analgesia can be provided orally or parenterally. Alternatively, a nerve block may be used where local anaesthetic is injected around a nerve to block sensation or freeze the involved area. Objectives To assess the effects (benefits and harms) of femoral nerve block (FNB) or fascia iliaca compartment block (FICB) for initial pain management of children with fractures of the femur (thigh bone) in the pre‐hospital or in‐hospital emergency setting, with or without systemic analgesia. Search methods We searched the Cochrane Bone, Joint and Muscle Trauma Group Specialised Register (11 January 2013), the Cochrane Central Register of Controlled Trials (2012 Issue 12), MEDLINE (1946 to January Week 1 2013), EMBASE (1980 to 2013 Week 01), Google Scholar (31 January 2013) and trial registries (31 January 2013). We handsearched recent issues of specialist journals and references of relevant articles. Selection criteria Randomised and quasi‐randomised controlled trials assessing the effects of FNB or FICB for initial pain management compared with systemic opiates in children (aged under 18 years) with fractures of the femur receiving pre‐hospital or in hospital emergency care. Primary outcomes included failure of analgesia at 30 minutes, pain levels during procedures and transfers (e.g. to a stretcher or hospital ward) for up to eight hours, and adverse effects. Data collection and analysis Two review authors independently extracted data using a pre‐piloted form. Two authors independently assessed the risk of bias for the included study and assessed quality of the evidence for each outcome using the GRADE approach; i.e. as very low, low, moderate or high. Meta‐analysis of results was not possible as we found only one trial that could be included in the review. Main results We included one randomised trial of 55 children aged between 16 months to 15 years. It compared anatomically‐guided FICB versus systemic analgesia with intravenous morphine sulphate. The small sample size and the high risk of bias relating to lack of blinding resulted in a low quality rating for all outcomes. Overall, the trial provided low quality evidence for better pain management in the FICB group. Fewer children in the FICB group had analgesia failure at 30 minutes than in the morphine group (2/26 (8%) versus 8/28 (29%); risk ratio (RR) 0.33, 95% confidence interval (CI) 0.09 to 1.20; P value 0.09). The trial did not report on pain during procedures or transfers, or application of analgesia. The trial provided low quality evidence that FICB has a better safety profile than morphine, with only four (15%) reports of redness and pain at the injection site, and no reports of the type of adverse effects of systematic analgesia that occurred in the morphine group, such as respiratory depression (six cases (21%)) and vomiting (four cases (14%)). No long‐term adverse events were reported for either intervention. Clinically significant pain relief was achieved in both groups at five minutes; with limited evidence of greater initial pain relief in the FICB group. Based on an inspection of graphically‐presented data, at least 46% (12/26) of children in the FICB group had no supplementary medication (mainly analgesia) for the six hours of the study, while only 5% (1 or 2/28) of children in the intravenous morphine group went without additional analgesia. There was insufficient evidence to determine whether child or parental satisfaction with the method of analgesia favoured either method. Resource use was not measured. Authors' conclusions Low quality evidence from one small trial suggests that FICB provides better and longer lasting pain relief with fewer adverse events than intravenous opioids for femur fractures in children. Well conducted and reported randomised trials that compare nerve blocks (both FNB and FICB) with systemic analgesia and that use validated pain scores are needed. Plain language summary Nerve blocks for initial pain management of thigh bone fractures in children Fractures (breaks) of the thigh bone can be very painful, particularly when a child arrives in a stressful emergency environment and is undergoing assessment. Moving the child to get X‐rays or transferring the child to a special bed to support the leg in traction (keeping the leg straight) can cause additional pain, as can placing traction (a pulling force) on the broken thigh. This means that prompt provision of pain relief is an essential part of initial emergency management. This review investigated whether a nerve block, involving the injection of a freezing/numbing medication at the top of the thigh, would provide more effective pain relief than pain medicine given by mouth or into a vein (intravenously, e.g. morphine). We searched several medical databases and trial registries up to January 2013 and contacted researchers. We found one study that looked at the comparison we were interested in. This study was potentially biased, mainly because the care providers, parents and children were aware of the type of pain relief the children received. The study was small, involving 55 children aged 16 months to 15 years, and showed that the children who received one of the two main types of nerve block tended to have less pain after 30 minutes than those who received intravenous morphine for initial pain control. The nerve blocks led to some pain and redness at the injection site in a few cases, while intravenous morphine caused more serious problems such as depressed breathing (lack of oxygen), excessive sleepiness and vomiting in a small number of children. Moreover, children who had nerve blocks continued to have lower pain scores over a six‐hour period with less need for additional pain relief. There was insufficient evidence to determine whether children or parents were more satisfied with one method of pain relief than the other. Use of resources (e.g. nursing time, cost of medications) was not measured. The quality of the study included in this review was low and so these conclusions are not certain. Further well designed studies investigating whether nerve blocks are more effective and safer than other means of pain relief are needed."}, {"id": 385, "title": "Analgesia e sedação durante a instalação do cateter central de inserção periférica em neonatos", "authors": "Costa, Priscila; Bueno, Mariana; Oliva, Cintia Luiza et al.", "journal": "Rev Esc Enferm USP", "year": "2013", "vol": "47(4):801-807", "doi": "", "abstract": ""}, {"id": 386, "title": "Musical intervention directed to child and adolescent in surgical situation: systematic review", "authors": "Franzoi, Mariana André Honorato; Paula, Érica Simpionato de; Martins, Gisele", "journal": "Rev Enferm UFPE On line", "year": "2013", "vol": "7(9):5645-5655", "doi": "", "abstract": ""}, {"id": 387, "title": "Efectividad y seguridad de cefotaxima como primera línea para el tratamiento intrahospitalario de neumonía asociada a la comunidad no complicada por Streptococcus pneumoniae resistente en niños", "authors": "Instituto de Evaluación Tecnológica en Salud", "journal": "", "year": "2013", "vol": "", "doi": "", "abstract": "Antecedentes: La Neumonía Asociada a la Comunidad (NAC) es una enfermedad resultante de la inflamación del parénquima pulmonar generada por un agente infeccioso fuera del ambiente hospitalario (1). El cuadro clínico se caracteriza por tos, fiebre y signos de consolidación al examen físico, pero puede ser muy variable y mostrar otros síntomas locales como disnea, dolor torácico, expectoración, taquipnea, o generales como fiebre, escalofríos confusión y taquicardia. Cefotaxima es un antibiótico semisintético de amplio espectro, pertenece al grupo de las cefalosporinas de tercera generación. Está indicada para el tratamiento de infecciones de huesos y articulaciones; genitourinarias, del sistema nervioso central, del tracto respiratorio bajo; de la piel y tejidos blandos; ginecológicas, bacteriemia y septicemia; infecciones intraabdominales y profilaxis en intervenciones quirúrgicas con riesgo de contaminación e infección. Evaluación de efectividad y seguridad: Pregunta de evaluación: En niños (menores de 18 años) con neumonía asociada a la comunidad no complicada por Streptococcus pneumoniae resistente, ¿cuál es la efectividad y seguridad de cefotaxima como primera línea de tratamiento intrahospitalario comparada con ceftriaxona, en términos de curación clínica y microbiológica, recaída, mortalidad, estancia hospitalaria y eventos adversos? La pregunta de evaluación fue refinada y validada con base en: autorización de mercadeo de la tecnología para la indicación de interés (registro sanitario INVIMA), listado de medicamentos vitales no disponibles, cobertura de las tecnologías en el Plan Obligatorio de Salud (POS) (Acuerdo 029 de 2011), revisión de grupos terapéuticos (clasificación ATC: Anatomical, Therapeutic, Chemical classification system), recomendaciones de guías de práctica clínica actualizadas, disponibilidad de evidencia sobre efectividad y seguridad (reportes de evaluación de tecnologías y revisiones sistemáticas de la literatura), uso de las tecnologías (listas nacionales de recobro, estadísticas de prescripción, etc), estudios de carga de enfermedad y consulta con expertos temáticos (especialistas clínicos). No se identificaron otros comparadores relevantes para la evaluación. Población: Niños (menores de 18 años) con neumonía asociada a la comunidad no complicada por Streptococcus pneumoniae resistente. Tecnología de interés: Cefotaxima como primera línea de tratamiento intrahospitalario. Metodología: Búsqueda de literatura. Se llevó a cabo una búsqueda sistemática y exhaustiva, con el objetivo de identificar evidencia científica relevante en relación con la pregunta de evaluación. Todo el proceso se acogió a los estándares de calidad internacional utilizados en revisiones sistemáticas de la literatura (16). Las búsquedas fueron llevadas a cabo por personal entrenado. Búsqueda en bases de datos electrónicas: De acuerdo con el tipo de estudios definido en los criterios de elegibilidad, se seleccionaron las siguientes fuentes electrónicas de consulta: MEDLINE (plataforma Ovid), MEDLINE In-Process & Other Non-Indexed Citations (plataforma Ovid), MEDLINE Daily Update (plataforma Ovid), EMBASE.com, The Cochrane Library (plataforma Wiley). Conclusiones: No se identificó evidencia sobre la efectividad y seguridad de la tecnología de interés y su comparador."}, {"id": 388, "title": "Analgesia in newborns: a case-control study of the efficacy of nutritive and non-nutritive sucking stimuli", "authors": "Lima, Ana Henriques; Hermont, Ana Paula; Friche, Amélia Augusta de Lima", "journal": "CoDAS", "year": "2013", "vol": "25(4):365-368", "doi": "10.1590/S2317-17822013000400011", "abstract": "PURPOSE: To verify the nutritive and non-nutritive stimuli efficacy in the newborn's response to pain during venipuncture. METHODS: The main sample was composed of 64 newborns that were randomly divided into three groups. The first group (n=20) received nutritive sucking stimulus that was performed through maternal breastfeeding. The second group (n=21) received non-nutritive sucking stimulus that was performed through the introduction of the researcher little finger in the newborn's oral cavity. The third group or control group (n=23) did not receive any analgesia stimulus. The newborns were evaluated using the Neonatal Infant Pain Scale, and the responses to painful stimuli were compared. RESULTS: The nutritive as well as non-nutritive suction methods provided a comforting effect, resulting in lower pain response scores (p<0.05). There was no difference between the analgesia provided by both methods (p&gt;0.05). CONCLUSION: The nutritive and the non-nutritive sucking stimuli proved to be efficacious tools in relieving pain among newborns."}, {"id": 389, "title": "Pain in the newborn within the neonatal intensive care unit", "authors": "Mendes, Lanuza celes; Fontenele, Fernanda Cavalcante; Dodt, Regina Cláudia Melo et al.", "journal": "Rev Enferm UFPE On line", "year": "2013", "vol": "7(11):6446-6454", "doi": "", "abstract": ""}, {"id": 390, "title": "Intervenciones de enfermería en la atención pediátrica de la hemofilia", "authors": "Secretaría de Salud", "journal": "Guías de Práctica Clínica de Enfermería", "year": "2013", "vol": "56-56", "doi": "", "abstract": "Introducción: La hemofilia es una enfermedad crónica, específicamente un trastorno de la coagulación de la sangre que causa hemartrosis y sangrado prolongado espontáneo (Murillo, 2008). La patología requiere un abordaje integral en donde el papel del profesional de enfermería es satisfacer las necesidades biopsicosociales del paciente pediátrico con este problema de salud. Método: La búsqueda sistemática de información se enfocó a documentos obtenidos acerca de la temática de intervenciones de enfermería y hemofilia en pacientes pediátricos. Se utilizaron 22 documentos para la elaboración de esta guía. Resultados: Las principales intervenciones de enfermería en el paciente pediátrico con hemofilia son: ministración del Factor VIII o IX según prescripción, control de la hemorragia, manejo del dolor, inmovilización, aplicación de frio, identificación de riesgos, monitorización de extremidades inferiores, apoyo emocional y enseñanza de los procedimientos y tratamientos. Conclusiones: La valoración de enfermería en pacientes con hemofilia se centra en las respuestas humanas (Dolor, limitación del movimiento, temor, angustia y ansiedad) y en las respuestas fisiológicas (Edema, hematomas, hemorragias internas y externas)"}, {"id": 391, "title": "Percepção de enfermeiros sobre uso da música como tecnologia para alívio da dor em recém-nascidos", "authors": "Farias, Leiliane Martins; Cardoso, Maria Vera Lucia Moreira Leitão; Silva, Viviane Martins et al.", "journal": "Rev. enferm. UFPE on line", "year": "2012", "vol": "6(1):142-148", "doi": "10.5205/reuol.2052-14823-1-LE.0601201220", "abstract": "Objetivo: analisar a percepção dos enfermeiros sobre o uso da música como tecnologia para alívio da dor de recém-nascidos. Método: trata-se de estudo descritivo realizado em uma unidade de terapia intensiva neonatal de um hospital público de Fortaleza-CE em julho de 2010. Utilizou-se para coleta dos dados entrevista semiestruturada com questionário com dez perguntas. Os sujeitos foram dez enfermeiras. A autorização prévia para realização deste trabalho foi obtida por meio do Parecer n. 100606/10, da Comissão Científica e de Ética da instituição sede do estudo. Para preservar o anonimato, foi atribuída às enfermeiras a letra E, seguida de número ordinal da entrevista em questão. Resultados: os dados foram organizados em duas categorias: percepção do enfermeiro sobre o efeito da música para alívio da dor do recém-nascido e utilização da música para alívio da dor em recém-nascidos no cotidiano da enfermagem. As enfermeiras relataram que a música proporciona alívio da dor em recém-nascidos, pois os acalma, reduz o estresse, relaxa, tranquiliza, alivia as tensões e promove aconchego. Conclusão: a utilização da música como tecnologia associada às relações humanas aprimora a construção do saber-fazer, contribuindo para um novo olhar e cuidado, respaldados em uma assistência mais humanizada.(AU)"}, {"id": 392, "title": "Pediatric pain: prevalence, assessment, and management in a teaching hospital", "authors": "Linhares, M.B.M.; Doca, F.N.P.; Martinez, F.E. et al.", "journal": "Rev. bras. pesqui. méd. biol", "year": "2012", "vol": "45(12):1287-1294", "doi": "10.1590/S0100-879X2012001200026", "abstract": "The goal of this study was to examine the prevalence, assessment and management of pediatric pain in a public teaching hospital. The study sample consisted of 121 inpatients (70 infants, 36 children, and 15 adolescents), their families, 40 physicians, and 43 nurses. All participants were interviewed except infants and children who could not communicate due to their clinical status. The interview included open-ended questions concerning the inpatients&#8217; pain symptoms during the 24 h preceding data collection, as well as pain assessment and pharmacological/non-pharmacological management of pain. The data were obtained from 100% of the eligible inpatients. Thirty-four children/adolescents (28%) answered the questionnaire and for the other 72% (unable to communicate), the family/health professional caregivers reported pain. Among these 34 persons, 20 children/adolescents reported pain, 68% of whom reported that they received pharmacological intervention for pain relief. Eighty-two family caregivers were available on the day of data collection. Of these, 40 family caregivers (49%) had observed their child&#8217;s pain response. In addition, 74% reported that the inpatients received pharmacological management. Physicians reported that only 38% of the inpatients exhibited pain signs, which were predominantly acute pain detected during clinical procedures. They reported that 66% of patients received pharmacological intervention. The nurses reported pain signs in 50% of the inpatients, which were detected during clinical procedures. The nurses reported that pain was managed in 78% of inpatients by using pharmacological and/or non-pharmacological interventions. The findings provide evidence of the high prevalence of pain in pediatric inpatients and the under-recognition of pain by health professionals."}, {"id": 393, "title": "Condutas de enfermagem à criança no pós-operatório de cirurgia cardíaca: análise das pesquisas", "authors": "Monteiro, Flávia Paula Magalhães; Melo, Renata Pereira de; Souza, Geane Felix de et al.", "journal": "Rev. eletrônica enferm", "year": "2012", "vol": "14(4):957-964", "doi": "", "abstract": "As cardiopatias congênitas representam anomalias que incluem defeitos estruturais e funcionais no coração, os quais necessitam precocemente de intervenção de enfermagem à beira do leito. Objetivou-se analisar pesquisas que abordassem as condutas de enfermagem à criança no pós-operatório de cirurgia cardíaca. O presente trabalho trata-se de revisão integrativa da literatura em diferentes bases de dados, utilizando os descritores: Cuidados de enfermagem, Cirurgia cardíaca e Enfermagem pediátrica. Dos onze artigos identificados e analisados na íntegra, seis corresponderam aos critérios adotados no estudo, com evidências entre os níveis II e VI. As publicações culminaram nas condutas de prevenção, avaliação e recuperação ou reabilitação. Conclui-se que este estudo contribui para assistir no desenvolvimento de planos de cuidados de enfermagem no intuito de proporcionar melhorias na prática assistencial, com base em ações de promoção à saúde, com ênfase sobre avaliação da dor, verificação da temperatura invasiva e medidas não farmacológicas para manejo da dor, entre outras..."}, {"id": 394, "title": "O cuidado pelo enfermeiro ao recém-nascido prematuro frente à punção venosa", "authors": "Pacheco, Sandra Teixeira de Araújo; Silva, Akla Martins da; Lioi, Aline et al.", "journal": "Rev. enferm. UERJ", "year": "2012", "vol": "20(3):306-311", "doi": "", "abstract": "Este estudo objetivou descrever de que forma o enfermeiro realiza os cuidados para minimizar a dor antes, durante e após a punção venosa em recém-nascidos prematuros. Os sujeitos foram 12 enfermeiros da unidade de terapia intensiva neonatal de um hospital universitário situado no município do Rio de Janeiro. A coleta de dados se deu através de uma entrevista semiestruturada, no período de março a abril de 2011. O método aplicado foi a análise de conteúdo de Bardin. Neste sentido, emergiram quatro categorias: realizando a sucção e o uso da glicose; posicionando, contendo e organizando o recém-nascido de forma confortável; promovendo acalento, aconchego e manuseando de forma cuidadosa o recém-nascido; preocupando-se com a punção venosa e com o recém-nascido. Para tornar esse procedimento o menos doloroso possível para o recém-nascido, os enfermeiros apontam cuidados que consideram essenciais para alívio da dor diante da punção venosa, porém não diferenciam as etapas desse processo."}, {"id": 395, "title": "Valoración del dolor y aplicación de intervenciones terapéuticas enfermeras en el paciente neonatal y pediátrico, en contextos asistenciales hospitalarios", "authors": "Sellán Soto, Mª Carmen; Díaz Martínez, Mª Luisa; Vázquez Sellán, Antonio", "journal": "Rev. cuba. enferm", "year": "2012", "vol": "28(2):144-155", "doi": "", "abstract": "El dolor es una realidad, una experiencia subjetiva culturalmente construida y sociohistóricamente determinada desde la más tierna infancia. Con respecto a los cuidados proporcionados a niños y adolescentes un reto de vigente actualidad es el alivio del dolor tanto agudo como crónico. Los abordajes para su tratamiento han ido cambiando y mejorando a medida que aumentaban los conocimientos por lo que disponemos de una gran variedad de intervenciones terapéuticas tanto farmacológicas como no farmacológicas. El objetivo del trabajo es visibilizar cómo se lleva a cabo la valoración del dolor en ciertas técnicas, procedimientos y procesos patológicos, así como los conocimientos que sobre intervenciones terapéuticas enfermeras para el alivio del dolor y su grado de aplicación en contextos asistenciales hospitalarios. En este artículo exclusivamente se muestran los resultados relativos a la valoración del dolor. Pude concluirse que existen algunos procesos patológicos en los que no se apuntaba la pertinencia de valorar el dolor., posiblemente no se trate de una inadecuada valoración del dolor sino por el motivo de ingreso en las unidades estudiadas. Con respecto a técnicas y procedimientos apuntan en el mismo sentido, aunque se cree importante profundizar en las causas que subyacen en aquellos casos en los que no se valora en ningún momento del procedimiento el dolor del paciente pediátrico(AU)"}, {"id": 396, "title": "Procedimentos dolorosos realizados com recém-nascidos prematuros moderados em uma Unidade de Terapia Intensiva Neonatal (UTIN)", "authors": "Browne, Ericka Souza; Barbosa, Tânia Santana Menezes; Camargo, Climene Laura de", "journal": "Rev. enferm. UFPE on line", "year": "2011", "vol": "5(3):569-575", "doi": "10.5205/reuol.1262-12560-1-LE.0503201103", "abstract": "Objetivo: avaliar a frequência de procedimentos dolorosos que os recém-nascidos prematuros moderados (RNPTM) foram submetidos durante a internação em uma UTIN. Método: trata-se de um estudo de coorte retrospectivo analítico e exploratório. A população foi composta por 106 RNPTM, internados no período de agosto de 2003 a agosto de 2005 em um hospital privado de Salvador, Bahia. As variáveis estudadas foram: sexo do recém-nascido, idade gestacional, tempo de internamento, peso ao nascer, Apgar no primeiro e quinto minutos e números de consultas pré-natais. A variável de desfecho foi a frequência de procedimentos dolorosos. Os dados foram armazenados e analisados no Epi Info Windows3.3.2. O estudo foi aprovado aprovado pelo Comitê de Ética do Hospital Santa Izabel (FR 83357). Resultados: o risco para exposição a procedimentos dolorosos aumenta quando associado: a idade gestacional de 31 e 32 semanas, cujo risco relativo (RR) 1,70 (p=0,01); ao tempo de internamento superior a vinte e sete dias na UTIN, RR 2,05(p=0,00); ao Boletim de Apgar menor ou igual a sete, e menor igual a oito no primeiro minuto 1,70 (p=0,02) e no quinto minuto, 1,87 (p=0,03),respectivamente; ao número de consultas pré-natais inferiores a seis, 1,96 (p=0,00). Conclusão: estes dados apontam a necessidade de alternativas que minimizem os procedimentos dolorosos que os RNPTM são expostos em uma UTIN.(AU)"}, {"id": 397, "title": "Cuidado humanístico e percepções de enfermagem diante da dor do recém-nascido", "authors": "Lélis, Ana Luíza Paula de Aguiar; Farias, Leiliane Martins; Cipriano, Maria Aneuma Bastos et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2011", "vol": "15(4):694-700", "doi": "10.1590/S1414-81452011000400006", "abstract": "Este estudo objetivou apreender o significado do cuidado oferecido pelo enfermeiro ao recém-nascido em procedimentos dolorosos e conhecer as intervenções realizadas pelos enfermeiros para amenizar a dor do recém-nascido. Estudo descritivo, realizado na Unidade de Terapia Intensiva Neonatal de um hospital público de Fortaleza-CE em julho/2010. Os sujeitos foram dez enfermeiras, e a coleta de dados se realizou através de um questionário. Os dados foram organizados em três categorias: O significado de cuidado diante da dor do recém-nascido; a assistência humanizada junto ao recém-nascido; e intervenções de enfermagem diante da dor do recém-nascido. Estes foram analisados à luz da Teoria Humanística de Paterson e Zderad. Constatou-se que o cuidado ao recém-nascido deveria ser direcionado a minimizar os fatores estressores durante a situação dolorosa e que as intervenções citadas foram predominantemente não farmacológicas, envolvendo ações desenvolvidas para a recém-nascido e o ambiente da Unidade."}, {"id": 398, "title": "Dor no recém-nascido: estudo transversal sobre assistência de enfermagem em unidades neonatais", "authors": "Oliveira Júnior, Amilton Roberto de; Paula, Weslla Karla Albuquerque Silva de; Guerra, Marília Cruz Gouveia Câmara", "journal": "Rev. enferm. UFPE on line", "year": "2011", "vol": "5(7):1582-1590", "doi": "10.5205/reuol.1262-12560-1-LE.0507201102", "abstract": "Objetivo: verificar como ocorre a assistência ao recém-nascido, submetido a procedimentos dolorosos, pelos enfermeiros  de unidades neonatais. Método: estudo transversal, realizado em julho de 2010, nas Unidades Neonatais do município de  Caruaru-PE. A coleta de dados foi realizada com oito enfermeiros (as), através de entrevista estruturada. Esses dados  foram analisados quantitativamente por meio das frequências absoluta e relativa. O projeto foi aprovado pelo Comitê de  Ética em Pesquisa Envolvendo Seres Humanos da Faculdade ASCES, conforme protocolo nº 063/10. Resultados: dos  enfermeiros entrevistados, apenas 12,5% referiu sempre utilizar analgesia durante procedimentos dolorosos no recémnascido. Quando questionados quanto às intervenções farmacológicas utilizadas frente ao neonato com dor, a mais citada  foi a administração de analgésico não-opióide (62,5%). Dentre às diversas alterações comportamentais apresentadas pelos  neonatos com dor, as aludidas por todos os enfermeiros, incluem-se: choro e atividade motora. Conclusão: os enfermeiros  estão enxergando que o recém-nascido sente dor e utilizando intervenções farmacológicas e não-farmacológicas para o  seu alívio e tratamento. Entretanto, estes resultados sugerem a necessidade desta temática ser trabalhada com estes  profissionais. (AU)"}, {"id": 399, "title": "Implementação de medidas para o alívio da dor em neonatos pela equipe de enfermagem", "authors": "Oliveira, Roberta Meneses; Silva, Ana Valeska Siebra e; Silva, Lucilane Maria Sales da et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2011", "vol": "15(2):277-283", "doi": "10.1590/S1414-81452011000200009", "abstract": "Estudo transversal com abordagem quantitativa, que objetivou identificar a implementação de medidas para o alívio da dor em neonatos pelos profissionais de Enfermagem, bem como caracterizá-las em tipo, frequência e finalidade da aplicação. Desenvolvido entre agosto e outubro de 2007 em quatro hospitais de referência no atendimento neonatal em Fortaleza-Ceará. Um formulário foi aplicado em 180 profissionais. Os dados foram analisados com estatística descritiva simples e apresentados em tabelas. A maioria dos profissionais (98,8 por cento) afirmou implementar medidas para minimizar a dor do neonato, destacando-se: Chupeta de gaze com glicose (43,3 por cento); Acalento (23,3 por cento); Pacotinho (19,4 por cento). Quanto às justificativas, a maioria (85 por cento) relatou que executa tais medidas para acalmar/aliviar o sofrimento do bebê. Em conclusão, as entrevistadas demonstraram conhecer o efeito benéfico da glicose para o neonato e implementar estratégias que, aplicadas em conjunto antes dos procedimentos dolorosos, proporcionam alívio e tranquilidade para o bebê."}, {"id": 400, "title": "O enfermeiro no manejo da dor neonatal", "authors": "Sudário, Amanda Assunção; Dias, Iêda Maria Avila Vargas; Sanglard, Leticia Ribeiro", "journal": "Rev. Baiana Enferm. (Online)", "year": "2011", "vol": "25(3)", "doi": "", "abstract": "O objetivo deste estudo é discutir as formas de avaliação e intervenção na dor neonatal e refletir acerca dacompetência do enfermeiro no manejo e controle da dor. Trata-se de uma pesquisa de revisão da literatura, numaabordagem qualitativa exploratória. Para o levantamento dos dados efetuou-se uma busca eletrônica na BibliotecaVirtual em Saúde, entre julho e agosto de 2010, utilizando descritores previamente selecionados. A análise dosdados possibilitou a elaboração de dois eixos temáticos: Avaliação da Dor Neonatal e Medidas de Intervenção naDor Neonatal. Os resultados evidenciaram que os neonatos em cuidados intensivos, frequentemente submetidos aprocedimentos dolorosos, nem sempre recebem analgesia. Concluiu-se que, apesar da dor ser tratada atualmentecomo o quinto sinal vital, o seu alívio não é uma prática rotineira em neonatologia."}, {"id": 401, "title": "Instalação do CPAP nasal - identificando a dor do recém-nato como um cuidado de enfermagem", "authors": "Antunes, Joice Cristina Pereira; Nascimento, Maria Aparecida de Luca; Gomes, Aline Verônica de Oliveira et al.", "journal": "Rev. enferm. UFPE on line", "year": "2010", "vol": "4(1):142-148", "doi": "10.5205/reuol.592-5661-1-LE.0401201019", "abstract": "Objetivos: identificar se os enfermeiros reconhecem a realização do procedimento técnico de instalação do CPAP nasal em recém-nascido como desencadeante da dor; propor, a partir dos resultados obtidos, a inserção desta técnica, no rol dos procedimentos dolorosos. Métodos: trata-se de um estudo descritivo, exploratório, que se utiliza da abordagem quantitativa. Foi realizado durante o mês de março de 2009, em uma unidade de terapia intensiva neonatal (UTIn) de uma Instituição Federal do Rio de Janeiro. Os dados foram coletados através de um questionário, os quais foram tratados quantitativamente, e a análise foi realizada por meio das frequências percentual e relativa. O estudo foi aprovado pelo Comitê de Ética em Pesquisa da Universidade Federal do Rio de Janeiro (número do protocolo 0044/08). Resultados: dos 11 enfermeiros entrevistados, apenas 2(18%) sinalizaram o CPAP nasal como doloroso. A realidade é que a dor e o seu manejo no RN recebem pouca atenção na prática clínica. Conclusão: conclui-se que há necessidade de uma mudança de paradigma com relação à instalação do CPAP nasal, a qual precisa ser revista sob um enfoque científico, crítico e reflexivo, considerando toda a complexidade de que se reveste, para que possamos reproduzir o cuidado e não apenas uma técnica de enfermagem.(AU)"}, {"id": 402, "title": "Dor neonatal: medidas não-farmacológicas utilizadas pela equipe de enfermagem", "authors": "Aquino, Fernanda Martins de; Christoffel, Marialda Moreira", "journal": "Rev. Rene (Impr.)", "year": "2010", "vol": "11(n.esp):169-177", "doi": "", "abstract": "Este estudo objetivou identificar os procedimentos considerados dolorosos pela equipe de enfermagem e verificar as medidas não-farmacológicas para alívio da dor e do desconforto empregadas pela equipe de enfermagem no cuidado neonatal. Estudo descritivo-exploratório, de abordagem quantitativa, cuja coleta de dados ocorreu na Unidade Neonatal de uma maternidade do Município do Rio de Janeiro, em 2008. Das trinta e cinco profissionais de enfermagem entrevistadas que atuavam na assistência ao recém-nascido na Unidade Neonatal, pôde-se observar que 29 (82,9%) eram auxiliares de enfermagem e seis (17,1%) enfermeiras. Em relação às medidas não-farmacológicas utilizadas pelos profissionais de enfermagem, a maioria utilizava como principais medidas a contenção, a sucção não nutritiva, a glicose oral, o colo e o enrolamento. Concluiu-se que existia uma preocupação por parte da equipe de enfermagem em adotar medidas que minimizassem a dor no recém¬-nascido durante a hospitalização."}, {"id": 403, "title": "Aspiração traqueal e dor: reações do recém-nascidopré-termo durante o cuidado", "authors": "Araujo, Marcelle Campos; Nascimento, Maria Aparecida de Luca; Christoffel, Marialda Moreira et al.", "journal": "Ciênc. cuid. saúde", "year": "2010", "vol": "9(2):255-261", "doi": "", "abstract": "A dor sentida pelos recém-nascidos (RNs) criticamente doentes pode alterar sua estabilidade respiratória,cardiovascular e metabólica, aumentando os índices de morbimortalidade neonatal. Este estudo teve comoobjetivo avaliar a presença da dor nos RNs pré-termo submetidos à aspiração da cânula orotraqueal a partirda escala do perfil de dor do prematuro (PIPP). Os resultados indicaram que os RNs apresentavam dordurante o procedimento de aspiração da cânula orotraqueal, identificada a partir de reações comportamentaise fisiológicas como testa franzida, olhos espremidos e sulco nasolabial aprofundado, alteração da frequênciacardíaca e da saturação de oxigênio. Em apenas 20% dos procedimentos os enfermeiros utilizaram medidasnão farmacológicas para o alívio da dor. Durante esse procedimento os profissionais de saúde devem sercapazes de decodificar a dor compreendendo a sua fisiologia e os métodos de avaliação, para que possampromover ações em seu cuidar que minimizem sua ocorrência e seus efeitos a longo prazo nos RNs."}, {"id": 404, "title": "Education changes Mexican nurses' knowledge and attitudes regarding pediatric pain.", "authors": "Huth, Myra Martz; Gregg, Theresa L; Lin, Li", "journal": "Pain Manag Nurs", "year": "2010", "vol": "11(4):201-8", "doi": "10.1016/j.pmn.2009.11.001", "abstract": "This study explored the effectiveness of a pain education intervention on Mexican nurses' knowledge and attitudes toward pediatric pain. A convenience sample of 106 registered nurses from three hospitals in Mexico City was recruited. A Pediatric Pain Education Program (PPEP) was developed, implemented, and evaluated by a nurse researcher, clinical nurse specialist, and a child life specialist. The 4-hour program, which was translated into Spanish, consisted of pain assessment, physiology, and management, including pharmacology and nonpharmacology. The effects of PPEP were measured in a one-group pretest-posttest design using a translated Spanish version of the Pediatric Nurses' Knowledge and Attitudes Survey (PNKAS). A total of 79 nurses completed both tests. A paired t test indicated significant differences between pre- and posttest results (p < .0001) on the PNKAS. The hospital site and years of nursing experience were significantly related to nurses' pre- and post-PNKAS scores. One test item on children's ability to reliably report their pain had a significantly lower score after the intervention (p = .016). The intervention was effective in improving Mexican pediatric nurses' knowledge and attitudes. However, it is not known how long this effect was maintained. Health care professionals can share a common vision for pain management by increasing international collaborative efforts and by advancing pediatric pain knowledge."}, {"id": 405, "title": "Estudio descriptivo del manejo del dolor en servicios del Hospital Nacional de Niños Dr. Carlos Sáenz Herrera de julio del 2005 a diciembre del 2006", "authors": "Jiménez Arguedas, Gabriela; Gamboa Chaves, Ana Yessika", "journal": "Acta pediátr. costarric", "year": "2010", "vol": "22(1):23-27", "doi": "", "abstract": "Objetivo: describir el manejo del dolor en pacientes de algunos servicios del Hospital Nacional de Niños Dr. Carlos Sáenz Herrera. Materiales y métodos: se escogieron los servicios de infectología, cirugía general, ortopedia y hemato-oncología para efectuar la recolección de casos a partir del expediente clínico y las tarjetas de enfermería. Resultados: En pacientes con dolor por alguna patología de fondo, n igual 71, el tipo fue descrito sólo en 1 paciente. El 74.6 por ciento, n igual 53, de los casos presentó un dolor agudo. En 8 pacientes no se anotó el tiempo de evolución del dolor. La intensidad no se describió en 65.7 por ciento, n igual 46. No se utilizan escalas para evaluar. En el 69.6 por ciento, n igual 48, se interrogó diariamente. El medicamento más utilizado fue la morfina, 84.5 por ciento. En relación con lo pacientes sometidos a procedimientos, n igual 29, sólo a 3 pacientes se les aplicó una dosis subóptima de sedación. En ningún caso se evaluó el dolor residual. Conclusiones: En este trabajo se evidencia un déficit en la descripción de la semiología del dolor. Esto cobra mayor importancia en datos como tipo e intensidad que son vitales para el tratamiento correcto. El uso de analgesia y sedación a la hora de hacer procedimientos es adecuado. Se necesita mejorar el entrenamiento del personal para llevar a cabo una adecuada revaloración de los pacientes con dolor."}, {"id": 406, "title": "Conhecimento e percepção da equipe de enfermagem em relação à dor na criança internada", "authors": "Kanai, Kenia Yurie; Fidelis, Wania Maria Zangirolamo", "journal": "Rev. dor", "year": "2010", "vol": "11(1)", "doi": "", "abstract": "JUSTIFICATIVA E OBJETIVOS: A avaliação da dor é extremamente importante, pois sem sua medida, torna-se difícil determinar o tratamento mais adequado para a criança internada, porque a eficácia do tratamento depende da avaliação e mensuração confiável da dor. Os objetivos deste estudo foram identificar os conhecimentos da equipe de enfermagem com relação aos instrumentos disponíveis para avaliar a dor e os sentimentos do profissional de enfermagem ao prestar assistência aos pacientes pediátricos internados, com queixas álgicas.MÉTODO: Após aprovação pelo Comitê de Ética e Pesquisa da Instituição foram incluídos 9 enfermeiros e 9 técnicos de enfermagem, com no mínimo, um ano de experiência, que concordaram em participar deste estudo descritivo-exploratório, transversal, de nível II, utilizando os recursos da abordagem quantitativo-qualitativa, realizado na Unidade de Pediatria e Hospital Dia de um hospital geral, particular, de grande porte. Para a coleta de dados foi elaborado um roteiro semiestruturado de entrevista composto por cinco questões, sendo uma fechada, sobre dados de identificação do participante e quatro abertas, sendo que duas delas eram sobre conhecimento dos instrumentos para avaliação da dor e as outras duas questões sobre a assistência à criança com dor e o sentimento do profissional de enfermagem frente à dor na criança.RESULTADOS: Os enfermeiros apresentaram maior conhecimento dos instrumentos de avaliação da dor do que os técnicos de enfermagem, porém não apresentaram maior conhecimento na aplicação e indicação dos instrumentos de avaliação da dor de acordo com a idade e condição clínica da criança, do que os técnicos de enfermagem. Com relação aos dados qualitativos referentes à entrevista sobre a avaliação dos sentimentos da equipe de enfermagem foram encontradas três categorias para relatar a importância de avaliar a dor na criança e três categorias em relação à experiência ao lidar com a dor na criança internada.CONCLUSÃO: A maioria dos enfermeiros e técnicos de enfermagem que participou deste estudo não conhece todos os instrumentos disponíveis para avaliar a dor em crianças internadas e entre os sentimentos ao avaliar esses pacientes, destacaram a importância de avaliar a dor, a humanização, as possibilidades terapêuticas e a necessidade de desenvolver a percepção, e em relação à sua experiência ao lidar com a dor na criança internada destacaram a impotência, a racionalização do uso da medicação analgésica e a importância da comunicação com os familiares e com a criança."}, {"id": 407, "title": "Mothers' view on late postoperative pain management by the nursing team in children after cardiac surgery.", "authors": "Nascimento, Lucila Castanheira; Strabelli, Brisa Soldatelli; de Almeida, Fernanda Cristina Queiroz Gomes et al.", "journal": "Rev Lat Am Enfermagem", "year": "2010", "vol": "18(4):709-15", "doi": "", "abstract": "Postoperative pain management in children is a complex, multidimensional and subjective phenomenon. It represents a challenge for children, parents and health professionals. This study aimed to understand how mothers assess their children's pain management by the nursing team in the late postoperative phase of cardiac surgery. Empirical data collection was carried out through semistructured interviews with 17 mothers who accompanied their children. Data were subject to qualitative analysis, revealing that, for the mothers, taking good care results from the confidence they vest in the nursing team and from the observation of the medication interventions this team performs. Not taking good care of their children is a consequence of lack of information or inadequate communication between the team and the mothers. The results of this study permit identifying aspects that strengthen and weaken nursing care for these clients, contributing to the improvement of the delivered care."}, {"id": 408, "title": "Avaliação comportamental e fisiológica da dor em recém-nascidos pelos profissionais de enfermagem", "authors": "Oliveira, Roberta Meneses; Silva, Ana Valeska Siebra e; Chaves, Edna Maria Camelo et al.", "journal": "REME rev. min. enferm", "year": "2010", "vol": "14(1):19-24", "doi": "", "abstract": "A avaliação da dor em recém-nascidos (RNs) tornou-se temática de grande interesse pelos profissionais que atuam em neonatologia nos últimos anos, pois existe uma linguagem para a dor nessa faixa etária que pode guiar os profissionais na implementação de medidas analgésicas durante os procedimentos dolorosos realizados nas Unidades de Terapia Intensiva Neonatais (UTINs). O objetivo com esta pesquisa foi conhecer os parâmetros fisiológicos e comportamentais utilizados pelos profissionais de enfermagem para avaliação da dor em neonatos. Este é um estudo transversal, descritivo e quantitativo, realizado em quatro hospitais de referência no atendimento neonatal de Fortaleza-CE, Brasil, entre agosto a outubro de 2007. Aplicou-se formulário a uma amostra por conveniência formada por 180 profissionais de enfermagem. Os dados foram tabulados em planilha do Excel e analisados com estatística descritiva simples. A equipe de enfermagem avaliou a dor, principalmente, observando mudanças no comportamento do neonato, incluindo alterações no choro (98,3%), na mímica facial (78,3%), no humor (55%) e nos movimentos corporais (33%). As alterações cardiovasculares e respiratórias foram as modificações fisiológicas mais citadas pelas profissionais (28,8% e 21,6%, respectivamente). As técnicas de enfermagem lembraram-se de citar essas alterações quase duas vezes mais que as auxiliares de enfermagem (40/%). A predominância da avaliação comportamental do neonato diante de procedimentos dolorosos, em detrimento da avaliação dos aspectos fisiológicos relacionados, caracteriza um conhecimento pouco explorado na prática, que ainda não estabelece uma aproximação ou consonância com a literatura atual sobre o tema em questão."}, {"id": 409, "title": "A dor e o recém-nascido de risco: percepção dos profissionais de enfermagem", "authors": "Veronez, Marly; Corrêa, Darci Aparecida Martins", "journal": "Cogitare enferm", "year": "2010", "vol": "15(2):263-270", "doi": "", "abstract": "Estudo descritivo, qualitativo com o objetivo de descrever a percepção dos profissionais de enfermagem que atuam em unidade de terapia intensiva neonatal sobre a dor no recém-nascido. Participaram 25 profissionais de um hospital universitário, os dados foram coletados nos meses de dezembro de 2008 e janeiro de 2009 por meio de questionário. Emergiram quatro categorias: nocicepção no período neonatal; percepção da dor nos recém-nascidos e suas consequências, procedimentos mais dolorosos realizados; e estratégias utilizadas para o manejo da dor. Os resultados envolvem o reconhecimento da dor pelos participantes, a utilização de medidas farmacológicas e não-farmacológicas, a punção venosa como procedimento mais doloroso e a necessidade de reconhecerem, avaliarem e intervirem neste fenômeno, considerando a implantação emergencial de um protocolo de avaliação da dor na unidade e treinamento da equipe envolvida, contribuindo para a humanização da assistência."}, {"id": 410, "title": "Princípios éticos da equipe de enfermagem ao cuidar da dor do recém-nascido", "authors": "Christoffel, Marialda Moreira; Cunha, Janice Machado da; Sant Anna, Alexandra dos Santos Freitas de et al.", "journal": "REME rev. min. enferm", "year": "2009", "vol": "13(3):321-326", "doi": "", "abstract": "Com este estudo tem-se como objetivo analisar a perspectiva ética utilizada pela equipe de enfermagem em suaprática cotidiana. Trata-se de uma pesquisa qualitativa realizada num hospital universitário, localizado no municípiodo Rio de Janeiro. Foram entrevistados 8 integrantes da equipe de Enfermagem das Unidades Neonatais e atendidostodos os aspectos éticos da pesquisa sendo autorizado pelo Comitê de Ética em Pesquisa por meio do Processo n°1239  CEP/ HUPE  CAAE: 0107.0.228.000-05. Os resultados analisados estabelecem como categorias analíticas abeneficência, a não maleficência, a autonomia e a justiça. O profissional de enfermagem tem sua prática incorporadaàs questões éticas, contudo percebemos certa fragilidade no embasamento teórico/conceitual como forma desistematizar o cuidado prestado ao recém-nascido que sente dor."}, {"id": 411, "title": "Programa de implementación de una unidad de dolor agudo pediátrico", "authors": "Coll Loha, Roberto C; Reinoso Barbero, Francisco", "journal": "Rev. argent. anestesiol", "year": "2009", "vol": "67(1):45-65", "doi": "", "abstract": "Objetivo: Describir la implantación, el desarrollo y la gestión de una unidad de dolor agudo en un hospital pediátrico. Material y métodos: Se realizó una consulta y análisis de fuentes científicas sobre dolor agudo, dolor infantil, unidades de dolor agudo y protocolos de dolor infantil. Se hizo una selección de los artículos más relevantes sobre el tema en los idiomas inglés y español en libros, revistas, publicaciones y páginas web de anestesiología, de dolor y de enfermería. Las fuentes analizadas y consultadas abarcaron el período comprendido entre los años 1988 y 2007. Resultados: Con la información obtenida se elaboró un documento de actualización acerca de la situación del dolor infantil. Se confeccionó un programa con las bases principales para la puesta en marcha de una unidad de dolor agudo en un hospital infantil. Para ello se seleccionaron destacados modelos de implementación y gestión de servicios de dolor, así como protocolos de actuación y vías clínicas de dolor infantil para el desarrollo de dicho programa. Conclusiones: Mediante la utilización de los métodos tradicionales y de los más nuevos en terapia del dolor es posible brindar una analgesia eficaz prácticamente a todos los pacientes, pero para que esos tratamientos sean aplicados correctamente es necesario contar con una infraestructura establecida. Uno de los recursos más importantes de los que se dispone en la actualidad es la implementación de una organización formal, como las unidades de dolor agudo infantil, con la intención de brindar una calidad asistencial de excelencia que optimice el uso de las técnicas analgésicas existentes con la máxima seguridad y con el mínimo de efectos secundarios posible."}, {"id": 412, "title": "Tratamiento del dolor en la unidad de cuidados intensivos neonatales", "authors": "Erpen, N", "journal": "Med. infant", "year": "2009", "vol": "16(3):339-344", "doi": "", "abstract": ""}, {"id": 413, "title": "Diseño e implementación del sistema de información para la relación docencia-servicio del programa de enfermería en la Universidad Libre de Pereira", "authors": "Escobar M., Julia Inés; Muñoz A., Maria Nelcy", "journal": "Cult. cuid. enferm", "year": "2009", "vol": "6(2):14-26", "doi": "", "abstract": "Objetivo: Presentar la metodología empleada en el diseño del sistema de información para la relación docencia-servicio, según el acuerdo 003 de 2003 y describir los resultados de su implementación en el primer semestre de 2008. Metodología: Se construyeron indicadores a partir de los criterios de evaluación para cada una de los factores y características del acuerdo. Se definieron los subsistemas de gestión y operación y la información generada de las unidades básicas: convenio, acta de reunión de la relación docencia-servicio, evaluación y costos y suministros. Resultados: El 100 de los convenios se realizó con instituciones que tenían certificación y habilitación y se elaboraron siguiendo los criterios del modelo docencia-servicio. Se realizaron comités al inicio del semestre, en el 100 de los convenios realizados. El 37,5, de los usuarios atendidos por los estudiantes fueron adultos jóvenes, el 18,0 niños menores de 10 años y adultos mayores, el 10,4. Los diagnósticos enfermeros más frecuentes fueron: el riesgo de infección, el dolor agudo y el deterioro de la movilidad física. El 36,6 de los procedimientos de enfermería fueron administrativos el 39,8, clínicos y el 23,6 de tipo ambulatorio y comunitario. Conclusiones: El diseño del sistema de información para la relación docencia-servicio ha sido útil para realizar su seguimiento desde el orden gerencial y operativo y en el proceso de toma de decisiones referente al proceso educativo de los estudiantes de enfermería durante sus prácticas formativas."}, {"id": 414, "title": "Fácies do trabalho de enfermagem na assistência à criança hospitalizada", "authors": "Quirino, Daniela Dias; Collet, Neusa", "journal": "Rev. eletrônica enferm", "year": "2009", "vol": "11(3)", "doi": "", "abstract": "No cuidado à criança hospitalizada devemos buscar a construção de um projeto terapêutico compartilhado e centrado na criança e sua família. O objetivo deste estudo foi apreender a organização do processo de trabalho da equipe de enfermagem no cuidado a crianças hospitalizadas. Pesquisa exploratória de natureza qualitativa cuja coleta de dados foi realizada em um hospital filantrópico do estado de Pernambuco por meio da entrevista semi-estruturada nos meses de abril e maio de 2007. Os sujeitos do estudo foram enfermeiras, técnicas e auxiliares de enfermagem que aceitaram participar da pesquisa. Os resultados apontam que o modo de organização do trabalho da equipe de enfermagem está centrado em procedimentos e fragmentação de tarefas. A insuficiência de recursos humanos, sobrecarga de trabalho, superlotação, insatisfação e desmotivação profissional são determinantes que contribuem para esse modelo assistencial. Esses aspectos são agravantes de problemas para a criança-família e para os profissionais, gerando medo, ansiedade, angústia, dor, podendo desencadear sofrimento psíquico. Para a superação desse enfoque urge a adoção de tecnologias de cuidado pautadas pela integralidade, vínculo, responsabilização. A construção da assistência de enfermagem à criança hospitalizada exige que os profissionais reflitam suas práxis, reorganizando seus processos de trabalhos a partir do trabalho coletivo e humanizado."}, {"id": 415, "title": "Vivenciando um mundo de procedimentos e preocupações: experiência da criança com Port-a-Cath", "authors": "Ribeiro, Circéa Amalia; Coutinho, Rosa Maria; Araújo, Talita Ferreira de et al.", "journal": "Acta paul. enferm", "year": "2009", "vol": "22(spe):935-941", "doi": "", "abstract": "OBJETIVOS: Compreender como é para a criança com câncer a vivência de ser portadora de Port-a-Cath a partir de suas manifestações numa sessão de Brinquedo Terapêutico Dramático e propiciar a ela um meio de alívio. MÉTODOS: Estudo descritivo qualitativo realizado com seis crianças escolares e uma adolescente, cujos dados foram coletados numa sessão de Brinquedo Terapêutico Dramático e submetidos à análise qualitativa de conteúdo. RESULTADOS: Permitiram compreender que os procedimentos intrusivos geram ansiedade, preocupação, medo e dor às crianças, assim como que elas reconhecem a importância dos procedimentos, dos medicamentos, da realização dos exames físico e laboratoriais para o tratamento; reconhecem as vantagens da utilização do Port-a-Cath, mas que sua utilização é fonte de ansiedade, limitações e preocupações, especialmente as relacionadas ao risco de infecção, e que se sentiram felizes, confortadas e fortalecidas com o brincar. CONSIDERAÇÕES FINAIS: Os enfermeiros precisam estar preparados para assistirem a essas crianças integralmente e para utilizarem sistematicamente o Brinquedo Terapêutico como instrumento de comunicação e intervenção de enfermagem."}, {"id": 416, "title": "Pain still lords over children.", "authors": "Baker, Justin N; Anghelescu, Doralina L; Kane, Javier R", "journal": "J Pediatr", "year": "2008", "vol": "152(1):6-8", "doi": "", "abstract": ""}, {"id": 417, "title": "Estrategias no farmacológicas en el alivio del dolor del recién nacido en procedimientos de enfermería", "authors": "Betancourt-Fuentes, Carmen Eugenia; Espinosa-García, José Oscar; Aguilar-Herrera, Silvia et al.", "journal": "Rev. enferm. Inst. Mex. Seguro Soc", "year": "2008", "vol": "16(2):83-88", "doi": "", "abstract": "Introducción: El tratamiento analgésico para procedimientos dolorosos es de uso limitado en algunas unidades. Existen varios procedimientos de enfermería durante el cuidado neonatal diario que producen dolor, éste debe ser prevenido y tratado. Existen abordajes no farmacológicos que pueden ser fácilmente realizados por las enfermeras antes de esos procedimientos. Objetivo: Comparar la eficacia de dos estrategias no farmacológicas para el tratamiento y prevención del dolor causado por procedimientos de enfermería en neonatos. Metodología: Se llevó a cabo ensayo clínico en 88 niños > de 35 semanas de gestación nacidos en el Hospital de Ginecología y Pediatría No. 48 de León Gto., de ellos 44 recibieron glucosa al 30% por vía oral dos minutos previos al procedimiento doloroso, y al resto se les ofreció succión no nutritiva con chupón. Ambos grupos fueron evaluados durante el estímulo doloroso mediante una escala validada y fueron filmados para corroborar dicha evaluación. Resultados: No existieron diferencias entre grupos. Ambos procedimientos mostraron eficacia similar para tratar y prevenir el dolor. Discusión: Ambos abordajes no farmacológicos, tanto el uso de glucosa al 30% por vía oral o la succión no nutritiva con chupón son útiles para prevenir el dolor, cuando se utilizan dos minutos previos a la realización de procedimientos de enfermería dolorosos en neonatos. Su utilización debe constituirse en una intervención necesaria u obligatoria en los cuneros."}, {"id": 418, "title": "The effects of skin-to-skin contact during acute pain in preterm newborns.", "authors": "Castral, Thaila C; Warnock, Fay; Leite, Adriana M et al.", "journal": "Eur J Pain", "year": "2008", "vol": "12(4):464-71", "doi": "", "abstract": "BACKGROUND AND PURPOSE: Several promising non-pharmacological interventions have been developed to reduce acute pain in preterm infants including skin-to-skin contact between a mother and her infant. However, variability in physiological outcomes of existing studies on skin-to-skin makes it difficult to determine treatment effects of this naturalistic approach for the preterm infant. The aim of this study was to test the efficacy of mother and infant skin-to-skin contact during heel prick in premature infants. METHOD: Fifty nine stable preterm infants (born at least 30 weeks gestational age) who were undergoing routine heel lance were randomly assigned to either 15 min of skin-to-skin contact before, during and following heel prick (n=31, treatment group), or to regular care (n=28, control group). Throughout the heel lance procedure, all infants were assessed for change in facial action (NFCS), behavioral state, crying, and heart rate. RESULTS: Statistically significant differences were noted between the treatment and control groups during the puncture, heel squeeze and the post phases of heel prick. Infants who received skin-to-skin contact were more likely to show lower NFCS scores throughout the procedure. Both groups of infants cried and showed increased heart rate during puncture and heel squeeze although changes in these measures were less for the treated infants. CONCLUSIONS: Skin-to-skin contact promoted reduction in behavioral measures and less physiological increase during procedure. It is recommended that skin-to-skin contact be used as a non-pharmacologic intervention to relieve acute pain in stable premature infants born 30 weeks gestational age or older."}, {"id": 419, "title": "Conhecimento e atitudes da enfermagem de uma unidade neonatal em relação à dor no recém-nascido", "authors": "Guimarães, Ana Lúcia O; Vieira, Maria Rita R", "journal": "Arq. ciênc. saúde", "year": "2008", "vol": "15(1):9-12", "doi": "", "abstract": "Objetivo: Verificar o conhecimento da equipe de enfermagem em relação à dor no recém-nascido (RN) e aos cuidados desenvolvidos na assistência ao RN com dor. Métodos: Estudo transversal com 39 profissionais da equipe de enfermagem de um hospital de ensino de São José do Rio Preto que responderam a um questionário,com perguntas a respeito da dor no recém-nascido. Resultados: A equipe conhece a dor no recém-nascido por meio das alterações comportamentais e fisiológicas; 79,5% e 20,5%, respectivamente. A escala de faces para detecção da dor no RN era usada por 76,9% e no que se refere às atitudes tomadas frente à dor pela equipe, 62% realizavam medidas farmacológicas e 38% não-farmacológicas para amenizar a dor no RN. Conclusão: Está havendo uma mudança de pensamento em relação à analgesia. Os profissionais da saúde estão conscientes sobre a importância de se tratar a dor no período neonatal."}, {"id": 420, "title": "O impacto da atividade lúdica sobre o bem-estar de crianças hospitalizadas", "authors": "Mussa, Claudia; Malerbi, Fani Eta Korn", "journal": "Psicol. (Univ. Presbiteriana Mackenzie, Online)", "year": "2008", "vol": "10(2):83-93", "doi": "", "abstract": "A internação hospitalar de uma criança doente pode ser considerada uma situação produtora de estresse. Visando melhorar o estado de humor de crianças hospitalizadas, muitas intervenções têm empregado atividades lúdicas. O objetivo deste trabalho foi avaliar o impacto da atividade lúdica desenvolvida por um grupo de contadores de histórias sobre o estado emocional e as queixas de dor de crianças hospitalizadas. Quinze crianças com neoplasias malignas foram observadas, segundo um roteiro de comportamentos, e submetidas a uma escala de dor, e seus pais foram entrevistados antes e depois da visita dos contadores. Os resultados apontaram que a maioria das crianças aumentou a interação após a visita dos contadores, diminuiu as queixas de dor, ficou mais calma durante os procedimentos médicos, aumentou as movimentações pela enfermaria do hospital, além de apresentar maior aceitação dos alimentos. Esses dados indicam os efeitos positivos da atividade lúdica."}, {"id": 421, "title": "[Care practices for neonates while setting up a neonatal unit in a university hospital].", "authors": "Pedron, Cecília Drebes; Bonilha, Ana Lúcia de Lourenzi", "journal": "Rev Gaucha Enferm", "year": "2008", "vol": "29(4):612-8", "doi": "", "abstract": "The hospitalization process of neonates makes them vulnerable to several care practices. The aim of this study was to get to know the care practices adopted by health professionals while setting up a neonatal unit at the Hospital de Clínicas of Porto Alegre, Rio Grande do Sul, Brazil. This is a qualitative study based on the New History Theory. The study collected data from October 2006 to January 2007. Fifteen health professionals responsible for the project and/or its implementation from 1972 to 1984 provided information. The thematic data analysis highlighted the concern among health professionals of making good use of technological advances, as well as unifying scientifically-based conducts. Besides, they tried to establish routines enabling neonate's parents to stay at the bedside during the whole hospitalization period. Finally, it was inferred that the main objective of these practices was to increase the survival of neonates."}, {"id": 422, "title": "A relação intersubjetiva entre o enfermeiro e a criança com dor na fase pós-operatória no ato de cuidar", "authors": "Persegona, Karin Rosa; Zagonel, Ivete Palmira Sanson", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2008", "vol": "12(3):430-436", "doi": "", "abstract": "Pesquisa qualitativa que tem como questão norteadora como se processa a relação intersubjetiva estabelecida entre o enfermeiro e a criança com dor na fase pós-operatória no ato de cuidar? baseada na Teoria Humanística de Paterson e Zderad pelo método exploratório-descritivo. Os objetivos foram identificar a relação intersubjetiva estabelecida no ato de cuidar e desvelar como se desenvolve o cuidado do enfermeiro à criança com dor na fase pós-operatória. As informações foram coletadas com oito enfermeiros pela entrevista semi-estruturada gravada. Utilizou-se a Análise Textual Qualitativa proposta por Moraes (2003). Da análise emergiram três categorias e seis unidades de significado. Conclui-se que ser sensível ao sofrimento do outro, fazer-se presente, saber ouvir, tocar, relacionar-se, requer aproximação, na perspectiva de perceber os aspectos subjetivos da criança, a maneira como reage física e emocionalmente ao sofrimento que a dor lhe proporciona. O cuidado humanístico deve ser delineado a partir da percepção multidimensional da experiência existencial de dor."}, {"id": 423, "title": "Eficácia da glicose como analgésico em procedimentos dolorosos em neonatos", "authors": "Bastos, Marisa Antonini Ribeiro", "journal": "Rev. paul. enferm", "year": "2007", "vol": "26(1):39-44", "doi": "", "abstract": "Trata-se de uma revisão sistemática da literatura, com o objetivo de analisar a eficácia do uso da glicose como analgésico em procedimentos dolorosos em neonatos. Utilizou-se como fonte a produção científica do MEDLINE. Após a seleção dos trabalhos a partir dos critérios de inclusão, foram identificados oito estudos randomizados controlados que avaliaram a eficácia da glicose no controle da dor em recém-nascidos pretermos e termos durante a punção de calcâneo e venopunção. Os resultados desta revisão sistemática indicam que ouso da glicose oral diminui o tempo de choro após o estímulo doloroso em neonatos pretermos e termos, reduzindo, também, os escores das escalas de avaliação da dor em RN termos."}, {"id": 424, "title": "Avaliação da dor em recém-nascidos submetidos à cirurgia cardiáca", "authors": "Bueno, Mariana; Kimura, Amélia Fumiko; Pimenta, Cibele Andrucioli de Matos", "journal": "Acta paul. enferm", "year": "2007", "vol": "20(4):428-433", "doi": "", "abstract": "OBJETIVOS: Identificar o método utilizado para avaliar a dor pós-operatória em cirurgia cardíaca neonatal; verificar a freqüência de avaliação e identificar a prevalência de dor pós-operatória. MÉTODOS: Estudo transversal com coleta de dados retrospectiva. RESULTADOS: A maioria (80,0 por cento) dos neonatos foi avaliada quanto a dor, o método mais utilizado foi a escala Neonatal Infant Pain Scale (NIPS) (56,7 por cento). A freqüência de avaliações variou entre uma e 13 vezes e a maior parte dos neonatos teve sete ou mais avaliações. A maioria (56,7 por cento) apresentou registro de dor e a média de episódios de dor foi 1,8. CONCLUSÃO: Tanto o método quanto a freqüência de avaliação de dor não seguem padronização e a prevalência de ocorrência de dor foi elevada."}, {"id": 425, "title": "Procedimentos dolorosos em recém-nascidos de baixo risco", "authors": "Bueno, Mariana; Silva, Andréia da", "journal": "REME rev. min. enferm", "year": "2007", "vol": "11(3):238-241", "doi": "", "abstract": "INTRODUÇÃO: A preocupação com os efeitos deletérios resultantes da dor em neonatos é crescente, até mesmo em recém-nascidos (RNs) de baixo risco, que são submetidos a procedimentos dolorosos, considerados isolados e pouco invasivos. OBJETIVOS: Verificar e caracterizar procedimentos dolorosos realizados em RNs de baixo risco. MÉTODO: Estudo descritivo e prospectivo, com coleta de dados dos registros de 156 prontuários. RESULTADOS: A média de procedimentos dolorosos durante a internação foi de 5,11, a mediana 4, o número máximo foi de 17 e o mínimo, 2.A média de procedimento/dia foi de 1,29. CONCLUSÃO: Os RNs são submetidos a um elevado número de estimulações dolorosas durante sua internação e preservá-los dessas experiências deve ser uma preocupação da equipe de enfermagem. Para tanto, métodos não farmacológicos constituem um caminho promissor para o tratamento da dor resultante de procedimentos isolados e de baixa complexidade e merecem ser alvo de investigação."}, {"id": 426, "title": "Swaddling and excessive crying.", "authors": "Karp, Harvey", "journal": "J Pediatr", "year": "2007", "vol": "151(1):e2-3; author reply e3", "doi": "", "abstract": ""}, {"id": 427, "title": "Revisión basada en la evidencia de la administración de Sucrosa oral para disminuir la respuesta de dolor en Recién Nacidos", "authors": "Leef, Kathleen H", "journal": "Rev. Enferm. Neonatal", "year": "2007", "vol": "1(3):5-14", "doi": "", "abstract": "Resumen: La detección y manejo del dolor constituyen en la actualidad temas importantes para la enfermera neonatal. Los clínicos han llegado a conocer gradualmente que los recién nacidos (de término o prematuros) son capaces de responder a estímulos dolorosos. Este artículo repasa la evidencia respecto de la seguridad y eficacia de la administración de sucrosa por vía oral para ayudar a responder la cuestión clínica de cómo manejar la respuesta al dolor del niño frente a procedimientos invasivos menores que son cotidianos en la unidad de cuidados intensivos neonatales. Esta revisión incluye información de 1.077 niños involucrados en 16 estudios. La evidencia presentada en los 16 estudios revisados aquí muestra la seguridad y eficacia de la sucrosa en la reducción de la res-puesta al dolor de los niños de término frente a un procedimiento en particular. Respecto de los niños de pretérmino, hay evidencia insuficiente para recomendar el uso de sucrosa como medida de confort rutinaria. Es necesaria más investigación para determinar la seguridad y eficacia de dosis de Sucrosa orales repetidas suministradas para múltiples procedimientos en niños de pretérmino"}, {"id": 428, "title": "Pode a amamentação promover alívio da dor aguda em recém-nascidos?: [revisão]", "authors": "Leite, Adriana Moraes; Castral, Thaila Corrêa; Scochi, Carmen Gracinda Silvan", "journal": "Rev. bras. enferm", "year": "2006", "vol": "59(4):538-542", "doi": "", "abstract": "Trata-se de um estudo de revisão cujo objetivo foi identificar a eficácia da amamentação e dos aspectos que a congregam (contato, sucção, odor e leite) como medidas não- farmacológicas no alívio da dor aguda em recém-nascidos. Os 14 artigos analisados foram obtidos pelo Medline/PubMed. Verificou-se diferenças metodológicas quanto à amostragem, procedimentos dolorosos, períodos e maneira de administrar o tratamento e variáveis mensuradas. Percebeu-se a eficácia da amamentação e dos aspectos que a congregam, no alívio da dor aguda. Percebe-se a necessidade de estudos que avaliem o seu efeito analgésico antes do procedimento doloroso, até a recuperação, tempo este, suficiente para atingir-se o efeito analgésico pós-absortivo do leite. Deve-se considerar a interação entre todos os componentes que estão contidos na amamentação."}, {"id": 429, "title": "Assistência de enfermagem na avaliação da dor da criança com câncer", "authors": "Santos, Claudia Gonçalves dos", "journal": "", "year": "2006", "vol": "44-44", "doi": "", "abstract": "A dor é um fenômeno subjetivo e, na criança, é cercado por mitos; sendo um grande desafio para a equipe de enfermagem que assiste a criança oncológica e com dor. Este trabalho baseou-se na busca de instrumentos de avaliação da dor que colaborem para uma melhor assistência do quadro álgico pediátrico, através de uma revisão de literatura cientifica brasileira e com base em pesquisa de dados na Bireme e Scielo, artigos de periódicos científicos, livros em português e resumos de artigos. O objetivo desse trabalho e conhecer os métodos de avaliação da dor na criança com câncer. A dor pode estar relacionada a vários fatores, e dores não controladas tornam a criança medrosa. O controle da dor e responsabilidade de todos os profissionais de saúde, os quais precisam conhecer a sua fisiopatologia e seu tratamento, utilizando métodos ou instrumentos de avaliação adequados, de acordo com a capacidade de responsividade da criança, e entre estes métodos estão a escala análogo-linear, escala de cores, entre outras. É relevante ressaltar a importância da assistência de enfermagem na avaliação e tratamento do quadro álgico na criança oncológica, considerando-o um ser social, que alem do câncer e da dor, apresenta outros fatores essenciais para o seu bem-estar. Apesar dos instrumentos de avaliação existentes, ainda e difícil mensurar a dor de todas as crianças com câncer, concluindo-se que para tal e necessário a participação de uma equipe multidisciplinar envolvendo, inclusive, os familiares e, sendo essencial acreditar no que a criança diz sentir."}, {"id": 430, "title": "Intervenções não-famacológicas para o alívio da dor em recém-nascidos prematuros (RNPT)", "authors": "Gaspary, Lisiane Valdez; Rocha, Ivi", "journal": "Nursing (Ed. bras., Impr.)", "year": "2004", "vol": "7(79):47-50", "doi": "", "abstract": "Este artigo é resultado de um estudo em que se analisaram, na literatura científica, intervenções não-farmacológicas para o alívio da dor em recém-nascidos prematuros (RNPT), submetidos a procedimentos minimamente invasivos. É um levantamento bibliográfico realizado por meio da técnica de leitura exploratória, interpretativa e seletiva das pesquisas publicadas, de 1998 a 2002, partindo dos unitermos dor e recém-nascido prematuro e das informações definição, fisiologia, avaliação e tratamento da dor. Concluiu-se que embora existam poucas pesquisas sobre dor em RNPT, há intervenções simples que podem amenizar a dor, o estresse e o sofrimento desses RNS. Essas são mudanças de rotinas e condutas, intervenções no meio ambiente, uso de glicose com ou sem sucção não-nutritiva e a posição canguru."}, {"id": 431, "title": "The continuing conundrum of sedation for painful and nonpainful procedures.", "authors": "Yaster, Myron; Cravero, Joseph P", "journal": "J Pediatr", "year": "2004", "vol": "145(1):10-2", "doi": "", "abstract": ""}, {"id": 432, "title": "Impacto de un programa didáctico preoperatorio en el niño con cirugía de corazón", "authors": "Arechiga-Diaz, Tayde; Rodríguez-Sánchez, Masiel; González-Ramírez, Rosa María", "journal": "Rev. enferm. Inst. Mex. Seguro Soc", "year": "2003", "vol": "11(2):87-92", "doi": "", "abstract": "Introducción: La interacción del niño hospitalizado y su familia con los factores físicos, psicológicos y sociales del ambiente hospitalario produce un determinado nivel de estrés al enfrentarse a un procedimiento quirúrgico. Objetivo: Evaluar el impacto de un programa didáctico sobre tratamiento médico y cuidados de enfermería en los cambios del nivel de estrés y dolor del niño hospitalizado para cirugía de corazón en el postoperatorio.  Metodología: Se realizó un estudio de intervención en población pediátrica, seleccionando aleatoriamente un grupo control y un grupo de intervención, al cual se aplicó un programa didáctico con juegos de mesa, juego gramatical y video adaptados con procedimientos de la terapia posquirúrgica. En ambos grupos se evaluó el nivel de estrés y dolor antes y después de la cirugía. Los datos se analizaron con estadística descriptiva e inferencial. Resultados: Se encontraron diferencias estadísticamente significativas entre los grupos en los niveles de estrés y dolor. El sangrado de tubo digestivo se presentó en 189 de los niños con mayor frecuencia en los niños del grupo control, así como, la insuficiencia respiratoria. Discusión: Se observó que los niños que recibieron preparación preoperatoria con la metodología didáctica propuesta manifestaron un nivel de estrés menor que los que recibieron la preparación habitual."}, {"id": 433, "title": "Manejo del dolor en el niño: reflejos de un modelo biomédico en una visión de estudiantes de enfermería", "authors": "Collao, Carmen", "journal": "Rev. cienc. salud", "year": "2003", "vol": "7(1):23-30", "doi": "", "abstract": "Dolor se ha definido como una experiencia sensorial y emocional desagradable con daño tisular actual o potencial, o descrito en términos de dicho daño. El niño que es hospitalizado, independiente de la causa que origine la internación, va a sentir dolor por los procedimientos médicos o de enfermería. Mediante un estudio descriptivo, se aplicó instrumento recolector a estudiantes de la carrera de Licenciatura en Enfermería de la Universidad de Antofagasta, acerca del manejo el dolor, que hace el equipo de salud (médico, enfermera, y técnico paramédico) del Hospital Clínico Regional de Antofagasta, en la atención del niño. Entre los resultados se destaca a la enfermera con los más altos indicadores frente a la credibilidad (91,3 por ciento), sensibilidad (86,0 por ciento), preocupación por calmar (69,6 por ciento) y valoración del niño en el (65,2 por ciento de lo casos). También se concluye que más del 50,0 por ciento de los estudiantes encuestados opina que el equipo de salud no sabe tratar el dolor. Se concluye que el modelo biomédico que privilegia la curación de la patología por sobre la atención de la persona. Focalizan en un dolor físico y no consideran la individualidad de la persona, deshumanizándolo y sacándolo del contexto donde habita: la persona."}, {"id": 434, "title": "Intervención de enfermería en el paciente pediátrico bajo sedación", "authors": "Carvajal Hermida, Elsa Yolanda", "journal": "Actual. enferm", "year": "2002", "vol": "5(2):26-29", "doi": "", "abstract": "Cualquier procedimiento de tipo médico, doloroso o no, en el niño menor de cinco años se debe considerar la sedación analgésica. Intervención que le permite tolerar los procedimientos molestos, disminuyendo la incomodidad, el dolor y la ansiedad producida por el temor a lo desconocido, a la utilización de tecnología sofisticada y ocasionalmente a la separación de sus padres o cuidadores, lo que facilita la realización del mismo y disminuye el tiempo de intervención"}, {"id": 435, "title": "Mediastinal chest drain clearance for cardiac surgery", "authors": "Wallen, MA; Morrison, AL; Gillies, D et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2002", "vol": "2", "doi": "10.1002/14651858.CD003042.pub2", "abstract": "Abstract - Background Cardiac tamponade may occur following cardiac surgery as a result of blood or fluid collecting in the pericardial space compressing the heart and reducing cardiac output. Mediastinal chest drains (including pericardial drains) are inserted as standard postoperative practice following cardiac surgery to assist the clearance of blood from the pericardial space. To prevent chest tubes from blocking and causing tamponade nurses manipulate them to prevent clots. Manipulation methods including milking, stripping, fanfolding and tapping may be applied to the tubes. Evidence is needed regarding the safest and most effective means of preventing chest tube blockage and cardiac tamponade. Objectives To compare different methods of chest drain clearance (i.e. varying levels of suction or suction in combination with milking, stripping, fanfolding and tapping of chest drains) in preventing cardiac tamponade in patients following cardiac surgery. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL) on  The Cochrane Library  (Issue 3 2009), MEDLINE (1966 to October 2009), EMBASE (1980 to October 2009), CINAHL (1982 to October 2009) and the metaRegister of Controlled Trials (mRCT) (13 October 2009) and reference lists of articles. No language restrictions were applied. Selection criteria Randomised, quasi‐randomised or systematically allocated clinical trials of chest tube manipulation methods in adults and children with mediastinal chest drains following cardiac surgery. Data collection and analysis Two reviewers independently assessed trial quality and extracted data. Study authors were contacted for additional information where required. Adverse effects information was collected from the trials. Main results Three studies with a total of 471 participants were included. There was no data which could be included in a meta‐analysis. This was due to inadequate data provision by two of the studies. Where adequate data were provided there were no common interventions or outcomes to pool. On the basis of single studies there was no evidence of a difference between groups on incidence of chest tube blockage, heart rate, cardiac tamponade or incidence of surgical re‐entry. Authors' conclusions There are insufficient studies which compare differing methods of chest drain clearance to support or refute the relative efficacy of the various methods in preventing cardiac tamponade. Nor can the need to manipulate chest drains be supported or refuted by results from RCTs. Plain language summary Mediastinal chest drain clearance following cardiac surgery Chest tubes are required following cardiac surgery to drain blood from around the heart. Blood around the heart can interfere with the function of the heart (cardiac tamponade) and result in more surgery and in extreme cases, death. To prevent chest tubes from blocking and so causing tamponade nurses manipulate them to prevent or remove clots. Manipulation may cause pain and discomfort for cardiac pa
