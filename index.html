enfermagem e observaram-se quatro recém-nascidos quanto às respostas fisiológicas e comportamentais aos procedimentos invasivos durante o tratamento intensivo. Resultados: Os métodos mais utilizados pela equipe de enfermagem na Unidade pesquisada foram: soro glicosado a 25%, sucção não nutritiva, contenção facilitada, leite materno e Método Canguru. Conclusão: Algumas participantes demonstraram não conhecer os métodos para manejo não farmacológico da dor em recém-nascidos pré-termo, constatando-se necessidade de mais pesquisas relacionadas à temática investigada.(AU)"}, {"id": 142, "title": "Proceso enfermero en neonato con retraso en la recuperación quirúrgica por atresia duodenal", "authors": "Sánchez-Juárez, Itzel Andrea; de Ávila-Arroyo, María Luz; Tenahua-Quitl, Inés et al.", "journal": "SANUS", "year": "2021", "vol": "6:1-13", "doi": "", "abstract": ""}, {"id": 143, "title": "Effect of acupressure on procedural pain before heel lancing in neonates.", "authors": "Tanju, Oğul; Fatma Yilmaz, Kurt", "journal": "Journal of traditional Chinese medicine = Chung i tsa chih ying wen pan", "year": "2021", "vol": "41(2):331-337", "doi": "", "abstract": "OBJECTIVE: To investigate the effect of acupressure applied to UB60 and K3 acupuncture points in order to relieve the procedural pain caused by heel lancing  blood sampling process in the term newborns. METHODS: The data were collected by  using the Information Form and the Neonatal Infant Pain Scale. Acupressure  applied for 3 min before heel lancing blood sampling in the newborns in the  experimental group (n = 31). No intervention was applied to newborns in the  control group (n = 32). RESULTS: A significant difference was found between mean  scores of the newborns in the control and acupressure group in favor of the  acupressure group in terms of heart rate during and after the procedure, oxygen  saturation before, during and after the procedure, duration of crying during and  after the procedure (P < 0.05). It was found that there was a significant  difference between groups in terms of Neonatal Infant Pain Scale mean scores  during (P = 0.001) and after the procedure (P < 0.05), and the difference was  found to be in favor of the acupressure group. CONCLUSION: As a result,  acupressure was found to be an effective method in relieving pain caused by heel  lancing blood sampling in newborns."}, {"id": 144, "title": "[Effects of stepwise acute pain management on acute pain and post-traumatic stress disorder in children with burns: a prospective randomized controlled  study].", "authors": "Wang, Y. Q.; Huang, J. Q.; Wu, Z. H. et al.", "journal": "Zhonghua shao shang za zhi = Zhonghua shaoshang zazhi = Chinese journal of burns", "year": "2021", "vol": "37(3):237-242", "doi": "10.3760/cma.j.cn501120-20200210-00048", "abstract": "Objective: To explore the effects of stepwise acute pain management on acute pain and post-traumatic stress disorder (PTSD) in children with burns. Methods: From  November 2018 to December 2019, 196 children with burns who were admitted to West  China Hospital of Sichuan University and met the inclusion criteria were enrolled  in the prospective randomized controlled study. The children were divided into  traditional pain management group (97 children, 51 males and 46 females, aged 1  to 6 years) and stepwise pain management group (96 children, 55 males and 41  females, aged 1 to 6 years) according to the random number table. Children in  traditional pain management group were treated with traditional acute pain care,  while the children in stepwise pain management group were treated with stepped  acute pain management (moderate pain was treated with oral administration of  acetaminophen sustained-release dry suspension at the dose of 10 to 15 mg/kg once  every 4 to 6 hours, and severe pain was treated with morphine intravenous  injection at the dose of 0.1 to 0.2 mg/kg once every 4 hours) on the basis of  traditional acute pain care after admission. The COMFORT behavior scale was  applied to compare the resting pain levels of children in the two groups within  post injury day (PID) 3 (1, 9, and 17 o'clock each day). The adverse reactions of  children in the stepwise pain management group during the treatment period were  recorded. The occurrence of PTSD within one month after injury was evaluated in  both groups by the revised PTSD scale. Data were statistically analyzed with  independent sample t test, Bonferroni correction, analysis of variance for  repeated measurement, chi-square test, Wilcoxon rank sum test, and Fisher's exact  probability test. Results: The pain scores of children in stepwise pain  management group were significantly lower than traditional pain management group  at 1, 9, and 17 o'clock on PID 1, 1, 9, and 17 o'clock on PID 2, and 1, 9, and 17  o'clock on PID 3 (t=2.71, 3.44, 4.05, 4.18, 4.08, 4.19, 4.25, 3.69, 3.71, P<0.05  or P<0.01). The pain scores of children in both groups showed a decreasing trend  over time. Of the 96 children in stepwise pain management group, 84 children were  treated with oral administration of acetaminophen sustained-release dry  suspension, and 12 children were treated with morphine intravenous injection. No  adverse reaction occurred during the treatment period. The incidence of PTSD of  children in stepwise pain management group within 1 month after injury was 3.12%  (3/96), which was significantly lower than 14.43% (14/97) in traditional pain  management group, P<0.05. Conclusions: The stepped acute pain management can  relieve the acute pain and reduce the incidence of PTSD in children with burns."}, {"id": 145, "title": "Stress and Perception of Procedural Pain Management in Chinese Parents of Children With Cancer.", "authors": "Yan, Cuixia; Cheung, Rita Sum-Yi; Wong, Cho Lee et al.", "journal": "Journal of pain and symptom management", "year": "2021", "vol": "61(1):90-102.e5", "doi": "10.1016/j.jpainsymman.2020.06.028", "abstract": "OBJECTIVES: Children with cancer are exposed to repeated painful and invasive procedures. This study examines Chinese parents' stress and perception toward  their children's procedural pain control. METHODS: We recruited 265 parents of  children (aged <18 years) diagnosed with hematological cancer (74.7%) and solid  tumors (25.3%) from two major public hospitals. Parents used a scale (0-10) to  rate perceived pain experienced by their child when undergoing lumbar puncture  (LP), bone marrow aspirate, or/and biopsy. They reported their stress level and  attitudes toward analgesics using the adapted Pain Flexibility Scale for Parents  and Parental Medication Attitude Questionnaire. General linear modeling was used  to identify factors associated with perception outcomes. RESULTS: Parents (72.8%  mothers, age 36.5 [6.8] years) expressed that they were worried (31.7%) and had  difficulty with concentration (57.7%) when the child was in pain. Among parents  whose children had undergone LP (n = 207), 39.1% perceived that their child still  experienced severe pain (pain score >7) even with existing pain control measures.  Parents reported concerns over side effects of analgesics (69.4%) and addiction  (35.1%). Half of the parents (47.2%) perceived that analgesics should only be  reserved for severe pain. Parents who were older (estimate = 2.07, SE = 0.87;  P = 0.0054) and had lower education attainment (estimate = -3.38, SE = 1.09;  P = 0.0021) had a more negative attitude toward analgesics use. Higher parental  distress was associated with avoidance of analgesics use (r(s) = 0.17,  P = 0.0052). CONCLUSION: Our findings suggested that subgroups of Chinese parents  demonstrated distress with their child's pain and harbored misconceptions over  analgesics use. Future work includes devising targeted psychoeducation  interventions for these parents."}, {"id": 146, "title": "Active and Passive Distraction Interventions in a Pediatric Emergency Department to Reduce the Pain and Anxiety During Venous Blood Sampling: A Randomized  Clinical Trial.", "authors": "Arıkan, Aylin; Esenay, Figen Işık", "journal": "Journal of emergency nursing", "year": "2020", "vol": "46(6):779-790", "doi": "10.1016/j.jen.2020.05.004", "abstract": "INTRODUCTION: Distraction is a method that is easy to use in emergency departments and effective in relieving procedural pain and anxiety. This study  aimed to determine the effect of 2 new distraction methods-1 active distraction  (rotatable wooden toy) and 1 passive distraction (toy wristband)-on procedural  pain, fear, and anxiety in children during venous blood sampling. METHODS: This  study was a randomized controlled experimental study. The sample consisted of 216  children aged 6 years to 12 years. They were divided into 3 groups using the  block randomization procedure: active distraction group (n = 72); passive  distraction group (n = 72); and control group (n = 72). The levels of pain and  anxiety in the children were measured before and during the blood sampling by the  children themselves, their parents, and the researcher using the Visual Analog  Scale, the Wong-Baker FACES Pain Rating Scale, and the Children's Fear Scale.  RESULTS: The children and their parents included in the control and experimental  groups had similar sociodemographic characteristics. The active distraction group  had lower levels of procedural pain, fear, and anxiety than the other groups  (children's visual analog scale score, F = 134.22; P < 0.05; Wong-Baker FACES  Pain Rating Scale score, F = 137.54; P < 0.001; and Children's Fear Scale score,  F = 92.44; P < 0.001). DISCUSSION: Both the toy wristband and rotatable wooden  toy interventions can be used to reduce procedural pain, fear, and anxiety in  children during blood sampling in emergency departments."}, {"id": 147, "title": "Increasing the cooperation of children during procedures using a high-tech device.", "authors": "Ashique, Karalikkattil T.; Kaliyadan, Feroze", "journal": "Journal of the American Academy of Dermatology", "year": "2020", "vol": "82(5):e151-e152", "doi": "10.1016/j.jaad.2018.07.023", "abstract": ""}, {"id": 148, "title": "A Systematic Review of Clinical Practice Guidelines for Acute Procedural Pain on Neonates.", "authors": "Balice-Bourgois, Colette; Zumstein-Shaha, Maya; Vanoni, Federica et al.", "journal": "The Clinical journal of pain", "year": "2020", "vol": "36(5):390-398", "doi": "10.1097/AJP.0000000000000808", "abstract": "OBJECTIVES: During hospitalization in neonatal intensive care units, neonates are exposed to many painful procedures within a stressful environment. To date, many  evidence-based guidelines are available. However, the quality of these guidelines  and their clinical application remain unclear. This systematic review aimed to  determinie the quality of existing guidelines on the management of procedural  pain in neonates and to summarize the recommendations provided by these  guidelines. MATERIALS AND METHODS: A structured search was conducted in Embase,  PubMed, CINAHL, JBI database, and gray literature resources in November 2018 to  identify relevant guidelines published from 2007 onward. Published guidelines and  guidelines from complementary searches were included in the treating assessment  or management of procedural pain in neonates. The methodological quality was  analyzed using the Appraisal of Guidelines for Research and Evaluation (AGREE) II  Instrument. RESULTS: A total of 1154 records were identified. After screening for  eligibility, 17 guidelines were included in this review. Among these, 11 were  identified to be high-quality guidelines. Besides the usual recommendations for  pharmacological and nonpharmacological treatments, the inclusion of parents,  improving interprofessional collaboration, and considering the setting were  identified as important elements. DISCUSSION: The results of this review show  that there is a need to improve the methodological quality of guidelines for  procedural pain in newborns. The set of recommendations for procedural pain  prevention needs to involve not only pharmacological and nonpharmacological pain  treatment but also parents and interprofessional collaboration. It is also  essential to take into account facilitators, barriers, and the context to improve  pain management."}, {"id": 149, "title": "Nonpharmacological analgesic interventions among newborn infants in the University Hospital of the University of Sao Paulo: a best practice implementation project.", "authors": "Brito, Ana P A; Shimoda, Gilceria T; Aragaki, Ilva M M et al.", "journal": "JBI Evid Implement", "year": "2020", "vol": "18(4):431-444", "doi": "10.1097/XEB.0000000000000246", "abstract": "INTRODUCTION: Despite evidence from studies on nonpharmacological pain management among newborns, many health professionals still don't apply evidence from scientific knowledge in their clinical practice. OBJECTIVES: To promote evidence-based practice for nonpharmacological analgesic interventions among newborns in the Maternity Ward of the University Hospital of the University of Sao Paulo, improving pain management and promoting healthy newborn growth and development, and better use of resources. METHOD: The current evidence implementation project used the JBI Practical Application of Clinical Evidence System and Getting Research into Practice audit and feedback tool. The JBI Practical Application of Clinical Evidence System and Getting Research into Practice framework for promoting evidence-based healthcare involve three phases of activity: conducting a baseline audit, implementing strategies to address areas of noncompliance and conducting a follow-up audit to assess the outcomes of the interventions implemented to improve practice. Ten evidence-based criteria on nonpharmacological pain management among newborns were audited, by direct observation of the nursing staff activities involving single skin-breaking procedures in the newborn. RESULTS: The baseline audit indicated poor compliance with evidence in current practice in most of the evidence-based criteria audited. Discussion with the implementation team identified barriers to best practice, with interventions including a nursing protocol and educational program for all nursing staff on nonpharmacological analgesic approaches to reduce pain in the newborn (breastfeeding, skin-to-skin contact with the mother, nonnutritive sucking and glucose 25%), and a leaflet to inform the best available evidence on newborn pain management. In the follow-up audit, compliance increased in eight of nine audit criteria, with criterion 7 remaining at 100% compliance to best practice. CONCLUSION: The current best practice implementation project contributed to establishing evidence-based practice and enhancing neonatal pain management during skin-breaking painful procedures in the University Hospital. However, to achieve 100% compliance with all the evidence-based audit criteria, we will need to invest in continuing education and extend this implementation project to other related settings of the hospital. Moreover, it is necessary to perform follow-up cyclical audits to assess compliance and address barriers to best practice, enhancing the quality of nursing care, ensuring better results on pain management of the newborn and ongoing sustainability of this project."}, {"id": 150, "title": "A cluster randomized clinical trial to evaluate the effectiveness of the Implementation of Infant Pain Practice Change (ImPaC) Resource to improve pain  practices in hospitalized infants: a study protocol.", "authors": "Bueno, Mariana; Stevens, Bonnie; Barwick, Melanie A. et al.", "journal": "Trials", "year": "2020", "vol": "21(1):16", "doi": "10.1186/s13063-019-3782-9", "abstract": "BACKGROUND: Hospitalized infants undergo multiple painful procedures daily. Despite the significant evidence, procedural pain assessment and management  continues to be suboptimal. Repetitive and untreated pain at this vital  developmental juncture is associated with negative behavioral and  neurodevelopmental consequences. To address this knowledge to practice gap, we  developed the web-based Implementation of Infant Pain Practice Change (ImPaC)  Resource to guide change in healthcare professionals' pain practice behaviors.  This protocol describes the evaluation of the intervention effectiveness and  implementation of the Resource and how organizational context influences  outcomes. METHODS: An effectiveness-implementation hybrid type 1 design, blending  a cluster randomized clinical trial and a mixed-methods implementation study will  be used. Eighteen Neonatal Intensive Care Units (NICUs) across Canada will be  randomized to intervention (INT) or standard practice (SP) groups. NICUs in the  INT group will receive the Resource for six months; those in the SP group will  continue with practice as usual and will be offered the Resource after a  six-month waiting period. Data analysts will be blinded to group allocation. To  address the intervention effectiveness, the INT and SP groups will be compared on  clinical outcomes including the proportion of infants who have procedural pain  assessed and managed, and the frequency and nature of painful procedures. Data  will be collected at baseline (before randomization) and at completion of the  intervention (six months). Implementation outcomes (feasibility, fidelity,  implementation cost, and reach) will be measured at completion of the  intervention. Sustainability will be assessed at six and 12 months following the  intervention. Organizational context will be assessed to examine its influence on  intervention and implementation outcomes. DISCUSSION: This mixed-methods study  aims to determine the effectiveness and the implementation of a multifaceted  online strategy for changing healthcare professionals' pain practices for  hospitalized infants. Implementation strategies that are easily and effectively  implemented are important for sustained change. The results will inform  healthcare professionals and decision-makers on how to address the challenges of  implementing the Resource within various organizational contexts. TRIAL  REGISTRATION: ClinicalTrials.gov, NCT03825822. Registered 31 January 2019."}, {"id": 151, "title": "Procesos dolorosos, evaluación y tratamiento en unidades de cuidados intensivos neonatales: revisión de la literatura científica", "authors": "Casanovas Marsal, JO; García Martínez, M", "journal": "Rev Rol Enfermería", "year": "2020", "vol": "43(4):264-279", "doi": "", "abstract": ""}, {"id": 152, "title": "Comparing the Analgesic Effects of 4 Nonpharmacologic Interventions on Term Newborns Undergoing Heel Lance: A Randomized Controlled Trial.", "authors": "Chang, Jie; Filoteo, Lourdes; Nasr, Annette S.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2020", "vol": "34(4):338-345", "doi": "10.1097/JPN.0000000000000495", "abstract": "This randomized trial compared the analgesic effect of 4 nonpharmacologic interventions (breastfeeding, oral sucrose, nonnutritive sucking, and  skin-to-skin contact) on term newborns between 24 and 48 hours of age who  underwent a heel lance. The Neonatal Pain, Agitation, and Sedation Scale was used  to evaluate pain. The newborns (N = 226) were assigned to one of 4 intervention  groups (n = 176) or a control group without pain intervention (n = 50). The  results indicate that all intervention groups showed decreased pain levels when  compared with the control group (P < .01). The oral sucrose group experienced a  superior analgesic effect when compared with the skin-to-skin contact group (P <  .01), but no difference was observed when compared with the breastfeeding group  (P > .05) or the nonnutritive sucking group (P > .05). All intervention groups  showed a shortened crying time (P < .01) and reduced procedural duration (P <  .01) compared with the control group. All of these interventions are clinically  applicable and acceptable when caring for a newborn during a minor painful  procedure."}, {"id": 153, "title": "Pre-attendance analgesia advice for small acute paediatric burns in the British Isles: A National Survey.", "authors": "Chu, Howard; Sen, Sankhya", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2020", "vol": "46(6):1318-1319", "doi": "10.1016/j.burns.2020.02.006", "abstract": "The development of acute outpatient clinics has enabled burns services to assess the majority of smaller paediatric burns the day after injury. This event can be  distressing and it is therefore important to ensure that children are initially  assessed in an optimal environment. The aim of this study is to understand how  small acute paediatric burns are managed across the British Isles. All paediatric  burns services within the British Isles were contacted by telephone and  information gained on how each unit manages new referrals of small acute  paediatric burns in an outpatient setting. This national survey has shown that 5%  total body surface area (TBSA) is generally considered to be the upper limit for  new paediatric referrals to be seen in the outpatient setting 5%. Furthermore, we  advocate that Paracetamol and Ibuprofen be given 60 min prior to an allocated  appointment time."}, {"id": 154, "title": "Treinamento online sobre avaliação da dor neonatal para enfermeiros de um hospital de ensino:  avaliação de aprendizagem, reação e impacto no trabalho", "authors": "Costa, Taine", "journal": "", "year": "2020", "vol": "173-173", "doi": "", "abstract": "Introdução: A dor repetida e não tratada no período neonatal pode ocasionar efeitos deletérios no crescimento e desenvolvimento infantil. Assim, o uso de estratégias de avaliação e controle da dor são fundamentais. Especificamente com relação a avaliação da dor, o treinamento online pode ser contribuir para a capacitação técnica e atualização dos profissionais de saúde. Objetivo: Avaliar o Programa de Avaliação da Dor Neonatal (PAD-Neo) aplicado a enfermeiros envolvidos na assistência neonatal de um hospital de ensino. Método: Trata-se de estudo quantitativo, longitudinal, quase-experimental realizado com 30 enfermeiros e respectivas chefias nas unidades de Alojamento Conjunto, Terapia Intensiva Neonatal e Pediátrica e Cuidados Intermediários do Hospital Universitário da Universidade de São Paulo. Os dados foram coletados entre abril e outubro de 2018. Antes do treinamento, os enfermeiros responderam questionários sobre perfil e motivação para aprender, além de pré-teste. O treinamento online foi oferecido ao longo de nove semanas e ao seu término, os enfermeiros responderam ao pós-teste e aos questionários de avaliação de reação e motivação para transferir. Após 45 dias do término do treinamento, os enfermeiros e suas chefias responderam a questionários de impacto em profundidade e amplitude, assim como suporte para transferência de treinamento. Todos os questionários foram respondidos eletronicamente. Os dados foram analisados no programa R versão 3.6.2. Foi realizada análise estatística descritiva, assim como modelo de análise de variância, Kruskal-Wallis, teste de correlação de Pearson, correlação de Kendall, correlação intraclasse e modelo de efeitos mistos. Foi adotado nível de significância de 5%. Resultados: A maioria dos enfermeiros eram do gênero feminino (93,33%), com idade média de 42,8 anos e tempo médio de formação de 18,6 anos. A média de motivação em transferir (4,09, DP=0,53) foi maior que a média da motivação em aprender (3,44, DP=0,33), independente da unidade de trabalho. Houve aumento significativo no conhecimento dos enfermeiros de todas as unidades, comparando-se as médias de pré e pós-teste (p<0.0001), independente da unidade de trabalho (p=0,9368). A reação dos enfermeiros em relação à tutoria, ambiente virtual, avaliação do aluno, conteúdo e atividades e comunicação visual foi positiva. O treinamento influenciou diretamente (impacto em profundidade) a prática assistencial dos enfermeiros, tanto na autoavaliação quanto heteroavaliação (média=4,28 e média=3,93, respectivamente). Contudo, o treinamento não apresentou efeitos indiretos (impacto em amplitude) na prática, na avaliação dos enfermeiros (média=2,37) e chefias (média=2,97). O suporte à transferência de treinamento demonstrou que às vezes (média=2,82 DP=0,48) o enfermeiro é encorajado a usar o que aprendeu no ambiente do trabalho, tanto pela chefia quanto por colegas. Conclusões: Avaliar o impacto da oferta de treinamentos na prática profissional é necessário. No presente estudo, o PAD-Neo contribuiu para o aumento do conhecimento dos participantes. O ambiente foi considerado adequado, de fácil manuseio, interativo e dinâmico, o que permite a construção ativa do conhecimento. O treinamento influenciou diretamente a prática assistencial dos enfermeiros, mas não apresentou efeitos indiretos em relação à conhecimentos, habilidades, atitudes e comportamentos, com apoio insuficiente do ambiente de trabalho."}, {"id": 155, "title": "Diagnósticos de enfermagem para pacientes com COVID-19", "authors": "Dantas, Tays Pires; Aguiar, Cosmo Alexandro da Silva de; Rodrigues, Vithória Régia Teixeira et al.", "journal": "J. Health NPEPS", "year": "2020", "vol": "5(1):396-416", "doi": "10.30681/252610104575", "abstract": "Objetivo: elencar com base nas manifestações clínicas da doença, os principais diagnósticos de enfermagem que podem ser aplicados para crianças, adultos, gestantes e idosos com COVID-19. Método: revisão integrativa da literatura nacional e internacional, realizada no período de março a maio de 2020, a partir do cruzamento entre os termos: \"pacientes\", \"infecções por coronavírus\" e \"sinais e sintomas\", usando o operador booleano and. Selecionou-se 26 estudos, apresentando em quadro. Utilizouse a taxonomia da Associação Norte-Americana de Diagnósticos de Enfermagem e a Classificação Internacional para a Prática de Enfermagem para elencar os diagnósticos pertinentes ao quadro clínico frequentemente presente entre participantes com covid19. Resultados: conforme os sinais e sintomas presentes na fase aguda da doença em pacientes sob internação e em uso de terapia medicamentosa, os diagnósticos predominantes foram proteção ineficaz relacionado à incapacidade de proteção contra agente infeccioso evidenciado por tosse, calafrios e fadiga, presença de tosse, Hipertermia relacionada a processo infeccioso evidenciado por pele quente ao toque, padrão respiratório ineficaz relacionado à dor e fadiga evidenciado por dispneia. Considerações finais: alguns diagnósticos são prevalentes, entretanto, a avaliação deve ser individual, bem como a assistência, baseada nas necessidades de cada indivíduo.(AU)"}, {"id": 156, "title": "Systematic review and meta-analysis of olfactive stimulation interventions to manage procedural pain in preterm and full-term neonates.", "authors": "De Clifford-Faugere, Gwenaëlle; Lavallée, Andréane; Khadra, Christelle et al.", "journal": "International journal of nursing studies", "year": "2020", "vol": "110:103697", "doi": "10.1016/j.ijnurstu.2020.103697", "abstract": "BACKGROUND: Preterm and full-term neonates undergo many painful procedures during their hospitalization in the neonatal intensive care unit. Unrelieved and  repeated pain can have important repercussions on their motor and intellectual  development. Still, pain management interventions are limited for neonates.  OBJECTIVE: This systematic review aimed to evaluate the effectiveness of  olfactive stimulation interventions on the pain response of preterm and full-term  infants during painful procedures. DESIGN: Systematic review and meta-analysis.  DATA SOURCES: An electronic search was conducted from inception to August 2019 in  PubMed, MEDLINE, Embase, CINAHL, PsycINFO, Web of Sciences, CENTRAL, Scopus and  ProQuest. REVIEW METHODS: Study selection, data extraction, assessment of risk of  bias and quality of evidence were performed by two independent reviewers.  RESULTS: 3311 studies were screened. Of the 14 studies included studies (n = 1028  infants), results from 10 were combined in meta-analysis. The latter demonstrated  that olfactive stimulation interventions using a familiar odor were effective  compared to standard care on pain reactivity (SMD -0.69; 95% CI -0.93 to -0.44;  I(2) = 20%, p < 0.00001), pain regulation (SMD -0.40; 95% CI -0.66 to -0.14;  I(2) = 13%, p = 0.002), crying duration during (SMD -0.42; 95% CI -0.73 to -0.10;  I(2) = 47%, p = 0.009) and after the procedure (SMD -0.37; 95% CI -0.68 to -0.07;  I(2) = 0%, p = 0.01), heart rate after the procedure (MD -3.87; 95% CI -7.36 to  -0.38; I(2) = 99%, p = 0.03), oxygen saturation during (MD -0.47; 95% CI -0.86 to  -0.08; I(2) = 91%, p = 0.02) and after the procedure (MD -0.56; 95% CI -0.99 to  -0.13; I(2) = 99%, p = 0.01). No adverse event was reported. CONCLUSION: These  findings are based on low to very low quality of evidence limiting our confidence  in effect estimates. More rigorous trials with a larger sample size are needed to  enhance the comprehension of the mechanisms underlying olfactive stimulation  interventions and the interventions' efficacy."}, {"id": 157, "title": "The effect of maternal voice for procedural pain in paediatric intensive care unit: A randomised controlled trial.", "authors": "Erdoğan, Çiğdem; Turan, Türkan; Pınar, Bakiye", "journal": "Intensive & critical care nursing", "year": "2020", "vol": "56:102767", "doi": "10.1016/j.iccn.2019.102767", "abstract": "OBJECTIVE: The aim of this study was to evaluate the effectiveness of the maternal voice in reducing pain during painful procedures in children between one  and three years old receiving treatment in paediatric intensive care unit. DESIGN  AND METHODS: This research was designed as a randomised controlled experimental  study. Sixty children were randomised into two groups, the maternal-voice group  and the controls. The children in the maternal-voice group listened to the  maternal voice during the procedure. Although questionnaire forms were used to  determine the descriptive characteristics of infants, the Face, Legs, Activity,  Cry, Consolability (FLACC) pain assessment scale was used to evaluate pain level.  Heart rate and oxygen saturation were also measured. RESULTS: There were  significant differences in the pain, heart rate and oxygen saturation levels  between the maternal-voice and control groups. Pain levels and heart rates of the  children in the experimental group during and after the painful procedures were  much lower, and their oxygen saturations were higher than those of the children  in the control group. PRACTIC IMPLICATIONS: Distraction methods, such as  listening to the maternal voice, should be used as a nursing intervention to  reduce pain and decrease heart rate and increaseoxygen saturation in children  during painful procedures in the paediatric intensive care unit. The maternal  voice is recommended as a helpful option in cases when a pain control method is  required. Future research needs to explore different interventional practices."}, {"id": 158, "title": "Ameloplastia positiva en relación céntrica como método auxiliar durante la finalización en el tratamiento de ortodoncia en un paciente bruxista", "authors": "Espinosa Alba, Francisco; Avalos Equihua, Yuridia Michelle; Martínez Cardona, Pablo César et al.", "journal": "Rev. ADM", "year": "2020", "vol": "77(4):209-215", "doi": "10.35366/95115", "abstract": "A continuación se presenta un caso de un paciente de 12 años de edad, con antecedente de bruxismo, con biotipo mesofacial, tercio inferior dolicofacial, hipertonicidad muscular en maseteros, cierre labial forzado con incompetencia labial de 4 milímetros con dolor en sinoviales anteriores inferiores. Los objetivos de tratamiento consistieron en lograr relajación muscular y promover un posicionamiento condilar ortopédicamente funcional y estable, realizar control vertical para disminuir gap interlabial, alinear líneas medias, mantener clase I molar bilateral, clase I canina bilateral y clase I incisiva, crear overjet y overbite adecuados, con recuperación estética y función del segmento anterior. Debido a eventos adversos durante la etapa de cierre de espacios, la clase molar y canina I no se logró, pero se aseguró mediante ameloplastias positivas la función y estética adecuadas para tener un tratamiento de ortodoncia estable a largo plazo (AU)"}, {"id": 159, "title": "Autonomic Cardiac Reactivity to Painful Procedures Under Hypnosis in Pediatric Emergencies: A Feasibility Study.", "authors": "Excoffier, Julie; Pichot, Vincent; Cantais, Aymeric et al.", "journal": "The American journal of clinical hypnosis", "year": "2020", "vol": "62(3):267-281", "doi": "10.1080/00029157.2018.1564013", "abstract": "Pain sensation is characterized by abrupt changes in central nervous system activity producing autonomic reactivity. While clinical hypnosis has demonstrated  its benefits for children in pain management, it is not clear whether hypnosis  modulated autonomic pain response in children in clinical conditions. Here, we  studied autonomic responses under hypnosis to sutures in pediatric emergencies.  For that, 42 children (mean age: 6.5 years, range 1.5 to 13) were divided into  two groups consecutively (hypnosis and control groups), according to their  choice. Time-frequency analysis was applied on RR intervals (heart rate interbeat  intervals, or RRI) to estimate parasympathetic reactivity based on high frequency  power (HF) and the Analgesia Nociception Index (ANI®) and on sympathetic  reactivity (low frequency power [LF]) and LF/HF ratio). We observed that RRI and  LF/HF ratio varied according to suture and hypnosis (p < 0.05): RRI was higher  and LF/HF ratio was lower during sutures in the hypnosis group in comparison to  the control group whereas HF and ANI® increased only during hypnosis. To  conclude, hypnosis in pediatric emergencies reduces sympathetic cardiac pain  reactivity and could be a marker of pain relief under hypnosis, while  parasympathetic activity seems to be a better marker of hypnosis."}, {"id": 160, "title": "Increasing Parental Access to Pediatric Pain-related Knowledge: A Systematic Review of Knowledge Translation Research Among Parents.", "authors": "Gagnon, Michelle M.; Hadjistavropoulos, Thomas; McAleer, Lana M. et al.", "journal": "The Clinical journal of pain", "year": "2020", "vol": "36(1):47-60", "doi": "10.1097/AJP.0000000000000770", "abstract": "OBJECTIVES: Parents can play an integral role in managing their child's pain, yet many parents remain unaware of evidence-based strategies to support their child  during painful experiences. Recent advances in knowledge translation research,  which include dissemination and implementation studies, have resulted in programs  geared towards parents to offset this knowledge gap. The nature of these programs  and the degree to which parents find them useful remains unclear. Our goal was to  systematically review programs aimed as disseminating and implementing  evidence-based pain-related knowledge to parents. MATERIALS AND METHODS:  Systematic searches of PubMed, Web of Science, CINAHL, and PsycInfo were  completed. Articles in which information was disseminated to parents with the  goal of assessing dissemination and implementation outcomes were retained.  Information was extracted to identify study characteristics, primary outcomes,  and quality of evidence. RESULTS: A total of 24,291 abstracts were screened and  12 articles describing programs were retained. Programs were positively rated by  parents in terms of the appropriateness of formats selected, presentation of  information, and helpfulness of content. The majority of research has been  focused in the area of procedural pain among infants. Although several  implementation domains are reported by researchers, certain areas have been  overlooked to date, including the cost and sustainability of programs. The  majority of reports presented with methodological limitations and bias.  DISCUSSION: Knowledge translation research in pediatric pain is in its infancy.  Development of theories and guidelines to increase the utility and quality of  evidence are needed."}, {"id": 161, "title": "A practical guide to acute pain management in children.", "authors": "Gai, Nan; Naser, Basem; Hanley, Jacqueline et al.", "journal": "Journal of anesthesia", "year": "2020", "vol": "34(3):421-433", "doi": "10.1007/s00540-020-02767-x", "abstract": "In the pediatric population, pain is frequently under-recognized and inadequately treated. Improved education and training of health care providers can positively  impact the management of pain in children. The purpose of this review is to  provide a practical clinical approach to the management of acute pain in the  pediatric inpatient population. This will include an overview of commonly used  pain management modalities and their potential pitfalls. For institutions that  have a pediatric acute pain service or are considering initiating one, it is our  hope to provide a useful tool to aid clinicians in the safe and effective  treatment of pain in children."}, {"id": 162, "title": "Evolution in acute pain assessment and treatment in the paediatric emergency department of a tertiary health care centre.", "authors": "Ganzijeva, Kristina; Kindereviciute, Ieva; Dagys, Algirdas et al.", "journal": "European journal of pain (London, England)", "year": "2020", "vol": "24(4):773-782", "doi": "10.1002/ejp.1527", "abstract": "BACKGROUND: Paediatric pain remains one of the most misunderstood, under-diagnosed and under-treated medical problems in children. AIM: To  investigate the accuracy of acute pain assessment and management in the  Paediatric Emergency Department in Lithuanian University of Health Sciences  Hospital. METHODS: We performed a retrospective record analysis before (the year  2017) and after (the year 2018) paediatric pain training course was conducted. In  total, 1,000 randomly selected outpatient records were analysed. We divided all  patients into two groups: group A records from 2017 and group B from 2018.  Patients were further divided into trauma and non-trauma and subdivided into four  different age groups. We collected patient age, the origin of pain, pain  characteristics, pain score and medication. RESULTS: We compared 500 children in  each group. Groups A and B consisted of 154 (30.8%) and 116 (23.2%) trauma  patients, respectively. The pain was scored less in group A (420 children; 84%)  compared to group B (94.4% of all 500 patients, p < .001). In all age groups, the  pain was assessed more often, and pain medication was prescribed more often in  group B compared to group A (p < .001). There was a tendency to assess pain more  often in group A non-trauma patients (p = .054). However, pain relief in trauma  patients was less adequate compared to non-trauma. CONCLUSION: Our research  showed improvement in pain evaluation and treatment after systemic and local  changes in paediatric emergency department (PED). In group B, pain was evaluated  more frequently, and patients received pain medication more often than in group  A. Teenagers are still less likely to receive analgesics than toddlers. Tendency  remains to give fewer painkillers to trauma patients compared to non-trauma  children. SIGNIFICANCE: This is one of the few studies in the Baltic region  analysing changes in children's pain assessment and management in the PED after  systemic and local adjustments. Our data show an impact of systemic changes and a  specialized education focused on improving knowledge in acute pain diagnostics  and management of medical professionals leading to better patient care."}, {"id": 163, "title": "Digital Technology Distraction for Acute Pain in Children: A Meta-analysis.", "authors": "Gates, Michelle; Hartling, Lisa; Shulhan-Kilroy, Jocelyn et al.", "journal": "Pediatrics", "year": "2020", "vol": "145(2):e20191139", "doi": "10.1542/peds.2019-1139", "abstract": "CONTEXT: Digital distraction is being integrated into pediatric pain care, but its efficacy is currently unknown. OBJECTIVE: To determine the effect of digital  technology distraction on pain and distress in children experiencing acutely  painful conditions or procedures. DATA SOURCES: Medline, Embase, Cochrane  Library, Cumulative Index to Nursing and Allied Health Literature, PsycINFO,  Institute of Electrical and Electronics Engineers Xplore, Ei Compendex, Web of  Science, and gray literature sources. STUDY SELECTION: Quantitative studies of  digital technology distraction for acutely painful conditions or procedures in  children. DATA EXTRACTION: Performed by 1 reviewer with verification. Outcomes  were child pain and distress. RESULTS: There were 106 studies (n = 7820) that  reported on digital technology distractors (eg, virtual reality and video games)  used during common procedures (eg, venipuncture, dental, and burn treatments). No  studies reported on painful conditions. For painful procedures, digital  distraction resulted in a modest but clinically important reduction in  self-reported pain (standardized mean difference [SMD] -0.48; 95% confidence  interval [CI] -0.66 to -0.29; 46 randomized controlled trials [RCTs]; n = 3200),  observer-reported pain (SMD -0.68; 95% CI -0.91 to -0.45; 17 RCTs; n = 1199),  behavioral pain (SMD -0.57; 95% CI -0.94 to -0.19; 19 RCTs; n = 1173),  self-reported distress (SMD -0.49; 95% CI -0.70 to -0.27; 19 RCTs; n = 1818),  observer-reported distress (SMD -0.47; 95% CI -0.77 to -0.17; 10 RCTs; n = 826),  and behavioral distress (SMD -0.35; 95% CI -0.59 to -0.12; 17 RCTs; n = 1264)  compared with usual care. LIMITATIONS: Few studies directly compared different  distractors or provided subgroup data to inform applicability. CONCLUSIONS:  Digital distraction provides modest pain and distress reduction for children  undergoing painful procedures; its superiority over nondigital distractors is not  established. Context, preferences, and availability should inform the choice of  distractor."}, {"id": 164, "title": "The effect of facilitated tucking position during painful procedure in pain management of preterm infants in neonatal intensive care unit: a systematic  review and meta-analysis.", "authors": "Gomes Neto, Mansueto; da Silva Lopes, Isabella Aira; Araujo, Ana Carolina Cunha Lacerda Morais et al.", "journal": "European journal of pediatrics", "year": "2020", "vol": "179(5):699-709", "doi": "10.1007/s00431-020-03640-5", "abstract": "We performed a systematic review and meta-analysis to investigate the effects of facilitated tucking position during painful procedure in pain management of  preterm infants. We searched MEDLINE, PEDro, SciELO and the Cochrane Library  (until June 2019) for randomized controlled trials. An α value ≤ 0.05 was  considered significant. Heterogeneity among studies was examined with Cochran's Q  and I(2) statistic, in which values greater than 40% were considered indicative  of high heterogeneity and random-effects model was chosen. Analyses were  performed with Review Manager 5.3. Fifteen studies met the eligibility criteria,  including 664 preterm infants. The meta-analyses showed a significant reduction  in pain of - 1.02 (95% CI - 1.7 to - 0.4, N = 216) during endotraqueal suctioning  for participants in the facilitated tucking position group (FTPG) compared with  routine care group. The meta-analyses showed a non-significant difference in pain  - 0.3 (95% CI - 2.05 to - 1.4, N = 88) during heel stick for participants in the  FTPG compared with oral glucose group. The meta-analyses showed a non-significant  difference in pain for participants in the FTPG compared with oral opioid group  0.2 (95% CI - 1.4 to 1.8, N = 140).Conclusion: Facilitated tucking position may  improve the pain during painful procedures.What is Known:• Exposure of premature  babies to painful procedures is associated with changes in brain development,  regardless of other factors.• Facilitated tucking reduces the expression of pain  in premature infants.What is New:• Facilitated tucking position was efficient in  pain management of preterm infants when compared to routine care.• Facilitated  tucking compared to opioid or oral glucose did not achieve a significant  reduction in pain intensity."}, {"id": 165, "title": "Oligoanalgesia in Patients With an Initial Glasgow Coma Scale Score ≥8 in a Physician-Staffed Helicopter Emergency Medical Service: A Multicentric Secondary  Data Analysis of >100,000 Out-of-Hospital Emergency Missions.", "authors": "Helm, Matthias; Hossfeld, Bjoern; Braun, Benedikt et al.", "journal": "Anesthesia and analgesia", "year": "2020", "vol": "130(1):176-186", "doi": "10.1213/ANE.0000000000004334", "abstract": "BACKGROUND: Oligoanalgesia, as well as adverse events related to the initiated pain therapy, is prevalent in out-of-hospital emergency medicine, even when a  physician is present. We sought to identify factors involved in insufficient pain  therapy of patients presenting with an initial Glasgow Coma Scale (GCS) score of  ≥8 in the out-of-hospital phase, when therapy is provided by a physician-staffed  helicopter emergency medical service (p-HEMS). METHODS: This was a multicenter,  secondary data analysis of conscious patients treated in primary p-HEMS missions  between January 1, 2005, and December 31, 2017. Patients with a numeric rating  scale (NRS) pain score ≥4, GCS score ≥8 on the scene, without cardiopulmonary  resuscitation (CPR), and a National Advisory Committee for Aeronautics (NACA)  score <VI were included. Multivariable logistic binary regression analyses were  used to identify characteristics of oligoanalgesia (NRS ≥4 at handover or pain  reduction <3). Linear regression analysis was used to identify changes in pain  treatment within the study period. RESULTS: We analyzed data from 106,730  patients (3.6% missing data at variable level). Of these patients, 82.9% received  some type of analgesic therapy on scene; 79.1% of all patients received analgesic  drugs, and 38.6% received nonpharmacological interventions, while 37.4% received  both types of intervention. Oligoanalgesia was identified in 18.4% (95%  confidence interval [CI], 18.1-18.6) of patients. Factors associated with  oligoanalgesia were a low NACA score and a low NRS score, as well as central  nervous system or gynecological/obstetric complaints. The use of weak opioids  (odds ratio [OR] = 1.05; 95% CI, 0.68-1.57) had no clinically relevant  association with oligoanalgesia, in contrast to the use of strong or moderate  opioids, nonopioid analgesics, or ketamine. We observed changes in the analgesic  drugs used over the 12-year study period, particularly in the use of strong  opioids (fentanyl or sufentanil), from 30.3% to 42.3% (P value <.001). Of all  patients, 17.1% (95% CI, 16.9-17.3) did not receive any type of pain therapy.  CONCLUSIONS: In the studied p-HEMS cohort, oligoanalgesia was present in 18.4% of  all cases. Special presenting complaints, low NACA scores, and low pain scores  were associated with the occurrence of oligoanalgesia. However, 17.1% of patients  received no type of pain therapy, which suggests a scope for further improvement  in prehospital pain therapy. Pharmacological and nonpharmaceutical pain relief  should be initiated whenever indicated."}, {"id": 166, "title": "Posttraumatic Stress in Children After Injury: The Role of Acute Pain and Opioid Medication Use.", "authors": "Hildenbrand, Aimee K.; Kassam-Adams, Nancy; Barakat, Lamia P. et al.", "journal": "Pediatric emergency care", "year": "2020", "vol": "36(10):e549-e557", "doi": "10.1097/PEC.0000000000001404", "abstract": "OBJECTIVES: After injury, many children experience posttraumatic stress symptoms (PTSS) that negatively impact recovery. Acute pain and PTSS share neurobiological  pathways, and acute dosage of morphine has been linked to reduced PTSS in  naturalistic studies. However, the complex interactions between pain, morphine  and other opioid use, and PTSS have yet to be investigated in robust pediatric  samples.This prospective, longitudinal study examined relationships between acute  pain, opioid medications, and PTSS after pediatric injury. METHODS: Ninety-six  children aged 8 to 13 years (mean = 10.60, SD = 1.71), hospitalized for  unintentional injury, completed assessments at baseline (T1) and 12 weeks (T2)  later. Pain ratings and opioid administration data were obtained via chart  review. RESULTS: Structural equation modeling revealed that worst pain endorsed  during hospitalization was positively associated with concurrent and later PTSS  when controlling for evidence-based risk factors (ie, age, sex, prior trauma  history, traumatic appraisals of injury event, heart rate). Neither opioid  medications overall nor morphine specifically (milligram/kilogram/day)  administered during hospitalization mediated the relationship between pain and T2  PTSS. CONCLUSIONS: Pain during hospitalization may increase susceptibility for  persistent PTSS above and beyond the influence of other empirical risk factors.  Findings suggest that pain assessment may be a useful addition to pediatric PTSS  screening tools and highlight the need for additional research on pharmacological  secondary prevention approaches. Given that inadequate pain control and  persistent PTSS each hinder recovery and long-term functioning, better  understanding of interactions between acute pain and PTSS after injury is  essential for improving screening, prevention, and early intervention efforts."}, {"id": 167, "title": "Improving the Utilisation of Nitrous Oxide in Paediatric Patients to Manage Procedural Pain and Procedural Anxiety.", "authors": "Kornman, Kelly; Wilson, Valerie; Tinsley, Patricia et al.", "journal": "Comprehensive child and adolescent nursing", "year": "2020", "vol": "43(1):22-34", "doi": "10.1080/24694193.2018.1528309", "abstract": "The aim in this study was to understand current practice and use of nitrous oxide for management of procedural-related pain and procedural anxiety, to identify  perceived barriers to use of nitrous oxide and to develop an understanding of  patients, families, and nurse awareness and knowledge of the use of nitrous oxide  in an Australian tertiary pediatric oncology/hematology short stay unit. Three  online questionnaires (patients, parents, and nursing staff) were developed and  completed between September and November 2015. Most children and young people  (61%) report receiving nitrous oxide for at least one procedure. Patients,  parents, and nurses rated nitrous oxide as highly effective and would like more  access to nitrous oxide for the child's pain management. Several barriers to use  were reported. These findings suggest that nitrous oxide is effective for pain  management; however, its use is inconsistent. Findings can potentially develop  standardized processes and improve nurse education and accreditation, which may  increase the safety, efficacy, and utilization of nitrous oxide for children's  procedural pain management."}, {"id": 168, "title": "Repeating a dose of sucrose for heel prick procedure in preterms is not effective in reducing pain: a randomised controlled trial.", "authors": "Lago, Paola; Cavicchiolo, Maria Elena; Mion, Teresa et al.", "journal": "European journal of pediatrics", "year": "2020", "vol": "179(2):293-301", "doi": "10.1007/s00431-019-03509-2", "abstract": "Oral sucrose is included in almost all recommendations for treatment of pain in newborns, but evidence if multiple doses might be more effective than a single  standard dose is lacking. We designed a single-centre, double-blind, randomised,  controlled trial. We enrolled preterm infants needing the heel prick procedure.  Each enrolled infant was randomised to receive a single standard dose of sucrose  2 min before or a double dose of sucrose 2 min before, and 30 s after heel prick.  Primary outcome was the efficacy of the two interventions tested by the premature  infant pain profile-PIPP scale obtained at 30 s, 60 s, and 120 s after heel  prick. Secondary outcome was the evaluation of the concordance between the PIPP  scale and other pain scores more feasible in clinical practice. Seventy-two  infants were randomised. No difference in pain perception as measured by the PIPP  scale was found between the groups: median PIPP values 4.0(IQR 3.0-4.0) vs  3.0(IQR 3.0-4.0) at baseline; 6.0(IQR 5.0-10.0) vs 6.0(IQR 4.0-8.5) at 30 s;  6.0(IQR 4.0-7.0) vs 5.0(IQR 4.0-8.5) at 60 s and 5.0(IQR 4.0-7.0) vs 5.0(IQR  4.0-7.5) at 2 min, in the experimental and standard treatment groups,  respectively (p = 0.9020). There was no correlation between PIPP scores and other  pain scales.Conclusion: We do not recommend doubling the dose during heel  prick.What is Known:• Oral sucrose is included in almost all international  position papers and recommendations for the treatment of mild to moderate pain in  newborns, associated with non-nutritive sucking and facilitated tucking•  Premature infant pain profile (PIPP) scale is the gold standard for evaluation of  pain in preterms but it is difficult to use in clinical practiceWhat is New:•  Repeating a dose of 24% sucrose is not effective in reducing pain during the  recovery phase of a skin breaking procedure• Other pain scales, easier to use in  clinical practice, are not comparable with PIPP for the evaluation of procedural  pain in preterms."}, {"id": 169, "title": "Virtual reality distraction for acute pain in children.", "authors": "Lambert, Veronica; Boylan, Patrick; Boran, Lorraine et al.", "journal": "The Cochrane database of systematic reviews", "year": "2020", "vol": "10(10):CD010686", "doi": "10.1002/14651858.CD010686.pub2", "abstract": "BACKGROUND: Virtual reality (VR) computer technology creates a simulated environment, perceived as comparable to the real world, with which users can  actively interact. The effectiveness of VR distraction on acute pain intensity in  children is uncertain. OBJECTIVES: To assess the effectiveness and adverse  effects of virtual reality (VR) distraction interventions for children (0 to 18  years) with acute pain in any healthcare setting. SEARCH METHODS: We searched  CENTRAL, MEDLINE, Embase, CINAHL, PsycINFO and four trial registries to October  2019. We also searched reference lists of eligible studies, handsearched relevant  journals and contacted study authors. SELECTION CRITERIA: Randomised controlled  trials (RCTs), including cross-over and cluster-RCTs, comparing VR distraction to  no distraction, non-VR distraction or other VR distraction. DATA COLLECTION AND  ANALYSIS: We used standard Cochrane methodological processes. Two reviewers  assessed risk of bias and extracted data independently. The primary outcome was  acute pain intensity (during procedure, and up to one hour post-procedure).  Secondary outcomes were adverse effects, child satisfaction with VR, pain-related  distress, parent anxiety, rescue analgesia and cost. We used GRADE and created  'Summary of findings' tables. MAIN RESULTS: We included 17 RCTs (1008  participants aged four to 18 years) undergoing various procedures in healthcare  settings. We did not pool data because the heterogeneity in population (i.e.  diverse ages and developmental stages of children and their different perceptions  and reactions to pain) and variations in procedural conditions (e.g. phlebotomy,  burn wound dressings, physical therapy sessions), and consequent level of pain  experienced, made statistical pooling of data impossible. We narratively describe  results. We judged most studies to be at unclear risk of selection bias, high  risk of performance and detection bias, and high risk of bias for small sample  sizes. Across all comparisons and outcomes, we downgraded the certainty of  evidence to low or very low due to serious study limitations and serious or very  serious indirectness. We also downgraded some of the evidence for very serious  imprecision. 1: VR distraction versus no distraction Acute pain intensity: during  procedure Self-report: one study (42 participants) found no beneficial effect of  non-immersive VR (very low-certainty evidence). Observer-report: no data.  Behavioural measurements (observer-report): two studies, 62 participants;  low-certainty evidence. One study (n = 42) found no beneficial effect of  non-immersive VR. One study (n = 20) found a beneficial effect favouring  immersive VR. Acute pain intensity: post-procedure Self-report: 10 studies, 461  participants; very low-certainty evidence. Four studies (n = 95) found no  beneficial effect of immersive and semi-immersive or non-immersive VR. Five  studies (n = 357) found a beneficial effect favouring immersive VR. Another study  (n = 9) reported less pain in the VR group. Observer-report: two studies (216  participants; low-certainty evidence) found a beneficial effect of immersive VR,  as reported by primary caregiver/parents or nurses. One study (n = 80) found a  beneficial effect of immersive VR, as reported by researchers. Behavioural  measurements (observer-report): one study (42 participants) found no beneficial  effect of non-immersive VR (very low-certainty evidence). Adverse effects: five  studies, 154 participants; very low-certainty evidence. Three studies (n = 53)  reported no adverse effects. Two studies (n = 101) reported mild adverse effects  (e.g. nausea) in the VR group. 2: VR distraction versus other non-VR distraction  Acute pain intensity: during procedure Self-report, observer-report and  behavioural measurements (observer-report): two studies, 106 participants:  Self-report: one study (n = 65) found a beneficial effect favouring immersive VR  and one (n = 41) found no evidence of a difference in mean pain change scores  (very low-certainty evidence). Observer-report: one study (n = 65) found a  beneficial effect favouring immersive VR and one (n = 41) found no evidence of a  difference in mean pain change scores (low-certainty evidence). Behavioural  measurements (observer-report): one study (n = 65) found a beneficial effect  favouring immersive VR and one (n = 41) reported a difference in mean pain change  scores with fewer pain behaviours in VR group (low-certainty evidence). Acute  pain intensity: post-procedure Self-report: eight studies, 575 participants; very  low-certainty evidence. Two studies (n = 146) found a beneficial effect favouring  immersive VR. Two studies (n = 252) reported a between-group difference favouring  immersive VR. One study (n = 59) found no beneficial effect of immersive VR  versus television and Child Life non-VR distraction. One study (n = 18) found no  beneficial effect of semi-immersive VR. Two studies (n = 100) reported no  between-group difference. Observer-report: three studies, 187 participants;  low-certainty evidence. One study (n = 81) found a beneficial effect favouring  immersive VR for parent, nurse and researcher reports. One study (n = 65) found a  beneficial effect favouring immersive VR for caregiver reports. Another study (n  = 41) reported no evidence of a difference in mean pain change scores.  Behavioural measurements (observer-report): two studies, 106 participants;  low-certainty evidence. One study (n = 65) found a beneficial effect favouring  immersive VR. Another study (n = 41) reported no evidence of a difference in mean  pain change scores. Adverse effects: six studies, 429 participants; very  low-certainty evidence. Three studies (n = 229) found no evidence of a difference  between groups. Two studies (n = 141) reported no adverse effects in VR group.  One study (n = 59) reported no beneficial effect in reducing estimated  cyber-sickness before and after VR immersion. 3: VR distraction versus other VR  distraction We did not identify any studies for this comparison. AUTHORS'  CONCLUSIONS: We found low-certainty and very low-certainty evidence of the  effectiveness of VR distraction compared to no distraction or other non-VR  distraction in reducing acute pain intensity in children in any healthcare  setting. This level of uncertainty makes it difficult to interpret the benefits  or lack of benefits of VR distraction for acute pain in children. Most of the  review primary outcomes were assessed by only two or three small studies. We  found limited data for adverse effects and other secondary outcomes. Future  well-designed, large, high-quality trials may have an important impact on our  confidence in the results."}, {"id": 170, "title": "Quantification of neonatal procedural pain severity: a platform for estimating total pain burden in individual infants.", "authors": "Laudiano-Dray, Maria Pureza; Pillai Riddell, Rebecca; Jones, Laura et al.", "journal": "Pain", "year": "2020", "vol": "161(6):1270-1277", "doi": "10.1097/j.pain.0000000000001814", "abstract": "There is increasing evidence that long-term outcomes for infants born prematurely are adversely affected by repeated exposure to noxious procedures. These  interventions vary widely, for example, in the extent of damage caused and  duration. Neonatal intensive care unit (NICU) procedures are therefore likely to  each contribute differently to the overall pain burden of individual neonates,  ultimately having a different impact on their development. For researchers to  quantify the procedural pain burden experienced by infants on NICU, we aimed to  estimate the pain severity of common NICU procedures using published pain scores.  We extracted pain scores over the first minute (pain reactivity) from the  literature, using 59 randomized controlled trials for 15 different procedures.  Hierarchical cluster analysis of average pain scores resulted in 5 discrete  severity groups; mild (n = 1), mild to moderate (n = 3), moderate (n = 7), severe  (n = 3), and very severe (n = 1). The estimate of the severity of individual  procedures provided new insight into infant pain reactivity which is not always  directly related to the invasiveness and duration of a procedure; thus, both heel  lance and skin tape removal are moderately painful procedures. This estimate of  procedural pain severity, based on pain reactivity scores, provides a novel  platform for retrospective quantification of an individual neonate's pain burden  due to NICU procedures. The addition of measures that reflect the recovery from  each procedure, such as brain activity and behavioural regulation, would further  improve estimates of the pain burden of neonatal intensive care."}, {"id": 171, "title": "Perioperative Analgesia in Pediatric Patients Undergoing Otolaryngologic Surgery.", "authors": "Maroda, Andrew J.; Coca, Kimberly K.; McLevy-Bazzanella, Jennifer D. et al.", "journal": "Otolaryngologic clinics of North America", "year": "2020", "vol": "53(5):819-830", "doi": "10.1016/j.otc.2020.05.011", "abstract": "This article reviews the evidence regarding current perioperative pain management strategies in pediatric patients undergoing otolaryngologic surgery. Pediatric  otolaryngology is a broad field with a wide variety of surgical procedures that  each requires careful consideration for optimal perioperative pain management.  Adequate pain control is vital to ensuring patient safety and achieving  successful postoperative care, but many young children are limited in their  capacity to communicate their pain experience. Current literature holds a  disproportionate amount of focus on pain management for certain procedures,  whereas there is a paucity of evidence-based literature informing most other  procedures within the field."}, {"id": 172, "title": "Painapple®. Validation and evaluation of an electronic application for the management of acute pain in pediatric patients.", "authors": "Martínez García, E.; Catalán Escudero, P.; Mateos Arroyo, J. et al.", "journal": "Revista espanola de anestesiologia y reanimacion", "year": "2020", "vol": "67(3):139-146", "doi": "10.1016/j.redar.2019.09.004", "abstract": "INTRODUCTION: The digital version of the assessment scales recommended for the pediatric patient could contribute to its improvement and to implement the  quality indicators described for the management of acute pain. MATERIAL AND  METHODS: Psychometric validation (validity and reliability) of pain assessment  and treatment side effects scales incorporated in the electronic application  PainAPPle. For this, both formats (paper and electronic) of all the scales were  applied in two measurements with 30minutes of difference in 44 patients from 4 to  18years of the Acute Pain Unit in the immediate postoperative period. In  addition, the data collected by PainAPPle was evaluated by retrospectively  applying the quality indicators described for the management of acute  postoperative pain. RESULTS: Reliability was studied analyzing the high  correlation (Spearman greater than 0.5, P<.001) that we obtained for the values  of each scale in two moments with 30minutes of difference, in the same patients.  For validity, the high correlation (Spearman greater than 0.5, P<.001) between  the values of the paper scales (gold rule) and PainAPPle at both minute 0 and 30  was analyzed. Concordance obtained taking into account the cut-off point of the  scales that would force a treatment were also statistically significant (P<.005).  CONCLUSIONS: PainAPPle is a validated instrument for the management of acute pain  in pediatric patients. The collected data allow to apply the quality indicators  described for the management of acute postoperative pain."}, {"id": 173, "title": "The effectiveness of parental distraction during children's acute pain: The moderating effect of socioeconomic status.", "authors": "Moore, Shannon V.; Lecarie, Emma K.; Davis, Mary C. et al.", "journal": "European journal of pain (London, England)", "year": "2020", "vol": "24(10):2038-2047", "doi": "10.1002/ejp.1653", "abstract": "BACKGROUND: Parental responses to children's pain shape how children interpret and cope with pain symptoms through parental modelling and operant conditioning.  Evidence suggests that parental distraction is effective in reducing children's  acute pain responses, but findings are inconsistent across pain tolerance,  intensity and unpleasantness, and are limited to samples of primarily middle and  upper-middle class families. Although socioeconomically disadvantaged families  may have fewer psychological resources to cope with pain, no studies have  examined whether the utility of parent distraction varies by family socioeconomic  status (SES). The current study tested the hypothesis that relations between  parental distraction and acute pain responses in children vary by family SES,  with children from higher versus lower SES families experiencing more substantial  benefits. METHODS: Children's pain symptoms and parents' use of verbal  distraction during a cold pressor task were examined in a community sample of 530  twin children aged 7-12 years old and their primary caregivers. RESULTS: Parental  distraction was positively associated with children's pain tolerance and  unrelated to intensity and unpleasantness, but these associations are qualified  by significant moderation. In families with higher SES, parental distraction was  an effective technique in children's pain management, associated with more pain  tolerance and less pain intensity and unpleasantness. However, for families with  lower SES, these same benefits were not present. CONCLUSIONS: Findings suggest  that the effectiveness of parental distraction for children's acute pain may  depend on family SES. SIGNIFICANCE: Study findings suggest that the effects of  parental distraction on children's responses to an acute pain task vary by family  SES. Although parental distraction may be effective for higher SES children,  further research is needed to identify whether and why distraction may not be  beneficial for lower SES families."}, {"id": 174, "title": "The association between timely opioid administration and hospitalization in children with sickle cell disease presenting to the emergency department in acute  pain.", "authors": "Muslu, Cagla S.; Kopetsky, Matthew; Nimmer, Mark et al.", "journal": "Pediatric blood & cancer", "year": "2020", "vol": "67(9):e28268", "doi": "10.1002/pbc.28268", "abstract": "INTRODUCTION: The National Heart, Lung, and Blood Institute guidelines for sickle cell disease (SCD) pain crisis management recommend opioids within 60 minutes of  emergency department (ED) registration and every 30 minutes thereafter until  acute pain is managed. These guidelines are based on expert opinion without  published, supporting data. OBJECTIVE: To evaluate the association between timely  ED opioid administration and hospitalization rates in children with SCD. METHODS:  Retrospective cohort of children presenting to a children's hospital ED with SCD  pain between January 1, 2014, and April 30, 2018. Visits were extracted using ICD  codes, chief complaints, and receipt of at least one opioid, and then reviewed to  confirm the visit was an uncomplicated pain crisis. The primary outcome was  hospitalization, yes or no. Generalized estimating equations were used to  determine adjusted odds of hospitalization for the timely administration of  initial and second doses of opioids. RESULTS: Of the 902 eligible visits, 368  (40.8%) resulted in hospitalization. The mean (SD) age was 11.9 (± 5.2) years.  The first opioid was administered within 60 minutes of arrival in 601 (66.6%)  visits. The second opioid was administered within 30 minutes of the first in 84  (12.3%) visits. Receipt of the first opioid within 60 minutes of arrival was not  associated with decreased hospitalization (1.30 [0.96-1.76]). However, receipt of  the second dose within 30 minutes of the first was associated with decreased  hospitalization (0.56 [0.33-0.94]). CONCLUSION: This study suggests an  association between children with SCD receiving a second dose within 30 minutes  of the first opioid dose and decreased hospitalizations."}, {"id": 175, "title": "Outpatient pain clinic and intranasal fentanyl to improve sickle cell disease outcomes.", "authors": "Myrick, Raven; Blakemore, Shaundra; Waite, Emily et al.", "journal": "Pediatric blood & cancer", "year": "2020", "vol": "67(10):e28648", "doi": "10.1002/pbc.28648", "abstract": "BACKGROUND: Acute pain events are a leading complication for sickle cell patients. In an attempt to improve pain outcomes, we developed an outpatient pain  clinic, and included intranasal fentanyl in the opioid emergency department (ED)  pain order set. We evaluated admission rates and opioid administration for  patients that attended both the outpatient pain clinic and ED within a 3-month  period. METHODS: We recorded the admission rate, IV morphine equivalents, and  time from triage for each opioid order and administration from both an outpatient  pain clinic and ED visit within a 3-month period for an individual pediatric  patient with sickle cell disease. RESULTS: Thirty patients received acute pain  management in both settings. We identified a significant reduction in hospital  admission when patients received care in the pain clinic as compared to the ED  (17% vs 43%, P = .02). Additionally, outpatient pain clinic patients received  significantly less IV morphine equivalents than patients received in the ED (5.6  vs 10.6 IV morphine equivalents, P < .0001). In the ED, intranasal fentanyl was  administered in a significantly shorter time than patients ordered intravenous  opioid (43 vs 75 min, P = .02). The mean time to receiving an opioid in the  outpatient pain clinic was 57 min. CONCLUSION: The use of an outpatient pain  clinic can reduce admission rates as compared to the ED. The use of intranasal  fentanyl reduced the time to first opioid administration in the ED.  Patient-centered research or quality improvement projects should continue to  focus on novel approaches to acute pain event management."}, {"id": 176, "title": "Intranasal ketamine for acute pain management in children: A systematic review and meta-analysis.", "authors": "Oliveira J E Silva, Lucas; Lee, John Y.; Bellolio, Fernanda et al.", "journal": "The American journal of emergency medicine", "year": "2020", "vol": "38(9):1860-1866", "doi": "10.1016/j.ajem.2020.05.094", "abstract": "STUDY OBJECTIVE: To assess the efficacy and safety of intranasal analgesic-dose ketamine as compared to intranasal fentanyl for pediatric acute pain. METHODS: A  systematic review and meta-analysis was performed following the PRISMA  guidelines. We searched PubMed, Embase, and Scopus databases for randomized  controlled trials from inception to December 2019. We conducted meta-analysis  with random-effects models to evaluate pain reduction, rescue analgesia, adverse  events and sedation between intranasal ketamine and intranasal fentanyl.  Random-effects models were used to estimate weighted mean differences (WMD) and  pooled relative risks (RR). RESULTS: A total of 546 studies were screened and 4  trials were included. In the meta-analysis of 4 studies including 276 patients,  ketamine had similar reductions in pain scores from baseline to all  post-intervention times (10 to 15 min: WMD -1.42, 95% CI -9.95 to 7.10; 30 min:  WMD 0.40, 95% CI -6.29 to 7.10; 60 min: WMD -0.64, 95% CI -6.76 to 5.47).  Ketamine was associated with similar rates of rescue analgesia (RR 0.74, 95% CI  0.44 to 1.25). Ketamine had a higher risk of non-serious adverse events (RR 2.00,  95% CI 1.43 to 2.79), and no patients receiving ketamine had a serious adverse  event. There was one serious adverse event (hypotension) with fentanyl that  self-resolved. No patients receiving either IN fentanyl or ketamine had  significant sedation. CONCLUSION: Intranasal analgesic-dose ketamine may be  considered as an alternative to opioids for acute pain management in children.  Its accepted use will depend on the tolerability of non-serious adverse events  and the desire to avoid opioids."}, {"id": 177, "title": "Study protocol: parents as pain management in Swedish neonatal care - SWEpap, a multi-center randomized controlled trial.", "authors": "Olsson, Emma; Carlsen Misic, Martina; Dovland Andersen, Randi et al.", "journal": "BMC pediatrics", "year": "2020", "vol": "20(1):474", "doi": "10.1186/s12887-020-02356-7", "abstract": "BACKGROUND: During the first period of life, critically ill as well as healthy newborn infants experience recurrent painful procedures. Parents are a valuable  but often overlooked resource in procedural pain management in newborns.  Interventions to improve parents' knowledge and involvement in infants' pain  management are essential to implement in the care of the newborn infant. Neonatal  pain research has studied a range of non-pharmacological pain alleviating  strategies during painful procedures, yet, regarding combined multisensorial  parent-driven non-pharmacological pain management, research is still lacking.  METHODS/DESIGN: A multi-center randomized controlled trial (RCT) with three  parallel groups with the allocation ratio 1:1:1 is planned. The RCT \"Parents as  pain management in Swedish neonatal care - SWEpap\", will investigate the efficacy  of combined pain management with skin-to-skin contact, breastfeeding and live  parental lullaby singing compared with standard pain care initiated by health  care professionals, during routine metabolic screening of newborn infants  (PKU-test). DISCUSSION: Parental involvement in neonatal pain management enables  a range of comforting parental interventions such as skin-to-skin contact,  breastfeeding, rocking and soothing vocalizations. To date, few studies have been  published examining the efficacy of combined multisensorial parent-driven  interventions. So far, research shows that the use of combined parent-driven pain  management such as skin-to-skin contact and breastfeeding, is more effective in  reducing behavioral responses to pain in infants, than using the pain-relieving  interventions alone. Combined parental soothing behaviors that provide rhythmic  (holding/rocking/vocalizing) or orogustatory/orotactile (feeding/pacifying)  stimulation that keep the parent close to the infant, are more effective in a  painful context. In the SWEpap study we also include parental live lullaby  singing, which is an unexplored but promising biopsychosocial, multimodal and  multisensory pain alleviating adjuvant, especially in combination with  skin-to-skin contact and breastfeeding. TRIAL REGISTRATION: ClinicalTrials.gov (  NCT04341194 ) 10 April 2020."}, {"id": 178, "title": "Parental presence during painful or invasive procedures in neonatology: A survey of healthcare professionals.", "authors": "Ponthier, L.; Ensuque, P.; Guigonis, V. et al.", "journal": "Archives de pediatrie : organe officiel de la Societe francaise de pediatrie", "year": "2020", "vol": "27(7):362-367", "doi": "10.1016/j.arcped.2020.06.011", "abstract": "BACKGROUND: Newborns in neonatology are exposed to invasive and painful procedures. The absence of parents during procedures revealed significantly high  pain scores. OBJECTIVE: The aim of this study was to assess practices regarding  the role of parents during painful and invasive procedures. METHODS: This was a  prospective, observational, multicenter study in France in which 471 caregivers  participated. Professional practices regarding the role of parents during painful  procedures on their child were assessed. Univariate and multivariate analyses  were performed to identify factors associated with parental presence during  painful procedures. RESULTS: Parental presence was most often allowed during  capillary blood sampling, nasogastric tube insertions, and vein punctures,  whereas it was mostly restricted during central line insertions, extubations,  lumbar punctures, and intubations. However, we found discrepancies depending on  the type of facility and caregiver seniority. CONCLUSION: An important  variability in practices concerning the role of parents during painful and  invasive procedures on their child was reported."}, {"id": 179, "title": "Procedimientos de sedoanalgesia en emergencias: cuidados de enfermería", "authors": "Reinoso, G; Acosta, C; Vizcarra, D", "journal": "Med. infant", "year": "2020", "vol": "27(2):210-225", "doi": "", "abstract": ""}, {"id": 180, "title": "Management tools in nursing care for children with pressure injury.", "authors": "Rodrigues, Carla Braga Oliveira; Prado, Thiago Nascimento do; Nascimento, Luciana de Cássia Nunes et al.", "journal": "Rev Bras Enferm", "year": "2020", "vol": "73 Suppl 4:e20180999-e20180999", "doi": "10.1590/0034-7167-2018-0999", "abstract": "OBJECTIVES: to develop and validate management tools for the systematization of nursing care for children with pressure injuries. METHODS: methodological study in which the focus group technique was used for validation of tools in three different groups of 17 nurses. Conducted in April and May 2018 at a large pediatric hospital. RESULTS: two management tools were developed. The first was the Nursing care systematization instrument for children with pressure injury with three parts: a) risk factors; b) Psychobiological Basic Human Needs; c) signs of wound infection. The second was the Flowchart of pressure injury risk and prevention in pediatric patients with three categories: a) risk factors; b) Braden Q scale; c) nursing care. Final Considerations: the tools will support nurses in the care of children with pressure injuries by aiming at an individualized and systematized assessment based on a theoretical framework."}, {"id": 181, "title": "Cuidados paliativos em Oncologia: vivência de enfermeiros ao cuidar de crianças em fase final da vida", "authors": "Santos, Genáine De Fátima Alves Teixeira Fernandes dos; Batista, Patrícia Serpa de Souza; Lim
