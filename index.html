children receiving sweet or unsweetened chewing gum before, or before and during, immunisation and blood collection. Both studies, conducted by the same author, had a high risk of bias based on small sample sizes. Results for the toddlers/pre‐school children were conflicting. Duration of cry, using a random‐effects model, was not significantly reduced by sweet taste (six trials, 520 children, WMD ‐15 seconds, 95% CI ‐54 to 24, I 2  = 94%). Composite pain score at time of first needle was reported in four studies (n = 121 children). The scores were not significantly different between the sucrose and control group (SMD ‐0.26, 95% CI ‐1.27 to 0.75, I 2  = 86%). A Children's Hospital of Eastern Ontario Pain Scale score > 4 was significantly less common in the sucrose group compared to the control group in one study (n = 472, RR 0.55, 95% CI 0.45 to 0.67; RD ‐0.29, 95% CI ‐0.37 to ‐0.20; NNTB 3, 95% CI 3 to 5; tests for heterogeneity not applicable. For school‐aged children, chewing sweet gum before needle‐related painful procedures (two studies, n = 111 children) or during the procedures (two studies, n = 103 children) did not significantly reduce pain scores. A comparison of the Faces Pain Scale scores in children chewing sweet gum before the procedures compared with scores of children chewing unsweetened gum revealed a WMD of ‐0.15 (95% CI ‐0.61 to 0.30). Similar results were found when comparing the chewing of sweet gum with unsweetened gum during the procedure (WMD 0.23, 95% CI ‐0.28 to 0.74). The Colored Analogue Scale for children chewing sweet gum compared to unsweetened gum before the procedure was not significantly different (WMD 0.24 (‐0.69 to 1.18)) nor was it different when children chewed the gum during the procedure (WMD 0.86 (95% CI ‐0.12 to 1.83)). There was no heterogeneity for any of these analyses in school‐aged children (I 2  = 0%). Authors' conclusions Based on the eight studies included in this systematic review update, two of which were subgroups of small numbers of eligible toddlers from larger studies, and three of which were pilot RCTs with small numbers of participants, there is insufficient evidence of the analgesic effects of sweet tasting solutions or substances during acutely painful procedures in young children between one and four years of age. Further rigorously conducted, adequately powered RCTs are warranted in this population. Based on the two studies by the same author, there was no evidence of analgesic effects of sweet taste in school‐aged children. As there are other effective evidence‐based strategies available to use in this age group, further trials are not warranted. Despite the addition of four studies in this review, conclusions have not changed since the last version of the review. Plain language summary Sweet taste to ease injection needle pain in children aged one to 16 years This is an updated version of the original Cochrane review published in Issue 10, 2011: Sweet tasting solutions for reduction of needle‐related procedural pain in children aged one to 16 years. We re‐ran the search in October 2014. Review question:  Do sweet tasting solutions reduce pain during needles in children aged from one to 16 years, compared to no treatment, water, other non‐sweet solutions, or other interventions such as non‐nutritive sucking (babies) or sweet foods or chewing gum (children), topical anaesthetics, music, and distraction? Background:  Small amounts of sweet tasting sugar solutions given orally to babies before and during painful needles significantly reduces distress. However it was not known if the same pain‐reducing effects of sweet solutions occurred in children older than one year of age. We therefore examined studies looking at pain‐reducing effects of sweet solutions such as sucrose or glucose for painful needle procedures in children aged one to 16 years. Search date:  We searched the literature for published and unpublished studies up to October 2014. Study characteristics : We found six studies focused on young children aged one to four years; two of these studies were included in the original review and four were new studies. The two studies included in the original review used a low concentration of sucrose, just 12%, which is not considered sweet enough for the pain reducing effects. Three of the four new studies were small pilot studies, conducted to inform full trials, and only one study of sweet solutions in young children included large numbers of children. When we compared results of all six studies, only two showed that sugar water (sucrose) reduced pain during injections. However, the four studies that showed no effect all included small numbers of children, therefore they were not considered large enough to detect significant differences in pain. Further well conducted trials with large enough numbers of young children are needed to work out if sweet taste effectively reduces their pain and distress during needles. For older school‐aged children, there were two studies published by the same author, both of which were included in the original review. Neither study showed that sweet taste helped to reduce pain. As other studies show that strategies such as distraction and topical anaesthetics can effectively reduce needle pain in school‐aged children, further studies of sweet taste for pain management in school‐aged children are not warranted. Study funding sources : Of the six studies including young children, two did not acknowledge receipt of research funding. For the remaining four: a state‐wide nursing fund supported two of the pilot studies, an internal research institute provided support for the remaining pilot study and another study was supported in part by a Maternal and Child Health grant. The two studies including school‐aged children, conducted by the same author, were supported by a grant from the Canadian Institutes of Health Research."}, {"id": 348, "title": "Cuidado del niño en posoperatorio de cirugía cardiovascular: elaboración de una Guía de Práctica Clínica Basada en la Evidencia", "authors": "Horta Buitrago, SE; Parra Vargas, M", "journal": "Rev. mex. enferm. cardiol", "year": "2015", "vol": "23(3):125-136", "doi": "", "abstract": "Introducción: los pacientes pediátricos en posoperatorio de cirugía cardiovascular son críticos y hemodinámicamente inestables, a su ingreso a la Unidad de Cuidados Intensivos necesitan profesionales de Enfermería que brinden un cuidado acertado y oportuno. Objetivo: en este documento se presenta el proceso de elaboración de una guía de práctica clínica basada en la evidencia científica, que provee información confiable sobre las intervenciones de enfermería fundamentales para el cuidado de estos pacientes en etapa posoperatoria inmediata. Material y métodos: a partir de la metodología de la Enfermería Basada en Evidencia, se identificaron 24 temas de interés y se formularon 45 preguntas clínicas. Se realizó una búsqueda de literatura en 22 bases de datos con palabras claves en inglés y español. Resultados: se encontraron 150 documentos relacionados con el tema, se aplicó lectura crítica a 49 estudios relacionados con el cuidado directo y se logró responder a 24 preguntas clínicas con 58 recomendaciones. Gran parte de la evidencia corresponde al nivel 2+ según la clasificación de la Scottish Intercollegiate Guidelines Network, la mayoría de las recomendaciones son Grado C. Cabe resaltar que se encontraron 9 revisiones sistemáticas que permitieron formular recomendaciones Grado A y B, así como 3 estudios cualitativos publicados por enfermeras colombianas, brasileras y estadounidenses. Conclusiones: la mayoría de reportes de tipo clínico y fisiopatológico son producto de investigaciones médicas, son menos los reportes hechos por enfermeras. La evidencia actual disponible para enfermería no se limita únicamente a temas netamente clínicos; existen nuevas estrategias para el manejo no farmacológico del dolor, para promover el confort y para prevenir el delirio del niño, además se encuentra un soporte teórico y científico para la atención de las necesidades de los padres."}, {"id": 349, "title": "Optimal Pain Assessment in Pediatric Rehabilitation: Implementation of a Nursing Guideline.", "authors": "Kingsnorth, Shauna; Joachimides, Nick; Krog, Kim et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2015", "vol": "16(6):871-880", "doi": "10.1016/j.pmn.2015.07.009", "abstract": "In Ontario, Canada, the Registered Nurses' Association promotes a Best Practice Spotlight Organization initiative to enhance evidence-based practice. Qualifying  organizations are required to implement strategies, evaluate outcomes, and  sustain practices aligned with nursing clinical practice guidelines. This study  reports on the development and evaluation of a multifaceted implementation  strategy to support adoption of a nursing clinical practice guideline on the  assessment and management of acute pain in a pediatric rehabilitation and complex  continuing care hospital. Multiple approaches were employed to influence  behavior, attitudes, and awareness around optimal pain practice (e.g.,  instructional resources, electronic reminders, audits, and feedback). Four  measures were introduced to assess pain in communicating and noncommunicating  children as part of a campaign to treat pain as the fifth vital sign. A  prospective repeated measures design examined survey and audit data to assess  practice aligned with the guideline. The Knowledge and Attitudes Survey (KNAS)  was adapted to ensure relevance to the local practice setting and was assessed  before and after nurses' participation in three education modules. Audit data  included client demographics and pain scores assessed annually over a 3-year  window. A final sample of 69 nurses (78% response rate) provided pre-/post-survey  data. A total of 108 pediatric surgical clients (younger than 19 years)  contributed audit data across the three collection cycles. Significant  improvements in nurses' knowledge, attitudes, and behaviors related to optimal  pain care for children with disabilities were noted following adoption of the  pain clinical practice guideline. Targeted guideline implementation strategies  are central to supporting optimal pain practice."}, {"id": 350, "title": "Postoperative pain control.", "authors": "Lovich-Sapola, Jessica; Smith, Charles E.; Brandt, Christopher P.", "journal": "The Surgical clinics of North America", "year": "2015", "vol": "95(2):301-318", "doi": "10.1016/j.suc.2014.10.002", "abstract": "Prevention and control of postoperative pain are essential. Inadequate treatment of postoperative pain continues to be a major problem after many surgeries and  leads to worse outcomes, including chronic postsurgical pain. Optimal management  of postoperative pain requires an understanding of the pathophysiology of pain,  methods available to reduce pain, invasiveness of the procedure, and patient  factors associated with increased pain, such as anxiety, depression,  catastrophizing, and neuroticism. Use of a procedure-specific, multimodal  perioperative pain management provides a rational basis for enhanced  postoperative pain control, optimization of analgesia, decrease in adverse  effects, and improved patient satisfaction."}, {"id": 351, "title": "Neonatal Infant Pain Scale: Cross-Cultural Adaptation and Validation in Brazil.", "authors": "Motta, Giordana de Cássia Pinheiro da; Schardosim, Juliana Machado; Cunha, Maria Luzia Chollopetz da", "journal": "J Pain Symptom Manage", "year": "2015", "vol": "50(3):394-401", "doi": "10.1016/j.jpainsymman.2015.03.019", "abstract": "CONTEXT: The Neonatal Infant Pain Scale (NIPS), initially developed in Canada, has been previously used but not adequately adapted and validated for use in Brazil. OBJECTIVES: The goal of the present study was to perform a cross-cultural adaptation and clinical validation of the NIPS for use in the Brazilian population. METHODS: The instrument was adapted based on the method outlined by Beaton et al., including the production and combination of translated versions, back-translation, committee review, and pilot testing. The psychometric properties of the adapted instrument, including its validity, reliability, and internal consistency, were tested in a clinical validation study. The sample comprised 60 at-term newborns who were evaluated by six nurses as they experienced vaccination. Psychometric properties were evaluated using Student's t-tests, prevalence-adjusted and bias-adjusted kappa scores, the Bland-Altman method, and Cronbach's alpha coefficients. RESULTS: The Brazilian version of the NIPS (Escala de Dor no Recém-Nascido [NIPS-Brazil]) demonstrated excellent interobserver and intraobserver reliability. Total NIPS-Brazil scores yielded prevalence-adjusted and bias-adjusted kappa scores of 0.93, whereas the Bland-Altman method revealed interobserver and intraobserver reliability values of 95% and 90%, respectively. The NIPS-Brazil had adequate internal consistency, as evidenced by a Cronbach's alpha of 0.762. CONCLUSION: The NIPS was successfully adapted for use in Brazil and is now available for use in the assessment of acute pain in at-term newborns in Brazil."}, {"id": 352, "title": "Non-pharmacological management of infant and young child procedural pain.", "authors": "Pillai Riddell, Rebecca R.; Racine, Nicole M.; Gennis, Hannah G. et al.", "journal": "The Cochrane database of systematic reviews", "year": "2015", "vol": "2015(12):CD006275", "doi": "10.1002/14651858.CD006275.pub3", "abstract": "BACKGROUND: Infant acute pain and distress is commonplace. Infancy is a period of exponential development. Unrelieved pain and distress can have implications  across the lifespan.  This is an update of a previously published review in the  Cochrane Database of Systematic Reviews, Issue 10 2011 entitled  'Non-pharmacological management of infant and young child procedural pain'.  OBJECTIVES: To assess the efficacy of non-pharmacological interventions for  infant and child (up to three years) acute pain, excluding kangaroo care, and  music. Analyses were run separately for infant age (preterm, neonate, older) and  pain response (pain reactivity, immediate pain regulation).  SEARCH METHODS: For  this update, we searched the Cochrane Central Register of Controlled Trials  (CENTRAL) in The Cochrane Library (Issue 2 of 12, 2015), MEDLINE-Ovid platform  (March 2015), EMBASE-OVID platform (April 2011 to March 2015), PsycINFO-OVID  platform (April 2011 to February 2015), and CINAHL-EBSCO platform (April 2011 to  March 2015). We also searched reference lists and contacted researchers via  electronic list-serves. New studies were incorporated into the review. We refined  search strategies with a Cochrane-affiliated librarian. For this update, nine  articles from the original 2011 review pertaining to Kangaroo Care were excluded,  but 21 additional studies were added. SELECTION CRITERIA: Participants included  infants from birth to three years. Only randomised controlled trials (RCTs) or  RCT cross-overs that had a no-treatment control comparison were eligible for  inclusion in the analyses. However, when the additive effects of a  non-pharmacological intervention could be assessed, these studies were also  included. We examined studies that met all inclusion criteria except for study  design (e.g. had an active control) to qualitatively contextualize results. There  were 63 included articles in the current update. DATA COLLECTION AND ANALYSIS:  Study quality ratings and risk of bias were based on the Cochrane Risk of Bias  Tool and GRADE approach. We analysed the standardized mean difference (SMD) using  the generic inverse variance method. MAIN RESULTS: Sixty-three studies, with 4905  participants, were analysed. The most commonly studied acute procedures were  heel-sticks (32 studies) and needles (17 studies). The largest SMD for treatment  improvement over control conditions on pain reactivity were: non-nutritive  sucking-related interventions (neonate: SMD -1.20, 95% CI -2.01 to -0.38) and  swaddling/facilitated tucking (preterm: SMD -0.89; 95% CI -1.37 to -0.40). For  immediate pain regulation, the largest SMDs were: non-nutritive sucking-related  interventions (preterm: SMD -0.43; 95% CI -0.63 to -0.23; neonate: SMD -0.90; 95%  CI -1.54 to -0.25; older infant: SMD -1.34; 95% CI -2.14 to -0.54),  swaddling/facilitated tucking (preterm: SMD -0.71; 95% CI -1.00 to -0.43), and  rocking/holding (neonate: SMD -0.75; 95% CI -1.20 to -0.30). Fifty two of our 63  trials did not report adverse events. The presence of significant heterogeneity  limited our confidence in the findings for certain analyses, as did the  preponderance of very low quality evidence. AUTHORS' CONCLUSIONS: There is  evidence that different non-pharmacological interventions can be used with  preterms, neonates, and older infants to significantly manage pain behaviors  associated with acutely painful procedures. The most established evidence was for  non-nutritive sucking, swaddling/facilitated tucking, and rocking/holding. All  analyses reflected that more research is needed to bolster our confidence in the  direction of the findings. There are significant gaps in the existing literature  on non-pharmacological management of acute pain in infancy."}, {"id": 353, "title": "The experiences of acute non-surgical pain of children who present to a healthcare facility for treatment: a systematic review protocol.", "authors": "Pope, Nicole; Tallon, Mary; McConigley, Ruth et al.", "journal": "JBI database of systematic reviews and implementation reports", "year": "2015", "vol": "13(10):12-20", "doi": "10.11124/jbisrir-2015-2466", "abstract": "REVIEW QUESTION/OBJECTIVE: The qualitative objective of this systematic review is to identify and synthesize the best available evidence on experiences of acute  non-surgical pain, including pain management, of children (between four to 18  years) when they present to a healthcare facility for treatment.The specific  objectives are to identify: BACKGROUND: The International Association for the  Study of Pain defines pain as \"an unpleasant sensory and emotional experience  associated with actual or potential tissue damage or described in terms of such  damage\". The pain experience is multifaceted and complex, extending beyond the  physiological interpretation of a noxious stimulus, encompassing other  dimensions, including; psychological, cognitive, sociocultural, affective and  emotional factors. Pain can be described as chronic (persisting for three months  or more) or acute (a time limited response to a noxious stimuli). Over the past  50 years clinical research has made revolutionary contributions to better  understanding pediatric pain. The once pervasive erroneous notion that infants do  not experience pain the same way as adults has been firmly dispelled. We now know  that nervous system structures associated with the physiological interpretation  of pain are functional as early as fetal development. Despite this critical  knowledge and the growing global commitment to improving pediatric pain  management in clinical practice, evidence repeatedly suggests that pain  management remains suboptimal and inconsistent, a phenomenon commonly referred to  as oligoanalgesia. Research evidence has linked poorly managed pain in the  pediatric population to negative behavioral and physiological consequences later  in life. Effective pain management is therefore a priority area for health care  professionals. Improved understanding of children's experiences of acute  non-surgical pain may lead to improved pain management and a reduction in  oligoanalgesia.In the 1970s and 1980s, studies began exploring the subjective  experiences of pediatric pain and discovered children's abilities to articulate  their pain experiences, and to link causes and consequences of their pain.  Developmental trends or age related patterns with regards to children's  expressions and experiences of pain were identified. Recent studies have also  recognized apparent trends in children's understanding and expressions of pain;  these follow an age and cognitive development trajectory in line with Piaget's  theories of development.For many children psychosocial aspects of pain, including  emotions like fear, stress and anxiety, are often more unpleasant than the  painful experience itself. Emotional responses such as distress and anxiety are  commonly associated with the anticipation of pain, can exacerbate and intensify  the pain experience, and can significantly lower a child's pain threshold. One  study utilized an observational pain assessment tool to explore children's pain  experiences. The findings indicated that children who underwent \"non-painful\"  procedures (such as restraint) had equal, and in some cases higher, pain scores  than those who underwent painful procedures (such as intravenous  cannulation).Several studies exploring pediatric pain within health care settings  (including, but not limited to, general practitioners, hospitals, emergency  departments and outpatient clinics) have adopted quantitative methods, some  examined parents' perspectives, and others explored nurses' perceptions. While  results of such studies have added to the existing body of knowledge that  supports the need to focus on improving pediatric pain management, it has been  suggested that failing to ask children directly risks not capturing subjective  experiences of pain from the children's perspectives in their entirety. Seeking  the children's perspectives could provide a more reliable and adequate means of  gaining insight into their needs and expectations when they are in pain.A single  centered study in Singapore used semi-structured face-to-face interviews (n=15)  to explore children's experiences of pain management postoperatively. While the  children, aged between six and 12 years, identified the role of analgesia in  managing their pain, they also placed significant emphasis on the role of parents  and health care professionals in implementing non-pharmacological interventions  in pain management. These results are relevant as they provide insights into how  children experience and express pain, and their expectations of health care  professionals in managing their pain. These findings draw attention to effective  pain management approaches when caring for children. Similarly, a UK study  adopted a cross sectional descriptive design using the draw and write technique  aimed at investigating children's views on what helped when they were in pain.  The children (n=71) were aged between four and 16 years. Findings revealed that  children viewed themselves as active agents in pain management, while also  placing significant emphasis on the importance of parents and nurses in managing  their pain. In both studies, children valued nurses for social interactions, such  as kindness and humor, rather than the provision of clinical care, including  analgesia administration. Adjunct therapies such as distraction, visualization  and music have also been shown to be effective in managing the pain experience in  children.Not only do these findings demonstrate the complexity of the pain  experience for the child, they also support the notion that improved pain  management may come from research that is designed to better understand the  entire pain experience from the child's perspective. While there are systematic  reviews on interventions for managing children's pain, and one explored  children's experiences in the postoperative context, none have considered  children's experiences of acute non-surgical pain when they present for  treatment. This qualitative systematic review aims to identify and synthesize  results of studies exploring children's experiences of pain and pain management."}, {"id": 354, "title": "O alívio da dor oncológica: estratégias contadas por adolescentes com câncer", "authors": "Rocha, Amanda de Fatima Portugal; Sposito, Amanda Mota Pacciulio; Bortoli, Paula Salud de et al.", "journal": "Texto & contexto enferm", "year": "2015", "vol": "24(1):96-104", "doi": "", "abstract": ""}, {"id": 355, "title": "Prehospital pain management of injured children: a systematic review of current evidence.", "authors": "Samuel, Nir; Steiner, Ivan P.; Shavit, Itai", "journal": "The American journal of emergency medicine", "year": "2015", "vol": "33(3):451-454", "doi": "10.1016/j.ajem.2014.12.012", "abstract": "OBJECTIVES: Injury is a common cause of acute pain in children. The objective of this study was to analyze the available evidence in prehospital pain management  of injured children. METHODS: The Patient/Population, Intervention, Comparator,  and Outcome question was as follows: \"In pediatric patients requiring prehospital  analgesia for traumatic injuries, what is the level of evidence (LOE) available  for the safety and efficacy of pharmacologic interventions?\" The electronic  databases MEDLINE/PUBMED, EMBASE, and Google Scholar were searched to identify  all the relevant articles published in electronic journals, books, and scientific  Web sites over the last 20 years. Studies were included if they reported on  prehospital use of analgesics in injured children. Reviews, editorials, and  surveys were excluded. RESULTS: Nineteen studies met the inclusion criteria.  Thirteen were pediatric studies and 6 were studies of both adults and children.  Nine were nonrandomized studies with concurrent controls (LOE-2), and 10 were  retrospective case series and chart reviews (LOE-4). A measurable effect of  analgesia was consistently found when analgesics were provided en route to the  hospital; however, most studies reported a relatively low rate of analgesic use.  CONCLUSIONS: Only a few studies examined the efficacy of pediatric prehospital  analgesia. Fentanyl at a dose of 1 to 3 μg/mg seems to have an accepted efficacy.  The current level of evidence is insufficient to assess the safety profile of  analgesics. The findings of this study suggest that the analgesic treatment of  injured children in the prehospital setting is suboptimal."}, {"id": 356, "title": "Intervenção de enfermagem no controle da dor em neonato: eficácia de ações não farmacológicas", "authors": "Santos, Gildenia Calixto dos; Lima, Luciana de Medeiros; Oliveira, Gilda Barbosa de et al.", "journal": "Rev. enferm. UFPE on line", "year": "2015", "vol": "9(8):8784-8791", "doi": "10.5205/reuol.7696-67533-1-SP-1.0908201504", "abstract": "Objetivos: verificar a eficácia de ações não farmacológicas no controle da dor em neonatos e aplicar a Escala NIPS durante a coleta de sangue comparando os scores. Método: estudo exploratório e descritivo de abordagem quantitativa, realizada com neonatos da UTIN de um hospital universitário, onde foi observada a reação do neonato durante a coleta de sangue de acordo com a pontuação obtida na Escala NIPS. Os dados foram agrupados e analisados utilizando o Graph Pad Prism 5.02. A pesquisa teve aprovado o projeto de pelo Comitê de Ética em Pesquisa, CAAE 09208512.1.0000.5183. Resultados: há diferença significativa da pontuação na escala NIPS entre o grupo controle e o grupo conduta, tanto considerando o número total de neonatos, quanto cada neonato isoladamente. Conclusão: a intervenção de enfermagem no manejo da dor possibilita uma melhor resposta do neonato aos procedimentos dolorosos e deve fazer parte do processo de cuidar.(AU)"}, {"id": 357, "title": "Family Beliefs and Interventions in Pediatric Pain Management.", "authors": "Sieberg, Christine B.; Manganella, Juliana", "journal": "Child and adolescent psychiatric clinics of North America", "year": "2015", "vol": "24(3):631-645", "doi": "10.1016/j.chc.2015.02.006", "abstract": "Whether a child has to endure a procedure that incurs acute pain or a child has chronic pain, the impact on the family, especially parents, can be profound.  Parents need to be active members of their child's health care team; however,  they are often ill equipped to cope with either acute pain stressors or  longstanding chronic pain in their children. This article provides an overview of  acute and chronic pain, the impact of parent factors on pediatric pain, parental  assessments of parent functioning, and parent-based interventions for pediatric  pain management. Case examples are used to illustrate the treatments presented."}, {"id": 358, "title": "The use of subdissociative-dose ketamine for acute pain in the emergency department.", "authors": "Sin, Billy; Ternas, Theologia; Motov, Sergey M.", "journal": "Academic emergency medicine : official journal of the Society for Academic Emergency Medicine", "year": "2015", "vol": "22(3):251-257", "doi": "10.1111/acem.12604", "abstract": "OBJECTIVES: Ketamine is a well-known anesthetic with its use trailing back to the 1960s. It has antagonistic effects at the N-methyl-d-aspartate receptor. There is  emerging literature to suggest the use of subdissociative-dose ketamine (SDDK)  for pain reduction. This evidence-based review evaluates the evidence regarding  the use of SDDK for acute pain control in the emergency department (ED). METHODS:  The MEDLINE and EMBASE databases were searched. Randomized controlled trials  (RCTs) that described or evaluated the use of SDDK for acute pain in the ED were  included. Literature was excluded if it was not published in English. Duplicate  articles, unpublished reports, abstracts, and review articles were also excluded.  Quality assessment and evaluation of literature were evaluated based on the GRADE  criteria. The primary outcome of interest in this review was the difference in  pain score from baseline to cutoff time as specified in the studies. Secondary  outcome measures were the incidence of adverse events and reduction in the amount  of adjuvant opioids consumed by patients who received SDDK. RESULTS: Four RCTs  met the inclusion criteria, which enrolled a total of 428 patients. Three adult  trials and one pediatric trial were identified. The level of evidence for the  individual trials ranged from low to moderate. A significant reduction in pain  scores was only found in two of the four trials. One trial found a significant  reduction in mean pain scores when ketamine was compared to morphine (p < 0.05).  Another trial reported a significant decrease in mean distress scores, favoring  SDDK over fentanyl (1.0 vs. 2.7, p < 0.05). One trial found a significant  reduction in the amount of morphine consumed, favoring ketamine over placebo  (0.14 mg/kg, 95% confidence interval [CI] = 0.13 to 0.16 mg/kg vs. 0.2 mg/kg, 95%  CI = 0.18 to 0.22 mg/kg; p < 0.001). An emergence phenomenon was reported in one  trial. CONCLUSIONS: Four RCTs with methodologic limitations failed to provide  convincing evidence to either support or refute the use of SDDK for acute pain  control in the ED."}, {"id": 359, "title": "Nonpharmacological techniques to reduce pain in preterm infants who receive heel-lance procedure: a randomized controlled trial.", "authors": "Bergomi, Piera; Chieppi, Michele; Maini, Antonella et al.", "journal": "Research and theory for nursing practice", "year": "2014", "vol": "28(4):335-348", "doi": "10.1891/1541-6577.28.4.335", "abstract": "INTRODUCTION: The heel-lance (HL) method for blood collection from the newborn is controversial for the pain it causes. This is the first randomized controlled  trial on the management and reduction of pain using the music of Wolfgang Amadeus  Mozart (\"Sonata K. 448\") in premature infants hospitalized in a neonatal  intensive care unit (NICU). This study has compared nonpharmacological techniques  with standard procedure for reducing pain during HL procedure. METHODS:  Thirty-five premature infants were enrolled, each for 3 HL procedures, of which  each was randomized to 1 of the 3 study arms. Arms were then compared in terms of  the Premature Infant Pain Profile (PIPP) changes by analysis of variance (ANOVA).  RESULTS: One hundred five HL procedures were available for analysis (35 standard  procedure, 35 music, 35 glucose). Median baseline PIPP was 3, and median PIPP  after the HL procedure was 5. PIPP scale change was +3 in the control arm, +1 in  the glucose arm, +2 in the music arm (p = .008). DISCUSSION: Both glucose and  music were safe and effective in limiting pain increase when compared to standard  procedure in HL procedures in preterm infants."}, {"id": 360, "title": "Increasing nursing treatment for pediatric procedural pain.", "authors": "Bice, April A.; Gunther, Mary; Wyatt, Tami", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2014", "vol": "15(1):365-379", "doi": "10.1016/j.pmn.2012.06.004", "abstract": "Procedural pain management is an underused practice in children. Despite the availability of efficacious treatments, many nurses do not provide adequate  analgesia for painful interventions. Complementary therapies and nonpharmacologic  interventions are additionally essential to managing pain. Owing to the  increasing awareness of inadequate nursing utilization of pharmacologic measures  for procedural pain, this paper focuses only on analgesic treatments. The aim of  this review was to examine how varying degrees of quality improvement affect  nursing utilization of treatments for routine pediatric procedural pain. A  comprehensive search of databases including Cinahl, Medline/Pubmed, Web of  Science, Google Scholar, Psycinfo, and Cochrane Library was performed. Sixty-two  peer-reviewed research articles were examined. Ten articles focusing on quality  improvement in pediatric pain management published in English from 2001 to 2011  were included. Three themes emerged: 1) increasing nursing knowledge; 2) nursing  empowerment; and 3) protocol implementation. Research critique was completed with  the use of guidelines and recommendations from Creswell (2009) and Garrard  (2011). The literature reveals that nurses still think that pediatric pain  management is essential. Quality improvement increases nursing utilization of  procedural pain treatments. Although increasing nursing knowledge improves  pediatric pain management, it appears that nursing empowerment and protocol  implementation increase nursing compliance more than just education alone. Nurses  providing pain management can enhance their individual practice with quality  improvement measures that may increase nursing adherence to institutional and  nationally recommended pediatric procedural pain management guidelines."}, {"id": 361, "title": "Conhecimento e atitudes de profissionais de saúde sobre avaliação e manejo da dor neonatal", "authors": "Capellini, Verusca Kelly; Daré, Mariana Firmino; Castral, Thaíla Corrêa et al.", "journal": "Rev. eletrônica enferm", "year": "2014", "vol": "16(2):361-369", "doi": "10.5216/ree.v16i2.23611", "abstract": "Múltiplos fatores podem atuar no manejo da dor neonatal, assim, motivando a analisar o conhecimento e as atitudes de m édicos, enfermeiros e auxiliares de enfermagem que atuam em unidades neonatais de um hospital paulista quanto à avaliação e manejo da dor aguda neonatal. Estudo de caráter descritivo, realizado com 57 profissionais de saúde. A partir da análise dos questionários, apenas um profissional considera que o neonato não sente dor e 53 profissionais avaliam a dor do RN, porém não conhecem escalas para avaliação da dor neonatal. Os profissionais apontaram o fentanil e o midazolan como analgésicos adequados  para  a  dor  aguda.  Cateterismo  umbilical, sondagem  gástrica  e  punção  de  calcâneo  foram  procedimentos considerados  dolorosos  e  com  indicação  para  analgesia.  Os  profissionais  de  saúde  possuem  conhecimentos acerca  da  dor neonatal, contudo esse conhecimento não se reflete na prática clínica. É fundamental a capacitação profissional fundamentada na transferência de conhecimento para implementação da avaliação e manejo da dor neonatal."}, {"id": 362, "title": "Music and 25% glucose pain relief for the premature infant: a randomized clinical trial", "authors": "Cardoso, Maria Vera Lúcia Moreira Leitão; Farias, Leiliane Martins; Melo, Gleicia Martins de", "journal": "Rev. latinoam. enferm. (Online)", "year": "2014", "vol": "22(5):810-818", "doi": "10.1590/0104-1169.0029.2484", "abstract": "OBJECTIVE: to analyze the total Premature Infant Pain Profile scores of premature infants undergoing arterial puncture during music and 25% glucose interventions, and to assess their association with neonatal and therapeutic variables. METHOD: a randomized clinical trial with 80 premature infants; 24 in the Experimental Group 1 (music), 33 in the Experimental Group 2 (music and 25% glucose), 23 in the Positive Control Group (25% glucose). All premature infants were videotaped and a lullaby was played for ten minutes before puncture in Experimental Groups 1 and 2; 25% glucose administered in Experimental Group 2 and the Positive Control Group two minutes before puncture. RESULTS: 60.0% of premature infants had moderate or maximum pain; pain scores and intervention groups were not statistically significant. Statistically significant variables: Experimental Group 1: head and chest circumference, Apgar scores, corrected gestational age; Experimental Group 2: chest circumference, Apgar scores, oxygen therapy; Positive Control group: birth weight, head circumference. CONCLUSION: neonatal variables are associated with pain in premature infants. Brazilian Registry of Clinical Trials: UTN: U1111-1123-4821. ."}, {"id": 363, "title": "Relaciones interpersonales en el nuevo modelo de atención sanitarista al niño con dolor", "authors": "Collado Madurga, Ana María; Odales Ibarra, Rogelio; Piñón Gámez, Aimee et al.", "journal": "Rev. cuba. pediatr", "year": "2014", "vol": "86(2):0-0", "doi": "", "abstract": "Introducción: el alivio del dolor debe considerase un derecho fundamental de la persona, porque el respeto a la dignidad humana exige que nadie sufra dolor innecesario. Objetivo: valorar cómo se establecía la relación de los profesionales con el paciente y representantes válidos, en la atención a niños con dolor, y si se ajustaban a un modelo de afrontamiento ético de las relaciones interpersonales y las valoraciones sobre virtudes y cualidades presentes en los profesionales que atienden niños con dolor. Métodos: se realizó una investigación descriptiva-transversal utilizando métodos cualitativos. Se realizaron encuestas a tutores válidos de niños que padecían dolor ingresados en el Hospital Pediátrico Juan Manuel Márquez, y a profesionales de ese hospital de diferentes servicios que atienden a niños con dolor. Las valoraciones de los profesionales sobre estas relaciones se contrastaron con las que hicieron los representantes legales de los niños con dolor atendidos en el hospital. Resultados: el personal de salud considera generalmente (casi siempre) correctas las valoraciones bioéticas en la relación médica con los enfermos y familiares. Los tutores válidos de los niños ingresados escogieron la alternativa siempre correcta en los procederes orientados desde la Bioética por parte del personal de salud. Las cualidades que caracterizan al personal médico y de enfermería son apreciadas en el rango de suficiente, y estas, con relación a cómo deberían estar presentes, las frecuencias no fueron lo suficientemente elevadas para esta profesión. Conclusiones: se constató que la ponderación de valores deseados para la profesión no alcanza las expectativas necesarias para considerar que se estén formando profesionales virtuosos. Los profesionales valoraron que no siempre se cumplen los procederes orientados desde la bioética, sin embargo los padres consideran que estos son cumplidos siempre(AU)"}, {"id": 364, "title": "Effects of sevoflurane versus other general anaesthesia on emergence agitation in children", "authors": "Costi, D; Cyna, AM; Ahmed, S et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2014", "vol": "9", "doi": "10.1002/14651858.CD007084.pub2", "abstract": "Abstract - Background Sevoflurane is an inhaled volatile anaesthetic that is widely used in paediatric anaesthetic practice. Since its introduction, postoperative behavioural disturbance known as emergence agitation (EA) or emergence delirium (ED) has been recognized as a problem that may occur during recovery from sevoflurane anaesthesia. For the purpose of this systematic review, EA has been used to describe this clinical entity. A child with EA may be restless, may cause self‐injury or may disrupt the dressing, surgical site or indwelling devices, leading to the potential for parents to be dissatisfied with their child's anaesthetic. To prevent such outcomes, the child may require pharmacological or physical restraint. Sevoflurane may be a major contributing factor in the development of EA. Therefore, an evidence‐based understanding of the risk/benefit profile regarding sevoflurane compared with other general anaesthetic agents and adjuncts would facilitate its rational and optimal use. Objectives To compare sevoflurane with other general anaesthetic (GA) agents, with or without pharmacological or non‐pharmacological adjuncts, with regard to risk of EA in children during emergence from anaesthesia. The primary outcome was risk of EA; secondary outcome was agitation score. Search methods We searched the following databases from the date of inception to 19 January 2013: CENTRAL, Ovid MEDLINE, Ovid EMBASE, the Cumulative Index to Nursing and Allied Health Literature (CINAHL) (EBSCOhost), Evidence‐Based Medicine Reviews (EBMR) and the Web of Science, as well as the reference lists of other relevant articles and online trial registers. Selection criteria We included all randomized (or quasi‐randomized) controlled trials investigating children < 18 years of age presenting for general anaesthesia with or without surgical intervention. We included any study in which a sevoflurane anaesthetic was compared with any other GA, and any study in which researchers investigated adjuncts (pharmacological or non‐pharmacological) to sevoflurane anaesthesia compared with no adjunct or placebo. Data collection and analysis Two review authors independently searched the databases, decided on inclusion eligibility of publications, ascertained study quality and extracted data. They then resolved differences between their results by discussion. Data were entered into RevMan 5.2 for analyses and presentation. Comparisons of the risk of EA were presented as risk ratios (RRs) with 95% confidence intervals (CIs). Sevoflurane is treated as the control anaesthesia in this review. Sensitivity analyses were performed as appropriate, to exclude studies with a high risk of bias and to investigate heterogeneity. Main results We included 158 studies involving 14,045 children. Interventions to prevent EA fell into two broad groups. First, alternative GA compared with sevoflurane anaesthesia (69 studies), and second, use of an adjunct with sevoflurane anaesthesia versus sevoflurane without an adjunct (100 studies). The overall risk of bias in included studies was low. The overall Grades of Recommendation, Assessment, Development and Evaluation Working Group (GRADE) assessment of the quality of the evidence was moderate to high. A wide range of EA scales were used, as were different levels of cutoff, to determine the presence or absence of EA. Some studies involved children receiving potentially inadequate or no analgesia intraoperatively during painful procedures. Halothane (RR 0.51, 95% CI 0.41 to 0.63, 3534 participants, high quality of evidence) and propofol anaesthesia were associated with a lower risk of EA than sevoflurane anaesthesia. Propofol was effective when used throughout anaesthesia (RR 0.35, 95% CI 0.25 to 0.51, 1098 participants, high quality of evidence) and when used only during the maintenance phase of anaesthesia after sevoflurane induction (RR 0.59, 95% CI 0.46 to 0.76, 738 participants, high quality of evidence). No clear evidence was found of an effect on risk of EA of desflurane (RR 1.46, 95% CI 0.92 to 2.31, 408 participants, moderate quality of evidence) or isoflurane (RR 0.76, 95% CI 0.46 to 1.23, 379 participants, moderate quality of evidence) versus sevoflurane. Compared with no adjunct, effective adjuncts for reducing the risk of EA during sevoflurane anaesthesia included dexmedetomidine (RR 0.37, 95% CI 0.29 to 0.47, 851 participants, high quality of evidence), clonidine (RR 0.45, 95% CI 0.31 to 0.66, 739 participants, high quality of evidence), opioids, in particular fentanyl (RR 0.37, 95% CI 0.27 to 0.50, 1247 participants, high quality of evidence) and a bolus of propofol (RR 0.58, 95% CI 0.38 to 0.89, 394 participants, moderate quality of evidence), ketamine (RR 0.30, 95% CI 0.13 to 0.69, 231 participants, moderate quality of evidence) or midazolam (RR 0.57, 95% CI 0.41 to 0.81, 116 participants, moderate quality of evidence) at the end of anaesthesia. Midazolam oral premedication (RR 0.81, 95% CI 0.59 to 1.12, 370 participants, moderate quality of evidence) and parental presence at emergence (RR 0.91, 95% CI 0.51 to 1.60, 180 participants, moderate quality of evidence) did not reduce the risk of EA. One or more factors designated as high risk of bias were noted in less than 10% of the included studies. Sensitivity analyses of these studies showed no clinically relevant changes in the risk of EA. Heterogeneity was significant with respect to these comparisons: halothane; clonidine; fentanyl; midazolam premedication; propofol 1 mg/kg bolus at end; and ketamine 0.25 mg/kg bolus at end of anaesthesia. With investigation of heterogeneity, the only clinically relevant changes to findings were seen in the context of potential pain, namely, the setting of adenoidectomy/adenotonsillectomy (propofol bolus; midazolam premedication) and the absence of a regional block (clonidine). Authors' conclusions Propofol, halothane, alpha‐2 agonists (dexmedetomidine, clonidine), opioids (e.g. fentanyl) and ketamine reduce the risk of EA compared with sevoflurane anaesthesia, whereas no clear evidence shows an effect for desflurane, isoflurane, midazolam premedication and parental presence at emergence. Therefore anaesthetists can consider several effective strategies to reduce the risk of EA in their clinical practice. Future studies should ensure adequate analgesia in the control group, for which pain may be a contributing or confounding factor in the diagnosis of EA. Regardless of the EA scale used, it would be helpful for study authors to report the risk of EA, so that this might be included in future meta‐analyses. Researchers should also consider combining effective interventions as a multi‐modal approach to further reduce the risk of EA. Plain language summary Agitation in children after sevoflurane anaesthesia Review question We reviewed the evidence looking at how often children wake up agitated after a sevoflurane general anaesthetic compared with other general anaesthetics. We also reviewed evidence looking at the effects of other treatments (e.g. a medication given during the anaesthetic, the presence of a parent when a child wakes up) on how often children wake up agitated after receiving a sevoflurane anaesthetic. Background Sevoflurane is a commonly used anaesthetic gas for children because it can be breathed in by face mask and works very quickly in getting children off to sleep. Sevoflurane is given continuously during an operation to keep the child asleep, and it is turned off when it is time for the child to wake up. It is very common for children, especially preschool children, to wake up restless, agitated, delirious or thrashing around after receiving a sevoflurane anaesthetic. We call this \"emergence agitation.\" It can occur even when no pain is present and usually resolves within 30 minutes of waking up. Children with emergence agitation may injure themselves, bump the operation wound and pull out drips or wound drains. Emergence agitation can be distressing for parents and caregivers. We wanted to discover whether the rate of emergence agitation is lowered when different anaesthetics are used. We also wanted to know whether treatments can be given to reduce the rate of emergence agitation when sevoflurane is used. Study characteristics The evidence is current to January 2013. We found a total of 158 studies involving 14,045 children. A total of 69 studies compared a sevoflurane anaesthetic with a different anaesthetic, and 100 studies looked at treatments to reduce the rate of emergence agitation with a sevoflurane anaesthetic. Most of these treatments were medications that were compared with a dummy treatment (placebo) or with no medication. We reran the search in April 2014 and will address identified studies of interest when we update the review. Key results The medications propofol, halothane, alpha‐2 agonists (dexmedetomidine, clonidine), opioids (e.g. fentanyl) and ketamine reduce the rate of emergence agitation, whereas no clear evidence of an effect was found for the anaesthetic gases desflurane and isoflurane, the premedication midazolam and parental presence when a child wakes up from anaesthesia. Quality of the evidence Overall the evidence is of moderate to high quality. Researchers should consider combining effective interventions to see whether the risk of EA can be reduced further."}, {"id": 365, "title": "Demanda clínica de uma unidade de pronto atendimento, segundo o protocolo de Manchester", "authors": "Diniz, Aline Santos; Silva, Ana Paula da; Souza, Cristiane Chaves de et al.", "journal": "Rev. eletrônica enferm", "year": "2014", "vol": "16(2):312-320", "doi": "10.5216/ree.v16i2.21700", "abstract": "Estudo com objetivo geral de identificar a demanda clínica dos pacientes atendidos por enfermeiros na classificação de risco  de  uma  Unidade  de  Pronto  Atendimento,  segundo  o  protocolo de  Manchester.  Trata-se  deestudo  descritivo quantitativo cuja amostra foi de 364 prontuários. Os dados foram analisados no programa  Statistical Package for the Social Science, utilizando estatística descritiva, bivariada e teste de correlação de Spearman. As principais queixas dos pacientes foram: \"Indisposição no adulto\", \"Problemas nos membros\", \"Dor abdominal\"e \"Cefaleia\". Houve correlação inversa entre faixa etária e classificação de risco (rs = -0.14 p=0,005) e horário de atendimento e classificação de risco (rs = -1.02, p=0.046). Concluiu-se que os pacientes atendidos na classificação de risco apresentaram queixas urgentes e  não  urgentes.  Quanto  maior  a  faixa  etária  do  paciente  e  mais tarde  o  horário  de  procura  para  atendimento,  mais grave foi a sua condição clínica."}, {"id": 366, "title": "First steps toward understanding the variability in acute pain service provision and the quality of pain relief in everyday practice across the United Kingdom.", "authors": "Duncan, Fiona; Day, Ruth; Haigh, Carol et al.", "journal": "Pain medicine (Malden, Mass.)", "year": "2014", "vol": "15(1):142-153", "doi": "10.1111/pme.12284", "abstract": "BACKGROUND: Pain management for patients in hospital is a major problem. There is significant variation in care provision. Evidence is needed about the ways in  which acute pain services are organized in order to understand whether these are  linked to important differences in patient outcomes. The National Inpatient Pain  Study group is a voluntary collaborative venture of inpatient pain specialists in  the United Kingdom who are working toward establishing a national prospective  database of service provision and activity. OBJECTIVES: The objectives of this  article are (1) to describe current pain service provision and activity (2) to  define and monitor the quality and side effects of the primary analgesic  techniques, such as central neuraxial block or systemic analgesia, and identify  variations in practice. METHODS: Phase 1: Surveys were conducted in two phases  during 2010-2011. Information about the organization of services was collected  from 121 centers via a live Website. Phase 2: The pilot clinical dataset was  collected from 13 hospitals in 2011. RESULTS: Results indicated that staffing  varied widely from one to nine nurses per hospital site. Twelve percent of  hospitals did not routinely collect data. The main workload was orthopedic and  general surgery based on data from 13 hospitals and 29,080 patients in 2011.  Thirty-seven percent of patients reported a pain score of moderate to severe pain  on the first assessment by the specialist pain team, and 21% reported severe  pain. Nausea and vomiting was the most frequent adverse event reported.  Sixty-nine major adverse events were logged, of which 64 documented respiratory  depression (N = 29,080, 0.22%). CONCLUSIONS: Prospective longitudinal data has  the potential to improve our understanding of variation in process and outcome  measures and establish future research priorities."}, {"id": 367, "title": "[Process control in acute pain management. An analysis of the degree of organization of applied standard protocols].", "authors": "Erlenwein, J.; Emons, M. I.; Hecke, A. et al.", "journal": "Schmerz (Berlin, Germany)", "year": "2014", "vol": "28(5):493-503", "doi": "10.1007/s00482-014-1479-2", "abstract": "BACKGROUND: The aim of this study was to analyze the degree of organization of different standard protocols for acute pain management, as well as the derivation  and definition of typical but structurally different models. METHODS: A total of  85 hospitals provided their written standardized protocols for analysis.  Protocols for defined target processes from 76 hospitals and another protocol  used by more than one hospital were included into the analysis. The suggested  courses of action were theoretically simulated to identify and characterize  process types in a multistage evaluation process. RESULTS: The analysis included  148 standards. Four differentiated process types were defined (\"standardized  order\", \"analgesic ladder\", \"algorithm\", \"therapy path\"), each with an increasing  level of organization. These four types had the following distribution: 27 %  (n = 40) \"standardized order\", 47 % (n = 70) \"analgesic ladder\", 22 % (n = 33)  \"algorithm\", 4 % (n = 5) \"therapy path\". Models with a higher degree of  organization included more control elements, such as action and intervention  triggers or safety and supervisory elements, and were also associated with a  formally better access to medication. For models with a lower degree of  organization, immediate courses of action were more dependent on individual  decisions. Although not quantifiable, this was particularly evident when  simulating downstream courses of action. Interfaces between areas of hospital  activity and a cross-departmental-boundary validity were only considered in a  fraction of the protocols. Concepts from clinics with a certificate in (acute)  pain management were more strongly process-oriented. For children, there were  proportionately more simple concepts with a lower degree of organization and less  controlling elements. CONCLUSION: This is the first analysis of a large sample of  standardized protocols for acute pain management focusing on the degree of  organization and the possible influence on courses of action. The analysis shows  how different the structures and presumably the practical objectives of the  various concepts are. The analyzed protocols with a lower degree of organization  can manage only the assignment of a particular medication to the corresponding  patient group, with a presumably high requirement for considerable implicit  knowledge of the responsible employees. Accordingly, a requirement for such  protocols should be that they not only describe the preferred standard therapy,  but also define the interactions between the staff members involved. It remains  questionable whether a protocol with a low level of organization and a comparably  high requirement for implicit knowledge and individual action--also from  nonmedical personnel--is able to ensure efficient pain therapy, particularly in  view changing staff and dynamic responses to changing pain situations."}, {"id": 368, "title": "Not small adults: the emerging role of pediatric pain services.", "authors": "Finley, G. Allen; MacLaren Chorney, Jill; Campbell, Lori", "journal": "Canadian journal of anaesthesia = Journal canadien d'anesthesie", "year": "2014", "vol": "61(2):180-187", "doi": "10.1007/s12630-013-0076-7", "abstract": "PURPOSE: This review article explores the need for specialized pain care for children and adolescents and provides some historical context for our current  knowledge base and clinical practice. PRINCIPAL FINDINGS: Pediatric patients have  specialized needs with respect to assessment and management of pain. Acute pain  care is modified by developmental considerations in both these areas; chronic  pain encompasses a wide range of complex developmental, social, and psychological  factors requiring the skills of different health disciplines to provide the best  care. CONCLUSIONS: Awareness of children's pain has increased dramatically over  the past three decades, and Canadians have performed a leadership role in much of  the research. Specific multidisciplinary teams are a more recent phenomenon, but  they are shown to be more effective and probably more cost effective than  traditional treatment models. Important gaps in availability of resources to  manage these patients remain."}, {"id": 369, "title": "Acute pain management in burn patients: appraisal and thematic analysis of four clinical guidelines.", "authors": "Gamst-Jensen, Hejdi; Vedel, Pernille Nygaard; Lindberg-Larsen, Viktoria Oline et al.", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2014", "vol": "40(8):1463-1469", "doi": "10.1016/j.burns.2014.08.020", "abstract": "OBJECTIVE: Burn patients suffer excruciating pain due to their injuries and procedures related to surgery, wound care, and mobilization. Acute Stress  Disorder, Post-Traumatic Stress Disorder, chronic pain and depression are highly  prevalent among survivors of severe burns. Evidence-based pain management  addresses and alleviates these complications. The aim of our study was to compare  clinical guidelines for pain management in burn patients in selected European and  non-European countries. We included pediatric guidelines due to the high rate of  children in burn units. METHOD: The study had a comparative retrospective design  using combined methodology of instrument appraisal and thematic analysis. Three  investigators appraised guidelines from burn units in Denmark (DK), Sweden (SE),  New Zealand (NZ), and USA using the AGREE Instrument (Appraisal of Guidelines for  Research & Evaluation), version II, and identified core themes in the guidelines.  RESULTS: The overall scores expressing quality in six domains of the AGREE  instrument were variable at 22% (DK), 44% (SE), 100% (NZ), and 78% (USA). The  guidelines from NZ and USA were highly recommended, the Swedish was recommended,  whereas the Danish was not recommended. The identified core themes were:  continuous pain, procedural pain, postoperative pain, pain assessment, anxiety,  and non-pharmacological interventions. CONCLUSION: The study demonstrated  variability in quality, transparency, and core content in clinical guidelines on  pain management in burn patients. The most highly recommended guidelines provided  clear and accurate recommendations for the nursing and medical staff on pain  management in burn patients. We recommend the use of a validated appraisal tool  such as the AGREE instrument to provide more consistent and evidence-based care  to burn patients in the clinic, to unify guideline construction, and to enable  interdepartmental comparison of treatment and outcomes."}, {"id": 370, "title": "An Evidence-based Guideline for prehospital analgesia in trauma.", "authors": "Gausche-Hill, Marianne; Brown, Kathleen M.; Oliver, Zoë J. et al.", "journal": "Prehospital emergency care", "year": "2014", "vol": "18 Suppl 1:25-34", "doi": "10.3109/10903127.2013.844873", "abstract": "BACKGROUND: The management of acute traumatic pain is a crucial component of prehospital care and yet the assessment and administration of analgesia is highly  variable, frequently suboptimal, and often determined by consensus-based regional  protocols. OBJECTIVE: To develop an evidence-based guideline (EBG) for the  clinical management of acute traumatic pain in adults and children by advanced  life support (ALS) providers in the prehospital setting. Methods. We recruited a  multi-stakeholder panel with expertise in acute pain management, guideline  development, health informatics, and emergency medical services (EMS) outcomes  research. Representatives of the National Highway Traffic Safety Administration  (sponsoring agency) and a major children's research center (investigative team)  also contributed to the process. The panel used the Grading of Recommendations  Assessment, Development and Evaluation (GRADE) methodology to guide the process  of question formulation, evidence retrieval, appraisal/synthesis, and formulation  of recommendations. The process also adhered to the National Prehospital  Evidence-Based Guideline (EBG) model process approved by the Federal Interagency  Council for EMS and the National EMS Advisory Council. RESULTS: Four strong and  three weak recommendations emerged from the process; two of the strong  recommendations were linked to high- and moderate-quality evidence, respectively.  The panel recommended that all patients be considered candidates for analgesia,  regardless of transport interval, and that opioid medications should be  considered for patients in moderate to severe pain. The panel also recommended  that all patients should be reassessed at frequent intervals using a standardized  pain scale and that patients should be re-dosed if pain persists. The panel  suggested the use of specific age-appropriate pain scales. CONCLUSION: GRADE  methodology was used to develop an evidence-based guideline for prehospital  analgesia in trauma. The panel issued four strong recommendations regarding  patient assessment and narcotic medication dosing. Future research should define  optimal approaches for implementation of the guideline as well as the impact of  the protocol on safety and effectiveness metrics."}, {"id": 371, "title": "Human touch effectively and safely reduces pain in the newborn intensive care unit.", "authors": "Herrington, Carolyn J.; Chiodo, Lisa M.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2014", "vol": "15(1):107-115", "doi": "10.1016/j.pmn.2012.06.007", "abstract": "This was a feasibility pilot study to evaluate the efficacy of the nonpharmacologic pain management technique of gentle human touch (GHT) in  reducing pain response to heel stick in premature infants in the neonatal  intensive care unit (NICU). Eleven premature infants ranging from 27 to 34 weeks'  gestational age, in a level III NICU in a teaching hospital, were recruited and  randomized to order of treatment in this repeated-measures crossover-design  experiment. Containment with GHT during heel stick was compared with traditional  nursery care (side lying and \"nested\" in an incubator). Heart rate, respiratory  rate, oxygen saturation, and cry were measured continuously beginning at baseline  and continuing through heel warming, heel stick, and recovery following the heel  stick. Infants who did not receive GHT had decreased respiration, increased heart  rate, and increased cry time during the heel stick. In contrast, infants who  received GHT did not have decreased respirations, elevated heart rates, or  increased cry time during the heel stick. No significant differences were noted  in oxygen saturation in either group. GHT is a simple nonpharmacologic therapy  that can be used by nurses and families to reduce pain of heel stick in premature  infants in the NICU."}, {"id": 372, "title": "Pain prevalence, intensity, assessment and management in a hospitalized pediatric population.", "authors": "Kozlowski, Lori J.; Kost-Byerly, Sabine; Colantuoni, Elizabeth et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2014", "vol": "15(1):22-35", "doi": "10.1016/j.pmn.2012.04.003", "abstract": "New research, regulatory guidelines, and practice initiatives have improved pain management in infants, children, and adolescents, but obstacles remain. The aim  of this study was to identify the prevalence and demographics of pain, as well as  pain management practice patterns in hospitalized children in a tertiary-care  university hospital. We prospectively collected data including patient  demographics, presence/absence and location of pain, pain intensity, pain  assessment documentation, analgesic use, side effects of analgesic therapy, and  patient/family satisfaction. Two hundred male (58%) and female, medical and  surgical (61%) patients, averaging 9 ± 6.2 years were studied. Pain was common  (86%) and often moderate to severe (40%). Surgical patients reported pain more  frequently when enrolled than did medical patients (99% vs. 65%). Female gender,  age ≥ 5 years, and Caucasian race were all associated with higher mean pain  scores. Furthermore, females and Caucasian children consumed more opioids than  males and non-Caucasians. Identified obstacles to optimal analgesic management  include lack of documented physician pain assessment (<5%), a high prevalence of  \"as needed\" analgesic dosing, frequent opioid-induced side effects (44% nausea  and vomiting, 27% pruritus), and patient/family dissatisfaction with pain  management (2%-7%). The data demonstrated that despite a concentrated focus on  improving pain management over the past decade, pain remains common in  hospitalized children. Identification of patient populations and characteristics  that predispose to increased pain (e.g., female, Caucasian, postoperative  patient) as well as obstacles to analgesic management provide a focus for the  development of targeted interventions and research to further improve care."}, {"id": 373, "title": "Pediatric clinical practice guidelines for acute procedural pain: a systematic review.", "authors": "Lee, Grace Y.; Yamada, Janet; Kyololo, O'Brien et al.", "journal": "Pediatrics", "year": "2014", "vol": "133(3):500-515", "doi": "10.1542/peds.2013-2744", "abstract": "BACKGROUND: Procedural pain assessment and management have been extensively studied through multiple research studies over the past decade. Results of this  research have been included in numerous pediatric pain practice guidelines.  OBJECTIVE: To systematically review the quality of existing practice guidelines  for acute procedural pain in children and provide recommendations for their use.  METHODS: A systematic search was conducted on Medline, Embase, CINAHL, PsycINFO,  and Scopus from 2000 to July 2013. A gray literature search was also conducted  through the Translating Research Into Practice database, Guidelines International  Network database, and National Guideline Clearinghouse. Four reviewers rated  relevant guidelines using the Appraisal of Guidelines for Research and Evaluation  (AGREE) II Instrument. Screening of guidelines, assessment of methodological  quality, and data abstraction were conducted by 2 pairs of raters. Disagreements  in overall assessments were resolved through consensus. RESULTS: Eighteen  guidelines from 4930 retrieved abstracts were included in this study. Based on  the AGREE II domains, the guidelines generally scored high in the scope and  purpose and clarity of presentation areas. Information on the rigor of guideline  development, applicability, and editorial independence were specified  infrequently. Four of the 18 guidelines provided tools to help clinicians apply  the recommendations in practice settings; 5 were recommended for use in clinical  settings, and the remaining 13 were recommended for use with modification.  CONCLUSIONS: Despite the increasing availability of clinical practice guidelines  for procedural pain in children, the majority are of average quality. More  transparency and comprehensive reporting are needed for the guideline development  process."}, {"id": 374, "title": "Lactancia materna y anestesia tópica en la reducción del dolor en procedimientos de punción venosa en recién nacidos a término del Hospital Nacional Daniel Alcides Carrión", "authors": "Linares Gaitán, Lucy Raquel", "journal": "", "year": "2014", "vol": "41-41", "doi": "", "abstract": ""}, {"id": 375, "title": "Mother’s look about the newborn child’s pain", "authors": "Melo, Gleicia Martins de; Lelis, Ana Luíza Paula de Aguiar; Cardoso, Maria Vera Lucia Moreira Leitão et al.", "journal": "Rev Enferm UFPE On line", "year": "2014", "vol": "8(1):8-15", "doi": "", "abstract": ""}, {"id": 376, "title": "A qualitative study of the barriers to prehospital management of acute pain in children.", "authors": "Murphy, Adrian; Barrett, Michael; Cronin, John et al.", "journal": "Emergency medicine journal : EMJ", "year": "2014", "vol": "31(6):493-498", "doi": "10.1136/emermed-2012-202166", "abstract": "INTRODUCTION: Effective pain management in the prehospital setting is gaining momentum as a potential key performance indicator by many emergency medical  service systems, but historically has been shown to be inadequate, particularly  in the paediatric population. This study aimed to identify the barriers, as  perceived by a national cohort of advanced paramedics (APs), to achieving optimal  prehospital management of acute pain in children. METHODS: A qualitative approach  was employed to capture data through two focus group interviews. Sixteen APs were  invited to participate in this study. Both focus groups were audio recorded,  transcribed and analysed using Attride-Stirling's framework for thematic network  analysis. RESULTS: The global theme 'Understanding Barriers to the Prehospital  Management of Acute Pain in Children' emerged from three organising themes as  follows: AP education and training; current clinical practice guidelines for  paediatric pain management; realities of prehospital practice. Limited exposure  to children in the prehospital setting, difficulty assessing pain intensity in  small children, and challenges in administering oral or inhaled analgesic agents  to distressed and uncooperative children were highlighted by participants. Short  transfer times to the emergency department, and a 'medical' cause of pain were  also implicated as examples of when children are less likely to receive analgesia  from practitioners. CONCLUSIONS: The pathway to improving care must include an  emphasis on improvements in practitioner education and training, offering  alternatives to assessing pain in preverbal children, exploring the intranasal  route of drug delivery in managing acute severe pain, and robustly developed  evidence-based guidelines that are practitioner friendly and patient-focused."}, {"id": 377, "title": "What's new in pediatric acute pain therapy?", "authors": "Schultz-Machata, Anette-Marie; Weiss, Markus; Becke, Karin", "journal": "Current opinion in anaesthesiology", "year": "2014", "vol": "27(3):316-322", "doi": "10.1097/ACO.0000000000000074", "abstract": "PURPOSE OF REVIEW: This review highlights the current trends of efficient and safe perioperative pediatric pain therapy in the context of a multimodal pain  therapy concept. RECENT FINDINGS: A multimodal pain therapy concept should be  easy to apply and safe regarding the occurrence of side-effects. The  administration of nonopioid analgesics should be obligatory, regional anesthesia  techniques - under ultrasound guidance - should be performed whenever possible,  opioids should be given immediately and sufficiently whenever necessary, the  administration of co-analgesics like lidocaine, dexamethasone or ketamine should  be considered, and most importantly, each pain therapy should be performed  according to pain assessment and long enough until adequate pain relief. SUMMARY:  Safe and simple pediatric pain management in the perioperative period combines  not only easy to apply and safe stepwise pain therapy itself, but also adequate  pain assessment and the implementation of continuous hospital quality improvement  strategies."}, {"id": 378, "title": "Acute pain management in infants and children-Part 2: Intravenous opioids, intravenous nonsteroidal anti-inflammatory drugs, and managing adverse effects.", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e169-175", "doi": "10.3928/00904481-20140619-11", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the use of intravenous opioid and  nonsteroidal anti-inflammatory agents for the treatment of moderate to severe  pain. Options to manage specific adverse effects that may occur with opioids are  presented."}, {"id": 379, "title": "Acute pain management in infants and children-Part 1: Pain pathways, pain assessment, and outpatient pain management.", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e163-168", "doi": "10.3928/00904481-20140619-10", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the techniques for the assessment of  pain, including various age-specific pain scoring systems. The pharmacological  management of pain is discussed, including the use of agents that inhibit  prostaglandin formation-nonsteroidal anti-inflammatory agents and  acetaminophen-as well as the \"weak opioids\" that are commonly used when oral  administration is feasible for the treatment of mild to moderate pain."}, {"id": 380, "title": "Doubts of caregivers of children with cleft lip and palate on postoperative care after cheiloplasty and palatoplasty", "authors": "Trettene, Armando dos Santos; Razera, Ana Paula Ribeiro; Maximiano, Thaís de Oliveira et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2014", "vol": "48(6):993-998", "doi": "10.1590/S0080-623420140000700005", "abstract": "Objective To identify the main doubts of caregivers of children with cleft lip and palate on postoperative care after cheiloplasty and palatoplasty. Method Cross-sectional study carried out in a reference hospital, between September and November 2012. The sample was composed of 50 individuals divided in two groups, of which 25 caregivers of children submitted to cheiloplasty, and 25 of children submitted to palatoplasty. The doubts were identified by an interview applied during the preoperative nursing consultation and were then categorized by similarity. Descriptive statistics was used for analysis of the outcomes. Results Concerning cheiloplasty, the doubts were related to feeding (36%), hygiene and healing (24% each), pain and infection (8% each). With regard to palatoplasty, the doubts were related to feeding (48%), hygiene (24%), pain (16%), bleeding (8%) and infection (4%). Conclusion The study evidenced the concern of caregivers in relation to feeding and care of the postoperative wound. ."}, {"id": 381, "title": "Degree of knowledge of health care professionals about pain management and use of opioids in pediatrics.", "authors": "de Freitas, Gabriel R. M.; de Castro, Cláudio G. Jr; Castro, Stela M. J. et al.", "journal": "Pain medicine (Malden, Mass.)", "year": "2014", "vol": "15(5):807-819", "doi": "10.1111/pme.12332", "abstract": "OBJECTIVE: To evaluate the degree of knowledge about pain management and opioids use by professionals working at three pediatric units. DESIGN: This is a  cross-sectional study. SETTING: This study was carried out at three pediatric  units (pediatrics, intensive care unit, and oncology) of Hospital de Clínicas de  Porto Alegre, which is a university hospital located in southern Brazil. SUBJECT:  The subjects of this study include physicians, pharmacists, physiotherapists,  nurses, nursing technicians, and nursing assistants. METHODS: Cross-sectional  study carried out in a university hospital in southern Brazil. A self-applicable  semi-structured questionnaire was handed out to 182 professionals from December  2011 to March 2012. RESULTS: The response rate was 67% (122); the average  percentage of correct answers was 63.2 ± 1.4%. The most frequent errors were: an  opioid must not be used if the cause of pain is unknown (47%; 54/115); patients  often develop respiratory depression (42.3%; 22/52); and confusion about symptoms  of withdrawal, tolerance, and dependency syndromes (81.9%; 95/116). Only 8.8%  (10/114) reported the use of pain scales to identify pain in children. The most  often cited hindrance to control pain was the difficulty to measure and spot pain  in pediatric patients. Finally, 50.8% (62/122) of them did not have any previous  training in pain management. CONCLUSIONS: Problems in the processes of pain  identification, measurement, and treatment have been found. Results suggest that  there is a need for both an investment in continuing education of professionals  and the development of protocols to optimize the analgesic therapy, thus  preventing increased child suffering."}, {"id": 382, "title": "[The non-nutritive sucking of premature newborn as a nursing technology].", "authors": "Antunes, Joice Cristina Pereira; Nascimento, Maria Aparecida de Luca", "journal": "Rev Bras Enferm", "year": "2013", "vol": "66(5):663-7", "doi": "", "abstract": "This is an experimental study with a quantitative approach, whose goal was to demonstrate that non-nutritive sucking is effective in pain management during installation, by the nursing staff, of nasal CPAP in preterm infants; and to demonstrate that the use of non-nutritive sucking, concomitantly with the installation of nasal CPAP can be considered a nursing technology. The target population consisted of 20 preterm infants undergoing installation or reinstallation of this artifact, totaling 30 procedures. The newborns were divided randomly into two groups, control and experimental, in which non-nutritive sucking was offered, the same do not happening with the control group. The reactions of pain were measured by the scale of NIPS. In 100% of the procedures that occurred concomitant with non-nutritive sucking, newborns did not feel pain; and 100% of the newborns showed pain when such suction was not offered. We conclude that the procedure can be classified as a technology of nursing care."}, {"id": 383, "title": "A sucção não nutritiva do recém-nascido prematuro como uma tecnologia de enfermagem", "authors": "Antunes, Joice Cristina Pereira; Nascimento, Maria Aparecida de Luca", "journal": "Rev. bras. enferm", "year": "2013", "vol": "66(5):663-667", "doi": "10.1590/S0034-71672013000500004", "abstract": "Estudo experimental com abordagem quantitativa, cujo objetivo foi demonstrar que a sucção não nutritiva é efetiva no manejo da dor du
