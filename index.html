arch is needed to  provide reliable evidence on which technology-based, non-pharmacological pain  relief intervention is most effective for hospitalized neonates. SUPPLEMENTAL  DIGITAL CONTENT: A Finnish-language version of the abstract of this review is  available as supplemental digital content [ http://links.lww.com/SRX/A19 ].  REVIEW REGISTRATION: PROSPERO CRD42021254218."}, {"id": 76, "title": "Paracetamol and ibuprofen combination for the management of acute mild-to-moderate pain in children: expert consensus using the Nominal Group  Technique (NGT).", "authors": "Parri, Niccolò; Silvagni, Davide; Chiarugi, Alberto et al.", "journal": "Italian journal of pediatrics", "year": "2023", "vol": "49(1):36", "doi": "10.1186/s13052-023-01445-4", "abstract": "BACKGROUND: Acute pain is a common symptom in children of all ages, and is associated with a variety of conditions. Despite the availability of guidelines,  pain often remains underestimated and undertreated. Paracetamol and ibuprofen are  the most commonly used drugs for analgesia in Pediatrics. Multimodal pain  management by using a combination of paracetamol and ibuprofen results in greater  analgesia. METHODS: An investigation using the Nominal Group Technique was  carried out between May and August 2022. Two open (non-anonymous) questionnaires  were consecutively sent to a Board of ten clinicians to understand their opinions  on the use of the oral paracetamol and ibuprofen association. Answers were  examined in a final meeting where conclusions were drawn. RESULTS: The board  achieved a final consensus on a better analgesic power of paracetamol and  ibuprofen in fixed-dose combination as compared to monotherapy, without  compromising safety. Strong consensus was reached on the opinion that the  fixed-dose combination of paracetamol and ibuprofen may be a useful option in  case of inefficacy of one or other drug as monotherapy, especially in case of  headaches, odontalgia, earache, and musculoskeletal pain. The use of the fixed  combination may be also considered suitable for postoperative pain management.  CONCLUSIONS: The use of the fixed-dose combination may represent advantage in  terms of efficacy and safety, allowing a better control of the dose of both  paracetamol and ibuprofen as monotherapy, thus minimizing the risk of incorrect  dosage. However, the limited evidence available highlights the need for future  well designed studies to better define the advantages of this formulation in the  various therapeutic areas."}, {"id": 77, "title": "Non-pharmacological management of infant and young child procedural pain.", "authors": "Pillai Riddell, Rebecca R.; Bucsea, Oana; Shiff, Ilana et al.", "journal": "The Cochrane database of systematic reviews", "year": "2023", "vol": "6(6):CD006275", "doi": "10.1002/14651858.CD006275.pub4", "abstract": "BACKGROUND: Despite evidence of the long-term implications of unrelieved pain during infancy, it is evident that infant pain is still under-managed and  unmanaged. Inadequately managed pain in infancy, a period of exponential  development, can have implications across the lifespan. Therefore, a  comprehensive and systematic review of pain management strategies is integral to  appropriate infant pain management. This is an update of a previously published  review update in the Cochrane Database of Systematic Reviews (2015, Issue 12) of  the same title. OBJECTIVES: To assess the efficacy and adverse events of  non-pharmacological interventions for infant and child (aged up to three years)  acute pain, excluding kangaroo care, sucrose, breastfeeding/breast milk, and  music. SEARCH METHODS: For this update, we searched CENTRAL, MEDLINE-Ovid  platform, EMBASE-OVID platform, PsycINFO-OVID platform, CINAHL-EBSCO platform and  trial registration websites (ClinicalTrials.gov; International Clinical Trials  Registry Platform) (March 2015 to October 2020). An update search was completed  in July 2022, but studies identified at this point were added to 'Awaiting  classification' for a future update.  We also searched reference lists and  contacted researchers via electronic list-serves.  We incorporated 76 new studies  into the review.  SELECTION CRITERIA: Participants included infants from birth to  three years in randomised controlled trials (RCTs) or cross-over RCTs that had a  no-treatment control comparison. Studies were eligible for inclusion in the  analysis if they compared a non-pharmacological pain management strategy to a  no-treatment control group (15 different strategies). In addition, we also  analysed studies when the unique effect of adding a non-pharmacological pain  management strategy onto another pain management strategy could be assessed (i.e.  additive effects on a sweet solution, non-nutritive sucking, or swaddling) (three  strategies). The eligible control groups for these additive studies were sweet  solution only, non-nutritive sucking only, or swaddling only, respectively.  Finally, we qualitatively described six interventions that met the eligibility  criteria for inclusion in the review, but not in the analysis.  DATA COLLECTION  AND ANALYSIS: The outcomes assessed in the review were pain response (reactivity  and regulation) and adverse events. The level of certainty in the evidence and  risk of bias were based on the Cochrane risk of bias tool and the GRADE approach.  We analysed the standardised mean difference (SMD) using the generic inverse  variance method to determine effect sizes.  MAIN RESULTS: We included total of  138 studies (11,058 participants), which includes an additional 76 new studies  for this update. Of these 138 studies, we analysed 115 (9048 participants) and  described 23 (2010 participants) qualitatively. We described qualitatively  studies that could not be meta-analysed due to being the only studies in their  category or statistical reporting issues. We report the results of the 138  included studies here. An SMD effect size of 0.2 represents a small effect, 0.5 a  moderate effect, and 0.8 a large effect. The thresholds for the I(2)  interpretation were established as follows: not important (0% to 40%); moderate  heterogeneity (30% to 60%); substantial heterogeneity (50% to 90%); considerable  heterogeneity (75% to 100%). The most commonly studied acute procedures were heel  sticks (63 studies) and needlestick procedures for the purposes of  vaccines/vitamins (35 studies). We judged most studies to have high risk of bias  (103 out of 138), with the most common methodological concerns relating to  blinding of personnel and outcome assessors. Pain responses were examined during  two separate pain phases: pain reactivity (within the first 30 seconds after the  acutely painful stimulus) and immediate pain regulation (after the first 30  seconds following the acutely painful stimulus). We report below the strategies  with the strongest evidence base for each age group. In preterm born neonates,  non-nutritive sucking may reduce pain reactivity (SMD -0.57, 95% confidence  interval (CI) -1.03 to -0.11, moderate effect; I(2) = 93%, considerable  heterogeneity) and improve immediate pain regulation (SMD -0.61, 95% CI -0.95 to  -0.27, moderate effect; I(2) = 81%, considerable heterogeneity), based on very  low-certainty evidence. Facilitated tucking may also reduce pain reactivity (SMD  -1.01, 95% CI -1.44 to -0.58, large effect; I(2) = 93%, considerable  heterogeneity) and improve immediate pain regulation (SMD -0.59, 95% CI -0.92 to  -0.26, moderate effect; I(2) = 87%, considerable heterogeneity); however, this is  also based on very low-certainty evidence. While swaddling likely does not reduce  pain reactivity in preterm neonates (SMD -0.60, 95% CI -1.23 to 0.04, no effect;  I(2) = 91%, considerable heterogeneity), it has been shown to possibly improve  immediate pain regulation (SMD -1.21, 95% CI -2.05 to -0.38, large effect; I(2) =  89%, considerable heterogeneity), based on very low-certainty evidence. In  full-term born neonates, non-nutritive sucking may reduce pain reactivity (SMD  -1.13, 95% CI -1.57 to -0.68, large effect; I(2) = 82%, considerable  heterogeneity) and improve immediate pain regulation (SMD -1.49, 95% CI -2.20 to  -0.78, large effect; I(2) = 92%, considerable heterogeneity), based on very  low-certainty evidence.  In full-term born older infants, structured parent  involvement was the intervention most studied. Results showed that this  intervention has little to no effect in reducing pain reactivity (SMD -0.18, 95%  CI -0.40 to 0.03, no effect; I(2) = 46%, moderate heterogeneity) or improving  immediate pain regulation (SMD -0.09, 95% CI -0.40 to 0.21, no effect; I(2) =  74%, substantial heterogeneity), based on low- to moderate-certainty evidence. Of  these five interventions most studied, only two studies observed adverse events,  specifically vomiting (one preterm neonate) and desaturation (one full-term  neonate hospitalised in the NICU) following the non-nutritive sucking  intervention. The presence of considerable heterogeneity limited our confidence  in the findings for certain analyses, as did the preponderance of evidence of  very low to low certainty based on GRADE judgements. AUTHORS' CONCLUSIONS:  Overall, non-nutritive sucking, facilitated tucking, and swaddling may reduce  pain behaviours in preterm born neonates. Non-nutritive sucking may also reduce  pain behaviours in full-term neonates. No interventions based on a substantial  body of evidence showed promise in reducing pain behaviours in older infants.  Most analyses were based on very low- or low-certainty grades of evidence and  none were based on high-certainty evidence. Therefore, the lack of confidence in  the evidence would require further research before we could draw a definitive  conclusion."}, {"id": 78, "title": "Evidence-Based Guidelines for Prehospital Pain Management: Literature and Methods.", "authors": "Powell, Jonathan R.; Browne, Lorin R.; Guild, Kyle et al.", "journal": "Prehospital emergency care", "year": "2023", "vol": "27(2):154-161", "doi": "10.1080/10903127.2021.2018074", "abstract": "INTRODUCTION: Emergency Medical Services (EMS) clinicians commonly encounter patients with acute pain. A new set of evidence-based guidelines (EBG) was  developed to assist in the prehospital management of pain. Our objective was to  describe the methods used to develop these evidence-based guidelines for  prehospital pain management. METHODS: The EBG development process was supported  by a previous systematic review conducted by the Agency for Healthcare Research  and Quality (AHRQ) covering nine different population, intervention, comparison,  and outcome (PICO) questions. A technical expert panel (TEP) was formed and added  an additional pediatric-specific PICO question. Identified evidence was evaluated  using the Grading of Recommendations, Assessment, Development, and Evaluation  (GRADE) framework and tabulated into Summary of Findings tables. The TEP then  utilized a rigorous systematic method, including the PanelVoice function, for  recommendation development which was applied to generate Evidence to Decision  Tables (EtD). This process involved review of the Summary of Findings tables,  asynchronous member judging, and facilitated panel discussion to generate final  consensus-based recommendations. RESULTS: The work product described above was  completed by the TEP panel from September 2020 to April 2021. For these  recommendations, the overall certainty of evidence was very low or low, data for  decisions on cost effectiveness and equity were lacking, and feasibility was  rated well across all categories. Based on the evidence, one strong and seven  conditional recommendations were made, with two PICO questions lacking sufficient  evidence to generate a recommendation. CONCLUSION: We describe a protocol that  leveraged established EBG development techniques, the GRADE framework in  conjunction with a previous AHRQ systematic review to develop treatment  recommendations for prehospital pain management. This process allowed for  mitigation of many confounders due to the use of virtual and electronic  communication. Our approach may inform future guideline development and increase  transparency in the prehospital recommendations development processes."}, {"id": 79, "title": "Massage therapy for children, adolescents, and young adults: Clinical delivery and effectiveness in hematology and oncology.", "authors": "Rodgers-Melnick, Samuel N.; Bartolovich, Mandy; Desai, Neha J. et al.", "journal": "Pediatric blood & cancer", "year": "2023", "vol": "70(4):e30243", "doi": "10.1002/pbc.30243", "abstract": "BACKGROUND: Children, adolescents, and young adults with hematologic and/or oncologic conditions experience multiple, significant symptoms (e.g., pain,  stress, and anxiety), which may be addressed by nonpharmacologic approaches such  as massage therapy (MT). The purpose of this study was to describe the clinical  delivery of MT provided by a certified pediatric massage therapist and assess  effectiveness in two patient groups: those with sickle cell disease (SCD) or  hematologic and/or oncologic conditions excluding SCD (HemOnc). METHODS:  Investigators conducted a retrospective review of MT sessions provided to  patients 0-39 years with hematologic and/or oncologic conditions at a large  pediatric academic medical center. RESULTS: Between October 2019 and December  2021, 3015 MT sessions were provided to 243 patients (171 HemOnc; 72 SCD) and  documented in the electronic health record. Patients (mean age:  12.21 ± 7.19 years) were generally White (49.4%) or Black/African American  (43.2%), non-Hispanic (94.2%), and 52.3% female. Patients in the SCD group (vs.  patients in the HemOnc group) reported significantly higher (p < .05)  pretreatment pain (6.95 vs. 4.46), stress (6.47 vs. 4.58), and anxiety (6.67 vs.  4.59). All patients reported clinically and statistically significant (p < .001)  mean reductions in pain (-2.25 ± 1.87), stress (-2.50 ± 1.73), and anxiety  (-2.52 ± 1.69), with patients in the HemOnc group reporting greater mean pain  change (-2.54 vs. -1.87) than patients in the SCD group. CONCLUSIONS: This study  supports the clinical effectiveness of MT for addressing acute pain, stress, and  anxiety among youth with hematologic and/or oncologic conditions. Future research  is needed to identify optimal MT utilization."}, {"id": 80, "title": "Venopunción frente a la incisión en el talón para el cribado de enfermedades endocrino-metabólicas en el recién nacido", "authors": "Rubiño Díaz, Jose Ángel; Personat Labrador, Celia; Andreu Rodrigo, Pilar et al.", "journal": "", "year": "2023", "vol": "19:e14623", "doi": "", "abstract": ""}, {"id": 81, "title": "From theory to practice: the inclusion of hospitalized children's families in painful procedures", "authors": "Souza, Danton Matheus de; Fernandes, Rafaela de Fátima; Costa, Cibelle Tiphane de Sousa et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2023", "vol": "57:e20230152-e20230152", "doi": "10.1590/1980-220x-reeusp-2023-0152en", "abstract": "ABSTRACT  Objective: To understand nursing team professionals' strategies to include the family in painful procedures performed on hospitalized children.  Method: An exploratory-descriptive, qualitative study, carried out with nursing professionals. Data were collected through semi-structured interviews, guided by a script of topics, transcribed and submitted to thematic content analysis, in the light of Symbolic Interactionism, discussed considering the Family-Centered Care philosophy assumptions.  Results: Two central categories emerged, \"Theoretical perspective: the family as a care agent in painful procedures\" and \"Practical perspective: experiences, challenges and strategies in painful procedures for family inclusion\", with their respective subcategories.  Conclusion: Nursing professionals have theoretical knowledge about family inclusion in painful procedures based on the assumptions: Family-Centered Care: dignity and respect; information sharing; joint participation; and family collaboration. However, knowledge is not applied in clinical practice; consequence of the interaction between beliefs and attitudes unfavorable to family presence."}, {"id": 82, "title": "Low-dose intranasal dexmedetomidine premedication improves epidural labor analgesia onset and reduces procedural pain on epidural puncture: a prospective  randomized double-blind clinical study.", "authors": "Sun, Hao; Ma, Xiang; Wang, Shengyou et al.", "journal": "BMC anesthesiology", "year": "2023", "vol": "23(1):185", "doi": "10.1186/s12871-023-02146-5", "abstract": "BACKGROUND: Epidural labor analgesia is a safe and effective method of pain management during labor with the drawbacks of delayed onset and maternal distress  during epidural puncture. This study aimed to determine whether pretreatment with  intranasal low-dose dexmedetomidine effectively shortens the onset of analgesia  and reduces procedural pain. METHODS: In this prospective, randomized  double-blind trial, nulliparous patients were randomly assigned to either the  intranasal dexmedetomidine group or the control group. The intranasal  dexmedetomidine group received 0.5 μg/kg dexmedetomidine intranasally, and the  control group received an equal volume of normal saline intranasally. Both groups  were maintained with a programmed intermittent epidural bolus. The primary  outcome was the onset time of analgesia and scores of pain related to the  epidural puncture. RESULTS: Seventy-nine patients were enrolled, and 60 completed  the study and were included in the analysis. The time to achieve adequate  analgesia was significantly shorter in the intranasal dexmedetomidine group than  in the control group (hazard ratio = 2.069; 95% CI, 2.187 to 3.606; P = 0.010).  The visual analogue scale pain scores during epidural puncture in the intranasal  dexmedetomidine group were also significantly lower than those in the control  group (2.0 (1.8-2.5) vs. 3.5 (3.3-4.5), P ≤ 0.001, Table 2). Pretreatment with  intranasal dexmedetomidine before epidural labor analgesia was associated with  improved visual analogue scale pain scores and Ramsay scores, less consumption of  analgesics and higher maternal satisfaction (P < 0.05). No differences were  observed for labor and neonatal outcomes or the incidence of adverse effects  between the two groups. CONCLUSIONS: Pretreatment with intranasal dexmedetomidine  before epidural labor analgesia yielded a faster onset of analgesia and decreased  epidural puncture pain without increasing adverse effects. Pretreatment with  intranasal dexmedetomidine may be a useful adjunct for the initiation of epidural  analgesia, and further investigation should be encouraged to determine its  utility more fully. TRIAL REGISTRATION: This trial was prospectively registered  at Chictr.org.cn on 29/05/2020 with the registration number ChiCTR2000033356 (  http://www.chictr.org.cn/listbycreater.aspx )."}, {"id": 83, "title": "Parental Participation in Their Infants' Procedural Pain Alleviation with Nonpharmacologic Methods in Estonia.", "authors": "Treiman-Kiveste, Airin; Kangasniemi, Mari; Kalda, Ruth et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2023", "vol": "24(6):641-649", "doi": "10.1016/j.pmn.2023.02.008", "abstract": "BACKGROUND: Aim: To describe parent's participation in their infants' procedural pain alleviation using nonpharmacologic methods in neonatal and neonatal  intensive care units. METHOD: A descriptive cross-sectional survey study was  carried out in four Estonian hospitals between 2019 and 2020. Data were collected  by using a validated questionnaire comprised of three sections: (1) background  information of parents and infants; (2) nonpharmacologic methods used by parents;  and (3) parental guidance by nurses on the methods. Altogether 280 questionnaires  were distributed to parents and 232 of them were received back. Finally, 189 of  them were included in the study (response rate 67.5%). The data were analyzed  using descriptive and analytical statistics. Analysis of open-ended questions  followed principles of inductive content analysis. RESULTS: Most participants  reported using nonpharmacologic methods, such as holding and placing the infant  in a more comfortable position, nearly always/always (61%, 62%, respectively).  However, rarely used methods included skin-to-skin contact (7%), breastfeeding  the infant (7%), and listening to recorded music (3%). While studying a  correlation between the parents' use of nonpharmacologic methods and their  guidance, we found a correlation among all nonpharmacologic methods. However,  almost half (48%) of the parents reported that the nurses advised them  \"sometimes\" or \"nearly always/ always\" to go elsewhere during painful procedures  rather than participating in alleviation of the infant´s pain. CONCLUSIONS: The  parents reported using mostly the nonpharmacologic methods that were easy to  implement and did not require thorough instructions in preparation. In addition,  it seemed that parents wanted to be more involved in their infant's pain  alleviation, but they were advised not to take part in painful procedures and  pain alleviation for various reasons. Therefore, more attention should be paid to  the principles of family-centered care. As health care providers, we should  welcome all families as team members to involve in their infants' pain  alleviation in the neonatal and neonatal intensive care units."}, {"id": 84, "title": "Effects of Kangaroo Mother Care on Repeated Procedural Pain and Cerebral Oxygenation in Preterm Infants.", "authors": "Wang, Yu; Zhang, Linping; Dong, Wenbin et al.", "journal": "American journal of perinatology", "year": "2023", "vol": "40(8):867-873", "doi": "10.1055/s-0041-1731650", "abstract": "OBJECTIVE: The study aimed to investigate the effects of kangaroo mother care (KMC) on repeated procedural pain and cerebral oxygenation in preterm infants.  STUDY DESIGN: Preterm infants of 31 to 33 weeks of gestational age were randomly  divided into an intervention group (n = 36) and a control group (n = 37).  Premature infant pain profile (PIPP) scores, heart rate, oxygen saturation,  regional cerebral tissue oxygenation saturation (rcSO(2)), and cerebral  fractional tissue oxygen extraction (cFTOE) were evaluated during repeated heel  stick procedures. Each heel stick procedure included three phases: baseline,  blood collection, and recovery. KMC was given to the intervention group  30 minutes before baseline until the end of the recovery phase. RESULTS: Compared  with the control group, the intervention group showed lower PIPP scores and heart  rates, higher oxygen saturation, and rcSO(2) from the blood collection to  recovery phases during repeated heel sticks. Moreover, there were significant  changes in cFTOE for the control group, but not the intervention group associated  with repeated heel stick procedures. CONCLUSION: The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants, and it is  conducive to stabilizing cerebral oxygenation, which may protect the development  of brain function. KEY POINTS: · KMC stabilizes cerebral oxygenation during  repeated heel sticks in preterm infants.. · The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants.. · KMC may protect  the development of brain function.."}, {"id": 85, "title": "Hydrogel dressings for donor sites of split‐thickness skin grafts", "authors": "Younis, AS; Abdelmonem, IM; Gadullah, M et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2023", "vol": "8", "doi": "10.1002/14651858.CD013570.pub2", "abstract": "Abstract - Background Donor site wounds of split‐thickness skin grafts can be a major cause of morbidity. Choosing the appropriate dressing for these wounds is crucial to successful healing. Various types of dressing are available, including hydrogel dressings. A review of current evidence is required to guide clinical decision‐making on the choice of dressing for the treatment of donor sites of split‐thickness skin grafts. Objectives To assess the effects of hydrogel dressings on donor site wounds following split‐thickness skin grafts for wound healing. Search methods In July 2022 we searched the Cochrane Wounds Specialised Register, CENTRAL, MEDLINE, Embase, and CINAHL EBSCO Plus. We also searched clinical trials registries for ongoing and unpublished studies, and scanned reference lists of relevant included studies as well as reviews, meta‐analyses, and health technology reports to identify additional studies. There were no restrictions with respect to language, date of publication, or study setting. Selection criteria Randomised controlled trials (RCTs) comparing hydrogel dressings with other types of dressing, topical treatments or no dressing, or with different types of hydrogel dressings in managing donor site wounds irrespective of language and publication status. Data collection and analysis Two review authors independently carried out data extraction, risk of bias assessment using the Cochrane risk of bias tool, RoB 1, and quality assessment according to GRADE methodology. Main results We included two studies (162 participants) in this review. One study with three arms and 101 participants (15 months' duration) was conducted in a children's hospital, and compared hydrogel dressings in the form of Sorbact with Algisite, an alginate dressing and Cuticerin, a smooth acetate gauze impregnated with water‐repellent ointment. Another study with two arms and 61 participants (19 months' duration) was conducted in three surgery departments and compared an octenidine‐containing hydrogel dressing with an identical non‐antimicrobial hydrogel dressing. We identified no studies that compared hydrogel dressings with another therapy such as a topical agent (a topical agent is a cream, an ointment or a solution that is applied directly to the wound), or no dressing, or a combination of hydrogel dressings and another therapy versus another therapy alone. Both studies were at high risk of attrition bias and the second study was also at unclear risk of selection bias. Amorphous hydrogel dressings versus other types of dressings Amorphous hydrogel dressings may increase time to wound healing when compared with alginate (mean difference (MD) 1.67 days, 95% confidence interval (CI) 0.56 to 2.78; 1 study, 69 participants; low‐certainty evidence) or Cuticerin dressings (MD 1.67 days, 95% CI 0.55 to 2.79; 1 study, 68 participants; low‐certainty evidence). The effect of amorphous hydrogel dressings compared with other types of dressings is uncertain for pain at the donor site and wound complications, including scarring and itching (very low‐certainty evidence). No adverse events were reported in any of the groups. The study did not report health‐related quality of life or wound infection. Octenidine‐based hydrogel dressing versus octenidine‐free hydrogel dressing The effect of octenidine‐based hydrogel dressings versus octenidine‐free hydrogel dressings is uncertain for time to wound healing (MD 0.40, 95% CI 0.28 to 0.52; 1 study, 41 participants) and wound infection, as the certainty of the evidence is very low. The certainty of the evidence is also very low for adverse events, with two participants in the intervention group and one participant in the comparison group reporting adverse events (risk ratio (RR) 0.58, 95% CI 0.06 to 5.89; 1 study, 41 participants). The study did not report donor site pain, health‐related quality of life, or wound complications. Authors' conclusions There is insufficient evidence to determine the effect of hydrogel dressings on donor site wounds of split thickness skin grafts compared with other types of dressings. There is a need for adequately powered and well‐designed RCTs, with adequate sample sizes, types of populations and subgroups, types of interventions, and outcomes, that compare hydrogel dressings with other treatment options in the treatment of donor site wounds of split‐thickness skin grafts. Plain language summary How effective are hydrogel dressings for helping donor site wounds to heal after split‐thickness skin grafts? Key messages ‐ We do not know if hydrogel dressings (designed to keep wounds moist) are better than other dressings for helping donor site wounds to heal after split‐thickness skin grafts (skin taken from another part of the body). ‐ We did not find any studies comparing hydrogel dressings with creams, ointments, or other solutions applied directly to the wound. ‐ More and better designed studies are needed to answer this question. What are donor site wounds and split‐thickness skin grafts? Donor site wounds result from removing part of the skin from a healthy, unaffected region and transferring it to help heal areas with damaged or lost skin. These wounds are a result of a standard surgical procedure called skin grafting. A partial or split‐thickness skin graft is a thin layer of skin shaved from an area such as the thigh and buttocks, that usually heals well in about two weeks. Which dressings are used on donor site wounds? Dressings to cover donor site wounds vary considerably regarding how they work, their cost, and ease of application. Hydrogel dressings are made of natural or synthetic materials that allow oxygen and nutrients to pass through them. They provide a moist environment for healing, which may prevent the dressing from sticking to the wound, causing further damage. They do not need to be changed as frequently as other dressings and are often used on wounds that are slow to heal or that require a lot of moisture to promote healing, such as burns. There are many other types of dressings including paraffin gauze, absorbent dressings, hydrocolloid, and antimicrobial impregnated dressings. What did we want to find out? We wanted to find out if hydrogel dressings effectively help heal donor site wounds after partial skin grafts. We were particularly interested in investigating the effects of different types of dressings on donor site wounds of split thickness skin grafts. What did we do? We searched for studies that compared hydrogel dressings with other treatments for healing donor site wounds after partial skin grafts. We analysed the results and rated our confidence in the combined evidence based on the size and quality of the included studies. What did we find? We found two studies with 162 participants. ‐ One study with 101 participants was conducted at a children’s burns unit and compared a hydrogel dressing (gauze mesh coated with hydrogel) with an alginate (algae‐ or seaweed‐based) dressing or Cuticerin (a smooth acetate gauze impregnated with water‐repellent ointment). ‐ The second study, with 61 participants, took place in three surgery departments and compared a hydrogel dressing that contained an antiseptic (octenidine ‐ to reduce the chance of infection) with a dressing with no octenidine. We did not find any studies that compared hydrogel dressings with treatments directly applied to the wound (like creams or ointments). People in the studies were chosen randomly to receive treatment with hydrogel dressings or another dressing. Main results Hydrogel dressings versus other types of dressings Hydrogel dressings may increase time to wound healing by about 1.7 days compared with alginate (1 study, 69 participants) or Cuticerin dressings (1 study 68 participants). We are not sure about the results for hydrogel dressings compared with other dressings for pain at the donor site and wound complications, including scarring and itching. The study did not report health‐related quality of life or wound infection and did not report any unwanted effects of the dressings. Octenidine‐based hydrogel dressing versus octenidine‐free hydrogel dressing We are unsure of the effect of octenidine‐based hydrogel dressings versus octenidine‐free hydrogel dressings for time to wound healing, wound infection and unwanted effects. The study did not report donor site pain, health‐related quality of life, or wound complications. Limitations of the evidence Our confidence in the evidence is limited because there are not enough studies to be certain about the results of our outcomes. The studies were of poor quality and did not provide data about everything that we were interested in. How up‐to‐date is this evidence? The evidence is up‐to‐date to 20 July 2022."}, {"id": 86, "title": "Paracetamol (acetaminophen) or non‐steroidal anti‐inflammatory drugs, alone or combined, for pain relief in acute otitis media in children", "authors": "de Sévaux, JL.H.; Damoiseaux, RAMJ; van de Pol, AC et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2023", "vol": "8", "doi": "10.1002/14651858.CD011534.pub3", "abstract": "Abstract - Background Acute otitis media (AOM) is one of the most common childhood infectious diseases. Pain is the key symptom of AOM and central to children's and parents' experience of the illness. Because antibiotics provide only marginal benefits, analgesic treatment including paracetamol (acetaminophen) and non‐steroidal anti‐inflammatory drugs (NSAIDs) is regarded as the cornerstone of AOM management. This is an update of a review first published in 2016. Objectives Our primary objective was to assess the effectiveness of paracetamol (acetaminophen) or NSAIDs, alone or combined, compared with placebo or no treatment in relieving pain in children with AOM. Our secondary objective was to assess the effectiveness of NSAIDs as compared with paracetamol in children with AOM. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), Issue 5, April 2023; MEDLINE (Ovid, from 1946 to May 2023), Embase (from 1947 to May 2023), CINAHL (from 1981 to May 2023), LILACS (from 1982 to May 2023), and Web of Science Core Collection (from 1955 to May 2023). We searched the WHO ICTRP and ClinicalTrials.gov for completed and ongoing trials (23 May 2023). Selection criteria We included randomised controlled trials comparing the effectiveness of paracetamol or NSAIDs, alone or combined, for pain relief in non‐hospitalised children aged six months to 16 years with AOM. We also included trials of paracetamol or NSAIDs, alone or combined, for children with fever or upper respiratory tract infections if we were able to extract subgroup data on pain relief in children with AOM either directly or after obtaining additional data from study authors. We extracted and summarised data for the following comparisons: paracetamol versus placebo, NSAIDs versus placebo, NSAIDs versus paracetamol, and NSAIDs plus paracetamol versus paracetamol alone. Data collection and analysis We used standard methodological procedures expected by Cochrane. We rated the overall certainty of evidence for each outcome of interest using the GRADE approach. Main results We included four trials (411 children) which were assessed at low to high risk of bias. Paracetamol versus placebo Data from one trial (148 children) informed this comparison. Paracetamol may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 10% versus 25%, risk ratio (RR) 0.38, 95% confidence interval (CI) 0.17 to 0.85; number needed to treat for an additional beneficial outcome (NNTB) 7; low‐certainty evidence). The evidence is very uncertain about the effects of paracetamol on fever at 48 hours (RR 1.03, 95% CI 0.07 to 16.12; very low‐certainty evidence) and adverse events (RR 1.03, 95% CI 0.21 to 4.93; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus placebo Data from one trial (146 children) informed this comparison. Ibuprofen may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 7% versus 25%, RR 0.28, 95% CI 0.11 to 0.70; NNTB 6; low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen on fever at 48 hours (RR 1.06, 95% CI 0.07 to 16.57; very low‐certainty evidence) and adverse events (RR 1.76, 95% CI 0.44 to 7.10; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus paracetamol Data from four trials (411 children) informed this comparison. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving ear pain at 24 hours (RR 0.83, 95% CI 0.59 to 1.18; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 0.91, 95% CI 0.54 to 1.54; 3 RCTs, 183 children; low‐certainty evidence); and four to seven days (RR 0.74, 95% CI 0.17 to 3.23; 2 RCTs, 38 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on mean pain score at 24 hours (0.29 lower, 95% CI 0.79 lower to 0.20 higher; 3 RCTs, 111 children; very low‐certainty evidence); 48 to 72 hours (0.25 lower, 95% CI 0.66 lower to 0.16 higher; 3 RCTs, 108 children; very low‐certainty evidence); and four to seven days (0.30 higher, 95% CI 1.78 lower to 2.38 higher; 2 RCTs, 31 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol in resolving fever at 24 hours (RR 0.69, 95% CI 0.24 to 2.00; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 1.18, 95% CI 0.31 to 4.44; 3 RCTs, 182 children; low‐certainty evidence); and four to seven days (RR 2.75, 95% CI 0.12 to 60.70; 2 RCTs, 39 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on adverse events (RR 1.71, 95% CI 0.43 to 6.90; 3 RCTs, 281 children; very low‐certainty evidence); reconsultations (RR 1.13, 95% CI 0.92 to 1.40; 1 RCT, 53 children; very low‐certainty evidence); and delayed antibiotic prescriptions (RR 1.32, 95% CI 0.74 to 2.35; 1 RCT, 53 children; very low‐certainty evidence). No data were available on time to resolution of pain. NSAIDs plus paracetamol versus paracetamol alone Data on the effectiveness of ibuprofen plus paracetamol versus paracetamol alone came from two trials that provided crude subgroup data for 71 children with AOM. The small sample provided imprecise effect estimates, therefore we were unable to draw any firm conclusions (very low‐certainty evidence). Authors' conclusions Despite explicit guideline recommendations on the use of analgesics in children with AOM, the current evidence on the effectiveness of paracetamol or NSAIDs, alone or combined, in children with AOM is limited. Paracetamol and ibuprofen as monotherapies may be more effective than placebo in relieving short‐term ear pain in children with AOM. The evidence is very uncertain for the effect of ibuprofen versus paracetamol on relieving short‐term ear pain in children with AOM, as well as for the effectiveness of ibuprofen plus paracetamol versus paracetamol alone, thereby preventing any firm conclusions. Further research is needed to provide insights into the role of ibuprofen as adjunct to paracetamol, and other analgesics such as anaesthetic eardrops, for children with AOM. Plain language summary Drugs to relieve pain for children with acute middle ear infection Key messages ‐ The current evidence on the effectiveness of painkillers, alone or together, in relieving ear pain in children with acute middle ear infection (acute otitis media (AOM)) is limited. ‐ Both paracetamol (acetaminophen) and ibuprofen as standalone treatments may be more effective than placebo in relieving short‐term ear pain in children with AOM. We are uncertain if there is a difference in effect between ibuprofen and paracetamol and between ibuprofen plus paracetamol and paracetamol alone, thereby preventing any firm conclusions. ‐ Further research is needed into the role of ibuprofen as an add‐on treatment to paracetamol, as well as on other pain relievers such as analgesic eardrops, for children with AOM. What is AOM? AOM, or acute middle ear infection, is one of the most common childhood infections and is usually preceded by a viral upper respiratory tract infection. Ear pain is the key symptom and central to children's and parents' experience of the illness. What did we want to find out? We wanted to find out if painkillers are effective for relieving ear pain in children with AOM and which drugs, alone or together, provide the most effective pain relief. What did we do? We searched for studies that looked at the effectiveness of paracetamol (acetaminophen) or non‐steroidal anti‐inflammatory drugs (NSAIDs such as ibuprofen), alone or combined, compared with placebo (dummy treatment) or no treatment in relieving pain in non‐hospitalised children aged six months to 16 years with AOM. We also wanted to evaluate the effectiveness of NSAIDs as compared with paracetamol in these children. We compared and summarised the results of these studies, and rated our confidence in the evidence based on factors such as study methods and effect sizes. What did we find? Very limited information was available to assess how useful painkillers are for relieving ear pain in children with AOM. One trial compared paracetamol versus placebo (148 children) and NSAIDs versus placebo (146 children). We found that when used alone, paracetamol and ibuprofen may be more effective than placebo in relieving ear pain at 48 hours (25% of children receiving placebo had pain at 48 hours versus 10% in the paracetamol and 7% in the ibuprofen group). Four trials (411 children) compared ibuprofen versus paracetamol in children with AOM. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving short‐term ear pain in children with AOM. The evidence is very uncertain about the effects of paracetamol and ibuprofen on adverse events. The very limited number of participants prevented us from drawing any firm conclusions on the effects of ibuprofen plus paracetamol versus paracetamol alone. What are the limitations of the evidence? Due to such issues as study limitations and questions about the applicability of the evidence, we have low confidence in the evidence for all comparisons. How up‐to‐date is this evidence? The evidence in this review is current to 23 May 2023."}, {"id": 87, "title": "Use of virtual reality in managing paediatric procedural pain and anxiety: An integrative literature review.", "authors": "Addab, Sofia; Hamdy, Reggie; Thorstad, Kelly et al.", "journal": "Journal of clinical nursing", "year": "2022", "vol": "31(21-22):3032-3059", "doi": "10.1111/jocn.16217", "abstract": "AIMS: This integrative review aimed to identify, analyse and synthesise studies investigating the clinical efficacy of virtual reality (VR) distraction for  children undergoing varying painful and anxiety-inducing medical procedures  across different hospital settings and to identify implications for research and  clinical practice. BACKGROUND: Virtual reality has been leveraged as a  distraction tool in the healthcare setting to help patients manage procedural  pain and anxiety. Initial studies in the burn wound care setting using VR as a  non-pharmacological analgesia led to the use of VR during other medical  procedures. DESIGN: An integrative review of the literature was conducted  following the PRISMA guidelines across four electronic databases. Published  studies between 2000 and 2020 investigating the clinical efficacy of VR in  managing paediatric procedural pain or anxiety were included for review. RESULTS:  Reviewed studies collectively included 2,174 patients aged 6 months-18 years used  VR during burn wound care, post-burn physiotherapy, dental, needle-related and  other procedures. Additionally, ten studies included samples with adults, for  which paediatric data could not be isolated (n = 507). Overall, studies supported  the efficacy of VR in managing procedural pain and anxiety in the paediatric  setting. CONCLUSION: Virtual reality is redefining pain management by immersing  children in a virtual world, reducing pain and anxiety at the hospital. A notable  gap was the neglected use of VR in children with chronic conditions receiving  orthopaedic procedures as part of their standard care. RELEVANCE TO CLINICAL  PRACTICE: Ultimately, VR distraction will reduce the fear associated with medical  interventions, preventing increased pain sensitivity, exacerbated anxiety and  healthcare avoidance in adulthood. Nurses will play an important role in ensuring  the smooth integration of VR in clinical practice by championing the technology  and transferring evidence-based methods for VR use."}, {"id": 88, "title": "The State of Science in the Use of Virtual Reality in the Treatment of Acute and Chronic Pain: A Systematic Scoping Review.", "authors": "Baker, Nancy A.; Polhemus, Augusta Hixon; Haan Ospina, Emma et al.", "journal": "The Clinical journal of pain", "year": "2022", "vol": "38(6):424-441", "doi": "10.1097/AJP.0000000000001029", "abstract": "Previous reviews have reported virtual reality (VR) to be an effective method to treat pain. This scoping review examines the state of the science for VR and pain  both generally and by pain type (acute and chronic) related to types of  mechanisms, dosage, effectiveness, and adverse events (AEs). We searched online  databases PubMed, Web of Science, PsychInfo, and CINAHL from 2010 to 2020 and  included studies from peer reviewed journals that examined people with pain,  (excluding pain-free participants) with a primary outcome measuring pain. We  assessed studies for risk of bias using PEDro criteria. We described data through  counts and percentages. Significant results were determined through P-values. We  found 70 studies representing 4105 people; 46 acute pain studies (65.7%), 22  chronic pain studies (31.4%), and 2 (2.9%) \"both.\" The most common VR mechanism  was distraction (78.6%) then embodiment (17.1%). However, distraction was the  mechanism for 97.8% acute pain studies while embodiment was more common for  chronic pain (54.5%). Dosage of VR was inconsistently reported and varied  considerably. VR treatment groups showed significant improvements in pain,  particularly for intensity of pain (72.1%) and quality of pain (75.0%). Few  studies examined AEs. Limitations of this review include only examining last 10  years of articles and that many studies were missing data. VR appears to be an  effective intervention to address both acute and chronic pain. Research  evaluating VR mechanisms, dosage, and AEs is warranted, as is further work in  under-served populations (children for chronic pain and older adults) as the  current evidence is largely limited to adult populations with pain."}, {"id": 89, "title": "Take-Pause: Efficacy of mindfulness-based virtual reality as an intervention in the pediatric emergency department.", "authors": "Butt, Mahlaqa; Kabariti, Sarah; Likourezos, Antonios et al.", "journal": "Academic emergency medicine : official journal of the Society for Academic Emergency Medicine", "year": "2022", "vol": "29(3):270-277", "doi": "10.1111/acem.14412", "abstract": "BACKGROUND: Emergency department (ED) visits are known to be anxiety-ridden and stress-provoking experiences especially in the pediatric population. Distraction  techniques have been used as a means to reduce anxiety and stress thereby  facilitating care in the ED and making the visit less unpleasant. Our study aimed  to evaluate the effectiveness of an active and immersive distraction technique,  using a mindfulness-based virtual reality (VR) program (Take-Pause), to alleviate  anxiety in pediatric ED patients. METHODS: A prospective, randomized,  single-blinded study, evaluating ED patients aged 13-17 years with a chief  complaint of acute pain was conducted. Patients were randomized either to the  active distraction intervention (VR group), utilizing the VR headset for 5 min,  or to the passive distraction intervention (iPad group), playing on an iPad for  5 min. The primary outcome was a difference in the change in anxiety scores on  the Spielberger State-Trait Anxiety Inventory between the two groups. Secondary  outcomes included a difference in pain scores, respiratory rate, and heart rate  between the groups. RESULTS: A total of 110 subjects were enrolled. At 15 min,  the mean anxiety score for the VR group improved by 10 points versus 6 points in  the iPad group (p < 0.001; 95% confidence interval = 0.44 to 7.6). There was no  statistical significance in the reduction of pain scores (p = 0.953) and  respiratory rates (p = 0.776) between the groups. Patients enrolled in both  groups did not experience any adverse effects. CONCLUSION: Take-Pause, offering  an active and immersive distraction technique, is more effective than a passive  distraction approach to lower anxiety levels in adolescent ED patients."}, {"id": 90, "title": "Adolescents' pain and distress during peripheral intravenous cannulation in a paediatric emergency setting.", "authors": "Cozzi, Giorgio; Cognigni, Marta; Busatto, Riccardo et al.", "journal": "European journal of pediatrics", "year": "2022", "vol": "181(1):125-131", "doi": "10.1007/s00431-021-04169-x", "abstract": "The objective of the study is to investigate pain and distress experienced by a group of adolescents and children during peripheral intravenous cannulation in a  paediatric emergency department. This cross-sectional study was performed between  November 2019 and June 2020 at the paediatric emergency department of the  Institute for Maternal and Child Health of Trieste, Italy. Eligible subjects were  patients between 4 and 17 years old undergoing intravenous cannulation, split  into three groups based on their age: adolescents (13-17 years), older children  (8-12 years), and younger children (4-7 years). Procedural distress and pain  scores were recorded through validated scales. Data on the use of topical  anaesthesia, distraction techniques, and physical or verbal comfort during  procedures were also collected. We recruited 136 patients: 63 adolescents, 48  older children, and 25 younger children. There was no statistically significant  difference in the median self-reported procedural pain found in adolescents (4;  IQR = 2-6) versus older and younger children (5; IQR = 2-8 and 6; IQR = 2-8,  respectively). Furthermore, no significant difference was observed in the rate of  distress between adolescents (79.4%), older (89.6%), and younger (92.0%)  children. Adolescents received significantly fewer pain relief  techniques.Conclusion: This study shows that adolescents experience similar pain  and pre-procedural distress as younger children during peripheral intravenous  cannulation. What is Known: • Topical and local anaesthesia, physical and verbal  comfort, and distraction are useful interventions for pain and anxiety  management during intravenous cannulation in paediatric settings. • No data is  available on pain and distress experienced by adolescents in the specific setting  of the emergency department. What is New: • Adolescents experienced high levels  of pre-procedural distress in most cases and similar levels of pain and distress  when compared to younger patients • The number of pain relief techniques employed  during procedures was inversely proportional to patient's age, topical or local  anaesthesia were rarely used."}, {"id": 91, "title": "Nursing theories developed to meet children's needs: a scoping review", "authors": "Dantas, Ana Márcia Nóbrega; Santos-Rodrigues, Renata Clemente dos; Silva Júnior, José Nildo de Barros et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2022", "vol": "56:e20220151-e20220151", "doi": "10.1590/1980-220x-reeusp-2022-0151en", "abstract": "ABSTRACT  Objective: To map the nursing theories developed to meet children's needs.  Method: The JBI methodology and the PRISMA guided this scoping review. The search took place between October and November 2021, based on the PCC mnemonic: P (Population) - a child aged 0 to 9 years; C (Concept) - nursing theories; C (Context) - nursing.  Results: We identified 2,242 publications and selected 21 manuscripts consisting of nursing theories to meet children's feeding needs, child pain, a child with asthma, diabetes, obesity, epilepsy, Congenital Zika Syndrome, autism spectrum disorder; theory for care in Intensive Care Units; health promotion to premature babies; procedures in Intensive Care Units; theory for nursing diagnosis ineffective breathing pattern in children with congenital heart disease; sleep associated with child development; parent-child interaction; nurse-child relationship; and child's consultation.  Conclusion: The nursing theories mapped have the potential to outline the course of nursing care to children's needs highlighted in the studies that made up the sample."}, {"id": 92, "title": "Effectiveness of clown intervention for pain relief in children: A systematic review and meta-analysis.", "authors": "Ding, Yiwen; Yin, Huiru; Wang, Shuo et al.", "journal": "Journal of clinical nursing", "year": "2022", "vol": "31(21-22):3000-3010", "doi": "10.1111/jocn.16195", "abstract": "BACKGROUND: Pain is common in children receiving medical procedures, and there is a lack of adequate awareness and management. In addition, children who undergo  medical procedures involving pain may also experience stress, crying and  prolonged hospitalisation. Clown intervention is a promising nonpharmacological  intervention. However, studies on the effectiveness of clown intervention in pain  management have reported conflicting findings. OBJECTIVE: To evaluate the  effectiveness of clown intervention in relieving pain in children, as well as its  effects on cortisol levels, crying duration and length of hospital stay. DESIGN:  Systematic review and meta-analysis of randomised controlled studies. DATA  SOURCES: PubMed, Web of Science (SCI), Embase, PsycINFO, the Cochrane Library,  Chinese National Knowledge Infrastructure (CNKI), Weipu (VIP), Wanfang Data and  SinoMed were systematically searched from inception date to December 31, 2020.  REVIEW METHODS: Two reviewers independently used the Cochrane risk of bias tool  to assess the risk of bias of the included studies. Meta-analysis was conducted  when data were available, otherwise, a narrative description was provided. Data  were analysed using Review Manager 5.3. The review process is reported according  to PRISMA. RESULTS: Nine studies including 852 children met the inclusion  criteria. The results showed that compared with standard care, clown intervention  was beneficial for relieving pain. Further subgroup analysis showed that it was  more effective with children aged 2-7 years. The duration of crying after the  procedure and the length of stay were shortened, but there was no significant  difference in cortisol levels. CONCLUSION: Clown intervention may be a promising  way to relieve acute pain in children, especially those aged 2-7 years. It also  seems to shorten the duration of crying and the length of hospital stays, but the  effect on cortisol levels is still uncertain. More high-quality randomised  controlled trials are needed to confirm these results and take into account  different age groups, cultural backgrounds and specific populations."}, {"id": 93, "title": "Water for wound cleansing", "authors": "Fernandez, R; Green, HL; Griffiths, R et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2022", "vol": "9", "doi": "10.1002/14651858.CD003861.pub4", "abstract": "Abstract - Background Although various solutions have been recommended for cleansing wounds, normal saline is favoured as it is an isotonic solution and is not thought to interfere with the normal healing process. Tap water is commonly used in community settings for cleansing wounds because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. Objectives To assess the effects of water for wound cleansing. Search methods For this fifth update, in May 2021 we searched the Cochrane Wounds Specialised Register; the Cochrane Central Register of Controlled Trials (CENTRAL); Ovid MEDLINE; Ovid Embase and EBSCO CINAHL Plus. We also searched clinical trials registries for ongoing and unpublished studies, and scanned reference lists of relevant included studies as well as reviews, meta‐analyses and health technology reports to identify additional studies. There were no restrictions with respect to language, date of publication or study setting. Selection criteria We included all randomised controlled trials (RCTs) that assessed wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). For this update, we excluded quasi‐RCTs, thereby removing some studies which had been included in the previous version of the review. Data collection and analysis Two review authors independently carried out trial selection, data extraction and GRADE assessment of the certainty of evidence. Main results We included 13 trials in this update including a total of 2504 participants ranging in age from two to 95 years. Participants in the trials experienced open fractures, surgical wounds, traumatic wounds, anal fissures and chronic wounds. The trials were conducted in six different countries with the majority conducted in India and the USA. Three trials involving 148 participants compared cleansing with tap water with no cleansing. Eight trials involving 2204 participants assessed cleansing with tap water compared with cleansing with normal saline. Two trials involving 152 participants assessed cleansing with distilled water compared with cleansing with normal saline.  One trial involving 51 participants also assessed cleansing with cooled boiled water compared with cleansing with normal saline, and cleansing with distilled water compared with cleansing with cooled boiled water. Wound infection:  no trials reported on wound infection for the comparison cleansing with tap water versus no cleansing. For all wounds, eight trials found the effect of cleansing with tap water compared with normal saline is uncertain (risk ratio (RR) 0.84, 95% confidence interval (CI) 0.59 to 1.19); very low‐certainty evidence. Two trials comparing the use of distilled water with normal saline for cleansing open fractures found that the effect on the number of fractures that were infected is uncertain (RR 0.70, 95% CI 0.45 to 1.09); very low‐certainty evidence. One trial compared the use of cooled boiled water with normal saline for cleansing open fractures and found that the effect on the number of fractures infected is uncertain (RR 0.83, 95% CI 0.37 to 1.87); very low‐certainty evidence. This trial also compared the use of distilled water with cooled boiled water and found that the effect on the number of fractures infected is uncertain (RR 0.59, 95% CI 0.24 to 1.47); very low‐certainty evidence. Wound healing:  results from three trials comparing the use of tap water with no wound cleansing demonstrated there may be little or no difference in the number of wounds that did not heal between the groups (RR 1.04, 95% CI 0.95 to 1.14); low‐certainty evidence. The effect of tap water compared with normal saline is uncertain; two trials were pooled (RR 0.57, 95% CI 0.30 to 1.07) but the certainty of the evidence is very low. Results from one study comparing the use of distilled water with normal saline for cleansing open fractures found that there may be little or no difference in the number of fractures that healed (RR could not be estimated, all wounds healed); the certainty of the evidence is low. Reduction in wound size:  the effect of cleansing with tap water compared with normal saline on wound size reduction is uncertain (RR 0.97, 95% CI 0.56 to 1.68); the certainty of the evidence is very low. Rate of wound healing:  the effect of cleansing with tap water compared with normal saline on wound healing rate is uncertain (mean difference (MD) ‐3.06, 95% CI ‐6.70 to 0.58); the certainty of the evidence is very low. Costs:  two trials reported cost analyses but the cost‐effectiveness of tap water compared with the use of normal saline is uncertain; the certainty of the evidence is very low. Pain:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in pain scores. The certainty of the evidence is low. Patient satisfaction:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in patient satisfaction .  The certainty of evidence is low. The effect of cleansing with tap water compared with normal saline is uncertain as the certainty of the evidence is very low. Authors' conclusions All the evidence identified in the review was low or very low certainty. Cleansing with tap water may make little or no difference to wound healing compared with no cleansing; there are no data relating to the impact on wound infection. The effects of cleansing with tap water, cooled boiled water or distilled water compared with cleansing with saline are uncertain, as is the effect of distilled water compared with cooled boiled water. Data for other outcomes are limited across all the comparisons considered and are either uncertain or suggest that there may be little or no difference in the outcome. Plain language summary The effects of water compared with other solutions for wound cleansing Background Infection can interfere with the normal wound‐healing process. In order to reduce the risk of infection, wounds are routinely cleansed to remove dirt, contamination or impurities. In this review, a wound is defined as a break in the skin. What is the aim of this review? The aim of this review was to investigate the effects of wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). We measured effectiveness by looking at wound‐related infection rate and wound healing. Researchers from Cochrane searched for all randomised controlled trials (RCTs) relating to this question and found 13 relevant studies. RCTs are studies where people are chosen at random to receive different treatments. Allocating participants in this way provides the most reliable evidence about possible relationships between the treatment used and any reported health outcomes. Key messages We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction. What was studied in the review? Wounds are commonly cleansed to prevent infection. The cleansing solution can be tap water, distilled water, cooled boiled water or saline. Tap water is commonly used in the community because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. We compared the effects of cleansing wounds with water with other types of water, normal saline and no cleansing. We included all RCTs that compared wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). Participants were from any age group and any setting e.g. hospital, community, nursing homes, general practice, wound clinics. We excluded trials that compared solutions for dental procedures or for patients with burns. What are the main results of the review? We included results from 13 RCTs in this review, with a combined total of 2504 participants. The participants were adults or children with a range of different types of wounds who were treated in the community, emergency departments or hospital wards. Eight trials assessed cleansing with tap water compared with cleansing with normal saline. Three trials compared cleansing with tap water with no cleansing. Two trials assessed cleansing with distilled water compared with cleansing with normal saline, one trial also assessed cleansing with cooled boiled water with cleansing with normal saline and cleansing with distilled water compared with cleansing with cooled boiled water.  We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction.  We are unsure if the interventions have an effect because not enough participants received each intervention to reliably assess their effects. The way that the studies were designed and conducted also means that the results may not reliably reflect the effects of the interventions. This is partly due to uncertainty over how participants were assigned to the treatments. It is also possible that many participants and healthcare professionals were aware of which treatments were being used. How up to date is this review? We searched for studies that had been published up to 20 May 2021."}, {"id": 94, "title": "Nonpharmacologic Management of Procedural Pain in Pediatric Burn Patients: A Systematic Review of Randomized Controlled Trials.", "authors": "Gillum, Matthew; Huang, Samantha; Kuromaru, Yuki et al.", "journal": "Journal of burn care & research : official publication of the American Burn Association", "year": "2022", "vol": "43(2):368-373", "doi": "10.1093/jbcr/irab167", "abstract": "Pain following burn injury is associated with long-term health consequences in the pediatric population. Literature suggests nonpharmacologic treatment may  provide improved pain control as an effective adjunct for these patients. This  study aims to summarize randomized controlled trials on nonpharmacologic  procedural pain management in pediatric burn patients. A systematic review was  conducted on nonpharmacologic procedural pain management techniques used in the  pediatric burn population. Fifteen studies were included and involved virtual  reality, distraction devices, child life therapy, directed play, digital tablet  games, cartoons, hypnosis, and music therapy. Treatment was effective in 8 out of  15 studies. Compared to controls, nonpharmacologic treatments reduced mid  procedure pain by 19.7% and post-procedure pain by 20.1%. This study demonstrates  that nonpharmacologic therapy can be an effective adjunct in pediatric procedural  burn pain management, however further studies are needed to develop standardized  algorithms to integrate nonpharmacologic treatments with pharmacologic therapies."}, {"id": 95, "title": "Comment on De Clifford-Faugere et al. (2020) 'Systematic review and meta-analysis of olfactive stimulation interventions to manage procedural pain in preterm and  full-term'.", "authors": "Goubet, Nathalie; Rattaz, Cécile; Pierrat, Véronique", "journal": "International journal of nursing studies", "year": "2022", "vol": "133:104299", "doi": "10.1016/j.ijnurstu.2022.104299", "abstract": ""}, {"id": 96, "title": "LATCH como ferramenta sistematizada para avaliação da técnica de amamentação na maternidade", "authors": "Griffin, Cristiane Maria da Conceição; Amorim, Maria Helena Costa; Almeida, Fabiane de Amorim et al.", "journal": "Acta Paul. Enferm. (Online)", "year": "2022", "vol": "35:eAPE03181-eAPE03181", "doi": "10.37689/acta-ape/2022ao03181", "abstract": "Resumo  Objetivo  Analisar as dificuldades das mulheres relacionadas à técnica de amamentação, segundo a escala LATCH e verificar relações com as características sociodemográficas, obstétricas e neonatais.  Métodos  Estudo analítico transversal com mulheres e respectivos filhos únicos em aleitamento materno exclusivo entre junho e dezembro de 2015. Os escores individuais e total da escala LATCH foram usados para avaliar a técnica de amamentação, considerando-se as dificuldades das mulheres para amamentar e as horas de vida da criança. Os testes Qui-quadrado, exato de Fisher, Kruskal-Wallis e um modelo linear generalizado foram usados para avaliar as relações entre os escores da LATCH e as características sociodemográficas, clínicas e obstétricas.  Resultados  Dentre as 162 duplas mãe-filho analisadas, as crianças com mais 48 horas de vida apresentaram menos dificuldades em relação à pega (p=0,002), à deglutição audível (p&lt;0,001) e ao posicionamento (p&lt;0,001). No item conforto, as puérperas com filhos com &lt;24 horas de vida apresentaram menos dor (p=0,004). O LATCH foi menor para as mulheres com cirurgia mamária prévia (p=0,005), com filhos prematuros (p=0,011), peso menor de 2.500 gramas (p=0,006) e com &lt;24 horas de vida.  Conclusão  O uso do LATCH foi útil na análise das dificuldades da técnica de amamentação das mulheres durante a fase da internação, considerando as características da mulher e da criança."}, {"id": 97, "title": "Distracting Through Procedural Pain and Distress Using Virtual Reality and Guided Imagery in Pediatric, Adolescent, and Young Adult Patients: Randomized Controlled  Trial.", "authors": "Hoag, Jennifer A.; Karst, Jeffrey; Bingen, Kristin et al.", "journal": "Journal of medical Internet research", "year": "2022", "vol": "24(4):e30260", "doi": "10.2196/30260", "abstract": "BACKGROUND: Children with acute and chronic illness undergo frequent, painful, and distressing procedures. OBJECTIVE: This randomized controlled trial was used  to evaluate the effectiveness of guided imagery (GI) versus virtual reality (VR)  on the procedural pain and state anxiety of children and young adults undergoing  unsedated procedures. We explored the role of trait anxiety and pain  catastrophizing in intervention response. METHODS: Children and young adults were  recruited from the hematology, oncology, and blood and marrow transplant clinics  at a children's hospital. Each study participant completed the GI and VR  intervention during separate but consecutive unsedated procedures. Self-report  measures of pain and anxiety were completed before and after the procedures.  RESULTS: A total of 50 participants (median age 13 years) completed both  interventions. GI and VR performed similarly in the management of procedural  pain. Those with high pain catastrophizing reported experiencing less nervousness  about pain during procedures that used VR than those using GI. State anxiety  declined pre- to postprocedure in both interventions; however, the decrease  reached the level of significance during the VR intervention only. Those with  high trait anxiety had less pain during GI. CONCLUSIONS: In our sample, VR worked  as well as GI to manage the pain and distress associated with common procedures  experienced by children with acute or chronic illnesses. Children who are primed  for pain based on beliefs about pain or because of their history of chronic pain  had a better response to VR. GI was a better intervention for those with high  trait anxiety. TRIAL REGISTRATION: ClinicalTrials.gov NCT04892160;  https://clinicaltrials.gov/ct2/show/NCT04892160."}, {"id": 98, "title": "Tablet personal computer distraction during intravenous placement for young children in the pediatric emergency department: A pilot study.", "authors": "Lee, Ha Ni; Hwang, Soyun; Jung, Jae Yun et al.", "journal": "Pediatrics international : official journal of the Japan Pediatric Society", "year": "2022", "vol": "64(1):e15150", "doi": "10.1111/ped.15150", "abstract": "BACKGROUND: Intravenous (IV) placement is a common procedure experienced by children visiting the pediatric emergency department (PED). However, uncontrolled  anxiety and pain cause children to interfere with the procedure. In this pilot  study, we sought to evaluate the effectiveness of tablet personal computers as a  distraction method during IV placement. METHODS: This is a single-center pilot  study conducted at a tertiary teaching hospital. Children visiting the PED were  eligible if they were aged 3-5 years and required IV placement during the PED  visit. After written consent was obtained from the guardian, the child was  randomly assigned to a control group or an intervention group. For the  intervention group, an animated video was played via tablet PC during IV  placement. For both groups, children's anxiety, heart rate, and pain scale scores  (the Face, Legs, Activity, Cry, Consolability and Evaluation Enfant Douleur) and  guardian satisfaction were recorded. RESULTS: 22 children were eligible for the  final analysis. There was no significant difference in the pain scale scores  between the two groups, with the exception of the degree of pain relief after the  procedure measured using Evaluation Enfant Douleur (intervention group: 6.0,  interquartile range (IQR): 4.2-6.8, and control group; 3.0, IQR: 2.0-3.8,  P = 0.011) and Face, Legs, Activity, Cry, Consolability (intervention group: 4.0,  IQR: 4.0-4.2 and control group; 3.0, IQR: 1.5-3.5, P = 0.043). CONCLUSION: In  this pilot study, distraction using tablet personal computers may have reduced  children's distress during the recovery phase after venipuncture. Further study  with a larger sample size and different methods of distraction is essential."}, {"id": 99, "title": "Control effect of virtual reality technology on procedural pain in children's wound: A meta-analysis.", "authors": "Li, Tuan; Fu, Yingping; Yang, Yanzheng et al.", "journal": "Medicine", "year": "2022", "vol": "101(40):e30961", "doi": "10.1097/MD.0000000000030961", "abstract": "BACKGROUND: Children who undergo wound manipulation usually experience pain. Virtual reality technology is a novel and effective non pharmaceutical therapy  for reducing pain in children scheduled to undergo wound manipulation. However,  the effectiveness of Virtual reality technology in controlling procedural pain in  children's wounds has not been evaluated in a systematic review. METHODS: It  employed a meta-analysis design. We included studies with randomized controlled  trials, reporting children's wound manipulation pain, and published them in  English. Two reviewers independently evaluated the methodological quality of the  included studies. RESULTS: Of the 108 studies identified, 39 were eligible for  the meta-analysis, with a total sample of 273 patients. The use of virtual  reality technology has significantly reduced pain intensity during wound  manipulation in children. There was a significant difference between the  experimental group (virtual reality) and the control group (no virtual reality)  in reducing the pain of the children's wound manipulation (P < .05). CONCLUSION:  As a distraction method of non drug assisted analgesia intervention, virtual  reality technology can reduce children's procedural pain and discomfort symptoms."}, {"id": 100, "title": "The effectiveness of massage interventions on procedural pain in neonates: A systematic review and meta-analysis.", "authors": "Liu, Jiang; Fang, Shirong; Wang, Yuxia et al.", "journal": "Medicine", "year": "2022", "vol": "101(41):e30939", "doi": "10.1097/MD.0000000000030939", "abstract": "BACKGROUND: The painful procedures experienced by neonates during hospitalization have short-term or long-term effects on neonates. While the limitations of  previous interventions make it imperative to explore effective interventions that  are readily available. This systematic review and meta-analysis was conducted to  evaluate the safety and effectiveness of massage for pain management in neonates.  METHODS: This systematic review was registered in PROSPER. PubMed, Embase,  Cochrane Library, and the Clinical Trials Registry were searched to December  2021. Two reviewers independently carried out study selection, data extraction,  bias risk assessment. Continuous data were analyzed by mean differences (MD).  Dichotomous data were reported using relative risk. If at least two studies  reported identical results by the same pain assessment tool, a meta-analysis was  conducted using random effect model and inverse variance. RESULTS: Total 11  included studies involving 755 neonates investigated the effects of massage on  neonatal pain response compared to standard care. The meta-analysis showed that  massage could effectively improve pain response in neonates compared to standard  care no matter whether neonatal infant pain scale (NIPS) or premature infant pain  profile (PIPP) was used as an assessment tool. Besides, massage was also  effective for crying duration, blood oxygen saturation both during and after the  procedure, but non-effective for the variation of respiratory rate after the  procedure, and heart rate both during and after the procedure. CONCLUSIONS:  Massage may have a positive effect on pain relief of neonate, and rigorous trials  are needed in the future to determine the most effective massage method."}, {"id": 101, "title": "The perceptions and practices of parents and children on acute pain management among hospitalized children in two Botswana referral hospitals.", "authors": "Matula, Samuel T.; Irving, Sharon Y.; Deatrick, Janet A. et al.", "journal": "Journal of pediatric nursing", "year": "2022", "vol": "65:e35-e42", "doi": "10.1016/j.pedn.2022.02.004", "abstract": "BACKGROUND: Perceptions and practices of parties in pediatric pain are critical in children's access to adequate acute pain management. The personal factors of  the child and parents have been shown to be central to pediatric pain management  by the Symptom Management Theory. AIM: To describe children and  parents/guardians' perceptions (knowledge, attitudes and beliefs) and practices  regarding pediatric acute pain management and explain the influence of  socio-cultural and environmental factors on those perceptions and practices.  METHODS: Descriptive cross-sectional survey using modified versions of the  American Pain Society Patient Outcome Questionnaire-Revised among  parents/guardians and children. RESULTS: A convenience sample of 275  parents/guardians and 42 children aged 8 to 13 years admitted between date  November 2018 and February 2019 to two Botswana tertiary hospitals completed the  surveys. Forty-seven percent (n = 129) of parents/guardians reported the child to  be in moderate-severe pain, while 38% (n = 16) of children reported pain as  moderate-severe at the time of the survey. The children mean scores for  cm-APS-POQ-R were 113(33) while parents/guardian's guardians for m-APS-POQ-R were  123(26). The subscales except for the parents/'guardians' pain interference (p =  .96) were statistically significant (p = .000), showing adequate knowledge,  positive attitudes and high pain intensity for both parents/guardians and  children. CONCLUSION: Parent/guardians and children reported a high incidence of  acute pain, were content with pain management services, and showed adequate  knowledge of pediatric pain and its management. The incongruence between the  intensity of pain, satisfaction on the adequacy of pain management and knowledge  and attitudes demonstrated in this study need further inquiry."}, {"id": 102, "title": "Empatia de enfermeiras com recém-nascidos hospitalizados em unidades de terapia intensiva neonatal", "authors": "Mufato, Leandro Felipe; Gaíva, Maria Aparecida Munhoz", "journal": "Acta Paul. Enferm. (Online)", "year": "2022", "vol": "35:eAPE00492-eAPE00492", "doi": "10.37689/acta-ape/2022ao0
