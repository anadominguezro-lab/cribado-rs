a, Débora Rodrigues Alves de et al.", "journal": "Rev. Pesqui. (Univ. Fed. Estado Rio J., Online)", "year": "2020", "vol": "12:689-695", "doi": "10.9789/2175-5361.rpcfo.v12", "abstract": "Objetivo: Investigar a vivência de enfermeiros ao cuidar de crianças com câncer sob cuidados paliativos. Método: Estudo exploratório com abordagem qualitativa, realizado com doze enfermeiros através de entrevista semiestruturada e submetido à análise de conteúdo. Resultados: Emergiram três categorias temáticas: Percepção de enfermeiros acerca da assistência a crianças com câncer em Cuidados Paliativos e apoio aos familiares, destacando a assistência voltada ao bem-estar e ao conforto; práticas de cuidado utilizadas por enfermeiros à criança com câncer em Cuidados Paliativos, com abordagem voltada para o alívio da dor e de outros sintomas; comunicação de más notícias e valorização da espiritualidade na assistência à criança em Cuidados Paliativos, no contexto da terminalidade. Conclusão: Os entrevistados demonstraram vivenciar assistência voltada à qualidade de vida da criança com câncer em cuidados paliativos e de seus familiares. Sugere-se maior investimento na formação acadêmica em relação à temática"}, {"id": 182, "title": "Factors influencing the occurrence of neonatal procedural pain.", "authors": "Wang, Yajing; Li, Yang; Sun, Jing et al.", "journal": "Journal for specialists in pediatric nursing : JSPN", "year": "2020", "vol": "25(2):e12281", "doi": "10.1111/jspn.12281", "abstract": "OBJECTIVES: The objective of this study was to describe the occurrence of neonatal procedural pain and explore the factors that influence the frequency of  painful procedures. DESIGN: A descriptive prospective epidemiologic study.  SETTING: NICU at a general hospital in China. METHODS: A demographic and  diagnosis or illness information questionnaire and an occurrence of procedural  pain questionnaire specifically designed for this study were used to record the  current status of neonatal procedural pain. The neonatal infant pain scale (NIPS)  was used to measure pain intensity. A multiple linear regression model was used  to explore the factors influencing the frequency of painful procedures. RESULTS:  One hundred and twenty neonates experienced a total of 16,840 painful procedures.  Each neonate was exposed to a median (IQR) of 66.5(27,154.75) painful procedures  during hospitalization and a median (IQR) of 13(11, 19) painful procedures. All  27 different procedures were considered painful, and 70.37% (19/27) of these  procedures caused severe pain. Overall, the mean NIPS score of the 27 procedures  was 5.04 ± 1.52 with a range from 0 to 7. Respiratory support, age, and length of  hospital stay were factors influencing the frequency of painful procedures.  CONCLUSIONS: NICU neonates experience pain at a high frequency and intensity  during hospitalization. Respiratory support, age, and length of hospital stay  were factors influencing the frequency of painful procedures. Strategies are  needed to bridge the gap between practice and the evidence-based guidelines."}, {"id": 183, "title": "Predictors of effective management of acute pain in children within a UK ambulance service: A cross-sectional study.", "authors": "Whitley, Gregory Adam; Hemingway, Pippa; Law, Graham Richard et al.", "journal": "The American journal of emergency medicine", "year": "2020", "vol": "38(7):1424-1430", "doi": "10.1016/j.ajem.2019.11.043", "abstract": "OBJECTIVE: We aimed to identify predictors of effective management of acute pain in children in the pre-hospital setting. METHODS: A retrospective cross-sectional  study using electronic clinical records from one large UK ambulance service  during 01-Oct-2017 to 30-Sep-2018 was performed using multivariable logistic  regression. We included all children <18 years suffering acute pain. Children  with a Glasgow Coma Scale score of <15, no documented pain or without a second  pain score were excluded. The outcome measure was effective pain management  (abolition or reduction of pain by ≥2 out of 10 using the numeric pain rating  scale, Wong-Baker FACES® scale or FLACC [face, legs, activity, crying and  consolability] scale). RESULTS: 2312 patients were included for analysis. Median  (IQR) age was 13 (9-16), 54% were male and the cause of pain was trauma in 66% of  cases. Predictors of effective pain management include children who were younger  (0-5 years) compared to older (12-17 years) (adjusted odds ratio [AOR] 1.53; 95%  confidence interval [CI] 1.18-1.97), administered analgesia (AOR 2.26; CI  1.87-2.73), attended by a paramedic (AOR 1.46; CI 1.19-1.79) or living in an area  of low deprivation (index of multiple deprivation [IMD] 8-10) compared to  children in an area of high deprivation (IMD 1-3) (AOR 1.37; CI 1.04-1.80). Child  sex, type of pain, transport time, non-pharmacological treatments and clinician  experience were not significant. CONCLUSION: These predictors highlight disparity  in effective pre-hospital management of acute pain in children. Qualitative  research is needed to help explain these findings."}, {"id": 184, "title": "Use of virtual reality in the supportive care management of paediatric patients with cancer.", "authors": "Yap, Kevin Yi-Lwern; Koh, Dalvin Wan Hong; Lee, Valerie Sze Jie et al.", "journal": "The Lancet. Child & adolescent health", "year": "2020", "vol": "4(12):899-908", "doi": "10.1016/S2352-4642(20)30240-6", "abstract": "Paediatric patients with cancer undergo multiple treatments and procedures that can be invasive and painful. Virtual reality technologies could support the  management of paediatric cancer. This Review focuses on the physiological and  psychological efficacy of virtual reality in supportive care management. Virtual  reality has shown potential in reducing pain scores, pulse rates, and distress  scores, but has no significant effect on other indicators, such as anxiety, fear,  and depression. Several virtual reality characteristics might affect its  effectiveness when used in the paediatric cancer setting. Virtual reality games  with high fidelity (eg, fully-isolating head-mounted display, stereo sound, and  controllers) components provide a higher level of immersion, presence, and  narrative engagement, which could better manage pain. Personalising the virtual  reality experience to the patient and procedure would also improve accessibility  and comfort. Clinicians should work closely with virtual reality developers to  ensure that the virtual reality applications used are appropriate for their  patients."}, {"id": 185, "title": "Select Issues in Pain Management for the Youth and Adolescent Athlete.", "authors": "", "journal": "Medicine and science in sports and exercise", "year": "2020", "vol": "52(9):2037-2046", "doi": "10.1249/MSS.0000000000002333", "abstract": ""}, {"id": 186, "title": "Comparing the Analgesic Effects of Four Nonpharmacologic Interventions on Term Newborns Undergoing Heel Lance: A Randomized Controlled Trial.", "authors": "", "journal": "The Journal of perinatal & neonatal nursing", "year": "2020", "vol": "34(4):E22", "doi": "10.1097/JPN.0000000000000532", "abstract": ""}, {"id": 187, "title": "Confort infantil. El Dolor Infantil, una realidad desconocida", "authors": "", "journal": "Enfermeria Integral", "year": "2020", "vol": "124:77-80", "doi": "", "abstract": ""}, {"id": 188, "title": "Questions of informal caregivers of children regarding the postoperative period of cochlear implant", "authors": "Almeida, Raissa Janine de; Cunha, Gabriela Fávaro Marques da; Santos, Eliane Alves Motta Cabello dos et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2019", "vol": "72(4):988-993", "doi": "10.1590/0034-7167-2018-0667", "abstract": "ABSTRACT  Objective: To identify the main questions of informal caregivers of children with hearing impairments on the postoperative care of cochlear implant.  Method: Cross-sectional study developed in a public and tertiary hospital of the state of São Paulo, Brazil. The sample consisted of 48 informal caregivers who were monitoring children subjected to cochlear implant. Data collection took place during the preoperative nursing consultation, by structured interview, between September 2016 and July 2017. The questions identified were categorized by similarity.  Results: The questions were related to: rest, dressing, feeding, length of stay, system activation time, infection, removal of stitches, bleeding, medicines, immediate sound stimulation, and pain.  Conclusion: The prevalent questions were about rest, dressing, and feeding, and identifying them made it possible to plan and implement a nursing care aimed at the caregiver needs, as well as prepare them for care maintenance after hospital discharge."}, {"id": 189, "title": "Efficacy of the Buzzy Device for Pain Management During Needle-related Procedures: A Systematic Review and Meta-Analysis.", "authors": "Ballard, Ariane; Khadra, Christelle; Adler, Samara et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(6):532-543", "doi": "10.1097/AJP.0000000000000690", "abstract": "OBJECTIVE: This systematic review and meta-analysis examined the effectiveness of the Buzzy device combining cold and vibration for needle-related procedural pain  in children. MATERIALS AND METHODS: Databases search was conducted from inception  to December 2017 to identify randomized controlled trials using the Buzzy device  for pain management in children undergoing needle-related procedures. Selection  of studies, data extraction, and assessment of risk of bias and quality of  evidence were independently performed by 2 reviewers. Quantitative and  qualitative analyses were conducted. RESULTS: A total of 9 studies involving 1138  participants aged between 3 and 18 years old were included in the systematic  review and 7 were suitable for meta-analysis. The meta-analysis compared the  Buzzy device with a no-treatment comparator and the effect of the device was  significant in reducing self-report procedural pain (standardized mean difference  [SMD]: -1.11; 95% confidence interval [CI]: -1.52 to -0.70; P<0.0001),  parent-reported procedural pain (SMD: -0.94; 95% CI: -1.62 to -0.27; P=0.006),  observer-report procedural pain (SMD: -1.19; 95% CI: -1.90 to -0.47; P=0.001),  observer-reported procedural anxiety (SMD -1.37; 95% CI: -1.77 to -0.96;  P<0.00001), and parent-reported procedural anxiety (SMD -1.36; 95% CI: -2.11 to  -0.61; P=0.0004). There was no significant difference for the success of the  procedure at first attempt and the occurrence of adverse events. DISCUSSION: The  Buzzy device seems to be a promising intervention for procedural pain management  in children. However, the comparative effect is uncertain due to the presence of  significant heterogeneity and very low-quality evidence. There is a need to  improve the methodological quality and rigor in the design of future trials to  conclude to the efficacy of the Buzzy device."}, {"id": 190, "title": "The Pediatric Procedural Holistic Comfort Assessment: A Feasibility Study.", "authors": "Bice, April A.; Pond, Richard S.; Lutz, Barbara J.", "journal": "Journal of pediatric health care : official publication of National Association of Pediatric Nurse Associates & Practitioners", "year": "2019", "vol": "33(5):509-519", "doi": "10.1016/j.pedhc.2019.01.006", "abstract": "INTRODUCTION: Holistic comfort is an essential component of pediatric procedural care. However, a main gap in the literature is the ability to measure this. In  this study, researchers report the feasibility of implementing a newly developed  psychosocial measurement instrument in clinical practice. METHOD: This mixed  methods study was guided by Kolcaba's holistic comfort theory. Descriptive and  inferential statistics and a qualitative descriptive approach to cognitive  interviewing were used. Children aged 4 to 8 years (n = 16) experiencing a  nonurgent needle procedure and registered nurses (n = 14) who administered the  instrument were recruited. RESULTS: Eight qualitative themes of feasibility and  comprehensibility were identified. Perspectives of children and nurses were not  significantly associated with any demographic variable. The Pediatric Procedural  Holistic Comfort Assessment is a feasible instrument to implement but will  benefit from minor revisions. DISCUSSION: This study has implications for nursing  practice, research methodology, and future research. The Pediatric Procedural  Holistic Comfort Assessment can be successfully implemented by nurses in health  care settings."}, {"id": 191, "title": "[Clinical effect of maternal voice stimulation in alleviating procedural pain in hospitalized neonates].", "authors": "Chen, Yu-Shuang; Tan, Yan-Juan; Zhou, Le-Shan", "journal": "Zhongguo dang dai er ke za zhi = Chinese journal of contemporary pediatrics", "year": "2019", "vol": "21(1):58-63", "doi": "10.7499/j.issn.1008-8830.2019.01.011", "abstract": "OBJECTIVE: To study the clinical effect of maternal voice stimulation in alleviating procedural pain in neonates during heel blood collection. METHODS: A  total of 72 neonates who were admitted to the neonate intensive care unit were  randomly divided into an intervention group (n=35) and a control group (n=37).  Heel blood collection was performed by the routine method in the control group.  The intervention group listened to their mothers' voice from 1 minute before heel  blood collection to the end of the procedure. Pain score, incidence of crying,  and vital signs were recorded before and after heel blood collection. RESULTS:  Compared with the control group, the heart rate was significantly reduced, the  blood oxygen saturation significantly increased, the incidence of crying and the  pain score were significantly reduced in the intervention group during the  procedure of heel blood collection (P<0.05). CONCLUSIONS: Maternal voice  stimulation helps to reduce procedural pain and maintain stable vital signs in  neonates."}, {"id": 192, "title": "Correlational analysis between potentially painful procedures and pain control strategies in a neonatal unit", "authors": "Costa, Anna Caroline Leite; Araújo, Fernanda Lopes de; Simão, Delma Aurélia da Silva et al.", "journal": "Texto & contexto enferm", "year": "2019", "vol": "28:e20180299-e20180299", "doi": "10.1590/1980-265x-tce-2018-0299", "abstract": "ABSTRACT  Objective:  to describe potentially painful procedures performed in neonates and their relation with pain relief strategies.  Method: a longitudinal correlational study, conducted from October to December 2014, with 50 neonates admitted to neonatal units of a public maternity hospital in Belo Horizonte, Minas Gerais (Brazil). Procedures were analyzed in the first two weeks of life of neonates admitted with up to three hours of life and born at the maternity hospital in which the study was conducted. Data was submitted to descriptive, comparative and correlational analyses using the Statistical Package for the Social Sciences software, adopting a significance level of 5%.  Results: most newborns were male (n=32; 64%), premature (n=34; 69.4%) and hospitalized for having respiratory disorders (n=45; 91.8%). A total of 894 painful and of 2883 potentially painful procedures related to daily care were recorded. Non-pharmacological pain relief strategies were used in 49 (98%) neonates, while pharmacological strategies were used in nine (18%). Correlational analyses revealed the difficulty of drug treatment management and the underuse of non-pharmacological strategies as adjuvant to severe pain procedures.  Conclusion: neonates underwent many potentially painful procedures, and it was found that pain relief methods are underused and that training on pain assessment and treatment is necessary in order to make these practices part of the care process."}, {"id": 193, "title": "Immunization-Associated Pain: Taking Research to the Bedside.", "authors": "Cwynar, Christina M.; Osborne, Kathryn", "journal": "Journal of pediatric health care : official publication of National Association of Pediatric Nurse Associates & Practitioners", "year": "2019", "vol": "33(4):446-454", "doi": "10.1016/j.pedhc.2018.12.004", "abstract": "BACKGROUND: Immunization-associated pain is the number one cause of pain in pediatric settings. Untreated pain has many short- and long-term detrimental  effects. The purpose of this project was to implement a nonpharmaceutical  immunization-associated-pain prevention program. METHOD: This project was  implemented at a pediatric primary care clinic. Staff were educated about  immunization-associated pain and techniques for decreasing/preventing pain.  Families were educated about pain control, and the practitioner and parent/child  picked interventions to decrease pain. Preimplementation and postimplementation  data were collected using previously validated pain and satisfaction scales.  RESULTS: Pain prevention interventions decreased pain for children between 2  months and 7 years of age by 4.7 points on a Faces, Legs, Activity, Cry,  Consolability (i.e., FLACC) scale. For children 7 years and older, pain during  immunization decreased on average by 1.76 points on the visual analog scale.  CONCLUSION: Non-pharmaceutical interventions are effective in decreasing  immunization-associated pain."}, {"id": 194, "title": "Nurses' practices regarding procedural pain management of preterm infants.", "authors": "De Clifford-Faugère, Gwenaëlle; Aita, Marilyn; Le May, Sylvie", "journal": "Applied nursing research : ANR", "year": "2019", "vol": "45:52-54", "doi": "10.1016/j.apnr.2018.11.007", "abstract": "BACKGROUND: It is well known that preterm neonates can feel pain which can be expressed through specific behaviors and signs. Repeated and untreated pain has  consequences for the preterm neonates such as hypersensitivity to pain, as well  as important repercussions on their motor and intellectual development. The use  of non-pharmacological interventions for pain management by nurses is imperative  to prevent these consequences in the NICU. The aim of this study is to survey  neonatal nurses' interventions for pain management of preterm neonates. METHODS:  Twenty (20) nurses were recruited for this pilot observational survey study.  Standard pain management interventions used by nurses during heel prick were  evaluated by means of a questionnaire. In addition, 11 out of the 20 nurses were  observed during heel prick to evaluate what and how interventions were done.  RESULTS: All infants (n = 11) received at least one pain management intervention  during heel prick. Heterogeneity in pain management practices used by nurses is  considerable. For 95% (19/20) of nurses, sucrose is a standard intervention  reported in the survey but observations showed that it not always applied (64%).  Positioning is more used (64%) by nurses than reported in the survey (45%).  Swaddling also was also reported as a standard intervention by 45% of nurses, but  it does not appear to be adequately performed (36%). CONCLUSION: According to the  results, it would be essential to review nurses' knowledge and skills regarding  standard pain management interventions, during painful procedures, as the quality  of these practices is questionable. Homogeneity of the standard of care is  particularly important in research to allow an appropriate comparison between  study groups and prevention study bias."}, {"id": 195, "title": "Pain control at the vaccine injection site: new insights.", "authors": "Edwards, Kate M.; Booy, Robert", "journal": "Journal of travel medicine", "year": "2019", "vol": "26(6):taz053", "doi": "10.1093/jtm/taz053", "abstract": ""}, {"id": 196, "title": "Development and validation of the Satisfaction with Treatment for Pain Questionnaire (STPQ) among patients with sickle cell disease.", "authors": "Elander, James; Bij, Deepali; Kapadi, Romaana et al.", "journal": "British journal of haematology", "year": "2019", "vol": "187(1):105-116", "doi": "10.1111/bjh.16015", "abstract": "A brief measure of patient satisfaction with treatment for pain is needed to help improve the treatment of painful episodes caused by sickle cell disease (SCD),  especially during and after the transition from paediatric to adult care. Focus  groups of 28 adolescent and adult patients were consulted about the content,  clarity and relevance of 30 potential items, resulting in an 18-item version.  This was validated by analysing questionnaire responses from 120 patients aged  12-53 years. Confirmatory factor analysis and item analysis indicated five  subscales with high internal reliability: 'Communication and Involvement' (6  items, α = 0·87); 'Respect and Dignity' (3 items, α = 0·82); 'Pain Control' (3  items, α = 0·91); 'Staff Attitudes and Behaviour' (4 items, α = 0·88); and  'Overall Satisfaction' (2 items, α = 0·85) plus a Total Satisfaction score (18  items, α = 0·96). High negative correlations with the Picker Patient Experience  Questionnaire, a measure of problem experiences, indicated good convergent  validity. Lower satisfaction scores among patients aged over 18 years, those  admitted via the emergency department, those treated by non-specialist hospital  staff, and those reporting more breakthrough pain indicated good concurrent  validity. The questionnaire provides a convenient brief measure that can be used  to inform and evaluate improvements in healthcare for adolescent and adult  patients with SCD, and could potentially be adapted for other painful conditions."}, {"id": 197, "title": "Results after implementation of a sedoanalgesia protocol for procedures in hospital environment.", "authors": "Fernández-Cantalejo Padial, J; Heras, E; Hernández, B et al.", "journal": "Rev Chil Pediatr", "year": "2019", "vol": "90(6):649-656", "doi": "10.32641/rchped.v90i6.1169", "abstract": "INTRODUCTION: We analyze the effectiveness and safety of a specific analgosedation protocol for procedures, and eva luate the satisfaction of the health personnel with each procedure. PATIENTS AND METHOD: Prospective study of an analgosedation protocol for hospital procedures in children under 18 years of age, with an individualized strategy based on the patient's baseline situation, the type of procedure and the experience of the pediatrician responsible for the sedation. The following variables were recorded: diagnosis motivating the procedure, type of procedure, anthropometric data, allergies, medication, ASA status and baseline disease, fasting time, lung auscultation, temperature, oxygen saturation, res piratory rate, heart rate, blood pressure, sedation location, type of drug, dose, route of administra tion, Ramsay sedation scale, duration of sedation, type and treatment of adverse effects, presence of family members throughout the procedure, and patient satisfaction. RESULTS: 279 sedations were performed. The most commonly used drugs were nitrous oxide (62.7%) and midazolam (16.5%); the most commonly used routes of administration were the inhaled one (62.4%) and the intravenous one (15.8%). The satisfaction was high for the pediatrician (92.5%), the nurse (94.3%), the family (96.8%), and patients (93.6%), with a good correlation between them, and it was significantly lower when using midazolam and the nasal and oral routes. The adverse effects rate was 3.2%, and none was severe. CONCLUSIONS: The implementation of a specific analgosedation protocol for procedures in the hospital environment achieves high levels of effectiveness and safety, as well as a high level of satisfaction, both in family members and in health personnel."}, {"id": 198, "title": "Postoperative epidural analgesia versus systemic analgesia for thoraco‐lumbar spine surgery in children", "authors": "Guay, J; Suresh, S; Kopp, S et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2019", "vol": "1", "doi": "10.1002/14651858.CD012819.pub2", "abstract": "Abstract - Background Spine surgery may be associated with severe acute postoperative pain. Compared with systemic analgesia alone, epidural analgesia may offer better pain control. However, epidural analgesia has sometimes been associated with rare but serious complications. Therefore, it is critical to quantify the real benefits of epidural analgesia over other modes of pain treatment. Objectives To assess the effectiveness and safety of epidural analgesia compared with systemic analgesia for acute postoperative pain control after thoraco‐lumbar spine surgery in children. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), MEDLINE, Embase and Cumulative Index to Nursing and Allied Health Literature on 14 November 2018, together with the references lists of related reviews and retained trials, and two trials registers. Selection criteria We included all randomized controlled trials performed in children undergoing any type of thoraco‐lumbar spine surgery comparing epidural analgesia with systemic analgesia for postoperative pain. We applied no language or publication status restriction. Data collection and analysis We assessed risk of bias of included trials using the Cochrane tool. We analysed data using random‐effects models. We rated the quality of the evidence according to the GRADE scale. Main results We included 11 trials (559 participants) in the review, and seven trials (249 participants) in the analysis: 140 participants received epidural analgesia and 109 received systemic analgesia. Most studies included adolescents. Three trials included in the analysis contained some participants older than 18 years. The types of surgery were posterior spinal fusion for idiopathic scoliosis (nine trials), anterior correction for idiopathic scoliosis (one trial), or selective dorsal rhizotomy in children with cerebral palsy (one trial). The mean numbers of vertebrae operated on were between nine and 14.5 and the mean numbers of spinal levels were between three and four and a half. The length of surgery varied between three and six and a half hours. Compared with systemic analgesia, epidural analgesia reduced pain at rest at all time points. At six to eight hours, the mean pain score on a 0 to 10 scale with systemic analgesia was 3.1 (standard deviation 0.7) and with epidural analgesia was –1.32 points (95% confidence interval (CI) –1.83 to –0.82; 4 studies, 116 participants; moderate‐quality evidence). At 72 hours, the mean pain score with epidural analgesia was equivalent to a –0.8 point reduction on a 0 to 10 scale (standardized mean difference (SMD) –0.65, 95% CI –1.19 to –0.10; 5 studies, 157 participants; moderate‐quality evidence). Return of gastrointestinal function There was no difference for nausea and vomiting between groups (risk ratio (RR) 0.87, 95% CI 0.58 to 1.30; 6 studies, 215 participants; low‐quality evidence). One study found epidural analgesia with local anaesthetics may have increased the number of participants who had their first flatus within 48 hours (RR 1.63, 95% CI 1.08 to 2.47; 30 participants; very low‐quality evidence). Two studies found epidural analgesia with local anaesthetics may have increased the number of participants in whom first bowel movement occurred within 48 hours (RR 11.52, 95% CI 2.36 to 56.26; 60 participants; low‐quality evidence). It was uncertain whether epidural analgesia reduced the time to first bowel movement (MD 0.09 days, 95% CI –0.32 to 0.50; 1 study, 60 participants; very low‐quality evidence) and time to first liquid ingestion following epidural infusion of an opioid alone or a local anaesthetic plus an opioid (mean difference (MD) –5.02 hours, 95% CI –13.15 to 3.10; 2 studies, 56 participants; very low‐quality evidence). Epidural analgesia with local anaesthetics may have increased the risk of having first solid food ingestion within 48 hours (RR 7.00, 95% CI 1.91 to 25.62; 1 study, 30 participants; very low‐quality evidence). Secondary outcomes It was uncertain whether there was a difference in time to ambulate (MD 0.08 days, 95% CI –0.24 to 0.39; 1 study, 60 participants; very low‐quality evidence) and hospital length of stay (MD –0.29 days, 95% CI –0.69 to 0.10; 2 studies, 89 participants; very low‐quality evidence). Two studies found participants were more satisfied when treated with epidural analgesia (MD 1.62 on a scale from 0 to 10, 95% CI 1.26 to 1.97; 60 participants; very low‐quality evidence). It was unclear whether there was a difference in parent satisfaction for epidural analgesia with an opioid alone (MD 0.60, 95% CI –0.81 to 2.01; 1 trial, 27 participants; very low‐quality evidence). Complications It was uncertain whether there was a difference in the risk of complications such as: respiratory depression (risk difference (RD) –0.05, 95% CI –0.16 to 0.05; 4 studies, 126 participants; very low‐quality evidence); wound infection (RD 0.01, 95% CI –0.05 to 0.08; 2 trials, 93 participants; very low‐quality evidence); epidural abscess (RD 0, 95% CI –0.05 to 0.05; 3 trials, 120 participants; very low‐quality evidence); and neurological complications (RD 0.01, 95% CI –0.04 to 0.06; 4 studies, 151 participants; very low‐quality evidence). Authors' conclusions There is moderate‐ and low‐quality evidence that there may be a small additional reduction in pain up to 72 hours after surgery with epidural analgesia compared with systemic analgesia. Two very small studies showed epidural analgesia with local anaesthetic alone may accelerate the return of gastrointestinal function. The safety of this technique in children undergoing thoraco‐lumbar surgery is uncertain due to the very low‐quality of the evidence. The study in 'Studies awaiting classification' may alter the conclusions of the review once assessed. Plain language summary Epidural analgesia for postoperative pain after spinal surgery in children Review question We tried to determine if epidural analgesia offers some advantages over systemic (vein, skin or muscles) analgesia for treating postoperative pain in children undergoing spine surgery. Background Some children need extensive spinal bone surgery. This is a very painful procedure. Traditionally, this pain has mostly been treated with an opioid such as systemic morphine (or morphine like medicine) given via an in injection into the veins, skin or muscles. Epidural analgesia involves giving pain relief medicine into a catheter inserted in the spine to block pain transmission to the brain. The catheter is a small tube usually placed by the surgeon, at the end of the surgery, in the space in the spinal canal known as the epidural space. Study characteristics The evidence is current to 14 November 2018. We included 11 trials with 559 participants in the review, and seven trials with 249 participants in the analysis. The trials were funded by departmental resources (five trials), or in part by industry and partly by charity (one trial). Five trials did not mention the source of funding. Three of the trials included in the analysis contained some participants older than 18 years. Key results There may be a small additional reduction in pain up to 72 hours after surgery with epidural analgesia compared with systemic analgesia. After an extensive spine surgery, the gut is paralysed for a certain amount of time leading to nausea (feeling sick), vomiting (being sick), inability to ingest liquid or food, and no stools excretion. Two very small studies showed epidural analgesia with local anaesthetic alone may have accelerated the return of gut function. If confirmed, this would mean that children would be able to resume normal liquid and solid food intake faster after extensive spine surgery. Children in two small studies were more satisfied with epidural analgesia compared with children in the systemic analgesia group. However, it was unclear whether their parents were more satisfied with epidural analgesia or systemic analgesia. The safety of this technique in children undergoing spine surgery was uncertain because there was insufficient information to determine whether there was a difference in the rate of complications between epidural analgesia and systemic analgesia and an analysis of small trials might not be the best methodology to evaluate this aspect. Quality of the evidence The quality of evidence was moderate, low or very low for reduced pain and low or very low for all other measurements. Imperfections in the trials and low number of available trials were the main problems leading to rating the quality of evidence as low or very low."}, {"id": 199, "title": "A Systematic Review of Behavioral and Environmental Interventions for Procedural Pain Management in Preterm Infants.", "authors": "Hatfield, Linda A.; Murphy, Nancy; Karp, Kelley et al.", "journal": "Journal of pediatric nursing", "year": "2019", "vol": "44:22-30", "doi": "10.1016/j.pedn.2018.10.004", "abstract": "PROBLEM: Current research suggests behavioral and environmental interventions to prevent neonatal pain prior to an invasive procedure are rarely administered and  seldom documented. The aim of this study was to systematically review findings  from published randomized controlled trials that tested the effects of behavioral  and environmental procedural pain management interventions on behavioral pain  response in preterm infants. ELIGIBILITY CRITERIA: Randomized controlled trials  examining the effects of behavioral and environmental pain management  interventions on behavioral pain response in preterm infants were identified.  Articles accepted for inclusion met the following criteria: English language,  original, peer refereed, randomized controlled clinical trials published within  the past 5 years, study sample: preterm infants, setting: neonatal intensive care  units, study intervention behavioral and environmental, outcome pain measurement  score from valid and reliable pain scale. SAMPLE: Fourteen randomized controlled  trials from a literature search of PubMed and Medline databases were included in  this review. RESULTS: Across all age groups, facilitated tucking, oral sucrose,  and kangaroo care decreased behavioral and physiologic pain response alone and in  combination with other behavioral and environmental interventions. CONCLUSION:  Among preterm infants, facilitated tucking, oral sucrose, and kangaroo care  significantly mitigates biobehavioral pain response associated with acutely  painful procedures. IMPLICATIONS: Evidence suggests that behavioral and  environmental interventions can decrease biobehavioral pain response associated  with acutely painful procedures in preterm infants. This review highlights the  need for rigorous studies to help healthcare providers to build a tailored pain  treatment plan for preterm infants."}, {"id": 200, "title": "The Impact of 3 Different Distraction Techniques on the Pain and Anxiety Levels of Children During Venipuncture: A Clinical Trial.", "authors": "Inan, Gamze; Inal, Sevil", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(2):140-147", "doi": "10.1097/AJP.0000000000000666", "abstract": "OBJECTIVES: Invasive procedures are important causes of pain and anxiety during hospitalization. This study aimed to evaluate the effect of 3 different  distraction methods on the pain and anxiety levels of children during  venipuncture. METHODS: This was a randomized controlled trial conducted with 180  children of 6 to 10 years of age; data were collected in the months of August to  November 2016. Participants were randomized in 4 groups; the children in group 1  watched cartoon movies (CM), the children in group 2 played video games (VG), the  children in group 3 were distracted by their parents' verbal interactions (PI),  whereas no distraction method was used on the children in group 4 (control  group). The levels of anxiety and pain perception were evaluated independently  based on the feedback from the children, the nurse observer, and the parents. The  Children Fear Scale was used to evaluate anxiety levels and the Wong-Baker Pain  Scale was used to evaluate the pain levels of the children. RESULT: The  difference between the groups based on both the anxiety levels and pain scores  during venipuncture was statistically significant (P<0.05). The lowest level of  anxiety and pain perception was reported in the VG group. The scores observed  both in the CM group and the PI group were significantly lower than in the  control group (P<0.05). DISCUSSION: The distraction techniques of playing VG,  watching CM, and PI appear to be effective in reducing anxiety and pain  perception in children during the procedure of venipuncture. The most effective  method was playing VG."}, {"id": 201, "title": "Stress in Parents of Newborns in a Neonatal Intensive Care Unit", "authors": "Kegler, Jaquiele Jaciara; Neves, Eliane Tatsch; Silva, Augusto Maciel da et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2019", "vol": "23(1):e20180178-e20180178", "doi": "10.1590/2177-9465-ean-2018-0178", "abstract": "Abstract  Objective: To identify the level of stress and the most stressful situations for the parents of newborns hospitalized in a Neonatal Intensive Care Unit.  Methods: A descriptive study, with a quantitative approach, performed with parents of newborns admitted to the Neonatal Intensive Care Unit. For the data collection, the Brazilian version of the Parental Stress Scale: Neonatal Intensive Care Unit (PSS: NICU) was used. The analysis was performed using descriptive statistics.  Results: The change in the role of mother/father was the subscale in which the highest level of stress was obtained (mean=3.49) and the items considered more stressful in this subscale were \"Separated from my baby\" (mean=4.00) and \"Feeling helpless and unable to protect my baby from pain and painful procedures\" (mean=3.78).  Conclusion: Hospitalization of a child in a neonatal unit is a stressful experience for parents and there are situations that trigger higher levels of stress."}, {"id": 202, "title": "Candidate gene analyses for acute pain and morphine analgesia after pediatric day surgery: African American versus European Caucasian ancestry and dose prediction  limits.", "authors": "Li, Jin; Wei, Zhi; Zhang, Jie et al.", "journal": "The pharmacogenomics journal", "year": "2019", "vol": "19(6):570-581", "doi": "10.1038/s41397-019-0074-4", "abstract": "Acute pain and opioid analgesia demonstrate inter-individual variability and polygenic influence. In 241 children of African American and 277 of European  Caucasian ancestry, we sought to replicate select candidate gene associations  with morphine dose and postoperative pain and then to estimate dose prediction  limits. Twenty-seven single-nucleotide polymorphisms (SNPs) from nine genes  (ABCB1, ARRB2, COMT, DRD2, KCNJ6, MC1R, OPRD1, OPRM1, and UGT2B7) met selection  criteria and were analyzed along with TAOK3. Few associations replicated:  morphine dose (mcg/kg) in African American children and ABCB1 rs1045642 (A  allele, β = -9.30, 95% CI: -17.25 to -1.35, p = 0.02) and OPRM1 rs1799971 (G  allele, β = 23.19, 95% CI: 3.27-43.11, p = 0.02); KCNJ6 rs2211843 and high pain  in African American subjects (T allele, OR 2.08, 95% CI: 1.17-3.71, p = 0.01) and  in congruent European Caucasian pain phenotypes; and COMT rs740603 for high pain  in European Caucasian subjects (A allele, OR: 0.69, 95% CI: 0.48-0.99,  p = 0.046). With age, body mass index, and physical status as covariates, simple  top SNP candidate gene models could explain theoretical maximums of 24.2%  (European Caucasian) and 14.6% (African American) of morphine dose variances."}, {"id": 203, "title": "Assessment of Pain in the Newborn: An Update.", "authors": "Maxwell, Lynne G.; Fraga, María V.; Malavolta, Carrie P.", "journal": "Clinics in perinatology", "year": "2019", "vol": "46(4):693-707", "doi": "10.1016/j.clp.2019.08.005", "abstract": "Preterm and term neonate pain assessment in neonatal intensive care units is vitally important because of the prevalence of procedural and postoperative pain.  Of the 40 plus tools available, a few should be chosen for different populations  and contexts (2 have been validated in premature infants). Preterm neonates do  not display pain behaviors and physiologic indicators as reliably and  specifically as full-term infants, and are vulnerable to long-term sequelae of  painful experiences. Brain-oriented approaches may become available in the  future; meanwhile, neonatal pain assessment tools must be taught, implemented,  and their use optimized for consistent, reproducible, safe, and effective  treatment."}, {"id": 204, "title": "Nonpharmacologic Management of Pain During Common Needle Puncture Procedures in Infants: Current Research Evidence and Practical Considerations: An Update.", "authors": "McNair, Carol; Campbell-Yeo, Marsha; Johnston, Celeste et al.", "journal": "Clinics in perinatology", "year": "2019", "vol": "46(4):709-730", "doi": "10.1016/j.clp.2019.08.006", "abstract": "Infants undergo painful procedures involving skin puncture as part of routine medical care. Pain from needle puncture procedures is suboptimally managed.  Numerous nonpharmacologic interventions are available that may be used for these  painful procedures, including swaddling/containment, pacifier/non-nutritive  sucking, rocking/holding, breastfeeding and breastmilk, skin-to-skin care, sweet  tasting solutions, music therapy, sensorial saturation, and parental presence.  Adoption these interventions into routine clinical practice is feasible and  should be a standard of care in quality health care for infants. This review  summarizes the epidemiology of pain from common needle puncture procedures in  infants, the effectiveness of nonpharmacologic interventions, implementation  considerations, and unanswered questions."}, {"id": 205, "title": "Acute Pain Assessment in Prematurely Born Infants Below 29 Weeks: A Long Way to Go.", "authors": "Meesters, Naomi J.; Simons, Sinno H. P.; van Rosmalen, Joost et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(12):975-982", "doi": "10.1097/AJP.0000000000000762", "abstract": "OBJECTIVES: Neonates born extremely prematurely are at high risk of acute and prolonged pain. Effective treatment requires reliable pain assessment, which is  currently missing. Our study explored whether existing pain assessment tools and  physiological indicators measure pain and comfort accurately in this population.  MATERIALS AND METHODS: We prospectively collected data in 16 neonates born at  less than 29 weeks' gestational age during 3 conditions: skin-to-skin care, rest,  and heelstick procedure for capillary blood sampling in the incubator. The  neonates were video recorded in these situations, and recordings were coded using  5 observational pain assessment tools and numeric rating scales for pain and  distress. We simultaneously collected heart rate, respiratory rate, arterial  oxygen saturation, regional cerebral oxygenation, and the number of skin  conductance peaks. All measures across the 3 conditions were compared using  general linear modeling. RESULTS: The median gestational age was 27.1 weeks  (range: 24.1 to 28.7). Forty measurement periods across the 3 conditions were  analyzed. Heart rate was significantly higher during heelstick procedures  compared with during rest, with a mean difference of 10.7 beats/min (95%  confidence interval [CI]: 2.7-18.6). Oxygen saturation was significantly higher  during skin-to-skin care compared with during heelstick procedures with a mean  difference of 5.5% (95% CI: 0.2-10.8). The Premature Infant Pain Profile-revised  (PIPP-R) score was significantly higher during heelstick procedures compared with  skin-to-skin care with a mean difference of 3.2 points (95% CI: 1.6-5.0).  DISCUSSION: Pain measurement in clinical practice in prematurely born infants  below 29 weeks remains challenging. The included behavioral and physiological  indicators did not adequately distinguish between a painful situation, rest, and  skin-to-skin care in premature neonates."}, {"id": 206, "title": "Dor no recém-nascido: perspectivas da equipe multiprofissional na unidade de terapia intensiva neonatal", "authors": "Moretto, Lidiane Cortivo Asolini; Perondi, Eleandro Rodrigues; Trevisan, Marcela Gonçalves et al.", "journal": "Arq. ciências saúde UNIPAR", "year": "2019", "vol": "23(1):29-34", "doi": "10.25110/arqsaude.v23i1.2019.6580", "abstract": "Objetivou-se analisar a dor no recém-nascido sob a perspectiva da equipe multiprofissional de uma Unidade de Terapia Intensiva Neonatal. Trata-se de um estudo descritivo e exploratório, com abordagem quantitativa, realizado com 27 profissionais. A coleta de dados deu-se durante o mês de junho de 2016 por meio de um questionário estruturado fechado elaborado com base no questionário utilizado por Chermont et al. (2003). O instrumento abordou dados sociodemográficos, os critérios de identificação da dor, a conduta assistencial adotada, os sinais clínicos que motivaram a escolha da conduta, a análise da efetividade das intervenções e os procedimentos assistenciais capazes de ocasionar a dor. Os dados foram submetidos à análise estatística descritiva e distribuição de frequências por meio do programa Statistical Package for Social Science (SPSS) versão 21.0. A equipe multiprofissional concordou que o recém-nascido sente dor (100%). O choro e a expressão facial foram as manifestações comportamentais mais observadas (88,9%). Os parâmetros fisiológicos utilizados para detectar a presença de dor identificaram a frequência cardíaca (81,5%), frequência respiratória (74,1%) e êmese, pressão arterial e hipertermia (11,1%). O enrolamento de conforto foi a conduta de intervenção não farmacológica mais citada (66,7%). Conclui-se que, a equipe multiprofissional identifica a dor no recém-nascido, contudo, suas assistências não se fundamentam em boas práticas por meio da aplicação de escalas e protocolos."}, {"id": 207, "title": "A universal right to pain relief: balancing the risks in a vulnerable patient population.", "authors": "Moultrie, Fiona; Shriver, Adam; Hartley, Caroline et al.", "journal": "The Lancet. Child & adolescent health", "year": "2019", "vol": "3(2):62-64", "doi": "10.1016/S2352-4642(18)30269-4", "abstract": ""}, {"id": 208, "title": "(Non) Pharmacological Modalities in Acute Procedural Pain.", "authors": "Najafi, Nadia; Forget, Patrice; Poelaert, Jan", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(5):459", "doi": "10.1097/AJP.0000000000000687", "abstract": ""}, {"id": 209, "title": "Intranasal Analgesia and Sedation in Pediatric Emergency Care-A Prospective Observational Study on the Implementation of an Institutional Protocol in a  Tertiary Children's Hospital.", "authors": "Nemeth, Marcus; Jacobsen, Nils; Bantel, Carsten et al.", "journal": "Pediatric emergency care", "year": "2019", "vol": "35(2):89-95", "doi": "10.1097/PEC.0000000000001017", "abstract": "OBJECTIVES: Children presenting with acute traumatic pain or in need of therapeutic or diagnostic procedures require rapid and effective analgesia and/or  sedation. Intranasal administration (INA) promises to be a reliable, minimally  invasive delivery route. However, INA is still underused in Germany. We hence  developed a protocol for acute pain therapy (APT) and urgent analgesia and/or  sedation (UAS). Our aim was to evaluate the effectiveness and safety of our  protocol. METHODS: We performed a prospective observational study in a tertiary  children's hospital in Germany. Pediatric patients aged 0 to 17 years requiring  APT or UAS were included. Fentanyl, s-ketamine, midazolam, or combinations were  delivered according to protocol. Primary outcome variables included quality of  analgesia and/or sedation as measured on age-appropriate scales and time to onset  of drug action. Secondary outcomes were adverse events and serious adverse  events. RESULTS: One hundred pediatric patients aged 0.3 to 16 years were  enrolled, 34 for APT and 66 for UAS. The median time onset of drug action was 5  minutes (ranging from 2 to 15 minutes). Fentanyl was most frequently used for APT  (n = 19). Pain scores decreased by a median of 4 points (range, 0-10; P <  0.0001). For UAS, s-ketamine/midazolam was most frequently used (n = 25).  Sedation score indicated minimal sedation in most cases. Overall success rate  after the first attempt was 82%. Adverse events consisted of nasal burning (n =  2) and vomiting (n = 2). No serious adverse events were recorded. CONCLUSIONS: A  fentanyl-, s-ketamine-, and midazolam-based INA protocol was effective and safe  for APT and UAS. It should then be considered where intravenous access is  impossible or inappropriate."}, {"id": 210, "title": "Assessment and Management of Procedural Pain During the Entire Neonatal Intensive Care Unit Hospitalization.", "authors": "Orovec, Adele; Disher, Timothy; Caddell, Kim et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2019", "vol": "20(5):503-511", "doi": "10.1016/j.pmn.2018.11.061", "abstract": "BACKGROUND: Despite strong evidence that repeated pain exposure in neonates is associated with adverse outcomes, pain assessment and management continues to be  less than optimal in most neonatal intensive care units (NICUs). AIMS: To  evaluate current pain assessment and management practices, and identify factors  associated with optimal treatment throughout a cohort of preterm neonates over  the entire hospital stay. DESIGN: A secondary analysis of study data collected  from 2012 to 2016 as part of a larger clinical trial and supplemental chart  review. SETTINGS: Tertiary level neonatal intensive care unit.  PARTICIPANTS/SUBJECTS: 242 stable preterm neonates born at less than 37 weeks  gestational age. METHODS: Data were analyzed quantitatively using R for  statistics. RESULTS: The 242 neonates underwent a total of 10,469 painful  procedures (4,801 tissue breaking and 5,667 non-tissue breaking, with only 56.6%  and 12.2% having a documented pain score using the Premature Infant Pain Profile,  respectively). Average pain exposure was 43 with a median of 32(10-576) per  entire hospital stay. Documented pain score and greater postnatal age were  associated with higher use of a pain reducing intervention and lower gestational  age, first day, first week, higher illness severity, non tissue breaking and  night time procedures were associated with lower. Use of a pain relieving  intervention was documented in 58.5% of procedures. Sucrose was most commonly  used pharmacologic and non nutritive sucking the most common non pharmacologic  interventions. CONCLUSIONS: Increased efforts are needed to promote consistent  pain assessment and management to ensure optimal outcomes for vulnerable at risk  neonates."}, {"id": 211, "title": "Literature review informs clinical guidelines for pain management during screening and laser photocoagulation for retinopathy of prematurity.", "authors": "Pirelli, Anna; Savant Levet, Patrizia; Garetti, Elisabetta et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2019", "vol": "108(4):593-599", "doi": "10.1111/apa.14523", "abstract": "AIM: The aim of this study was to carry out a literature review and develop clinical guidelines for pain prevention and control during screening and laser  photocoagulation for retinopathy of prematurity (ROP) in neonatal intensive care  units (NICUs). METHODS: The Italian Society of Neonatology assessed papers  published between 1986 and June 2017 and used the Grading of Recommendations,  Assessment, Development and Evaluation approach, to develop new guidelines on  pain and ROP. RESULTS: The Society's pain experts assessed the full texts of 47  papers, including randomised or quasi-randomised controlled trials and  case-control studies on nonpharmacological and pharmacological measures used in  NICUs during the screening and laser photocoagulation of neonates for ROP. The  literature suggested methods for reducing the stress and pain associated with ROP  screening procedures. The panel concluded that the literature showed that it was  feasible to provide laser photocoagulation for ROP in spontaneously breathing  patients with adequate analgesia. CONCLUSION: This literature review on managing  pain in infants with ROP in NICUs led to the development of national guidelines,  which will help physicians and nurses to reduce the stress and pain experienced  by premature newborn infants during unavoidable screening and treatment for ROP."}, {"id": 212, "title": "Ibuprofen for Pain Control in Children: New Value for an Old Molecule.", "authors": "Poddighe, Dimitri; Brambilla, Ilaria; Licari, Amelia et al.", "journal": "Pediatric emergency care", "year": "2019", "vol": "35(6):448-453", "doi": "10.1097/PEC.0000000000001505", "abstract": "BACKGROUND: Acute pain is one of the major complaints reported in pediatric emergency departments and general wards. Recently, both the US Food and Drug  Administration and European Medicine Agency emitted some warnings regarding the  use of opioids, including codeine, in children. OBJECTIVE: The aims of this study  were summarizing the main pharmacological aspects of ibuprofen, discussing the  current evidence about the use of ibuprofen in different and specific clinical  settings, and providing a comparison with acetaminophen and/or codeine, according  to available studies. STUDY DESIGN AND METHODS: Studies evaluating ibuprofen for  the management of acute pain in children were extracted from the PubMed and  MEDLINE database within the period ranging from 1985 through 2017. After  discussing safety of ibuprofen and its concomitant use with acetaminophen, the  specific indications for the clinical practice were considered. RESULTS:  Ibuprofen resulted to be more effective than acetaminophen, and comparable to the  combination acetaminophen-codeine, for the control of acute pain related to  musculoskeletal pain. Moreover, similar results have been reported also in the  management of toothache and inflammatory diseases of the oral cavity and pharynx.  Ibuprofen resulted to be useful as a first approach to episodic headache.  Finally, the role of ibuprofen in the management of postoperative pain and,  particularly, after tonsillectomy and/or adenoidectomy has been reconsidered  recently. CONCLUSIONS: Ibuprofen resulted to be the most studied nonsteroidal  anti-inflammatory drug in the management of acute pain in children; in general,  it showed a good safety profile and provided evidence of effectiveness, despite  some differences according to the specific clinical context."}, {"id": 213, "title": "Defining characteristics and related factors of the nursing diagnosis for ineffective breathing pattern", "authors": "Prado, Patricia Rezende do; Bettencourt, Ana Rita de Cássia; Lopes, Juliana de Lima", "journal": "Rev. Bras. Enferm. (Online)", "year": "2019", "vol": "72(1):221-230", "doi": "10.1590/0034-7167-2018-0061", "abstract": "ABSTRACT  Objective: To identify in the literature the defining characteristics and related factors of the nursing diagnosis \"ineffective breathing pattern\".  Method: Integrative review with the steps: problem identification, literature search, evaluation and analysis of data and presentation of results.  Results: Twenty articles and two dissertations were included. In children, the most prevalent related factor was bronchial secretion, followed by hyperventilation. The main defining characteristics were dyspnea, tachypnea, cough, use of accessory muscles to breathe, orthopnea and adventitious breath sounds. Bronchial secretion, cough and adventitious breath sounds are not included in the NANDA-International (NANDA-I). For adults and older adults, the related factors were fatigue, pain and obesity and the defining characteristics were dyspnea, orthopnea and tachypnea.  Conclusion: This diagnosis manifests differently according to the patients' age group. It was observed that some defining characteristics and related factors are not included in the NANDA-I. Their inclusion can improve this nursing diagnosis."}, {"id": 214, "title": "The impact of parent-targeted eHealth educational interventions on infant procedural pain management: a systematic review protocol.", "authors": "Richardson, Brianna; Benoit, Britney; Rutledge, Kallen et al.", "journal": "JBI database of systematic reviews and implementation reports", "year": "2019", "vol": "17(8):1589-1599", "doi": "10.11124/JBISRIR-D-19-00007", "abstract": "OBJECTIVE: The objective of this review is to determine if electronic health (eHealth) educational interventions for infant procedural pain and pain  management impact parental outcomes (mental health outcomes, knowledge  utilization outcomes, and parental involvement in care outcomes) and infant  outcomes (morbidity outcomes, pain outcomes, health system outcomes).  INTRODUCTION: Pain in infants is a common concern for parents. Routine postpartum  care for infants in early life requires them to endure painful procedures, yet  infants often receive little to no pain management. While research has shown that  parents can reduce their infant's pain during procedures by breastfeeding or  skin-to-skin contact, parents may not be aware of their role in pain management.  Despite the recent rapid increase in eHealth resources to educate parents about  infant pain management, their impact has yet to be evaluated. INCLUSION CRITERIA:  This review will consider studies that include eHealth educational interventions  targeted at parents during pregnancy and up to one year postpartum. All  experimental study designs will be included. Primary outcomes will include:  parental stress and anxiety, self-efficacy, knowledge, attitudes, eHealth  intervention usage, acceptance of eHealth intervention, involvement in pain  management, and infant pain response. METHODS: PubMed, CINAHL, PsycINFO, Embase,  Scopus, Web of Science, and SciELO will be searched for studies published in  English. Critical appraisal and data extraction will be conducted by two  independent reviewers using standardized tools. Quantitative data, where  possible, will be pooled in statistical meta-analysis, or if statistical pooling  is not possible, the findings will be reported narratively."}, {"id": 215, "title": "Efectividad de un protocolo para la atención del dolor en neonatos menores de 1 500 gramos", "authors": "Robaina Castellanos, Gerardo Rogelio; Pérez Llorca, Lisset; Riesgo Rodríguez, Solangel de la Caridad", "journal": "Rev. cuba. pediatr", "year": "2019", "vol": "91(2):e701-e701", "doi": "", "abstract": "Introducción: La atención al dolor resulta prioritaria en las unidades de cuidados intensivos neonatales. No se recogen antecedentes en Cuba de implementación de algún protocolo para el abordaje del dolor en neonatos, que no se limite solamente al tratamiento farmacológico durante la asistencia respiratoria o cirugía neonatal.  Objetivo: Determinar la efectividad de un protocolo para la prevención y alivio del dolor en recién nacidos menor de  500 gramos, basado principalmente en las recomendaciones de la Sociedad Iberoamericana de Neonatología.  Métodos: Estudio basado en las recomendaciones de la Sociedad Iberoamericana de Neonatología, de tipo analítico prospectivo de ANTES y DESPUÉS en 55 neonatos menor de 1500 gramos, nacidos en el Hospital Ginecoobstétrico Docente Provincial de Matanzas en el período marzo/2016 a marzo/2018, en el cual se comparó la intensidad del dolor según la escala COMFORTneo aplicada durante la realización de tres procederes: inserción del catéter venoso umbilical, inserción de catéter percutáneo y punción del talón, en dos grupos de pacientes: un grupo antes (n=29) y un grupo después de aplicar el protocolo de dolor (n=26). Para el análisis de variables se empleó el coeficiente de Spearman. Se consideró significativo todo valor p menor de 0,05.  Resultados: El peso promedio de los neonatos estudiados fue 1 180 gramos. Luego de la implementación del protocolo se observó una disminución significativa en la intensidad del dolor durante la realización de los procederes seleccionados. Las medidas no farmacológicas fueron las más empleadas.  Conclusiones: El protocolo implementado es efectivo para lograr disminuir la intensidad del dolor en neonatos menor de 1 500 gramos(AU)"}, {"id": 216, "title": "Safety Issues of Pharmacological Acute Pain Treatment in Children.", "authors": "Rodieux, Frédérique; Piguet, Valérie; Desmeules, Jules et al.", "journal": "Clinical pharmacology and therapeutics", "year": "2019", "vol": "105(5):1130-1138", "doi": "10.1002/cpt.1358", "abstract": "Acute nociceptive pain management in children is a major public health concern. Effective and safe pain treatment is essential, but safety data cannot be simply  extrapolated from adults to children due to pharmacokinetic and pharmacodynamic  specificities. In addition, the frequent absence of child-specific data, the  difficulty to assess drug tolerability, and the infants' inability to communicate  properly and voluntarily report adverse drug reactions make children more  vulnerable to safety issues. Awareness of the possible toxicity of analgesics is  important but should not lead to suboptimal dosing and underuse of analgesia. A  better assessment and individualization of treatment should allow effective  prescribing of analgesics in more secure conditions. This article aims to review  the safety of acetaminophen, nonsteroidal anti-inflammatory drugs, and opioids in  children and the precautions that should be taken."}, {"id": 217, "title": "Hipodermóclise Para Tratamentos Não Convencionais Em Pediatria: Revisão Integrativa [Hipodermoclisis Para Tratamientos No Convencionales En Pediatría: Revisión Integrativa]", "authors": "Saganski, Gabrielle Freitas; Freire, Márcia Helena de Souza; Peres, Aneís Louise et al.", "journal": "Cogitare enferm", "year": "2019", "vol": "24", "doi": "", "abstract": ""}, {"id": 218, "title": "Considerations for neonatal and pediatric pain management.", "authors": "Shah, Pooja; Siu, Anita", "journal": "American journal of health-system pharmacy : AJHP : official journal of the American Society of Health-System Pharmacists", "year": "2019", "vol": "76(19):1511-1520", "doi": "10.1093/ajhp/zxz166", "abstract": "PURPOSE: Current literature and clinical practice guidelines on pediatric pain management are reviewed. SUMMARY: Acute pain is commonly present in neonatal and  pediatric patients due to underlying disease states or procedures. Especially in  institutions with limited pediatric pain services, it is imperative to describe  the appropriate management of pain and pharmacotherapy options that are effective  and safe in pediatric patients. Despite the knowledge of pain being an important  aspect in the management of children, barriers exist, leading to suboptimal  treatment. Addressing these barriers through education of healthcare  practitioners, families, and patients will lead to optimizing the patient pain  experience. Tools for pain assessment vary depending on the type of pain, the  child's age and understanding of pain, and the clinical situation.  Pharmacotherapy options for pain management in neonates and pediatric patients  include opioid and nonopioid agents. Efficacy and safety data on the use of  medications for the treatment of pain in pediatric patients is described. The  delivery of medication encompasses patient-specific factors and preferences.  Strategies for opioid stewardship and management of iatrogenic withdrawal pose a  unique challenge in pediatric patients. CONCLUSION: The management of acute pain  in neonates and pediatric patients should be a priority for all practitioners  caring for these patients. Use of age-appropriate pain assessment tools and  understanding of the mechanisms of action and roles in therapy of various  nonopioid and opioid therapies can help optimize treatment of pain in neonatal  and pediatric patients."}, {"id": 219, "title": "Care management for the hospitalized child with chronic cancer pain: intervening conditions", "authors": "Silva, Thiago Privado da; Silva, Laura Johanson da; Rodrigues, Benedita Maria Rêgo Deusdará et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2019", "vol": "72(supl.1):181-188", "doi": "10.1590/0034-7167-2017-0514", "abstract": "ABSTRACT  Objective: To understand the intervening conditions of care management for the hospitalized child with chronic cancer pain.  Method: Qualitative research, anchored in the methodological and theoretical frameworks, respectively, Grounded Theory and Complex Thinking. The semi-structured interview and non-participant observation were used to collect the data. Twenty-one health professionals, organized in three sample groups: nurses; nursing technicians; and professionals of the multiprofessional health staff.  Results: They emerged as intervening conditions of care management: human resources and materials, teamwork, absenteeism, professional relocation, professional qualification, family, playful, dialogue, empathy and caring relationship.  Conclusion: It was understood as limiting conditions for care management: deficits of human resources and materials, absenteeism, ineffective teamwork, professional relocation, and insufficient professional qualification. On the other hand, they were presented as facilitating conditions: adequate professional knowledge, effective teamwork, dialogue, empathy, playful and affective relationship with the child."}, {"id": 220, "title": "Fortalezas y debilidades en el uso de la lactancia materna exclusiva en madres indígenas de la ciudad de Riobamba en Ecuador", "authors": "Solís Cartas, Urbano; Cevallos Paredes, Keylee Alexandra; Castillo Ruiz, Lorena Elizabeth et al.", "journal": "Rev. cuba. med. mil", "year": "2019", "vol": "48(4):e364-e364", "doi": "", "abstract": "Introducción:  La leche materna ha sido considerada como el alimento ideal a ser administrado de forma exclusiva en lactantes hasta los 6 meses. Su utilización se ha asociado a disminución de la morbilidad y mortalidad infantil.  Objetivo:  Determinar las fortalezas y debilidades que inciden en la implementación de la lactancia materna exclusiva en madres pertenecientes a la provincia de Chimborazo.  Métodos:  Se realizó un estudio descriptivo en 171 madres, a las cuales se les aplicó un cuestionario que permitió obtener información relacionada con sus características generales, así como las fortalezas y debilidades que influyeron en la implementación de la lactancia materna exclusiva.  Resultados: Promedio de edad de 27 años; predominaron las pacientes casadas (54,38 por ciento), con primaria terminada (46,78 por ciento) y con un único hijo (39,19 por ciento). El 54,38 por ciento de las madres aplicó correctamente la lactancia materna exclusiva. La fortaleza que mayor significación presentó fue la relacionada con el mejor crecimiento de los niños (88,17 por ciento) y la debilidad más referida fue la falta de descanso de la madre (24,36 por ciento).  Conclusiones:  Existen bajos niveles de utilización de la lactancia materna exclusiva motivados por debilidades como la falta de descanso de la madre, el dolor en los pezones al lactar y la falta de información sobre lactancia materna exclusiva. Las fortalezas para su uso incluyen fundamentalmente el mejor crecimiento y desarrollo del niño, la prevención de enfermedades y la desnutrición(AU)"}, {"id": 221, "title": "Managing Procedural Pain in the Neonate Using an Opioid-sparing Approach.", "authors": "Squillaro, Anthony; Mahdi, Elaa M.; Tran, Nhu et al.", "journal": "Clinical therapeutics", "year": "2019", "vol": "41(9):1701-1713", "doi": "10.1016/j.clinthera.2019.07.014", "abstract": "PURPOSE: Pain in the neonate is often challenging to assess but important to control. Physicians often must balance the need for optimal pain control with the  need to minimize oversedation and prolonged opioid use. Both inadequate pain  control and overuse of opioids can have long-term consequences, including poor  developmental outcomes. The aim of this review is to introduce a comprehensive  approach to pain management for physicians, nurses, and surgeons caring for  critically ill neonates, focusing on nonopioid alternatives to manage procedural  pain. FINDINGS: After review, categories of opioid-sparing interventions  identified included (1) nonopioid pharmacologic agents, (2) local and regional  anesthesia, and (3) nonpharmacologic alternatives. Nonopioid pharmacologic agents  identified for neonatal use included acetaminophen, NSAIDs, dexmedetomidine, and  gabapentin. Local and regional anesthesia included neuraxial blockade (spinals  and epidurals), subcutaneous injections, and topical anesthesia. Nonpharmacologic  agents uniquely available in the neonatal setting included skin-to-skin care,  facilitated tucking, sucrose, breastfeeding, and nonnutritive sucking.  IMPLICATIONS: The use of various pharmacologic and interventional treatments for  neonatal pain management allows for the incorporation of opioid-sparing  techniques in neonates who are already at risk for poor neurodevelopmental  outcomes. A multifactorial approach to pain control is paramount to optimize  periprocedural comfort and to minimize the negative sequelae of uncontrolled pain  in the neonate."}, {"id": 222, "title": "Changes in Pain Score Associated With Clinically Meaningful Outcomes in Children With Acute Pain.", "authors": "Tsze, Daniel S.; Hirschfeld, Gerrit; von Baeyer, Carl L. et al.", "journal": "Academic emergency medicine : official journal of the Society for Academic Emergency Medicine", "year": "2019", "vol": "26(9):1002-1013", "doi": "10.1111/acem.13683", "abstract": "BACKGROUND: Identifying changes in pain score associated with clinically meaningful outcomes is necessary when using self-report measures to assess pain  in children. We aimed to determine the changes in pain score associated with a  minimum clinically significant difference (MCSD), ideal clinically significant  difference (ICSD), and patient-perceived adequate analgesia (PPAA) and to  evaluate for differences based on initial pain intensity and patient  characteristics. METHODS: This was a cross-sectional study of children 6 to 17  and 4 to 17 years old who were assessed using the Verbal Numerical Rating Scale  (VNRS) and Faces Pain Scale-Revised (FPS-R), respectively. Children qualitatively  described any endorsed change in pain score; those who received an analgesic were  asked if they wanted additional analgesics to decrease their pain intensity. We  used a receiver operating characteristic curve-based methodology to identify  changes in pain score associated with \"a little less\" and \"much less\" pain (MCSD  and ICSD, respectively) and patients declining additional analgesics because of  adequate analgesia (PPAA). RESULTS: We enrolled 431 children with painful  conditions. For the VNRS, raw change and percent reductions in pain scores  associated with MCSD, ICSD, and PPAA were 2/10 and 20%, 3/10 and 44%, and 2/10  and 29%, respectively, and for the FPS-R, 2/10 and 33%, 4/10 and 60%, and 4/10  and 40%, respectively. Raw change in pain scores increased with increasing  initial pain intensity, but percent reductions remained stable. There were no  significant differences based on patient characteristics such as age, sex, and  race/ethnicity. CONCLUSION: Our findings provide patient-centered outcomes in  children that are suitable for designing trials and are generalizable across  patient characteristics."}, {"id": 223, "title": "Intranasal hydromorphone for treatment of acute pain in children: A pilot study.", "authors": "Tsze, Daniel S.; Pan, Sharon S.; DePeter, Kerrin C. et al.", "journal": "The American journal of emergency medicine", "year": "2019", "vol": "37(6):1128-1132", "doi": "10.1016/j.ajem.2019.03.013", "abstract": "OBJECTIVES: We aimed to describe the analgesic efficacy, duration of analgesia, and adverse event profile associated with intranasal hydromorphone in children  with acute pain presenting to an emergency department. METHODS: Prospective dose  titration pilot study of otherwise healthy children 4 to 17-years-old with  moderate to severe pain who required a parenteral opioid. All patients received  an initial intranasal hydromorophone dose of 0.03 mg/kg. The need for additional  analgesia was assessed at 15 and 30 min; an additional 0.015 mg/kg was given at  each assessment, if required. Need for rescue analgesic, pain intensity and  adverse events were assessed until 6 h after hydromorphone administration or  until patients were discharged, underwent a procedure to treat their painful  condition, or received a rescue analgesic. RESULTS: We enrolled 35 children.  Fifteen, 11, and 9 children required a total dose of 0.03, 0.045, and 0.06 mg/kg,  respectively. Patients in each dose group experienced an absolute decrease in  pain score of ≥3/10 and percent reduction >40% within 5-15 min of completing  dose-titration administration of hydromorphone. Duration of analgesia (i.e. time  until rescue analgesic administered) >1 h was observed in 85.7% of patients.  Patients not requiring rescue analgesics had mild or no pain until discharged or  their painful conditions were treated. Three (8.6%) patients required a rescue  analgesic <1 h after hydromorphone administration. There were no major adverse  events. CONCLUSIONS: Intranasal hydromorphone led to rapid, clinically  significant and frequently sustained decreases in pain intensity in children. No  major adverse events were observed in this preliminary sample. Clinical Trials  Registration Number: NCT02437669."}, {"id": 224, "title": "Tokenism or true partnership: Parental involvement in a child's acute pain care.", "authors": "Vasey, Jackie; Smith, Joanna; Kirshbaum, Marilynne N. et al.", "journal": "Journal of clinical nursing", "year": "2019", "vol": "28(9-10):1491-1505", "doi": "10.1111/jocn.14747", "abstract": "AIMS AND OBJECTIVES: To explore parental involvement in the child's acute pain care and establish ways in which parental preferences for involvement in their  child's care can be identified, facilitated and enhanced by nurses. BACKGROUND:  Despite growing evidence supporting effective acute pain management in children  and the availability of national and international practice guidelines, children  still experience acute pain. Involving parents in their child's pain care has  been identified as being a central tenet of pain management in children. DESIGN  AND METHODS: A qualitative study using an ethnographical approach with  nonparticipant observation and follow-up semi-structured interviews was  undertaken. Nurses (n = 14), parents (n = 41), grandparents (n = 2), other  relative (n = 1) and children (n = 30) participated. The framework approach  underpinned data analysis. Consolidated criteria for reporting qualitative  research (COREQ) enabled comprehensive reporting of the study. RESULTS: Three  concepts emerged from the data: \"parents as advocates for their child,\" \"nurses  promoting involvement and partnership\" and \"nurses unintentionally preventing  involvement and partnership.\" Variations in the way parents were involved in  their child's pain care were identified. Despite family-centred care being the  dominant model of involving families in their child's care, evidence of this  being implemented was limited. Parents attempted to advocate effective pain care  for their child, whether or not they were supported by nurses. CONCLUSIONS:  Parental involvement in their child's acute pain care can improve the child's  pain experience, reduce parental anxiety and increase parents' satisfaction in  care. Nurses aspired to involve parents in pain care, but did not always enact  this in practice. RELEVANCE FOR PRACTICE: Children deserve optimum pain care,  which includes parental involvement. Parental involvement underpinned by the  principles of family-centred care was poorly implemented. Parents attempted to be  involved and advocate for their child's pain care whether or not they were  supported by nurses. An alternative approach for supporting parents to advocate  in their child's acute pain care is offered, the \"Partnership in Pain Care  Model.\""}, {"id": 225, "title": "Analgesia protocols for burns dressings: Challenges with implementation.", "authors": "Wall, S. L.; Clarke, D. L.; Allorto, N. L.", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2019", "vol": "45(7):1680-1684", "doi": "10.1016/j.burns.2019.04.012", "abstract": "BACKGROUND: The aim of this study is to compare doctors' knowledge regarding analgesia in paediatric burns patients in a setting where analgesia protocols are  provided but not reinforced to a setting where the same protocols are used but  with constant re-enforcement from burns surgeons. METHODS: We reviewed  questionnaires completed anonymously by doctors managing burns children in the  Pietermaritzburg (PMB) Hospital Complex and the referral hospitals. RESULTS: The  questionnaire was completed by 43 doctors with 53% of the participants working in  the referral hospitals. Procedural sedation was given by 98% of doctors. All PMB  doctors giving procedural sedation used ketamine compared to 39% in the referral  hospitals, which was statistically significant (×2 = 18.237; p < 0.001). Eighty  percent of PMB doctors were aware of the correct doses of ketamine and compared  to 8% of referral doctors. This was statistically significant (×2 = 21.778;  p < 0.001). When assessing the adequacy of analgesia, all of the doctors from PMB  used a scoring system or clinical impression. In the referral doctor group, 54%  used a scoring system, 38% used the child screaming as an indicator of inadequate  analgesia. CONCLUSION: We have identified a discrepancy in knowledge between  staff in an academic burn centre and those in peripheral referral hospitals. This  discrepancy translates into differences in quality of burn analgesia which  patients receive. Ongoing efforts must be directed towards changing the culture  of district institution and strengthening attempts to standardize care across the  region."}, {"id": 226, "title": "Immersive Virtual Reality for Pediatric Procedural Pain: A Randomized Clinical Trial.", "authors": "Walther-Larsen, Søren; Petersen, Trine; Friis, Susanne M. et al.", "journal": "Hospital pediatrics", "year": "2019", "vol": "9(7):501-507", "doi": "10.1542/hpeds.2018-0249", "abstract": "BACKGROUND AND OBJECTIVES: Pain management in children often is inadequate, and the single most common painful procedure in children who are hospitalized is  needle procedures. Virtual reality (VR) is a promising and engaging intervention  that may help to decrease anxiety and pain in children undergoing painful  procedures. Our aim for this study is to investigate patient satisfaction and  pain reduction by using a three-dimensional VR interactive game as a distraction.  METHODS: In this randomized clinical trial, we enrolled 64 children aged 7 to 16  years who were scheduled for venous cannulation. Patients assigned to the control  group were adherent to our standard of care, including topical numbing cream,  positioning, and distraction by a specialized pain nurse. In the study group,  children were adherent to the standard of care and were distracted by an  interactive VR game. Primary outcomes were patient satisfaction and the  procedural pain assessed by using a visual analog score; secondary outcomes were  the procedural time and any adverse events. RESULTS: We found a high level of  patient satisfaction with using the VR custom-made three-dimensional interactive  game. All children (28 of 28 [
