dermal lacerations. Study characteristics : The evidence is current to December 2016. We included in this review 25 randomized controlled trials involving 3278 participants. Studies included both adults and children. Fifteen of the included trials used self‐reporting of pain intensity by trial participants to determine the effectiveness of local anaesthetics. Key results : Study results suggest that directly applying local anaesthetics to the skin is an effective, non‐invasive way of providing pain control during suturing or stapling of skin lacerations. Study findings on the efficacy of individual topical anaesthetics were limited by study design, and data on the efficacy of each topical agent were obtained mostly from single trials. Researchers reported no serious side effects following the use of cocaine‐containing or cocaine‐free topical anaesthetics. The overall broadly comparable effectiveness of cocaine‐free topical anaesthetics for skin laceration repair brings into question the necessity to include cocaine as a component of local anaesthetic solutions. The small number of trials in each comparison group and the range of outcome measures assessed prevented pooling and quantitative analysis of data for all but the single outcome of pain intensity. Additional studies are necessary to directly compare the effectiveness of different formulations of topical anaesthetics. Our review was limited to pain control for repair of superficial lacerations, and our results might not be generalizable to deeper lacerations or more complex procedures performed on intact skin. Further research is needed to strengthen the evidence and to overcome the weakness of the included studies. Quality of the evidence : The overall quality of the evidence was low owing to limitations in study design, ways that studies were carried out (implementation), imprecision of results and high probability of selective data reporting. Most of the trials that compared infiltrated and topical anaesthetics were at high risk of bias, and this was likely to influence measured effects."}, {"id": 311, "title": "What dilemmas do healthcare workers face looking after children with acute pain?", "authors": "Williams, Glyn", "journal": "Pain management", "year": "2017", "vol": "7(4):279-286", "doi": "10.2217/pmt-2017-0011", "abstract": "There have been significant advances in the treatment of acute pain in children alongside increased academic interest in the field. This has led to improvements  in both efficacy and safety alongside the development of multidisciplinary pain  services. Despite this, however, there are still high rates of acute pain  reported in children in both inpatient and outpatient settings. In this article,  we discuss some of the challenges faced by healthcare workers in designing  effective multidisciplinary treatment regimens, understanding the implications  for long-term pain and pain processing of acute pain and analgesic interventions  as well as ongoing issues around research, education and resource."}, {"id": 312, "title": "Neurobiological Consequences of Early Painful Experience: Basic Science Findings and Implications for Evidence-Based Practice.", "authors": "Young, Erin E.; DʼAgata, Amy; Vittner, Dorothy et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):178-185", "doi": "10.1097/JPN.0000000000000258", "abstract": "As healthcare teams have worked to improve infant survival rates, the management of painful events experienced by these hospitalized neonates has increased and  yet pain management remains highly variable between healthcare institutions. At  the same time, emerging evidence suggests that these early painful experiences  may alter the trajectory of development for pain-processing pathways both  peripherally and centrally. This concise review highlights findings from both the  basic and clinical science literature supporting the hypothesis that early  painful experiences can have long-lasting negative effects on biological,  psychological, and socioemotional functions. Implications for pain management in  neonates and considerations for evidence-based practice change are discussed."}, {"id": 313, "title": "[Breastfeeding for acute pain control on infants: a randomized controlled trial].", "authors": "Zurita-Cruz, Jessie Nallely; Rivas-Ruiz, Rodolfo; Gordillo-Álvarez, Virginia et al.", "journal": "Nutricion hospitalaria", "year": "2017", "vol": "34(2):301-307", "doi": "10.20960/nh.163", "abstract": "Objective: To determine the effectiveness of breastfeeding (BF) for the management in acute pain after vaccination in infants under 6 months of age when  compared to the milk substitute (MS) and not to apply any maneuver. Methods: A  controlled, single-blind phase III clinical trial was conducted on infants under  6 months old to evaluate the effectiveness of BF in acute pain by vaccination.  Divided in 3 groups: BF, milk substitutes (MS), and without applying any  analgesic maneuver (control). Pain was measured by crying time and pediatric pain  scale. Statistical analysis was performed using the Kruskal Wallis and  Mann-Whitney U for quantitative variables. For qualitative data, Chi2 was applied  Kaplan Meier was used to analyze the total time crying. Results: A total of 144  patients were recruited, divided in groups of 48 patients. The group of BF had  fewer crying time (p = 0.007) and pain rating at 90 (p = 0.006) and 120 (p =  0.003) seconds compared with other groups. There was no significant difference in  the crying time (p = 0.396) and the pain scale between the group receiving MR and  control. Conclusions: Breastfeeding is effective in management of acute pain by  vaccination in infants under six months of age compared to milk substitute and  control."}, {"id": 314, "title": "An Order Protocol for Respiratory Distress/Acute Pain Crisis in Pediatric Palliative Care Patients: Medical and Nursing Staff Perceptions.", "authors": "Bidet, Gwenaëlle; Daoust, Lysanne; Duval, Michel et al.", "journal": "Journal of palliative medicine", "year": "2016", "vol": "19(3):306-313", "doi": "10.1089/jpm.2015.0100", "abstract": "BACKGROUND: An order protocol for distress (OPD), including respiratory distress and acute pain crisis, has been established for pediatric palliative care  patients at Sainte-Justine Hospital (SJH). After discussion with the patient/his  or her family, the OPD is prescribed by the attending physician whenever judged  appropriate. The OPD can then be initiated by the bedside nurse when necessary;  the physician is notified after the first dose is administered. OBJECTIVES: The  study objectives were to evaluate the perceptions and experience of the  medical/nursing staff towards the use of the OPD. METHODS: A survey was  distributed to all physicians/nurses working on wards with pediatric palliative  care patients. Answers to the survey were anonymous, done on a voluntary basis,  and after consent of the participant. RESULTS: Surveys (258/548) were answered  corresponding to a response rate of 47%. According to the respondents, the most  important motivations in using the OPD were the desire to relieve patient's  distress and the speed of relief of distress by the OPD; the most important  obstacles were going against the patient's/his or her family's wishes and fear of  hastening death. The respondents reported that the OPD was frequently (56%) or  always (36%) effective in relieving the patient's distress. The respondents felt  sometimes (16%), frequently (34%), or always (41%) comfortable in giving the OPD.  They thought the OPD could never (12%), rarely (32%), sometimes (46%), frequently  (8%), or always (1%) hasten death. Physicians were less favorable than nurses  with the autonomy of bedside nurses to initiate the OPD before notifying the  physician (p = 0.04). Overall, 95% of respondents considered that they would use  the OPD in the future. CONCLUSIONS: Data from this survey shows that respondents  are in favor of using the OPD at SJH and find it effective. Further training as  well as support for health care professionals are mandatory in such palliative  care settings."}, {"id": 315, "title": "Uso de métodos frente al dolor durante la venopunción en niños", "authors": "Castro Cuervo, Coral; Sanchez Alonso, Paula", "journal": "Nure Investigación", "year": "2016", "vol": "83", "doi": "", "abstract": ""}, {"id": 316, "title": "Conhecimento dos profissionais de saúde na avaliação e tratamento da dor neonatal", "authors": "Christoffel, Marialda Moreira; Castral, Thaíla Corrêa; Daré, Mariana Firmino et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2016", "vol": "69(3):552-558", "doi": "10.1590/0034-7167.2016690319i", "abstract": "RESUMO  Objetivo: identificar o conhecimento dos profissionais de saúde sobre o manejo, avaliação e tratamento da dor em uma unidade neonatal, de um município do Rio de Janeiro.  Método: estudo descritivo, exploratório, com análise quantitativa. Os dados foram analisados no software R. Core team.  Resultados: dos 96 profissionais de saúde, responderam ao questionário 42 auxiliares/técnicos de enfermagem, 22 enfermeiros, 20 médicos e 02 fisioterapeutas. Destaca-se que quanto a coordenar/realizar/auxiliar no cuidado da dor do bebê enquanto o profissional realiza procedimentos (punção lombar, inserção de dreno torácico e cateter central), 40,5% dos auxiliares/técnicos, 50% dos médicos e 50% dos fisioterapeutas concordam. Houve diferença significativa de concordância em relação aos auxiliares/técnicos e médicos. A maioria (69,8%) dos profissionais de saúde conhece alguma medida não farmacológica efetiva para o alívio da dor aguda.  Conclusão: constata-se a necessidade de programa de intervenção educativa, com a participação dos envolvidos, no processo de mudança da prática profissional."}, {"id": 317, "title": "Utilização de medidas não farmacológicas pela equipe de enfermagem para alívio da dor neonatal", "authors": "Costa, Luana Cavalcante; Souza, Mariana Gonzaga de; Sena, Erika Maria Araújo Barbosa et al.", "journal": "Rev. enferm. UFPE on line", "year": "2016", "vol": "10(7):2395-2403", "doi": "10.5205/reuol.9106-80230-1-SM1007201613", "abstract": "Objetivo: conhecer como a equipe de enfermagem utiliza as medidas não farmacológicas para alívio da dor neonatal. Método: estudo descritivo, com abordagem qualitativa, realizado com 26 profissionais da equipe de enfermagem, em hospital escola de Maceió/AL, entre agosto de 2014 e julho de 2015. Foram realizadas entrevistas semiestruturadas; em seguida, transcritas e analisadas pela Técnica de Análise de Conteúdo, na modalidade Categorial. Resultados: foram apresentadas categorias << A enfermagem na identificação da dor neonatal >>, << Procedimentos potencialmente dolorosos e as intervenções da equipe de enfermagem >> e << A utilização de Medidas Não Farmacológicas no manejo da dor neonatal>>. Conclusão: apesar dos profissionais avaliarem a dor neonatal por meio da observação de alterações comportamentais e/ou fisiológicas, não utilizam escalas de dor no setor/serviço como instrumento auxiliar na sistematização dos cuidados relacionados à dor.(AU)"}, {"id": 318, "title": "Desconforto e dor em recém-nascido: reflexões da enfermagem neonatal", "authors": "Costa, Roberta; Cordeiro, Raquel Alves", "journal": "Rev. Enferm. UERJ (Online)", "year": "2016", "vol": "24(1):e11298-e11298", "doi": "10.12957/reuerj.2016.11298", "abstract": "Objetivo: promover um processo de reflexão junto à equipe de enfermagem sobre o manejo do desconforto e da dor em recém-nascido (RN). Método: pesquisa convergente-assistencial realizada em uma unidade neonatal do sul do Brasil. Os participantes foram 16 profissionais da equipe de enfermagem. A coleta de dados ocorreu nos meses de outubro e novembro de 2012, através de grupos de reflexão sustentados pelo referencial teórico da Pedagogia Libertadora. Resultados: da prática educativa, emergiram três categorias: os estímulos ambientais provocam dor e desconforto no RN; procedimentos invasivos como principais causadores da dor em RN; e a enfermagem reconhece os sinais álgicos no bebê. Conclusão: os resultados demonstram a preocupação dos profissionais de saúde com a identificação da dor, a necessidade de minimizar os estímulos ambientais e a importância do uso de medidas não farmacológicas e farmacológicas, principalmente durante os procedimentos invasivos, evitando implicações no desenvolvimento neuropsicomotor do recém-nascido."}, {"id": 319, "title": "Hand-held computers can help to distract children undergoing painful venipuncture procedures.", "authors": "Crevatin, Franca; Cozzi, Giorgio; Braido, Elena et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2016", "vol": "105(8):930-934", "doi": "10.1111/apa.13454", "abstract": "AIM: Needle-related procedures can be painful for children, and distraction provides ideal pain relief in blood-drawing centres. This study assessed the  effectiveness of playing a computer game during venipuncture, compared with  low-tech distraction by a nurse. METHODS: We conducted this prospective,  randomised controlled trial at the blood-drawing centre of a tertiary-level  children's hospital in Italy. Half of the 200 children played Angry Birds on a  hand-held computer while the other half were distracted by a second, specifically  trained nurse who sang to them, read a book, blew bubbles or played with puppets.  Pain was measured using a faces pain scale for children aged 4-7 years and a  numeric scale for children aged 8-13 years. RESULTS: The 200 children had a  median age of eight years. Children reported significant pain in 16 cases (16%)  in the hand-held computer distraction group and in 15 cases (15%) in the  nurse-led low-tech distraction group (p = 0.85). The procedural success rate at  the first attempt was not different in the two groups. CONCLUSION: Playing a game  on a hand-held computer meant that only one in six children reported pain during  venipuncture, but it was not superior to being distracted by nurses."}, {"id": 320, "title": "Current practice of acute pain management in children-a national follow-up survey in Germany.", "authors": "Emons, Miriam I.; Petzke, Frank; Stamer, Ulrike M. et al.", "journal": "Paediatric anaesthesia", "year": "2016", "vol": "26(9):883-890", "doi": "10.1111/pan.12947", "abstract": "OBJECTIVES: This study aimed to summarize the current standard practices for acute pain management in children in Germany and the implementation of these  procedures. The last survey on acute pain management in children was performed in  1999, highlighting the need for an up to date review. METHODS: A questionnaire  was mailed to German departments of anesthesiology (n = 885), asking for  structures and processes of acute pain management in children. Results were  compared between hospitals with and without an acute pain service and with and  without a pediatric department. RESULTS: Of the 407 responding hospitals  (response rate of 46%), 342 treated children younger than 14 years. These were  considered for analysis. Of the 342 hospitals, 42% contained either a general  pediatric department or a department of pediatric surgery, and the majority of  the responding hospitals had an acute pain service (83%). Pain intensities were  measured at least once per shift in 40% of the institutions, and at least once or  twice a day in 27%. Of the institutions, 31% did not document pain scores  regularly, without any difference between hospitals with or without a pediatric  department. Standard operating procedures for acute pain management existed in  68% of the hospitals, with large differences in content and length. Opioids were  administered to children in 85% of the hospitals. Nonopioid analgesics were the  first choice baseline analgesics in most hospitals. Peripheral regional and  epidural analgesia were performed in children in 18% and 8% of the hospitals,  respectively (21%/16% with a paediatric department, 16%/1% without; P < 0.001).  CONCLUSION: Current practice of pediatric pain management varied widely and the  recommendations of guidelines, like regular pain management, were frequently not  met. However, improvements could be observed since 1999, for example, an increase  in regular pain measurements (4% vs 67%). Furthermore, pain management in  hospitals running a pediatric department had a higher degree of organization, and  more sophisticated analgesic techniques."}, {"id": 321, "title": "A ludoterapia e a criança hospitalizada na perspectiva dos pais", "authors": "Fioreti, Fernanda Cristina Custodia de Faria; Manzo, Bruna Figueredo; Regino, Alline Esther Ferreira", "journal": "REME rev. min. enferm", "year": "2016", "vol": "20:e-974", "doi": "10.5935/1415-2762.20160044", "abstract": "A hospitalização traz transtornos que, na infância, tornam-se mais evidentes nas manifestações de insatisfação momentânea ou prejuízos, podendo permanecer mesmo após a alta hospitalar. Na Pediatria as crianças são submetidas a procedimentos dolorosos, além de depararem com situações variadas como a presença constante de pessoas estranhas ao seu convívio habitual, como profissionais de saúde de diversas áreas, outros pacientes internados e seus acompanhantes. Nesse cenário, a aplicação da ludoterapia no meio hospitalar transforma-se em um método benéfico no processo de adaptação da criança. Trata-se de pesquisa qualitativa, descritiva, que buscou analisar o uso do brincar na assistência à criança hospitalizada na perspectiva dos pais. O estudo foi realizado na Pediatria de um Hospital Municipal de Belo Horizonte-MG. Foram entrevistados 13 pais por meio de roteiro semiestruturado e realizada a análise de conteúdo, segundo Bardin, para interpretação dos dados. Os achados evidenciaram que o brincar é instrumento de grande valor para minimizar o estresse da internação e contribuir para melhor adaptação da criança ao ambiente hospitalar. Ademais, o mesmo traz benefícios referentes à promoção do bem-estar, diversão, redução da dor e socialização durante a hospitalização. Concluiu-se, dessa maneira, que a utilização do brincar pode ser muito benéfica na rotina da Pediatria, favorecendo um cuidado mais humanizado e integral, além da possibilidade de diminuir os prejuízos no desenvolvimento da criança, causados pela experiência da hospitalização."}, {"id": 322, "title": "Mitigando el dolor durante la punción venosa en una población pediátrica: un estudio factorial aleatorizado", "authors": "García Molina, Pablo", "journal": "Enferm Clínica", "year": "2016", "vol": "26(6):396-398", "doi": "", "abstract": ""}, {"id": 323, "title": "Vapocoolants (cold spray) for pain treatment during intravenous cannulation", "authors": "Griffith, RJ; Jordan, V; Herd, D et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2016", "vol": "4", "doi": "10.1002/14651858.CD009484.pub2", "abstract": "Abstract - Background Intravenous cannulation is a painful procedure that can provoke anxiety and stress. Injecting local anaesthetic can provide analgesia at the time of cannulation, but it is a painful procedure. Topical anaesthetic creams take between 30 and 90 minutes to produce an effect. A quicker acting analgesic allows more timely investigation and treatment. Vapocoolants have been used in this setting, but studies have reported mixed results. Objectives To determine effects of vapocoolants on pain associated with intravenous cannulation in adults and children. To explore variables that might affect the performance of vapocoolants, including time required for application, distance from the skin when applied and time to cannulation. To look at adverse effects associated with the use of vapocoolants. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), MEDLINE, EMBASE, Latin American Caribbean Health Sciences Literature (LILACS), the Cumulative Index to Nursing and Allied Health Literature (CINAHL), the Institute for Scientific Information (ISI) Web of Science and the  http://clinicaltrials.gov/ ,  http://www.controlled‐trials.com/  and  http://www.trialscentral.org/  databases to 1 May 2015. We applied no language restrictions. We also scanned the reference lists of included papers. Selection criteria We included all blinded and unblinded randomized controlled trials (RTCs) comparing any vapocoolant with placebo or control to reduce pain during intravenous cannulation in adults and children. Data collection and analysis Three review authors independently assessed trial quality and extracted data, contacted study authors for additional information and assessed included studies for risk of bias. We collected and analysed data for the primary outcome of pain during cannulation, and for the secondary outcomes of pain associated with application of the vapocoolant, first attempt success rate of intravenous cannulation, adverse events and participant satisfaction. We performed subgroup analyses for the primary outcome to examine differences based on age of participant, type of vapocoolant used, application time of vapocoolant and clinical situation (emergency vs elective). We used random‐effects model meta‐analysis in RevMan 5.3 and assessed heterogeneity between trial results by examining forest plots and calculating the I 2  statistic. Main results We found nine suitable studies of 1070 participants and included them in the qualitative analyses. We included eight studies of 848 participants in the meta‐analysis for the primary outcome (pain during intravenous cannulation). Use of vapocoolants resulted in a reduction in pain scores as measured by a linear 100 mm visual analogue scale (VAS 100) compared with controls (difference between means ‐12.5 mm, 95% confidence interval (CI) ‐18.7 to ‐6.4 mm; moderate‐quality evidence). We could not include in the meta‐analysis one study, which showed no effects of the intervention. Use of vapocoolants resulted in increased pain scores at the time of application as measured by a VAS 100 compared with controls (difference between means 6.3 mm, 95% CI 2.2 to 10.3 mm; four studies, 461 participants; high‐quality evidence) and led to no difference in first attempt success compared with controls (risk ratio (RR) 1.00, 95% CI 0.94 to 1.06; six studies, 812 participants; moderate‐quality evidence). We documented eight minor adverse events reported in 279 vapocoolant participants (risk difference (RD) 0.03, 95% CI 0 to 0.05; five studies, 551 participants; low quality‐evidence). The overall risk of bias of individual studies ranged from low to high, with high risk of bias for performance and detection bias in four studies. Sensitivity analysis showed that exclusion of studies at high or unclear risk of bias did not materially alter the results of this review. Authors' conclusions Moderate‐quality evidence indicates that use of a vapocoolant immediately before intravenous cannulation reduces pain during the procedure. Use of vapocoolant does not increase the difficulty of cannulation nor cause serious adverse effects but is associated with mild discomfort during application. Plain language summary Vapocoolants (cold spray) for pain treatment during intravenous cannulation Background Intravenous cannulation for blood tests or treatment is a common, often painful, procedure. Vapocoolant sprays or \"cold sprays\" are delivered onto the skin just before needle insertion to provide some pain relief. Vapocoolants offer several advantages over other pain relief techniques, particularly their rapid effects (a few seconds). We reviewed the evidence showing how effective vapocoolants are in reducing the pain associated with inserting an intravenous cannula. The evidence is current to May 2015. Results We identified nine studies of 1070 participants that compared use of vapocoolants with use of placebo spray, or no spray, in children and adults undergoing intravenous cannulation in any healthcare setting. Investigators in three studies received funding from a source not reported to be involved in the study design and analysis. Vapocoolant manufacturers provided vapocoolant and placebo sprays for two studies, and were not involved in study design nor in analysis of results. We found that vapocoolants are likely to reduce pain during intravenous cannulation and are not likely to make cannulation more difficult nor cause serious adverse events. We noted that application of vapocoolants caused some discomfort, but that using the spray resulted in reduced pain. Using a pain score range from 0 to 100 mm (0 = no pain and 100 = worst possible pain), we found that average pain scores were reduced by 12.5 mm in participants receiving vapocoolant spray. Quality of the evidence Overall, the quality of the evidence was moderate rather than high. However, excluding studies of poorer quality did not materially alter the results of the review."}, {"id": 324, "title": "Improving postoperative pain management in children by providing regular training and an updated pain therapy concept.", "authors": "Heinrich, M.; Mechea, A.; Hoffmann, F.", "journal": "European journal of pain (London, England)", "year": "2016", "vol": "20(4):586-593", "doi": "10.1002/ejp.770", "abstract": "BACKGROUND: In recent years, children's hospitals have increasingly implemented postoperative pain management protocols to reduce postoperative pain and improve  patient satisfaction. The effectiveness and long-term sustainability of such  protocols have rarely been studied. Therefore, we conducted a prospective  intervention study to assess the impact of regular training and improvement of  clinical processes on the quality of postoperative pain management. METHODS: We  conducted an initial assessment of the status quo of postoperative pain  management (Audit 1) followed by repeated training and improvement of clinical  processes (analgesic pocket card, parents' brochure, modification of the patient  chart, bimonthly advanced trainings sessions) and a follow-up review after  3 years (Audit 2). We used a data entry form, a patient survey, and an anonymous  questionnaire for the nursing staff as measurement tools. RESULTS: Our analysis  included a total of 93 and 85 patients in the initial and final audits. The  return rates of the nursing staff questionnaire were 83% (Audit 1) and 77% (Audit  2). The training and process improvements resulted in significant improvement in  the administration of analgesics for pain requiring treatment, the control of  pain measurement after the administration of analgesics and the use of  non-pharmacological pain therapies. The patients reported faster administration  of analgesics for acute pain and improved pain relief following the intervention.  CONCLUSIONS: Repeated training and improvement of clinical processes can  significantly improve the long-term quality of postoperative pain management in  children with a tolerable amount of effort on the part of health care  professionals and institutions."}, {"id": 325, "title": "Current concepts in management of pain in children in the emergency department.", "authors": "Krauss, Baruch S.; Calligaris, Lorenzo; Green, Steven M. et al.", "journal": "Lancet (London, England)", "year": "2016", "vol": "387(10013):83-92", "doi": "10.1016/S0140-6736(14)61686-X", "abstract": "Pain is common in children presenting to emergency departments with episodic illnesses, acute injuries, and exacerbation of chronic disorders. We review  recognition and assessment of pain in infants and children and discuss the  manifestations of pain in children with chronic illness, recurrent pain  syndromes, and cognitive impairment, including the difficulties of pain  management in these patients. Non-pharmacological interventions, as adjuncts to  pharmacological management for acute anxiety and pain, are described by age and  development. We discuss the pharmacological management of acute pain and anxiety,  reviewing invasive and non-invasive routes of administration, pharmacology, and  adverse effects."}, {"id": 326, "title": "Co‐bedding in neonatal nursery for promoting growth and neurodevelopment in stable preterm twins", "authors": "Lai, NM; Foong, SC; Foong, WC et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2016", "vol": "4", "doi": "10.1002/14651858.CD008313.pub3", "abstract": "Abstract - Background The increased birth rate of twins during recent decades and the improved prognosis of preterm infants have resulted in the need to explore measures that could optimize their growth and neurodevelopmental outcomes. It has been postulated that co‐bedding simulates twins' intrauterine experiences in which co‐regulatory behaviors between them are observed. These behaviors are proposed to benefit twins by reducing their stress, which may promote growth and development. However, in practice, uncertainty surrounds the benefit‐risk profile of co‐bedding. Objectives We aimed to assess the effectiveness of co‐bedding compared with separate (individual) care for stable preterm twins in the neonatal nursery in promoting growth and neurodevelopment and reducing short‐ and long‐term morbidities, and to determine whether co‐bedding is associated with significant adverse effects. As secondary objectives, we sought to evaluate effects of co‐bedding via the following subgroup analyses: twin pairs with different weight ranges (very low birth weight [VLBW] < 1500 grams vs non‐VLBW), twins with versus without significant growth discordance at birth, preterm versus borderline preterm twins, twins co‐bedded in incubator versus cot at study entry, and twins randomized by twin pair versus neonatal unit. Search methods We used the standard search strategy of the Cochrane Neonatal Review Group (CNRG). We used keywords and medical subject headings (MeSH) to search the Cochrane Central Register of Controlled Trials (CENTRAL; 2016, Issue 2), MEDLINE (via PubMed), EMBASE (hosted by EBSCOHOST), the Cumulative Index to Nursing and Allied Health Literature (CINAHL), and references cited in our short‐listed articles, up to February 29, 2016. Selection criteria We included randomized controlled trials with randomization by twin pair and/or by neonatal unit. We excluded cross‐over studies. Data collection and analysis We extracted data using standard methods of the CNRG. Two review authors independently assessed the relevance and risk of bias of retrieved records. We contacted the authors of included studies to request important information missing from their published papers. We expressed our results using risk ratios (RRs) and mean differences (MDs) when appropriate, along with 95% confidence intervals (95% CIs). We adjusted the unit of analysis from individual infants to twin pairs by averaging measurements for each twin pair (continuous outcomes) or by counting outcomes as positive if developed by either twin (dichotomous outcomes). Main results Six studies met the inclusion criteria; however, only five studies provided data for analysis. Four of the six included studies were small and had significant limitations in design. As each study reported outcomes differently, data for most outcomes were effectively contributed by a single study. Study authors reported no differences between co‐bedded twins and twins receiving separate care in terms of rate of weight gain (MD 0.20 grams/kg/d, 95% CI ‐1.60 to 2.00; one study; 18 pairs of twins; evidence of low quality); apnea, bradycardia, and desaturation (A/B/D) episodes (RR 0.85, 95% CI 0.18 to 4.05; one study; 62 pairs of twins; evidence of low quality); episodes in co‐regulated states (MD 0.96, 95% CI ‐3.44 to 5.36; one study; three pairs of twins; evidence of very low quality); suspected or proven infection (RR 0.84, 95% CI 0.30 to 2.31; three studies; 65 pairs of twins; evidence of very low quality); length of hospital stay (MD ‐4.90 days, 95% CI ‐35.23 to 25.43; one study; three pairs of twins; evidence of very low quality); and parental satisfaction measured on a scale of 0 to 55 (MD ‐0.38, 95% CI ‐4.49 to 3.73; one study; nine pairs of twins; evidence of moderate quality). Although co‐bedded twins appeared to have lower pain scores 30 seconds after heel lance on a scale of 0 to 21 (MD ‐0.96, 95% CI ‐1.68 to ‐0.23; two studies; 117 pairs of twins; I 2  = 75%; evidence of low quality), they had higher pain scores 90 seconds after the procedure (MD 1.00, 95% CI 0.14 to 1.86; one study; 62 pairs of twins). Substantial heterogeneity in the outcome of infant pain response after heel prick at 30 seconds post procedure and conflicting results at 30 and 90 seconds post procedure precluded clear conclusions. Authors' conclusions Evidence on the benefits and harms of co‐bedding for stable preterm twins was insufficient to permit recommendations for practice. Future studies must be adequately powered to detect clinically important differences in growth and neurodevelopment. Researchers should assess harms such as infection, along with medication errors and caregiver satisfaction. Plain language summary Co‐bedding of preterm twins to optimize growth and brain development Review question We reviewed evidence on the benefits and harms of co‐bedding stable preterm twins and found six relevant studies. Background Preterm twins are at high risk for problems in growth and development. Co‐bedding (placement of twins in the same cot or incubator) has been proposed to benefit twins because it simulates the environment that they shared before birth, in which twins have been seen to support each other through a series of observed activities, termed \"co‐regulation.\" These activities have been proposed to promote growth and brain development when they are allowed to continue after birth. Risks of placing twins in the same incubator or cot include caregiver error and infection. Study characteristics This review found six mostly small studies with some limitations in their methods. All six studies were conducted in the neonatal nursery of a major tertiary hospital. In all studies, researchers enrolled preterm infants of average postmenstrual age of 29 weeks (nearly two and a half months preterm). Some studies enrolled twins only; others enrolled twins and triplets and quadruplets and chose to co‐bed two of the higher‐order multiples considered most stable at the time of enrollment. Key results Overall, researchers reported no differences between the co‐bedded group and the group receiving care separately in terms of weight gain, episodes of major disturbances in their breathing, heart rate or oxygenation level (apnea, bradycardia, or desaturation episodes), length of hospital stay, and occurrence of infection. Conflicting results were noted in the two included studies that assessed infants' pain response after heel prick. Quality of evidence Overall quality of evidence was low because of limitations in study methods, small sample sizes giving rise to imprecise results, and inconsistency in study results. We can make no recommendations for or against co‐bedding for stable preterm twins in the neonatal nursery on the basis of evidence gathered in this review. Further research on this topic is needed."}, {"id": 327, "title": "Combined non-pharmacological interventions for newborn pain relief in two degrees of pain procedures: A randomized clinical trial.", "authors": "Leng, H.-Y.; Zheng, X.-L.; Zhang, X.-H. et al.", "journal": "European journal of pain (London, England)", "year": "2016", "vol": "20(6):989-997", "doi": "10.1002/ejp.824", "abstract": "BACKGROUND: Non-pharmacological interventions are effective neonatal pain reduction strategies. We aimed to study the effects of non-nutritive sucking  (NNS) and swaddling on infants' behavioural and physiological parameters during  shallow or deep heel stick procedures. METHOD: In this prospective,  multi-centred, randomized controlled clinical trial, we enrolled 671 newborns.  The infants undergoing shallow or deep heel stick procedures were randomized into  four groups: oral sucrose (routine care, group S), oral sucrose combined with NNS  (group NS), oral sucrose combined with swaddling (group SS) and oral sucrose  combined with NNS and swaddling (group NSS). The behavioural responses were  evaluated by the Revised Neonatal Facial Coding System and the physiological  signals were monitored by electrocardiogram monitors. RESULTS: A significant  synergistic analgesic effect was observed between the NS and SS groups in both  the shallow (F = 5.952, p = 0.015) and deep heel stick (F = 7.452, p = 0.007)  procedure. NSS group exhibited the lowest pain score. For the deep heel stick  procedure, the NS group had a significantly lower increase in heart rate (HR)%  and decrease in SPO2 % than the S group (F = 17.540, p = 0.000, F = 10.472,  p = 0.001), while this difference was not observed in the shallow heel stick  procedure. No difference was found between the S and SS groups, in terms of  different physiological parameters. CONCLUSION: Non-nutritive sucking and  swaddling had synergistic effects on pain relief when used with oral sucrose. For  the deep heel stick procedure, oral sucrose combined with NNS and swaddling  provided the best pain relief effect. For the shallow heel stick procedure,  addition of NNS and swaddling did not improve the effects."}, {"id": 328, "title": "Improving Quality of Care for Sickle Cell Patients in the Pediatric Emergency Department.", "authors": "Lin, Susan M.; Strouse, John J.; Whiteman, Lauren N. et al.", "journal": "Pediatric emergency care", "year": "2016", "vol": "32(1):14-16", "doi": "10.1097/PEC.0000000000000369", "abstract": "OBJECTIVE: The aim of this study was to identify the factors associated with delays in treatment of sickle pain crisis in the pediatric emergency department  with the goal of discerning whether earlier pain management is correlated with  better clinical outcome. METHODS: This retrospective study examined data  collected from clinical records of patients, aged 21 years or younger, who was  treated for sickle cell pain crisis between January and June 2012. Demographic  and clinical characteristics were extracted from electronic records, as well as  time of registration, triage, initial pain assessment, analgesic administration,  and pain reassessment. RESULT: A total of 160 sickle cell pain crises visits by  67 unique patients were identified. Opiates were the most common initial pain  medication prescribed and administered. The mean time to initial analgesic  administration and pain reassessment was 89 and 60 minutes, respectively.  Patients with orders for imaging studies experienced significant delays in time  to initial analgesic medication and pain reassessment. In addition, higher triage  pain score correlated with shorter time to first dose of pain medication.  However, age, sex, and final disposition did not affect time to administration of  analgesic medications.Earlier pain management resulted in shorter ED length of  stay for all patients regardless of disposition. However, earlier pain management  did not affect the total length of hospitalization for patients admitted to the  inpatient services. CONCLUSIONS: Pediatric patients with sickle cell pain crises  experienced significant delays to initial analgesic medication. A standardized  approach to pain management may improve ED management of SCD crises."}, {"id": 329, "title": "Fluoride mouthrinses for preventing dental caries in children and adolescents", "authors": "Marinho, VCC; Chong, L-Y; Worthington, HV et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2016", "vol": "7", "doi": "10.1002/14651858.CD002284.pub2", "abstract": "Abstract - Background Fluoride mouthrinses have been used extensively as a caries‐preventive intervention in school‐based programmes and by individuals at home. This is an update of the Cochrane review of fluoride mouthrinses for preventing dental caries in children and adolescents that was first published in 2003. Objectives The primary objective is to determine the effectiveness and safety of fluoride mouthrinses in preventing dental caries in the child and adolescent population. The secondary objective is to examine whether the effect of fluoride rinses is influenced by: • initial level of caries severity; • background exposure to fluoride in water (or salt), toothpastes or reported fluoride sources other than the study option(s); or • fluoride concentration (ppm F) or frequency of use (times per year). Search methods We searched the following electronic databases: Cochrane Oral Health's Trials Register (whole database, to 22 April 2016), the Cochrane Central Register of Controlled Trials (CENTRAL) (the Cochrane Library, 2016, Issue 3), MEDLINE Ovid (1946 to 22 April 2016), Embase Ovid (1980 to 22 April 2016), CINAHL EBSCO (the Cumulative Index to Nursing and Allied Health Literature, 1937 to 22 April 2016), LILACS BIREME (Latin American and Caribbean Health Science Information Database, 1982 to 22 April 2016), BBO BIREME (Bibliografia Brasileira de Odontologia; from 1986 to 22 April 2016), Proquest Dissertations and Theses (1861 to 22 April 2016) and Web of Science Conference Proceedings (1990 to 22 April 2016). We undertook a search for ongoing trials on the US National Institutes of Health Trials Register ( http://clinicaltrials.gov ) and the World Health Organization International Clinical Trials Registry Platform. We placed no restrictions on language or date of publication when searching electronic databases. We also searched reference lists of articles and contacted selected authors and manufacturers. Selection criteria Randomised or quasi‐randomised controlled trials where blind outcome assessment was stated or indicated, comparing fluoride mouthrinse with placebo or no treatment in children up to 16 years of age. Study duration had to be at least one year. The main outcome was caries increment measured by the change in decayed, missing and filled tooth surfaces in permanent teeth (D(M)FS). Data collection and analysis At least two review authors independently performed study selection, data extraction and risk of bias assessment. We contacted study authors for additional information when required. The primary measure of effect was the prevented fraction (PF), that is, the difference in mean caries increments between treatment and control groups expressed as a percentage of the mean increment in the control group. We conducted random‐effects meta‐analyses where data could be pooled. We examined potential sources of heterogeneity in random‐effects metaregression analyses. We collected adverse effects information from the included trials. Main results In this review, we included 37 trials involving 15,813 children and adolescents. All trials tested supervised use of fluoride mouthrinse in schools, with two studies also including home use. Almost all children received a fluoride rinse formulated with sodium fluoride (NaF), mostly on either a daily or weekly/fortnightly basis and at two main strengths, 230 or 900 ppm F, respectively. Most studies (28) were at high risk of bias, and nine were at unclear risk of bias. From the 35 trials (15,305 participants) that contributed data on permanent tooth surface for meta‐analysis, the D(M)FS pooled PF was 27% (95% confidence interval (CI), 23% to 30%; I 2  = 42%) (moderate quality evidence). We found no significant association between estimates of D(M)FS prevented fractions and baseline caries severity, background exposure to fluorides, rinsing frequency or fluoride concentration in metaregression analyses. A funnel plot of the 35 studies in the D(M)FS PF meta‐analysis indicated no relationship between prevented fraction and study precision (no evidence of reporting bias). The pooled estimate of D(M)FT PF was 23% (95% CI, 18% to 29%; I² = 54%), from the 13 trials that contributed data for the permanent teeth meta‐analysis (moderate quality evidence). We found limited information concerning possible adverse effects or acceptability of the treatment regimen in the included trials. Three trials incompletely reported data on tooth staining, and one trial incompletely reported information on mucosal irritation/allergic reaction. None of the trials reported on acute adverse symptoms during treatment. Authors' conclusions This review found that supervised regular use of fluoride mouthrinse by children and adolescents is associated with a large reduction in caries increment in permanent teeth. We are moderately certain of the size of the effect. Most of the evidence evaluated use of fluoride mouthrinse supervised in a school setting, but the findings may be applicable to children in other settings with supervised or unsupervised rinsing, although the size of the caries‐preventive effect is less clear. Any future research on fluoride mouthrinses should focus on head‐to‐head comparisons between different fluoride rinse features or fluoride rinses against other preventive strategies, and should evaluate adverse effects and acceptability. Plain language summary Fluoride mouthrinses for preventing dental caries in children and adolescents Review question How effective and safe is the use of fluoride mouthrinse for preventing tooth decay (dental caries) in children and adolescents compared with placebo (a mouthrinse without the active ingredient fluoride) or no treatment? Background Tooth decay is a health problem worldwide, affecting the vast majority of adults and children. Levels of tooth decay vary between and within countries, but children in lower socioeconomic groups (measured by income, education and employment) tend to have more tooth decay. Untreated tooth decay can cause progressive destruction of the tops of teeth (crowns), often accompanied by severe pain. Repair and replacement of decayed teeth is costly in terms of time and money and is a major drain on the resources of healthcare systems. Preventing tooth decay in children and adolescents is regarded as a priority for dental services and is considered more cost‐effective than treatment. Use of fluoride, a mineral that prevents tooth decay, is widespread. As well as occurring naturally, fluoride is added to the water supply in some areas, and is used in most toothpastes and in other products that are available to varying degrees worldwide. As an extra preventive measure, fluoride can be applied directly to teeth as mouthrinses, lozenges, varnishes and gels. Fluoride mouthrinse has frequently been used under supervision in school‐based programmes to prevent tooth decay. Supervised (depending on the age of the child) or unsupervised fluoride mouthrinse needs to be used regularly to have an effect. Recommended procedure involves rinsing the mouth one to two minutes per day with a less concentrated solution containing fluoride, or once a week or once every two weeks with a more concentrated solution. Because of the risk of swallowing too much fluoride, fluoride mouthrinses are not recommended for children younger than six years of age. This review updates the Cochrane review of fluoride mouthrinses for preventing tooth decay in children and adolescents that was first published in 2003. We assessed existing research for  Cochrane Oral Health , and evidence is current up to 22 April 2016. Study characteristics We included 37 studies in which more than 15,000 children (aged six to 14 years) were treated with fluoride mouthrinse or placebo (a mouthrinse with no active ingredient) or received no treatment. All studies assessed supervised use of fluoride mouthrinse in school settings, with two studies also including home use. Most children received a sodium fluoride (NaF) solution, given at 230 parts per million of fluoride (ppm F) daily or a higher concentration of 900 ppm F weekly or fortnightly. Studies lasted from two to three years. Reports were published between 1965 and 2005, and studies took place in several countries. Key results This review update confirmed that supervised regular use of fluoride mouthrinse can reduce tooth decay in children and adolescents. Combined results of 35 trials showed that, on average, there is a 27% reduction in decayed, missing and filled tooth surfaces in permanent teeth with fluoride mouthrinse compared with placebo or no mouthrinse. This benefit is likely to be present even if children use fluoride toothpaste or live in water‐fluoridated areas. Combined results of 13 trials found an average 23% reduction in decayed, missing and filled teeth (rather than tooth surfaces) in permanent teeth with fluoride mouthrinse compared with placebo or no mouthrinse. No trials have looked at the effect of fluoride rinse on baby teeth. We found little information about unwanted side effects or about how well children were able to cope with the use of mouthrinses. Conclusion Regular use of fluoride mouthrinse under supervision results in a large reduction in tooth decay in children's permanent teeth. We found little information about potential adverse effects and acceptability. Quality of the evidence Available evidence for permanent teeth is of moderate quality. This means we are moderately confident in the size of the effect. Very little evidence is available to assess adverse effects."}, {"id": 330, "title": "Effect of Vibration on Pain Response to Heel Lance: A Pilot Randomized Control Trial.", "authors": "McGinnis, Kate; Murray, Eileen; Cherven, Brooke et al.", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2016", "vol": "16(6):439-448", "doi": "10.1097/ANC.0000000000000315", "abstract": "BACKGROUND: Applied mechanical vibration in pediatric and adult populations has been shown to be an effective analgesic for acute and chronic pain, including  needle pain. Studies among the neonatal population are lacking. According to the  Gate Control Theory, it is expected that applied mechanical vibration will have a  summative effect with standard nonpharmacologic pain control strategies, reducing  behavioral and physiologic pain responses to heel lancing. PURPOSE: To determine  the safety and efficacy of mechanical vibration for relief of heel lance pain  among neonates. METHODS: In this parallel design randomized controlled trial,  eligible enrolled term or term-corrected neonates (n = 56) in a level IV neonatal  intensive care unit were randomized to receive either sucrose and swaddling or  sucrose, swaddling, and vibration for heel lance analgesia. Vibration was applied  using a handheld battery-powered vibrator (Norco MiniVibrator, Hz = 92) to the  lateral aspect of the lower leg along the sural dermatome throughout the heel  lance procedure. Neonatal Pain, Agitation, and Sedation Scale (N-PASS) scores,  heart rate, and oxygen saturations were collected at defined intervals  surrounding heel lancing. RESULTS: Infants in the vibration group (n = 30) had  significantly lower N-PASS scores and more stable heart rates during heel stick  (P = .006, P = .037) and 2 minutes after heel lance (P = .002, P = .016) than  those in the nonvibration group. There were no adverse behavioral or physiologic  responses to applied vibration in the sample. IMPLICATIONS FOR PRACTICE AND  RESEARCH: Applied mechanical vibration is a safe and effective method for  managing heel lance pain. This pilot study suggests that mechanical vibration  warrants further exploration as a nonpharmacologic pain management tool among the  neonatal population."}, {"id": 331, "title": "Medidas não farmacológicas no manejo da dor em recém-nascido: cuidado de enfermagem", "authors": "Morais, Ana Paula da Silva; Façanha, Silvania Moreira de Abreu; Rabelo, Sarah Nogueira et al.", "journal": "Rev RENE", "year": "2016", "vol": "17(3):435-442", "doi": "", "abstract": ""}, {"id": 332, "title": "Prevalence and factors associated with preoperative anxiety in children aged 5-12 years", "authors": "Moura, Louise Amália de; Dias, Iohanna Maria Guimarães; Pereira, Lilian Varanda", "journal": "Rev. latinoam. enferm. (Online)", "year": "2016", "vol": "24:e2708-e2708", "doi": "10.1590/1518-8345.0723.2708", "abstract": "Abstract  Objective: to estimate the prevalence and factors associated with preoperative anxiety in children who wait for outpatient surgery.  Method: cross-sectional analysis of baseline data of a prospective cohort study that investigates the predictors of postoperative pain in children aged 5-12 years submitted to inguinal and umbilical hernia repair. It was selected 210 children, which were interviewed in the preoperative holding area of a general hospital. Anxiety was evaluated using the modified Yale Preoperative Anxiety Scale (mYPAS). Sociodemographic and clinical variables were analyzed as exposure and anxiety (mYPAS final score&gt;30) as outcome. Logistic regression was used to identify factors associated with preoperative anxiety.  Results: forty-two percent (42.0%) of children presented preoperative anxiety (CI95%: 35.7%-48.6%), with mean scores equal to 30.1 (SD=8.4). Factors associated with preoperative anxiety were: age group of 5-6 years (OR=2.28; p=0.007) and socioeconomic status classified as class C (OR=2.39; p=0.016).  Conclusion: the evaluation of children who wait for outpatient surgery should be multidimensional and comprise information on age and socioeconomic status, in order to help in the identification and early treatment of preoperative anxiety."}, {"id": 333, "title": "Addressing challenges of clinical trials in acute pain: The Pain Management of Vaso-occlusive Crisis in Children and Young Adults with Sickle Cell Disease  Study.", "authors": "Nottage, Kerri A.; Hankins, Jane S.; Faughnan, Lane G. et al.", "journal": "Clinical trials (London, England)", "year": "2016", "vol": "13(4):409-416", "doi": "10.1177/1740774516636573", "abstract": "BACKGROUND/AIMS: Neuropathic pain is a known component of vaso-occlusive pain in sickle cell disease; however, drugs targeting neuropathic pain have not been  studied in this population. Trials of acute pain are complicated by the need to  obtain consent, to randomize participants expeditiously while optimally treating  pain. We describe the challenges in designing and implementing the Pain  Management of Vaso-occlusive Crisis in Children and Young Adults with Sickle Cell  Disease Study (NCT01954927), a phase II, randomized, double-blind,  placebo-controlled trial to determine the effect of gabapentin for vaso-occlusive  crisis. METHODS: In the Pain Management of Vaso-occlusive Crisis in Children and  Young Adults with Sickle Cell Disease Study, we aim to assess the analgesic  effect of gabapentin during vaso-occlusive crisis. Difficulties we identified  included avoiding delay of notification of study staff of potential participants  which we resolved by automated notification. Concern for rapid randomization and  drug dispensation was addressed through careful planning with an investigational  pharmacy and a single liquid formulation. We considered obtaining consent during  well-visits to avoid the time constraints with acute presentations, but the large  number of patients and limited duration that consent is valid made this  impractical. RESULTS: In all, 79% of caregivers/children approached have agreed  to participate. The trial is currently active, and enrollment is at 45.8% of that  targeted (76 of 166) and expected to continue for two more years. Maintaining  staff availability after-hours remains problematic, with 8% of screened patients  missed for lack of available staff. LESSONS LEARNED: Lessons learned in designing  a trial to expedite procedures in the acute pain setting include (1) building  study evaluations upon a standard-of-care backbone; (2) implementing a simple  study design to facilitate consent and data capture; (3) assuring ample,  well-trained study staff; and (4) utilizing technology to automate procedures  whenever possible. CONCLUSION: This study design has circumvented many of the  logistical barriers usually associated with acute pain trials and may serve as a  prototype for future studies."}, {"id": 334, "title": "Conhecimento e atitude dos profissionais de enfermagem sobre avaliação e tratamento da dor neonatal", "authors": "Oliveira, Iana Mundim de; Castral, ThaiÌla CorreÌa; Cavalcante, Marcela Maria Faria Peres et al.", "journal": "Rev. eletrônica enferm", "year": "2016", "vol": "18:1-10", "doi": "10.5216/ree.v18.36782", "abstract": "Objetivo   do   estudo   foi   verificar   o   conhecimento   e   atitude   dos profissionais  de  enfermagem  de  uma  unidade  neonatal  quanto  à avaliação  e  tratamento  da  dor  aguda  em  recém-nascidos.  Estudo descritivo     exploratório     realizado     com     26     profissionais     de enfermagem  de  uma  unidade  neonatal  no  Centro-Oeste,  Brasil.  A maioria dos profissionais identificou ao menos uma escala de avaliação   da   dor   neonatal   (76,9%).   As   estratégias   para   alívio   da   dor selecionadas   pelos   profissionais   foram   diminuição   de   ruído   e luminosidade   (84,6%),   posição   canguru   (76,9%)   e   colo   (76,9%). Menos da metade (28,0%) dos profissionais afirmou registrar sempre ou  frequentemente  o  escore  de  dor  no  plantão,  e  64,0%  referiu utilizar  estratégias  de   alívio  da  dor.  A  maioria  dos   profissionais demonstrou  conhecimento  quanto  ao  manejo  da  dor,  apesar  de existirem lacunas. A aplicação das escalas e medidas de alívio da dor mostrou-se   inadequada,   seja   pelo   pouco   uso,   não   utilização   da melhor evidência disponível ou falta de registro"}, {"id": 335, "title": "Reported provision of analgesia to patients with acute abdominal pain in Canadian paediatric emergency departments.", "authors": "Poonai, Naveen; Cowie, Allyson; Davidson, Chloe et al.", "journal": "CJEM", "year": "2016", "vol": "18(5):323-330", "doi": "10.1017/cem.2015.112", "abstract": "OBJECTIVES: Evidence exists that analgesics are underutilized, delayed, and insufficiently dosed for emergency department (ED) patients with acute abdominal  pain. For physicians practicing in a Canadian paediatric ED setting, we (1)  explored theoretical practice variation in the provision of analgesia to children  with acute abdominal pain; (2) identified reasons for withholding analgesia; and  (3) evaluated the relationship between providing analgesia and surgical  consultation. METHODS: Physician members of Paediatric Emergency Research Canada  (PERC) were prospectively surveyed and presented with three scenarios of  undifferentiated acute abdominal pain to assess management. A modified Dillman's  Tailored Design method was used to distribute the survey from June to July 2014.  RESULTS: Overall response rate was 74.5% (149/200); 51.7% of respondents were  female and mean age was 44 (SD 8.4) years. The reported rates of providing  analgesia for case scenarios representative of renal colic, appendicitis, and  intussusception, were 100%, 92.1%, and 83.4%, respectively, while rates of  providing intravenous opioids were 85.2%, 58.6%, and 12.4%, respectively. In all  60 responses where the respondent indicated they would obtain a surgical  consultation, analgesia would be provided. In the 35 responses where analgesia  would be withheld, 21 (60%) believed pain was not severe enough, while 5 (14.3%)  indicated it would obscure a surgical condition. CONCLUSIONS: Pediatric emergency  physicians self-reported rates of providing analgesia for acute abdominal pain  scenarios were higher than previously reported, and appeared unrelated to request  for surgical consultation. However, an unwillingness to provide opioid analgesia,  belief that analgesia can obscure a surgical condition, and failure to take  self-reported pain at face value remain, suggesting that the need exists for  further knowledge translation efforts."}, {"id": 336, "title": "Rol del enfermero en las etapas de evaluación, valoración e intervención del dolor en niños", "authors": "Rodríguez Hernández, Iyemai; Fajardo Villarroel, Aurora; Peña Jiménez, Maricela", "journal": "Rev. habanera cienc. méd", "year": "2016", "vol": "15(3):399-407", "doi": "", "abstract": "Introducción: La evaluación y el tratamiento del dolor es una parte esencial de la práctica pediátrica, que ha sido pobremente apreciada debido a que en esta etapa de la vida el paciente es incapaz de comunicar claramente su experiencia dolorosa y es uno de los problemas de salud más frecuentes con los que se encuentra la enfermera en los diferentes ámbitos de atención. Objetivo: Describir el rol del enfermero en las etapas de evaluación, valoración e intervención del dolor en niños. Desarrollo: El alivio del dolor y sufrimiento está considerado como uno de los principales derechos del paciente, y una de las responsabilidades fundamentales del ejercicio profesional de enfermería. Cada niño constituye una totalidad histórica, psíquica y sociocultural, esto hace que cada ser humano le atribuya una palabra que le ayude a describir la experiencia que identifique su dolor o sufrimiento y que el dolor físico en una o más partes del cuerpo la describan como una sensación desagradable y, por lo tanto, una experiencia emocional que modifica su estado de ánimo. La valoración y el tratamiento del dolor requieren que el personal de Enfermería genere confianza con la persona que experimenta dolor.Conclusiones: La adecuada valoración y evaluación del paciente pediátrico con dolor permitirá realizar una efectiva y personalizada intervención de enfermería, que incluya no solo el aspecto biológico, sino también el psicológico y social, lo cual ayudará al paciente a evitar y calmar el dolor(AU)"}, {"id": 337, "title": "Postoperative Pain Management and the Risk Factors in Major Operation: A Baseline Study of Acute Pain Service, Siriraj Hospital.", "authors": "Sanansilp, Vimolluck; Dejarkom, Sukanya; Deetayart, Sittiporn", "journal": "Journal of the Medical Association of Thailand = Chotmaihet thangphaet", "year": "2016", "vol": "99(5):549-556", "doi": "", "abstract": "BACKGROUND: Acute pain service (APS) has been set up at Siriraj Hospital with the aim of providing postoperative pain management for patients receiving anesthetic  pain control and other complicated cases undergoing major operations. OBJECTIVE:  To identify the incidence of moderate to severe postoperative pain and its risk  factors. To describe the techniques used and adverse effects in patients under  APS care. MATERIAL AND METHOD: A prospective study in 340 surgical patients under  APS care from January to September 2008 was performed. Data were obtained from  medical records and patients' answers during 48 hours postoperatively. RESULTS:  The incidences of postoperative pain scores 4-10 at 24 and 48 hours were 28.8%  and 7.4%, with median pain intensity (0-10, [interquartile range]) of 2.5  [1.0-4.0] and 1.0 [0.0-2.0], respectively. The risk factors related to pain score  4-10 included analgesic intake for > 2 consecutive weeks prior to operation, type  of surgery with severe degree of pain and age 65 years (odds ratios [95% CI] of  7.12 [1.92, 26.44], 6.17 [1.37, 27.77], and 1.87 [1.07, 3.29], respectively). Of  the patients, 67.9% received epidural block for postoperative analgesia. The  incidences of nausea/vomiting and itching that needed treatment were 12.4% and  9.4%, respectively. CONCLUSION: Risk factors that should be concerned were age ≤  65 years, pre-operative prolonged analgesic use and surgeries with expected  severe degree of pain."}, {"id": 338, "title": "Brinquedo terapêutico no procedimento de punção venosa: estratégia para reduzir alterações comportamentais", "authors": "Santiago Lemos, Izabel Cristina; Dimas de Oliveira, Joseph; Bezerra Gomes, Emiliana et al.", "journal": "rev. cuid. (Bucaramanga. 2010)", "year": "2016", "vol": "7(1):1163-1170", "doi": "10.15649/cuidarte.v7i1.303", "abstract": "Introdução: A enfermagem pediátrica deve estar atenta aos subsídios da assistência que tornem possível um melhor manejo da dor e da ansiedade oriundas da hospitalização infantil, geralmente, causadas pela realização de procedimentos invasivos como a punção venosa. O uso do Brinquedo Terapêutico Instrucional (BTI) pode representar uma intervenção eficaz para lidar com os efeitos negativos da hospitalização. Objetivo: Comparar as reações manifestadas pela criança frente ao preparo para punção venosa antes e após o uso do BTI. Materiais e Métodos: A pesquisa é analítica, exploratória e de abordagem quantitativa. Para análise dos dados foi utilizado o teste de McNemar. A amostra consistiu de 21 crianças hospitalizadas, pré-escolares e escolares, a coleta deu-se entre junho e agosto de 2012, em unidade de internação pediátrica do Crato, CE (Brasil). Resultados e Discussão: Após o uso do BTI, observou-se uma redução na frequência de variáveis comportamentais que indicam menor adaptação ao procedimento, com significância estatística em especial para: Solicita a presença Materna e Evita olhar para o Profissional (p<0,001). A realização das sessões também potencializou a frequência de, praticamente, todos os comportamentos associados a uma melhor aceitação ao preparo ou realização da punção venosa, com destaque para Observa o Profissional (p<0,001) e Sorri (p<0,005). Conclusões: O BTI constitui relevante intervenção para a enfermagem pediátrica, sendo necessário, para sua aplicação sistematizada, articular ações que visem uma maior sensibilização dos órgãos gestores dos serviços de pediatria, maior capacitação dos profissionais envolvidos e melhor abordagem do ensino do brinquedo terapêutico nos cursos de graduação de enfermagem."}, {"id": 339, "title": "Analgesia by cooling vibration during venipuncture in children with cognitive impairment.", "authors": "Schreiber, Silvana; Cozzi, Giorgio; Rutigliano, Rosaria et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2016", "vol": "105(1):e12-16", "doi": "10.1111/apa.13224", "abstract": "AIM: Children with cognitive impairment experience pain more frequently than healthy children and are more likely to require venipuncture or intravenous  cannulation for various procedures. They are frequently unable to report pain and  often receive poor pain assessment and management. This study assessed the  effectiveness of physical analgesia during vascular access in children with  cognitive impairments. METHODS: We conducted a prospective randomised controlled  study at a tertiary-level children's hospital in Italy from April to May 2015 to  assess whether a cooling vibration device called Buzzy decreased pain during  venipuncture and intravenous cannulation in children with cognitive impairment.  None of the children had verbal skills and the main cognitive impairments were  cerebral palsy, epileptic encephalopathy and genetic syndromes. RESULTS: We  tested 70 children with a median age of nine years: 34 in the Buzzy group and 36  in the no-intervention group. Parents were trained in the use of the  Noncommunicating Children's Pain Checklist--postoperative version scale, and they  reported no or mild procedural pain in 32 cases (91.4%) in the Buzzy group and in  22 cases (61.1%) in the no-intervention group (p = 0.003). CONCLUSION: Cooling  vibration analgesia during vascular access reduced pain in children with  cognitive impairment."}, {"id": 340, "title": "Preemptive analgesia for acute postoperative pain management in children.", "authors": "Sener, Mesut", "journal": "Paediatric anaesthesia", "year": "2016", "vol": "26(8):856", "doi": "10.1111/pan.12942", "abstract": ""}, {"id": 341, "title": "Randomized controlled trial on preemptive analgesia for acute postoperative pain management in children.", "authors": "Song, In-Kyung; Park, Yong-Hee; Lee, Ji-Hyun et al.", "journal": "Paediatric anaesthesia", "year": "2016", "vol": "26(4):438-443", "doi": "10.1111/pan.12864", "abstract": "BACKGROUND: Preemptive analgesia is an anti-nociceptive treatment that starts before surgery and prevents the establishment of central sensitization. Whether  preemptive analgesia is more effective than conventional regimens for managing  postoperative pain remains controversial. This study evaluated the efficacy of  intravenous preemptive analgesia for acute postoperative pain control in  pediatric patients. METHODS: In this prospective randomized controlled trial, 51  children aged 3-7 years, scheduled for corrective osteotomy were randomized into  control (group C) or preemptive (group P) group. Both groups received  standardized general anesthesia, including intravenous patient-controlled  analgesia (IV-PCA) with fentanyl, which was started before skin incision in group  P or 5 min thereafter in group C. IV-PCA data, pain scores using verbal rating  scale (VRS) and Wong-Baker FACES(®) pain rating scale (WBFS), emergence agitation  score (EAS) using the Pediatric Anesthesia Emergence Delirium (PAED) scale,  analgesic requirements, and complications were recorded. RESULTS: The primary  outcome, pain score at postoperative 1 h, showed no difference between the  groups. Both groups did not demonstrate emergence agitation (PAED cutoff value ≥  12), although the EAS at admission to the postanesthetic care unit (PACU) was  lower in group P than in group C (P = 0.002; mean difference 4.85, 95% CI  1.97-7.73). There were no differences in the delivered volume of IV-PCA,  frequency of pushing the IV-PCA button, effective push attempts, VRS, WBFS, EAS  at discharge from the PACU, additional analgesic requirements, and complications.  CONCLUSION: Preemptive analgesia using IV-PCA with fentanyl showed no significant  advantages for postoperative analgesia after corrective osteotomy in pediatric  patients."}, {"id": 342, "title": "Acupuncture Reduces Pain and Autonomic Distress During Injection of Local Anesthetic in Children: A Pragmatic Crossover Investigation.", "authors": "Usichenko, Taras I.; Wolters, Patrick; Anders, Eric F. et al.", "journal": "The Clinical journal of pain", "year": "2016", "vol": "32(1):82-86", "doi": "10.1097/AJP.0000000000000222", "abstract": "OBJECTIVES: Stimulation of acupoint LI4 has been shown to result in analgesic effects in patients experiencing acute pain. We aimed to study the effectiveness  of LI4 stimulation for pain relief in children receiving an injection of a local  anesthetic (LA). MATERIALS AND METHODS: Children scheduled for dental treatment  using LA received bilateral acupuncture at LI4 using indwelling fixed needles.  During the treatment, the parents of the patients stimulated the needles by  massage. Two different treatment regimes were compared: a standardized LA  injection given 5 minutes after acupuncture, and an LA injection without  acupuncture. The order of treatment was randomized, with the 2 treatments  performed in a crossover manner on different days. Pain intensity during LA  injection, assessed by the patient with the Verbal Rating Scale or Faces Pain  Scale (0 to 10), was used as the primary endpoint. Parent-assessed and  dentist-assessed pain intensity and agitation, heart rate, and the patients'  satisfaction with the therapy were also recorded. RESULTS: Data were obtained  from 49 patients (22 female; mean age 10 y). Patients reported less pain when  acupuncture was used: mean 2.3 (95% confidence interval, 1.5-3.1) versus 3.9 (95%  confidence interval, 3.0-4.7); P<0.001. The patients' heart rate remained low  throughout the dental treatment after LI4 stimulation, when compared with  treatment without acupuncture (P<0.05). LI4 stimulation was safe and increased  satisfaction levels in both the patients and their parents, when compared with LA  injection alone (P<0.05). DISCUSSION: Stimulation of acupoint LI4 reduces pain  and autonomic distress in children during LA injection in dental procedures."}, {"id": 343, "title": "Publicly available online educational videos regarding pediatric needle pain: a scoping review.", "authors": "Farkas, Cameron; Solodiuk, Lydia; Taddio, Anna et al.", "journal": "The Clinical journal of pain", "year": "2015", "vol": "31(6):591-598", "doi": "10.1097/AJP.0000000000000197", "abstract": "OBJECTIVES: The objectives of this scoping review were to: (1) identify publicly available educational videos on needle pain management; and (2) evaluate the  content of these videos. METHODS: Reviewers screened publicly available  educational videos on pediatric needle pain management available on YouTube and  Google using a broad-based search strategy. Videos were categorized using the  CRAAP Test: Current, Relevant, from a trustworthy source (Authority), Accurate  and evidence-based, and for what Purpose does the source exist. RESULTS:  Twenty-five relevant, educational videos were identified. The intended audience  for most videos was parents (n=16, 64%), followed by clinicians (n=6, 24%) and  children (n=3, 12%). Common examples of needle pain included immunizations or IV  insertion, with interventions appropriate for infants through school-aged  children. The most frequently described techniques were parent-guided distraction  and behavioral factors such as comfort holds and parent demeanor. Most videos  were Current (96%), Relevant (100%), created by a trustworthy source: Authority  (76%), and all were Accurate, with Purpose relating to needle pain management.  None of the videos addressed the unique needs of children with a preexisting  diagnosis of needle phobia. DISCUSSION: Publicly available educational videos  offer clinicians, parents, and children evidence-based techniques to manage  pediatric needle pain. Further evaluation is needed to determine whether this  form of education meets the needs of target audiences and whether this type of  content can lead to improved management of pediatric needle pain."}, {"id": 344, "title": "Vivências dos adolescentes durante a hospitalização num serviço de pediatria", "authors": "Figueiredo, Angela Maria Sousa; Almeida, Cristina Maria Sequeira; Santos, Maria Margarida Oliveira et al.", "journal": "Referencia", "year": "2015", "vol": "IV(6):105-114", "doi": "", "abstract": ""}, {"id": 345, "title": "REVEALING THE WORLD OF ONCOLOGICAL TREATMENT THROUGH DRAMATIC THERAPEUTIC PLAY", "authors": "Fonseca, Marileise Roberta Antoneli; Campos, Claudinei José Gomes; Ribeiro, Circéa Amália et al.", "journal": "Texto & contexto enferm", "year": "2015", "vol": "24(4):1112-1120", "doi": "10.1590/0104-0707201500003350014", "abstract": "ABSTRACT This study aimed to understand the play of the preschool child undergoing oncological treatment through dramatic therapeutic play. A total of five preschool age children with cancer participated in the dramatic therapeutic play sessions, between January and May 2013. The material was analyzed using the framework of phenomenology: analysis of the structure of the phenomenon in place. The following categories emerged from the sessions: Immersing oneself in the world of the disease and the oncological treatment; and Remembering the world without the disease. The study learned that becoming ill with cancer is a process which generates pain and suffering for the child, leading her to feel small and fragile in the face of the discomforts of the numerous procedures to which she is subjected. Therapeutic play was an important resource for revealing how the child with cancer feels during the treatment, and showed the children's difficulty in interacting with the unknown, and how this difficulty makes the balance between the points of health and illness complex."}, {"id": 346, "title": "Manejo del dolor en el paciente oncológico pediátrico y factores que influyen en su percepción", "authors": "Gallego Muñoz, Cristóbal; Martínez Bautista, María José; Guerrero Navarro, Nieves et al.", "journal": "Rev. cuba. farm", "year": "2015", "vol": "49(2)", "doi": "", "abstract": "El dolor es una característica subjetiva que presentan muchos pacientes durante su estancia hospitalaria. La población pediátrica presenta unas características fisiológicas y psicológicas diferentes a la de los adultos, si a esto se le suma un proceso oncológico en el cuál son sometidos a numerosas experiencias dolorosas durante su diagnóstico y tratamiento, se hace de vital importancia un adecuado manejo del dolor. El objetivo del presente trabajo es revisar los principales factores que influyen en la percepción del dolor oncológico en el paciente pediátrico y las medidas, tanto farmacológicas no, que son necesarias tener en cuenta para un correcto manejo del dolor. Para ello se realizó una revisión de publicaciones científicas en la base de datos MEDLINE durante los últimos 25 años. Se concluye que la percepción del dolor oncológico en pediatría tiene una componente multifactorial, por otro lado, además de un uso adecuado de las medidas farmacológicas, las medidas no farmacológicas son muy importantes para el abordaje integral del dolor(AU)"}, {"id": 347, "title": "Sweet tasting solutions for reduction of needle‐related procedural pain in children aged one to 16 years", "authors": "Harrison, D; Yamada, J; Adams‐Webber, T et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2015", "vol": "5", "doi": "10.1002/14651858.CD008408.pub3", "abstract": "Abstract - Background Extensive evidence exists showing analgesic effects of sweet solutions for newborns and infants. It is less certain if the same analgesic effects exist for children one year to 16 years of age. This is an updated version of the original Cochrane review published in Issue 10, 2011 (Harrison 2011) titled Sweet tasting solutions for reduction of needle‐related procedural pain in children aged one to 16 years. Objectives To determine the efficacy of sweet tasting solutions or substances for reducing needle‐related procedural pain in children beyond one year of age. Search methods Searches were run to the end of June 2014. We searched the following databases: the Cochrane Central Register of Controlled Trials (CENTRAL), Cochrane Database of Systematic Reviews, Database of Abstracts of Reviews of Effects (DARE), Cochrane Methodology Register, Health Technology Assessment, the NHS Economic Evaluation Database, MEDLINE, EMBASE, PsycINFO, and ACP Journal Club (all via OvidSP), and CINAH (via EBSCOhost). We applied no language restrictions. Selection criteria Published or unpublished randomised controlled trials (RCT) in which children aged one year to 16 years, received a sweet tasting solution or substance for needle‐related procedural pain. Control conditions included water, non‐sweet tasting substances, pacifier, distraction, positioning/containment, breastfeeding, or no treatment. Data collection and analysis Outcome measures included crying duration, composite pain scores, physiological or behavioral pain indicators, self‐report of pain or parental or healthcare professional‐report of the child's pain. We reported mean differences (MD), weighted mean difference (WMD), or standardized mean difference (SMD) with 95% confidence intervals (CI) using fixed‐effect or random‐effects models as appropriate for continuous outcome measures. We reported risk ratio (RR), risk difference (RD), and the number needed to treat to benefit (NNTB) for dichotomous outcomes. We used the I 2  statistic to assess between‐study heterogeneity. Main results We included one unpublished and seven published studies (total of 808 participants); four more studies and 478 more participants than the 2011 review. Six trials included young children aged one to four years receiving sucrose or candy lollypops for immunisation pain compared with water or no treatment. Usual care included topical anaesthetics, upright parental holding, and distraction. All studies were well designed blinded RCTs, however, five of the six studies had a high risk of bias based on small sample sizes. Two studies included school‐aged
