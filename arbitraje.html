nal studies to pediatric pain and child health electronic listservs. We also searched registries for relevant completed trials:  clinicaltrials.gov ; and World Health Organization International Clinical Trials Registry Platform ( www.who.int.trialsearch) . We conducted searches up to September 2017 to identify records published since the last review update in 2013. Selection criteria We included peer‐reviewed published randomized controlled trials (RCTs) with at least five participants per study arm, comparing a psychological intervention with a control or comparison group. Trials involved children aged two to 19 years undergoing any needle‐related medical procedure. Data collection and analysis Two review authors extracted data and assessed risks of bias using the Cochrane 'Risk of bias' tool. We examined pain and distress assessed by child self‐report, observer global report, and behavioral measurement (primary outcomes). We also examined any reported physiological outcomes and adverse events (secondary outcomes). We used meta‐analysis to assess the efficacy of identified psychological interventions relative to a comparator (i.e. no treatment, other active treatment, treatment as usual, or waitlist) for each outcome separately. We used Review Manager 5 software to compute standardized mean differences (SMDs) with 95% confidence intervals (CIs), and GRADE to assess the quality of the evidence. Main results We included 59 trials (20 new for this update) with 5550 participants. Needle procedures primarily included venipuncture, intravenous insertion, and vaccine injections. Studies included children aged two to 19 years, with few trials focused on adolescents. The most common psychological interventions were distraction (n = 32), combined cognitive behavioral therapy (CBT; n = 18), and hypnosis (n = 8). Preparation/information (n = 4), breathing (n = 4), suggestion (n = 3), and memory alteration (n = 1) were also included. Control groups were often 'standard care', which varied across studies. Across all studies, 'Risk of bias' scores indicated several domains at high or unclear risk, most notably allocation concealment, blinding of participants and outcome assessment, and selective reporting. We downgraded the quality of evidence largely due to serious study limitations, inconsistency, and imprecision. Very low‐ to low‐quality evidence supported the efficacy of distraction for self‐reported pain (n = 30, 2802 participants; SMD −0.56, 95% CI −0.78 to −0.33) and distress (n = 4, 426 participants; SMD −0.82, 95% CI −1.45 to −0.18), observer‐reported pain (n = 11, 1512 participants; SMD −0.62, 95% CI −1.00 to −0.23) and distress (n = 5, 1067 participants; SMD −0.72, 95% CI −1.41 to −0.03), and behavioral distress (n = 7, 500 participants; SMD −0.44, 95% CI −0.84 to −0.04). Distraction was not efficacious for behavioral pain (n = 4, 309 participants; SMD −0.33, 95% CI −0.69 to 0.03). Very low‐quality evidence indicated hypnosis was efficacious for reducing self‐reported pain (n = 5, 176 participants; SMD −1.40, 95% CI −2.32 to −0.48) and distress (n = 5, 176 participants; SMD −2.53, 95% CI −3.93 to −1.12), and behavioral distress (n = 6, 193 participants; SMD −1.15, 95% CI −1.76 to −0.53), but not behavioral pain (n = 2, 69 participants; SMD −0.38, 95% CI −1.57 to 0.81). No studies assessed hypnosis for observer‐reported pain and only one study assessed observer‐reported distress. Very low‐ to low‐quality evidence supported the efficacy of combined CBT for observer‐reported pain (n = 4, 385 participants; SMD −0.52, 95% CI −0.73 to −0.30) and behavioral distress (n = 11, 1105 participants; SMD −0.40, 95% CI −0.67 to −0.14), but not self‐reported pain (n = 14, 1359 participants; SMD −0.27, 95% CI −0.58 to 0.03), self‐reported distress (n = 6, 234 participants; SMD −0.26, 95% CI −0.56 to 0.04), observer‐reported distress (n = 6, 765 participants; SMD 0.08, 95% CI −0.34 to 0.50), or behavioral pain (n = 2, 95 participants; SMD −0.65, 95% CI −2.36 to 1.06). Very low‐quality evidence showed efficacy of breathing interventions for self‐reported pain (n = 4, 298 participants; SMD −1.04, 95% CI −1.86 to −0.22), but there were too few studies for meta‐analysis of other outcomes. Very low‐quality evidence revealed no effect for preparation/information (n = 4, 313 participants) or suggestion (n = 3, 218 participants) for any pain or distress outcome. Given only a single trial, we could draw no conclusions about memory alteration. Adverse events of respiratory difficulties were only reported in one breathing intervention. Authors' conclusions We identified evidence supporting the efficacy of distraction, hypnosis, combined CBT, and breathing interventions for reducing children’s needle‐related pain or distress, or both. Support for the efficacy of combined CBT and breathing interventions is new from our last review update due to the availability of new evidence. The quality of trials and overall evidence remains low to very low, underscoring the need for improved methodological rigor and trial reporting. Despite low‐quality evidence, the potential benefits of reduced pain or distress or both support the evidence in favor of using these interventions in clinical practice. Plain language summary Psychological strategies to reduce pain and distress for children and adolescents getting needles Bottom line Psychological strategies help reduce children's pain, distress, and fear of needles. Distraction and hypnosis are helpful, although specific breathing (such as inflating a balloon), and combining multiple psychological strategies can also help. Background Psychological strategies affect how children think or what they do before, during, or after a needle. They can be used by children or with support from parents or medical staff, like nurses, psychologists, or child life specialists. The information applies to children aged from two to 19 years who are healthy or ill, undergoing all types of needle procedures at the hospital, in a clinic, or at school. Key results For this update, in September 2017, we searched for clinical trials looking at psychological strategies for reducing pain and distress of children and teens getting a needle. We found 59 trials including 5550 children and teens. Twenty of these trials were new for this update. We found six psychological strategies, four of which help reduce children's pain and distress during needles. These include distraction, hypnosis, specific breathing, and combining multiple strategies (‘combined cognitive behavioral’). Ways to distract children and teens during needles include reading, watching a movie, listening to music, playing video games, or virtual reality. Hypnosis involves deep relaxation and imagery, and is usually taught to a child by a trained professional. Examples of strategies that can be combined include distraction, breathing, relaxation, positive thoughts, having the child learn or practice the steps of the needle procedure, and coaching parents about ways to support their child. Other psychological strategies have been tested but do not seem helpful on their own. For example, children do not have less pain or distress when they are only told what is going to happen before or during the needle ('providing information or preparation or both) or when someone merely suggests to the child that something is being done to help them. One other strategy is helping children to remember their previous needles more positively. There is not enough information yet to know if this is helpful. Quality of evidence We rated the quality of the evidence from studies using four levels: very low, low, moderate, or high. The quality of the evidence from this review is very low to low, as results may be biased by including only small numbers of children or by children knowing what psychological intervention they received. This means that we are uncertain about the results.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 250, "title": "Sin título", "authors": "Ferland, Catherine E.; Vega, Eduardo; Ingelmo, Pablo M.", "journal": "Current opinion in anaesthesiology", "year": "2018", "vol": "31(3):327-332", "doi": "10.1097/ACO.0000000000000579", "abstract": "PURPOSE OF REVIEW: The evidence regarding the efficacy of analgesics available to guide postoperative pain treatment in pediatric patients is limited. Opioid  medications are very often an important component of pediatric postoperative pain  treatment but have been associated with perioperative complications. We will  focus on initiatives aiming to provide effective treatment minimizing the use of  opioids and preventing the long-term consequences of pain. RECENT FINDINGS:  Interpatient variability in postoperative pain is currently managed by applying  protocols or by trial and error, thus often leading to patients being either  undertreated or overtreated. Few evidence-based reports are available to guide  the use of opioid medications in children, including the prescription of opioids  after hospital discharge. Using combinations of nonopioid analgesics in a  multimodal approach may limit the need for opioids, thus decreasing the risk of  toxicity and dose-related side effects. There is a lack of adequate research in  this field, and more specifically on identifying which patient is at higher risk  of poor postoperative pain management. SUMMARY: Treatment options have evolved in  recent years, including the combinations of multimodal regimens and regional  anesthetic techniques. Using combinations of nonopioid analgesics in a multimodal  approach may limit the need for opioids.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 244, "title": "Sin título", "authors": "Burton, Karen L. O.; Morrow, Angela M.; Beswick, Brooke V. et al.", "journal": "Pain practice : the official journal of World Institute of Pain", "year": "2018", "vol": "18(8):979-987", "doi": "10.1111/papr.12696", "abstract": "OBJECTIVE: The objective of this pilot study was to assess the acceptability and feasibility of using BrightHearts, a biofeedback-assisted relaxation application  (app), in children undergoing painful procedures. METHODS: Thirty children 7 to  18 years of age undergoing a medical procedure (peripheral blood collection,  botulinum toxin injection, or intravenous cannula insertion) participated.  Participants used BrightHearts, a heart rate-controlled biofeedback-assisted  relaxation training app delivered via an iPad with heart rate measured through a  pulse oximeter worn on the ear or thumb. Feasibility was assessed through  observations and patient, parent/carer, and healthcare professional feedback.  Patient, parent/carer, and healthcare professional satisfaction with BrightHearts  was rated using investigator-developed surveys. RESULTS: Eighty-three percent of  child participants reported that they found BrightHearts helpful during the  procedure and that they would use BrightHearts again. All parents and 96% of  healthcare professionals indicated they would use BrightHearts again. Sixty-four  percent of healthcare providers perceived that BrightHearts assisted with the  ease of performing the procedure. Qualitative analyses found 2 themes: (1)  BrightHearts calms through providing distraction and biofeedback and (2) the  impact of BrightHearts on the procedure. CONCLUSIONS: This pilot study  demonstrates the feasibility of using biofeedback-assisted relaxation delivered  via the BrightHearts app in children undergoing peripheral blood collection and  cannulation. Future studies are required to evaluate BrightHearts' efficacy in  reducing pain and anxiety during painful procedures and distinguish the effects  of a biofeedback-mediated app from distraction.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 249, "title": "Sin título", "authors": "Disher, Timothy; Cameron, Chris; Mitra, Souvik et al.", "journal": "Pediatrics", "year": "2018", "vol": "142(1):e20180401", "doi": "10.1542/peds.2018-0401", "abstract": "CONTEXT: Retinopathy of prematurity eye examinations conducted in the neonatal intensive care. OBJECTIVE: To combine randomized trials of pain-relieving  interventions for retinopathy of prematurity examinations using network  meta-analysis. DATA SOURCES: Systematic review and network meta-analysis of  Medline, Embase, Cochrane Central Register of Controlled Trials, Web of Science,  and the World Health Organization International Clinical Trials Registry  Platform. All databases were searched from inception to February 2017. STUDY  SELECTION: Abstract and title screen and full-text screening were conducted  independently by 2 reviewers. DATA EXTRACTION: Data were extracted by 2 reviewers  and pooled with random effect models if the number of trials within a comparison  was sufficient. The primary outcome was pain during the examination period;  secondary outcomes were pain after the examination, physiologic response, and  adverse events. RESULTS: Twenty-nine studies (N = 1487) were included. Topical  anesthetic (TA) combined with sweet taste and an adjunct intervention (eg,  nonnutritive sucking) had the highest probability of being the optimal treatment  (mean difference [95% credible interval] versus TA alone = -3.67 [-5.86 to  -1.47]; surface under the cumulative ranking curve = 0.86). Secondary outcomes  were sparsely reported (2-4 studies, N = 90-248) but supported sweet-tasting  solutions with or without adjunct interventions as optimal. LIMITATIONS:  Limitations included moderate heterogeneity in pain assessment reactivity phase  and severe heterogeneity in the regulation phase. CONCLUSIONS: Multisensory  interventions including sweet taste is likely the optimal treatment for reducing  pain resulting from eye examinations in preterm infants. No interventions were  effective in absolute terms.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 259, "title": "Sin título", "authors": "Milbrandt, Todd; Kryscio, Richard; Muchow, Ryan et al.", "journal": "Journal of pediatric orthopedics", "year": "2018", "vol": "38(8):430-435", "doi": "10.1097/BPO.0000000000000845", "abstract": "BACKGROUND: Idiopathic clubfoot treatment is treated by manipulation and casting utilizing the Ponseti technique which can make the infant fussy and irritable.  The goal of this study was to determine which intervention could decrease this  pain response in infants undergoing Ponseti casting for idiopathic clubfeet. Our  hypothesis was that the administration of oral sucrose solution or milk would be  the most effective in accomplishing that goal. METHODS: We conducted a  double-blinded randomized controlled trial at a tertiary pediatric orthopaedic  center on 33 children (average age=17.94 d; SD=20.51 d) undergoing clubfoot  manipulation and casting and their guardians. Each cast was considered a new  event and was randomized to an oral 20% sucrose solution (S), water (W), or milk  (M) in a bottle (breast or nonbreast). We assessed the Neonatal Infant Pain Scale  (NIPS), heart rate, and oxygen saturation before, during, and after the casting.  RESULTS: A total of 131 casts were randomized and 118 analyzed (37 M, 42 S, 39  W). Each child underwent an average of 3.97 casts (SD=1.74). There were no  significant differences seen between the groups before casting in their mean NIPS  score (M=2.2; SD=2.38, S=1.84, SD=2.18, W=1.61, SD=2.12). However during casting,  mean NIPS score for both milk, 0.91 (SD=1.26, P=0.0005) and sucrose, 0.64  (SD=1.27, P<0.0001) were significantly less than water, 2.27 (SD=2.03) but not  different from each other (P=0.33). Postcasting, the sucrose NIPS score, 0.69  (SD=1.53) continued to be significantly less than milk, 2.11 (SD=2.37, P=0.0065.  There was no correlation between heart rate or oxygen saturation and NIPS.  CONCLUSIONS: Sucrose solution and milk during Ponseti casting and manipulation  were effective in decreasing the pain response in children undergoing  manipulation and casting for clubfeet. The sucrose solution administration  continued the pain relief into the postcasting period. In addition to the  benefits of improving the patient experience during casting, a less irritable  child may result in better casting. LEVEL OF EVIDENCE: Level 1 evidence.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 257, "title": "Sin título", "authors": "Lima, Débora Astolfo de; Rossato, Lisabelle Mariano; Guedes, Danila Maria Batista et al.", "journal": "Rev Esc Enferm USP", "year": "2018", "vol": "52:1-7", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E0 — Duplicado no detectado por Zotero", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 255, "title": "Sin título", "authors": "Kristensen, Helle Nygaard; Lundbye-Christensen, Søren; Haslund-Thomsen, Helle et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(11):1032-1038", "doi": "10.1097/AJP.0000000000000625", "abstract": "INTRODUCTION: Hospitalized children often describe needle-related procedures as the worst pain possible and such procedures may be emotionally traumatic. The use  of hospital clowns (HCs) related to painful medical procedures in children may  offer pain relief, but this has not been systematically evaluated. The objective  of this study was to assess the effect of a therapeutic clown in comparison with  standard care on the experience of pain in children receiving venipuncture.  MATERIALS AND METHODS: A sample of 116 children aged 4 to 15 years consecutively  admitted to the hospital was allocated to either the experimental (presence of  HC) or control group (standard care) before venipuncture. Self-reported pain  after the procedure was assessed using the Faces Pain Scale combined with a 0 to  10 Numerical Rating Scale. Separate analysis was conducted in age groups from 4  to 6 (N=37) and 7 to 15 (N=74) years. RESULTS: Without the clown present, the  mean pain score (2.7±2.8) was not significantly different between the 2 age  groups. Children aged 7 to 15 years had lower pain scores when the clown was  present compared with the control group (P=0.025). Children aged 4 to 6 years had  higher pain scores with the clown present, although the difference was not  statistically significant (P=0.054). Children with pain (N=49) or previous  experiences with venipuncture (N=56) did not score pain significantly  differently. DISCUSSION: Assessing the pain experience of children receiving  venipuncture with the presence of an HC indicates a pain relieving effect for  children older than 6 years. However, future studies should carefully study the  effects on younger children where mixed effects may be present.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 254, "title": "Sin título", "authors": "Hsieh, Kao-Hsian; Chen, Shu-Jen; Tsao, Pei-Chen et al.", "journal": "Pediatrics and neonatology", "year": "2018", "vol": "59(1):71-76", "doi": "10.1016/j.pedneo.2017.02.001", "abstract": "BACKGROUND: Painful procedures are unavoidable in the medical care of preterm babies. The unpleasant experience during the neonatal period may contribute to  hyperalgesia and poor neurodevelopment outcome later. Seeking effective  interventions to reduce pain are strongly indicated for these very small  premature babies. The aim of this study is to investigate if instilling breast  milk (BM) or dextrose water into oral cavity can reduce the procedural pain of  heel stick for preterm babies. METHODS: This is a prospective study; 20 premature  neonates are enrolled. Each study case received heel stick 4 times. BM, 10%  dextrose water (D10W), distilled water (placebo) and nothing (control group) were  given one after the other in random order to the same patient before heel stick.  Premature infant pain profile (PIPP) was used to assess the pain scores. The  whole process consisted of 4 sections: a baseline period for 1 min, intervention  period for 1 min, heel stick period for 20 s, and recovery period for 5 min. The  primary outcome is to compare the PIPP scores in the 4 groups. RESULTS: Totally  20 babies completed this study. Median gestational age was 32 weeks 2 days (26  weeks 4 days-35 weeks 6 days) and median birth body weight was 1596 g  (766-2435 g). The median PIPP scores and interquartile range at each time period  were listed in the context. There are significant differences between BM/control  group at all time periods, between BM/placebo group at 30-60 s, 1-2 min, and  2-3 min, and between D10W/control group at 0-30 s, 30-60 s, 3-4 min, and 4-5 min.  There are no significant differences between BM/D10W, D10W/placebo, and  placebo/control groups at any time periods. CONCLUSION: Giving something with  taste such as BM or D10W is safe and effective in reducing the procedural pain of  heel stick in preterm neonates; BM is the priority.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 253, "title": "Sin título", "authors": "Gold, Jeffrey I.; Mahrer, Nicole E.", "journal": "Journal of pediatric psychology", "year": "2018", "vol": "43(3):266-275", "doi": "10.1093/jpepsy/jsx129", "abstract": "OBJECTIVE: To conduct a randomized control trial to evaluate the feasibility and efficacy of virtual reality (VR) compared with standard of care (SOC) for  reducing pain, anxiety, and improving satisfaction associated with blood draw in  children ages 10-21 years. METHODS: In total, 143 triads (patients, their  caregiver, and the phlebotomist) were recruited in outpatient phlebotomy at a  pediatric hospital and randomized to receive either VR or SOC when undergoing  routine blood draw. Patients and caregivers completed preprocedural and  postprocedural standardized measures of pain, anxiety, and satisfaction, and  phlebotomists reported about the patient's experience during the procedure.  RESULTS: Findings showed that VR significantly reduced acute procedural pain and  anxiety compared with SOC. A significant interaction between patient-reported  anxiety sensitivity and treatment condition indicated that patients undergoing  routine blood draw benefit more from VR intervention when they are more fearful  of physiological sensations related to anxiety. Patients and caregivers in the VR  condition reported high levels of satisfaction with the procedure. CONCLUSION: VR  is feasible, tolerated, and well-liked by patients, caregivers, and phlebotomists  alike for routine blood draw. Given the immersive and engaging nature of the VR  experience, VR has the capacity to act as a preventive intervention transforming  the blood draw experience into a less distressing, potentially pain-free routine  medical procedure, particularly for pediatric patients with high anxiety  sensitivity. VR holds promise to reduce negative health outcomes for children and  reduce distress in caregivers, while facilitating increased satisfaction and  throughput in hectic outpatient phlebotomy clinics.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 311, "title": "Sin título", "authors": "Williams, Glyn", "journal": "Pain management", "year": "2017", "vol": "7(4):279-286", "doi": "10.2217/pmt-2017-0011", "abstract": "There have been significant advances in the treatment of acute pain in children alongside increased academic interest in the field. This has led to improvements  in both efficacy and safety alongside the development of multidisciplinary pain  services. Despite this, however, there are still high rates of acute pain  reported in children in both inpatient and outpatient settings. In this article,  we discuss some of the challenges faced by healthcare workers in designing  effective multidisciplinary treatment regimens, understanding the implications  for long-term pain and pain processing of acute pain and analgesic interventions  as well as ongoing issues around research, education and resource.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 316, "title": "Sin título", "authors": "Christoffel, Marialda Moreira; Castral, Thaíla Corrêa; Daré, Mariana Firmino et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2016", "vol": "69(3):552-558", "doi": "10.1590/0034-7167.2016690319i", "abstract": "RESUMO  Objetivo: identificar o conhecimento dos profissionais de saúde sobre o manejo, avaliação e tratamento da dor em uma unidade neonatal, de um município do Rio de Janeiro.  Método: estudo descritivo, exploratório, com análise quantitativa. Os dados foram analisados no software R. Core team.  Resultados: dos 96 profissionais de saúde, responderam ao questionário 42 auxiliares/técnicos de enfermagem, 22 enfermeiros, 20 médicos e 02 fisioterapeutas. Destaca-se que quanto a coordenar/realizar/auxiliar no cuidado da dor do bebê enquanto o profissional realiza procedimentos (punção lombar, inserção de dreno torácico e cateter central), 40,5% dos auxiliares/técnicos, 50% dos médicos e 50% dos fisioterapeutas concordam. Houve diferença significativa de concordância em relação aos auxiliares/técnicos e médicos. A maioria (69,8%) dos profissionais de saúde conhece alguma medida não farmacológica efetiva para o alívio da dor aguda.  Conclusão: constata-se a necessidade de programa de intervenção educativa, com a participação dos envolvidos, no processo de mudança da prática profissional.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 312, "title": "Sin título", "authors": "Young, Erin E.; DʼAgata, Amy; Vittner, Dorothy et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):178-185", "doi": "10.1097/JPN.0000000000000258", "abstract": "As healthcare teams have worked to improve infant survival rates, the management of painful events experienced by these hospitalized neonates has increased and  yet pain management remains highly variable between healthcare institutions. At  the same time, emerging evidence suggests that these early painful experiences  may alter the trajectory of development for pain-processing pathways both  peripherally and centrally. This concise review highlights findings from both the  basic and clinical science literature supporting the hypothesis that early  painful experiences can have long-lasting negative effects on biological,  psychological, and socioemotional functions. Implications for pain management in  neonates and considerations for evidence-based practice change are discussed.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 356, "title": "Sin título", "authors": "Santos, Gildenia Calixto dos; Lima, Luciana de Medeiros; Oliveira, Gilda Barbosa de et al.", "journal": "Rev. enferm. UFPE on line", "year": "2015", "vol": "9(8):8784-8791", "doi": "10.5205/reuol.7696-67533-1-SP-1.0908201504", "abstract": "Objetivos: verificar a eficácia de ações não farmacológicas no controle da dor em neonatos e aplicar a Escala NIPS durante a coleta de sangue comparando os scores. Método: estudo exploratório e descritivo de abordagem quantitativa, realizada com neonatos da UTIN de um hospital universitário, onde foi observada a reação do neonato durante a coleta de sangue de acordo com a pontuação obtida na Escala NIPS. Os dados foram agrupados e analisados utilizando o Graph Pad Prism 5.02. A pesquisa teve aprovado o projeto de pelo Comitê de Ética em Pesquisa, CAAE 09208512.1.0000.5183. Resultados: há diferença significativa da pontuação na escala NIPS entre o grupo controle e o grupo conduta, tanto considerando o número total de neonatos, quanto cada neonato isoladamente. Conclusão: a intervenção de enfermagem no manejo da dor possibilita uma melhor resposta do neonato aos procedimentos dolorosos e deve fazer parte do processo de cuidar.(AU)", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 343, "title": "Sin título", "authors": "Farkas, Cameron; Solodiuk, Lydia; Taddio, Anna et al.", "journal": "The Clinical journal of pain", "year": "2015", "vol": "31(6):591-598", "doi": "10.1097/AJP.0000000000000197", "abstract": "OBJECTIVES: The objectives of this scoping review were to: (1) identify publicly available educational videos on needle pain management; and (2) evaluate the  content of these videos. METHODS: Reviewers screened publicly available  educational videos on pediatric needle pain management available on YouTube and  Google using a broad-based search strategy. Videos were categorized using the  CRAAP Test: Current, Relevant, from a trustworthy source (Authority), Accurate  and evidence-based, and for what Purpose does the source exist. RESULTS:  Twenty-five relevant, educational videos were identified. The intended audience  for most videos was parents (n=16, 64%), followed by clinicians (n=6, 24%) and  children (n=3, 12%). Common examples of needle pain included immunizations or IV  insertion, with interventions appropriate for infants through school-aged  children. The most frequently described techniques were parent-guided distraction  and behavioral factors such as comfort holds and parent demeanor. Most videos  were Current (96%), Relevant (100%), created by a trustworthy source: Authority  (76%), and all were Accurate, with Purpose relating to needle pain management.  None of the videos addressed the unique needs of children with a preexisting  diagnosis of needle phobia. DISCUSSION: Publicly available educational videos  offer clinicians, parents, and children evidence-based techniques to manage  pediatric needle pain. Further evaluation is needed to determine whether this  form of education meets the needs of target audiences and whether this type of  content can lead to improved management of pediatric needle pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 351, "title": "Sin título", "authors": "Motta, Giordana de Cássia Pinheiro da; Schardosim, Juliana Machado; Cunha, Maria Luzia Chollopetz da", "journal": "J Pain Symptom Manage", "year": "2015", "vol": "50(3):394-401", "doi": "10.1016/j.jpainsymman.2015.03.019", "abstract": "CONTEXT: The Neonatal Infant Pain Scale (NIPS), initially developed in Canada, has been previously used but not adequately adapted and validated for use in Brazil. OBJECTIVES: The goal of the present study was to perform a cross-cultural adaptation and clinical validation of the NIPS for use in the Brazilian population. METHODS: The instrument was adapted based on the method outlined by Beaton et al., including the production and combination of translated versions, back-translation, committee review, and pilot testing. The psychometric properties of the adapted instrument, including its validity, reliability, and internal consistency, were tested in a clinical validation study. The sample comprised 60 at-term newborns who were evaluated by six nurses as they experienced vaccination. Psychometric properties were evaluated using Student's t-tests, prevalence-adjusted and bias-adjusted kappa scores, the Bland-Altman method, and Cronbach's alpha coefficients. RESULTS: The Brazilian version of the NIPS (Escala de Dor no Recém-Nascido [NIPS-Brazil]) demonstrated excellent interobserver and intraobserver reliability. Total NIPS-Brazil scores yielded prevalence-adjusted and bias-adjusted kappa scores of 0.93, whereas the Bland-Altman method revealed interobserver and intraobserver reliability values of 95% and 90%, respectively. The NIPS-Brazil had adequate internal consistency, as evidenced by a Cronbach's alpha of 0.762. CONCLUSION: The NIPS was successfully adapted for use in Brazil and is now available for use in the assessment of acute pain in at-term newborns in Brazil.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 381, "title": "Sin título", "authors": "de Freitas, Gabriel R. M.; de Castro, Cláudio G. Jr; Castro, Stela M. J. et al.", "journal": "Pain medicine (Malden, Mass.)", "year": "2014", "vol": "15(5):807-819", "doi": "10.1111/pme.12332", "abstract": "OBJECTIVE: To evaluate the degree of knowledge about pain management and opioids use by professionals working at three pediatric units. DESIGN: This is a  cross-sectional study. SETTING: This study was carried out at three pediatric  units (pediatrics, intensive care unit, and oncology) of Hospital de Clínicas de  Porto Alegre, which is a university hospital located in southern Brazil. SUBJECT:  The subjects of this study include physicians, pharmacists, physiotherapists,  nurses, nursing technicians, and nursing assistants. METHODS: Cross-sectional  study carried out in a university hospital in southern Brazil. A self-applicable  semi-structured questionnaire was handed out to 182 professionals from December  2011 to March 2012. RESULTS: The response rate was 67% (122); the average  percentage of correct answers was 63.2 ± 1.4%. The most frequent errors were: an  opioid must not be used if the cause of pain is unknown (47%; 54/115); patients  often develop respiratory depression (42.3%; 22/52); and confusion about symptoms  of withdrawal, tolerance, and dependency syndromes (81.9%; 95/116). Only 8.8%  (10/114) reported the use of pain scales to identify pain in children. The most  often cited hindrance to control pain was the difficulty to measure and spot pain  in pediatric patients. Finally, 50.8% (62/122) of them did not have any previous  training in pain management. CONCLUSIONS: Problems in the processes of pain  identification, measurement, and treatment have been found. Results suggest that  there is a need for both an investment in continuing education of professionals  and the development of protocols to optimize the analgesic therapy, thus  preventing increased child suffering.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 446, "title": "Sin título", "authors": "Nacimba, César; Aman, Marisol; Bucheli, María", "journal": "", "year": "", "vol": ":11-11", "doi": "", "abstract": "En la presente revisión bibiográfica hemos recopilado los datos más relevantes de investigaciones hechas en su mayoría en países con más experiencia en este tema, y se ha dado énfasis en lo que se refiere a las bases moleculares que permiten la histopatogenia causada por el HP en la mucosa gástrica, se revisa también los métodos de diagnóstico y tratamiento mejor aplicables a los niños.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 359, "title": "Sin título", "authors": "Bergomi, Piera; Chieppi, Michele; Maini, Antonella et al.", "journal": "Research and theory for nursing practice", "year": "2014", "vol": "28(4):335-348", "doi": "10.1891/1541-6577.28.4.335", "abstract": "INTRODUCTION: The heel-lance (HL) method for blood collection from the newborn is controversial for the pain it causes. This is the first randomized controlled  trial on the management and reduction of pain using the music of Wolfgang Amadeus  Mozart (\"Sonata K. 448\") in premature infants hospitalized in a neonatal  intensive care unit (NICU). This study has compared nonpharmacological techniques  with standard procedure for reducing pain during HL procedure. METHODS:  Thirty-five premature infants were enrolled, each for 3 HL procedures, of which  each was randomized to 1 of the 3 study arms. Arms were then compared in terms of  the Premature Infant Pain Profile (PIPP) changes by analysis of variance (ANOVA).  RESULTS: One hundred five HL procedures were available for analysis (35 standard  procedure, 35 music, 35 glucose). Median baseline PIPP was 3, and median PIPP  after the HL procedure was 5. PIPP scale change was +3 in the control arm, +1 in  the glucose arm, +2 in the music arm (p = .008). DISCUSSION: Both glucose and  music were safe and effective in limiting pain increase when compared to standard  procedure in HL procedures in preterm infants.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 362, "title": "Sin título", "authors": "Cardoso, Maria Vera Lúcia Moreira Leitão; Farias, Leiliane Martins; Melo, Gleicia Martins de", "journal": "Rev. latinoam. enferm. (Online)", "year": "2014", "vol": "22(5):810-818", "doi": "10.1590/0104-1169.0029.2484", "abstract": "OBJECTIVE: to analyze the total Premature Infant Pain Profile scores of premature infants undergoing arterial puncture during music and 25% glucose interventions, and to assess their association with neonatal and therapeutic variables. METHOD: a randomized clinical trial with 80 premature infants; 24 in the Experimental Group 1 (music), 33 in the Experimental Group 2 (music and 25% glucose), 23 in the Positive Control Group (25% glucose). All premature infants were videotaped and a lullaby was played for ten minutes before puncture in Experimental Groups 1 and 2; 25% glucose administered in Experimental Group 2 and the Positive Control Group two minutes before puncture. RESULTS: 60.0% of premature infants had moderate or maximum pain; pain scores and intervention groups were not statistically significant. Statistically significant variables: Experimental Group 1: head and chest circumference, Apgar scores, corrected gestational age; Experimental Group 2: chest circumference, Apgar scores, oxygen therapy; Positive Control group: birth weight, head circumference. CONCLUSION: neonatal variables are associated with pain in premature infants. Brazilian Registry of Clinical Trials: UTN: U1111-1123-4821. .", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 375, "title": "Sin título", "authors": "Melo, Gleicia Martins de; Lelis, Ana Luíza Paula de Aguiar; Cardoso, Maria Vera Lucia Moreira Leitão et al.", "journal": "Rev Enferm UFPE On line", "year": "2014", "vol": "8(1):8-15", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 331, "title": "Sin título", "authors": "Morais, Ana Paula da Silva; Façanha, Silvania Moreira de Abreu; Rabelo, Sarah Nogueira et al.", "journal": "Rev RENE", "year": "2016", "vol": "17(3):435-442", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 336, "title": "Sin título", "authors": "Rodríguez Hernández, Iyemai; Fajardo Villarroel, Aurora; Peña Jiménez, Maricela", "journal": "Rev. habanera cienc. méd", "year": "2016", "vol": "15(3):399-407", "doi": "", "abstract": "Introducción: La evaluación y el tratamiento del dolor es una parte esencial de la práctica pediátrica, que ha sido pobremente apreciada debido a que en esta etapa de la vida el paciente es incapaz de comunicar claramente su experiencia dolorosa y es uno de los problemas de salud más frecuentes con los que se encuentra la enfermera en los diferentes ámbitos de atención. Objetivo: Describir el rol del enfermero en las etapas de evaluación, valoración e intervención del dolor en niños. Desarrollo: El alivio del dolor y sufrimiento está considerado como uno de los principales derechos del paciente, y una de las responsabilidades fundamentales del ejercicio profesional de enfermería. Cada niño constituye una totalidad histórica, psíquica y sociocultural, esto hace que cada ser humano le atribuya una palabra que le ayude a describir la experiencia que identifique su dolor o sufrimiento y que el dolor físico en una o más partes del cuerpo la describan como una sensación desagradable y, por lo tanto, una experiencia emocional que modifica su estado de ánimo. La valoración y el tratamiento del dolor requieren que el personal de Enfermería genere confianza con la persona que experimenta dolor.Conclusiones: La adecuada valoración y evaluación del paciente pediátrico con dolor permitirá realizar una efectiva y personalizada intervención de enfermería, que incluya no solo el aspecto biológico, sino también el psicológico y social, lo cual ayudará al paciente a evitar y calmar el dolor(AU)", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 109, "title": "Sin título", "authors": "Vecchione, Tricia M.; Agarwal, Rita; Monitto, Constance L.", "journal": "Paediatric anaesthesia", "year": "2022", "vol": "32(9):982-992", "doi": "10.1111/pan.14514", "abstract": "Providing effective acute pain management to hospitalized children can help improve outcomes, decrease length of stay, and increase patient and parental  satisfaction. Error traps (circumstances that lead to erroneous actions or  undesirable consequences) can result in inadequately controlled pain, unnecessary  side effects, and adverse events. This article highlights five error traps  encountered when managing acute pain in children. They include failure to  appropriately assess pain, optimally utilize regional anesthesia, select suitable  systemic analgesics, identify and treat medication-related side effects, and  consider patient characteristics when choosing medication or dosing route. These  issues are easily addressed when the clinician is cognizant of ways to  anticipate, identify, and mitigate or avoid these errors.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 33, "title": "Sin título", "authors": "Leblanc, Laurence; Genest, Christine; Villemaire, Jade et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2024", "vol": "25(3):265-284", "doi": "10.1016/j.pmn.2024.02.004", "abstract": "BACKGROUND: Although there is a body of literature on the implementation of interventions to manage procedural pain and anxiety in youth with autism spectrum  disorders (ASD), we found no literature presenting the current state of knowledge  on this topic. OBJECTIVES: To review the state of knowledge on interventions for  the management of procedural pain and anxiety in children and adolescents with  ASD. METHOD: A scoping review using PRISMA-ScR was conducted. DATA SOURCES:  PubMed, MEDLINE, all EBM reviews, Embase, APA PsychInfo, EBSCO CINAHL, and  ProQuest Dissertations and Theses Global databases were searched. Gray literature  was also searched. ANALYSIS METHOD: Braun and Clarke's (2006) model for thematic  analysis in psychology was used to synthesize the search results. RESULTS: Thirty  articles were selected. Analysis of the extracted data revealed four elements of  intervention for better management of procedural pain and anxiety in the study  population: 1) characteristics of the procedure and the immediate environment; 2)  parent-child interactions; 3) health care provider-child interactions; and 4)  direct pharmacological and nonpharmacological interventions. IMPLICATIONS FOR  NURSING PRACTICE: Nurses must be able to implement appropriate interventions for  the management of procedural pain and anxiety in youth with an autism spectrum  disorder.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 9, "title": "Multisensory stimulation to reduce procedural pain in retinopathy of prematurity: A randomized contr", "authors": "Tasdemir, Halil Ibrahim", "journal": "Nursing in critical care", "year": "2025", "vol": "30(4):e13200", "doi": "10.1111/nicc.13200", "abstract": "BACKGROUND: Retinopathy is frequently seen in the neonatal intensive care unit (NICU), and its examination is a painful procedure for infants. AIM: This  randomized active-controlled trial aimed to investigate the impact of  multisensory stimulation (MSS) on neonatal pain during retinopathy of prematurity  (ROP) examinations, in comparison with a white noise (WN) and control group  receiving standard care. STUDY DESIGN: Conducted as a three-arm, randomized  controlled trial, the study was implemented in the NICU of a local university  hospital. Recruitment spanned from July 2023 to November 2023, with preterm  infants (gestational age < 37 weeks) randomly assigned to either a MSS, WN or a  control group. MSS components included visual, auditory, tactile, olfactory and  gustatory stimuli, all designed to create a synergistic, comforting environment  for the infant during the procedure. Procedural pain, heart rate and oxygen  saturation were assessed at various stages before and after ROP examinations.  RESULTS: Analysis of 90 participants revealed that the MSS group exhibited lower  Premature Infant Pain Profile (PIPP) scores than the WN and control groups (mean  difference: -2.12, 95% confidence interval [CI]: -2.62 to -1.62; odds ratio [OR]:  0.004, 95% CI [0.001, 0.012], p < 0.001). Additionally, heart rates were  significantly lower in the MSS group (mean difference: -15.3 beats/min, 95% CI:  -20.5 to -10.1; OR: 0.025, 95% CI [0.008, 0.073], p < .001) and oxygen saturation  levels were higher (mean difference: 3.2%, 95% CI: 1.8% to 4.6%; OR: 1.12, 95% CI  [1.05, 1.20], p < .001) than in the other groups. CONCLUSIONS: MSS emerges as a  favourable, safe and non-pharmacological intervention for pain management in ROP  and similar procedures. RELEVANCE TO CLINICAL PRACTICE: Multisensory stimulation  can be effectively integrated into the routine care provided by critical care  nurses during retinopathy of prematurity examinations in preterm infants. This  non-pharmacological intervention offers a practical approach for critical care  nurses to reduce procedural pain and improve physiological stability in this  vulnerable population.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 310, "title": "Sin título", "authors": "Tayeb, BO; Eidelman, A; Eidelman, CL et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2017", "vol": "(2):nan", "doi": "10.1002/14651858.CD005364.pub3", "abstract": "Abstract - Background Topical local anaesthetics provide effective analgesia for patients undergoing numerous superficial procedures, including repair of dermal lacerations. The need for cocaine in topical anaesthetic formulations has been questioned because of concern about adverse effects, thus novel preparations of cocaine‐free anaesthetics have been developed. This review was originally published in 2011 and has been updated in 2017. Objectives To assess whether benefits of non‐invasive topical anaesthetic application occur at the expense of decreased analgesic efficacy. To compare the efficacy of various single‐component or multi‐component topical anaesthetic agents for repair of dermal lacerations. To determine the clinical necessity for topical application of the ester anaesthetic, cocaine. Search methods For this updated review, we searched the following databases: Cochrane Central Register of Controlled Trials (CENTRAL; 2016, Issue 11), Cumulative Index to Nursing and Allied Health Literature (CINAHL; 2010 to December 2016), Embase (2010 to December 2016) and MEDLINE (2010 to December 2016). We did not limit this search by language or format of publication. We contacted manufacturers, international scientific societies and researchers in the field. Weemailed selected journalsand reviewed meta‐registers of ongoing trials. For the previous version of this review, we searched these databases to November 2010. Selection criteria We included randomized controlled trials (RCTs) that evaluated the efficacy and safety of topical anaesthetics for repair of dermal laceration in adult and paediatric participants. Data collection and analysis Two review authors independently assessed trial quality and extracted data. We contacted study authors for additional information when needed. We collected adverse event information from trial reports. We assessed methodological risk of bias for each included study and employed the GRADE approach to assess the overall quality of the evidence. Main results The present updated review included 25 RCTs involving 3278 participants. The small number of trials in each comparison group and the heterogeneity of outcome measures precluded quantitative analysis of data for all but one outcome: pain intensity. In two pooled studies, the mean self‐reported visual analogue scale (VAS; 0 to 100 mm) score for topical prilocaine‐phenylephrine (PP) was higher than the mean self‐reported VAS (0 to 100 mm) score for topical tetracaine‐epinephrine‐cocaine (TAC) by 5.59 points (95% confidence interval (CI) 2.16 to 13.35). Most trials that compared infiltrated and topical anaesthetics were at high risk of bias, which is likely to have affected their results. Researchers found that several cocaine‐free topical anaesthetics provided effective analgesic efficacy. However, data regarding the efficacy of each topical agent are based mostly on single comparisons in trials with unclear or high risk of bias. Mild, self‐limited erythematous skin induration occurred in one of 1042 participants who had undergone application of TAC. Investigators reported no serious complications among any of the participants treated with cocaine‐based or cocaine‐free topical anaesthetics. The overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Authors' conclusions We have found two new studies published since the last version of this review was prepared. We have added these studies to those previously included and have conducted an updated analysis, which resulted in the same review conclusions as were presented previously. Mostly descriptive analysis indicates that topical anaesthetics may offer an efficacious, non‐invasive means of providing analgesia before suturing of dermal lacerations. Use of cocaine‐based topical anaesthetics might be hard to justify, given the availability of other effective topical anaesthetics without cocaine. However, the overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Plain language summary Local anaesthesia (numbing medicine) that is directly applied to the skin can provide pain control for repair of skin lacerations Background : Pain control during suturing of torn skin is generally achieved by injecting medication into the skin (infiltration) to numb the area. This injection itself may cause pain, but topical anaesthetics are applied directly to the skin and are painless to administer. Cocaine was one of the first anaesthetics to be successfully applied topically. Concerns over adverse effects of cocaine, its potential misuse and the administrative burden of dispensing a controlled substance led to the development of cocaine‐free topical anaesthetics. Multiple cocaine‐free topical anaesthetics have been found to provide effective anaesthesia for repair of dermal lacerations. Study characteristics : The evidence is current to December 2016. We included in this review 25 randomized controlled trials involving 3278 participants. Studies included both adults and children. Fifteen of the included trials used self‐reporting of pain intensity by trial participants to determine the effectiveness of local anaesthetics. Key results : Study results suggest that directly applying local anaesthetics to the skin is an effective, non‐invasive way of providing pain control during suturing or stapling of skin lacerations. Study findings on the efficacy of individual topical anaesthetics were limited by study design, and data on the efficacy of each topical agent were obtained mostly from single trials. Researchers reported no serious side effects following the use of cocaine‐containing or cocaine‐free topical anaesthetics. The overall broadly comparable effectiveness of cocaine‐free topical anaesthetics for skin laceration repair brings into question the necessity to include cocaine as a component of local anaesthetic solutions. The small number of trials in each comparison group and the range of outcome measures assessed prevented pooling and quantitative analysis of data for all but the single outcome of pain intensity. Additional studies are necessary to directly compare the effectiveness of different formulations of topical anaesthetics. Our review was limited to pain control for repair of superficial lacerations, and our results might not be generalizable to deeper lacerations or more complex procedures performed on intact skin. Further research is needed to strengthen the evidence and to overcome the weakness of the included studies. Quality of the evidence : The overall quality of the evidence was low owing to limitations in study design, ways that studies were carried out (implementation), imprecision of results and high probability of selective data reporting. Most of the trials that compared infiltrated and topical anaesthetics were at high risk of bias, and this was likely to influence measured effects.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 313, "title": "Sin título", "authors": "Zurita-Cruz, Jessie Nallely; Rivas-Ruiz, Rodolfo; Gordillo-Álvarez, Virginia et al.", "journal": "Nutricion hospitalaria", "year": "2017", "vol": "34(2):301-307", "doi": "10.20960/nh.163", "abstract": "Objective: To determine the effectiveness of breastfeeding (BF) for the management in acute pain after vaccination in infants under 6 months of age when  compared to the milk substitute (MS) and not to apply any maneuver. Methods: A  controlled, single-blind phase III clinical trial was conducted on infants under  6 months old to evaluate the effectiveness of BF in acute pain by vaccination.  Divided in 3 groups: BF, milk substitutes (MS), and without applying any  analgesic maneuver (control). Pain was measured by crying time and pediatric pain  scale. Statistical analysis was performed using the Kruskal Wallis and  Mann-Whitney U for quantitative variables. For qualitative data, Chi2 was applied  Kaplan Meier was used to analyze the total time crying. Results: A total of 144  patients were recruited, divided in groups of 48 patients. The group of BF had  fewer crying time (p = 0.007) and pain rating at 90 (p = 0.006) and 120 (p =  0.003) seconds compared with other groups. There was no significant difference in  the crying time (p = 0.396) and the pain scale between the group receiving MR and  control. Conclusions: Breastfeeding is effective in management of acute pain by  vaccination in infants under six months of age compared to milk substitute and  control.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 127, "title": "Sin título", "authors": "Li, Cecilia; Doellner, Courtney; Leis, Aleda et al.", "journal": "Journal of pain & palliative care pharmacotherapy", "year": "2021", "vol": "35(1):31-37", "doi": "10.1080/15360288.2021.1873216", "abstract": "Recent studies in pediatric patients have suggested that ketamine, an N-methyl-D-aspartate receptor (NMDA) antagonist, given at sub-anesthetic doses  can effectively decrease pain scores, provide analgesic effects, and in some  cases, reduce opioid requirements. Our study aims to assess impact of low-dose  ketamine on reducing pain scores and total opioid requirements during an acute  pain crisis in pediatric patients. From November 2016 to December 2018, eight  patients between the ages of 2 and 17 years admitted to the pediatric intensive  care unit (PICU) were treated with LDK infusions to manage severe,  opioid-refractory, acute pain crises. Subjective pain scores and total morphine  milligram equivalent (MME) intake before, during, and after ketamine infusion  were collected through a structured chart review. Overall, the addition of  ketamine appeared to reduce subjective pain scores and opioid requirements. Two  patients were in palliative care and expired shortly after ketamine was started  and two patients were discharged within 48 hours of LDK infusion cessation.  Ketamine seemed to reduce heart rate and had no appreciable effect on respiratory  rate, blood pressure, or oxygen saturation. Hallucination was reported in one  patient which resolved upon dose reduction. LDK infusion could be considered as  an adjuvant therapy to optimize pain control in pediatric patients experiencing  acute pain crises. Further investigation with a larger patient population is  warranted to establish the effects of LDK on pain improvement and reducing total  opioid requirements.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 118, "title": "Sin título", "authors": "Cunningham, Natoshia R; Kalomiris, Anne; Peugh, James et al.", "journal": "J Pediatr", "year": "2021", "vol": "230:62-70.e3", "doi": "10.1016/j.jpeds.2020.10.060", "abstract": "OBJECTIVES: To evaluate the feasibility of a stepped care model, and establish the effect of a tailored cognitive behavioral therapy, the Aim to Decrease Anxiety and Pain Treatment (ADAPT), compared with standard medical treatment as usual on pain-related outcomes and anxiety. STUDY DESIGN: Eligible patients between the ages of 9 and 14 years with functional abdominal pain disorders (n = 139) received enhanced usual care during their medical visit to a gastroenterologist. Those that failed to respond to enhanced usual care were randomized to receive either a tailored cognitive behavioral therapy (ADAPT) plus medical treatment as usual, or medical treatment as usual only. ADAPT dose (4 sessions of pain management or 6 sessions of pain and anxiety management) was based on presence of clinically significant anxiety. Outcomes included feasibility, based on recruitment and retention rates. Response to ADAPT plus medical treatment as usual vs medical treatment as usual on pain-related outcomes and anxiety measures was also investigated using a structural equation modeling equivalent of a MANCOVA. Anxiety levels and ADAPT dose as moderators of treatment effects were also explored. RESULTS: Based on recruitment and retention rates, stepped care was feasible. Enhanced usual care was effective for only 8% of youth. Participants randomized to ADAPT plus medical treatment as usual showed significantly greater improvements in pain-related disability, but not pain levels, and greater improvements in anxiety symptoms compared with those randomized to medical treatment as usual only. Anxiety and ADAPT treatment dose did not moderate the effect of treatment on disability nor pain. CONCLUSIONS: Tailoring care based on patient need may be optimal for maximizing the use of limited psychotherapeutic resources while enhancing care. TRIAL REGISTRATION: ClinicalTrials.gov: NCT03134950.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 108, "title": "Sin título", "authors": "Uema, Roberta Tognollo Borotta; Shibukawa, Bianca Machado Cruz; Rissi, Gabrieli Patricio et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2022", "vol": "26:e20220181-e20220181", "doi": "10.1590/2177-9465-ean-2022-0181pt", "abstract": "RESUMO  Objetivo descrever o processo de construção e estratégias de implementação de um bundle para alívio da dor durante a punção arterial do bebê hospitalizado.  Métodos estudo de abordagem qualitativa feito em uma unidade de terapia intensiva neonatal, por meio de rodas de conversa realizadas com a equipe de enfermagem. A coleta dos dados ocorreu de fevereiro a maio de 2019.  Resultados os encontros levaram à construção de um bundle composto por quatro itens, formatado ludicamente e que deveria ser anexado à incubadora, previamente à realização da punção.  Conclusões e Implicações para a prática o processo estimulou a reflexão crítica acerca da própria prática e os profissionais referiram ao uso do bundle como algo possível dentro da unidade, mediante um planejamento para sua inclusão na rotina assistencial. O estudo é pioneiro e apresenta caráter de inovação ao utilizar o bundle para aliviar algo multifacetado como a dor no período neonatal. Apesar de ser algo criado especificamente para a punção arterial, o mesmo pode ser aplicado em demais procedimentos que potencialmente geram dor aguda, uma vez que o foco principal é sempre minimizar o desconforto sentido pelo bebê.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 224, "title": "Sin título", "authors": "Vasey, Jackie; Smith, Joanna; Kirshbaum, Marilynne N. et al.", "journal": "Journal of clinical nursing", "year": "2019", "vol": "28(9-10):1491-1505", "doi": "10.1111/jocn.14747", "abstract": "AIMS AND OBJECTIVES: To explore parental involvement in the child's acute pain care and establish ways in which parental preferences for involvement in their  child's care can be identified, facilitated and enhanced by nurses. BACKGROUND:  Despite growing evidence supporting effective acute pain management in children  and the availability of national and international practice guidelines, children  still experience acute pain. Involving parents in their child's pain care has  been identified as being a central tenet of pain management in children. DESIGN  AND METHODS: A qualitative study using an ethnographical approach with  nonparticipant observation and follow-up semi-structured interviews was  undertaken. Nurses (n = 14), parents (n = 41), grandparents (n = 2), other  relative (n = 1) and children (n = 30) participated. The framework approach  underpinned data analysis. Consolidated criteria for reporting qualitative  research (COREQ) enabled comprehensive reporting of the study. RESULTS: Three  concepts emerged from the data: \"parents as advocates for their child,\" \"nurses  promoting involvement and partnership\" and \"nurses unintentionally preventing  involvement and partnership.\" Variations in the way parents were involved in  their child's pain care were identified. Despite family-centred care being the  dominant model of involving families in their child's care, evidence of this  being implemented was limited. Parents attempted to advocate effective pain care  for their child, whether or not they were supported by nurses. CONCLUSIONS:  Parental involvement in their child's acute pain care can improve the child's  pain experience, reduce parental anxiety and increase parents' satisfaction in  care. Nurses aspired to involve parents in pain care, but did not always enact  this in practice. RELEVANCE FOR PRACTICE: Children deserve optimum pain care,  which includes parental involvement. Parental involvement underpinned by the  principles of family-centred care was poorly implemented. Parents attempted to be  involved and advocate for their child's pain care whether or not they were  supported by nurses. An alternative approach for supporting parents to advocate  in their child's acute pain care is offered, the \"Partnership in Pain Care  Model.\"", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 132, "title": "Sin título", "authors": "Morse, James D.; Hannam, Jacqueline A.; Anderson, Brian J. et al.", "journal": "Paediatric anaesthesia", "year": "2021", "vol": "31(12):1325-1331", "doi": "10.1111/pan.14282", "abstract": "BACKGROUND: Oxycodone pharmacokinetics have been described in premature neonates through to obese adults. Covariate influences have been accounted for using  allometry (size) and maturation of oxycodone clearance with age. The target  concentration is dependent on pain intensity that may differ over pain duration  or between individuals. METHODS: We assumed a target concentration of  35 mcg.L(-1) (acceptable range ±20%) to be associated with adequate analgesia  without increased risk of adverse effects from respiratory depression.  Pharmacokinetic simulation was used to estimate dose in neonates through to obese  adults given intravenous or parenteral oxycodone. RESULTS: There were 84% of  simulated oxycodone concentrations within the acceptable range during maintenance  dosing. Variability around the simulated target concentration decreased with age.  The maturation of oxycodone clearance is reflected in changes to  context-sensitive halftime where clearance is immature in neonates compared with  older children and adults. The intravenous loading and maintenance doses for a  typical 5-year-old child are 100 mcg.kg(-1) and 33 mcg.kg(-1) .h(-1) . In a  typical adult, the loading dose is 100 mcg.kg(-1) and maintenance dose  23 mcg.kg(-1) .h(-1) . CONCLUSION: Simulation was used to suggest loading and  maintenance doses to attain an oxycodone concentration of 35 mcg.L(-1) predicted  in adults. Although the covariates age and weight contribute 92% variability for  clearance, there remains variability accounting for 16% of concentrations outside  the target range. Duration of analgesic effect after ceasing infusion is  anticipated to be longer in neonates where context-sensitive halftime is greater  than older children and adults.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 86, "title": "Sin título", "authors": "de Sévaux, JL.H.; Damoiseaux, RAMJ; van de Pol, AC et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2023", "vol": "(8):nan", "doi": "10.1002/14651858.CD011534.pub3", "abstract": "Abstract - Background Acute otitis media (AOM) is one of the most common childhood infectious diseases. Pain is the key symptom of AOM and central to children's and parents' experience of the illness. Because antibiotics provide only marginal benefits, analgesic treatment including paracetamol (acetaminophen) and non‐steroidal anti‐inflammatory drugs (NSAIDs) is regarded as the cornerstone of AOM management. This is an update of a review first published in 2016. Objectives Our primary objective was to assess the effectiveness of paracetamol (acetaminophen) or NSAIDs, alone or combined, compared with placebo or no treatment in relieving pain in children with AOM. Our secondary objective was to assess the effectiveness of NSAIDs as compared with paracetamol in children with AOM. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), Issue 5, April 2023; MEDLINE (Ovid, from 1946 to May 2023), Embase (from 1947 to May 2023), CINAHL (from 1981 to May 2023), LILACS (from 1982 to May 2023), and Web of Science Core Collection (from 1955 to May 2023). We searched the WHO ICTRP and ClinicalTrials.gov for completed and ongoing trials (23 May 2023). Selection criteria We included randomised controlled trials comparing the effectiveness of paracetamol or NSAIDs, alone or combined, for pain relief in non‐hospitalised children aged six months to 16 years with AOM. We also included trials of paracetamol or NSAIDs, alone or combined, for children with fever or upper respiratory tract infections if we were able to extract subgroup data on pain relief in children with AOM either directly or after obtaining additional data from study authors. We extracted and summarised data for the following comparisons: paracetamol versus placebo, NSAIDs versus placebo, NSAIDs versus paracetamol, and NSAIDs plus paracetamol versus paracetamol alone. Data collection and analysis We used standard methodological procedures expected by Cochrane. We rated the overall certainty of evidence for each outcome of interest using the GRADE approach. Main results We included four trials (411 children) which were assessed at low to high risk of bias. Paracetamol versus placebo Data from one trial (148 children) informed this comparison. Paracetamol may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 10% versus 25%, risk ratio (RR) 0.38, 95% confidence interval (CI) 0.17 to 0.85; number needed to treat for an additional beneficial outcome (NNTB) 7; low‐certainty evidence). The evidence is very uncertain about the effects of paracetamol on fever at 48 hours (RR 1.03, 95% CI 0.07 to 16.12; very low‐certainty evidence) and adverse events (RR 1.03, 95% CI 0.21 to 4.93; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus placebo Data from one trial (146 children) informed this comparison. Ibuprofen may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 7% versus 25%, RR 0.28, 95% CI 0.11 to 0.70; NNTB 6; low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen on fever at 48 hours (RR 1.06, 95% CI 0.07 to 16.57; very low‐certainty evidence) and adverse events (RR 1.76, 95% CI 0.44 to 7.10; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus paracetamol Data from four trials (411 children) informed this comparison. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving ear pain at 24 hours (RR 0.83, 95% CI 0.59 to 1.18; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 0.91, 95% CI 0.54 to 1.54; 3 RCTs, 183 children; low‐certainty evidence); and four to seven days (RR 0.74, 95% CI 0.17 to 3.23; 2 RCTs, 38 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on mean pain score at 24 hours (0.29 lower, 95% CI 0.79 lower to 0.20 higher; 3 RCTs, 111 children; very low‐certainty evidence); 48 to 72 hours (0.25 lower, 95% CI 0.66 lower to 0.16 higher; 3 RCTs, 108 children; very low‐certainty evidence); and four to seven days (0.30 higher, 95% CI 1.78 lower to 2.38 higher; 2 RCTs, 31 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol in resolving fever at 24 hours (RR 0.69, 95% CI 0.24 to 2.00; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 1.18, 95% CI 0.31 to 4.44; 3 RCTs, 182 children; low‐certainty evidence); and four to seven days (RR 2.75, 95% CI 0.12 to 60.70; 2 RCTs, 39 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on adverse events (RR 1.71, 95% CI 0.43 to 6.90; 3 RCTs, 281 children; very low‐certainty evidence); reconsultations (RR 1.13, 95% CI 0.92 to 1.40; 1 RCT, 53 children; very low‐certainty evidence); and delayed antibiotic prescriptions (RR 1.32, 95% CI 0.74 to 2.35; 1 RCT, 53 children; very low‐certainty evidence). No data were available on time to resolution of pain. NSAIDs plus paracetamol versus paracetamol alone Data on the effectiveness of ibuprofen plus paracetamol versus paracetamol alone came from two trials that provided crude subgroup data for 71 children with AOM. The small sample provided imprecise effect estimates, therefore we were unable to draw any firm conclusions (very low‐certainty evidence). Authors' conclusions Despite explicit guideline recommendations on the use of analgesics in children with AOM, the current evidence on the effectiveness of paracetamol or NSAIDs, alone or combined, in children with AOM is limited. Paracetamol and ibuprofen as monotherapies may be more effective than placebo in relieving short‐term ear pain in children with AOM. The evidence is very uncertain for the effect of ibuprofen versus paracetamol on relieving short‐term ear pain in children with AOM, as well as for the effectiveness of ibuprofen plus paracetamol versus paracetamol alone, thereby preventing any firm conclusions. Further research is needed to provide insights into the role of ibuprofen as adjunct to paracetamol, and other analgesics such as anaesthetic eardrops, for children with AOM. Plain language summary Drugs to relieve pain for children with acute middle ear infection Key messages ‐ The current evidence on the effectiveness of painkillers, alone or together, in relieving ear pain in children with acute middle ear infection (acute otitis media (AOM)) is limited. ‐ Both paracetamol (acetaminophen) and ibuprofen as standalone treatments may be more effective than placebo in relieving short‐term ear pain in children with AOM. We are uncertain if there is a difference in effect between ibuprofen and paracetamol and between ibuprofen plus paracetamol and paracetamol alone, thereby preventing any firm conclusions. ‐ Further research is needed into the role of ibuprofen as an add‐on treatment to paracetamol, as well as on other pain relievers such as analgesic eardrops, for children with AOM. What is AOM? AOM, or acute middle ear infection, is one of the most common childhood infections and is usually preceded by a viral upper respiratory tract infection. Ear pain is the key symptom and central to children's and parents' experience of the illness. What did we want to find out? We wanted to find out if painkillers are effective for relieving ear pain in children with AOM and which drugs, alone or together, provide the most effective pain relief. What did we do? We searched for studies that looked at the effectiveness of paracetamol (acetaminophen) or non‐steroidal anti‐inflammatory drugs (NSAIDs such as ibuprofen), alone or combined, compared with placebo (dummy treatment) or no treatment in relieving pain in non‐hospitalised children aged six months to 16 years with AOM. We also wanted to evaluate the effectiveness of NSAIDs as compared with paracetamol in these children. We compared and summarised the results of these studies, and rated our confidence in the evidence based on factors such as study methods and effect sizes. What did we find? Very limited information was available to assess how useful painkillers are for relieving ear pain in children with AOM. One trial compared paracetamol versus placebo (148 children) and NSAIDs versus placebo (146 children). We found that when used alone, paracetamol and ibuprofen may be more effective than placebo in relieving ear pain at 48 hours (25% of children receiving placebo had pain at 48 hours versus 10% in the paracetamol and 7% in the ibuprofen group). Four trials (411 children) compared ibuprofen versus paracetamol in children with AOM. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving short‐term ear pain in children with AOM. The evidence is very uncertain about the effects of paracetamol and ibuprofen on adverse events. The very limited number of participants prevented us from drawing any firm conclusions on the effects of ibuprofen plus paracetamol versus paracetamol alone. What are the limitations of the evidence? Due to such issues as study limitations and questions about the applicability of the evidence, we have low confidence in the evidence for all comparisons. How up‐to‐date is this evidence? The evidence in this review is current to 23 May 2023.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 93, "title": "Sin título", "authors": "Fernandez, R; Green, HL; Griffiths, R et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2022", "vol": "(9):nan", "doi": "10.1002/14651858.CD003861.pub4", "abstract": "Abstract - Background Although various solutions have been recommended for cleansing wounds, normal saline is favoured as it is an isotonic solution and is not thought to interfere with the normal healing process. Tap water is commonly used in community settings for cleansing wounds because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. Objectives To assess the effects of water for wound cleansing. Search methods For this fifth update, in May 2021 we searched the Cochrane Wounds Specialised Register; the Cochrane Central Register of Controlled Trials (CENTRAL); Ovid MEDLINE; Ovid Embase and EBSCO CINAHL Plus. We also searched clinical trials registries for ongoing and unpublished studies, and scanned reference lists of relevant included studies as well as reviews, meta‐analyses and health technology reports to identify additional studies. There were no restrictions with respect to language, date of publication or study setting. Selection criteria We included all randomised controlled trials (RCTs) that assessed wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). For this update, we excluded quasi‐RCTs, thereby removing some studies which had been included in the previous version of the review. Data collection and analysis Two review authors independently carried out trial selection, data extraction and GRADE assessment of the certainty of evidence. Main results We included 13 trials in this update including a total of 2504 participants ranging in age from two to 95 years. Participants in the trials experienced open fractures, surgical wounds, traumatic wounds, anal fissures and chronic wounds. The trials were conducted in six different countries with the majority conducted in India and the USA. Three trials involving 148 participants compared cleansing with tap water with no cleansing. Eight trials involving 2204 participants assessed cleansing with tap water compared with cleansing with normal saline. Two trials involving 152 participants assessed cleansing with distilled water compared with cleansing with normal saline.  One trial involving 51 participants also assessed cleansing with cooled boiled water compared with cleansing with normal saline, and cleansing with distilled water compared with cleansing with cooled boiled water. Wound infection:  no trials reported on wound infection for the comparison cleansing with tap water versus no cleansing. For all wounds, eight trials found the effect of cleansing with tap water compared with normal saline is uncertain (risk ratio (RR) 0.84, 95% confidence interval (CI) 0.59 to 1.19); very low‐certainty evidence. Two trials comparing the use of distilled water with normal saline for cleansing open fractures found that the effect on the number of fractures that were infected is uncertain (RR 0.70, 95% CI 0.45 to 1.09); very low‐certainty evidence. One trial compared the use of cooled boiled water with normal saline for cleansing open fractures and found that the effect on the number of fractures infected is uncertain (RR 0.83, 95% CI 0.37 to 1.87); very low‐certainty evidence. This trial also compared the use of distilled water with cooled boiled water and found that the effect on the number of fractures infected is uncertain (RR 0.59, 95% CI 0.24 to 1.47); very low‐certainty evidence. Wound healing:  results from three trials comparing the use of tap water with no wound cleansing demonstrated there may be little or no difference in the number of wounds that did not heal between the groups (RR 1.04, 95% CI 0.95 to 1.14); low‐certainty evidence. The effect of tap water compared with normal saline is uncertain; two trials were pooled (RR 0.57, 95% CI 0.30 to 1.07) but the certainty of the evidence is very low. Results from one study comparing the use of distilled water with normal saline for cleansing open fractures found that there may be little or no difference i
