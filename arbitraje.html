.arb-notes { width: 100%; margin-top: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 11px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #2d3748; resize: vertical; min-height: 52px; line-height: 1.5; }
.arb-notes:focus { outline: none; border-color: #276749; box-shadow: 0 0 0 2px rgba(39,103,73,0.15); }
.arb-notes::placeholder { color: #a0aec0; }

<script>
const SCRIPT   = "https://script.google.com/macros/s/AKfycbzSfOxifdZewvtbqsXbM95l0pmOxHBnHKElpGSzqUunT6QiEWTr7vyQpTuYFOmz_RmE/exec";
const MOTIVOS  = ["","E1 — Población oncológica","E2 — Neonatos en UCI neonatal",
  "E3 — Dolor crónico no procedimental","E4 — Ámbito quirúrgico/UCI",
  "E5 — Intervención no realizada por enfermería","E6 — Publicado antes de 2014",
  "E7 — Tipo de artículo no válido","E8 — Sin escala de dolor validada",
  "E9 — Texto completo no disponible","E0 — Duplicado no detectado por Zotero"];
const ARTICLES = [{"id": 1, "title": "Evaluation of ketorolac ceiling dose effects in pediatric patients in the emergency department.", "authors": "Bindseil, Isabelle; Soderstrom, Rhynn; Balmat, Ryan", "journal": "The American journal of emergency medicine", "year": "2025", "vol": "89:139-143", "doi": "10.1016/j.ajem.2024.12.011", "abstract": "BACKGROUND: The use of ketorolac for analgesia in the emergency department is a common practice for pediatric patients. There is a lack of guidance on optimal  dosing to limit the risk of side effects especially in pediatric patients. The  standard dosing is weight based with a cap at 30 mg, a dose which is higher than  the typical max used for adult patients. The objective of this study is to  compare the analgesic effect of intravenous ketorolac at doses of 15 mg versus  doses greater than 15 mg. METHODS: This retrospective observational study was  performed at a single-center, pediatric tertiary academic medical center. A  system-generated report identified patients with an order for IV ketorolac within  the ED from July 2021 to July 2022. Pediatric patients presenting to the ED with  acute pain and being treated with monotherapy ketorolac for analgesia at a  minimum dose of 15 mg were included. The primary outcome of this study evaluated  the change in pain score in patients receiving one dose of ketorolac dosed at  15 mg as compared to doses greater than 15 mg. RESULTS: Our study population  included 599 patients receiving ketorolac IV in the ED with baseline demographics  similar between groups. For the primary outcome there was no statistically  significant difference in the number of patients with a decrease in pain score  between patient groups (p = 0.84). CONCLUSION: This retrospective review  demonstrates an association of similar analgesic effects using a capped dose of  15 mg of IV ketorolac as compared to larger doses in pediatric patients admitted  to the ED.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 4, "title": "Frenillo lingual, anquiloglosia y lactancia materna", "authors": "Rossato, Norma E", "journal": "Arch. argent. pediatr", "year": "2025", "vol": "123(1):e202410507-e202410507", "doi": "10.5546/aap.2024-10507", "abstract": "Entre 1997 y 2012 los diagnósticos de anquiloglosia y la indicación de frenotomía aumentaron Ë800 %. Alrededor del 38 % de los casos diagnosticados son intervenidos quirúrgicamente. La promoción de la lactancia materna incluye la evaluación de antecedentes hereditarios y personales maternos de lactancia, estructura mamaria, fisiología endocrinológica, equilibrio emocional de la madre, técnica de amamantamiento, calidad y cantidad de leche, capacidad del recién nacido de prenderse y succionar. La frenotomía estaría indicada cuando la restricción de la función lingual provoca dificultades que no se han resuelto luego de una evaluación exhaustiva y del asesoramiento para corregir otras causas encontradas. Las frenotomía puede tener complicaciones: problemas en la alimentación, respiratorios, dolor, pérdida de peso, daños vasculares o nerviosos, y retraso en el diagnóstico de otras patologías subyacentes. No siempre soluciona las dificultades de la lactancia. El trabajo en equipo interdisciplinario disminuye la frecuencia de las frenotomías innecesarias.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 6, "title": "The effectiveness of cryotherapy and cooled topical anesthesia compared with conventional topical an", "authors": "Saeedi, Pooya; Sarraf Shirazi, Alireza; Ghorbani, Mahsa", "journal": "International journal of paediatric dentistry", "year": "2025", "vol": "35(4):655-674", "doi": "10.1111/ipd.13275", "abstract": "BACKGROUND: Injection pain remains a significant concern in dental procedures, often leading to patient anxiety and reluctance to seek necessary care. AIM: This  study aimed to assess the effectiveness of cryotherapy in reducing injection pain  compared with topical anesthesia during intraoral local anesthesia. DESIGN:  MEDLINE, Web of Science, EMBASE, Scopus, and Cochrane's CENTRAL databases were  searched up to November 2023. Inclusion criteria involved randomized clinical  trials aligned with the PICO question. Study selection, data extraction, and risk  of bias assessment using the ROB-2 tool were performed. The results were  synthesized through a random-effects inverse variance meta-analysis. The primary  outcomes assessed were the Visual Analogue Scale (VAS) and Sound Eye Motor (SEM).  Subgroup analysis was conducted for children and adults. RESULTS: In the  meta-analysis, 31 RCTs involving 2470 subjects were included. Twenty-seven  studies demonstrated cryotherapy's significant superiority over topical  anesthesia in reducing injection pain via VAS in adults (p = .01), children (p =  .01), and combined age groups (p < .001). Additionally, cryotherapy significantly  outperformed topical anesthesia in reducing pain via SEM in children (p = .04)  and combined age groups (p = .03) across 13 studies, with no significant  difference in adults (p = .51). Furthermore, cooled topical anesthesia also  outperformed room temperature topical anesthesia (p < .001). The certainty of the  results, however, is of very low quality. CONCLUSIONS: Our results indicate that  cryotherapy significantly reduces injection pain compared with topical  anesthesia, especially in children and combined age groups, but is less effective  in adults. Additionally, cooled topical anesthesia is more effective than room  temperature topical anesthesia. Thus, cryotherapy is a and potentially superior  alternative to topical anesthesia, particularly for children.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 7, "title": "Efficacy and safety of the Valsalva maneuver in relieving venipuncture pain in children and adults: ", "authors": "Shi, Haoning; Li, Xia; Huang, Xiaotong et al.", "journal": "The journal of vascular access", "year": "2025", "vol": "26(1):40-54", "doi": "10.1177/11297298241231903", "abstract": "Venipuncture is a common invasive clinical procedure, and pain management during puncture has been of interest to healthcare professionals. The purpose of this  systematic review and meta-analysis was to evaluate the efficacy and safety of  the Valsalva maneuver (VM) for the relief of venipuncture pain in children and  adults. PubMed, Embase, Web of Science, Cochrane Library, CNKI, Wanfang, VIP  database, and CBM were searched from inception to December 2023 for all available  randomized controlled trials (RCTs) that evaluated the impact of VM on  venipuncture. Two reviewers independently performed study selection, data  extraction, and risk of bias assessment. Continuous variables were analyzed by  mean differences (MD) or standardized mean differences (SMD), whereas dichotomous  variables were analyzed by risk ratios (RR). A total of 22 studies involving 1740  participants were included. The pooled results showed that VM relieved pain  intensity during venipuncture in children (SMD = -0.89, 95% CI = -1.47 to -0.30,  p = 0.003) and adults (SMD = -1.11, 95% CI = -1.46 to -0.77, p < 0.00001),  reduced anxiety intensity (SMD = -1.07, 95% CI = -1.68 to -0.47, p = 0.0005), and  shortened puncture time (MD = -13.52, 95% CI = -21.14 to -5.90, p = 0.0005).  There was no significant difference in the success rate of venous cannulation,  MAP, HR, or incidence of adverse events in subjects who performed VM compared to  controls. VM was an effective and safe method of pain management that reduced  pain intensity during venipuncture in children and adults without significant  adverse effects. The results of this meta-analysis need to be further validated  by more rigorous and larger RCTs.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 13, "title": "Implementation of the WHO standards to assess quality of care for children with acute pain in EDs: f", "authors": "Balestra, Elia; Cozzi, Giorgio; Sforzi, Idanna et al.", "journal": "BMJ paediatrics open", "year": "2024", "vol": "8(Suppl 7):nan", "doi": "10.1136/bmjpo-2024-002610", "abstract": "BACKGROUND: There is little experience on the use of the WHO Standards for improving the quality of care (QOC) for children. We describe the use of four  prioritised WHO Standard-based Quality Measures to assess the provision of care  for children with pain in emergency departments (EDs). METHODS: In a multicentre  observational study in 10 EDs with different characteristics in Italy, we  collected data on 3355 children accessing the EDs between January 2019 and  December 2020. The association between children and facility characteristics and  quality measures was analysed through multivariate analyses. RESULTS: The  proportion of children whose pain was measured was 68.7% (n=2305), with extreme  variations across different centres (from 0.0% to 99.8%, p<0.001). The proportion  of children treated for pain was 28.9% (n=970) again with a wide range  (5.3%-56.3%, p<0.001). The difference between the frequency of children with pain  measured and pain treated varied widely between the facilities (ranging from  -24.3 to 82). Children with moderate and severe pain were more frequently treated  (48.9% and 62.9% of cases, respectively), although with large variations across  centres (ranges: 0%-74.8% and 0%-100% respectively, p<0.001). After correction  for children's characteristics, the variable more strongly associated with  analysed outcomes was the facility which the child accessed for care. Being a  facility in Northern Italy was associated with a higher rate of pain measurement  (67.3%-95% CI: 39.9% to 94.6%, p<0.001) compared with facilities in South Italy  (-22.1% lower (95% CI: -41.7% to -2.50%, p=0.03). CONCLUSIONS: The use of few WHO  Standard-based measures related to pain can help identifying priority gaps in QOC  for children and in monitoring it over time. There is a need for more  implementation research to establish which are the most sustainable and effective  interventions to improve the QOC for acute pain in children.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 19, "title": "A review and bibliometric analysis of global research on non-pharmacologic management for neonatal a", "authors": "Chen, Xin; Li, Ruoyu; Xiong, Anqi et al.", "journal": "Medicine", "year": "2024", "vol": "103(48):e40552", "doi": "10.1097/MD.0000000000040552", "abstract": "Repeated and prolonged exposure to pain can impair neurodevelopmental, behavioral, and cognitive outcomes in newborns. Effective pain management of  newborns is essential, but there is no comprehensive analysis of the status of  neonatal pain non-pharmacologic management research. Original publications  related to the non-pharmacological management of neonatal pain were obtained from  the Web of Science Core Collection (WOSCC) between 1989 and 2024. CiteSpace and  VOSviewer were used to extract information about countries/regions, institutions,  authors, keywords, and references to identify and analyze the research hotspots  and trends in this field. 1331 authors from 51 countries and 548 institutions  published studies on the non-pharmacological management of neonatal pain between  1989 and 2024, with the number of publications showing an overall upward trend.  Canada emerged as the leading country in terms of publication volume, with the  University of Toronto and The Hospital for Sick Children identified as key  research institutions. High-frequency keywords included \"procedural pain,\"  \"management,\" \"sucrose,\" \"analgesia,\" and \"preterm infant,\" resulting in 11  clusters. Keyword emergence analysis revealed that \"neonatal pain,\" \"analgesia,\"  \"oral sucrose,\" and \"oral glucose\" were research hotpots. Analysis of highly  cited papers showed that the most referenced articles were published in the  Clinical Journal of Pain. Researchers' interest in neonatal procedural pain has  increased significantly over the past 30 years. This article can serve as a  theoretical reference for future research on mild to moderate pain in neonates  and infants, and it can provide ideas for exploring novel and secure pain  management strategies.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 21, "title": "The effect of maternal voice and non-nutritional sucking on repeated procedural pain of heel prick i", "authors": "Chen, Yushuang; Zhou, Leshan; Tan, Yanjuan", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):256", "doi": "10.1186/s12887-024-04738-7", "abstract": "BACKGROUND: Neonates in the neonatal intensive care unit undergo frequent painful procedures. It is essential to reduce pain using safe and feasible methods.  PURPOSE: To evaluate the effects of non-nutritional sucking, mother's voice, or  non-nutritional sucking combined with mother's voice on repeated procedural pain  in hospitalized neonates. METHODS: A quasi-experimental study was conducted in  which 141 neonates were selected in a hospital in Changsha, China. Newborns were  divided into four groups: non-nutritional sucking (NNS) (n = 35), maternal voice  (MV) (n = 35), NNS + MV (n = 34), and control (n = 37) groups. The Preterm Infant  Pain Profile-Revised Scale (PIPP-R) was used to assess pain. RESULTS: During the  heel prick, the heart rate value and blood oxygen saturation were significantly  different between the groups (P < 0.05). Both non-nutritional sucking and  maternal voice significantly reduced PIPP-R pain scores of hospitalized newborns  (P < 0.05). The pain-relief effect was more robust in the combined group than in  other groups. CONCLUSIONS: This study showed that both non-nutritional sucking  and the mother's voice alleviated repeated procedural pain in neonates.  Therefore, these interventions can be used as alternatives to reduce repeated  procedural pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 26, "title": "Sin título", "authors": "Guillari, Assunta; Giordano, Vincenza; Catone, Maria et al.", "journal": "Journal of pediatric nursing", "year": "2024", "vol": "78:e102-e116", "doi": "10.1016/j.pedn.2024.06.025", "abstract": "PROBLEM: Children of different age groups frequently undergo painful procedures involving needles, which can be a source of significant discomfort. Regrettably,  this aspect of care often receives insufficient attention from healthcare  professionals. The existing literature proposes several methodologies for  managing procedural pain, with nonpharmacological techniques being particularly  promising. These techniques should be adapted to the patient's age, but  literature predominantly emphasizes their use with infants. Thus, it is necessary  to evaluate their effectiveness in diverse age groups. Consequently, the purpose  of this systematic review is to identify non-pharmacological interventions used  to prevent needle-related procedural pain in children (age group 6-12 years).  ELIGIBILITY CRITERIA: Primary studies in English language on non-pharmacological  interventions in children aged 6-12 years undergoing needle-related procedures  found on PubMed, CINAHL and Embase. SAMPLE: A total of 18 studies were included.  RESULTS: The results indicate the potential application of various  non-pharmacological techniques, with distraction methods standing out. These  techniques include activities like utilizing cards, watching cartoons, employing  virtual reality and playing video games. CONCLUSIONS: Children's procedural pain  represents a significant challenge in treatment plans. Literature offers several  approaches, including nonpharmacologic methods, to control this problem.  Prioritizing procedural pain management is critical both at clinical and  organizational levels to improve the quality of pediatric care. IMPLICATIONS:  These findings offer different options to support clinical practice, holding the  potential to enhance the quality of patient care.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 34, "title": "Sin título", "authors": "Moura, Jefferson Wildes da Silva; Bitencourt, Aline de Souza; Silva, Thiago Lopes et al.", "journal": "Rev. Bras. Enferm. (Online)", "year": "2024", "vol": "77(3):e20230399-e20230399", "doi": "10.1590/0034-7167-2023-0399", "abstract": "ABSTRACT  Objective: to map scientific evidence regarding the use of local pressure devices in pain relief during injection procedures in patients.  Methods: scoping review, following the recommendations of the JBI Manual for Evidence Synthesis and PRISMA-ScR, with searches conducted in the PubMed, EMBASE, CINAHL, LILACS, and PsycINFO databases, without temporal restrictions and with a cutoff date of March 2023.  Results: a total of 1,514 studies were identified, with 20 articles included in the final sample. The ShotBlocker® device was utilized during subcutaneous and intramuscular injections in children and adults, proving beneficial in reducing pain, anxiety, and fear associated with the procedure.  Final considerations: the ShotBlocker® is a low-cost, easy-to-use device that can enhance nursing clinical practice during painful procedures. However, studies involving the Brazilian Pikluc® device are scarce. Further research involving both local pressure devices is recommended.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 27, "title": "Sin título", "authors": "Henkel, Emily D.; Haller, Courtney N.; Diaz, Lucia Z. et al.", "journal": "Pediatric dermatology", "year": "2024", "vol": "41(4):577-587", "doi": "10.1111/pde.15635", "abstract": "Pediatric procedure-related pain management is often incompletely understood, inadequately addressed, and critical in influencing a child's lifelong  relationship with the larger health care community. We highlight the evolution of  ethics and expectations around optimizing periprocedural pain management as a  fundamental human right. We investigate the state-of-the-art of topical  anesthetics, reviewing their mechanisms of action and providing comparisons of  their relative safety and efficacy data to help guide clinical selection. In  total, this two-part review offers a combination of conventional approaches and  innovative techniques that should be used multimodally-in series and in  parallel-to help optimize pain management and provide alternatives to sedation  medication and general anesthesia.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 28, "title": "Sin título", "authors": "Henkel, Emily D.; Haller, Courtney N.; Diaz, Lucia Z. et al.", "journal": "Pediatric dermatology", "year": "2024", "vol": "41(4):588-598", "doi": "10.1111/pde.15677", "abstract": "Pediatric procedure-related pain management is often incompletely understood, inadequately addressed, and critical in influencing a child's lifelong  relationship with the larger healthcare community. We present a comprehensive  review of infiltrative anesthetics, including a comparison of their mechanisms of  action and relative safety and efficacy data to help guide clinical selection. We  also describe the multimodal utilization of adjunct therapies-in series and in  parallel-to support the optimization of pediatric periprocedural pain management,  enhance the patient experience, and provide alternatives to sedation medication  and general anesthesia.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 32, "title": "Sin título", "authors": "Jin, Faguang; Wang, Xiaofang; Qi, Maomao et al.", "journal": "Medicine", "year": "2024", "vol": "103(15):e37522", "doi": "10.1097/MD.0000000000037522", "abstract": "BACKGROUND: Pain transcends simple physiology, encompassing biological, emotional, psychological, and social facets. Children show pronounced immediate  and enduring responses to pain-related procedures. The aim of this meta-analysis  is to investigate the efficacy and safety of the Buzzy device for needle-related  procedures in children aged twelve years or younger. METHODS: PubMed, Web of  Science, and Embase were searched from inception to July 2023. Only randomized  controlled trials utilizing the Buzzy device for needle-related procedures in  children under twelve years old were included. Two reviewers independently  conducted study selection, data extraction, and risk of bias assessment.  Random-effects models were utilized, and analyses were performed using mean  differences or standardized mean differences as well as risk ratios. RESULTS: A  total of 19 studies were included, involving 2846 participants (Buzzy = 1095,  Control = 1751). Compared to no intervention, the Buzzy device significantly  reduced pain response [self-report SMD = -1.90 (-2.45, -1.36), parental  SMD = -3.04 (-4.09, -1.99), observer SMD = -2.88 (-3.75, -2.02)] and anxiety  scores [self-report SMD = -1.97 (-3.05, -0.88), parental SMD = -2.01 (-2.93,  -1.08), observer SMD = -1.92 (-2.64, -1.19)]. Compared to virtual reality (VR),  the Buzzy device reduced self-reported anxiety levels SMD = -0.47 (-0.77, -0.17),  and compared to distraction cards, the Buzzy device reduced parental and  observer-reported pain [parental SMD = -0.85 (-1.22, -0.48), observer SMD = -0.70  (-1.00, -0.40)] and anxiety [parental SMD = -0.96 (-1.46, -0.47), observer  SMD = -0.91 (-1.40, -0.42)]. Subgroup analysis results showed that procedure  type, patient age, measurement scales used, and distance of operation were not  the reason of heterogeneity. The summarized first puncture attempt success rate  did not differ from other interventions. There were no significant adverse events  in the included studies. CONCLUSION: The Buzzy device reduces pain and anxiety in  children during needle procedures, ensuring success and safety. Additionally, the  effectiveness of the Buzzy device in reducing pain during venipuncture is  superior when compared to its effectiveness during intramuscular injections.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 39, "title": "Sin título", "authors": "Prado, Tamires de Assis Vasconcellos; Leonello, Daniela de Castro Barbosa; Lelis, Beatriz Dutra Brazão et al.", "journal": "Rev. Enferm. Atual In Derme", "year": "2024", "vol": "98(2):nan", "doi": "10.31011/reaid-2024-v.98-n.2-art.2232", "abstract": "Objetivo: Analisar, na literatura, os efeitos das relações familiares no manejo da dor em recém-nascidos. Método: Revisão sistemática com busca e seleção nas seguintes bases de dados: MEDLINE, SCOPUS, Embase, Web of Science, LILACS, IBECS e BDENF. A amostra foi constituída por 17 estudos clínicos, sem delimitação geográfica, temporal ou de idioma. A análise foi realizada de forma descritiva, sendo ainda utilizada a classificação do nível de evidência para caracterizar as produções incluídas. Resultados: A dor constituiu o principal parâmetro de avaliação, especialmente durante a após procedimentos invasivos, sendo mensurada por meio de escalas de medida, assim como de parâmetros comportamentais e laboratoriais. As principais intervenções identificadas foram expressas pelo método canguru e pela amamentação que predominaram na maioria dos estudos incluídos. Outras estratégias evidenciadas envolveram a voz materna e a educação digital em saúde dos familiares. Todas as intervenções identificadas foram descritas como importante método não farmacológico para redução da dor, resultando no controle da duração e da intensidade do choro, da frequência, do nível basal de cortisol e da saturação de oxigênio. Conclusão: A participação materna e familiar pode ser considerada uma importante estratégia não farmacológica para alívio da dor no recém-nascido, estando relacionada a melhorias das condições fisiológicas, laboratoriais e comportamentais durante e após procedimentos dolorosos", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 37, "title": "Sin título", "authors": "Pan, Xin-Yun; Bi, Xuan-Yi; Nong, Yan-Ning et al.", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):643", "doi": "10.1186/s12887-024-05116-z", "abstract": "BACKGROUND: The ability of socially assistive robots (SARs) to treat dementia and Alzheimer's disease has been verified. Currently, to increase the range of their  application, there is an increasing amount of interest in using SARs to relieve  pain and negative emotions among children in routine medical settings. However,  there is little consensus regarding the use of these robots. OBJECTIVE: This  study aimed to evaluate the effect of SARs on pain and negative affectivity among  children undergoing invasive needle-based procedures. DESIGN: This study was a  systematic review and meta-analysis of randomized controlled trials that was  conducted in accordance with the Cochrane Handbook guidelines. METHODS: The  PubMed, CINAHL, Web of Science, Cochrane Library, Embase, CNKI, and WanFang  databases were searched from inception to January 2024 to identify relevant  randomized controlled trials (RCTs). We used the Cochrane Risk of Bias tool 2.0  (RoB2.0) to assess the risk of bias among the included studies, and we used  RevMan 5.4 software to conduct the meta-analysis. The Grading of Recommendations,  Assessment, Development, and Evaluation (GRADE) framework was used to assess the  quality of the evidence. RESULTS: Ten RCTs involving 815 pediatric subjects were  selected for this review and reported outcomes related to pain and emotions  during IV placement, port needle insertion, flu vaccination, blood sampling, and  dental treatment. Children undergoing needle-related procedures with SARs  reported less anxiety (SMD= -0.36; 95% CI= -0.64, -0.09) and fewer distressed  avoidance behaviors (SMD= -0.67; 95% CI= -1.04, -0.30) than did those receiving  typical care. There were nonsignificant differences between these groups in terms  of in pain (SMD = -0.02; 95% CI = - 0.81, 0.78) and fear (SMD = 0.38; 95% CI=  -0.06, 0.82). The results of exploratory subgroup analyses revealed no  statistically significant differences based on the intervention type of robots or  anesthetic use. CONCLUSIONS: The use of SARs is a promising intervention method  for alleviating anxiety and distress among children undergoing needle-related  procedures. However, additional high-quality randomized controlled trials are  needed to further validate these conclusions. TRIAL REGISTRATION: The protocol of  this study has been registered in the database PROSPERO (registration ID:  CRD42023413279).", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 45, "title": "Sin título", "authors": "Stevens, Bonnie; Bueno, Mariana; Barwick, Melanie et al.", "journal": "Pain", "year": "2024", "vol": "166(7):1587-1596", "doi": "10.1097/j.pain.0000000000003496", "abstract": "Implementation of infant pain practice change (ImPaC) is a multifaceted web-based resource to support pain practice change in neonatal intensive care unit (NICU).  We evaluated the (1) intervention effectiveness and (2) implementation  effectiveness of ImPaC using a hybrid type 1 effectiveness-implementation study  (ie, cluster randomized controlled trial and longitudinal descriptive study).  Eligible level 2 and 3 Canadian NICUs were randomized to intervention (INT) or  waitlisted to usual care (UC) for 6 months. We assessed the number of painful  procedures, proportion of procedures accompanied by valid assessment and  evidence-based treatment, and pain intensity to determine intervention  effectiveness using intention-to-treat (ITT) and wait-list (WL) analyses.  Implementation feasibility and fidelity were explored. Twenty-three NICUs  participated (12 INT, 11 UC). Thirty infants/NICU were included in the ITT (INT =  354, UC = 325) and the WL (INT = 678, UC = 325) analyses. In the ITT analysis,  the average number of painful procedures/infant/day was lower in the INT group  [2.62 (±3.47) vs 3.85 (±4.13), P < 0.001] than in the UC group. Pain assessment  was greater in the INT group (34.7% vs 25.5%, P < 0.001) and pain intensity  scores were lower [1.47 (1.25) vs 1.86 (1.97); P = 0.029]. Similarly, in the WL  analysis, there were fewer painful procedures/infant/day [3.11 (±3.98) vs 3.85  (±4.13), P = 0.003] and increased pain assessment (30.4% vs 25.5%, P = 0.0001)  and treatment (31.2% vs 24.0%, P < 0.001) in the INT group. Feasibility and  implementation fidelity were associated with improved clinical outcomes.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 42, "title": "Sin título", "authors": "Shi, Chengpeng; Tang, Jie; Li, Wei et al.", "journal": "Breastfeeding medicine : the official journal of the Academy of Breastfeeding Medicine", "year": "2024", "vol": "19(2):81-90", "doi": "10.1089/bfm.2023.0233", "abstract": "Objectives: To evaluate the efficacy of breastfeeding or feeding of breast milk in reducing blood sampling pain in full-term neonates by comparing with other  intervention measures. Methods: Related literature was searched from PubMed,  EMBASE, Web of Science, and Cochrane Central Register of Controlled Trials  (Central). Only randomized controlled trials (RCTs), which reported the effect of  breastfeeding or feeding of breast milk on blood sampling pain in full-term  neonates, were eligible. The primary outcome was set as pain score on scales, and  the secondary outcomes as physiological and behavioral indicators. The risk of  bias in included studies was assessed by the Cochrane Collaboration's tool. Data  analysis was performed using RevMan 5.4.1. Main Results: A total of 17 RCTs were  included. Breastfeeding showed a stronger effectiveness in reducing blood  sampling pain, compared with nonintervention, placebo, mother's holding, breast  milk odor, mother's heartbeat, music therapy, skin-to-skin, and Eutectic Mixture  of Local Anesthetics ointment. However, the efficacy of glucose or sucrose  (12.5%-30% concentration) seems better than breastfeeding. When compared with  other interventions, feeding of breast milk yielded different results. Its effect  was only stronger than placebo (sterile water or distilled water), massage, or  nonintervention. Conclusions: Breastfeeding might be effective for alleviating  blood sampling pain in full-term neonates. Its effect is second only to that of  glucose/sucrose. The efficacy of feeding of breast milk in reducing blood  sampling pain in full-term neonates might not be guaranteed.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 80, "title": "Sin título", "authors": "Rubiño Díaz, Jose Ángel; Personat Labrador, Celia; Andreu Rodrigo, Pilar et al.", "journal": "", "year": "2023", "vol": "19:e14623", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E0 — Duplicado no detectado por Zotero", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 65, "title": "Sin título", "authors": "Kodvavi, Muhammad Suraim; Asghar, Mustafa Ali; Ghaffar, Rimmel Abdul et al.", "journal": "Langenbeck's archives of surgery", "year": "2023", "vol": "408(1):301", "doi": "10.1007/s00423-023-03046-5", "abstract": "PURPOSE: Patients undergoing medical procedures often experience pain and anxiety. These periprocedural outcomes can be overcome by providing a distraction  using virtual reality (VR), decreasing their perception. VR has proved effective  in reducing pediatric pain and anxiety; however, limited studies have confirmed  its effectiveness in adults. We performed a systematic review and meta-analysis  on the effectiveness of VR, as opposed to standard care, in reducing  periprocedural pain and anxiety in adults. METHODS: A systematic search of  randomized controlled trials was conducted using the databases of MEDLINE,  Cochrane CENTRAL, and Scopus. Trials involving patients (> 18 years) undergoing  elective medical procedures conducted with or without local anesthesia and  participating in VR therapy were included. Primary outcomes were pre-procedural  anxiety, post-procedural anxiety, and intra-procedural pain. Pre-procedural pain,  post-procedural pain, and intra-procedural anxiety were secondary outcomes.  RESULTS: Data from 10 studies shortlisted for inclusion revealed no significant  association between the use of VR and lower pre-procedural anxiety compared to  standard care (p > 0.05) (SMD = -0.02, 95% CI = -0.18 - 0.14, P = 0.81) but  demonstrated that the use of VR was significantly associated with a reduction in  post-procedural anxiety (SMD = -0.73, 95% CI = -1.08 - -0.39, P < 0.0001),  intra-procedural pain (SMD = -0.61, 95% CI = -1.18 - -0.04, P = 0.04), and  post-procedural pain (SMD = -0.25, 95% CI = -0.44 - -0.05, P = 0.01). CONCLUSION:  The use of VR caused a significant reduction in post-procedural anxiety,  intra-procedural pain, and post-procedural pain in adults undergoing medical  procedures, although the findings were insignificant concerning pre-procedural  anxiety.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 46, "title": "Sin título", "authors": "Storch-De-Gracia, Pilar; Salido, Débora; Molina, Alberto et al.", "journal": "Pediatric emergency care", "year": "2024", "vol": "40(7):521-526", "doi": "10.1097/PEC.0000000000003199", "abstract": "OBJECTIVES: The objective of this study was to measure the impact of an intervention on pain treatment in a pediatric emergency department (ED). The  application of interventions to improve pain management in DE has demonstrated  diverse effects so far, most of them successful. METHODS: This is a  quasi-experimental before-and-after, longitudinal, prospective study.Patients  were collected between January 2020 and December 2021. Principal outcome was the  number of patients with moderate or severe pain who received analgesia before 30  minutes to the ED arrival. The intervention consisted of several training  sessions for nursing staff, pediatricians, and trauma physicians. RESULTS: A  total of 515 patients were enrolled, 230 during preintervention period and 285  during postintervention period. The percentage of patients receiving analgesia  before 30 minutes increased from 24% to 29% and before 60 minutes increased from  31% to 42%. Time to analgesia administration decreased from 43 to 39 minutes.Only  254 patients (49%) received analgesia at some point during their stay in the ED,  137 (26.6%) before 30 minutes and 193 (37.5%) before 60 minutes. The probability  of receiving analgesia was greater in patients seen by a pediatrician rather than  an orthopedist (59%-37%). Metamizole was the most commonly used drug (48%),  followed by ibuprofen and acetaminophen. CONCLUSIONS: The application strategies  to enhance early pain treatment in the ED can improve analgesia administration.  Training strategies aimed at healthcare personnel working in the ED can change  the way they work and achieve clear benefits for the patient. The treatment of  pain in the ED should begin as soon as possible, and in this objective, the  involvement of the nursing staff is a priority, because they are the professional  who has the best opportunity for the detection and treatment of pain from the  moment of triage.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 48, "title": "Sin título", "authors": "Yan, Chunji; Hu, Jiale; Kang, Jiamin et al.", "journal": "Systematic reviews", "year": "2024", "vol": "13(1):287", "doi": "10.1186/s13643-024-02713-y", "abstract": "BACKGROUND: The management of procedural pain in pediatric patients under 1 year old is crucial but often inadequately addressed in clinical practice. Despite  proven evidence-based interventions like skin-to-skin contact, sweet solutions,  and breastfeeding, their implementation remains sporadic. This systematic review  aims to uncover the barriers and facilitators to adopting these interventions,  leveraging the Consolidated Framework for Implementation Research (CFIR) to  provide a structured analysis. METHODS: This review will examine primary studies  identifying barriers or facilitators to the use of procedural pain treatments in  pediatric patients under 1 year old, imposing no restrictions on the publication  year or language. A thorough search will cover databases such as MEDLINE (Ovid),  Embase, CINAHL, PsycINFO, Web of Science, and Scopus. The Mixed Methods Appraisal  Tool (MMAT) will be utilized for quality assessment. The CFIR framework will  serve to categorize and analyze the identified barriers and facilitators, using  narrative synthesis for data integration. DISCUSSION: Applying the CFIR framework  allows for a comprehensive and systematic review of the factors influencing the  implementation of procedural pain management strategies in pediatric care. By  identifying key barriers and facilitators through this lens, the review will  guide the development of targeted interventions aimed at enhancing the adoption  of evidence-based pain treatments. Such strategic interventions are essential for  bridging the gap between research findings and clinical practice, potentially  improving the effectiveness and efficiency of pain management for pediatric  patients. SYSTEMATIC REVIEW REGISTRATION: PROSPERO CRD42022322319.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 51, "title": "Sin título", "authors": "İyi, Zahide; İşler, Ayşegül; Özer, Zeynep", "journal": "Journal of pediatric nursing", "year": "2024", "vol": "78:e438-e447", "doi": "10.1016/j.pedn.2024.08.006", "abstract": "PROBLEM: Needle-related procedures are quite common throughout life, especially during childhood. Pain caused by these procedures is the most common  complication. ShotBlocker is an alternative non-pharmacological method to reduce  pain during injection-related procedures. However, the effectiveness of the  ShotBlocker application in children for reducing pain needle-related procedures  remains unclear. This review aimed to evaluate the effectiveness of ShotBlocker  application on pain during needle-related procedures in children from Randomized  Controlled Trials. ELIGIBILITY CRITERIA: Eight electronic databases were searched  until November 2023 for articles published in English. The methodological quality  and evidence strength were appraised using the Cochrane Risk of Bias 2 tool and  the GRADE approach. A random-effects model was used to determine the effect of  the ShotBlocker application on pain levels. The review included results involving  assessments from the child, parents, and an observer in pain evaluation. SAMPLE:  A total of nine studies with 1205 children patients were included. RESULTS: The  evaluation data showed that ShotBlocker application significantly reduced the  pain caused by needle-related procedures in children. The Cochrane GRADE approach  showed moderate level evidence for the effect of ShotBlocker application on pain  during needle procedures. CONCLUSIONS: As a result of the studies included in  this meta-analysis, it was determined that ShotBlocker application significantly  reduced the pain caused by needle-related procedures in children. IMPLICATIONS:  ShotBlocker, a non-pharmacological method, can be used by pediatric nurses to  reduce pain during needle-related procedures in children. Randomized controlled  studies with well-designed methods are needed to create strong evidence in this  field.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 50, "title": "Sin título", "authors": "Çamur, Zühal", "journal": "Evidence-based nursing", "year": "2024", "vol": "27(4):143", "doi": "10.1136/ebnurs-2023-103757", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 52, "title": "Sin título", "authors": "Ali, Samina; Dworsky-Fried, Zoë; Moir, Mackenzie et al.", "journal": "The Journal of pediatrics", "year": "2023", "vol": "258:113405", "doi": "10.1016/j.jpeds.2023.113405", "abstract": "OBJECTIVES: To explore and understand parental decision-making relating to acute pain management for their children presenting to the emergency department. STUDY  DESIGN: This study employed one-on-one semistructured interviews. Parents of  children with acute musculoskeletal injuries were recruited from 3 Canadian  pediatric emergency departments. Interviews were conducted via telephone from  June 2019 to March 2021. Verbatim transcription and thematic analyses occurred  concurrently with data collection, supporting data saturation and theory  development considerations. RESULTS: Twenty-seven interviews were completed. Five  major themes regarding pain care emerged: (1) my child's comfort is a priority,  (2) every situation is unique, (3) opioids only if necessary, (4) considerations  when choosing opioids, and (5) pain research is important. Overall, parents were  highly comfortable with their assessment of their child's pain. Participants'  willingness to use opioid analgesia for their children was primarily dependent on  perceptions of injury and pain severity. Opioid-averse and opioid-accepting  families had similar considerations when making analgesic decisions but weighed  risks and benefits differently. CONCLUSIONS: Parents assess and manage their  children's pain globally and multimodally, with comfort being prioritized. For  most parents, the desire to relieve their children's pain outweighed concerns of  substance use disorder, misuse, and adverse events when making decisions about  opioid analgesia for short-term use. These results can inform evidence-based  family-centered approaches to co-decision-making of analgesic plans for children  with acute pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 56, "title": "Sin título", "authors": "Ciornei, Bogdan; David, Vlad Laurentiu; Popescu, Diana et al.", "journal": "Global health, epidemiology and genomics", "year": "2023", "vol": "2023:9950870", "doi": "10.1155/2023/9950870", "abstract": "Pediatric burns are a significant medical issue that can have long-term effects on various aspects of a child's health and well-being. Pain management in  pediatric burns is a crucial aspect of treatment to ensure the comfort and  well-being of young patients. The causes and risk factors for pediatric burns  vary depending on various factors, such as geographical location, socioeconomic  status, and cultural practices. Assessing pain in pediatric patients, especially  during burn injury treatment, poses several challenges. These challenges stem  from various factors, including the age and developmental stage of the child, the  nature of burn injuries, and the limitations of pain assessment tools. In  pediatric pain management, various pain assessment tools and scales are used to  evaluate and measure pain in children. These tools are designed to account for  the unique challenges of assessing pain in pediatric patients, including their  age, developmental stage, and ability to communicate effectively. Pain can have  significant physical, emotional, and psychological consequences for pediatric  patients. It can interfere with their ability to engage in daily activities,  disrupt sleep patterns, and negatively affect their mood and behavior. Untreated  pain can also lead to increased stress, anxiety, and fear, which can further  exacerbate the pain experience. Acute pain, which is short-term and typically  associated with injury or illness, can disrupt a child's ability to engage in  physical activities and impede their overall recovery process. On the other hand,  chronic pain, which persists for an extended period, can have long-lasting  effects on physical functioning and quality of life in children. The  psychological consequences of burns can persist long after the physical wounds  have healed, leading to ongoing emotional distress and impaired functioning.  Multimodal pain management, which involves the use of multiple interventions or  medications targeting different aspects of the pain pathway, has gained  recognition as an effective approach for managing pain in both children and  adults. However, it is important to consider the specific needs and  considerations of pediatric patients when developing evidence-based guidelines  for multimodal pain management in this population. Over the years, there have  been significant advances in pediatric pain research and technology, leading to a  better understanding of pain mechanisms and the development of innovative  approaches to assess and treat pain in children. Overall, pain management in  pediatric burns requires a multidisciplinary approach that combines pharmacologic  and nonpharmacologic interventions.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 66, "title": "Sin título", "authors": "Krusenstjerna-Hafstrøm, Maria Nyhøj; Jensen, Claus Sixtus; Kirkegaard, Hans et al.", "journal": "Danish medical journal", "year": "2023", "vol": "70(3):A09220540", "doi": "", "abstract": "INTRODUCTION: Preconditions for good pain treatment in children include education and guidelines. This study investigated whether the guidelines on acute pain  treatment of children in Danish emergency departments reflected the national  guideline, examined the knowledge and use of guidelines, and explored the  approach adopted to treating pain in children. METHODS: This cross-sectional  study consisted of two parts. Part I compared the guidelines in each emergency  department with a national guideline; Part II was a structured interview with the  emergency department doctors regarding their approach to treating pain in  children. RESULTS: Several guidelines did not include pain assessment, dose  schedules and non-pharmacological methods as recommended in the national  guideline. The doctors knew where to find the guidelines, but a considerable  share of them did not use the guidelines. Most doctors felt competent in treating  children, but reported a reluctance to using opioids and reported using pain  assessment irregularly. CONCLUSION: The Danish guidelines on acute pain treatment  of children in many emergency departments vary compared with the national  guideline. We found that several doctors do not use the guidelines, are reluctant  to use opioids and do not use pain assessment. We suggest a thorough  implementation of a national guideline in emergency departments to standardise  pain treatment. FUNDING: none. TRIAL REGISTRATION: not relevant.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 100, "title": "Sin título", "authors": "Liu, Jiang; Fang, Shirong; Wang, Yuxia et al.", "journal": "Medicine", "year": "2022", "vol": "101(41):e30939", "doi": "10.1097/MD.0000000000030939", "abstract": "BACKGROUND: The painful procedures experienced by neonates during hospitalization have short-term or long-term effects on neonates. While the limitations of  previous interventions make it imperative to explore effective interventions that  are readily available. This systematic review and meta-analysis was conducted to  evaluate the safety and effectiveness of massage for pain management in neonates.  METHODS: This systematic review was registered in PROSPER. PubMed, Embase,  Cochrane Library, and the Clinical Trials Registry were searched to December  2021. Two reviewers independently carried out study selection, data extraction,  bias risk assessment. Continuous data were analyzed by mean differences (MD).  Dichotomous data were reported using relative risk. If at least two studies  reported identical results by the same pain assessment tool, a meta-analysis was  conducted using random effect model and inverse variance. RESULTS: Total 11  included studies involving 755 neonates investigated the effects of massage on  neonatal pain response compared to standard care. The meta-analysis showed that  massage could effectively improve pain response in neonates compared to standard  care no matter whether neonatal infant pain scale (NIPS) or premature infant pain  profile (PIPP) was used as an assessment tool. Besides, massage was also  effective for crying duration, blood oxygen saturation both during and after the  procedure, but non-effective for the variation of respiratory rate after the  procedure, and heart rate both during and after the procedure. CONCLUSIONS:  Massage may have a positive effect on pain relief of neonate, and rigorous trials  are needed in the future to determine the most effective massage method.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 105, "title": "Sin título", "authors": "Sharma, N.; Samuel, A. J.", "journal": "Journal of neonatal-perinatal medicine", "year": "2022", "vol": "15(4):677-687", "doi": "10.3233/NPM-221087", "abstract": "AIM: The aim of this review is to identify available evidence on MSS practices as a pain-relieving intervention among neonates undergoing a repetitive painful  procedure. METHODS: Searches were performed in the following databases: PubMed/  MEDLINE, SCOPUS, CINAHL, and the physiotherapy evidence database (PEDro). A total  of eight studies were identified, among them; studies related to MSS in relieving  neonatal procedural pain were conducted only in three countries only. RESULTS:  Data collected from the identified studies were extracted by two independent  reviewers, and were synthesized quantitatively, and qualitatively. Eight studies  involving six hundred and eighty-six neonates in three countries were identified  in the search. Among them, six were randomized controlled trials, and two were  observational studies. The study results highlighted that implementation of MSS  as a non-pharmacological pain-relieving intervention follows a similar protocol  among the reviewed articles, but varies by who administers MSS (Physiotherapists/  Nurses/Mothers) in neonates undergoing repetitive painful procedures.  INTERPRETATION: Standardized MSS protocol should be followed globally along with  its implementation for reducing procedural pain among neonates and also to  promote good clinical practice in neonatal intensive care unit (NICU) settings.  Future research could determine the effects of standardized MSS protocol either  with or without other non-pharmacological interventions among neonates undergoing  painful procedures.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 116, "title": "Sin título", "authors": "Coelho, Hercules Pereira; Souza, Gilberto dos Santos Dias de; Freitas, Victor Hamilton da Silva et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2021", "vol": "25(3):e20200353-e20200353", "doi": "10.1590/2177-9465-ean-2020-0353", "abstract": "Resumo  Objetivo analisar a percepção da criança hospitalizada quanto ao uso do brinquedo terapêutico instrucional no preparo para a terapia intravenosa.  Método estudo descritivo, com abordagem qualitativa, realizado em um hospital pediátrico público no município de Juazeiro do Norte - Ceará, entre os meses de julho a setembro de 2019. Participaram do estudo 31 crianças em idade pré-escolar e escolar. Os dados foram coletados por meio de uma entrevista semiestruturada e, posteriormente, analisados por meio do software IRAMUTEQ.  Resultados diante da percepção das crianças acerca da terapia intravenosa, foi averiguado que elas compreenderam a técnica a partir da utilização do brinquedo terapêutico instrucional. Quando a criança tem a oportunidade de brincar e dramatizar a terapia intravenosa, por meio do brinquedo terapêutico instrucional, a ansiedade, a dor, a angústia, a solidão, o medo e o choro são atenuados.  Conclusões e implicações para a prática orientar as crianças quanto à realização da terapia intravenosa favorece sua compreensão quanto aos reais benefícios desta técnica para a sua saúde, possibilitando, ainda, a compreensão do enfermeiro quanto às condições que representam riscos para a criança e intervenha em tempo hábil por meio da utilização de estratégias que favoreçam a recuperação da saúde e a minimização de traumas subsequentes advindos da hospitalização.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 88, "title": "Sin título", "authors": "Baker, Nancy A.; Polhemus, Augusta Hixon; Haan Ospina, Emma et al.", "journal": "The Clinical journal of pain", "year": "2022", "vol": "38(6):424-441", "doi": "10.1097/AJP.0000000000001029", "abstract": "Previous reviews have reported virtual reality (VR) to be an effective method to treat pain. This scoping review examines the state of the science for VR and pain  both generally and by pain type (acute and chronic) related to types of  mechanisms, dosage, effectiveness, and adverse events (AEs). We searched online  databases PubMed, Web of Science, PsychInfo, and CINAHL from 2010 to 2020 and  included studies from peer reviewed journals that examined people with pain,  (excluding pain-free participants) with a primary outcome measuring pain. We  assessed studies for risk of bias using PEDro criteria. We described data through  counts and percentages. Significant results were determined through P-values. We  found 70 studies representing 4105 people; 46 acute pain studies (65.7%), 22  chronic pain studies (31.4%), and 2 (2.9%) \"both.\" The most common VR mechanism  was distraction (78.6%) then embodiment (17.1%). However, distraction was the  mechanism for 97.8% acute pain studies while embodiment was more common for  chronic pain (54.5%). Dosage of VR was inconsistently reported and varied  considerably. VR treatment groups showed significant improvements in pain,  particularly for intensity of pain (72.1%) and quality of pain (75.0%). Few  studies examined AEs. Limitations of this review include only examining last 10  years of articles and that many studies were missing data. VR appears to be an  effective intervention to address both acute and chronic pain. Research  evaluating VR mechanisms, dosage, and AEs is warranted, as is further work in  under-served populations (children for chronic pain and older adults) as the  current evidence is largely limited to adult populations with pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E3 — Dolor crónico no procedimental"}, {"id": 94, "title": "Sin título", "authors": "Gillum, Matthew; Huang, Samantha; Kuromaru, Yuki et al.", "journal": "Journal of burn care & research : official publication of the American Burn Association", "year": "2022", "vol": "43(2):368-373", "doi": "10.1093/jbcr/irab167", "abstract": "Pain following burn injury is associated with long-term health consequences in the pediatric population. Literature suggests nonpharmacologic treatment may  provide improved pain control as an effective adjunct for these patients. This  study aims to summarize randomized controlled trials on nonpharmacologic  procedural pain management in pediatric burn patients. A systematic review was  conducted on nonpharmacologic procedural pain management techniques used in the  pediatric burn population. Fifteen studies were included and involved virtual  reality, distraction devices, child life therapy, directed play, digital tablet  games, cartoons, hypnosis, and music therapy. Treatment was effective in 8 out of  15 studies. Compared to controls, nonpharmacologic treatments reduced mid  procedure pain by 19.7% and post-procedure pain by 20.1%. This study demonstrates  that nonpharmacologic therapy can be an effective adjunct in pediatric procedural  burn pain management, however further studies are needed to develop standardized  algorithms to integrate nonpharmacologic treatments with pharmacologic therapies.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 87, "title": "Sin título", "authors": "Addab, Sofia; Hamdy, Reggie; Thorstad, Kelly et al.", "journal": "Journal of clinical nursing", "year": "2022", "vol": "31(21-22):3032-3059", "doi": "10.1111/jocn.16217", "abstract": "AIMS: This integrative review aimed to identify, analyse and synthesise studies investigating the clinical efficacy of virtual reality (VR) distraction for  children undergoing varying painful and anxiety-inducing medical procedures  across different hospital settings and to identify implications for research and  clinical practice. BACKGROUND: Virtual reality has been leveraged as a  distraction tool in the healthcare setting to help patients manage procedural  pain and anxiety. Initial studies in the burn wound care setting using VR as a  non-pharmacological analgesia led to the use of VR during other medical  procedures. DESIGN: An integrative review of the literature was conducted  following the PRISMA guidelines across four electronic databases. Published  studies between 2000 and 2020 investigating the clinical efficacy of VR in  managing paediatric procedural pain or anxiety were included for review. RESULTS:  Reviewed studies collectively included 2,174 patients aged 6 months-18 years used  VR during burn wound care, post-burn physiotherapy, dental, needle-related and  other procedures. Additionally, ten studies included samples with adults, for  which paediatric data could not be isolated (n = 507). Overall, studies supported  the efficacy of VR in managing procedural pain and anxiety in the paediatric  setting. CONCLUSION: Virtual reality is redefining pain management by immersing  children in a virtual world, reducing pain and anxiety at the hospital. A notable  gap was the neglected use of VR in children with chronic conditions receiving  orthopaedic procedures as part of their standard care. RELEVANCE TO CLINICAL  PRACTICE: Ultimately, VR distraction will reduce the fear associated with medical  interventions, preventing increased pain sensitivity, exacerbated anxiety and  healthcare avoidance in adulthood. Nurses will play an important role in ensuring  the smooth integration of VR in clinical practice by championing the technology  and transferring evidence-based methods for VR use.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 84, "title": "Sin título", "authors": "Wang, Yu; Zhang, Linping; Dong, Wenbin et al.", "journal": "American journal of perinatology", "year": "2023", "vol": "40(8):867-873", "doi": "10.1055/s-0041-1731650", "abstract": "OBJECTIVE: The study aimed to investigate the effects of kangaroo mother care (KMC) on repeated procedural pain and cerebral oxygenation in preterm infants.  STUDY DESIGN: Preterm infants of 31 to 33 weeks of gestational age were randomly  divided into an intervention group (n = 36) and a control group (n = 37).  Premature infant pain profile (PIPP) scores, heart rate, oxygen saturation,  regional cerebral tissue oxygenation saturation (rcSO(2)), and cerebral  fractional tissue oxygen extraction (cFTOE) were evaluated during repeated heel  stick procedures. Each heel stick procedure included three phases: baseline,  blood collection, and recovery. KMC was given to the intervention group  30 minutes before baseline until the end of the recovery phase. RESULTS: Compared  with the control group, the intervention group showed lower PIPP scores and heart  rates, higher oxygen saturation, and rcSO(2) from the blood collection to  recovery phases during repeated heel sticks. Moreover, there were significant  changes in cFTOE for the control group, but not the intervention group associated  with repeated heel stick procedures. CONCLUSION: The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants, and it is  conducive to stabilizing cerebral oxygenation, which may protect the development  of brain function. KEY POINTS: · KMC stabilizes cerebral oxygenation during  repeated heel sticks in preterm infants.. · The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants.. · KMC may protect  the development of brain function..", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 159, "title": "Sin título", "authors": "Excoffier, Julie; Pichot, Vincent; Cantais, Aymeric et al.", "journal": "The American journal of clinical hypnosis", "year": "2020", "vol": "62(3):267-281", "doi": "10.1080/00029157.2018.1564013", "abstract": "Pain sensation is characterized by abrupt changes in central nervous system activity producing autonomic reactivity. While clinical hypnosis has demonstrated  its benefits for children in pain management, it is not clear whether hypnosis  modulated autonomic pain response in children in clinical conditions. Here, we  studied autonomic responses under hypnosis to sutures in pediatric emergencies.  For that, 42 children (mean age: 6.5 years, range 1.5 to 13) were divided into  two groups consecutively (hypnosis and control groups), according to their  choice. Time-frequency analysis was applied on RR intervals (heart rate interbeat  intervals, or RRI) to estimate parasympathetic reactivity based on high frequency  power (HF) and the Analgesia Nociception Index (ANI®) and on sympathetic  reactivity (low frequency power [LF]) and LF/HF ratio). We observed that RRI and  LF/HF ratio varied according to suture and hypnosis (p < 0.05): RRI was higher  and LF/HF ratio was lower during sutures in the hypnosis group in comparison to  the control group whereas HF and ANI® increased only during hypnosis. To  conclude, hypnosis in pediatric emergencies reduces sympathetic cardiac pain  reactivity and could be a marker of pain relief under hypnosis, while  parasympathetic activity seems to be a better marker of hypnosis.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 160, "title": "Sin título", "authors": "Gagnon, Michelle M.; Hadjistavropoulos, Thomas; McAleer, Lana M. et al.", "journal": "The Clinical journal of pain", "year": "2020", "vol": "36(1):47-60", "doi": "10.1097/AJP.0000000000000770", "abstract": "OBJECTIVES: Parents can play an integral role in managing their child's pain, yet many parents remain unaware of evidence-based strategies to support their child  during painful experiences. Recent advances in knowledge translation research,  which include dissemination and implementation studies, have resulted in programs  geared towards parents to offset this knowledge gap. The nature of these programs  and the degree to which parents find them useful remains unclear. Our goal was to  systematically review programs aimed as disseminating and implementing  evidence-based pain-related knowledge to parents. MATERIALS AND METHODS:  Systematic searches of PubMed, Web of Science, CINAHL, and PsycInfo were  completed. Articles in which information was disseminated to parents with the  goal of assessing dissemination and implementation outcomes were retained.  Information was extracted to identify study characteristics, primary outcomes,  and quality of evidence. RESULTS: A total of 24,291 abstracts were screened and  12 articles describing programs were retained. Programs were positively rated by  parents in terms of the appropriateness of formats selected, presentation of  information, and helpfulness of content. The majority of research has been  focused in the area of procedural pain among infants. Although several  implementation domains are reported by researchers, certain areas have been  overlooked to date, including the cost and sustainability of programs. The  majority of reports presented with methodological limitations and bias.  DISCUSSION: Knowledge translation research in pediatric pain is in its infancy.  Development of theories and guidelines to increase the utility and quality of  evidence are needed.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 165, "title": "Sin título", "authors": "Helm, Matthias; Hossfeld, Bjoern; Braun, Benedikt et al.", "journal": "Anesthesia and analgesia", "year": "2020", "vol": "130(1):176-186", "doi": "10.1213/ANE.0000000000004334", "abstract": "BACKGROUND: Oligoanalgesia, as well as adverse events related to the initiated pain therapy, is prevalent in out-of-hospital emergency medicine, even when a  physician is present. We sought to identify factors involved in insufficient pain  therapy of patients presenting with an initial Glasgow Coma Scale (GCS) score of  ≥8 in the out-of-hospital phase, when therapy is provided by a physician-staffed  helicopter emergency medical service (p-HEMS). METHODS: This was a multicenter,  secondary data analysis of conscious patients treated in primary p-HEMS missions  between January 1, 2005, and December 31, 2017. Patients with a numeric rating  scale (NRS) pain score ≥4, GCS score ≥8 on the scene, without cardiopulmonary  resuscitation (CPR), and a National Advisory Committee for Aeronautics (NACA)  score <VI were included. Multivariable logistic binary regression analyses were  used to identify characteristics of oligoanalgesia (NRS ≥4 at handover or pain  reduction <3). Linear regression analysis was used to identify changes in pain  treatment within the study period. RESULTS: We analyzed data from 106,730  patients (3.6% missing data at variable level). Of these patients, 82.9% received  some type of analgesic therapy on scene; 79.1% of all patients received analgesic  drugs, and 38.6% received nonpharmacological interventions, while 37.4% received  both types of intervention. Oligoanalgesia was identified in 18.4% (95%  confidence interval [CI], 18.1-18.6) of patients. Factors associated with  oligoanalgesia were a low NACA score and a low NRS score, as well as central  nervous system or gynecological/obstetric complaints. The use of weak opioids  (odds ratio [OR] = 1.05; 95% CI, 0.68-1.57) had no clinically relevant  association with oligoanalgesia, in contrast to the use of strong or moderate  opioids, nonopioid analgesics, or ketamine. We observed changes in the analgesic  drugs used over the 12-year study period, particularly in the use of strong  opioids (fentanyl or sufentanil), from 30.3% to 42.3% (P value <.001). Of all  patients, 17.1% (95% CI, 16.9-17.3) did not receive any type of pain therapy.  CONCLUSIONS: In the studied p-HEMS cohort, oligoanalgesia was present in 18.4% of  all cases. Special presenting complaints, low NACA scores, and low pain scores  were associated with the occurrence of oligoanalgesia. However, 17.1% of patients  received no type of pain therapy, which suggests a scope for further improvement  in prehospital pain therapy. Pharmacological and nonpharmaceutical pain relief  should be initiated whenever indicated.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 150, "title": "Sin título", "authors": "Bueno, Mariana; Stevens, Bonnie; Barwick, Melanie A. et al.", "journal": "Trials", "year": "2020", "vol": "21(1):16", "doi": "10.1186/s13063-019-3782-9", "abstract": "BACKGROUND: Hospitalized infants undergo multiple painful procedures daily. Despite the significant evidence, procedural pain assessment and management  continues to be suboptimal. Repetitive and untreated pain at this vital  developmental juncture is associated with negative behavioral and  neurodevelopmental consequences. To address this knowledge to practice gap, we  developed the web-based Implementation of Infant Pain Practice Change (ImPaC)  Resource to guide change in healthcare professionals' pain practice behaviors.  This protocol describes the evaluation of the intervention effectiveness and  implementation of the Resource and how organizational context influences  outcomes. METHODS: An effectiveness-implementation hybrid type 1 design, blending  a cluster randomized clinical trial and a mixed-methods implementation study will  be used. Eighteen Neonatal Intensive Care Units (NICUs) across Canada will be  randomized to intervention (INT) or standard practice (SP) groups. NICUs in the  INT group will receive the Resource for six months; those in the SP group will  continue with practice as usual and will be offered the Resource after a  six-month waiting period. Data analysts will be blinded to group allocation. To  address the intervention effectiveness, the INT and SP groups will be compared on  clinical outcomes including the proportion of infants who have procedural pain  assessed and managed, and the frequency and nature of painful procedures. Data  will be collected at baseline (before randomization) and at completion of the  intervention (six months). Implementation outcomes (feasibility, fidelity,  implementation cost, and reach) will be measured at completion of the  intervention. Sustainability will be assessed at six and 12 months following the  intervention. Organizational context will be assessed to examine its influence on  intervention and implementation outcomes. DISCUSSION: This mixed-methods study  aims to determine the effectiveness and the implementation of a multifaceted  online strategy for changing healthcare professionals' pain practices for  hospitalized infants. Implementation strategies that are easily and effectively  implemented are important for sustained change. The results will inform  healthcare professionals and decision-makers on how to address the challenges of  implementing the Resource within various organizational contexts. TRIAL  REGISTRATION: ClinicalTrials.gov, NCT03825822. Registered 31 January 2019.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 166, "title": "Sin título", "authors": "Hildenbrand, Aimee K.; Kassam-Adams, Nancy; Barakat, Lamia P. et al.", "journal": "Pediatric emergency care", "year": "2020", "vol": "36(10):e549-e557", "doi": "10.1097/PEC.0000000000001404", "abstract": "OBJECTIVES: After injury, many children experience posttraumatic stress symptoms (PTSS) that negatively impact recovery. Acute pain and PTSS share neurobiological  pathways, and acute dosage of morphine has been linked to reduced PTSS in  naturalistic studies. However, the complex interactions between pain, morphine  and other opioid use, and PTSS have yet to be investigated in robust pediatric  samples.This prospective, longitudinal study examined relationships between acute  pain, opioid medications, and PTSS after pediatric injury. METHODS: Ninety-six  children aged 8 to 13 years (mean = 10.60, SD = 1.71), hospitalized for  unintentional injury, completed assessments at baseline (T1) and 12 weeks (T2)  later. Pain ratings and opioid administration data were obtained via chart  review. RESULTS: Structural equation modeling revealed that worst pain endorsed  during hospitalization was positively associated with concurrent and later PTSS  when controlling for evidence-based risk factors (ie, age, sex, prior trauma  history, traumatic appraisals of injury event, heart rate). Neither opioid  medications overall nor morphine specifically (milligram/kilogram/day)  administered during hospitalization mediated the relationship between pain and T2  PTSS. CONCLUSIONS: Pain during hospitalization may increase susceptibility for  persistent PTSS above and beyond the influence of other empirical risk factors.  Findings suggest that pain assessment may be a useful addition to pediatric PTSS  screening tools and highlight the need for additional research on pharmacological  secondary prevention approaches. Given that inadequate pain control and  persistent PTSS each hinder recovery and long-term functioning, better  understanding of interactions between acute pain and PTSS after injury is  essential for improving screening, prevention, and early intervention efforts.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 135, "title": "Sin título", "authors": "Palomaa, Anna-Kaija; Tuomikoski, Anna-Maria; Huhtala, Saija et al.", "journal": "JBI evidence synthesis", "year": "2021", "vol": "19(10):2770-2776", "doi": "10.11124/JBIES-21-00010", "abstract": "OBJECTIVE: The objective of this review is to evaluate the effectiveness of technology-based interventions in relieving procedural pain in hospitalized  neonates compared with other non-pharmacological interventions. INTRODUCTION:  Neonates requiring hospital care often experience acute pain during medical  procedures. The current best practice for relieving pain in neonates is the use  of non-pharmacological interventions, such as oral solutions or  intervention-based human touch. Technological solutions (such as games, eHealth  applications, and mechanical vibrators) have become more commonplace in pediatric  pain management over recent years. However, there is a knowledge gap about how  effective technology-based interventions are at relieving pain in neonates.  INCLUSION CRITERIA: This review will consider experimental trials that include  technology-based non-pharmacological interventions for relieving procedural pain  in hospitalized neonates. Primary outcomes of interest include pain response to a  procedure measured by a validated pain assessment scale for neonates, behavioral  indicators, and/or changes in physiological indicators. METHODS: MEDLINE (Ovid),  CINAHL (EBSCO), Scopus (Elsevier), Cochrane Central Register of Controlled  Trials, and the MEDIC databases will be searched for studies published in  English, Finnish, and Swedish. Critical appraisal and data extraction will be  conducted by two independent researchers following JBI methodology. Quantitative  data will be pooled in statistical meta-analyses. If statistical analysis is not  possible, the findings will be reported narratively. SYSTEMATIC REVIEW  REGISTRATION: PROSPERO CRD42021254218.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 122, "title": "Sin título", "authors": "Gao, Haixia; Xu, Guihua; Li, Fang et al.", "journal": "Pain", "year": "2021", "vol": "162(1):253-262", "doi": "10.1097/j.pain.0000000000002015", "abstract": "Repeated procedural pain may lead to increased secretion of cortisol and future neurobehavioral development disorders in preterm infants. Changes in the cortisol  level may mediate the effect of neonatal repetitive procedural pain on altered  childhood neurobehavioral development in preterm infants. However, few studies  have investigated the effect of combined pharmacological, behavioral, and  physical interventions over repeated painful procedures on pain response,  cortisol level, and neurobehavioral development. This study examined (1) the  efficacy and safety of sucrose combined with massage, music, non-nutritive  sucking, and gentle human touch to treat preterm infants with repeated procedural  pain; (2) the cortisol level at discharge from the neonatal intensive care unit  (NICU); (3) neurobehavioral development at 40 weeks' corrected gestational age;  and (4) the potential mediating effect of the cortisol level in the combined  interventions on neurobehavioral development. Stable preterm infants (n = 76)  were randomized to receive routine care or combined interventions across repeated  painful procedures throughout their NICU stay. The Premature Infant Pain Profile  scores in the early, middle, and late periods of the NICU stay were measured, as  were the basal salivary cortisol level at admission and discharge, the Neonatal  Behavioral Neurological Assessment score at 40 weeks' corrected gestational age,  and the incidence of adverse effects during the study period. Our findings  indicated that the combined interventions remained efficacious and safe for  reducing repeated procedural pain, decreased the cortisol level at discharge, and  promoted early neurobehavioral development in preterm infants. This effect may  have been mediated through decreased cortisol levels and reduced repeated  procedural pain.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 97, "title": "Sin título", "authors": "Hoag, Jennifer A.; Karst, Jeffrey; Bingen, Kristin et al.", "journal": "Journal of medical Internet research", "year": "2022", "vol": "24(4):e30260", "doi": "10.2196/30260", "abstract": "BACKGROUND: Children with acute and chronic illness undergo frequent, painful, and distressing procedures. OBJECTIVE: This randomized controlled trial was used  to evaluate the effectiveness of guided imagery (GI) versus virtual reality (VR)  on the procedural pain and state anxiety of children and young adults undergoing  unsedated procedures. We explored the role of trait anxiety and pain  catastrophizing in intervention response. METHODS: Children and young adults were  recruited from the hematology, oncology, and blood and marrow transplant clinics  at a children's hospital. Each study participant completed the GI and VR  intervention during separate but consecutive unsedated procedures. Self-report  measures of pain and anxiety were completed before and after the procedures.  RESULTS: A total of 50 participants (median age 13 years) completed both  interventions. GI and VR performed similarly in the management of procedural  pain. Those with high pain catastrophizing reported experiencing less nervousness  about pain during procedures that used VR than those using GI. State anxiety  declined pre- to postprocedure in both interventions; however, the decrease  reached the level of significance during the VR intervention only. Those with  high trait anxiety had less pain during GI. CONCLUSIONS: In our sample, VR worked  as well as GI to manage the pain and distress associated with common procedures  experienced by children with acute or chronic illnesses. Children who are primed  for pain based on beliefs about pain or because of their history of chronic pain  had a better response to VR. GI was a better intervention for those wit
