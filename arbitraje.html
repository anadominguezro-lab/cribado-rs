h high  trait anxiety. TRIAL REGISTRATION: ClinicalTrials.gov NCT04892160;  https://clinicaltrials.gov/ct2/show/NCT04892160.", "dec_r1": "EXCLUIR", "mot_r1": "E1 — Población oncológica", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 137, "title": "Sin título", "authors": "Revell, Jennifer; Backman, Chantal; Vasily, Susan et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2021", "vol": "22(5):645-651", "doi": "10.1016/j.pmn.2021.03.001", "abstract": "BACKGROUND: Hospitalized children continue to experience procedural pain due to inconsistent implementation of readily available, evidence-based pain  interventions. AIMS: To explore the prevalence of painful blood-testing  procedures, pain management interventions, child-caregiver perceptions of  effectiveness of, and satisfaction with, pain interventions, and adherence to  best practice guidelines. DESIGN: A single-site cross-sectional study using a  combination of child-caregiver interviews and chart reviews for hospitalized  children, 0-18 years. METHODS: Interviews gathered information about the child's  most recent blood test, procedural pain management intervention use, and  participant perceptions of effectiveness of and satisfaction with these  interventions. Concurrently, patient charts were reviewed for procedure  documentation and pain management strategies used, including topical anesthetic  and oral sucrose orders. Data were analyzed using descriptive statistics.  RESULTS: Fifty children were included. At the time of data collection, 34 (68%)  had experienced painful blood-testing procedures during their current admission.  Pharmacologic pain interventions were documented for only 7 (21%) procedures and  were often inconsistent with participant reports. Almost all interview  respondents (n = 31, 91%) identified at least one pain intervention for the  child's most recent painful blood-test. Twenty (59%) participants perceived pain  interventions as effective and most were satisfied with utilized interventions  (n = 27, 79%). CONCLUSIONS: A multi-modal procedural pain management approach was  infrequently used and documented, highlighting undertreatment based on  recommended practices and guidelines. Perceived intervention effectiveness and  satisfaction with pain management were however found to be relatively high.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 140, "title": "Sin título", "authors": "Silva, Patrick Leonardo Nogueira da", "journal": "Nursing (Ed. bras., Impr.)", "year": "2021", "vol": "24(273):5299-5310", "doi": "10.36489/nursing.2021v24i273p5299-5310", "abstract": "Objetivo: identificar os sentimentos de pré-adolescentes e adolescentes quanto à vacinação contra o papilomavirus humano. Método: trata-se de um estudo fenomenológico, com abordagem qualitativa, realizado com 10 participantes, sendo pré- adolescentes e adolescentes, cujas quais foram vacinadas na sala de vacina de uma Unidade Básica de Saúde de um município de Minas Gerais. Os depoimentos foram gravados e transcritos na íntegra para posterior análise. O tratamento dos dados se deu por meio de Análise de Conteúdo. Resultados: a maioria das entrevistadas atribuiu à significação da vacinação relacionada ao fato de prevenir o câncer de colo uterino. O desconhecimento sobre a finalidade da vacina HPV fica em evidência em alguns depoimentos. O medo da vacina também ficou em evidência, tendo como justificativa o fato de ser injeção, da dor, da agulha e por medo da reação. Como medidas de prevenção, foram citadas o uso de preservativo e a ida periódica ao ginecologista. Seis das participantes não souberam informar nenhuma medida de prevenção contra o papilomavirus humano. Conclusão: as participantes do estudo entendem a importância da vacinação  contra  o  papilomavirus  humano,  embora  seis  participantes,  bem  como  suas  famílias,  informaram  ter  receio  pela  dor  da  vacinação ou possíveis eventos adversos pós-vacinais.(AU)", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 142, "title": "Sin título", "authors": "Sánchez-Juárez, Itzel Andrea; de Ávila-Arroyo, María Luz; Tenahua-Quitl, Inés et al.", "journal": "SANUS", "year": "2021", "vol": "6:1-13", "doi": "", "abstract": "", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 136, "title": "Sin título", "authors": "Pedrinho, Leticia Roberta; Shibukawa, Bianca Machado Cruz; Rissi, Gabrieli Patricio et al.", "journal": "", "year": "2021", "vol": "25(3):1-9", "doi": "", "abstract": "", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 128, "title": "Sin título", "authors": "Litwin, Sasha P.; Nguyen, Cynthia; Hundert, Amos et al.", "journal": "The Clinical journal of pain", "year": "2021", "vol": "37(2):94-101", "doi": "10.1097/AJP.0000000000000894", "abstract": "OBJECTIVE: The objective of this study was to evaluate the feasibility of using virtual reality (VR) for distraction during intravenous (IV) insertion in the  pediatric emergency department (ED) and of conducting a full-scale randomized  controlled trial. MATERIALS AND METHODS: Children aged 8 to 17 years old  attending a tertiary care pediatric ED were randomized to interactive VR or an  attention control (video on a tablet) for distraction during their IV insertion.  Feasibility was determined by recruitment rates, acceptability of the  intervention, response rates to outcome measures, and safety or technical  problems. Satisfaction questionnaires and pain, fear, and distress scores were  completed by the child, caregiver, nurse, and research assistant. Immersion in  the intervention was rated by the child. Heart rate was measured. RESULTS:  Children were recruited between February 2018 and May 2019. A total of 116  children were screened and 72.3% of eligible children were enrolled. Overall, 60  children were randomized to either VR (n=32) or attention control (n=28).  Children, caregivers, and nurses were highly satisfied with both distraction  methods. There were no significant safety, technical, or equipment issues. There  was minimal disruption to clinical workflow in both groups due to study  protocols. There was a clinically significant reduction in pain in the VR group.  There was no significant difference in fear or distress. Children reported higher  immersion in the VR environment. Heart rate increase from baseline was higher in  the VR group. DISCUSSION: Our data support the feasibility of using VR for  distraction during IV insertion and of conducting a full-scale randomized  controlled trial. Identifying eligible patients and minimizing the number of  outcome measures will be important considerations for future research.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 120, "title": "Sin título", "authors": "Fitri, Siti Yuyun Rahayu; Nasution, Siti Khadijah; Nurhidayah, Ikeu et al.", "journal": "Complementary therapies in medicine", "year": "2021", "vol": "59:102735", "doi": "10.1016/j.ctim.2021.102735", "abstract": "INTRODUCTION: Neonates who undergo painful medical procedures should be given analgesics to reduce future adverse risks. The evidence for massage therapy (MT)  as an analgesic method still varies, both in its terminology and implementation.  Only a few studies on this topic have been conducted using a standardised trial  approach. This review can thus become the basis for better future research.  OBJECTIVE: This review aims to identify literature on MT practices as a method to  manage or control pain in neonates undergoing painful procedures. METHODS: The  methodology for this review followed the JBI scoping review methodology  guidelines. Searches were performed in several databases: MEDLINE (PubMed),  CINAHL (EBSCO), Scopus (Elsevier) and EMBASE. Data collected were then extracted  by two independent reviewers, synthesised and presented in the form of tables and  narratives. RESULTS: Fifteen studies involving a total of 1,058 neonates in nine  countries were identified in the search as meeting the criteria set for this  review. One study was a comparative study, five were quasi-experiment studies and  nine were randomised control trials (RCT). CONCLUSION: The implementation of  massage as a non-pharmacological analgesic method for neonates undergoing painful  procedures varied among the reviewed studies. Differences were identified in  terms of the body part massaged, the duration and intensity of the massage, the  level of pressure and the combination of massage with other methods. All studies  presented positive results for reducing pain intensity in neonates undergoing  procedural pain. Therefore, it is crucial that the method used for giving massage  should be practical, accurate and safe.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 214, "title": "Sin título", "authors": "Richardson, Brianna; Benoit, Britney; Rutledge, Kallen et al.", "journal": "JBI database of systematic reviews and implementation reports", "year": "2019", "vol": "17(8):1589-1599", "doi": "10.11124/JBISRIR-D-19-00007", "abstract": "OBJECTIVE: The objective of this review is to determine if electronic health (eHealth) educational interventions for infant procedural pain and pain  management impact parental outcomes (mental health outcomes, knowledge  utilization outcomes, and parental involvement in care outcomes) and infant  outcomes (morbidity outcomes, pain outcomes, health system outcomes).  INTRODUCTION: Pain in infants is a common concern for parents. Routine postpartum  care for infants in early life requires them to endure painful procedures, yet  infants often receive little to no pain management. While research has shown that  parents can reduce their infant's pain during procedures by breastfeeding or  skin-to-skin contact, parents may not be aware of their role in pain management.  Despite the recent rapid increase in eHealth resources to educate parents about  infant pain management, their impact has yet to be evaluated. INCLUSION CRITERIA:  This review will consider studies that include eHealth educational interventions  targeted at parents during pregnancy and up to one year postpartum. All  experimental study designs will be included. Primary outcomes will include:  parental stress and anxiety, self-efficacy, knowledge, attitudes, eHealth  intervention usage, acceptance of eHealth intervention, involvement in pain  management, and infant pain response. METHODS: PubMed, CINAHL, PsycINFO, Embase,  Scopus, Web of Science, and SciELO will be searched for studies published in  English. Critical appraisal and data extraction will be conducted by two  independent reviewers using standardized tools. Quantitative data, where  possible, will be pooled in statistical meta-analysis, or if statistical pooling  is not possible, the findings will be reported narratively.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 212, "title": "Sin título", "authors": "Poddighe, Dimitri; Brambilla, Ilaria; Licari, Amelia et al.", "journal": "Pediatric emergency care", "year": "2019", "vol": "35(6):448-453", "doi": "10.1097/PEC.0000000000001505", "abstract": "BACKGROUND: Acute pain is one of the major complaints reported in pediatric emergency departments and general wards. Recently, both the US Food and Drug  Administration and European Medicine Agency emitted some warnings regarding the  use of opioids, including codeine, in children. OBJECTIVE: The aims of this study  were summarizing the main pharmacological aspects of ibuprofen, discussing the  current evidence about the use of ibuprofen in different and specific clinical  settings, and providing a comparison with acetaminophen and/or codeine, according  to available studies. STUDY DESIGN AND METHODS: Studies evaluating ibuprofen for  the management of acute pain in children were extracted from the PubMed and  MEDLINE database within the period ranging from 1985 through 2017. After  discussing safety of ibuprofen and its concomitant use with acetaminophen, the  specific indications for the clinical practice were considered. RESULTS:  Ibuprofen resulted to be more effective than acetaminophen, and comparable to the  combination acetaminophen-codeine, for the control of acute pain related to  musculoskeletal pain. Moreover, similar results have been reported also in the  management of toothache and inflammatory diseases of the oral cavity and pharynx.  Ibuprofen resulted to be useful as a first approach to episodic headache.  Finally, the role of ibuprofen in the management of postoperative pain and,  particularly, after tonsillectomy and/or adenoidectomy has been reconsidered  recently. CONCLUSIONS: Ibuprofen resulted to be the most studied nonsteroidal  anti-inflammatory drug in the management of acute pain in children; in general,  it showed a good safety profile and provided evidence of effectiveness, despite  some differences according to the specific clinical context.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 209, "title": "Sin título", "authors": "Nemeth, Marcus; Jacobsen, Nils; Bantel, Carsten et al.", "journal": "Pediatric emergency care", "year": "2019", "vol": "35(2):89-95", "doi": "10.1097/PEC.0000000000001017", "abstract": "OBJECTIVES: Children presenting with acute traumatic pain or in need of therapeutic or diagnostic procedures require rapid and effective analgesia and/or  sedation. Intranasal administration (INA) promises to be a reliable, minimally  invasive delivery route. However, INA is still underused in Germany. We hence  developed a protocol for acute pain therapy (APT) and urgent analgesia and/or  sedation (UAS). Our aim was to evaluate the effectiveness and safety of our  protocol. METHODS: We performed a prospective observational study in a tertiary  children's hospital in Germany. Pediatric patients aged 0 to 17 years requiring  APT or UAS were included. Fentanyl, s-ketamine, midazolam, or combinations were  delivered according to protocol. Primary outcome variables included quality of  analgesia and/or sedation as measured on age-appropriate scales and time to onset  of drug action. Secondary outcomes were adverse events and serious adverse  events. RESULTS: One hundred pediatric patients aged 0.3 to 16 years were  enrolled, 34 for APT and 66 for UAS. The median time onset of drug action was 5  minutes (ranging from 2 to 15 minutes). Fentanyl was most frequently used for APT  (n = 19). Pain scores decreased by a median of 4 points (range, 0-10; P <  0.0001). For UAS, s-ketamine/midazolam was most frequently used (n = 25).  Sedation score indicated minimal sedation in most cases. Overall success rate  after the first attempt was 82%. Adverse events consisted of nasal burning (n =  2) and vomiting (n = 2). No serious adverse events were recorded. CONCLUSIONS: A  fentanyl-, s-ketamine-, and midazolam-based INA protocol was effective and safe  for APT and UAS. It should then be considered where intravenous access is  impossible or inappropriate.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 208, "title": "Sin título", "authors": "Najafi, Nadia; Forget, Patrice; Poelaert, Jan", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(5):459", "doi": "10.1097/AJP.0000000000000687", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 207, "title": "Sin título", "authors": "Moultrie, Fiona; Shriver, Adam; Hartley, Caroline et al.", "journal": "The Lancet. Child & adolescent health", "year": "2019", "vol": "3(2):62-64", "doi": "10.1016/S2352-4642(18)30269-4", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 205, "title": "Sin título", "authors": "Meesters, Naomi J.; Simons, Sinno H. P.; van Rosmalen, Joost et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(12):975-982", "doi": "10.1097/AJP.0000000000000762", "abstract": "OBJECTIVES: Neonates born extremely prematurely are at high risk of acute and prolonged pain. Effective treatment requires reliable pain assessment, which is  currently missing. Our study explored whether existing pain assessment tools and  physiological indicators measure pain and comfort accurately in this population.  MATERIALS AND METHODS: We prospectively collected data in 16 neonates born at  less than 29 weeks' gestational age during 3 conditions: skin-to-skin care, rest,  and heelstick procedure for capillary blood sampling in the incubator. The  neonates were video recorded in these situations, and recordings were coded using  5 observational pain assessment tools and numeric rating scales for pain and  distress. We simultaneously collected heart rate, respiratory rate, arterial  oxygen saturation, regional cerebral oxygenation, and the number of skin  conductance peaks. All measures across the 3 conditions were compared using  general linear modeling. RESULTS: The median gestational age was 27.1 weeks  (range: 24.1 to 28.7). Forty measurement periods across the 3 conditions were  analyzed. Heart rate was significantly higher during heelstick procedures  compared with during rest, with a mean difference of 10.7 beats/min (95%  confidence interval [CI]: 2.7-18.6). Oxygen saturation was significantly higher  during skin-to-skin care compared with during heelstick procedures with a mean  difference of 5.5% (95% CI: 0.2-10.8). The Premature Infant Pain Profile-revised  (PIPP-R) score was significantly higher during heelstick procedures compared with  skin-to-skin care with a mean difference of 3.2 points (95% CI: 1.6-5.0).  DISCUSSION: Pain measurement in clinical practice in prematurely born infants  below 29 weeks remains challenging. The included behavioral and physiological  indicators did not adequately distinguish between a painful situation, rest, and  skin-to-skin care in premature neonates.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 197, "title": "Sin título", "authors": "Fernández-Cantalejo Padial, J; Heras, E; Hernández, B et al.", "journal": "Rev Chil Pediatr", "year": "2019", "vol": "90(6):649-656", "doi": "10.32641/rchped.v90i6.1169", "abstract": "INTRODUCTION: We analyze the effectiveness and safety of a specific analgosedation protocol for procedures, and eva luate the satisfaction of the health personnel with each procedure. PATIENTS AND METHOD: Prospective study of an analgosedation protocol for hospital procedures in children under 18 years of age, with an individualized strategy based on the patient's baseline situation, the type of procedure and the experience of the pediatrician responsible for the sedation. The following variables were recorded: diagnosis motivating the procedure, type of procedure, anthropometric data, allergies, medication, ASA status and baseline disease, fasting time, lung auscultation, temperature, oxygen saturation, res piratory rate, heart rate, blood pressure, sedation location, type of drug, dose, route of administra tion, Ramsay sedation scale, duration of sedation, type and treatment of adverse effects, presence of family members throughout the procedure, and patient satisfaction. RESULTS: 279 sedations were performed. The most commonly used drugs were nitrous oxide (62.7%) and midazolam (16.5%); the most commonly used routes of administration were the inhaled one (62.4%) and the intravenous one (15.8%). The satisfaction was high for the pediatrician (92.5%), the nurse (94.3%), the family (96.8%), and patients (93.6%), with a good correlation between them, and it was significantly lower when using midazolam and the nasal and oral routes. The adverse effects rate was 3.2%, and none was severe. CONCLUSIONS: The implementation of a specific analgosedation protocol for procedures in the hospital environment achieves high levels of effectiveness and safety, as well as a high level of satisfaction, both in family members and in health personnel.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 194, "title": "Sin título", "authors": "De Clifford-Faugère, Gwenaëlle; Aita, Marilyn; Le May, Sylvie", "journal": "Applied nursing research : ANR", "year": "2019", "vol": "45:52-54", "doi": "10.1016/j.apnr.2018.11.007", "abstract": "BACKGROUND: It is well known that preterm neonates can feel pain which can be expressed through specific behaviors and signs. Repeated and untreated pain has  consequences for the preterm neonates such as hypersensitivity to pain, as well  as important repercussions on their motor and intellectual development. The use  of non-pharmacological interventions for pain management by nurses is imperative  to prevent these consequences in the NICU. The aim of this study is to survey  neonatal nurses' interventions for pain management of preterm neonates. METHODS:  Twenty (20) nurses were recruited for this pilot observational survey study.  Standard pain management interventions used by nurses during heel prick were  evaluated by means of a questionnaire. In addition, 11 out of the 20 nurses were  observed during heel prick to evaluate what and how interventions were done.  RESULTS: All infants (n = 11) received at least one pain management intervention  during heel prick. Heterogeneity in pain management practices used by nurses is  considerable. For 95% (19/20) of nurses, sucrose is a standard intervention  reported in the survey but observations showed that it not always applied (64%).  Positioning is more used (64%) by nurses than reported in the survey (45%).  Swaddling also was also reported as a standard intervention by 45% of nurses, but  it does not appear to be adequately performed (36%). CONCLUSION: According to the  results, it would be essential to review nurses' knowledge and skills regarding  standard pain management interventions, during painful procedures, as the quality  of these practices is questionable. Homogeneity of the standard of care is  particularly important in research to allow an appropriate comparison between  study groups and prevention study bias.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 192, "title": "Sin título", "authors": "Costa, Anna Caroline Leite; Araújo, Fernanda Lopes de; Simão, Delma Aurélia da Silva et al.", "journal": "Texto & contexto enferm", "year": "2019", "vol": "28:e20180299-e20180299", "doi": "10.1590/1980-265x-tce-2018-0299", "abstract": "ABSTRACT  Objective:  to describe potentially painful procedures performed in neonates and their relation with pain relief strategies.  Method: a longitudinal correlational study, conducted from October to December 2014, with 50 neonates admitted to neonatal units of a public maternity hospital in Belo Horizonte, Minas Gerais (Brazil). Procedures were analyzed in the first two weeks of life of neonates admitted with up to three hours of life and born at the maternity hospital in which the study was conducted. Data was submitted to descriptive, comparative and correlational analyses using the Statistical Package for the Social Sciences software, adopting a significance level of 5%.  Results: most newborns were male (n=32; 64%), premature (n=34; 69.4%) and hospitalized for having respiratory disorders (n=45; 91.8%). A total of 894 painful and of 2883 potentially painful procedures related to daily care were recorded. Non-pharmacological pain relief strategies were used in 49 (98%) neonates, while pharmacological strategies were used in nine (18%). Correlational analyses revealed the difficulty of drug treatment management and the underuse of non-pharmacological strategies as adjuvant to severe pain procedures.  Conclusion: neonates underwent many potentially painful procedures, and it was found that pain relief methods are underused and that training on pain assessment and treatment is necessary in order to make these practices part of the care process.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 191, "title": "Sin título", "authors": "Chen, Yu-Shuang; Tan, Yan-Juan; Zhou, Le-Shan", "journal": "Zhongguo dang dai er ke za zhi = Chinese journal of contemporary pediatrics", "year": "2019", "vol": "21(1):58-63", "doi": "10.7499/j.issn.1008-8830.2019.01.011", "abstract": "OBJECTIVE: To study the clinical effect of maternal voice stimulation in alleviating procedural pain in neonates during heel blood collection. METHODS: A  total of 72 neonates who were admitted to the neonate intensive care unit were  randomly divided into an intervention group (n=35) and a control group (n=37).  Heel blood collection was performed by the routine method in the control group.  The intervention group listened to their mothers' voice from 1 minute before heel  blood collection to the end of the procedure. Pain score, incidence of crying,  and vital signs were recorded before and after heel blood collection. RESULTS:  Compared with the control group, the heart rate was significantly reduced, the  blood oxygen saturation significantly increased, the incidence of crying and the  pain score were significantly reduced in the intervention group during the  procedure of heel blood collection (P<0.05). CONCLUSIONS: Maternal voice  stimulation helps to reduce procedural pain and maintain stable vital signs in  neonates.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 189, "title": "Sin título", "authors": "Ballard, Ariane; Khadra, Christelle; Adler, Samara et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(6):532-543", "doi": "10.1097/AJP.0000000000000690", "abstract": "OBJECTIVE: This systematic review and meta-analysis examined the effectiveness of the Buzzy device combining cold and vibration for needle-related procedural pain  in children. MATERIALS AND METHODS: Databases search was conducted from inception  to December 2017 to identify randomized controlled trials using the Buzzy device  for pain management in children undergoing needle-related procedures. Selection  of studies, data extraction, and assessment of risk of bias and quality of  evidence were independently performed by 2 reviewers. Quantitative and  qualitative analyses were conducted. RESULTS: A total of 9 studies involving 1138  participants aged between 3 and 18 years old were included in the systematic  review and 7 were suitable for meta-analysis. The meta-analysis compared the  Buzzy device with a no-treatment comparator and the effect of the device was  significant in reducing self-report procedural pain (standardized mean difference  [SMD]: -1.11; 95% confidence interval [CI]: -1.52 to -0.70; P<0.0001),  parent-reported procedural pain (SMD: -0.94; 95% CI: -1.62 to -0.27; P=0.006),  observer-report procedural pain (SMD: -1.19; 95% CI: -1.90 to -0.47; P=0.001),  observer-reported procedural anxiety (SMD -1.37; 95% CI: -1.77 to -0.96;  P<0.00001), and parent-reported procedural anxiety (SMD -1.36; 95% CI: -2.11 to  -0.61; P=0.0004). There was no significant difference for the success of the  procedure at first attempt and the occurrence of adverse events. DISCUSSION: The  Buzzy device seems to be a promising intervention for procedural pain management  in children. However, the comparative effect is uncertain due to the presence of  significant heterogeneity and very low-quality evidence. There is a need to  improve the methodological quality and rigor in the design of future trials to  conclude to the efficacy of the Buzzy device.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 186, "title": "Sin título", "authors": "", "journal": "The Journal of perinatal & neonatal nursing", "year": "2020", "vol": "34(4):E22", "doi": "10.1097/JPN.0000000000000532", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 185, "title": "Sin título", "authors": "", "journal": "Medicine and science in sports and exercise", "year": "2020", "vol": "52(9):2037-2046", "doi": "10.1249/MSS.0000000000002333", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 183, "title": "Sin título", "authors": "Whitley, Gregory Adam; Hemingway, Pippa; Law, Graham Richard et al.", "journal": "The American journal of emergency medicine", "year": "2020", "vol": "38(7):1424-1430", "doi": "10.1016/j.ajem.2019.11.043", "abstract": "OBJECTIVE: We aimed to identify predictors of effective management of acute pain in children in the pre-hospital setting. METHODS: A retrospective cross-sectional  study using electronic clinical records from one large UK ambulance service  during 01-Oct-2017 to 30-Sep-2018 was performed using multivariable logistic  regression. We included all children <18 years suffering acute pain. Children  with a Glasgow Coma Scale score of <15, no documented pain or without a second  pain score were excluded. The outcome measure was effective pain management  (abolition or reduction of pain by ≥2 out of 10 using the numeric pain rating  scale, Wong-Baker FACES® scale or FLACC [face, legs, activity, crying and  consolability] scale). RESULTS: 2312 patients were included for analysis. Median  (IQR) age was 13 (9-16), 54% were male and the cause of pain was trauma in 66% of  cases. Predictors of effective pain management include children who were younger  (0-5 years) compared to older (12-17 years) (adjusted odds ratio [AOR] 1.53; 95%  confidence interval [CI] 1.18-1.97), administered analgesia (AOR 2.26; CI  1.87-2.73), attended by a paramedic (AOR 1.46; CI 1.19-1.79) or living in an area  of low deprivation (index of multiple deprivation [IMD] 8-10) compared to  children in an area of high deprivation (IMD 1-3) (AOR 1.37; CI 1.04-1.80). Child  sex, type of pain, transport time, non-pharmacological treatments and clinician  experience were not significant. CONCLUSION: These predictors highlight disparity  in effective pre-hospital management of acute pain in children. Qualitative  research is needed to help explain these findings.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 179, "title": "Sin título", "authors": "Reinoso, G; Acosta, C; Vizcarra, D", "journal": "Med. infant", "year": "2020", "vol": "27(2):210-225", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 177, "title": "Sin título", "authors": "Olsson, Emma; Carlsen Misic, Martina; Dovland Andersen, Randi et al.", "journal": "BMC pediatrics", "year": "2020", "vol": "20(1):474", "doi": "10.1186/s12887-020-02356-7", "abstract": "BACKGROUND: During the first period of life, critically ill as well as healthy newborn infants experience recurrent painful procedures. Parents are a valuable  but often overlooked resource in procedural pain management in newborns.  Interventions to improve parents' knowledge and involvement in infants' pain  management are essential to implement in the care of the newborn infant. Neonatal  pain research has studied a range of non-pharmacological pain alleviating  strategies during painful procedures, yet, regarding combined multisensorial  parent-driven non-pharmacological pain management, research is still lacking.  METHODS/DESIGN: A multi-center randomized controlled trial (RCT) with three  parallel groups with the allocation ratio 1:1:1 is planned. The RCT \"Parents as  pain management in Swedish neonatal care - SWEpap\", will investigate the efficacy  of combined pain management with skin-to-skin contact, breastfeeding and live  parental lullaby singing compared with standard pain care initiated by health  care professionals, during routine metabolic screening of newborn infants  (PKU-test). DISCUSSION: Parental involvement in neonatal pain management enables  a range of comforting parental interventions such as skin-to-skin contact,  breastfeeding, rocking and soothing vocalizations. To date, few studies have been  published examining the efficacy of combined multisensorial parent-driven  interventions. So far, research shows that the use of combined parent-driven pain  management such as skin-to-skin contact and breastfeeding, is more effective in  reducing behavioral responses to pain in infants, than using the pain-relieving  interventions alone. Combined parental soothing behaviors that provide rhythmic  (holding/rocking/vocalizing) or orogustatory/orotactile (feeding/pacifying)  stimulation that keep the parent close to the infant, are more effective in a  painful context. In the SWEpap study we also include parental live lullaby  singing, which is an unexplored but promising biopsychosocial, multimodal and  multisensory pain alleviating adjuvant, especially in combination with  skin-to-skin contact and breastfeeding. TRIAL REGISTRATION: ClinicalTrials.gov (  NCT04341194 ) 10 April 2020.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E2 — Neonatos en UCI neonatal"}, {"id": 176, "title": "Sin título", "authors": "Oliveira J E Silva, Lucas; Lee, John Y.; Bellolio, Fernanda et al.", "journal": "The American journal of emergency medicine", "year": "2020", "vol": "38(9):1860-1866", "doi": "10.1016/j.ajem.2020.05.094", "abstract": "STUDY OBJECTIVE: To assess the efficacy and safety of intranasal analgesic-dose ketamine as compared to intranasal fentanyl for pediatric acute pain. METHODS: A  systematic review and meta-analysis was performed following the PRISMA  guidelines. We searched PubMed, Embase, and Scopus databases for randomized  controlled trials from inception to December 2019. We conducted meta-analysis  with random-effects models to evaluate pain reduction, rescue analgesia, adverse  events and sedation between intranasal ketamine and intranasal fentanyl.  Random-effects models were used to estimate weighted mean differences (WMD) and  pooled relative risks (RR). RESULTS: A total of 546 studies were screened and 4  trials were included. In the meta-analysis of 4 studies including 276 patients,  ketamine had similar reductions in pain scores from baseline to all  post-intervention times (10 to 15 min: WMD -1.42, 95% CI -9.95 to 7.10; 30 min:  WMD 0.40, 95% CI -6.29 to 7.10; 60 min: WMD -0.64, 95% CI -6.76 to 5.47).  Ketamine was associated with similar rates of rescue analgesia (RR 0.74, 95% CI  0.44 to 1.25). Ketamine had a higher risk of non-serious adverse events (RR 2.00,  95% CI 1.43 to 2.79), and no patients receiving ketamine had a serious adverse  event. There was one serious adverse event (hypotension) with fentanyl that  self-resolved. No patients receiving either IN fentanyl or ketamine had  significant sedation. CONCLUSION: Intranasal analgesic-dose ketamine may be  considered as an alternative to opioids for acute pain management in children.  Its accepted use will depend on the tolerability of non-serious adverse events  and the desire to avoid opioids.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 167, "title": "Sin título", "authors": "Kornman, Kelly; Wilson, Valerie; Tinsley, Patricia et al.", "journal": "Comprehensive child and adolescent nursing", "year": "2020", "vol": "43(1):22-34", "doi": "10.1080/24694193.2018.1528309", "abstract": "The aim in this study was to understand current practice and use of nitrous oxide for management of procedural-related pain and procedural anxiety, to identify  perceived barriers to use of nitrous oxide and to develop an understanding of  patients, families, and nurse awareness and knowledge of the use of nitrous oxide  in an Australian tertiary pediatric oncology/hematology short stay unit. Three  online questionnaires (patients, parents, and nursing staff) were developed and  completed between September and November 2015. Most children and young people  (61%) report receiving nitrous oxide for at least one procedure. Patients,  parents, and nurses rated nitrous oxide as highly effective and would like more  access to nitrous oxide for the child's pain management. Several barriers to use  were reported. These findings suggest that nitrous oxide is effective for pain  management; however, its use is inconsistent. Findings can potentially develop  standardized processes and improve nurse education and accreditation, which may  increase the safety, efficacy, and utilization of nitrous oxide for children's  procedural pain management.", "dec_r1": "EXCLUIR", "mot_r1": "E1 — Población oncológica", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 325, "title": "Sin título", "authors": "Krauss, Baruch S.; Calligaris, Lorenzo; Green, Steven M. et al.", "journal": "Lancet (London, England)", "year": "2016", "vol": "387(10013):83-92", "doi": "10.1016/S0140-6736(14)61686-X", "abstract": "Pain is common in children presenting to emergency departments with episodic illnesses, acute injuries, and exacerbation of chronic disorders. We review  recognition and assessment of pain in infants and children and discuss the  manifestations of pain in children with chronic illness, recurrent pain  syndromes, and cognitive impairment, including the difficulties of pain  management in these patients. Non-pharmacological interventions, as adjuncts to  pharmacological management for acute anxiety and pain, are described by age and  development. We discuss the pharmacological management of acute pain and anxiety,  reviewing invasive and non-invasive routes of administration, pharmacology, and  adverse effects.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 318, "title": "Sin título", "authors": "Costa, Roberta; Cordeiro, Raquel Alves", "journal": "Rev. Enferm. UERJ (Online)", "year": "2016", "vol": "24(1):e11298-e11298", "doi": "10.12957/reuerj.2016.11298", "abstract": "Objetivo: promover um processo de reflexão junto à equipe de enfermagem sobre o manejo do desconforto e da dor em recém-nascido (RN). Método: pesquisa convergente-assistencial realizada em uma unidade neonatal do sul do Brasil. Os participantes foram 16 profissionais da equipe de enfermagem. A coleta de dados ocorreu nos meses de outubro e novembro de 2012, através de grupos de reflexão sustentados pelo referencial teórico da Pedagogia Libertadora. Resultados: da prática educativa, emergiram três categorias: os estímulos ambientais provocam dor e desconforto no RN; procedimentos invasivos como principais causadores da dor em RN; e a enfermagem reconhece os sinais álgicos no bebê. Conclusão: os resultados demonstram a preocupação dos profissionais de saúde com a identificação da dor, a necessidade de minimizar os estímulos ambientais e a importância do uso de medidas não farmacológicas e farmacológicas, principalmente durante os procedimentos invasivos, evitando implicações no desenvolvimento neuropsicomotor do recém-nascido.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 300, "title": "Sin título", "authors": "Murmu, Jitendranath; Venkatnarayan, Kannan; Thapar, Rajeev Kumar et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2017", "vol": "106(3):411-415", "doi": "10.1111/apa.13716", "abstract": "AIM: Research on alternative female Kangaroo care (KC) has been hampered by high maternal refusal rates. We assessed the efficacy of Kangaroo mother care (KMC),  alternative KC provided by other postpartum mothers and swaddling for  postprocedural pain relief in preterm babies. METHODS: The study was carried out  in a tertiary armed forces hospital, where mothers did not have support from  other female relatives and other postpartum mothers agreed to act as alternative  female KC providers. We exposed 51 stable preterm neonates, with a gestational  age of 30-36 weeks, to KMC, alternative female KC and swaddling for 30 minutes  before heel lancing. The outcome measures included the Preterm Infant Pain  Profile (PIPP) scores at 30 seconds and the time taken for the heart rate to  return to baseline. RESULTS: The mean PIPP scores were lower with KMC (10.59) and  alternative female KC (11.24) than swaddling (12.96) and heart rate normalisation  took 111, 117 and 149 seconds respectively. The p values were <0.001 for  individual groups and outcomes. KMC fared better than alternative female KC for  both pain (p = 0.045) and heart rate (p = 0.013). CONCLUSION: Providing KMC and  alternative female KC before heel lancing resulted in better pain relief than  swaddling.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 304, "title": "Sin título", "authors": "San Martín, Daniela; Valenzuela, Sandra; Huaiquian, Julia et al.", "journal": "Enferm Global", "year": "2017", "vol": "16(4):1-12", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 305, "title": "Sin título", "authors": "Shavit, Itai; Peri-Front, Yael; Rosen-Walther, Anda et al.", "journal": "Pain medicine (Malden, Mass.)", "year": "2017", "vol": "18(2):356-362", "doi": "10.1093/pm/pnw097", "abstract": "OBJECTIVE: To examine the comparative effectiveness of two topical anesthetics in controlling the pain associated with tongue-tie release (frenotomy) in young  infants. DESIGN: Randomized trial. SETTING: A Pediatric Craniofacial Clinic.  SUBJECTS: Forty-two infants who were referred for frenotomy were randomly  allocated to receive the topical anesthetic gel 2% tetracaine or 20% benzocaine  applied prior to frenotomy. Frenotomies were videotaped. The primary outcome  measure was the Neonatal Facial Coding System (NFCS) score. Secondary outcome  measures included cry duration and a visual analog scale (VAS) assessed by the  parents. RESULTS: The two groups were comparable with regard to weight, age,  gender, previous painful experience, and last feeding time. Median NFCS scores  prior to frenotomy in the tetracaine and the benzocaine groups were 4.5 (IQR:  0.75–10.2) and 3.5 (IQR: 0–9.5), respectively (P = 0.89, 95% CI −3 to 4). During  frenotomy, median NFCS score increased to 28 (IQR: 24.5–30.25) in the tetracaine  group (P < 0.0001, median difference −22, 95% CI −24.5 to −19), and to 28 (IQR:  26–30) in the benzocaine group (P < 0.0001, median difference −23, 95% CI −27 to  −17). Mean cry durations in the tetracaine and the benzocaine groups were  69.4 seconds and 63.9 seconds, respectively (P = 0.32, 95% CI −47 to 15), and  mean VAS scores were 57.2 and 58.2, respectively (P = 0.89, 95% CI −15.2 to  13.4). CONCLUSIONS: These topical anesthetics seem ineffective in controlling the  pain associated with frenotomy. Clinicians should continue to search for an  effective treatment for this procedure.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 262, "title": "Sin título", "authors": "Ornellas, Talita Nunes dos Santos", "journal": "", "year": "2018", "vol": ":113-113", "doi": "", "abstract": "Objetivos: analisar a frequência da dor em recém-nascidos durante a utilização do CPAP nasal; descrever o modo de utilização do CPAP nasal nos recém-nascidos e descrever a associação entre o manuseio da pronga nasal e a presença de dor. Metodologia: trata-se de um estudo transversal, realizado no Instituto Nacional de Saúde da Mulher, da Criança e do Adolescente Fernandes Figueira, localizado no município do Rio de Janeiro. Esta pesquisa foi submetida ao Comitê de Ética em Pesquisa com Seres Humanos da Instituição da pesquisa em consonância com o estabelecido na Resolução nº 466/2012 do Conselho Nacional de Saúde e aprovada com a CAAE nº 64231317.5.0000.5269. Foram avaliados oito recém-nascidos em uso de CPAP nasal internados durante o período da coleta de dados, que foi de junho a novembro de 2017. A coleta de dados foi realizada com base na filmagem dos recém-nascidos participantes do estudo que foi feita durante o período diurno, por seis horas corridas. Cada RN participou da pesquisa apenas uma vez ao logo de sua internação, isto é, ele foi filmado somente em um único momento. Foi realizada uma avaliação da utilização do CPAP nasal pelo recém-nascido, através de um checklist. Para avaliação da dor durante a utilização do CPAP nasal foi aplicada a escala NFCS. Para garantir a associação temporal entre a utilização do CPAP nasal e a dor, a avaliação pelo checklist e pela NFCS foram feitas sempre no mesmo momento. Em todos os momentos que houve uma inadequação na utilização do CPAP nasal (prevista no checklist) ou uma reinserção da pronga, tanto o checklist quanto a NFCS foram aplicados. Foi realizada uma análise descritiva. Para uma melhor avaliação dos dados, o vídeo foi analisado por duas pessoas: pela pesquisadora e pela assistente da pesquisa. Resultados: foi observado que houve um grande número de não conformidades com a utilização do CPAP nasal descritas, e um elevado número de eventos dolorosos durante a utilização do CPAP nasal, com um total de 185 observações, ou seja, em 61,08% houve a presença de dor nas observações registradas de não conformidade. Dentre essas não conformidades na utilização do CPAP destaca-se o grande número de reinserções e de posicionamento inadequado. Conclusão: de acordo com o que foi observado neste estudo pode-se concluir que o uso do CPAP nasal nos RNs esteve associado à dor provocou dor. Os fatores mais relevantes foram o posicionamento inadequado e a reinserção da pronga. Diante dos resultados obtidos é preciso melhorar a prática no que diz respeito à vigilância do RN em uso do CPAP nasal, considerando o elevado grau de dor identificado pela escala NFCS, relacionadas ao posicionamento inadequado. Em relação às reinserções deve-se sempre pensar e fazer cumprir o manejo de dor (contenção, sucção não nutritiva e solução adocicada) durante uma reinserção programada.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 264, "title": "Sin título", "authors": "Pascolo, Paola; Peri, Francesca; Montico, Marcella et al.", "journal": "European journal of pediatrics", "year": "2018", "vol": "177(12):1753-1760", "doi": "10.1007/s00431-018-3237-4", "abstract": "Children with intellectual disability frequently undergo needle-related procedures for diagnosis or treatment. Nevertheless, only a few studies deal with  pain and distress management during the procedure in this population of children.  This study aimed to investigate the number of anxiety and pain management  techniques performed during needle procedure in children with intellectual  disability (cases) compared to a population of children without intellectual  disability (controls). This multicenter cohort study was performed from July 2016  to January 2018 in the pediatric ward of four urban hospitals in Italy. Eligible  subjects were children with and without intellectual disability, from 4 to  17 years old, who needed venipuncture or intravenous cannulation for diagnosis or  treatment. Use of topical anesthesia, distraction techniques, and physical or  verbal comfort during procedures were recorded. Pain and anxiety scores were also  recorded. Forty-seven cases and 94 controls were recruited. Three pain- and  anxiety-relieving techniques were performed during the procedure in 12 (25%)  cases and in 10 controls (11%); two techniques were performed in 23 (50%) cases  and in 26 (28%) controls; 12 (25%) cases and 52 (55%) controls received only  one.Conclusion: In this series, children with intellectual disability received  significantly more relieving techniques, but experienced more pain and anxiety  when compared to children without intellectual disability. What is Known: •  Children with intellectual disability experience more episodes of pain than  cognitively healthy ones, and almost 10% of these episodes are due to medical  procedures. What is New: • Children with intellectual disability despite  receiving more relieving techniques during a needle-related procedure experienced  more pain and anxiety when compared to healthy children.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 268, "title": "Sin título", "authors": "Santos, Priscila Mattos dos", "journal": "", "year": "2018", "vol": ":141-141", "doi": "", "abstract": "Resumo: O tratamento de queimaduras de espessura parcial em pacientes pediátricos é complexo e doloroso, a fragilidade da criança é um fator agravante na conduta a ser instituída. Preza-se a atenção e a promoção do vínculo familiar, reduzir a dor, danos estéticos e traumas do processo de hospitalização. O presente trabalho objetiva sintetizar as evidências sobre a efetividade da cobertura de silicone, nylon com colágeno (Biobrane®), comparado a qualquer outro tipo de cobertura, agentes tópicos ou placebos, no tratamento de queimaduras de espessura parcial em pacientes pediátricos em qualquer ambiente de cuidado. Esta revisão sistemática segue as recomendações do Instituto Joanna Briggs, e seu protocolo foi publicado no PROSPERO sob número: CRD42018102565. Incluíram-se ensaios clínicos randomizados com os seguintes critérios: inglês, português ou espanhol, publicados entre 1979 e 2018, pacientes pediátricos (0-18 anos) portadores de queimaduras de espessura parcial que fizessem uso da intervenção Biobrane®. Os desfechos de interesse foram: cicatrização completa; tempo de cicatrização; redução da área lesada; dor; tempo de hospitalização e eventos adversos. Os estudos foram identificados por meio das bases de dados de estudos publicados: MEDLINE, CINAHL, Embase, Web of Science, LILACS; em bases de estudos não publicados; por registros de ensaios clínicos randomizados; e busca manual no período de março a maio de 2018, com busca livre em novembro de 2018. Os critérios de elegibilidade e a avaliação da qualidade metodológica foram aplicados por dois revisores e um terceiro revisor, em caso de discordância. Os dados foram sintetizados de forma narrativa e quantitativa, e a qualidade das evidências classificadas pelo GRADE. Identificou-se 400 publicações e 5 estudos foram incluídos para síntese. Os produtos comparados ao Biobrane® foram: tratamento padrão (Intrasite&#8482;, Acticoat&#8482; e Duoderm®), Sulfadiazina de Prata, Duoderm® e TransCyte&#8482;. A cobertura Biobrane® demonstrou resultados positivos na cicatrização completa, no tempo de cicatrização, na redução da dor e menor tempo de hospitalização. A redução da área lesada não foi abordada pelos estudos primários. O desfecho eventos adversos, passível de metanálise, evidenciou complicações mais frequentes no grupo Biobrane® (RR=1,25; 95% CI=0,42 a 3,70; p-valor=0,178; I2=42), no entanto, sem significância estatística. A certeza para recomendação foi classificada como muito baixa (risco de viés, inconsistência e imprecisão), devido ao número amostral reduzido, poucos estudos, desenhos estudos com alto risco de viés, e resultados com dados inconsistentes para agrupamento em metanálise. As evidências disponíveis para orientar decisões sobre o uso do Biobrane® em queimaduras de espessura parcial em pacientes pediátricos ainda são escassas e insuficientes para recomendar o seu uso rotineiro. Sugere-se a realização de ensaios clínicos randomizados, com maior tamanho amostral, com descrição da forma de randomização, sigilo de alocação e o mascaramento da equipe responsável pela realização do tratamento e dos avaliadores dos resultados. A fim de diminuir o risco de viés, contribuir na tomada de decisão e na prática assistencial para o tratamento de queimaduras em pacientes pediátricos.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 283, "title": "Sin título", "authors": "Bonutti, Deise Petean; Daré, Mariana Firmino; Castral, Thaíla Corrêa et al.", "journal": "Rev. latinoam. enferm. (Online)", "year": "2017", "vol": "25:e2917-e2917", "doi": "10.1590/1518-8345.1387.2917", "abstract": "ABSTRACT  Objective: to dimension the exposure of premature infants to painful procedures, relating the distribution of the exposure to contextual factors, as well as to describe the pharmacological and non-pharmacological interventions health professionals use during the first two weeks of the infant's hospitalization at two neonatal services.  Method: descriptive-exploratory study in which the professionals registered the painful procedures and pain relief interventions on a specific form in the patient file.  Results: the daily average of the 89 premature infants was 5.37 painful procedures, corresponding to 6.56 during the first week of hospitalization and 4.18 during the second week (p&lt;0.0001). The most frequent procedures were nasal/oral (35.85%) and tracheal aspirations (17.17%). The children under invasive ventilation were the most exposed to painful procedures (71.2%). Only 44.9% of the painful procedures received some intervention for the purpose of pain relief, the most frequent being sucrose (78.21%) and continuing sedation (19.82%).  Conclusion: acute pain was undertreated at these neonatal services, recommending greater sensitization of the team for the effective use of the existing protocol and implementation of other knowledge transfer strategies to improve neonatal pain management.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 269, "title": "Sin título", "authors": "Shukla, Vivek V.; Bansal, Satvik; Nimbalkar, Archana et al.", "journal": "Indian pediatrics", "year": "2018", "vol": "55(4):292-296", "doi": "", "abstract": "OBJECTIVE: To compare individual efficacy and additive effects of pain control interventions in preterm neonates. DESIGN: Randomized controlled trial. SETTING:  Level-3 University affiliated neonatal intensive care unit. PARTICIPANTS: 200  neonates (26-36 wk gestational age) requiring heel-prick for bedside glucose  assessment. Exclusion criteria were neurologic impairment and critical illness  precluding study interventions. INTERVENTION: Neonates were randomly assigned to  Kangaroo mother care with Music therapy, Music therapy, Kangaroo Mother care or  Control (no additional intervention) groups. All groups received expressed breast  milk with cup and spoon as a baseline pain control intervention. MAIN OUTCOME  MEASURES: Assessment of pain using Premature Infant Pain Profile (PIPP) score on  recorded videos. RESULTS: The mean (SD) birth weight and gestational age of the  neonates was 1.9 (0.3) kg and 34 (2.3) wk, respectively. Analysis of variance  showed significant difference in total PIPP score across groups (P<0.001).  Post-hoc comparisons using Sheffe's test revealed that the mean (SD) total PIPP  score was significantly lower in Kangaroo mother care group [7.7 (3.9) vs. 11.5  (3.4), 95% CI(-5.9, -1.7), P<0.001] as well as Kangaroo mother care with Music  therapy group [8.5 (3.2) vs. 11.5 (3.4), 95%CI (-5.1, -0.9), P=0.001] as compared  to Control group. PIPP score was not significantly different between Control  group and Music therapy group. CONCLUSIONS: Kangaroo mother care with and without  Music therapy (with expressed breast milk) significantly reduces pain on  heel-prick as compared to expressed breast milk alone. Kangaroo mother care with  expressed breast milk should be the first choice as a method for pain control in  preterm neonates.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 275, "title": "Sin título", "authors": "Valeri, Beatriz O.; Gaspardo, Cláudia M.; Martinez, Francisco E. et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(8):713-722", "doi": "10.1097/AJP.0000000000000584", "abstract": "BACKGROUND: Preterm infants (PI) requiring the neonatal intensive care unit are exposed to early repetitive pain/distress. Little is known about how pain relief  strategies interact with infants' clinical health status, such as severity of  illness with pain responses. This study aimed to examine main and interactive  effects of routine sucrose intervention and neonatal clinical risk (NCR) on  biobehavioral pain reactivity-recovery in PI during painful blood collection  procedures. METHODS: Very low birth weight PI (<1500 g; n=104) were assigned to  low and high clinical risk groups, according to the Clinical Risk Index for  Babies. Sucrose group (n=52) received sucrose solution (25%; 0.5 mL/kg) 2 minutes  before the procedures and control group received standard care. Biobehavioral  pain reactivity-recovery was assessed according to the Neonatal Facial Coding  System, sleep-wake state scale, crying time, and heart rate at 5 phases  (baseline, antisepsis, puncture (P), recovery-dressing, and recovery-resting  [R]). Repeated measure ANOVA with mixed-design was performed considering pain  assessment phases, intervention group, and NCR. RESULTS: Independent of NCR,  sucrose presented main effect in decreasing neonates' facial activity pain  responses and crying time, during P and R. Independent of NCR level or routine  sucrose intervention, all neonates displayed activated state in P and decreased  biobehavioral responses in R phase. Although no sucrose or NCR effects were  observed on physiological reactivity, all neonates exhibited physiological  recovery 10 minutes after P, reaching the same heart rate patterns as the  baseline. CONCLUSIONS: Independent of NCR level, sucrose intervention for pain  relief during acute painful procedures was effective to reduce pain intensity and  increase biobehavioral regulation.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 279, "title": "Sin título", "authors": "van Uum, Rick T.; Venekamp, Roderick P.; Sjoukes, Alies et al.", "journal": "Trials", "year": "2018", "vol": "19(1):501", "doi": "10.1186/s13063-018-2880-4", "abstract": "BACKGROUND: Whilst current guidelines highlight the importance of pain management for children with acute otitis media (AOM), there is evidence to suggest that  this is not implemented in everyday practice. We have developed a primary  care-based multifaceted educational intervention to optimise pain management in  children with AOM, and we trial its clinical and cost effectiveness. METHODS:  This cluster randomised controlled trial aims to recruit 250 children aged  6 months to 10 years presenting with AOM to general practitioners (GPs) in 30  primary care centres (PCCs) across the Netherlands. GPs in the PCCs allocated to  the intervention group receive a blended GP educational programme (online and  face-to-face training). The intervention asks GPs to proactively discuss pain  management with parents using an information leaflet, and to prescribe  paracetamol and ibuprofen according to current guidelines. GPs in both groups  complete an online module illustrating various otoscopic images to standardise  AOM diagnosis. GPs in the PCCs allocated to the control group do not receive any  further training and provide 'care as usual'. During the 4-week follow-up,  parents complete a symptom diary. The primary outcome is the difference in  parent-reported mean earache scores over the first 3 days. Secondary outcomes  include both number of days with earache and fever, GP re-consultations for AOM,  antibiotic prescriptions, and costs. Analysis will be by intention-to-treat.  DISCUSSION: The optimal use of analgesics through the multifaceted intervention  may provide symptom relief and thereby reduce re-consultations and antibiotic  prescriptions in children with AOM. TRIAL REGISTRATION: Netherlands Trial  Register, NTR4920 . Registered on 19 December 2014.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 290, "title": "Sin título", "authors": "Dias, Flávia de Souza Barbosa; Gasparino, Renata Cristina; Carmona, Elenice Valentim et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2017", "vol": "51:e03285-e03285", "doi": "10.1590/s1980-220x2017008603285", "abstract": "RESUMO  Objetivo  Avaliar a confiabilidade e a validade da versão brasileira da Échelle Douleur Inconfort Nouveau-Né, que mensura a dor prolongada em recém-nascidos.  Método  Estudo metodológico realizado junto com recém-nascidos. Para a coleta foram utilizadas as versões brasileiras da Échelle Douleur Inconfort Nouveau-Né e da Children's and Infants' Postoperative Pain Scale. Para a confiabilidade, foram consideradas a equivalência, mensurada pela concordância entre observadores, e a homogeneidade. Para avaliar a validade, foi considerada a abordagem de construto convergente correlacionando as versões brasileiras da Échelle Douleur Inconfort Nouveau-Né e da Children's and Infants' Postoperative Pain Scale.  Resultados  Compuseram a amostra final 96 recém-nascidos. Na avaliação da confiabilidade, o coeficiente de concordância entre observadores variou entre 0,64 e 0,85 para os itens que compõem o instrumento e 0,96 para o escore total. O alfa de Cronbach foi de 0,82. Na avaliação da validade convergente, o coeficiente de correlação de Spearman entre os valores encontrados para as duas escalas foi de 0,79 (p&lt; 0,0001).  Conclusão  A versão brasileira da Échelle Douleur Inconfort Nouveau-Né é um instrumento confiável e válido para avaliar a dor prolongada em recém-nascidos.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 284, "title": "Sin título", "authors": "Bueno, Mariana; Nishi, Érika Tihemi; Costa, Taine et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):160-165", "doi": "10.1097/JPN.0000000000000254", "abstract": "Objective of this study was to conduct a systematic review of YouTube videos showing neonatal blood sampling, and to evaluate pain management and comforting  interventions used. Selected videos were consumer- or professional-produced  videos showing human newborns undergoing heel lancing or venipuncture for blood  sampling, videos showing the entire blood sampling procedure (from the first  attempt or puncture to the time of application of a cotton ball or bandage),  publication date prior to October 2014, Portuguese titles, available audio.  Search terms included \"neonate,\" \"newborn,\" \"neonatal screening,\" and \"blood  collection.\" Two reviewers independently screened the videos and extracted the  following data. A total of 13 140 videos were retrieved, of which 1354 were  further evaluated, and 68 were included. Videos were mostly consumer produced  (97%). Heel lancing was performed in 62 (91%). Forty-nine infants (72%) were held  by an adult during the procedure. Median pain score immediately after puncture  was 4 (interquartile range [IQR] = 0-5), and median length of cry throughout the  procedure was 61 seconds (IQR = 88). Breastfeeding (3%) and swaddling (1.5%) were  rarely implemented. Posted YouTube videos in Portuguese of newborns undergoing  blood collection demonstrate minimal use of pain treatment, and maximal distress  during procedures. Knowledge translation strategies are needed to implement  effective measures for neonatal pain relief and comfort.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 294, "title": "Sin título", "authors": "Harrison, Denise; Larocque, Catherine; Reszel, Jessica et al.", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2017", "vol": "17(5):372-380", "doi": "10.1097/ANC.0000000000000425", "abstract": "BACKGROUND: Breastfeeding (BF), skin-to-skin care (SSC), and sucrose effectively reduce babies' pain during newborn blood work, but these strategies are  infrequently used. Our team developed a parent-targeted video intervention  showing the effectiveness of the 3 pain management strategies. PURPOSE: To  evaluate neonatal intensive care unit (NICU) parents' (1) baseline knowledge and  previous use of BF, SSC, and sucrose for procedural pain management; (2)  intention to advocate/use BF, SSC, or sucrose for their infants' future blood  work after viewing the video; (3) intention to recommend the video to other  parents; and (4) perceptions of the video and identify areas for improvement.  METHODS: Cross-sectional survey of parents in an NICU. RESULTS: Fifty parents  were enrolled: 33 mothers and 17 fathers. More than two-thirds (68%) of parents  had prior knowledge of analgesic effects of sucrose; knowledge of SSC and BF as  pain-reduction strategies was lower: 44% and 34%, respectively. Eighty-six  percent of parents felt the video was the right length; 7 (14%) felt the video  was too long. After viewing the video, 96% of parents intended to advocate for  BF, SSC, or sucrose for pain management and 88% parents would recommend the video  to other parents. IMPLICATIONS FOR PRACTICE: The video is acceptable to parents,  is feasible to deliver to parents in an NICU, and has potential to increase  parents' intent to advocate for pain management strategies for their infants.  IMPLICATIONS FOR RESEARCH: Future studies are required to evaluate the  effectiveness of this parent-targeted intervention on increasing actual use of  pain management in clinical practice.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 293, "title": "Sin título", "authors": "Friedrichsdorf, Stefan J.", "journal": "Pain management", "year": "2017", "vol": "7(2):89-94", "doi": "10.2217/pmt-2016-0050", "abstract": "Dr Stefan Friedrichsdorf speaks to Jade Parker, Commissioning Editor: Stefan J Friedrichsdorf, MD, is medical director of the Department of Pain Medicine,  Palliative Care and Integrative Medicine at Children's Hospitals and Clinics of  Minnesota, Minneapolis/St Paul, MN, USA, home to one of the largest and most  comprehensive programs of its kind in the country. The interdisciplinary pain  team is devoted to prevent and treat acute, procedural, neuropathic,  psycho-social-spiritual, visceral, and chronic/complex pain for all inpatients  and outpatients in close collaboration with all pediatric subspecialties at  Children's Minnesota. The palliative care team also provides holistic care for  pediatric patients with life-threatening diseases and adds an extra layer of  support to the care of children with serious illness and their families.  Integrative medicine provides and teaches integrative ('non-pharmacological')  therapies, such as massage, acupuncture/acupressure, biofeedback, aromatherapy  and self-hypnosis, to provide care that promotes optimal health and supports the  highest level of functioning in all individual children's activities. Children's  Minnesota became the first children's hospital to system-wide implement a  \"Children's Comfort Promise: We promise to do everything to prevent and treat  pain,\" resulting in decrease or elimination of needle pain caused by  vaccinations, blood draws, intravenous access, and injections in more than  200,000 children annually.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 321, "title": "Sin título", "authors": "Fioreti, Fernanda Cristina Custodia de Faria; Manzo, Bruna Figueredo; Regino, Alline Esther Ferreira", "journal": "REME rev. min. enferm", "year": "2016", "vol": "20:e-974", "doi": "10.5935/1415-2762.20160044", "abstract": "A hospitalização traz transtornos que, na infância, tornam-se mais evidentes nas manifestações de insatisfação momentânea ou prejuízos, podendo permanecer mesmo após a alta hospitalar. Na Pediatria as crianças são submetidas a procedimentos dolorosos, além de depararem com situações variadas como a presença constante de pessoas estranhas ao seu convívio habitual, como profissionais de saúde de diversas áreas, outros pacientes internados e seus acompanhantes. Nesse cenário, a aplicação da ludoterapia no meio hospitalar transforma-se em um método benéfico no processo de adaptação da criança. Trata-se de pesquisa qualitativa, descritiva, que buscou analisar o uso do brincar na assistência à criança hospitalizada na perspectiva dos pais. O estudo foi realizado na Pediatria de um Hospital Municipal de Belo Horizonte-MG. Foram entrevistados 13 pais por meio de roteiro semiestruturado e realizada a análise de conteúdo, segundo Bardin, para interpretação dos dados. Os achados evidenciaram que o brincar é instrumento de grande valor para minimizar o estresse da internação e contribuir para melhor adaptação da criança ao ambiente hospitalar. Ademais, o mesmo traz benefícios referentes à promoção do bem-estar, diversão, redução da dor e socialização durante a hospitalização. Concluiu-se, dessa maneira, que a utilização do brincar pode ser muito benéfica na rotina da Pediatria, favorecendo um cuidado mais humanizado e integral, além da possibilidade de diminuir os prejuízos no desenvolvimento da criança, causados pela experiência da hospitalização.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 320, "title": "Sin título", "authors": "Emons, Miriam I.; Petzke, Frank; Stamer, Ulrike M. et al.", "journal": "Paediatric anaesthesia", "year": "2016", "vol": "26(9):883-890", "doi": "10.1111/pan.12947", "abstract": "OBJECTIVES: This study aimed to summarize the current standard practices for acute pain management in children in Germany and the implementation of these  procedures. The last survey on acute pain management in children was performed in  1999, highlighting the need for an up to date review. METHODS: A questionnaire  was mailed to German departments of anesthesiology (n = 885), asking for  structures and processes of acute pain management in children. Results were  compared between hospitals with and without an acute pain service and with and  without a pediatric department. RESULTS: Of the 407 responding hospitals  (response rate of 46%), 342 treated children younger than 14 years. These were  considered for analysis. Of the 342 hospitals, 42% contained either a general  pediatric department or a department of pediatric surgery, and the majority of  the responding hospitals had an acute pain service (83%). Pain intensities were  measured at least once per shift in 40% of the institutions, and at least once or  twice a day in 27%. Of the institutions, 31% did not document pain scores  regularly, without any difference between hospitals with or without a pediatric  department. Standard operating procedures for acute pain management existed in  68% of the hospitals, with large differences in content and length. Opioids were  administered to children in 85% of the hospitals. Nonopioid analgesics were the  first choice baseline analgesics in most hospitals. Peripheral regional and  epidural analgesia were performed in children in 18% and 8% of the hospitals,  respectively (21%/16% with a paediatric department, 16%/1% without; P < 0.001).  CONCLUSION: Current practice of pediatric pain management varied widely and the  recommendations of guidelines, like regular pain management, were frequently not  met. However, improvements could be observed since 1999, for example, an increase  in regular pain measurements (4% vs 67%). Furthermore, pain management in  hospitals running a pediatric department had a higher degree of organization, and  more sophisticated analgesic techniques.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido"}, {"id": 215, "title": "Sin título", "authors": "Robaina Castellanos, Gerardo Rogelio; Pérez Llorca, Lisset; Riesgo Rodríguez, Solangel de la Caridad", "journal": "Rev. cuba. pediatr", "year": "2019", "vol": "91(2):e701-e701", "doi": "", "abstract": "Introducción: La atención al dolor resulta prioritaria en las unidades de cuidados intensivos neonatales. No se recogen antecedentes en Cuba de implementación de algún protocolo para el abordaje del dolor en neonatos, que no se limite solamente al tratamiento farmacológico durante la asistencia respiratoria o cirugía neonatal.  Objetivo: Determinar la efectividad de un protocolo para la prevención y alivio del dolor en recién nacidos menor de  500 gramos, basado principalmente en las recomendaciones de la Sociedad Iberoamericana de Neonatología.  Métodos: Estudio basado en las recomendaciones de la Sociedad Iberoamericana de Neonatología, de tipo analítico prospectivo de ANTES y DESPUÉS en 55 neonatos menor de 1500 gramos, nacidos en el Hospital Ginecoobstétrico Docente Provincial de Matanzas en el período marzo/2016 a marzo/2018, en el cual se comparó la intensidad del dolor según la escala COMFORTneo aplicada durante la realización de tres procederes: inserción del catéter venoso umbilical, inserción de catéter percutáneo y punción del talón, en dos grupos de pacientes: un grupo antes (n=29) y un grupo después de aplicar el protocolo de dolor (n=26). Para el análisis de variables se empleó el coeficiente de Spearman. Se consideró significativo todo valor p menor de 0,05.  Resultados: El peso promedio de los neonatos estudiados fue 1 180 gramos. Luego de la implementación del protocolo se observó una disminución significativa en la intensidad del dolor durante la realización de los procederes seleccionados. Las medidas no farmacológicas fueron las más empleadas.  Conclusiones: El protocolo implementado es efectivo para lograr disminuir la intensidad del dolor en neonatos menor de 1 500 gramos(AU)", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 216, "title": "Sin título", "authors": "Rodieux, Frédérique; Piguet, Valérie; Desmeules, Jules et al.", "journal": "Clinical pharmacology and therapeutics", "year": "2019", "vol": "105(5):1130-1138", "doi": "10.1002/cpt.1358", "abstract": "Acute nociceptive pain management in children is a major public health concern. Effective and safe pain treatment is essential, but safety data cannot be simply  extrapolated from adults to children due to pharmacokinetic and pharmacodynamic  specificities. In addition, the frequent absence of child-specific data, the  difficulty to assess drug tolerability, and the infants' inability to communicate  properly and voluntarily report adverse drug reactions make children more  vulnerable to safety issues. Awareness of the possible toxicity of analgesics is  important but should not lead to suboptimal dosing and underuse of analgesia. A  better assessment and individualization of treatment should allow effective  prescribing of analgesics in more secure conditions. This article aims to review  the safety of acetaminophen, nonsteroidal anti-inflammatory drugs, and opioids in  children and the precautions that should be taken.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 225, "title": "Sin título", "authors": "Wall, S. L.; Clarke, D. L.; Allorto, N. L.", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2019", "vol": "45(7):1680-1684", "doi": "10.1016/j.burns.2019.04.012", "abstract": "BACKGROUND: The aim of this study is to compare doctors' knowledge regarding analgesia in paediatric burns patients in a setting where analgesia protocols are  provided but not reinforced to a setting where the same protocols are used but  with constant re-enforcement from burns surgeons. METHODS: We reviewed  questionnaires completed anonymously by doctors managing burns children in the  Pietermaritzburg (PMB) Hospital Complex and the referral hospitals. RESULTS: The  questionnaire was completed by 43 doctors with 53% of the participants working in  the referral hospitals. Procedural sedation was given by 98% of doctors. All PMB  doctors giving procedural sedation used ketamine compared to 39% in the referral  hospitals, which was statistically significant (×2 = 18.237; p < 0.001). Eighty  percent of PMB doctors were aware of the correct doses of ketamine and compared  to 8% of referral doctors. This was statistically significant (×2 = 21.778;  p < 0.001). When assessing the adequacy of analgesia, all of the doctors from PMB  used a scoring system or clinical impression. In the referral doctor group, 54%  used a scoring system, 38% used the child screaming as an indicator of inadequate  analgesia. CONCLUSION: We have identified a discrepancy in knowledge between  staff in an academic burn centre and those in peripheral referral hospitals. This  discrepancy translates into differences in quality of burn analgesia which  patients receive. Ongoing efforts must be directed towards changing the culture  of district institution and strengthening attempts to standardize care across the  region.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 228, "title": "Sin título", "authors": "Yaster, Myron; Reid, Ashley L.; Cohen, Mindy N. et al.", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(6):487-496", "doi": "10.1097/AJP.0000000000000709", "abstract": "Management of acute pain in children is fundamental to our practice. Its myriad benefits include reduced suffering, improved patient satisfaction, more rapid  recovery, and a reduced risk of developing postsurgical chronic pain. Although a  multimodal analgesic approach is now routinely used, informed and judicious use  of opioid receptor agonists remains crucial in this treatment paradigm, as long  as the benefits and risks are fully understood. Further, an ongoing public health  response to the current opioid crisis is required to help prevent new cases of  opioid addiction, identify opioid-addicted individuals, and ensure access to  effective opioid addiction treatment, while at the same time continuing to safely  meet the needs of patients experiencing pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 232, "title": "Sin título", "authors": "", "journal": "Journal of emergency nursing", "year": "2019", "vol": "45(4):437.e1-437.e32", "doi": "10.1016/j.jen.2019.05.015", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 240, "title": "Sin título", "authors": "Birnie, KA; Noel, M; Chambers, CT et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2018", "vol": "(10):nan", "doi": "10.1002/14651858.CD005179.pub4", "abstract": "Abstract - Background This is the second update of a Cochrane Review (Issue 4, 2006). Pain and distress from needle‐related procedures are common during childhood and can be reduced through use of psychological interventions (cognitive or behavioral strategies, or both). Our first review update (Issue 10, 2013) showed efficacy of distraction and hypnosis for needle‐related pain and distress in children and adolescents. Objectives To assess the efficacy of psychological interventions for needle‐related procedural pain and distress in children and adolescents. Search methods We searched six electronic databases for relevant trials: Cochrane Central Register of Controlled Trials (CENTRAL); MEDLINE; PsycINFO; Embase; Web of Science (ISI Web of Knowledge); and Cumulative Index to Nursing and Allied Health Literature (CINAHL). We sent requests for additio
