tiveness of ibuprofen plus paracetamol versus paracetamol alone came from two trials that provided crude subgroup data for 71 children with AOM. The small sample provided imprecise effect estimates, therefore we were unable to draw any firm conclusions (very low‐certainty evidence). Authors' conclusions Despite explicit guideline recommendations on the use of analgesics in children with AOM, the current evidence on the effectiveness of paracetamol or NSAIDs, alone or combined, in children with AOM is limited. Paracetamol and ibuprofen as monotherapies may be more effective than placebo in relieving short‐term ear pain in children with AOM. The evidence is very uncertain for the effect of ibuprofen versus paracetamol on relieving short‐term ear pain in children with AOM, as well as for the effectiveness of ibuprofen plus paracetamol versus paracetamol alone, thereby preventing any firm conclusions. Further research is needed to provide insights into the role of ibuprofen as adjunct to paracetamol, and other analgesics such as anaesthetic eardrops, for children with AOM. Plain language summary Drugs to relieve pain for children with acute middle ear infection Key messages ‐ The current evidence on the effectiveness of painkillers, alone or together, in relieving ear pain in children with acute middle ear infection (acute otitis media (AOM)) is limited. ‐ Both paracetamol (acetaminophen) and ibuprofen as standalone treatments may be more effective than placebo in relieving short‐term ear pain in children with AOM. We are uncertain if there is a difference in effect between ibuprofen and paracetamol and between ibuprofen plus paracetamol and paracetamol alone, thereby preventing any firm conclusions. ‐ Further research is needed into the role of ibuprofen as an add‐on treatment to paracetamol, as well as on other pain relievers such as analgesic eardrops, for children with AOM. What is AOM? AOM, or acute middle ear infection, is one of the most common childhood infections and is usually preceded by a viral upper respiratory tract infection. Ear pain is the key symptom and central to children's and parents' experience of the illness. What did we want to find out? We wanted to find out if painkillers are effective for relieving ear pain in children with AOM and which drugs, alone or together, provide the most effective pain relief. What did we do? We searched for studies that looked at the effectiveness of paracetamol (acetaminophen) or non‐steroidal anti‐inflammatory drugs (NSAIDs such as ibuprofen), alone or combined, compared with placebo (dummy treatment) or no treatment in relieving pain in non‐hospitalised children aged six months to 16 years with AOM. We also wanted to evaluate the effectiveness of NSAIDs as compared with paracetamol in these children. We compared and summarised the results of these studies, and rated our confidence in the evidence based on factors such as study methods and effect sizes. What did we find? Very limited information was available to assess how useful painkillers are for relieving ear pain in children with AOM. One trial compared paracetamol versus placebo (148 children) and NSAIDs versus placebo (146 children). We found that when used alone, paracetamol and ibuprofen may be more effective than placebo in relieving ear pain at 48 hours (25% of children receiving placebo had pain at 48 hours versus 10% in the paracetamol and 7% in the ibuprofen group). Four trials (411 children) compared ibuprofen versus paracetamol in children with AOM. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving short‐term ear pain in children with AOM. The evidence is very uncertain about the effects of paracetamol and ibuprofen on adverse events. The very limited number of participants prevented us from drawing any firm conclusions on the effects of ibuprofen plus paracetamol versus paracetamol alone. What are the limitations of the evidence? Due to such issues as study limitations and questions about the applicability of the evidence, we have low confidence in the evidence for all comparisons. How up‐to‐date is this evidence? The evidence in this review is current to 23 May 2023.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 266, "title": "Pain Experience in a US Children's Hospital: A Point Prevalence Survey Undertaken After the Implementation of a System-Wide Protocol to Eliminate or Decrease Pain  Caused by Needles.", "authors": "Postier, Andrea C.; Eull, Donna; Schulz, Craig et al.", "journal": "Hospital pediatrics", "year": "2018", "vol": "8(9):515-523", "doi": "10.1542/hpeds.2018-0039", "abstract": "OBJECTIVES: Pain in hospitalized children remains under-assessed and undertreated. With this study, we aim to describe results from a repeat  single-day, hospital-wide survey of children's pain and its treatment after the  initiation of a hospital-wide quality improvement initiative used to reduce or  eliminate pain caused by needle procedures. METHODS: All patients and parents  listed on the inpatient morning census, in emergency department and outpatient  surgery registration lists, were invited to participate in a brief single-day  point prevalence survey of their experience with pain and its management in the  hospital setting. Results were compared with a survey conducted 2 years earlier,  before implementation of a system-wide Children's Comfort Promise needle pain  treatment and prevention protocol. RESULTS: A total of 194 children and their  parents participated in the current survey. A higher percentage of children  reported having no pain compared with the previous survey (33% vs 24%; P = .07;  not significant) and fewer experienced severe pain (score ≥7 out of 10). Fewer  children identified pain caused by needles as the cause of the worst pain (21% vs  30%), although it remained the highest reported cause of the most painful  experience overall. The number of pain management strategies administered and  offered to children with needle pain (distraction, positioning, numbing cream,  and sucrose and/or breastfeeding for infants) increased. CONCLUSIONS: The  implementation of a mandatory Comfort Promise protocol used to minimize or  prevent pain caused by elective needle procedures was associated with a  significant reduction in overall pain prevalence and improved use of  evidence-based practices for needle pain management.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 310, "title": "Topical anaesthetics for pain control during repair of dermal laceration", "authors": "Tayeb, BO; Eidelman, A; Eidelman, CL et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2017", "vol": "(2):nan", "doi": "10.1002/14651858.CD005364.pub3", "abstract": "Abstract - Background Topical local anaesthetics provide effective analgesia for patients undergoing numerous superficial procedures, including repair of dermal lacerations. The need for cocaine in topical anaesthetic formulations has been questioned because of concern about adverse effects, thus novel preparations of cocaine‐free anaesthetics have been developed. This review was originally published in 2011 and has been updated in 2017. Objectives To assess whether benefits of non‐invasive topical anaesthetic application occur at the expense of decreased analgesic efficacy. To compare the efficacy of various single‐component or multi‐component topical anaesthetic agents for repair of dermal lacerations. To determine the clinical necessity for topical application of the ester anaesthetic, cocaine. Search methods For this updated review, we searched the following databases: Cochrane Central Register of Controlled Trials (CENTRAL; 2016, Issue 11), Cumulative Index to Nursing and Allied Health Literature (CINAHL; 2010 to December 2016), Embase (2010 to December 2016) and MEDLINE (2010 to December 2016). We did not limit this search by language or format of publication. We contacted manufacturers, international scientific societies and researchers in the field. Weemailed selected journalsand reviewed meta‐registers of ongoing trials. For the previous version of this review, we searched these databases to November 2010. Selection criteria We included randomized controlled trials (RCTs) that evaluated the efficacy and safety of topical anaesthetics for repair of dermal laceration in adult and paediatric participants. Data collection and analysis Two review authors independently assessed trial quality and extracted data. We contacted study authors for additional information when needed. We collected adverse event information from trial reports. We assessed methodological risk of bias for each included study and employed the GRADE approach to assess the overall quality of the evidence. Main results The present updated review included 25 RCTs involving 3278 participants. The small number of trials in each comparison group and the heterogeneity of outcome measures precluded quantitative analysis of data for all but one outcome: pain intensity. In two pooled studies, the mean self‐reported visual analogue scale (VAS; 0 to 100 mm) score for topical prilocaine‐phenylephrine (PP) was higher than the mean self‐reported VAS (0 to 100 mm) score for topical tetracaine‐epinephrine‐cocaine (TAC) by 5.59 points (95% confidence interval (CI) 2.16 to 13.35). Most trials that compared infiltrated and topical anaesthetics were at high risk of bias, which is likely to have affected their results. Researchers found that several cocaine‐free topical anaesthetics provided effective analgesic efficacy. However, data regarding the efficacy of each topical agent are based mostly on single comparisons in trials with unclear or high risk of bias. Mild, self‐limited erythematous skin induration occurred in one of 1042 participants who had undergone application of TAC. Investigators reported no serious complications among any of the participants treated with cocaine‐based or cocaine‐free topical anaesthetics. The overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Authors' conclusions We have found two new studies published since the last version of this review was prepared. We have added these studies to those previously included and have conducted an updated analysis, which resulted in the same review conclusions as were presented previously. Mostly descriptive analysis indicates that topical anaesthetics may offer an efficacious, non‐invasive means of providing analgesia before suturing of dermal lacerations. Use of cocaine‐based topical anaesthetics might be hard to justify, given the availability of other effective topical anaesthetics without cocaine. However, the overall quality of the evidence according to the GRADE system is low owing to limitations in design and implementation, imprecision of results and high probability of publication bias (selective reporting of data). Additional well‐designed RCTs with low risk of bias are necessary before definitive conclusions can be reached. Plain language summary Local anaesthesia (numbing medicine) that is directly applied to the skin can provide pain control for repair of skin lacerations Background : Pain control during suturing of torn skin is generally achieved by injecting medication into the skin (infiltration) to numb the area. This injection itself may cause pain, but topical anaesthetics are applied directly to the skin and are painless to administer. Cocaine was one of the first anaesthetics to be successfully applied topically. Concerns over adverse effects of cocaine, its potential misuse and the administrative burden of dispensing a controlled substance led to the development of cocaine‐free topical anaesthetics. Multiple cocaine‐free topical anaesthetics have been found to provide effective anaesthesia for repair of dermal lacerations. Study characteristics : The evidence is current to December 2016. We included in this review 25 randomized controlled trials involving 3278 participants. Studies included both adults and children. Fifteen of the included trials used self‐reporting of pain intensity by trial participants to determine the effectiveness of local anaesthetics. Key results : Study results suggest that directly applying local anaesthetics to the skin is an effective, non‐invasive way of providing pain control during suturing or stapling of skin lacerations. Study findings on the efficacy of individual topical anaesthetics were limited by study design, and data on the efficacy of each topical agent were obtained mostly from single trials. Researchers reported no serious side effects following the use of cocaine‐containing or cocaine‐free topical anaesthetics. The overall broadly comparable effectiveness of cocaine‐free topical anaesthetics for skin laceration repair brings into question the necessity to include cocaine as a component of local anaesthetic solutions. The small number of trials in each comparison group and the range of outcome measures assessed prevented pooling and quantitative analysis of data for all but the single outcome of pain intensity. Additional studies are necessary to directly compare the effectiveness of different formulations of topical anaesthetics. Our review was limited to pain control for repair of superficial lacerations, and our results might not be generalizable to deeper lacerations or more complex procedures performed on intact skin. Further research is needed to strengthen the evidence and to overcome the weakness of the included studies. Quality of the evidence : The overall quality of the evidence was low owing to limitations in study design, ways that studies were carried out (implementation), imprecision of results and high probability of selective data reporting. Most of the trials that compared infiltrated and topical anaesthetics were at high risk of bias, and this was likely to influence measured effects.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 313, "title": "[Breastfeeding for acute pain control on infants: a randomized controlled trial].", "authors": "Zurita-Cruz, Jessie Nallely; Rivas-Ruiz, Rodolfo; Gordillo-Álvarez, Virginia et al.", "journal": "Nutricion hospitalaria", "year": "2017", "vol": "34(2):301-307", "doi": "10.20960/nh.163", "abstract": "Objective: To determine the effectiveness of breastfeeding (BF) for the management in acute pain after vaccination in infants under 6 months of age when  compared to the milk substitute (MS) and not to apply any maneuver. Methods: A  controlled, single-blind phase III clinical trial was conducted on infants under  6 months old to evaluate the effectiveness of BF in acute pain by vaccination.  Divided in 3 groups: BF, milk substitutes (MS), and without applying any  analgesic maneuver (control). Pain was measured by crying time and pediatric pain  scale. Statistical analysis was performed using the Kruskal Wallis and  Mann-Whitney U for quantitative variables. For qualitative data, Chi2 was applied  Kaplan Meier was used to analyze the total time crying. Results: A total of 144  patients were recruited, divided in groups of 48 patients. The group of BF had  fewer crying time (p = 0.007) and pain rating at 90 (p = 0.006) and 120 (p =  0.003) seconds compared with other groups. There was no significant difference in  the crying time (p = 0.396) and the pain scale between the group receiving MR and  control. Conclusions: Breastfeeding is effective in management of acute pain by  vaccination in infants under six months of age compared to milk substitute and  control.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 342, "title": "Acupuncture Reduces Pain and Autonomic Distress During Injection of Local Anesthetic in Children: A Pragmatic Crossover Investigation.", "authors": "Usichenko, Taras I.; Wolters, Patrick; Anders, Eric F. et al.", "journal": "The Clinical journal of pain", "year": "2016", "vol": "32(1):82-86", "doi": "10.1097/AJP.0000000000000222", "abstract": "OBJECTIVES: Stimulation of acupoint LI4 has been shown to result in analgesic effects in patients experiencing acute pain. We aimed to study the effectiveness  of LI4 stimulation for pain relief in children receiving an injection of a local  anesthetic (LA). MATERIALS AND METHODS: Children scheduled for dental treatment  using LA received bilateral acupuncture at LI4 using indwelling fixed needles.  During the treatment, the parents of the patients stimulated the needles by  massage. Two different treatment regimes were compared: a standardized LA  injection given 5 minutes after acupuncture, and an LA injection without  acupuncture. The order of treatment was randomized, with the 2 treatments  performed in a crossover manner on different days. Pain intensity during LA  injection, assessed by the patient with the Verbal Rating Scale or Faces Pain  Scale (0 to 10), was used as the primary endpoint. Parent-assessed and  dentist-assessed pain intensity and agitation, heart rate, and the patients'  satisfaction with the therapy were also recorded. RESULTS: Data were obtained  from 49 patients (22 female; mean age 10 y). Patients reported less pain when  acupuncture was used: mean 2.3 (95% confidence interval, 1.5-3.1) versus 3.9 (95%  confidence interval, 3.0-4.7); P<0.001. The patients' heart rate remained low  throughout the dental treatment after LI4 stimulation, when compared with  treatment without acupuncture (P<0.05). LI4 stimulation was safe and increased  satisfaction levels in both the patients and their parents, when compared with LA  injection alone (P<0.05). DISCUSSION: Stimulation of acupoint LI4 reduces pain  and autonomic distress in children during LA injection in dental procedures.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 357, "title": "Family Beliefs and Interventions in Pediatric Pain Management.", "authors": "Sieberg, Christine B.; Manganella, Juliana", "journal": "Child and adolescent psychiatric clinics of North America", "year": "2015", "vol": "24(3):631-645", "doi": "10.1016/j.chc.2015.02.006", "abstract": "Whether a child has to endure a procedure that incurs acute pain or a child has chronic pain, the impact on the family, especially parents, can be profound.  Parents need to be active members of their child's health care team; however,  they are often ill equipped to cope with either acute pain stressors or  longstanding chronic pain in their children. This article provides an overview of  acute and chronic pain, the impact of parent factors on pediatric pain, parental  assessments of parent functioning, and parent-based interventions for pediatric  pain management. Case examples are used to illustrate the treatments presented.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 288, "title": "Acute Pain Management in Hospitalized Children.", "authors": "Dancel, Ria; Liles, Edmund Allen; Fiore, Darren", "journal": "Reviews on recent clinical trials", "year": "2017", "vol": "12(4):277-283", "doi": "10.2174/1574887112666170816151232", "abstract": "BACKGROUND: Acute pain in hospitalized pediatric patients is prevalent. Recent shifts in the paradigm of pediatric acute pain management focus less on reliance  on opioids, due to their adverse side effects and risk of dependence, and more on  multimodal pain management. OBJECTIVE: We sought to review the most recent  studies on acute pain management in hospitalized pediatric patients. METHOD: We  searched the Cochrane Database and PubMed for articles published in the past five  years regarding the treatment of acute pain in pediatric patients focusing on  large randomized or quasirandomized controlled trials, cohort trials, and  meta-analyses. RESULTS: We categorized results into non-pharmacological,  localized, non-opiate pharmacological, and opiate based therapies. Recent studies  show that environmental and non-pharmacological methods of pain management are  efficacious in infants. School aged children benefit from active distraction more  than passive distraction. Needleless methods of introducing lidocaine locally  alleviate the pain associated with many procedures to which hospitalized children  are exposed. The shift towards use of nonopiate pharmacology focuses on novel  means of utilizing older medications, such as intravenous parecoxib, inhaled  methoxyflurane, and sublingual ketorolac or tramadol and the avoidance of  codeine. CONCLUSION: Acute pediatric pain management has changed to emphasize  multimodal and multidisciplinary therapy. In all children, non-pharmacological  therapies should be employed routinely. Given the myriad tools available,  pediatric acute pain services have developed in order to integrate more advanced  treatments such as nerve blocks and infusions of centrally acting pain  modulators.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 358, "title": "The use of subdissociative-dose ketamine for acute pain in the emergency department.", "authors": "Sin, Billy; Ternas, Theologia; Motov, Sergey M.", "journal": "Academic emergency medicine : official journal of the Society for Academic Emergency Medicine", "year": "2015", "vol": "22(3):251-257", "doi": "10.1111/acem.12604", "abstract": "OBJECTIVES: Ketamine is a well-known anesthetic with its use trailing back to the 1960s. It has antagonistic effects at the N-methyl-d-aspartate receptor. There is  emerging literature to suggest the use of subdissociative-dose ketamine (SDDK)  for pain reduction. This evidence-based review evaluates the evidence regarding  the use of SDDK for acute pain control in the emergency department (ED). METHODS:  The MEDLINE and EMBASE databases were searched. Randomized controlled trials  (RCTs) that described or evaluated the use of SDDK for acute pain in the ED were  included. Literature was excluded if it was not published in English. Duplicate  articles, unpublished reports, abstracts, and review articles were also excluded.  Quality assessment and evaluation of literature were evaluated based on the GRADE  criteria. The primary outcome of interest in this review was the difference in  pain score from baseline to cutoff time as specified in the studies. Secondary  outcome measures were the incidence of adverse events and reduction in the amount  of adjuvant opioids consumed by patients who received SDDK. RESULTS: Four RCTs  met the inclusion criteria, which enrolled a total of 428 patients. Three adult  trials and one pediatric trial were identified. The level of evidence for the  individual trials ranged from low to moderate. A significant reduction in pain  scores was only found in two of the four trials. One trial found a significant  reduction in mean pain scores when ketamine was compared to morphine (p < 0.05).  Another trial reported a significant decrease in mean distress scores, favoring  SDDK over fentanyl (1.0 vs. 2.7, p < 0.05). One trial found a significant  reduction in the amount of morphine consumed, favoring ketamine over placebo  (0.14 mg/kg, 95% confidence interval [CI] = 0.13 to 0.16 mg/kg vs. 0.2 mg/kg, 95%  CI = 0.18 to 0.22 mg/kg; p < 0.001). An emergence phenomenon was reported in one  trial. CONCLUSIONS: Four RCTs with methodologic limitations failed to provide  convincing evidence to either support or refute the use of SDDK for acute pain  control in the ED.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 370, "title": "An Evidence-based Guideline for prehospital analgesia in trauma.", "authors": "Gausche-Hill, Marianne; Brown, Kathleen M.; Oliver, Zoë J. et al.", "journal": "Prehospital emergency care", "year": "2014", "vol": "18 Suppl 1:25-34", "doi": "10.3109/10903127.2013.844873", "abstract": "BACKGROUND: The management of acute traumatic pain is a crucial component of prehospital care and yet the assessment and administration of analgesia is highly  variable, frequently suboptimal, and often determined by consensus-based regional  protocols. OBJECTIVE: To develop an evidence-based guideline (EBG) for the  clinical management of acute traumatic pain in adults and children by advanced  life support (ALS) providers in the prehospital setting. Methods. We recruited a  multi-stakeholder panel with expertise in acute pain management, guideline  development, health informatics, and emergency medical services (EMS) outcomes  research. Representatives of the National Highway Traffic Safety Administration  (sponsoring agency) and a major children's research center (investigative team)  also contributed to the process. The panel used the Grading of Recommendations  Assessment, Development and Evaluation (GRADE) methodology to guide the process  of question formulation, evidence retrieval, appraisal/synthesis, and formulation  of recommendations. The process also adhered to the National Prehospital  Evidence-Based Guideline (EBG) model process approved by the Federal Interagency  Council for EMS and the National EMS Advisory Council. RESULTS: Four strong and  three weak recommendations emerged from the process; two of the strong  recommendations were linked to high- and moderate-quality evidence, respectively.  The panel recommended that all patients be considered candidates for analgesia,  regardless of transport interval, and that opioid medications should be  considered for patients in moderate to severe pain. The panel also recommended  that all patients should be reassessed at frequent intervals using a standardized  pain scale and that patients should be re-dosed if pain persists. The panel  suggested the use of specific age-appropriate pain scales. CONCLUSION: GRADE  methodology was used to develop an evidence-based guideline for prehospital  analgesia in trauma. The panel issued four strong recommendations regarding  patient assessment and narcotic medication dosing. Future research should define  optimal approaches for implementation of the guideline as well as the impact of  the protocol on safety and effectiveness metrics.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 376, "title": "A qualitative study of the barriers to prehospital management of acute pain in children.", "authors": "Murphy, Adrian; Barrett, Michael; Cronin, John et al.", "journal": "Emergency medicine journal : EMJ", "year": "2014", "vol": "31(6):493-498", "doi": "10.1136/emermed-2012-202166", "abstract": "INTRODUCTION: Effective pain management in the prehospital setting is gaining momentum as a potential key performance indicator by many emergency medical  service systems, but historically has been shown to be inadequate, particularly  in the paediatric population. This study aimed to identify the barriers, as  perceived by a national cohort of advanced paramedics (APs), to achieving optimal  prehospital management of acute pain in children. METHODS: A qualitative approach  was employed to capture data through two focus group interviews. Sixteen APs were  invited to participate in this study. Both focus groups were audio recorded,  transcribed and analysed using Attride-Stirling's framework for thematic network  analysis. RESULTS: The global theme 'Understanding Barriers to the Prehospital  Management of Acute Pain in Children' emerged from three organising themes as  follows: AP education and training; current clinical practice guidelines for  paediatric pain management; realities of prehospital practice. Limited exposure  to children in the prehospital setting, difficulty assessing pain intensity in  small children, and challenges in administering oral or inhaled analgesic agents  to distressed and uncooperative children were highlighted by participants. Short  transfer times to the emergency department, and a 'medical' cause of pain were  also implicated as examples of when children are less likely to receive analgesia  from practitioners. CONCLUSIONS: The pathway to improving care must include an  emphasis on improvements in practitioner education and training, offering  alternatives to assessing pain in preverbal children, exploring the intranasal  route of drug delivery in managing acute severe pain, and robustly developed  evidence-based guidelines that are practitioner friendly and patient-focused.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 377, "title": "What's new in pediatric acute pain therapy?", "authors": "Schultz-Machata, Anette-Marie; Weiss, Markus; Becke, Karin", "journal": "Current opinion in anaesthesiology", "year": "2014", "vol": "27(3):316-322", "doi": "10.1097/ACO.0000000000000074", "abstract": "PURPOSE OF REVIEW: This review highlights the current trends of efficient and safe perioperative pediatric pain therapy in the context of a multimodal pain  therapy concept. RECENT FINDINGS: A multimodal pain therapy concept should be  easy to apply and safe regarding the occurrence of side-effects. The  administration of nonopioid analgesics should be obligatory, regional anesthesia  techniques - under ultrasound guidance - should be performed whenever possible,  opioids should be given immediately and sufficiently whenever necessary, the  administration of co-analgesics like lidocaine, dexamethasone or ketamine should  be considered, and most importantly, each pain therapy should be performed  according to pain assessment and long enough until adequate pain relief. SUMMARY:  Safe and simple pediatric pain management in the perioperative period combines  not only easy to apply and safe stepwise pain therapy itself, but also adequate  pain assessment and the implementation of continuous hospital quality improvement  strategies.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 378, "title": "Acute pain management in infants and children-Part 2: Intravenous opioids, intravenous nonsteroidal anti-inflammatory drugs, and managing adverse effects.", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e169-175", "doi": "10.3928/00904481-20140619-11", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the use of intravenous opioid and  nonsteroidal anti-inflammatory agents for the treatment of moderate to severe  pain. Options to manage specific adverse effects that may occur with opioids are  presented.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 379, "title": "Acute pain management in infants and children-Part 1: Pain pathways, pain assessment, and outpatient pain management.", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e163-168", "doi": "10.3928/00904481-20140619-10", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the techniques for the assessment of  pain, including various age-specific pain scoring systems. The pharmacological  management of pain is discussed, including the use of agents that inhibit  prostaglandin formation-nonsteroidal anti-inflammatory agents and  acetaminophen-as well as the \"weak opioids\" that are commonly used when oral  administration is feasible for the treatment of mild to moderate pain.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}];
const TOTAL    = 86;

let arbDecisions  = {};
let currentFilter = 'todos';
let openCards     = new Set();
let hideResolved  = true;
let temporarilyVisible = new Set();
let saveQueue     = {};
let isSaving      = false;
let dataLoaded    = false;

// Pre-load any existing arb decisions from the articles data
ARTICLES.forEach(a => {
  if (a.arb_dec) arbDecisions[a.id] = { dec: a.arb_dec, mot: a.arb_mot||'', note: '' };
});

function setSync(state, msg) {
  document.getElementById('syncDot').className = 'sync-dot' +
    (state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('syncMsg').textContent = msg;
}

async function loadDecisions() {
  setSync('loading','Cargando...');
  try {
    const r = await fetch(SCRIPT + '?action=read&t=' + Date.now());
    const j = await r.json();
    const rows = j.data || [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const id  = parseInt(row[0]);
      if (!id || isNaN(id)) continue;
      const dec  = String(row[6]||'').trim();
      const mot  = String(row[7]||'').trim();
      const note = String(row[8]||'').trim();
      if (dec && dec !== 'ARB_Decisión') arbDecisions[id] = { dec, mot, note };
    }
    dataLoaded = true;
    setSync('ok','Sincronizado ✓');
    updateStats();
    renderList();
  } catch(e) {
    setSync('error','Error de conexión');
    dataLoaded = true;
    updateStats();
    renderList();
    setTimeout(loadDecisions, 10000);
  }
}

function queueSave(id, dec, mot, note) {
  saveQueue[id] = { id, dec, mot, note: note||'' };
  if (!isSaving) processSaveQueue();
}

async function processSaveQueue() {
  isSaving = true;
  while (Object.keys(saveQueue).length > 0) {
    const key  = Object.keys(saveQueue)[0];
    const item = saveQueue[key];
    delete saveQueue[key];
    setSync('loading','Guardando...');
    try {
      const row = item.id + 1;
      await fetch(`${SCRIPT}?action=write&row=${row}&col=7&value=${encodeURIComponent(item.dec)}`);
      await fetch(`${SCRIPT}?action=write&row=${row}&col=8&value=${encodeURIComponent(item.mot)}`);
      await fetch(`${SCRIPT}?action=write&row=${row}&col=9&value=${encodeURIComponent(item.note)}`);
      setSync('ok','Guardado ✓');
    } catch(e) {
      setSync('error','Error al guardar');
      saveQueue[key] = item;
      await new Promise(r => setTimeout(r, 3000));
    }
  }
  isSaving = false;
}

function updateStats() {
  let inc=0, exc=0;
  ARTICLES.forEach(a => {
    const d = arbDecisions[a.id];
    if (d?.dec === 'INCLUIR') inc++;
    else if (d?.dec === 'EXCLUIR') exc++;
  });
  const pend = TOTAL - inc - exc;
  const done = inc + exc;
  document.getElementById('stInc').textContent  = inc;
  document.getElementById('stExc').textContent  = exc;
  document.getElementById('stPend').textContent = pend;
  document.getElementById('progBar').style.width = Math.round(done/TOTAL*100)+'%';
  document.getElementById('progLabel').textContent = `${done} de ${TOTAL} resueltos`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderList();
}

function toggleHideResolved() {
  hideResolved = !hideResolved;
  const btn = document.getElementById('toggleHideBtn');
  btn.textContent = hideResolved ? '👁 Mostrar resueltos' : '🙈 Ocultar resueltos';
  btn.classList.toggle('active', !hideResolved);
  renderList();
}

function decClass(dec) {
  return dec ? `dec-${dec}` : 'dec-empty';
}

function renderList() {
  const container = document.getElementById('articleList');
  if (!dataLoaded) {
    container.innerHTML = '<div class="empty"><div class="spinner"></div><p>Cargando...</p></div>';
    return;
  }
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = ARTICLES.filter(a => {
    const arb = arbDecisions[a.id];
    if (hideResolved && currentFilter==='todos' && arb?.dec && !temporarilyVisible.has(a.id)) return false;
    if (currentFilter==='pendiente' && arb?.dec) return false;
    if (currentFilter==='INCLUIR'  && arb?.dec !== 'INCLUIR') return false;
    if (currentFilter==='EXCLUIR'  && arb?.dec !== 'EXCLUIR') return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.authors.toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    const msg = hideResolved && currentFilter==='todos'
      ? '<p style="font-size:16px;color:#276749;font-weight:600;margin-bottom:8px;">¡Arbitraje completado!</p><p style="font-size:13px;color:#718096;">Todos los artículos han sido resueltos.</p>'
      : '<p style="font-size:14px;color:#a0aec0;">No hay artículos con los filtros seleccionados.</p>';
    container.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  const scrollY = window.scrollY;
  container.innerHTML = filtered.map(a => {
    const arb    = arbDecisions[a.id] || {};
    const arbDec = arb.dec || '';
    const arbMot = arb.mot || '';
    const arbNote= arb.note || '';
    const cardCls= arbDec ? `resolved-${arbDec}` : '';
    const badge  = arbDec
      ? `<span class="resolved-badge ${arbDec==='INCLUIR'?'rb-inc':'rb-exc'}">${arbDec==='INCLUIR'?'✓ INCLUIR':'✗ EXCLUIR'}</span>`
      : '';
    const motivoOpts = MOTIVOS.map(m =>
      `<option value="${m}" ${arbMot===m?'selected':''}>${m||'— Motivo de exclusión —'}</option>`
    ).join('');
    const metaParts = [a.authors,`<i>${esc(a.journal)}</i>`,a.year,a.vol,a.doi?`DOI: ${esc(a.doi)}`:'']
      .filter(Boolean).join(' · ');

    return `<div class="card ${cardCls}" id="c${a.id}">
      <div class="card-head" onclick="toggleCard(${a.id})">
        <div class="card-num">#${a.id}${badge}</div>
        <div class="card-title">${esc(a.title)}</div>
        <div class="card-meta">${metaParts}</div>
      </div>
      <div class="reviewers-row">
        <div class="reviewer-cell">
          <div class="reviewer-name">Ana (R1)</div>
          <div class="reviewer-dec ${decClass(a.dec_r1)}">${a.dec_r1||'—'}</div>
          <div class="reviewer-mot">${esc(a.mot_r1)||'Sin motivo'}</div>
        </div>
        <div class="reviewer-cell">
          <div class="reviewer-name">Ángela (R2)</div>
          <div class="reviewer-dec ${decClass(a.dec_r2)}">${a.dec_r2||'—'}</div>
          <div class="reviewer-mot">${esc(a.mot_r2)||'Sin motivo'}</div>
        </div>
      </div>
      <div class="card-body" id="b${a.id}">
        ${a.abstract
          ? `<div class="abstract">${esc(a.abstract)}</div>`
          : `<div class="no-abs">⚠ Resumen no disponible — consultar fuente original</div>`}
        <div style="height:8px"></div>
      </div>
      <div class="arb-panel">
        <div class="arb-label">⚖ Decisión del árbitro</div>
        <div class="arb-buttons">
          <button class="arb-btn inc ${arbDec==='INCLUIR'?'sel':''}" onclick="arbitrate(${a.id},'INCLUIR')">✓ Incluir</button>
          <button class="arb-btn exc ${arbDec==='EXCLUIR'?'sel':''}" onclick="arbitrate(${a.id},'EXCLUIR')">✗ Excluir</button>
          ${arbDec==='EXCLUIR'?`<select class="motivo-sel" id="m${a.id}" onchange="saveMotArb(${a.id})">${motivoOpts}</select>`:''}
          <span class="saving" id="sv${a.id}">✓ Guardado</span>
        </div>
        <textarea class="arb-notes" id="n${a.id}" placeholder="Justificación del árbitro (opcional)..." onblur="saveNoteArb(${a.id})">${esc(arbNote)}</textarea>
      </div>
    </div>`;
  }).join('');

  openCards.forEach(id => {
    const b = document.getElementById('b'+id);
    if (b) b.classList.add('open');
  });
  window.scrollTo(0, scrollY);
}

function toggleCard(id) {
  const b = document.getElementById('b'+id);
  if (!b) return;
  b.classList.toggle('open');
  if (b.classList.contains('open')) openCards.add(id);
  else openCards.delete(id);
}

function arbitrate(id, dec) {
  const cur    = arbDecisions[id] || {};
  const newDec = cur.dec === dec ? '' : dec;
  const newMot = newDec === 'EXCLUIR' ? (cur.mot||'') : '';
  const note   = cur.note || '';
  if (newDec) arbDecisions[id] = { dec: newDec, mot: newMot, note };
  else delete arbDecisions[id];
  queueSave(id, newDec, newMot, note);
  updateStats();
  if (newDec === 'EXCLUIR' && hideResolved) {
    temporarilyVisible.add(id);
    renderList();
    setTimeout(() => {
      const sel = document.getElementById('m'+id);
      if (sel) { sel.focus(); sel.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    }, 60);
  } else if (newDec === 'INCLUIR' && hideResolved) {
    temporarilyVisible.add(id);
    renderList();
    setTimeout(() => {
      const sv = document.getElementById('sv'+id);
      if (sv) { sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1500); }
      setTimeout(() => { temporarilyVisible.delete(id); renderList(); }, 1200);
    }, 60);
  } else {
    temporarilyVisible.delete(id);
    renderList();
  }
}

function saveMotArb(id) {
  const mot  = document.getElementById('m'+id)?.value || '';
  const cur  = arbDecisions[id] || {};
  const note = cur.note || '';
  arbDecisions[id] = { dec: cur.dec, mot, note };
  queueSave(id, cur.dec, mot, note);
  if (mot && hideResolved) {
    temporarilyVisible.delete(id);
    setTimeout(() => renderList(), 800);
  }
}

function saveNoteArb(id) {
  const note = document.getElementById('n'+id)?.value || '';
  const cur  = arbDecisions[id] || {};
  if (!cur.dec) return;
  arbDecisions[id] = { dec: cur.dec, mot: cur.mot||'', note };
  queueSave(id, cur.dec, cur.mot||'', note);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV() {
  let csv = 'ID,Título,Decisión R1,Motivo R1,Decisión R2,Motivo R2,Decisión Árbitro,Motivo Árbitro,Justificación Árbitro\n';
  ARTICLES.forEach(a => {
    const arb = arbDecisions[a.id] || {};
    const row = [a.id,a.title,a.dec_r1,a.mot_r1,a.dec_r2,a.mot_r2,arb.dec||'',arb.mot||'',arb.note||'']
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`)
      .join(',');
    csv += row + '\n';
  });
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='decisiones_arbitro.csv'; a.click();
}

loadDecisions();
setInterval(() => { if (!isSaving) loadDecisions(); }, 90000);
</script>
</body>
</html>
