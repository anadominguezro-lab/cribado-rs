const SCRIPT   = "https://script.google.com/macros/s/AKfycbzSfOxifdZewvtbqsXbM95l0pmOxHBnHKElpGSzqUunT6QiEWTr7vyQpTuYFOmz_RmE/exec";
const MOTIVOS  = ["","E1 — Población oncológica","E2 — Neonatos en UCI neonatal",
  "E3 — Dolor crónico no procedimental","E4 — Ámbito quirúrgico/UCI",
  "E5 — Intervención no realizada por enfermería","E6 — Publicado antes de 2014",
  "E7 — Tipo de artículo no válido","E8 — Sin escala de dolor validada",
  "E9 — Texto completo no disponible","E0 — Duplicado no detectado por Zotero"];
const ARTICLES = [{"id": 3, "title": "[Translating evidence: pain treatment in newborns, infants, and toddlers during needle-related procedures : German version].", "authors": "Harrison, Denise; Bueno, Mariana", "journal": "Schmerz (Berlin, Germany)", "year": "2025", "vol": "39(2):89-98", "doi": "10.1007/s00482-024-00797-y", "abstract": "INTRODUCTION: Treatment of pain in preterm, sick, and healthy newborns and infants and toddlers (up to 2 years of age) is consistently reported to be  inadequate, and effective strategies are poorly implemented. OBJECTIVES: To  present existing evidence of effective pain treatment strategies during  needle-related procedures and to highlight initiatives focused on translating  evidence into practice. METHODS: This Clinical Update focuses on the 2022  International Association for the Study of Pain Global Year for Translating Pain  Knowledge to Practice in the specific population of newborns, infants, and  toddlers. Best evidence is reviewed, and existing knowledge translation  strategies and programs available to implement evidence into practice are  presented. RESULTS: Effective strategies for newborn and young infants during  frequently occurring needle procedures include small volumes of sweet solutions,  breastfeeding, or skin-to-skin care when feasible and culturally acceptable. In  addition, strategies such as nonnutritive sucking, positioning, swaddling, gentle  touch, facilitated tucking, and secure holding can be used. For toddlers, the  evidence is less robust, and discerning between pain and distress is challenging.  However, strategies recommended for needlerelated procedures include upright  secure comfort holding by parents/caregivers, age-appropriate distraction, and  topical anesthetics. Translation of effective pain management needs to involve  the family, who need to be supported and empowered to comfort their child during  painful procedures. Organizational, nationwide, and global initiatives aimed at  improving implementation of effective pain treatments exist. CONCLUSION: There is  evidence of effective pain management strategies for newborns, infants, and  toddlers, and a great deal of effort is being made to translate knowledge into  action.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 21, "title": "The effect of maternal voice and non-nutritional sucking on repeated procedural pain of heel prick in neonates: a quasi-experimental study.", "authors": "Chen, Yushuang; Zhou, Leshan; Tan, Yanjuan", "journal": "BMC pediatrics", "year": "2024", "vol": "24(1):256", "doi": "10.1186/s12887-024-04738-7", "abstract": "BACKGROUND: Neonates in the neonatal intensive care unit undergo frequent painful procedures. It is essential to reduce pain using safe and feasible methods.  PURPOSE: To evaluate the effects of non-nutritional sucking, mother's voice, or  non-nutritional sucking combined with mother's voice on repeated procedural pain  in hospitalized neonates. METHODS: A quasi-experimental study was conducted in  which 141 neonates were selected in a hospital in Changsha, China. Newborns were  divided into four groups: non-nutritional sucking (NNS) (n = 35), maternal voice  (MV) (n = 35), NNS + MV (n = 34), and control (n = 37) groups. The Preterm Infant  Pain Profile-Revised Scale (PIPP-R) was used to assess pain. RESULTS: During the  heel prick, the heart rate value and blood oxygen saturation were significantly  different between the groups (P < 0.05). Both non-nutritional sucking and  maternal voice significantly reduced PIPP-R pain scores of hospitalized newborns  (P < 0.05). The pain-relief effect was more robust in the combined group than in  other groups. CONCLUSIONS: This study showed that both non-nutritional sucking  and the mother's voice alleviated repeated procedural pain in neonates.  Therefore, these interventions can be used as alternatives to reduce repeated  procedural pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "EXCLUIR", "arb_mot": "E2 — Neonatos en UCI neonatal"}, {"id": 13, "title": "Implementation of the WHO standards to assess quality of care for children with acute pain in EDs: findings of a multicentre study (CHOICE) in Italy.", "authors": "Balestra, Elia; Cozzi, Giorgio; Sforzi, Idanna et al.", "journal": "BMJ paediatrics open", "year": "2024", "vol": "8(Suppl 7):nan", "doi": "10.1136/bmjpo-2024-002610", "abstract": "BACKGROUND: There is little experience on the use of the WHO Standards for improving the quality of care (QOC) for children. We describe the use of four  prioritised WHO Standard-based Quality Measures to assess the provision of care  for children with pain in emergency departments (EDs). METHODS: In a multicentre  observational study in 10 EDs with different characteristics in Italy, we  collected data on 3355 children accessing the EDs between January 2019 and  December 2020. The association between children and facility characteristics and  quality measures was analysed through multivariate analyses. RESULTS: The  proportion of children whose pain was measured was 68.7% (n=2305), with extreme  variations across different centres (from 0.0% to 99.8%, p<0.001). The proportion  of children treated for pain was 28.9% (n=970) again with a wide range  (5.3%-56.3%, p<0.001). The difference between the frequency of children with pain  measured and pain treated varied widely between the facilities (ranging from  -24.3 to 82). Children with moderate and severe pain were more frequently treated  (48.9% and 62.9% of cases, respectively), although with large variations across  centres (ranges: 0%-74.8% and 0%-100% respectively, p<0.001). After correction  for children's characteristics, the variable more strongly associated with  analysed outcomes was the facility which the child accessed for care. Being a  facility in Northern Italy was associated with a higher rate of pain measurement  (67.3%-95% CI: 39.9% to 94.6%, p<0.001) compared with facilities in South Italy  (-22.1% lower (95% CI: -41.7% to -2.50%, p=0.03). CONCLUSIONS: The use of few WHO  Standard-based measures related to pain can help identifying priority gaps in QOC  for children and in monitoring it over time. There is a need for more  implementation research to establish which are the most sustainable and effective  interventions to improve the QOC for acute pain in children.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "EXCLUIR", "arb_mot": ""}, {"id": 12, "title": "Music for pain relief of minor procedures in term neonates.", "authors": "Anbalagan, Saminathan; Velasquez, Juan H.; Staufert Gutierrez, Denisse et al.", "journal": "Pediatric research", "year": "2024", "vol": "95(3):679-683", "doi": "10.1038/s41390-023-02746-4", "abstract": "BACKGROUND: Music for neonatal pain has not been exclusively studied in term neonates in a well-designed trial compared to the standard of care. This study  aims to assess the effectiveness of music intervention as an adjuvant in  relieving acute pain in term newborns undergoing minor painful procedures.  METHODS: This randomized, controlled, blinded trial included any term neonate  undergoing heel prick. Both control and intervention groups received oral sucrose  2 min before heel prick. Intervention group was exposed to 'Bedtime Mozart'  lullaby recorded music via bedside speakers. Pain was measured using Neonatal  Infant Pain Scale (NIPS) at 1-min intervals. Investigators were blinded using  noise-canceling headphones that played random music. RESULTS: A total of 100  neonates were enrolled. Mean gestational age was 39.2 weeks, and mean duration of  the procedure was 113 s. Music group was found to have significantly lower pain  scores [OR = 0.42 (0.31, 0.56), p < 0.001]. Baseline NIPS scores were similar  across groups and there was no interaction effect between groups and time. When  NIPS were categorized as pain and no pain, there continued to be statistically  significant lower NIPS scores in the music group (p < 0.001). CONCLUSION:  Recorded music, in addition to sucrose, is efficacious in reducing pain,  encouraging its use in term neonates. IMPACT: Recorded music effectively reduces  pain induced by minor procedures in term neonates. Clinical studies have shown  that live and recorded music induces changes in vital signs and pain scores in  the NICU's predominantly preterm population. Most of these studies were also  conducted in the white ethnic population. Our study objectively proves reduction  in pain scores by using recorded music in a randomized, controlled, blinded study  of predominantly non-white, term neonates. Recorded music is effective in  reducing acute pain in term neonates and can be widely used even in low-resource  nurseries.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 23, "title": "Virtual Reality Distraction Is No Better Than Simple Distraction Techniques for Reducing Pain and Anxiety During Pediatric Orthopaedic Outpatient Procedures: A  Randomized Controlled Trial.", "authors": "Fabricant, Peter D.; Gross, Preston W.; Mackie, Alexandra T. et al.", "journal": "Clinical orthopaedics and related research", "year": "2024", "vol": "482(5):854-863", "doi": "10.1097/CORR.0000000000002889", "abstract": "BACKGROUND: In-office procedures can be painful and anxiety-provoking for pediatric patients. Minimizing such pain and anxiety in children improves the  patient experience and promotes a rewarding and productive  patient-caregiver-provider relationship, which may for some young patients be  their first memorable encounter with the healthcare system. Although virtual  reality (VR) techniques have proven to be helpful in minimizing pain and anxiety  during procedures in pediatric intensive care settings, it remains unclear how VR  affects objective and subjective measures of pain and anxiety in children  undergoing in-office orthopaedic procedures such as cast removal or percutaneous  pin removal after fracture healing. QUESTIONS/PURPOSES: Is a VR gaming simulation  more effective than either of two forms of noninteractive visual distraction (VR  goggles or tablet computer displaying a noninteractive video) for reducing (1)  objective measures of pain and anxiety and (2) subjective measures of pain and  anxiety in children undergoing in-office cast removal or percutaneous pin  removal? METHODS: This study was a randomized controlled trial with two parallel,  separately analyzed cohorts: children undergoing in-office cast removal or  in-office percutaneous pin removal at a single urban tertiary institution. We  approached eligible patients who were scheduled to undergo outpatient cast or  percutaneous pin removal and who met prespecified inclusion criteria. We enrolled  until 105 patients were available for analysis in each of the cast removal and  pin removal cohorts. Of note, the study institution was in an urban epicenter of  the coronavirus-19 pandemic, and clinical research was paused sporadically, which  resulted in a longer-than-expected enrollment period. In the cast removal cohort,  all patients were eligible for inclusion and were enrolled and randomized into  one of three groups: VR gaming simulation (n = 37), VR goggles with a  noninteractive video (n = 36), or a tablet computer with the same noninteractive  video (n = 40). Eleven percent (4), 8% (3), and 3% (1) withdrew from each of the  three intervention groups, respectively. In the pin removal cohort, all patients  were eligible for inclusion and were enrolled and randomized into the same three  groups (37, 44, and 41 patients, respectively). In the pin removal group, 14%  (5), 18% (8), and 10% (4) withdrew from each of the three intervention groups,  respectively. In all, 235 patients were enrolled in the study and 210 patients  (mean ± SD age 9 ± 3 years; 48% [100] girls) were included in the final analyses.  There were no clinically important differences in age, gender, preprocedure pain,  or anxiety among the intervention groups. Primary outcomes included  preprocedure-to-maximum heart rate increase (objective measure) and preprocedure  and postprocedure pain and anxiety using a VAS (subjective measures). One-way  ANOVA and Bonferroni-adjusted pairwise comparisons were used to calculate  between-group differences for the primary outcomes. RESULTS: There were no  intervention-level groupwise differences between VR goggles with an interactive  game, VR goggles with a noninteractive video, or the tablet computer with the  same video in preprocedure-to-maximum heart rate increase in the cast removal  cohort (18 ± 21 bpm versus 14 ± 11 bpm versus 20 ± 16 bpm, respectively; largest  mean difference -6 bpm [95% CI -16 to 3]; p = 0.36) or pin removal cohort (27 ±  20 bpm versus 23 ± 12 bpm versus 24 ± 19 bpm, respectively; largest mean  difference 4 bpm [95% CI -7 to 14]; p = 0.99). Similarly, there were no  intervention-level groupwise differences in preprocedure to postprocedure VAS  pain in the cast removal cohort (1 ± 1 versus 1 ± 2 versus 0 ± 2, respectively;  largest mean difference 0 points [95% CI 0 to 1]; p = 0.89) or pin removal cohort  (0 ± 3 versus 2 ± 3 versus 0 ± 3 points, respectively; largest mean difference 1  point [95% CI 0 to 3]; p = 0.13). Finally, there were no intervention-level  groupwise differences between the same intervention groups in preprocedure to  postprocedure VAS anxiety in the cast removal cohort (-2 ± 2 versus -1 ± 2 versus  -1 ± 2 points, respectively; largest mean difference -1 point [95% CI -2 to 1]; p  = 0.63) or pin removal cohort (-3 ± 3 versus -4 ± 4 versus -3 ± 3 points,  respectively; largest mean difference -1 point [95% CI -2 to 1]; p = 0.99).  CONCLUSION: During in-office cast and pin removal in pediatric patients, simple  distraction techniques such as tablet video viewing are as effective as  higher-fidelity VR headset video and interactive games in minimizing objective  measures of procedural pain and subjective measures of pain and anxiety. Because  of these findings and because of the associated costs, implementation logistics,  and variable tolerance by young patients, widespread use of VR distraction  techniques in the pediatric orthopaedic outpatient setting is unnecessary. LEVEL  OF EVIDENCE: Level I, therapeutic study.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 57, "title": "Estratégias utilizadas pela equipe de enfermagem para preparar a criança e a família na realização de procedimentos dolorosos", "authors": "Costa, Cibelle Tiphane de Sousa", "journal": "", "year": "2023", "vol": ":86 p-86 p", "doi": "", "abstract": "Introdução: A percepção da equipe de enfermagem é fundamental para avaliar e tratar a dor da criança hospitalizada. Por meio da observação e comunicação com a criança e sua família, os profissionais de enfermagem podem identificar a intensidade da dor e adequação do tratamento de acordo com as necessidades individuais de cada paciente. Uma abordagem empática e sensível é essencial para garantir o bem-estar da criança durante sua hospitalização. Objetivo: Compreender quais estratégias de intervenção a equipe de enfermagem (enfermeiros, técnicos e auxiliares) utiliza para preparar a criança e a família para a realização de procedimentos dolorosos durante a internação. Metodologia: Estudo exploratório descritivo com abordagem qualitativa realizada na unidade de internação pediátrica do Hospital Universitário da Universidade de São Paulo. A coleta de dados foi realizada através da observação não-participante e entrevistas semiestruturadas aos profissionais de enfermagem do setor. A análise dos dados foi apoiada no referencial metodológico Análise Temática e na abordagem teórica o Cuidado Centrado na Família. Resultados: Os dados foram organizados em dois temas e cinco subtemas. 1. Perspectiva teórica: A família como agente de cuidado nos procedimentos dolorosos; 2. Perspectiva prática: Vivências, desafios e estratégias de inserção da família nos procedimentos dolorosos. O tema 1 detectou as falas que consideravam a família como agente de cuidados, destacavam como ela era parte integrante do cuidado em saúde e sua influência no bem-estar da criança. Isso possibilitava ao profissional utilizar os preceitos do CCF, com abordagem mais humana e promovendo melhoria da qualidade doa atendimento. Para o tema 2 apoiou-se nas falas que se referem às vivências, desafios e estratégias de inserção da família em procedimentos dolorosos, sendo crucial para a implementação efetiva desse modelo de cuidado. Buscou-se entender as dificuldades que podem surgir durante o processo e quais estratégias foram desenvolvidas para superá-las, pois é uma oportunidade para promover a segurança e o bem-estar do paciente, além de fortalecer o vínculo entre a equipe de saúde, a criança e a família. Destaca-se também quais estratégias farmacológicas e não farmacológicas utilizavam para minimizar a dor da criança. Conclusão: Foi verificado que, mesmo em uma instituição que adota os princípios de inclusão familiar em todo o processo de cuidado, é necessário o treinamento contínuo da equipe para que possa evitar a execução automatizada de tarefas, a fim de manter na equipe de enfermagem a postura educacional com a família e, consequentemente, fornecer alívio à criança em procedimentos dolorosos, minimizando os riscos de traumas que o procedimento na internação possa trazer.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 38, "title": "Evaluation of pain-alleviating strategies during allergy shots (subcutaneous immunotherapy): a randomized controlled pilot study.", "authors": "Pfieffer, J.; Wehmeier, K.; Gee, K. et al.", "journal": "European annals of allergy and clinical immunology", "year": "2024", "vol": "56(3):128-136", "doi": "10.23822/EurAnnACI.1764-1489.312", "abstract": "Background. Subcutaneous immunotherapy (SCIT) is a potential disease-modifying therapy effective for treatment of various allergic disorders. Pain and fear are  common concerns of children, which can pose stress and result in negative  experiences. The purpose of this study was to evaluate and compare the  effectiveness of three marketed distraction devices and ethyl chloride spray (a  routinely used topical anesthetic agent for painful procedures), the current  clinical standard of care in reducing the perception of needle pain during SCIT  administration in children. Methods. 40 children, aged 4-17 years, receiving SCIT  with use of one of three alternative pain therapies or with standard practice  were enrolled. Participants were randomly assigned to one of the pain-modifying  interventions. The three interventional groups were ShotBlocker(®) (Bionix,  Toledo, OH, USA), Buzzy(®) I (Pain Care Labs, Atlanta, GA, USA) (vibration only),  and Buzzy(®) II (vibration with ice). Control group was ethyl chloride spray. The  study consisted of two visits during SCIT administration process. Results. Of  these 40 children, 12 received the ShotBlocker, 8 received the Buzzy I, 11  received the Buzzy II, and 9 received ethyl chloride spray (control group).  Conclusions. There were no significant differences found between each of the  distraction devices and between the control group. Type II error/false negative  finding cannot be ruled out because of a small sample. Therefore, we cannot  conclude that no true difference exists between each distraction device and the  control group simply because of occurrence of a non-significant P-value in our  study.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 31, "title": "Comparing novel virtual reality and nursing standard care on burn wound care pain in adolescents: A randomized controlled trial.", "authors": "Jeffs, Debra A.; Spray, Beverly J.; Baxley, Lauren et al.", "journal": "Journal for specialists in pediatric nursing : JSPN", "year": "2024", "vol": "29(1):e12419", "doi": "10.1111/jspn.12419", "abstract": "PURPOSE: This study compared the effectiveness of age-appropriate, high technology, interactive virtual reality (VR) distraction with standard care (SC)  provided by the nurse on adolescents' acute procedural pain intensity perception  during burn wound care treatment in the ambulatory clinic setting. DESIGN: This  randomized controlled trial included 43 adolescents ages 10-21 from the  ambulatory burn clinic of a large children's hospital. METHODS: Blinded study  participants were randomly assigned to either VR or SC (non-significantly  different, current mean burn surface area, 1.3 and 1.7, respectively) during the  first burn wound care procedure in the burn clinic. Blinded research staff  collected pre-procedure data including Spielberger's State-Trait Anxiety  Inventory and postprocedure wound care pain intensity using the Adolescent  Pediatric Pain Tool. A total of 41 participants completed all study procedures.  RESULTS: No statistically significant difference in burn wound care procedural  pain was noted between the VR and SC groups after adjusting for several factors.  Pre-procedure state and trait anxiety correlated with reported pre-procedure  pain. Wound care pain was found to be significantly associated with pre-wound  care pain score, time from original burn to clinic burn care treatment, and  length of wound care treatment. These factors accounted for approximately 45% of  the variation in pain scores during wound care treatment. PRACTICE IMPLICATIONS:  VR distraction can be a useful pain management strategy but may not take the  place of the unique nurse-patient relationship that occurs during clinical  encounters. Tailoring pain management during burn wound care requires  consideration of anxiety, time from the burn injury to the wound care procedure,  length of time of the wound care procedure, and pretreatment pain level. Knowing  patients' needs, desires, and temperaments along with the specifics about the  healthcare procedures are critical to formulating individualized care plans that  may or may not include VR. Newer technology, such as easier-to-use, less  expensive VR, may assist with translation into practice making its clinical use  more routine.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 50, "title": "Parental involvement in mitigating procedural pain for infants using non-pharmacological approaches.", "authors": "Çamur, Zühal", "journal": "Evidence-based nursing", "year": "2024", "vol": "27(4):143", "doi": "10.1136/ebnurs-2023-103757", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "EXCLUIR", "arb_mot": ""}, {"id": 84, "title": "Effects of Kangaroo Mother Care on Repeated Procedural Pain and Cerebral Oxygenation in Preterm Infants.", "authors": "Wang, Yu; Zhang, Linping; Dong, Wenbin et al.", "journal": "American journal of perinatology", "year": "2023", "vol": "40(8):867-873", "doi": "10.1055/s-0041-1731650", "abstract": "OBJECTIVE: The study aimed to investigate the effects of kangaroo mother care (KMC) on repeated procedural pain and cerebral oxygenation in preterm infants.  STUDY DESIGN: Preterm infants of 31 to 33 weeks of gestational age were randomly  divided into an intervention group (n = 36) and a control group (n = 37).  Premature infant pain profile (PIPP) scores, heart rate, oxygen saturation,  regional cerebral tissue oxygenation saturation (rcSO(2)), and cerebral  fractional tissue oxygen extraction (cFTOE) were evaluated during repeated heel  stick procedures. Each heel stick procedure included three phases: baseline,  blood collection, and recovery. KMC was given to the intervention group  30 minutes before baseline until the end of the recovery phase. RESULTS: Compared  with the control group, the intervention group showed lower PIPP scores and heart  rates, higher oxygen saturation, and rcSO(2) from the blood collection to  recovery phases during repeated heel sticks. Moreover, there were significant  changes in cFTOE for the control group, but not the intervention group associated  with repeated heel stick procedures. CONCLUSION: The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants, and it is  conducive to stabilizing cerebral oxygenation, which may protect the development  of brain function. KEY POINTS: · KMC stabilizes cerebral oxygenation during  repeated heel sticks in preterm infants.. · The analgesic effect of KMC is  sustained over repeated painful procedures in preterm infants.. · KMC may protect  the development of brain function..", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 125, "title": "Effect of an Immersive Virtual Reality Intervention on Pain and Anxiety Associated With Peripheral Intravenous Catheter Placement in the Pediatric  Setting: A Randomized Clinical Trial.", "authors": "Gold, Jeffrey I.; SooHoo, Michelle; Laikin, Andrea M. et al.", "journal": "JAMA network open", "year": "2021", "vol": "4(8):e2122569", "doi": "10.1001/jamanetworkopen.2021.22569", "abstract": "IMPORTANCE: The inclusion of digital therapeutics (eg, virtual reality [VR] systems) for the management of pain and anxiety associated with routine acutely  painful medical procedures may have a substantial impact on treatment adherence  and improve long-term health outcomes among young patients. OBJECTIVE: To  determine whether a VR intervention decreases pain and anxiety among patients  undergoing peripheral intravenous catheter (PIVC) placement compared with  standard care in the pediatric setting. DESIGN, SETTING, AND PARTICIPANTS: This  randomized clinical trial was conducted from April 12, 2017, to July 24, 2019,  among 107 patients aged 10 to 21 years who were undergoing PIVC placement in 2  clinical settings (a radiology department and an infusion center) at an urban  pediatric academic medical center in the US. Patients, caregivers, and clinicians  completed pre-PIVC and post-PIVC placement questionnaires measuring patient pain,  anxiety, and anxiety sensitivity; only participants with complete data from  before and after PIVC placment were included in the analyses. INTERVENTIONS:  Patients were randomized to receive standard care (simple distraction techniques  [eg, music, coloring, singing, and talking] and the application of numbing cream)  or a VR intervention using a balanced computer-generated randomization scheme  stratified by sex. All patients who received the VR intervention were offered  concurrent standard care; however, VR plus standard care was not specifically  examined. MAIN OUTCOMES AND MEASURES: Primary outcomes were patient pain  (measured by the Faces Pain Scale-Revised) and anxiety (measured by a visual  analogue scale) reported by the patient, caregiver, and clinician after PIVC  placement. Outcomes were analyzed using generalized linear modeling with backward  stepwise selection for final model building. RESULTS: A total of 107 patients  (median age, 14.7 years [interquartile range, 12.8-16.9 years]; 63 male  participants [58.9%]) completed the clinical trial; 54 patients received standard  care, and 53 patients also received the VR intervention. Patients who received  the VR intervention compared with standard care had significantly lower mean  post-PIVC anxiety scores when patient-reported (1.85 points [95% CI, 1.28-2.41  points] vs 3.14 points [95% CI, 2.59-3.68 points]; P < .001) and  clinician-reported (2.04 points [95% CI, 1.37-2.71 points] vs 3.34 points [95%  CI, 2.69-3.99 points]; P = .002). Patients in the VR group vs the standard care  group also had significantly lower mean post-PIVC pain scores when  patient-reported (1.34 points [95% CI, 0.63-2.05 points] vs 2.54 points [95% CI,  1.78-3.30 points]; P = .002), caregiver-reported (1.87 points [95% CI, 0.99-2.76  points] vs 3.01 points [95% CI. 1.98-4.03 points]; P = .04), and  clinician-reported (2.05 points [95% CI, 1.47-2.63 points] vs 3.59 points [95%  CI, 2.97-4.22 points]; P < .001). Aside from lower levels of baseline pain and  anxiety, no demographic variables among patients in the VR group were associated  with lower levels of post-PIVC pain and anxiety. CONCLUSIONS AND RELEVANCE: In  this randomized clinical trial, patients undergoing PIVC placement who received a  VR intervention experienced significantly less anxiety and pain compared with  those who received standard care. The use of patient, caregiver, and clinician  data provided a variety of subjective information, as well as observable and  objective data regarding perceived pain and anxiety beyond patient reporting  alone. TRIAL REGISTRATION: ClinicalTrials.gov Identifier: CHLA-15-00549.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 112, "title": "Recent Applications of Virtual Reality for the Management of Pain in Burn and Pediatric Patients.", "authors": "Ang, Samuel P.; Montuori, Michael; Trimba, Yuriy et al.", "journal": "Current pain and headache reports", "year": "2021", "vol": "25(1):4", "doi": "10.1007/s11916-020-00917-0", "abstract": "PURPOSE OF REVIEW: Virtual reality, via integration of immersive visual and auditory modalities, offers an innovative approach to pain management. The  purpose of this review is to investigate the clinical application of virutal  reality as an adjunct analgesic to standard of care, particularly in pediatric  and burn patients. RECENT FINDINGS: Although relatively new, virtual reality has  been successfully implemented in a wide range of clinical scenarios for  educational, diagnostic, and therapeutic purposes. Most recent literature  supports the use of this adjunct analgesic in reducing pain intensity for  pediatric and burn patients undergoing acute, painful procedures. This summative  review demonstrates the efficacy of virtual reality in altering pain perception  by decreasing pain and increasing functionality among pediatric and burn  patients. However, large, multi-center randomized controlled trials are still  warranted to generalize these findings to more diverse patient demographics and  medical scenarios.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 83, "title": "Parental Participation in Their Infants' Procedural Pain Alleviation with Nonpharmacologic Methods in Estonia.", "authors": "Treiman-Kiveste, Airin; Kangasniemi, Mari; Kalda, Ruth et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2023", "vol": "24(6):641-649", "doi": "10.1016/j.pmn.2023.02.008", "abstract": "BACKGROUND: Aim: To describe parent's participation in their infants' procedural pain alleviation using nonpharmacologic methods in neonatal and neonatal  intensive care units. METHOD: A descriptive cross-sectional survey study was  carried out in four Estonian hospitals between 2019 and 2020. Data were collected  by using a validated questionnaire comprised of three sections: (1) background  information of parents and infants; (2) nonpharmacologic methods used by parents;  and (3) parental guidance by nurses on the methods. Altogether 280 questionnaires  were distributed to parents and 232 of them were received back. Finally, 189 of  them were included in the study (response rate 67.5%). The data were analyzed  using descriptive and analytical statistics. Analysis of open-ended questions  followed principles of inductive content analysis. RESULTS: Most participants  reported using nonpharmacologic methods, such as holding and placing the infant  in a more comfortable position, nearly always/always (61%, 62%, respectively).  However, rarely used methods included skin-to-skin contact (7%), breastfeeding  the infant (7%), and listening to recorded music (3%). While studying a  correlation between the parents' use of nonpharmacologic methods and their  guidance, we found a correlation among all nonpharmacologic methods. However,  almost half (48%) of the parents reported that the nurses advised them  \"sometimes\" or \"nearly always/ always\" to go elsewhere during painful procedures  rather than participating in alleviation of the infant´s pain. CONCLUSIONS: The  parents reported using mostly the nonpharmacologic methods that were easy to  implement and did not require thorough instructions in preparation. In addition,  it seemed that parents wanted to be more involved in their infant's pain  alleviation, but they were advised not to take part in painful procedures and  pain alleviation for various reasons. Therefore, more attention should be paid to  the principles of family-centered care. As health care providers, we should  welcome all families as team members to involve in their infants' pain  alleviation in the neonatal and neonatal intensive care units.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 62, "title": "Virtual reality and noise canceling headphone distraction during pediatric dermatologic procedures.", "authors": "Jaquez, Sasha D.; Haller, Courtney N.; England, Maryann E. et al.", "journal": "Pediatric dermatology", "year": "2023", "vol": "40(6):1161-1163", "doi": "10.1111/pde.15401", "abstract": "Pain and anxiety related to medical procedures have long been recognized as a significant healthcare concern. If a patient's procedural pain and anxiety are  not addressed, long-term physical and psychological sequelae including increased  perceived pain, anxiety, disruptive behavior, trauma reactions, or refusal of  future procedures can occur. The objective of our study was to assess the utility  of a virtual reality (VR) headset or noise-canceling headphones (HP) compared to  treatment as usual (TAU) in reducing pain and anxiety during pediatric  dermatology procedures. Results indicated a significant difference between pre-  versus post-procedure anxiety in the VR and HP groups but not the TAU group  suggesting non-pharmacologic technology-based interventions such as VR and  headphones may reduce patients' anxiety during pediatric dermatology procedures.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 81, "title": "From theory to practice: the inclusion of hospitalized children's families in painful procedures", "authors": "Souza, Danton Matheus de; Fernandes, Rafaela de Fátima; Costa, Cibelle Tiphane de Sousa et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2023", "vol": "57:e20230152-e20230152", "doi": "10.1590/1980-220x-reeusp-2023-0152en", "abstract": "ABSTRACT  Objective: To understand nursing team professionals' strategies to include the family in painful procedures performed on hospitalized children.  Method: An exploratory-descriptive, qualitative study, carried out with nursing professionals. Data were collected through semi-structured interviews, guided by a script of topics, transcribed and submitted to thematic content analysis, in the light of Symbolic Interactionism, discussed considering the Family-Centered Care philosophy assumptions.  Results: Two central categories emerged, \"Theoretical perspective: the family as a care agent in painful procedures\" and \"Practical perspective: experiences, challenges and strategies in painful procedures for family inclusion\", with their respective subcategories.  Conclusion: Nursing professionals have theoretical knowledge about family inclusion in painful procedures based on the assumptions: Family-Centered Care: dignity and respect; information sharing; joint participation; and family collaboration. However, knowledge is not applied in clinical practice; consequence of the interaction between beliefs and attitudes unfavorable to family presence.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 257, "title": "Satisfação e insatisfação da criança acerca do manejo da dor em um Pronto-Socorro Infantil [Satisfacción e insatisfacción del niño acerca del manejo del dolor en Urgencias Infantiles]", "authors": "Lima, Débora Astolfo de; Rossato, Lisabelle Mariano; Guedes, Danila Maria Batista et al.", "journal": "Rev Esc Enferm USP", "year": "2018", "vol": "52:1-7", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E0 — Duplicado no detectado por Zotero", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 190, "title": "The Pediatric Procedural Holistic Comfort Assessment: A Feasibility Study.", "authors": "Bice, April A.; Pond, Richard S.; Lutz, Barbara J.", "journal": "Journal of pediatric health care : official publication of National Association of Pediatric Nurse Associates & Practitioners", "year": "2019", "vol": "33(5):509-519", "doi": "10.1016/j.pedhc.2019.01.006", "abstract": "INTRODUCTION: Holistic comfort is an essential component of pediatric procedural care. However, a main gap in the literature is the ability to measure this. In  this study, researchers report the feasibility of implementing a newly developed  psychosocial measurement instrument in clinical practice. METHOD: This mixed  methods study was guided by Kolcaba's holistic comfort theory. Descriptive and  inferential statistics and a qualitative descriptive approach to cognitive  interviewing were used. Children aged 4 to 8 years (n = 16) experiencing a  nonurgent needle procedure and registered nurses (n = 14) who administered the  instrument were recruited. RESULTS: Eight qualitative themes of feasibility and  comprehensibility were identified. Perspectives of children and nurses were not  significantly associated with any demographic variable. The Pediatric Procedural  Holistic Comfort Assessment is a feasible instrument to implement but will  benefit from minor revisions. DISCUSSION: This study has implications for nursing  practice, research methodology, and future research. The Pediatric Procedural  Holistic Comfort Assessment can be successfully implemented by nurses in health  care settings.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 191, "title": "[Clinical effect of maternal voice stimulation in alleviating procedural pain in hospitalized neonates].", "authors": "Chen, Yu-Shuang; Tan, Yan-Juan; Zhou, Le-Shan", "journal": "Zhongguo dang dai er ke za zhi = Chinese journal of contemporary pediatrics", "year": "2019", "vol": "21(1):58-63", "doi": "10.7499/j.issn.1008-8830.2019.01.011", "abstract": "OBJECTIVE: To study the clinical effect of maternal voice stimulation in alleviating procedural pain in neonates during heel blood collection. METHODS: A  total of 72 neonates who were admitted to the neonate intensive care unit were  randomly divided into an intervention group (n=35) and a control group (n=37).  Heel blood collection was performed by the routine method in the control group.  The intervention group listened to their mothers' voice from 1 minute before heel  blood collection to the end of the procedure. Pain score, incidence of crying,  and vital signs were recorded before and after heel blood collection. RESULTS:  Compared with the control group, the heart rate was significantly reduced, the  blood oxygen saturation significantly increased, the incidence of crying and the  pain score were significantly reduced in the intervention group during the  procedure of heel blood collection (P<0.05). CONCLUSIONS: Maternal voice  stimulation helps to reduce procedural pain and maintain stable vital signs in  neonates.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 187, "title": "Confort infantil. El Dolor Infantil, una realidad desconocida", "authors": "", "journal": "Enfermeria Integral", "year": "2020", "vol": "124:77-80", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 186, "title": "Comparing the Analgesic Effects of Four Nonpharmacologic Interventions on Term Newborns Undergoing Heel Lance: A Randomized Controlled Trial.", "authors": "", "journal": "The Journal of perinatal & neonatal nursing", "year": "2020", "vol": "34(4):E22", "doi": "10.1097/JPN.0000000000000532", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 167, "title": "Improving the Utilisation of Nitrous Oxide in Paediatric Patients to Manage Procedural Pain and Procedural Anxiety.", "authors": "Kornman, Kelly; Wilson, Valerie; Tinsley, Patricia et al.", "journal": "Comprehensive child and adolescent nursing", "year": "2020", "vol": "43(1):22-34", "doi": "10.1080/24694193.2018.1528309", "abstract": "The aim in this study was to understand current practice and use of nitrous oxide for management of procedural-related pain and procedural anxiety, to identify  perceived barriers to use of nitrous oxide and to develop an understanding of  patients, families, and nurse awareness and knowledge of the use of nitrous oxide  in an Australian tertiary pediatric oncology/hematology short stay unit. Three  online questionnaires (patients, parents, and nursing staff) were developed and  completed between September and November 2015. Most children and young people  (61%) report receiving nitrous oxide for at least one procedure. Patients,  parents, and nurses rated nitrous oxide as highly effective and would like more  access to nitrous oxide for the child's pain management. Several barriers to use  were reported. These findings suggest that nitrous oxide is effective for pain  management; however, its use is inconsistent. Findings can potentially develop  standardized processes and improve nurse education and accreditation, which may  increase the safety, efficacy, and utilization of nitrous oxide for children's  procedural pain management.", "dec_r1": "EXCLUIR", "mot_r1": "E1 — Población oncológica", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 159, "title": "Autonomic Cardiac Reactivity to Painful Procedures Under Hypnosis in Pediatric Emergencies: A Feasibility Study.", "authors": "Excoffier, Julie; Pichot, Vincent; Cantais, Aymeric et al.", "journal": "The American journal of clinical hypnosis", "year": "2020", "vol": "62(3):267-281", "doi": "10.1080/00029157.2018.1564013", "abstract": "Pain sensation is characterized by abrupt changes in central nervous system activity producing autonomic reactivity. While clinical hypnosis has demonstrated  its benefits for children in pain management, it is not clear whether hypnosis  modulated autonomic pain response in children in clinical conditions. Here, we  studied autonomic responses under hypnosis to sutures in pediatric emergencies.  For that, 42 children (mean age: 6.5 years, range 1.5 to 13) were divided into  two groups consecutively (hypnosis and control groups), according to their  choice. Time-frequency analysis was applied on RR intervals (heart rate interbeat  intervals, or RRI) to estimate parasympathetic reactivity based on high frequency  power (HF) and the Analgesia Nociception Index (ANI®) and on sympathetic  reactivity (low frequency power [LF]) and LF/HF ratio). We observed that RRI and  LF/HF ratio varied according to suture and hypnosis (p < 0.05): RRI was higher  and LF/HF ratio was lower during sutures in the hypnosis group in comparison to  the control group whereas HF and ANI® increased only during hypnosis. To  conclude, hypnosis in pediatric emergencies reduces sympathetic cardiac pain  reactivity and could be a marker of pain relief under hypnosis, while  parasympathetic activity seems to be a better marker of hypnosis.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 180, "title": "Management tools in nursing care for children with pressure injury.", "authors": "Rodrigues, Carla Braga Oliveira; Prado, Thiago Nascimento do; Nascimento, Luciana de Cássia Nunes et al.", "journal": "Rev Bras Enferm", "year": "2020", "vol": "73 Suppl 4:e20180999-e20180999", "doi": "10.1590/0034-7167-2018-0999", "abstract": "OBJECTIVES: to develop and validate management tools for the systematization of nursing care for children with pressure injuries. METHODS: methodological study in which the focus group technique was used for validation of tools in three different groups of 17 nurses. Conducted in April and May 2018 at a large pediatric hospital. RESULTS: two management tools were developed. The first was the Nursing care systematization instrument for children with pressure injury with three parts: a) risk factors; b) Psychobiological Basic Human Needs; c) signs of wound infection. The second was the Flowchart of pressure injury risk and prevention in pediatric patients with three categories: a) risk factors; b) Braden Q scale; c) nursing care. Final Considerations: the tools will support nurses in the care of children with pressure injuries by aiming at an individualized and systematized assessment based on a theoretical framework.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 177, "title": "Study protocol: parents as pain management in Swedish neonatal care - SWEpap, a multi-center randomized controlled trial.", "authors": "Olsson, Emma; Carlsen Misic, Martina; Dovland Andersen, Randi et al.", "journal": "BMC pediatrics", "year": "2020", "vol": "20(1):474", "doi": "10.1186/s12887-020-02356-7", "abstract": "BACKGROUND: During the first period of life, critically ill as well as healthy newborn infants experience recurrent painful procedures. Parents are a valuable  but often overlooked resource in procedural pain management in newborns.  Interventions to improve parents' knowledge and involvement in infants' pain  management are essential to implement in the care of the newborn infant. Neonatal  pain research has studied a range of non-pharmacological pain alleviating  strategies during painful procedures, yet, regarding combined multisensorial  parent-driven non-pharmacological pain management, research is still lacking.  METHODS/DESIGN: A multi-center randomized controlled trial (RCT) with three  parallel groups with the allocation ratio 1:1:1 is planned. The RCT \"Parents as  pain management in Swedish neonatal care - SWEpap\", will investigate the efficacy  of combined pain management with skin-to-skin contact, breastfeeding and live  parental lullaby singing compared with standard pain care initiated by health  care professionals, during routine metabolic screening of newborn infants  (PKU-test). DISCUSSION: Parental involvement in neonatal pain management enables  a range of comforting parental interventions such as skin-to-skin contact,  breastfeeding, rocking and soothing vocalizations. To date, few studies have been  published examining the efficacy of combined multisensorial parent-driven  interventions. So far, research shows that the use of combined parent-driven pain  management such as skin-to-skin contact and breastfeeding, is more effective in  reducing behavioral responses to pain in infants, than using the pain-relieving  interventions alone. Combined parental soothing behaviors that provide rhythmic  (holding/rocking/vocalizing) or orogustatory/orotactile (feeding/pacifying)  stimulation that keep the parent close to the infant, are more effective in a  painful context. In the SWEpap study we also include parental live lullaby  singing, which is an unexplored but promising biopsychosocial, multimodal and  multisensory pain alleviating adjuvant, especially in combination with  skin-to-skin contact and breastfeeding. TRIAL REGISTRATION: ClinicalTrials.gov (  NCT04341194 ) 10 April 2020.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E2 — Neonatos en UCI neonatal", "arb_dec": "", "arb_mot": ""}, {"id": 153, "title": "Pre-attendance analgesia advice for small acute paediatric burns in the British Isles: A National Survey.", "authors": "Chu, Howard; Sen, Sankhya", "journal": "Burns : journal of the International Society for Burn Injuries", "year": "2020", "vol": "46(6):1318-1319", "doi": "10.1016/j.burns.2020.02.006", "abstract": "The development of acute outpatient clinics has enabled burns services to assess the majority of smaller paediatric burns the day after injury. This event can be  distressing and it is therefore important to ensure that children are initially  assessed in an optimal environment. The aim of this study is to understand how  small acute paediatric burns are managed across the British Isles. All paediatric  burns services within the British Isles were contacted by telephone and  information gained on how each unit manages new referrals of small acute  paediatric burns in an outpatient setting. This national survey has shown that 5%  total body surface area (TBSA) is generally considered to be the upper limit for  new paediatric referrals to be seen in the outpatient setting 5%. Furthermore, we  advocate that Paracetamol and Ibuprofen be given 60 min prior to an allocated  appointment time.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 154, "title": "Treinamento online sobre avaliação da dor neonatal para enfermeiros de um hospital de ensino:  avaliação de aprendizagem, reação e impacto no trabalho", "authors": "Costa, Taine", "journal": "", "year": "2020", "vol": ":173-173", "doi": "", "abstract": "Introdução: A dor repetida e não tratada no período neonatal pode ocasionar efeitos deletérios no crescimento e desenvolvimento infantil. Assim, o uso de estratégias de avaliação e controle da dor são fundamentais. Especificamente com relação a avaliação da dor, o treinamento online pode ser contribuir para a capacitação técnica e atualização dos profissionais de saúde. Objetivo: Avaliar o Programa de Avaliação da Dor Neonatal (PAD-Neo) aplicado a enfermeiros envolvidos na assistência neonatal de um hospital de ensino. Método: Trata-se de estudo quantitativo, longitudinal, quase-experimental realizado com 30 enfermeiros e respectivas chefias nas unidades de Alojamento Conjunto, Terapia Intensiva Neonatal e Pediátrica e Cuidados Intermediários do Hospital Universitário da Universidade de São Paulo. Os dados foram coletados entre abril e outubro de 2018. Antes do treinamento, os enfermeiros responderam questionários sobre perfil e motivação para aprender, além de pré-teste. O treinamento online foi oferecido ao longo de nove semanas e ao seu término, os enfermeiros responderam ao pós-teste e aos questionários de avaliação de reação e motivação para transferir. Após 45 dias do término do treinamento, os enfermeiros e suas chefias responderam a questionários de impacto em profundidade e amplitude, assim como suporte para transferência de treinamento. Todos os questionários foram respondidos eletronicamente. Os dados foram analisados no programa R versão 3.6.2. Foi realizada análise estatística descritiva, assim como modelo de análise de variância, Kruskal-Wallis, teste de correlação de Pearson, correlação de Kendall, correlação intraclasse e modelo de efeitos mistos. Foi adotado nível de significância de 5%. Resultados: A maioria dos enfermeiros eram do gênero feminino (93,33%), com idade média de 42,8 anos e tempo médio de formação de 18,6 anos. A média de motivação em transferir (4,09, DP=0,53) foi maior que a média da motivação em aprender (3,44, DP=0,33), independente da unidade de trabalho. Houve aumento significativo no conhecimento dos enfermeiros de todas as unidades, comparando-se as médias de pré e pós-teste (p<0.0001), independente da unidade de trabalho (p=0,9368). A reação dos enfermeiros em relação à tutoria, ambiente virtual, avaliação do aluno, conteúdo e atividades e comunicação visual foi positiva. O treinamento influenciou diretamente (impacto em profundidade) a prática assistencial dos enfermeiros, tanto na autoavaliação quanto heteroavaliação (média=4,28 e média=3,93, respectivamente). Contudo, o treinamento não apresentou efeitos indiretos (impacto em amplitude) na prática, na avaliação dos enfermeiros (média=2,37) e chefias (média=2,97). O suporte à transferência de treinamento demonstrou que às vezes (média=2,82 DP=0,48) o enfermeiro é encorajado a usar o que aprendeu no ambiente do trabalho, tanto pela chefia quanto por colegas. Conclusões: Avaliar o impacto da oferta de treinamentos na prática profissional é necessário. No presente estudo, o PAD-Neo contribuiu para o aumento do conhecimento dos participantes. O ambiente foi considerado adequado, de fácil manuseio, interativo e dinâmico, o que permite a construção ativa do conhecimento. O treinamento influenciou diretamente a prática assistencial dos enfermeiros, mas não apresentou efeitos indiretos em relação à conhecimentos, habilidades, atitudes e comportamentos, com apoio insuficiente do ambiente de trabalho.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 150, "title": "A cluster randomized clinical trial to evaluate the effectiveness of the Implementation of Infant Pain Practice Change (ImPaC) Resource to improve pain  practices in hospitalized infants: a study protocol.", "authors": "Bueno, Mariana; Stevens, Bonnie; Barwick, Melanie A. et al.", "journal": "Trials", "year": "2020", "vol": "21(1):16", "doi": "10.1186/s13063-019-3782-9", "abstract": "BACKGROUND: Hospitalized infants undergo multiple painful procedures daily. Despite the significant evidence, procedural pain assessment and management  continues to be suboptimal. Repetitive and untreated pain at this vital  developmental juncture is associated with negative behavioral and  neurodevelopmental consequences. To address this knowledge to practice gap, we  developed the web-based Implementation of Infant Pain Practice Change (ImPaC)  Resource to guide change in healthcare professionals' pain practice behaviors.  This protocol describes the evaluation of the intervention effectiveness and  implementation of the Resource and how organizational context influences  outcomes. METHODS: An effectiveness-implementation hybrid type 1 design, blending  a cluster randomized clinical trial and a mixed-methods implementation study will  be used. Eighteen Neonatal Intensive Care Units (NICUs) across Canada will be  randomized to intervention (INT) or standard practice (SP) groups. NICUs in the  INT group will receive the Resource for six months; those in the SP group will  continue with practice as usual and will be offered the Resource after a  six-month waiting period. Data analysts will be blinded to group allocation. To  address the intervention effectiveness, the INT and SP groups will be compared on  clinical outcomes including the proportion of infants who have procedural pain  assessed and managed, and the frequency and nature of painful procedures. Data  will be collected at baseline (before randomization) and at completion of the  intervention (six months). Implementation outcomes (feasibility, fidelity,  implementation cost, and reach) will be measured at completion of the  intervention. Sustainability will be assessed at six and 12 months following the  intervention. Organizational context will be assessed to examine its influence on  intervention and implementation outcomes. DISCUSSION: This mixed-methods study  aims to determine the effectiveness and the implementation of a multifaceted  online strategy for changing healthcare professionals' pain practices for  hospitalized infants. Implementation strategies that are easily and effectively  implemented are important for sustained change. The results will inform  healthcare professionals and decision-makers on how to address the challenges of  implementing the Resource within various organizational contexts. TRIAL  REGISTRATION: ClinicalTrials.gov, NCT03825822. Registered 31 January 2019.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 149, "title": "Nonpharmacological analgesic interventions among newborn infants in the University Hospital of the University of Sao Paulo: a best practice implementation project.", "authors": "Brito, Ana P A; Shimoda, Gilceria T; Aragaki, Ilva M M et al.", "journal": "JBI Evid Implement", "year": "2020", "vol": "18(4):431-444", "doi": "10.1097/XEB.0000000000000246", "abstract": "INTRODUCTION: Despite evidence from studies on nonpharmacological pain management among newborns, many health professionals still don't apply evidence from scientific knowledge in their clinical practice. OBJECTIVES: To promote evidence-based practice for nonpharmacological analgesic interventions among newborns in the Maternity Ward of the University Hospital of the University of Sao Paulo, improving pain management and promoting healthy newborn growth and development, and better use of resources. METHOD: The current evidence implementation project used the JBI Practical Application of Clinical Evidence System and Getting Research into Practice audit and feedback tool. The JBI Practical Application of Clinical Evidence System and Getting Research into Practice framework for promoting evidence-based healthcare involve three phases of activity: conducting a baseline audit, implementing strategies to address areas of noncompliance and conducting a follow-up audit to assess the outcomes of the interventions implemented to improve practice. Ten evidence-based criteria on nonpharmacological pain management among newborns were audited, by direct observation of the nursing staff activities involving single skin-breaking procedures in the newborn. RESULTS: The baseline audit indicated poor compliance with evidence in current practice in most of the evidence-based criteria audited. Discussion with the implementation team identified barriers to best practice, with interventions including a nursing protocol and educational program for all nursing staff on nonpharmacological analgesic approaches to reduce pain in the newborn (breastfeeding, skin-to-skin contact with the mother, nonnutritive sucking and glucose 25%), and a leaflet to inform the best available evidence on newborn pain management. In the follow-up audit, compliance increased in eight of nine audit criteria, with criterion 7 remaining at 100% compliance to best practice. CONCLUSION: The current best practice implementation project contributed to establishing evidence-based practice and enhancing neonatal pain management during skin-breaking painful procedures in the University Hospital. However, to achieve 100% compliance with all the evidence-based audit criteria, we will need to invest in continuing education and extend this implementation project to other related settings of the hospital. Moreover, it is necessary to perform follow-up cyclical audits to assess compliance and address barriers to best practice, enhancing the quality of nursing care, ensuring better results on pain management of the newborn and ongoing sustainability of this project.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 144, "title": "[Effects of stepwise acute pain management on acute pain and post-traumatic stress disorder in children with burns: a prospective randomized controlled  study].", "authors": "Wang, Y. Q.; Huang, J. Q.; Wu, Z. H. et al.", "journal": "Zhonghua shao shang za zhi = Zhonghua shaoshang zazhi = Chinese journal of burns", "year": "2021", "vol": "37(3):237-242", "doi": "10.3760/cma.j.cn501120-20200210-00048", "abstract": "Objective: To explore the effects of stepwise acute pain management on acute pain and post-traumatic stress disorder (PTSD) in children with burns. Methods: From  November 2018 to December 2019, 196 children with burns who were admitted to West  China Hospital of Sichuan University and met the inclusion criteria were enrolled  in the prospective randomized controlled study. The children were divided into  traditional pain management group (97 children, 51 males and 46 females, aged 1  to 6 years) and stepwise pain management group (96 children, 55 males and 41  females, aged 1 to 6 years) according to the random number table. Children in  traditional pain management group were treated with traditional acute pain care,  while the children in stepwise pain management group were treated with stepped  acute pain management (moderate pain was treated with oral administration of  acetaminophen sustained-release dry suspension at the dose of 10 to 15 mg/kg once  every 4 to 6 hours, and severe pain was treated with morphine intravenous  injection at the dose of 0.1 to 0.2 mg/kg once every 4 hours) on the basis of  traditional acute pain care after admission. The COMFORT behavior scale was  applied to compare the resting pain levels of children in the two groups within  post injury day (PID) 3 (1, 9, and 17 o'clock each day). The adverse reactions of  children in the stepwise pain management group during the treatment period were  recorded. The occurrence of PTSD within one month after injury was evaluated in  both groups by the revised PTSD scale. Data were statistically analyzed with  independent sample t test, Bonferroni correction, analysis of variance for  repeated measurement, chi-square test, Wilcoxon rank sum test, and Fisher's exact  probability test. Results: The pain scores of children in stepwise pain  management group were significantly lower than traditional pain management group  at 1, 9, and 17 o'clock on PID 1, 1, 9, and 17 o'clock on PID 2, and 1, 9, and 17  o'clock on PID 3 (t=2.71, 3.44, 4.05, 4.18, 4.08, 4.19, 4.25, 3.69, 3.71, P<0.05  or P<0.01). The pain scores of children in both groups showed a decreasing trend  over time. Of the 96 children in stepwise pain management group, 84 children were  treated with oral administration of acetaminophen sustained-release dry  suspension, and 12 children were treated with morphine intravenous injection. No  adverse reaction occurred during the treatment period. The incidence of PTSD of  children in stepwise pain management group within 1 month after injury was 3.12%  (3/96), which was significantly lower than 14.43% (14/97) in traditional pain  management group, P<0.05. Conclusions: The stepped acute pain management can  relieve the acute pain and reduce the incidence of PTSD in children with burns.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 147, "title": "Increasing the cooperation of children during procedures using a high-tech device.", "authors": "Ashique, Karalikkattil T.; Kaliyadan, Feroze", "journal": "Journal of the American Academy of Dermatology", "year": "2020", "vol": "82(5):e151-e152", "doi": "10.1016/j.jaad.2018.07.023", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 138, "title": "Using sensor-fusion and machine-learning algorithms to assess acute pain in non-verbal infants: a study protocol.", "authors": "Roué, Jean-Michel; Morag, Iris; Haddad, Wassim M. et al.", "journal": "BMJ open", "year": "2021", "vol": "11(1):e039292", "doi": "10.1136/bmjopen-2020-039292", "abstract": "INTRODUCTION: Objective pain assessment in non-verbal populations is clinically challenging due to their inability to express their pain via self-report.  Repetitive exposures to acute or prolonged pain lead to clinical instability,  with long-term behavioural and cognitive sequelae in newborn infants. Strong  analgesics are also associated with medical complications, potential  neurotoxicity and altered brain development. Pain scores performed by bedside  nurses provide subjective, observer-dependent assessments rather than objective  data for infant pain management; the required observations are labour intensive,  difficult to perform by a nurse who is concurrently performing the procedure and  increase the nursing workload. Multimodal pain assessment, using sensor-fusion  and machine-learning algorithms, can provide a patient-centred,  context-dependent, observer-independent and objective pain measure. METHODS AND  ANALYSIS: In newborns undergoing painful procedures, we use facial  electromyography to record facial muscle activity-related infant pain, ECG to  examine heart rate (HR) changes and HR variability, electrodermal activity (skin  conductance) to measure catecholamine-induced palmar sweating, changes in oxygen  saturations and skin perfusion, and electroencephalography using active  electrodes to assess brain activity in real time. This multimodal approach has  the potential to improve the accuracy of pain assessment in non-verbal infants  and may even allow continuous pain monitoring at the bedside. The feasibility of  this approach will be evaluated in an observational prospective study of  clinically required painful procedures in 60 preterm and term newborns, and  infants aged 6 months or less. ETHICS AND DISSEMINATION: The Institutional Review  Board of the Stanford University approved the protocol. Study findings will be  published in peer-reviewed journals, presented at scientific meetings, taught via  webinars, podcasts and video tutorials, and listed on academic/scientific  websites. Future studies will validate and refine this approach using the minimum  number of sensors required to assess neonatal/infant pain. TRIAL REGISTRATION  NUMBER: ClinicalTrials.gov Registry (NCT03330496).", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 140, "title": "Sentimentos de pré-adolescentes e adolescentes quanto à vacinação contra o papilomavirus humano", "authors": "Silva, Patrick Leonardo Nogueira da", "journal": "Nursing (Ed. bras., Impr.)", "year": "2021", "vol": "24(273):5299-5310", "doi": "10.36489/nursing.2021v24i273p5299-5310", "abstract": "Objetivo: identificar os sentimentos de pré-adolescentes e adolescentes quanto à vacinação contra o papilomavirus humano. Método: trata-se de um estudo fenomenológico, com abordagem qualitativa, realizado com 10 participantes, sendo pré- adolescentes e adolescentes, cujas quais foram vacinadas na sala de vacina de uma Unidade Básica de Saúde de um município de Minas Gerais. Os depoimentos foram gravados e transcritos na íntegra para posterior análise. O tratamento dos dados se deu por meio de Análise de Conteúdo. Resultados: a maioria das entrevistadas atribuiu à significação da vacinação relacionada ao fato de prevenir o câncer de colo uterino. O desconhecimento sobre a finalidade da vacina HPV fica em evidência em alguns depoimentos. O medo da vacina também ficou em evidência, tendo como justificativa o fato de ser injeção, da dor, da agulha e por medo da reação. Como medidas de prevenção, foram citadas o uso de preservativo e a ida periódica ao ginecologista. Seis das participantes não souberam informar nenhuma medida de prevenção contra o papilomavirus humano. Conclusão: as participantes do estudo entendem a importância da vacinação  contra  o  papilomavirus  humano,  embora  seis  participantes,  bem  como  suas  famílias,  informaram  ter  receio  pela  dor  da  vacinação ou possíveis eventos adversos pós-vacinais.(AU)", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "E7 — Tipo de artículo no válido", "arb_dec": "", "arb_mot": ""}, {"id": 255, "title": "Acute Procedural Pain in Children: Intervention With the Hospital Clown.", "authors": "Kristensen, Helle Nygaard; Lundbye-Christensen, Søren; Haslund-Thomsen, Helle et al.", "journal": "The Clinical journal of pain", "year": "2018", "vol": "34(11):1032-1038", "doi": "10.1097/AJP.0000000000000625", "abstract": "INTRODUCTION: Hospitalized children often describe needle-related procedures as the worst pain possible and such procedures may be emotionally traumatic. The use  of hospital clowns (HCs) related to painful medical procedures in children may  offer pain relief, but this has not been systematically evaluated. The objective  of this study was to assess the effect of a therapeutic clown in comparison with  standard care on the experience of pain in children receiving venipuncture.  MATERIALS AND METHODS: A sample of 116 children aged 4 to 15 years consecutively  admitted to the hospital was allocated to either the experimental (presence of  HC) or control group (standard care) before venipuncture. Self-reported pain  after the procedure was assessed using the Faces Pain Scale combined with a 0 to  10 Numerical Rating Scale. Separate analysis was conducted in age groups from 4  to 6 (N=37) and 7 to 15 (N=74) years. RESULTS: Without the clown present, the  mean pain score (2.7±2.8) was not significantly different between the 2 age  groups. Children aged 7 to 15 years had lower pain scores when the clown was  present compared with the control group (P=0.025). Children aged 4 to 6 years had  higher pain scores with the clown present, although the difference was not  statistically significant (P=0.054). Children with pain (N=49) or previous  experiences with venipuncture (N=56) did not score pain significantly  differently. DISCUSSION: Assessing the pain experience of children receiving  venipuncture with the presence of an HC indicates a pain relieving effect for  children older than 6 years. However, future studies should carefully study the  effects on younger children where mixed effects may be present.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 243, "title": "Evaluation of a parent-targeted video in Portuguese to improve pain management practices in neonates.", "authors": "Bueno, Mariana; Costa, Rebeca Nogueira; de Camargo, Patrícia Ponce et al.", "journal": "Journal of clinical nursing", "year": "2018", "vol": "27(5-6):1153-1159", "doi": "10.1111/jocn.14147", "abstract": "AIMS AND OBJECTIVES: To assess parents' knowledge on breastfeeding, skin to skin care and sweet solutions as neonatal analgesic strategies, and to evaluate  parents' perception on the feasibility, acceptability and usefulness of the  Portuguese version of the \"Be Sweet to Babies\" video. BACKGROUND: Neonatal pain  management during blood sampling is suboptimal, and knowledge translation  strategies are needed to improve clinical practices. The \"Be Sweet to Babies\"  video is a parent-targeted knowledge translation tool that shows the  effectiveness of breastfeeding, skin to skin contact and sweet solutions for  procedural pain relief. DESIGN: Cross-sectional study. METHODS: Parents of  infants hospitalised in an intensive care unit watched the video during their  infants' hospitalisation and then answered a survey. Descriptive analyses of the  data were performed. RESULTS: Hundred parents were included. The majority did not  know about the analgesic effects of breastfeeding (80%), skin to skin contact  (69%) and sweet solutions (93%), and a limited number of parents stated their  infants had received the strategies during painful procedures (7%, 11%, 2%,  respectively). After watching the video, all (100%) parents intended to use or to  advocate for one of the strategies; most (90%) of the parents would use any of  the methods. All parents (100%) would recommend the video and considered the  video useful, easy to understand, easy to apply in real scenarios. Length of the  video was considered as ideal by 92%. CONCLUSIONS: The Portuguese version of the  \"Be Sweet to Babies\" video is feasible, acceptable and useful for parental  education and is a persuasive knowledge translation tool. Further studies are  needed to evaluate the effects of this parent-targeted intervention on the  implementation of the analgesic strategies during clinical care. RELEVANCE TO  CLINICAL PRACTICE: This article highlights the importance of exploring  evidence-based knowledge translation tools for improving neonatal care and  outcomes.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 192, "title": "Correlational analysis between potentially painful procedures and pain control strategies in a neonatal unit", "authors": "Costa, Anna Caroline Leite; Araújo, Fernanda Lopes de; Simão, Delma Aurélia da Silva et al.", "journal": "Texto & contexto enferm", "year": "2019", "vol": "28:e20180299-e20180299", "doi": "10.1590/1980-265x-tce-2018-0299", "abstract": "ABSTRACT  Objective:  to describe potentially painful procedures performed in neonates and their relation with pain relief strategies.  Method: a longitudinal correlational study, conducted from October to December 2014, with 50 neonates admitted to neonatal units of a public maternity hospital in Belo Horizonte, Minas Gerais (Brazil). Procedures were analyzed in the first two weeks of life of neonates admitted with up to three hours of life and born at the maternity hospital in which the study was conducted. Data was submitted to descriptive, comparative and correlational analyses using the Statistical Package for the Social Sciences software, adopting a significance level of 5%.  Results: most newborns were male (n=32; 64%), premature (n=34; 69.4%) and hospitalized for having respiratory disorders (n=45; 91.8%). A total of 894 painful and of 2883 potentially painful procedures related to daily care were recorded. Non-pharmacological pain relief strategies were used in 49 (98%) neonates, while pharmacological strategies were used in nine (18%). Correlational analyses revealed the difficulty of drug treatment management and the underuse of non-pharmacological strategies as adjuvant to severe pain procedures.  Conclusion: neonates underwent many potentially painful procedures, and it was found that pain relief methods are underused and that training on pain assessment and treatment is necessary in order to make these practices part of the care process.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 204, "title": "Nonpharmacologic Management of Pain During Common Needle Puncture Procedures in Infants: Current Research Evidence and Practical Considerations: An Update.", "authors": "McNair, Carol; Campbell-Yeo, Marsha; Johnston, Celeste et al.", "journal": "Clinics in perinatology", "year": "2019", "vol": "46(4):709-730", "doi": "10.1016/j.clp.2019.08.006", "abstract": "Infants undergo painful procedures involving skin puncture as part of routine medical care. Pain from needle puncture procedures is suboptimally managed.  Numerous nonpharmacologic interventions are available that may be used for these  painful procedures, including swaddling/containment, pacifier/non-nutritive  sucking, rocking/holding, breastfeeding and breastmilk, skin-to-skin care, sweet  tasting solutions, music therapy, sensorial saturation, and parental presence.  Adoption these interventions into routine clinical practice is feasible and  should be a standard of care in quality health care for infants. This review  summarizes the epidemiology of pain from common needle puncture procedures in  infants, the effectiveness of nonpharmacologic interventions, implementation  considerations, and unanswered questions.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 208, "title": "(Non) Pharmacological Modalities in Acute Procedural Pain.", "authors": "Najafi, Nadia; Forget, Patrice; Poelaert, Jan", "journal": "The Clinical journal of pain", "year": "2019", "vol": "35(5):459", "doi": "10.1097/AJP.0000000000000687", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 209, "title": "Intranasal Analgesia and Sedation in Pediatric Emergency Care-A Prospective Observational Study on the Implementation of an Institutional Protocol in a  Tertiary Children's Hospital.", "authors": "Nemeth, Marcus; Jacobsen, Nils; Bantel, Carsten et al.", "journal": "Pediatric emergency care", "year": "2019", "vol": "35(2):89-95", "doi": "10.1097/PEC.0000000000001017", "abstract": "OBJECTIVES: Children presenting with acute traumatic pain or in need of therapeutic or diagnostic procedures require rapid and effective analgesia and/or  sedation. Intranasal administration (INA) promises to be a reliable, minimally  invasive delivery route. However, INA is still underused in Germany. We hence  developed a protocol for acute pain therapy (APT) and urgent analgesia and/or  sedation (UAS). Our aim was to evaluate the effectiveness and safety of our  protocol. METHODS: We performed a prospective observational study in a tertiary  children's hospital in Germany. Pediatric patients aged 0 to 17 years requiring  APT or UAS were included. Fentanyl, s-ketamine, midazolam, or combinations were  delivered according to protocol. Primary outcome variables included quality of  analgesia and/or sedation as measured on age-appropriate scales and time to onset  of drug action. Secondary outcomes were adverse events and serious adverse  events. RESULTS: One hundred pediatric patients aged 0.3 to 16 years were  enrolled, 34 for APT and 66 for UAS. The median time onset of drug action was 5  minutes (ranging from 2 to 15 minutes). Fentanyl was most frequently used for APT  (n = 19). Pain scores decreased by a median of 4 points (
