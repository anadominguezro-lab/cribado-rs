n the number of fractures that healed (RR could not be estimated, all wounds healed); the certainty of the evidence is low. Reduction in wound size:  the effect of cleansing with tap water compared with normal saline on wound size reduction is uncertain (RR 0.97, 95% CI 0.56 to 1.68); the certainty of the evidence is very low. Rate of wound healing:  the effect of cleansing with tap water compared with normal saline on wound healing rate is uncertain (mean difference (MD) ‐3.06, 95% CI ‐6.70 to 0.58); the certainty of the evidence is very low. Costs:  two trials reported cost analyses but the cost‐effectiveness of tap water compared with the use of normal saline is uncertain; the certainty of the evidence is very low. Pain:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in pain scores. The certainty of the evidence is low. Patient satisfaction:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in patient satisfaction .  The certainty of evidence is low. The effect of cleansing with tap water compared with normal saline is uncertain as the certainty of the evidence is very low. Authors' conclusions All the evidence identified in the review was low or very low certainty. Cleansing with tap water may make little or no difference to wound healing compared with no cleansing; there are no data relating to the impact on wound infection. The effects of cleansing with tap water, cooled boiled water or distilled water compared with cleansing with saline are uncertain, as is the effect of distilled water compared with cooled boiled water. Data for other outcomes are limited across all the comparisons considered and are either uncertain or suggest that there may be little or no difference in the outcome. Plain language summary The effects of water compared with other solutions for wound cleansing Background Infection can interfere with the normal wound‐healing process. In order to reduce the risk of infection, wounds are routinely cleansed to remove dirt, contamination or impurities. In this review, a wound is defined as a break in the skin. What is the aim of this review? The aim of this review was to investigate the effects of wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). We measured effectiveness by looking at wound‐related infection rate and wound healing. Researchers from Cochrane searched for all randomised controlled trials (RCTs) relating to this question and found 13 relevant studies. RCTs are studies where people are chosen at random to receive different treatments. Allocating participants in this way provides the most reliable evidence about possible relationships between the treatment used and any reported health outcomes. Key messages We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction. What was studied in the review? Wounds are commonly cleansed to prevent infection. The cleansing solution can be tap water, distilled water, cooled boiled water or saline. Tap water is commonly used in the community because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. We compared the effects of cleansing wounds with water with other types of water, normal saline and no cleansing. We included all RCTs that compared wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). Participants were from any age group and any setting e.g. hospital, community, nursing homes, general practice, wound clinics. We excluded trials that compared solutions for dental procedures or for patients with burns. What are the main results of the review? We included results from 13 RCTs in this review, with a combined total of 2504 participants. The participants were adults or children with a range of different types of wounds who were treated in the community, emergency departments or hospital wards. Eight trials assessed cleansing with tap water compared with cleansing with normal saline. Three trials compared cleansing with tap water with no cleansing. Two trials assessed cleansing with distilled water compared with cleansing with normal saline, one trial also assessed cleansing with cooled boiled water with cleansing with normal saline and cleansing with distilled water compared with cleansing with cooled boiled water.  We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction.  We are unsure if the interventions have an effect because not enough participants received each intervention to reliably assess their effects. The way that the studies were designed and conducted also means that the results may not reliably reflect the effects of the interventions. This is partly due to uncertainty over how participants were assigned to the treatments. It is also possible that many participants and healthcare professionals were aware of which treatments were being used. How up to date is this review? We searched for studies that had been published up to 20 May 2021.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 91, "title": "Sin título", "authors": "Dantas, Ana Márcia Nóbrega; Santos-Rodrigues, Renata Clemente dos; Silva Júnior, José Nildo de Barros et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2022", "vol": "56:e20220151-e20220151", "doi": "10.1590/1980-220x-reeusp-2022-0151en", "abstract": "ABSTRACT  Objective: To map the nursing theories developed to meet children's needs.  Method: The JBI methodology and the PRISMA guided this scoping review. The search took place between October and November 2021, based on the PCC mnemonic: P (Population) - a child aged 0 to 9 years; C (Concept) - nursing theories; C (Context) - nursing.  Results: We identified 2,242 publications and selected 21 manuscripts consisting of nursing theories to meet children's feeding needs, child pain, a child with asthma, diabetes, obesity, epilepsy, Congenital Zika Syndrome, autism spectrum disorder; theory for care in Intensive Care Units; health promotion to premature babies; procedures in Intensive Care Units; theory for nursing diagnosis ineffective breathing pattern in children with congenital heart disease; sleep associated with child development; parent-child interaction; nurse-child relationship; and child's consultation.  Conclusion: The nursing theories mapped have the potential to outline the course of nursing care to children's needs highlighted in the studies that made up the sample.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 82, "title": "Sin título", "authors": "Sun, Hao; Ma, Xiang; Wang, Shengyou et al.", "journal": "BMC anesthesiology", "year": "2023", "vol": "23(1):185", "doi": "10.1186/s12871-023-02146-5", "abstract": "BACKGROUND: Epidural labor analgesia is a safe and effective method of pain management during labor with the drawbacks of delayed onset and maternal distress  during epidural puncture. This study aimed to determine whether pretreatment with  intranasal low-dose dexmedetomidine effectively shortens the onset of analgesia  and reduces procedural pain. METHODS: In this prospective, randomized  double-blind trial, nulliparous patients were randomly assigned to either the  intranasal dexmedetomidine group or the control group. The intranasal  dexmedetomidine group received 0.5 μg/kg dexmedetomidine intranasally, and the  control group received an equal volume of normal saline intranasally. Both groups  were maintained with a programmed intermittent epidural bolus. The primary  outcome was the onset time of analgesia and scores of pain related to the  epidural puncture. RESULTS: Seventy-nine patients were enrolled, and 60 completed  the study and were included in the analysis. The time to achieve adequate  analgesia was significantly shorter in the intranasal dexmedetomidine group than  in the control group (hazard ratio = 2.069; 95% CI, 2.187 to 3.606; P = 0.010).  The visual analogue scale pain scores during epidural puncture in the intranasal  dexmedetomidine group were also significantly lower than those in the control  group (2.0 (1.8-2.5) vs. 3.5 (3.3-4.5), P ≤ 0.001, Table 2). Pretreatment with  intranasal dexmedetomidine before epidural labor analgesia was associated with  improved visual analogue scale pain scores and Ramsay scores, less consumption of  analgesics and higher maternal satisfaction (P < 0.05). No differences were  observed for labor and neonatal outcomes or the incidence of adverse effects  between the two groups. CONCLUSIONS: Pretreatment with intranasal dexmedetomidine  before epidural labor analgesia yielded a faster onset of analgesia and decreased  epidural puncture pain without increasing adverse effects. Pretreatment with  intranasal dexmedetomidine may be a useful adjunct for the initiation of epidural  analgesia, and further investigation should be encouraged to determine its  utility more fully. TRIAL REGISTRATION: This trial was prospectively registered  at Chictr.org.cn on 29/05/2020 with the registration number ChiCTR2000033356 (  http://www.chictr.org.cn/listbycreater.aspx ).", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 47, "title": "Sin título", "authors": "Sutton, Rana; Lemermeyer, Gillian", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2024", "vol": "24(4):364-373", "doi": "10.1097/ANC.0000000000001164", "abstract": "BACKGROUND: Small infants experience a myriad of stimuli while in the Neonatal Intensive Care Unit (NICU), with many being painful or stressful experiences,  although medically necessary. PURPOSE: To determine what is known about  nonpharmacological developmental care interventions used in the NICU to mitigate  procedural pain of infants born under 32 weeks gestation. SEARCH/STRATEGY: Five  electronic databases were searched: Medline, CINAHL, Scopus, Embase and the  Cochrane Library. The inclusion criteria were as follows: experimental and  nonexperimental studies from all publication years with infants born at less than  32 weeks gestational age; peer-reviewed research articles studying  nonpharmacological interventions such as skin-to-skin care, facilitated tucking,  nonnutritive sucking, hand hugs, and swaddling; and English language articles.  Our search yielded 1435 articles. After the elimination of 736 duplicates, a  further 570 were deemed irrelevant based on their abstract/titles. Then, 124  full-text articles were analyzed with our inclusion and exclusion criteria.  FINDINGS: Twenty-seven studies were reviewed. Sucrose, facilitated tucking,  pacifier, skin-to-skin care, and human milk appeared to lessen pain experienced  during heel sticks, suctioning, nasogastric tube insertions, and echocardiograms.  All nonpharmacological interventions failed to prove efficacious to adequately  manage pain during retinopathy of prematurity (ROP) examinations. IMPLICATIONS  FOR PRACTICE: Evidence review demonstrates that healthcare practitioners should  use nonpharmacological measures to help prevent pain from day-to-day procedures  in the NICU including heel sticks, nasogastric tube insertions, suctioning,  echocardiograms, and subcutaneous injections. IMPLICATIONS FOR RESEARCH: Future  research is necessary to better understand and measure how pain is manifested by  very small premature infants. Specific research on mitigating the pain of  examinations for retinopathy of prematurity is also needed.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 72, "title": "Sin título", "authors": "Méndez López, Cathaysa; García Hernández, María Noelia", "journal": "Revista ROL de enfermería", "year": "2023", "vol": "46(5):308-319", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 58, "title": "Sin título", "authors": "De Clifford-Faugère, Gwenaëlle; Aita, Marilyn; Arbour, Caroline et al.", "journal": "Journal of advanced nursing", "year": "2023", "vol": "79(6):2155-2166", "doi": "10.1111/jan.15525", "abstract": "AIM: To present the development, evaluation and adaptation of the PAIN-Neo theory. DESIGN: Theory development. DATA SOURCES: A review of literature was  conduct from 1980 to 2021. RESULTS: Using a critical realism paradigm, this paper  presents the PAIN-Neo theory, which was developed from an analysis of existing  theoretical perspectives on paediatric procedural pain, empirical studies  conducted with preterm infants, and the research team's pain management  expertise. The theory was then empirically tested and fine-tuned. IMPLICATIONS  FOR NURSING: The PAIN-Neo theory highlights that the neonatal nurse is part of a  larger picture as she is influenced by factors related to her unit, hospital and  country of practice. This theory emphasizes the importance of parental  involvement in pain management, which is consistent with family-centred nursing  practices. CONCLUSION: The PAIN-Neo theory reflects the complexity of pain  management nursing. This theory is innovative and specific enough to guide  practice, structure research projects and contribute to the body of knowledge in  the discipline of nursing.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 110, "title": "Sin título", "authors": "Wandner, Laura Dover; Domenichiello, Anthony F.; Beierlein, Jennifer et al.", "journal": "The journal of pain", "year": "2022", "vol": "23(3):370-378", "doi": "10.1016/j.jpain.2021.08.005", "abstract": "The Helping to End Addiction Long-term Initiative (NIH HEAL Initiative) is an aggressive trans-NIH effort to speed solutions to stem the national opioid public  health crisis, including through improved pain management. Toward this end, the  NIH HEAL Initiative launched a common data element (CDE) program to ensure that  NIH-funded clinical pain research studies would collect data in a standardized  way. NIH HEAL Initiative staff launched a process to determine which pain-related  core domains should be assessed by every clinical pain study and what  questionnaires are required to ensure that the data is collected uniformly. The  process involved multiple literature reviews, and consultation with experts  inside and outside of NIH and the investigators conducting studies funded by the  initiative. Ultimately, 9 core pain domains, and questionnaires to measure them,  were chosen for studies examining acute pain and chronic pain in adults and  pediatric populations. These were augmented with dozens of study-specific  supplemental questionnaires to enable uniform data collection methods of outcomes  outside of the core domains. The selection of core domains will ensure that  valuable clinical pain data generated by the initiative is standardized, useable  for secondary data analysis, and useful for guiding future research, clinical  practice decisions, and policymaking. PERSPECTIVE: The NIH HEAL Initiative  launched a common data element program to ensure that NIH-funded clinical pain  research studies would collect data in a standardized way. Nine core pain domains  and questionnaires to measure them were chosen for studies examining acute pain  and chronic pain in adults and pediatric populations.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 113, "title": "Sin título", "authors": "Beal, Judy A.", "journal": "MCN. The American journal of maternal child nursing", "year": "2021", "vol": "46(5):300", "doi": "10.1097/NMC.0000000000000745", "abstract": "", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 379, "title": "Sin título", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e163-168", "doi": "10.3928/00904481-20140619-10", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the techniques for the assessment of  pain, including various age-specific pain scoring systems. The pharmacological  management of pain is discussed, including the use of agents that inhibit  prostaglandin formation-nonsteroidal anti-inflammatory agents and  acetaminophen-as well as the \"weak opioids\" that are commonly used when oral  administration is feasible for the treatment of mild to moderate pain.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 245, "title": "Sin título", "authors": "Campelo, Lívia Maria Nunes; Oliveira, Nayara Fernandes; Magalhães, Juliana Macêdo et al.", "journal": "Rev Bras Enferm", "year": "2018", "vol": "71(suppl 3):1381-1387", "doi": "10.1590/0034-7167-2016-0648", "abstract": "OBJECTIVE: To describe how nurses identify the pain in children with sickle cell disease (SCD) and to list the strategies used by them in the evaluation and control of pain. METHOD: This is a qualitative, descriptive and exploratory research, performed through semi-structured interviews with 13 nurses. The interviews were transcribed and after this process the qualitative data were organized according to thematic analysis. RESULTS: This study showed that the nurses can identify pain in children with SCD from the signals they emit, such as: constant crying, restlessness, facial expressions and verbal reports. Pain is difficult to evaluate due to the lack of instruments, such as a pain scale. For pain control they use emotional support, promotion of comfort and the administration of drugs prescribed by the doctor. FINAL CONSIDERATIONS: The nurses recognize the pain of the child and use pharmacological and non-pharmacological methods to control it but have difficulties to assess it.", "dec_r1": "EXCLUIR", "mot_r1": "E1 — Población oncológica", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 376, "title": "Sin título", "authors": "Murphy, Adrian; Barrett, Michael; Cronin, John et al.", "journal": "Emergency medicine journal : EMJ", "year": "2014", "vol": "31(6):493-498", "doi": "10.1136/emermed-2012-202166", "abstract": "INTRODUCTION: Effective pain management in the prehospital setting is gaining momentum as a potential key performance indicator by many emergency medical  service systems, but historically has been shown to be inadequate, particularly  in the paediatric population. This study aimed to identify the barriers, as  perceived by a national cohort of advanced paramedics (APs), to achieving optimal  prehospital management of acute pain in children. METHODS: A qualitative approach  was employed to capture data through two focus group interviews. Sixteen APs were  invited to participate in this study. Both focus groups were audio recorded,  transcribed and analysed using Attride-Stirling's framework for thematic network  analysis. RESULTS: The global theme 'Understanding Barriers to the Prehospital  Management of Acute Pain in Children' emerged from three organising themes as  follows: AP education and training; current clinical practice guidelines for  paediatric pain management; realities of prehospital practice. Limited exposure  to children in the prehospital setting, difficulty assessing pain intensity in  small children, and challenges in administering oral or inhaled analgesic agents  to distressed and uncooperative children were highlighted by participants. Short  transfer times to the emergency department, and a 'medical' cause of pain were  also implicated as examples of when children are less likely to receive analgesia  from practitioners. CONCLUSIONS: The pathway to improving care must include an  emphasis on improvements in practitioner education and training, offering  alternatives to assessing pain in preverbal children, exploring the intranasal  route of drug delivery in managing acute severe pain, and robustly developed  evidence-based guidelines that are practitioner friendly and patient-focused.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 357, "title": "Sin título", "authors": "Sieberg, Christine B.; Manganella, Juliana", "journal": "Child and adolescent psychiatric clinics of North America", "year": "2015", "vol": "24(3):631-645", "doi": "10.1016/j.chc.2015.02.006", "abstract": "Whether a child has to endure a procedure that incurs acute pain or a child has chronic pain, the impact on the family, especially parents, can be profound.  Parents need to be active members of their child's health care team; however,  they are often ill equipped to cope with either acute pain stressors or  longstanding chronic pain in their children. This article provides an overview of  acute and chronic pain, the impact of parent factors on pediatric pain, parental  assessments of parent functioning, and parent-based interventions for pediatric  pain management. Case examples are used to illustrate the treatments presented.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 378, "title": "Sin título", "authors": "Tobias, Joseph D.", "journal": "Pediatric annals", "year": "2014", "vol": "43(7):e169-175", "doi": "10.3928/00904481-20140619-11", "abstract": "The field of pediatric pain management continues to evolve, with ongoing changes in our appreciation of the impact of pain on our fragile patients, a better  understanding of how to assess pain, and refinements of the medications and  techniques used to provide analgesia to patients with acute pain of various  etiologies. The following article reviews the use of intravenous opioid and  nonsteroidal anti-inflammatory agents for the treatment of moderate to severe  pain. Options to manage specific adverse effects that may occur with opioids are  presented.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 377, "title": "Sin título", "authors": "Schultz-Machata, Anette-Marie; Weiss, Markus; Becke, Karin", "journal": "Current opinion in anaesthesiology", "year": "2014", "vol": "27(3):316-322", "doi": "10.1097/ACO.0000000000000074", "abstract": "PURPOSE OF REVIEW: This review highlights the current trends of efficient and safe perioperative pediatric pain therapy in the context of a multimodal pain  therapy concept. RECENT FINDINGS: A multimodal pain therapy concept should be  easy to apply and safe regarding the occurrence of side-effects. The  administration of nonopioid analgesics should be obligatory, regional anesthesia  techniques - under ultrasound guidance - should be performed whenever possible,  opioids should be given immediately and sufficiently whenever necessary, the  administration of co-analgesics like lidocaine, dexamethasone or ketamine should  be considered, and most importantly, each pain therapy should be performed  according to pain assessment and long enough until adequate pain relief. SUMMARY:  Safe and simple pediatric pain management in the perioperative period combines  not only easy to apply and safe stepwise pain therapy itself, but also adequate  pain assessment and the implementation of continuous hospital quality improvement  strategies.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 266, "title": "Sin título", "authors": "Postier, Andrea C.; Eull, Donna; Schulz, Craig et al.", "journal": "Hospital pediatrics", "year": "2018", "vol": "8(9):515-523", "doi": "10.1542/hpeds.2018-0039", "abstract": "OBJECTIVES: Pain in hospitalized children remains under-assessed and undertreated. With this study, we aim to describe results from a repeat  single-day, hospital-wide survey of children's pain and its treatment after the  initiation of a hospital-wide quality improvement initiative used to reduce or  eliminate pain caused by needle procedures. METHODS: All patients and parents  listed on the inpatient morning census, in emergency department and outpatient  surgery registration lists, were invited to participate in a brief single-day  point prevalence survey of their experience with pain and its management in the  hospital setting. Results were compared with a survey conducted 2 years earlier,  before implementation of a system-wide Children's Comfort Promise needle pain  treatment and prevention protocol. RESULTS: A total of 194 children and their  parents participated in the current survey. A higher percentage of children  reported having no pain compared with the previous survey (33% vs 24%; P = .07;  not significant) and fewer experienced severe pain (score ≥7 out of 10). Fewer  children identified pain caused by needles as the cause of the worst pain (21% vs  30%), although it remained the highest reported cause of the most painful  experience overall. The number of pain management strategies administered and  offered to children with needle pain (distraction, positioning, numbing cream,  and sucrose and/or breastfeeding for infants) increased. CONCLUSIONS: The  implementation of a mandatory Comfort Promise protocol used to minimize or  prevent pain caused by elective needle procedures was associated with a  significant reduction in overall pain prevalence and improved use of  evidence-based practices for needle pain management.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 288, "title": "Sin título", "authors": "Dancel, Ria; Liles, Edmund Allen; Fiore, Darren", "journal": "Reviews on recent clinical trials", "year": "2017", "vol": "12(4):277-283", "doi": "10.2174/1574887112666170816151232", "abstract": "BACKGROUND: Acute pain in hospitalized pediatric patients is prevalent. Recent shifts in the paradigm of pediatric acute pain management focus less on reliance  on opioids, due to their adverse side effects and risk of dependence, and more on  multimodal pain management. OBJECTIVE: We sought to review the most recent  studies on acute pain management in hospitalized pediatric patients. METHOD: We  searched the Cochrane Database and PubMed for articles published in the past five  years regarding the treatment of acute pain in pediatric patients focusing on  large randomized or quasirandomized controlled trials, cohort trials, and  meta-analyses. RESULTS: We categorized results into non-pharmacological,  localized, non-opiate pharmacological, and opiate based therapies. Recent studies  show that environmental and non-pharmacological methods of pain management are  efficacious in infants. School aged children benefit from active distraction more  than passive distraction. Needleless methods of introducing lidocaine locally  alleviate the pain associated with many procedures to which hospitalized children  are exposed. The shift towards use of nonopiate pharmacology focuses on novel  means of utilizing older medications, such as intravenous parecoxib, inhaled  methoxyflurane, and sublingual ketorolac or tramadol and the avoidance of  codeine. CONCLUSION: Acute pediatric pain management has changed to emphasize  multimodal and multidisciplinary therapy. In all children, non-pharmacological  therapies should be employed routinely. Given the myriad tools available,  pediatric acute pain services have developed in order to integrate more advanced  treatments such as nerve blocks and infusions of centrally acting pain  modulators.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 246, "title": "Sin título", "authors": "Collados-Gómez, L; Camacho-Vicente, V; Gonzalez-Villava, M et al.", "journal": "Enferm Intensiva", "year": "2018", "vol": "29(1):41-47", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 370, "title": "Sin título", "authors": "Gausche-Hill, Marianne; Brown, Kathleen M.; Oliver, Zoë J. et al.", "journal": "Prehospital emergency care", "year": "2014", "vol": "18 Suppl 1:25-34", "doi": "10.3109/10903127.2013.844873", "abstract": "BACKGROUND: The management of acute traumatic pain is a crucial component of prehospital care and yet the assessment and administration of analgesia is highly  variable, frequently suboptimal, and often determined by consensus-based regional  protocols. OBJECTIVE: To develop an evidence-based guideline (EBG) for the  clinical management of acute traumatic pain in adults and children by advanced  life support (ALS) providers in the prehospital setting. Methods. We recruited a  multi-stakeholder panel with expertise in acute pain management, guideline  development, health informatics, and emergency medical services (EMS) outcomes  research. Representatives of the National Highway Traffic Safety Administration  (sponsoring agency) and a major children's research center (investigative team)  also contributed to the process. The panel used the Grading of Recommendations  Assessment, Development and Evaluation (GRADE) methodology to guide the process  of question formulation, evidence retrieval, appraisal/synthesis, and formulation  of recommendations. The process also adhered to the National Prehospital  Evidence-Based Guideline (EBG) model process approved by the Federal Interagency  Council for EMS and the National EMS Advisory Council. RESULTS: Four strong and  three weak recommendations emerged from the process; two of the strong  recommendations were linked to high- and moderate-quality evidence, respectively.  The panel recommended that all patients be considered candidates for analgesia,  regardless of transport interval, and that opioid medications should be  considered for patients in moderate to severe pain. The panel also recommended  that all patients should be reassessed at frequent intervals using a standardized  pain scale and that patients should be re-dosed if pain persists. The panel  suggested the use of specific age-appropriate pain scales. CONCLUSION: GRADE  methodology was used to develop an evidence-based guideline for prehospital  analgesia in trauma. The panel issued four strong recommendations regarding  patient assessment and narcotic medication dosing. Future research should define  optimal approaches for implementation of the guideline as well as the impact of  the protocol on safety and effectiveness metrics.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 342, "title": "Sin título", "authors": "Usichenko, Taras I.; Wolters, Patrick; Anders, Eric F. et al.", "journal": "The Clinical journal of pain", "year": "2016", "vol": "32(1):82-86", "doi": "10.1097/AJP.0000000000000222", "abstract": "OBJECTIVES: Stimulation of acupoint LI4 has been shown to result in analgesic effects in patients experiencing acute pain. We aimed to study the effectiveness  of LI4 stimulation for pain relief in children receiving an injection of a local  anesthetic (LA). MATERIALS AND METHODS: Children scheduled for dental treatment  using LA received bilateral acupuncture at LI4 using indwelling fixed needles.  During the treatment, the parents of the patients stimulated the needles by  massage. Two different treatment regimes were compared: a standardized LA  injection given 5 minutes after acupuncture, and an LA injection without  acupuncture. The order of treatment was randomized, with the 2 treatments  performed in a crossover manner on different days. Pain intensity during LA  injection, assessed by the patient with the Verbal Rating Scale or Faces Pain  Scale (0 to 10), was used as the primary endpoint. Parent-assessed and  dentist-assessed pain intensity and agitation, heart rate, and the patients'  satisfaction with the therapy were also recorded. RESULTS: Data were obtained  from 49 patients (22 female; mean age 10 y). Patients reported less pain when  acupuncture was used: mean 2.3 (95% confidence interval, 1.5-3.1) versus 3.9 (95%  confidence interval, 3.0-4.7); P<0.001. The patients' heart rate remained low  throughout the dental treatment after LI4 stimulation, when compared with  treatment without acupuncture (P<0.05). LI4 stimulation was safe and increased  satisfaction levels in both the patients and their parents, when compared with LA  injection alone (P<0.05). DISCUSSION: Stimulation of acupoint LI4 reduces pain  and autonomic distress in children during LA injection in dental procedures.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": ""}, {"id": 317, "title": "Sin título", "authors": "Costa, Luana Cavalcante; Souza, Mariana Gonzaga de; Sena, Erika Maria Araújo Barbosa et al.", "journal": "Rev. enferm. UFPE on line", "year": "2016", "vol": "10(7):2395-2403", "doi": "10.5205/reuol.9106-80230-1-SM1007201613", "abstract": "Objetivo: conhecer como a equipe de enfermagem utiliza as medidas não farmacológicas para alívio da dor neonatal. Método: estudo descritivo, com abordagem qualitativa, realizado com 26 profissionais da equipe de enfermagem, em hospital escola de Maceió/AL, entre agosto de 2014 e julho de 2015. Foram realizadas entrevistas semiestruturadas; em seguida, transcritas e analisadas pela Técnica de Análise de Conteúdo, na modalidade Categorial. Resultados: foram apresentadas categorias << A enfermagem na identificação da dor neonatal >>, << Procedimentos potencialmente dolorosos e as intervenções da equipe de enfermagem >> e << A utilização de Medidas Não Farmacológicas no manejo da dor neonatal>>. Conclusão: apesar dos profissionais avaliarem a dor neonatal por meio da observação de alterações comportamentais e/ou fisiológicas, não utilizam escalas de dor no setor/serviço como instrumento auxiliar na sistematização dos cuidados relacionados à dor.(AU)", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 74, "title": "Sin título", "authors": "Ogul, Tanju; Yildiz, Suzan", "journal": "Journal of perianesthesia nursing : official journal of the American Society of PeriAnesthesia Nurses", "year": "2023", "vol": "38(6):930-937.e1", "doi": "10.1016/j.jopan.2023.01.023", "abstract": "PURPOSE: Acupressure is a complementary treatment method performed using fingers and hands to maintain the body's energy balance by stimulating acupuncture  points. In recent studies, acupressure has been widely used for minimally  invasive procedural (venous assess, intravenous (IV) cannulation, intramuscular  injection, heel lancing) pain management in children. This study aims to  systematically review the studies that evaluate the effectiveness of acupressure  on minimally invasive procedural pain in children. DESIGN: This study is a  systematic review of literature. METHODS: Studies were obtained by screening  literature on this topic using the databases PubMed, EBSCO, Scopus, Google  Scholar and Cochrane Central Register of Controlled Trials. The keywords  \"Acupressure,\" \"Child,\" \"Pain,\" and \"Procedural\" were used when screening the  literature. The studies selected were those published from January 1, 2000 to  January 1, 2022 that met the inclusion and exclusion criteria. The PRISMA  checklist was used when performing this systematic review. The Oxford Center for  Evidence-Based Medicine Levels of Evidence Working Group (2011) table was used to  assess the level of evidence. The procedures for this systematic review were  preregistered in the PROSPERO (CRD42022320155) database. FINDINGS: Of the 12,624  records identified, 10 nursing studies that met the research selection criteria  were included in the advanced analysis. These papers were further reviewed for  their study design, adequacy of randomization and concealment of allocation,  blinding of participants, interventions, and outcome measurements. CONCLUSIONS:  Acupressure has been shown to be effective in relieving minimally invasive  procedural pain in children. This review begins to establish a credible evidence  base for the use of acupressure in minimally invasive procedural pain relief in  pediatric age groups. The implication for nurses includes incorporating  acupressure into their practice as an alternative therapy for children who suffer  from minimally invasive procedural pain.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "EXCLUIR", "mot_r2": ""}, {"id": 57, "title": "Sin título", "authors": "Costa, Cibelle Tiphane de Sousa", "journal": "", "year": "2023", "vol": ":86 p-86 p", "doi": "", "abstract": "Introdução: A percepção da equipe de enfermagem é fundamental para avaliar e tratar a dor da criança hospitalizada. Por meio da observação e comunicação com a criança e sua família, os profissionais de enfermagem podem identificar a intensidade da dor e adequação do tratamento de acordo com as necessidades individuais de cada paciente. Uma abordagem empática e sensível é essencial para garantir o bem-estar da criança durante sua hospitalização. Objetivo: Compreender quais estratégias de intervenção a equipe de enfermagem (enfermeiros, técnicos e auxiliares) utiliza para preparar a criança e a família para a realização de procedimentos dolorosos durante a internação. Metodologia: Estudo exploratório descritivo com abordagem qualitativa realizada na unidade de internação pediátrica do Hospital Universitário da Universidade de São Paulo. A coleta de dados foi realizada através da observação não-participante e entrevistas semiestruturadas aos profissionais de enfermagem do setor. A análise dos dados foi apoiada no referencial metodológico Análise Temática e na abordagem teórica o Cuidado Centrado na Família. Resultados: Os dados foram organizados em dois temas e cinco subtemas. 1. Perspectiva teórica: A família como agente de cuidado nos procedimentos dolorosos; 2. Perspectiva prática: Vivências, desafios e estratégias de inserção da família nos procedimentos dolorosos. O tema 1 detectou as falas que consideravam a família como agente de cuidados, destacavam como ela era parte integrante do cuidado em saúde e sua influência no bem-estar da criança. Isso possibilitava ao profissional utilizar os preceitos do CCF, com abordagem mais humana e promovendo melhoria da qualidade doa atendimento. Para o tema 2 apoiou-se nas falas que se referem às vivências, desafios e estratégias de inserção da família em procedimentos dolorosos, sendo crucial para a implementação efetiva desse modelo de cuidado. Buscou-se entender as dificuldades que podem surgir durante o processo e quais estratégias foram desenvolvidas para superá-las, pois é uma oportunidade para promover a segurança e o bem-estar do paciente, além de fortalecer o vínculo entre a equipe de saúde, a criança e a família. Destaca-se também quais estratégias farmacológicas e não farmacológicas utilizavam para minimizar a dor da criança. Conclusão: Foi verificado que, mesmo em uma instituição que adota os princípios de inclusão familiar em todo o processo de cuidado, é necessário o treinamento contínuo da equipe para que possa evitar a execução automatizada de tarefas, a fim de manter na equipe de enfermagem a postura educacional com a família e, consequentemente, fornecer alívio à criança em procedimentos dolorosos, minimizando os riscos de traumas que o procedimento na internação possa trazer.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 239, "title": "Sin título", "authors": "Bice, April A.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2018", "vol": "19(3):230-237", "doi": "10.1016/j.pmn.2017.07.005", "abstract": "BACKGROUND: Pediatric nurses have often reported that pain management is a vital part of patient care. Evidence, however, suggests pediatric procedural pain  treatments are often underused. Cognitive dissonance, the mental conflict leading  to unpleasant thoughts and or feelings, may be related to this evidence-based gap  found between what pediatric nurses claim about procedural pain management (that  it is important) and what they actually do (underutilize pain treatments).  OBJECTIVE: The purpose of this manuscript is to clarify and further develop the  concept of cognitive dissonance in terms of its relationship to nurses' mental  struggles with underutilization of pediatric procedural pain treatments. A more  relevant and extended definition of cognitive dissonance is presented. DESIGN:  The concept of cognitive dissonance was examined using Rodgers' evolutionary  concept analysis approach/framework. Analysis Methods: Through a six-step process  of concept identification, setting and sample identification, data collection,  data analysis, and future implication discussion, a more accurate and  representative definition of cognitive dissonance is described. Databases used  included CINAHL, Google Scholar, PsycINFO, ERIC, and PubMed. Seminal, recent, and  relevant works were included in the review to adequately develop and clarify the  concept. CONCLUSIONS: Procedural pain management breech among pediatric nurses is  proposed to occur before the mental conflict produced. The unpleasant mental  conflict created after the breech is followed by the nurse's determination to  reduce mental conflict through attitude change followed by cognition change,  which more closely reflects his or her behavior.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 251, "title": "Sin título", "authors": "Galderisi, Alfonso; Lago, Paola; Steil, Garry M. et al.", "journal": "The Journal of pediatrics", "year": "2018", "vol": "200:261-264.e1", "doi": "10.1016/j.jpeds.2018.03.040", "abstract": "Procedural pain was compared between the insertion of a continuous glucose monitoring sensor and heel stick using the Premature Infant Pain Profile in a  single-blinded controlled trial in preterm infants (≤32 weeks of gestation or  birth weight ≤1500 g) (ClinicalTrials.govNCT02583776). Continuous glucose  monitoring insertion was associated with lower pain scores compared with the heel  stick.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 323, "title": "Sin título", "authors": "Griffith, RJ; Jordan, V; Herd, D et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2016", "vol": "(4):nan", "doi": "10.1002/14651858.CD009484.pub2", "abstract": "Abstract - Background Intravenous cannulation is a painful procedure that can provoke anxiety and stress. Injecting local anaesthetic can provide analgesia at the time of cannulation, but it is a painful procedure. Topical anaesthetic creams take between 30 and 90 minutes to produce an effect. A quicker acting analgesic allows more timely investigation and treatment. Vapocoolants have been used in this setting, but studies have reported mixed results. Objectives To determine effects of vapocoolants on pain associated with intravenous cannulation in adults and children. To explore variables that might affect the performance of vapocoolants, including time required for application, distance from the skin when applied and time to cannulation. To look at adverse effects associated with the use of vapocoolants. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), MEDLINE, EMBASE, Latin American Caribbean Health Sciences Literature (LILACS), the Cumulative Index to Nursing and Allied Health Literature (CINAHL), the Institute for Scientific Information (ISI) Web of Science and the  http://clinicaltrials.gov/ ,  http://www.controlled‐trials.com/  and  http://www.trialscentral.org/  databases to 1 May 2015. We applied no language restrictions. We also scanned the reference lists of included papers. Selection criteria We included all blinded and unblinded randomized controlled trials (RTCs) comparing any vapocoolant with placebo or control to reduce pain during intravenous cannulation in adults and children. Data collection and analysis Three review authors independently assessed trial quality and extracted data, contacted study authors for additional information and assessed included studies for risk of bias. We collected and analysed data for the primary outcome of pain during cannulation, and for the secondary outcomes of pain associated with application of the vapocoolant, first attempt success rate of intravenous cannulation, adverse events and participant satisfaction. We performed subgroup analyses for the primary outcome to examine differences based on age of participant, type of vapocoolant used, application time of vapocoolant and clinical situation (emergency vs elective). We used random‐effects model meta‐analysis in RevMan 5.3 and assessed heterogeneity between trial results by examining forest plots and calculating the I 2  statistic. Main results We found nine suitable studies of 1070 participants and included them in the qualitative analyses. We included eight studies of 848 participants in the meta‐analysis for the primary outcome (pain during intravenous cannulation). Use of vapocoolants resulted in a reduction in pain scores as measured by a linear 100 mm visual analogue scale (VAS 100) compared with controls (difference between means ‐12.5 mm, 95% confidence interval (CI) ‐18.7 to ‐6.4 mm; moderate‐quality evidence). We could not include in the meta‐analysis one study, which showed no effects of the intervention. Use of vapocoolants resulted in increased pain scores at the time of application as measured by a VAS 100 compared with controls (difference between means 6.3 mm, 95% CI 2.2 to 10.3 mm; four studies, 461 participants; high‐quality evidence) and led to no difference in first attempt success compared with controls (risk ratio (RR) 1.00, 95% CI 0.94 to 1.06; six studies, 812 participants; moderate‐quality evidence). We documented eight minor adverse events reported in 279 vapocoolant participants (risk difference (RD) 0.03, 95% CI 0 to 0.05; five studies, 551 participants; low quality‐evidence). The overall risk of bias of individual studies ranged from low to high, with high risk of bias for performance and detection bias in four studies. Sensitivity analysis showed that exclusion of studies at high or unclear risk of bias did not materially alter the results of this review. Authors' conclusions Moderate‐quality evidence indicates that use of a vapocoolant immediately before intravenous cannulation reduces pain during the procedure. Use of vapocoolant does not increase the difficulty of cannulation nor cause serious adverse effects but is associated with mild discomfort during application. Plain language summary Vapocoolants (cold spray) for pain treatment during intravenous cannulation Background Intravenous cannulation for blood tests or treatment is a common, often painful, procedure. Vapocoolant sprays or \"cold sprays\" are delivered onto the skin just before needle insertion to provide some pain relief. Vapocoolants offer several advantages over other pain relief techniques, particularly their rapid effects (a few seconds). We reviewed the evidence showing how effective vapocoolants are in reducing the pain associated with inserting an intravenous cannula. The evidence is current to May 2015. Results We identified nine studies of 1070 participants that compared use of vapocoolants with use of placebo spray, or no spray, in children and adults undergoing intravenous cannulation in any healthcare setting. Investigators in three studies received funding from a source not reported to be involved in the study design and analysis. Vapocoolant manufacturers provided vapocoolant and placebo sprays for two studies, and were not involved in study design nor in analysis of results. We found that vapocoolants are likely to reduce pain during intravenous cannulation and are not likely to make cannulation more difficult nor cause serious adverse events. We noted that application of vapocoolants caused some discomfort, but that using the spray resulted in reduced pain. Using a pain score range from 0 to 100 mm (0 = no pain and 100 = worst possible pain), we found that average pain scores were reduced by 12.5 mm in participants receiving vapocoolant spray. Quality of the evidence Overall, the quality of the evidence was moderate rather than high. However, excluding studies of poorer quality did not materially alter the results of the review.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}, {"id": 339, "title": "Sin título", "authors": "Schreiber, Silvana; Cozzi, Giorgio; Rutigliano, Rosaria et al.", "journal": "Acta paediatrica (Oslo, Norway : 1992)", "year": "2016", "vol": "105(1):e12-16", "doi": "10.1111/apa.13224", "abstract": "AIM: Children with cognitive impairment experience pain more frequently than healthy children and are more likely to require venipuncture or intravenous  cannulation for various procedures. They are frequently unable to report pain and  often receive poor pain assessment and management. This study assessed the  effectiveness of physical analgesia during vascular access in children with  cognitive impairments. METHODS: We conducted a prospective randomised controlled  study at a tertiary-level children's hospital in Italy from April to May 2015 to  assess whether a cooling vibration device called Buzzy decreased pain during  venipuncture and intravenous cannulation in children with cognitive impairment.  None of the children had verbal skills and the main cognitive impairments were  cerebral palsy, epileptic encephalopathy and genetic syndromes. RESULTS: We  tested 70 children with a median age of nine years: 34 in the Buzzy group and 36  in the no-intervention group. Parents were trained in the use of the  Noncommunicating Children's Pain Checklist--postoperative version scale, and they  reported no or mild procedural pain in 32 cases (91.4%) in the Buzzy group and in  22 cases (61.1%) in the no-intervention group (p = 0.003). CONCLUSION: Cooling  vibration analgesia during vascular access reduced pain in children with  cognitive impairment.", "dec_r1": "DUDOSO", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": ""}];

// arbitration decisions: id -> {dec, mot}
let arbDecisions = {};
let currentFilter = 'todos';
let openCards = new Set();
let saveQueue = {};
let isSaving  = false;
let dataLoaded = false;
let hideResolved = true; // hide resolved articles by default

// ── Sync ──────────────────────────────────────────────────────────────────────
function setSync(state, msg) {
  document.getElementById('syncDot').className = 'sync-dot' +
    (state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('syncMsg').textContent = msg;
}

// ── Load arbitration decisions from Sheets col 7 (ARB_dec) col 8 (ARB_mot) ──
async function loadDecisions() {
  setSync('loading','Cargando...');
  try {
    const r = await fetch(SCRIPT + '?action=read&t=' + Date.now());
    const j = await r.json();
    const rows = j.data || [];
    arbDecisions = {};
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const id = parseInt(row[0]);
      if (!id || isNaN(id)) continue;
      const dec  = String(row[6]||'').trim();
      const mot  = String(row[7]||'').trim();
      const note = String(row[8]||'').trim();
      if (dec) arbDecisions[id] = { dec, mot, note };
    }
    dataLoaded = true;
    setSync('ok','Sincronizado ✓');
    updateStats();
    renderList();
  } catch(e) {
    setSync('error','Error de conexión');
    setTimeout(loadDecisions, 8000);
  }
}

// ── Save arbitration decision to cols 7 & 8 ───────────────────────────────────
function queueSave(id, dec, mot) {
  saveQueue[id] = { id, dec, mot };
  if (!isSaving) processSaveQueue();
}

async function processSaveQueue() {
  isSaving = true;
  while (Object.keys(saveQueue).length > 0) {
    const key = Object.keys(saveQueue)[0];
    const item = saveQueue[key];
    delete saveQueue[key];
    setSync('loading','Guardando...');
    try {
      const row = item.id + 1;
      await fetch(`${SCRIPT}?action=write&row=${row}&col=7&value=${encodeURIComponent(item.dec)}`);
      await fetch(`${SCRIPT}?action=write&row=${row}&col=8&value=${encodeURIComponent(item.mot)}`);
      if (item.note !== undefined) {
        await fetch(`${SCRIPT}?action=write&row=${row}&col=9&value=${encodeURIComponent(item.note)}`);
      }
      setSync('ok','Guardado ✓');
    } catch(e) {
      setSync('error','Error al guardar');
      saveQueue[key] = item;
      await new Promise(r => setTimeout(r,3000));
    }
  }
  isSaving = false;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function updateStats() {
  let inc=0, exc=0;
  ARTICLES.forEach(a => {
    const d = arbDecisions[a.id];
    if (d?.dec === 'INCLUIR') inc++;
    else if (d?.dec === 'EXCLUIR') exc++;
  });
  const total = ARTICLES.length;
  const pend  = total - inc - exc;
  const done  = inc + exc;
  document.getElementById('stInc').textContent  = inc;
  document.getElementById('stExc').textContent  = exc;
  document.getElementById('stPend').textContent = pend;
  document.getElementById('progBar').style.width = Math.round(done/total*100)+'%';
  document.getElementById('progLabel').textContent = `${done} de ${total} resueltos`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderList();
}

function decClass(dec) {
  if (dec==='INCLUIR') return 'dec-incluir';
  if (dec==='EXCLUIR') return 'dec-excluir';
  if (dec==='DUDOSO')  return 'dec-dudoso';
  return 'dec-empty';
}

function toggleHideResolved() {
  hideResolved = !hideResolved;
  const btn = document.getElementById('toggleHideBtn');
  if (hideResolved) {
    btn.textContent = '👁 Mostrar resueltos';
    btn.classList.remove('active');
  } else {
    btn.textContent = '🙈 Ocultar resueltos';
    btn.classList.add('active');
  }
  renderList();
}

function renderList() {
  const container = document.getElementById('articleList');
  if (!dataLoaded) {
    container.innerHTML = '<div class="empty"><div class="spinner"></div><p>Cargando...</p></div>';
    return;
  }
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = ARTICLES.filter(a => {
    const arb = arbDecisions[a.id];
    // Hide resolved articles by default unless temporarily visible
    if (hideResolved && currentFilter === 'todos' && arb?.dec && !temporarilyVisible.has(a.id)) return false;
    if (currentFilter === 'pendiente' && arb?.dec) return false;
    if (currentFilter === 'INCLUIR'  && arb?.dec !== 'INCLUIR') return false;
    if (currentFilter === 'EXCLUIR'  && arb?.dec !== 'EXCLUIR') return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.authors.toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    const msg = hideResolved && currentFilter === 'todos'
      ? '<p style="font-size:16px;color:#276749;font-weight:600;margin-bottom:8px;">¡Arbitraje completado!</p><p style="font-size:13px;color:#718096;">Todos los artículos han sido resueltos. Pulsa "Mostrar resueltos" para revisar las decisiones.</p>'
      : '<p style="font-size:14px;color:#a0aec0;">No hay artículos con los filtros seleccionados.</p>';
    container.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  const scrollY = window.scrollY;
  container.innerHTML = filtered.map(a => {
    const arb   = arbDecisions[a.id] || {};
    const arbDec = arb.dec || '';
    const arbMot = arb.mot || '';
    const cardCls = arbDec ? `resolved-${arbDec}` : '';

    const metaParts = [];
    if (a.authors) metaParts.push(esc(a.authors));
    if (a.journal) metaParts.push(`<i>${esc(a.journal)}</i>`);
    if (a.year)    metaParts.push(a.year);
    if (a.vol)     metaParts.push(a.vol);
    if (a.doi)     metaParts.push(`DOI: ${esc(a.doi)}`);

    const badge = arbDec
      ? `<span class="resolved-badge ${arbDec==='INCLUIR'?'rb-inc':'rb-exc'}">${arbDec==='INCLUIR'?'✓ INCLUIR':'✗ EXCLUIR'}</span>`
      : '';

    const motivoOpts = MOTIVOS.map(m =>
      `<option value="${m}" ${arbMot===m?'selected':''}>${m||'— Motivo de exclusión —'}</option>`
    ).join('');

    return `<div class="card ${cardCls}" id="c${a.id}">
      <div class="card-head" onclick="toggleCard(${a.id})">
        <div class="card-num">#${a.id}${badge}</div>
        <div class="card-title">${esc(a.title)}</div>
        <div class="card-meta">${metaParts.join(' · ')}</div>
      </div>

      <div class="reviewers-row">
        <div class="reviewer-cell">
          <div class="reviewer-name">Ana (R1)</div>
          <div class="reviewer-dec ${decClass(a.dec_r1)}">${a.dec_r1 || '—'}</div>
          <div class="reviewer-mot">${esc(a.mot_r1) || 'Sin motivo'}</div>
        </div>
        <div class="reviewer-cell">
          <div class="reviewer-name">Ángela (R2)</div>
          <div class="reviewer-dec ${decClass(a.dec_r2)}">${a.dec_r2 || '—'}</div>
          <div class="reviewer-mot">${esc(a.mot_r2) || 'Sin motivo'}</div>
        </div>
      </div>

      <div class="card-body" id="b${a.id}">
        ${a.abstract
          ? `<div class="abstract">${esc(a.abstract)}</div>`
          : `<div class="no-abs">⚠ Resumen no disponible</div>`}
        <div style="height:8px"></div>
      </div>

      <div class="arb-panel">
        <div class="arb-label">⚖ Decisión del árbitro</div>
        <div class="arb-buttons">
          <button class="arb-btn inc ${arbDec==='INCLUIR'?'sel':''}" onclick="arbitrate(${a.id},'INCLUIR')">✓ Incluir</button>
          <button class="arb-btn exc ${arbDec==='EXCLUIR'?'sel':''}" onclick="arbitrate(${a.id},'EXCLUIR')">✗ Excluir</button>
          ${arbDec==='EXCLUIR'?`<select class="motivo-sel" id="m${a.id}" onchange="saveMotArb(${a.id})">${motivoOpts}</select>`:''}
          <span class="saving" id="sv${a.id}">✓ Guardado</span>
        </div>
        <textarea class="arb-notes" id="n${a.id}" placeholder="Justificación del árbitro (opcional)..." onblur="saveNoteArb(${a.id})">${esc(arb.note||'')}</textarea>
      </div>
    </div>`;
  }).join('');

  openCards.forEach(id => {
    const b = document.getElementById('b'+id);
    if (b) b.classList.add('open');
  });
  window.scrollTo(0, scrollY);
}

function toggleCard(id) {
  const b = document.getElementById('b'+id);
  if (!b) return;
  b.classList.toggle('open');
  if (b.classList.contains('open')) openCards.add(id);
  else openCards.delete(id);
}

let temporarilyVisible = new Set();

function arbitrate(id, dec) {
  const cur = arbDecisions[id] || {};
  const newDec = cur.dec === dec ? '' : dec;
  const newMot = newDec === 'EXCLUIR' ? (cur.mot||'') : '';
  if (newDec) arbDecisions[id] = { dec: newDec, mot: newMot, note: (cur.note||'') };
  else delete arbDecisions[id];
  queueSave(id, newDec, newMot);
  updateStats();

  if (newDec === 'EXCLUIR' && hideResolved) {
    // Keep visible until motivo is selected
    temporarilyVisible.add(id);
    renderList();
    setTimeout(() => {
      const sel = document.getElementById('m'+id);
      if (sel) { sel.focus(); sel.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    }, 60);
  } else if (newDec === 'INCLUIR' && hideResolved) {
    // Show briefly then hide
    temporarilyVisible.add(id);
    renderList();
    setTimeout(() => {
      const sv = document.getElementById('sv'+id);
      if (sv) { sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),1500); }
      setTimeout(() => { temporarilyVisible.delete(id); renderList(); }, 1200);
    }, 60);
  } else {
    temporarilyVisible.delete(id);
    renderList();
    setTimeout(() => {
      const sv = document.getElementById('sv'+id);
      if (sv) { sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),2000); }
    }, 60);
  }
}

function saveNoteArb(id) {
  const note = document.getElementById('n'+id)?.value || '';
  const cur = arbDecisions[id] || {};
  if (!cur.dec) return; // don't save note if no decision yet
  arbDecisions[id] = { dec: cur.dec, mot: cur.mot||'', note };
  queueSaveNote(id, note);
}

function queueSaveNote(id, note) {
  saveQueue['note_'+id] = { id, dec: arbDecisions[id]?.dec||'', mot: arbDecisions[id]?.mot||'', note, isNote: true };
  if (!isSaving) processSaveQueue();
}

function saveMotArb(id) {
  const mot = document.getElementById('m'+id)?.value || '';
  const cur = arbDecisions[id] || {};
  arbDecisions[id] = { dec: cur.dec, mot };
  queueSave(id, cur.dec, mot);
  // Hide after motivo selected
  if (mot && mot !== '' && hideResolved) {
    temporarilyVisible.delete(id);
    setTimeout(() => renderList(), 800);
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV() {
  let csv = 'ID,Título,Decisión R1,Motivo R1,Decisión R2,Motivo R2,Decisión Árbitro,Motivo Árbitro,Justificación Árbitro\n';
  ARTICLES.forEach(a => {
    const arb = arbDecisions[a.id] || {};
    const row = [a.id,a.title,a.dec_r1,a.mot_r1,a.dec_r2,a.mot_r2,arb.dec||'',arb.mot||'',arb.note||'']
      .map(v => `"${String(v||'').replace(/"/g,'""')}"`)
      .join(',');
    csv += row + '\n';
  });
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='decisiones_arbitro.csv'; a.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDecisions();
setInterval(() => { if (!isSaving) loadDecisions(); }, 60000);
</script>
