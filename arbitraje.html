range, 0-10; P <  0.0001). For UAS, s-ketamine/midazolam was most frequently used (n = 25).  Sedation score indicated minimal sedation in most cases. Overall success rate  after the first attempt was 82%. Adverse events consisted of nasal burning (n =  2) and vomiting (n = 2). No serious adverse events were recorded. CONCLUSIONS: A  fentanyl-, s-ketamine-, and midazolam-based INA protocol was effective and safe  for APT and UAS. It should then be considered where intravenous access is  impossible or inappropriate.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 218, "title": "Considerations for neonatal and pediatric pain management.", "authors": "Shah, Pooja; Siu, Anita", "journal": "American journal of health-system pharmacy : AJHP : official journal of the American Society of Health-System Pharmacists", "year": "2019", "vol": "76(19):1511-1520", "doi": "10.1093/ajhp/zxz166", "abstract": "PURPOSE: Current literature and clinical practice guidelines on pediatric pain management are reviewed. SUMMARY: Acute pain is commonly present in neonatal and  pediatric patients due to underlying disease states or procedures. Especially in  institutions with limited pediatric pain services, it is imperative to describe  the appropriate management of pain and pharmacotherapy options that are effective  and safe in pediatric patients. Despite the knowledge of pain being an important  aspect in the management of children, barriers exist, leading to suboptimal  treatment. Addressing these barriers through education of healthcare  practitioners, families, and patients will lead to optimizing the patient pain  experience. Tools for pain assessment vary depending on the type of pain, the  child's age and understanding of pain, and the clinical situation.  Pharmacotherapy options for pain management in neonates and pediatric patients  include opioid and nonopioid agents. Efficacy and safety data on the use of  medications for the treatment of pain in pediatric patients is described. The  delivery of medication encompasses patient-specific factors and preferences.  Strategies for opioid stewardship and management of iatrogenic withdrawal pose a  unique challenge in pediatric patients. CONCLUSION: The management of acute pain  in neonates and pediatric patients should be a priority for all practitioners  caring for these patients. Use of age-appropriate pain assessment tools and  understanding of the mechanisms of action and roles in therapy of various  nonopioid and opioid therapies can help optimize treatment of pain in neonatal  and pediatric patients.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 239, "title": "Cognitive Dissonance and Pediatric Procedural Pain Management: A Concept Clarification.", "authors": "Bice, April A.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2018", "vol": "19(3):230-237", "doi": "10.1016/j.pmn.2017.07.005", "abstract": "BACKGROUND: Pediatric nurses have often reported that pain management is a vital part of patient care. Evidence, however, suggests pediatric procedural pain  treatments are often underused. Cognitive dissonance, the mental conflict leading  to unpleasant thoughts and or feelings, may be related to this evidence-based gap  found between what pediatric nurses claim about procedural pain management (that  it is important) and what they actually do (underutilize pain treatments).  OBJECTIVE: The purpose of this manuscript is to clarify and further develop the  concept of cognitive dissonance in terms of its relationship to nurses' mental  struggles with underutilization of pediatric procedural pain treatments. A more  relevant and extended definition of cognitive dissonance is presented. DESIGN:  The concept of cognitive dissonance was examined using Rodgers' evolutionary  concept analysis approach/framework. Analysis Methods: Through a six-step process  of concept identification, setting and sample identification, data collection,  data analysis, and future implication discussion, a more accurate and  representative definition of cognitive dissonance is described. Databases used  included CINAHL, Google Scholar, PsycINFO, ERIC, and PubMed. Seminal, recent, and  relevant works were included in the review to adequately develop and clarify the  concept. CONCLUSIONS: Procedural pain management breech among pediatric nurses is  proposed to occur before the mental conflict produced. The unpleasant mental  conflict created after the breech is followed by the nurse's determination to  reduce mental conflict through attitude change followed by cognition change,  which more closely reflects his or her behavior.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 251, "title": "Procedural Pain during Insertion of a Continuous Glucose Monitoring Device in Preterm Infants.", "authors": "Galderisi, Alfonso; Lago, Paola; Steil, Garry M. et al.", "journal": "The Journal of pediatrics", "year": "2018", "vol": "200:261-264.e1", "doi": "10.1016/j.jpeds.2018.03.040", "abstract": "Procedural pain was compared between the insertion of a continuous glucose monitoring sensor and heel stick using the Premature Infant Pain Profile in a  single-blinded controlled trial in preterm infants (≤32 weeks of gestation or  birth weight ≤1500 g) (ClinicalTrials.govNCT02583776). Continuous glucose  monitoring insertion was associated with lower pain scores compared with the heel  stick.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 317, "title": "Utilização de medidas não farmacológicas pela equipe de enfermagem para alívio da dor neonatal", "authors": "Costa, Luana Cavalcante; Souza, Mariana Gonzaga de; Sena, Erika Maria Araújo Barbosa et al.", "journal": "Rev. enferm. UFPE on line", "year": "2016", "vol": "10(7):2395-2403", "doi": "10.5205/reuol.9106-80230-1-SM1007201613", "abstract": "Objetivo: conhecer como a equipe de enfermagem utiliza as medidas não farmacológicas para alívio da dor neonatal. Método: estudo descritivo, com abordagem qualitativa, realizado com 26 profissionais da equipe de enfermagem, em hospital escola de Maceió/AL, entre agosto de 2014 e julho de 2015. Foram realizadas entrevistas semiestruturadas; em seguida, transcritas e analisadas pela Técnica de Análise de Conteúdo, na modalidade Categorial. Resultados: foram apresentadas categorias << A enfermagem na identificação da dor neonatal >>, << Procedimentos potencialmente dolorosos e as intervenções da equipe de enfermagem >> e << A utilização de Medidas Não Farmacológicas no manejo da dor neonatal>>. Conclusão: apesar dos profissionais avaliarem a dor neonatal por meio da observação de alterações comportamentais e/ou fisiológicas, não utilizam escalas de dor no setor/serviço como instrumento auxiliar na sistematização dos cuidados relacionados à dor.(AU)", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 323, "title": "Vapocoolants (cold spray) for pain treatment during intravenous cannulation", "authors": "Griffith, RJ; Jordan, V; Herd, D et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2016", "vol": "(4):nan", "doi": "10.1002/14651858.CD009484.pub2", "abstract": "Abstract - Background Intravenous cannulation is a painful procedure that can provoke anxiety and stress. Injecting local anaesthetic can provide analgesia at the time of cannulation, but it is a painful procedure. Topical anaesthetic creams take between 30 and 90 minutes to produce an effect. A quicker acting analgesic allows more timely investigation and treatment. Vapocoolants have been used in this setting, but studies have reported mixed results. Objectives To determine effects of vapocoolants on pain associated with intravenous cannulation in adults and children. To explore variables that might affect the performance of vapocoolants, including time required for application, distance from the skin when applied and time to cannulation. To look at adverse effects associated with the use of vapocoolants. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), MEDLINE, EMBASE, Latin American Caribbean Health Sciences Literature (LILACS), the Cumulative Index to Nursing and Allied Health Literature (CINAHL), the Institute for Scientific Information (ISI) Web of Science and the  http://clinicaltrials.gov/ ,  http://www.controlled‐trials.com/  and  http://www.trialscentral.org/  databases to 1 May 2015. We applied no language restrictions. We also scanned the reference lists of included papers. Selection criteria We included all blinded and unblinded randomized controlled trials (RTCs) comparing any vapocoolant with placebo or control to reduce pain during intravenous cannulation in adults and children. Data collection and analysis Three review authors independently assessed trial quality and extracted data, contacted study authors for additional information and assessed included studies for risk of bias. We collected and analysed data for the primary outcome of pain during cannulation, and for the secondary outcomes of pain associated with application of the vapocoolant, first attempt success rate of intravenous cannulation, adverse events and participant satisfaction. We performed subgroup analyses for the primary outcome to examine differences based on age of participant, type of vapocoolant used, application time of vapocoolant and clinical situation (emergency vs elective). We used random‐effects model meta‐analysis in RevMan 5.3 and assessed heterogeneity between trial results by examining forest plots and calculating the I 2  statistic. Main results We found nine suitable studies of 1070 participants and included them in the qualitative analyses. We included eight studies of 848 participants in the meta‐analysis for the primary outcome (pain during intravenous cannulation). Use of vapocoolants resulted in a reduction in pain scores as measured by a linear 100 mm visual analogue scale (VAS 100) compared with controls (difference between means ‐12.5 mm, 95% confidence interval (CI) ‐18.7 to ‐6.4 mm; moderate‐quality evidence). We could not include in the meta‐analysis one study, which showed no effects of the intervention. Use of vapocoolants resulted in increased pain scores at the time of application as measured by a VAS 100 compared with controls (difference between means 6.3 mm, 95% CI 2.2 to 10.3 mm; four studies, 461 participants; high‐quality evidence) and led to no difference in first attempt success compared with controls (risk ratio (RR) 1.00, 95% CI 0.94 to 1.06; six studies, 812 participants; moderate‐quality evidence). We documented eight minor adverse events reported in 279 vapocoolant participants (risk difference (RD) 0.03, 95% CI 0 to 0.05; five studies, 551 participants; low quality‐evidence). The overall risk of bias of individual studies ranged from low to high, with high risk of bias for performance and detection bias in four studies. Sensitivity analysis showed that exclusion of studies at high or unclear risk of bias did not materially alter the results of this review. Authors' conclusions Moderate‐quality evidence indicates that use of a vapocoolant immediately before intravenous cannulation reduces pain during the procedure. Use of vapocoolant does not increase the difficulty of cannulation nor cause serious adverse effects but is associated with mild discomfort during application. Plain language summary Vapocoolants (cold spray) for pain treatment during intravenous cannulation Background Intravenous cannulation for blood tests or treatment is a common, often painful, procedure. Vapocoolant sprays or \"cold sprays\" are delivered onto the skin just before needle insertion to provide some pain relief. Vapocoolants offer several advantages over other pain relief techniques, particularly their rapid effects (a few seconds). We reviewed the evidence showing how effective vapocoolants are in reducing the pain associated with inserting an intravenous cannula. The evidence is current to May 2015. Results We identified nine studies of 1070 participants that compared use of vapocoolants with use of placebo spray, or no spray, in children and adults undergoing intravenous cannulation in any healthcare setting. Investigators in three studies received funding from a source not reported to be involved in the study design and analysis. Vapocoolant manufacturers provided vapocoolant and placebo sprays for two studies, and were not involved in study design nor in analysis of results. We found that vapocoolants are likely to reduce pain during intravenous cannulation and are not likely to make cannulation more difficult nor cause serious adverse events. We noted that application of vapocoolants caused some discomfort, but that using the spray resulted in reduced pain. Using a pain score range from 0 to 100 mm (0 = no pain and 100 = worst possible pain), we found that average pain scores were reduced by 12.5 mm in participants receiving vapocoolant spray. Quality of the evidence Overall, the quality of the evidence was moderate rather than high. However, excluding studies of poorer quality did not materially alter the results of the review.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 304, "title": "Dolor del recién nacido expuesto a procedimientos de enfermería en la unidad de neonatología de un hospital clínico chileno", "authors": "San Martín, Daniela; Valenzuela, Sandra; Huaiquian, Julia et al.", "journal": "Enferm Global", "year": "2017", "vol": "16(4):1-12", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 283, "title": "Dimensioning of painful procedures and interventions for acute pain relief in premature infants", "authors": "Bonutti, Deise Petean; Daré, Mariana Firmino; Castral, Thaíla Corrêa et al.", "journal": "Rev. latinoam. enferm. (Online)", "year": "2017", "vol": "25:e2917-e2917", "doi": "10.1590/1518-8345.1387.2917", "abstract": "ABSTRACT  Objective: to dimension the exposure of premature infants to painful procedures, relating the distribution of the exposure to contextual factors, as well as to describe the pharmacological and non-pharmacological interventions health professionals use during the first two weeks of the infant's hospitalization at two neonatal services.  Method: descriptive-exploratory study in which the professionals registered the painful procedures and pain relief interventions on a specific form in the patient file.  Results: the daily average of the 89 premature infants was 5.37 painful procedures, corresponding to 6.56 during the first week of hospitalization and 4.18 during the second week (p&lt;0.0001). The most frequent procedures were nasal/oral (35.85%) and tracheal aspirations (17.17%). The children under invasive ventilation were the most exposed to painful procedures (71.2%). Only 44.9% of the painful procedures received some intervention for the purpose of pain relief, the most frequent being sucrose (78.21%) and continuing sedation (19.82%).  Conclusion: acute pain was undertreated at these neonatal services, recommending greater sensitization of the team for the effective use of the existing protocol and implementation of other knowledge transfer strategies to improve neonatal pain management.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 282, "title": "Breast-Feeding Analgesia in Infants: An Update on the Current State of Evidence.", "authors": "Benoit, Britney; Martin-Misener, Ruth; Latimer, Margot et al.", "journal": "The Journal of perinatal & neonatal nursing", "year": "2017", "vol": "31(2):145-159", "doi": "10.1097/JPN.0000000000000253", "abstract": "To provide an updated synthesis of the current state of the evidence for the effectiveness of breast-feeding and expressed breast milk feeding in reducing  procedural pain in preterm and full-term born infants. A systematic search of key  electronic databases (PubMed, CINAHL, EMBASE) was completed. Of the 1032  abstracts screened, 21 were found eligible for inclusion. Fifteen studies  reported on the use of breast-feeding or expressed breast milk in full-term  infants and 6 reported on preterm infants. Direct breast-feeding was more  effective than maternal holding, maternal skin-to-skin contact, topical  anesthetics, and music therapy, and was as or more effective than sweet tasting  solutions in full-term infants. Expressed breast milk was not consistently found  to reduce pain response in full-term or preterm infants. Studies generally had  moderate to high risk of bias. There is sufficient evidence to recommend direct  breast-feeding for procedural pain management in full-term infants. Based on  current evidence, expressed breast milk alone should not be considered an  adequate intervention.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 269, "title": "Pain Control Interventions in Preterm Neonates: A Randomized Controlled Trial.", "authors": "Shukla, Vivek V.; Bansal, Satvik; Nimbalkar, Archana et al.", "journal": "Indian pediatrics", "year": "2018", "vol": "55(4):292-296", "doi": "", "abstract": "OBJECTIVE: To compare individual efficacy and additive effects of pain control interventions in preterm neonates. DESIGN: Randomized controlled trial. SETTING:  Level-3 University affiliated neonatal intensive care unit. PARTICIPANTS: 200  neonates (26-36 wk gestational age) requiring heel-prick for bedside glucose  assessment. Exclusion criteria were neurologic impairment and critical illness  precluding study interventions. INTERVENTION: Neonates were randomly assigned to  Kangaroo mother care with Music therapy, Music therapy, Kangaroo Mother care or  Control (no additional intervention) groups. All groups received expressed breast  milk with cup and spoon as a baseline pain control intervention. MAIN OUTCOME  MEASURES: Assessment of pain using Premature Infant Pain Profile (PIPP) score on  recorded videos. RESULTS: The mean (SD) birth weight and gestational age of the  neonates was 1.9 (0.3) kg and 34 (2.3) wk, respectively. Analysis of variance  showed significant difference in total PIPP score across groups (P<0.001).  Post-hoc comparisons using Sheffe's test revealed that the mean (SD) total PIPP  score was significantly lower in Kangaroo mother care group [7.7 (3.9) vs. 11.5  (3.4), 95% CI(-5.9, -1.7), P<0.001] as well as Kangaroo mother care with Music  therapy group [8.5 (3.2) vs. 11.5 (3.4), 95%CI (-5.1, -0.9), P=0.001] as compared  to Control group. PIPP score was not significantly different between Control  group and Music therapy group. CONCLUSIONS: Kangaroo mother care with and without  Music therapy (with expressed breast milk) significantly reduces pain on  heel-prick as compared to expressed breast milk alone. Kangaroo mother care with  expressed breast milk should be the first choice as a method for pain control in  preterm neonates.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 263, "title": "Paediatric Pain Medicine: Pain Differences, Recognition and Coping Acute Procedural Pain in Paediatric Emergency Room.", "authors": "Pancekauskaitė, Gabija; Jankauskaitė, Lina", "journal": "Medicina (Kaunas, Lithuania)", "year": "2018", "vol": "54(6):nan", "doi": "10.3390/medicina54060094", "abstract": "Paediatric pain and its assessment and management are challenging for medical professionals, especially in an urgent care environment. Patients in a paediatric  emergency room (PER) often undergo painful procedures which are an additional  source of distress, anxiety, and pain. Paediatric procedural pain is often  underestimated and neglected because of various myths, beliefs, and difficulties  in its evaluation and treatment. However, it is very different from other origins  of pain as it can be preventable. It is known that neonates and children can feel  pain and that it has long-term effects that last through childhood into  adulthood. There are a variety of pain assessment tools for children and they  should be chosen according to the patient's age, developmental stage,  communication skills, and medical condition. Psychological factors such as PER  environment, preprocedural preparation, and parental involvement should also be  considered. There are proven methods to reduce a patient's pain and anxiety  during different procedures in PER. Distraction techniques such as music,  videogames, virtual reality, or simple talk about movies, friends, or hobbies as  well as cutaneous stimulation, vibration, cooling sprays, or devices are  effective to alleviate procedural pain and anxiety. A choice of distraction  technique should be individualized, selecting children who could benefit from  nonpharmacological pain treatment methods or tools. Nonpharmacological pain  management may reduce dosage of pain medication or exclude pharmacological pain  management. Most nonpharmacological treatment methods are cheap, easily  accessible, and safe to use on every child, so it should always be a first choice  when planning a patient's care. The aim of this review is to provide a summary of  paediatric pain features, along with their physiology, assessment, management,  and to highlight the importance and efficacy of nonpharmacological pain  management in an urgent paediatric care setting.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 315, "title": "Uso de métodos frente al dolor durante la venopunción en niños", "authors": "Castro Cuervo, Coral; Sanchez Alonso, Paula", "journal": "Nure Investigación", "year": "2016", "vol": "83:nan", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 331, "title": "Medidas não farmacológicas no manejo da dor em recém-nascido: cuidado de enfermagem", "authors": "Morais, Ana Paula da Silva; Façanha, Silvania Moreira de Abreu; Rabelo, Sarah Nogueira et al.", "journal": "Rev RENE", "year": "2016", "vol": "17(3):435-442", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E9 — Texto completo no disponible", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 362, "title": "Music and 25% glucose pain relief for the premature infant: a randomized clinical trial", "authors": "Cardoso, Maria Vera Lúcia Moreira Leitão; Farias, Leiliane Martins; Melo, Gleicia Martins de", "journal": "Rev. latinoam. enferm. (Online)", "year": "2014", "vol": "22(5):810-818", "doi": "10.1590/0104-1169.0029.2484", "abstract": "OBJECTIVE: to analyze the total Premature Infant Pain Profile scores of premature infants undergoing arterial puncture during music and 25% glucose interventions, and to assess their association with neonatal and therapeutic variables. METHOD: a randomized clinical trial with 80 premature infants; 24 in the Experimental Group 1 (music), 33 in the Experimental Group 2 (music and 25% glucose), 23 in the Positive Control Group (25% glucose). All premature infants were videotaped and a lullaby was played for ten minutes before puncture in Experimental Groups 1 and 2; 25% glucose administered in Experimental Group 2 and the Positive Control Group two minutes before puncture. RESULTS: 60.0% of premature infants had moderate or maximum pain; pain scores and intervention groups were not statistically significant. Statistically significant variables: Experimental Group 1: head and chest circumference, Apgar scores, corrected gestational age; Experimental Group 2: chest circumference, Apgar scores, oxygen therapy; Positive Control group: birth weight, head circumference. CONCLUSION: neonatal variables are associated with pain in premature infants. Brazilian Registry of Clinical Trials: UTN: U1111-1123-4821. .", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "INCLUIR", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 113, "title": "Pediatric Pain Remains Undertreated.", "authors": "Beal, Judy A.", "journal": "MCN. The American journal of maternal child nursing", "year": "2021", "vol": "46(5):300", "doi": "10.1097/NMC.0000000000000745", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 108, "title": "Construção de um bundle para alívio da dor na punção arterial norteado pela Tradução do Conhecimento", "authors": "Uema, Roberta Tognollo Borotta; Shibukawa, Bianca Machado Cruz; Rissi, Gabrieli Patricio et al.", "journal": "Esc. Anna Nery Rev. Enferm", "year": "2022", "vol": "26:e20220181-e20220181", "doi": "10.1590/2177-9465-ean-2022-0181pt", "abstract": "RESUMO  Objetivo descrever o processo de construção e estratégias de implementação de um bundle para alívio da dor durante a punção arterial do bebê hospitalizado.  Métodos estudo de abordagem qualitativa feito em uma unidade de terapia intensiva neonatal, por meio de rodas de conversa realizadas com a equipe de enfermagem. A coleta dos dados ocorreu de fevereiro a maio de 2019.  Resultados os encontros levaram à construção de um bundle composto por quatro itens, formatado ludicamente e que deveria ser anexado à incubadora, previamente à realização da punção.  Conclusões e Implicações para a prática o processo estimulou a reflexão crítica acerca da própria prática e os profissionais referiram ao uso do bundle como algo possível dentro da unidade, mediante um planejamento para sua inclusão na rotina assistencial. O estudo é pioneiro e apresenta caráter de inovação ao utilizar o bundle para aliviar algo multifacetado como a dor no período neonatal. Apesar de ser algo criado especificamente para a punção arterial, o mesmo pode ser aplicado em demais procedimentos que potencialmente geram dor aguda, uma vez que o foco principal é sempre minimizar o desconforto sentido pelo bebê.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 93, "title": "Water for wound cleansing", "authors": "Fernandez, R; Green, HL; Griffiths, R et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2022", "vol": "(9):nan", "doi": "10.1002/14651858.CD003861.pub4", "abstract": "Abstract - Background Although various solutions have been recommended for cleansing wounds, normal saline is favoured as it is an isotonic solution and is not thought to interfere with the normal healing process. Tap water is commonly used in community settings for cleansing wounds because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. Objectives To assess the effects of water for wound cleansing. Search methods For this fifth update, in May 2021 we searched the Cochrane Wounds Specialised Register; the Cochrane Central Register of Controlled Trials (CENTRAL); Ovid MEDLINE; Ovid Embase and EBSCO CINAHL Plus. We also searched clinical trials registries for ongoing and unpublished studies, and scanned reference lists of relevant included studies as well as reviews, meta‐analyses and health technology reports to identify additional studies. There were no restrictions with respect to language, date of publication or study setting. Selection criteria We included all randomised controlled trials (RCTs) that assessed wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). For this update, we excluded quasi‐RCTs, thereby removing some studies which had been included in the previous version of the review. Data collection and analysis Two review authors independently carried out trial selection, data extraction and GRADE assessment of the certainty of evidence. Main results We included 13 trials in this update including a total of 2504 participants ranging in age from two to 95 years. Participants in the trials experienced open fractures, surgical wounds, traumatic wounds, anal fissures and chronic wounds. The trials were conducted in six different countries with the majority conducted in India and the USA. Three trials involving 148 participants compared cleansing with tap water with no cleansing. Eight trials involving 2204 participants assessed cleansing with tap water compared with cleansing with normal saline. Two trials involving 152 participants assessed cleansing with distilled water compared with cleansing with normal saline.  One trial involving 51 participants also assessed cleansing with cooled boiled water compared with cleansing with normal saline, and cleansing with distilled water compared with cleansing with cooled boiled water. Wound infection:  no trials reported on wound infection for the comparison cleansing with tap water versus no cleansing. For all wounds, eight trials found the effect of cleansing with tap water compared with normal saline is uncertain (risk ratio (RR) 0.84, 95% confidence interval (CI) 0.59 to 1.19); very low‐certainty evidence. Two trials comparing the use of distilled water with normal saline for cleansing open fractures found that the effect on the number of fractures that were infected is uncertain (RR 0.70, 95% CI 0.45 to 1.09); very low‐certainty evidence. One trial compared the use of cooled boiled water with normal saline for cleansing open fractures and found that the effect on the number of fractures infected is uncertain (RR 0.83, 95% CI 0.37 to 1.87); very low‐certainty evidence. This trial also compared the use of distilled water with cooled boiled water and found that the effect on the number of fractures infected is uncertain (RR 0.59, 95% CI 0.24 to 1.47); very low‐certainty evidence. Wound healing:  results from three trials comparing the use of tap water with no wound cleansing demonstrated there may be little or no difference in the number of wounds that did not heal between the groups (RR 1.04, 95% CI 0.95 to 1.14); low‐certainty evidence. The effect of tap water compared with normal saline is uncertain; two trials were pooled (RR 0.57, 95% CI 0.30 to 1.07) but the certainty of the evidence is very low. Results from one study comparing the use of distilled water with normal saline for cleansing open fractures found that there may be little or no difference in the number of fractures that healed (RR could not be estimated, all wounds healed); the certainty of the evidence is low. Reduction in wound size:  the effect of cleansing with tap water compared with normal saline on wound size reduction is uncertain (RR 0.97, 95% CI 0.56 to 1.68); the certainty of the evidence is very low. Rate of wound healing:  the effect of cleansing with tap water compared with normal saline on wound healing rate is uncertain (mean difference (MD) ‐3.06, 95% CI ‐6.70 to 0.58); the certainty of the evidence is very low. Costs:  two trials reported cost analyses but the cost‐effectiveness of tap water compared with the use of normal saline is uncertain; the certainty of the evidence is very low. Pain:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in pain scores. The certainty of the evidence is low. Patient satisfaction:  results from one study comparing the use of tap water with no cleansing for acute and chronic wounds showed that there may be little or no difference in patient satisfaction .  The certainty of evidence is low. The effect of cleansing with tap water compared with normal saline is uncertain as the certainty of the evidence is very low. Authors' conclusions All the evidence identified in the review was low or very low certainty. Cleansing with tap water may make little or no difference to wound healing compared with no cleansing; there are no data relating to the impact on wound infection. The effects of cleansing with tap water, cooled boiled water or distilled water compared with cleansing with saline are uncertain, as is the effect of distilled water compared with cooled boiled water. Data for other outcomes are limited across all the comparisons considered and are either uncertain or suggest that there may be little or no difference in the outcome. Plain language summary The effects of water compared with other solutions for wound cleansing Background Infection can interfere with the normal wound‐healing process. In order to reduce the risk of infection, wounds are routinely cleansed to remove dirt, contamination or impurities. In this review, a wound is defined as a break in the skin. What is the aim of this review? The aim of this review was to investigate the effects of wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). We measured effectiveness by looking at wound‐related infection rate and wound healing. Researchers from Cochrane searched for all randomised controlled trials (RCTs) relating to this question and found 13 relevant studies. RCTs are studies where people are chosen at random to receive different treatments. Allocating participants in this way provides the most reliable evidence about possible relationships between the treatment used and any reported health outcomes. Key messages We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction. What was studied in the review? Wounds are commonly cleansed to prevent infection. The cleansing solution can be tap water, distilled water, cooled boiled water or saline. Tap water is commonly used in the community because it is easily accessible, efficient and cost‐effective; however, there is an unresolved debate about its use. We compared the effects of cleansing wounds with water with other types of water, normal saline and no cleansing. We included all RCTs that compared wound cleansing using different types of water (e.g. tap water, distilled, boiled) compared with no cleansing or with other solutions (e.g. normal saline). Participants were from any age group and any setting e.g. hospital, community, nursing homes, general practice, wound clinics. We excluded trials that compared solutions for dental procedures or for patients with burns. What are the main results of the review? We included results from 13 RCTs in this review, with a combined total of 2504 participants. The participants were adults or children with a range of different types of wounds who were treated in the community, emergency departments or hospital wards. Eight trials assessed cleansing with tap water compared with cleansing with normal saline. Three trials compared cleansing with tap water with no cleansing. Two trials assessed cleansing with distilled water compared with cleansing with normal saline, one trial also assessed cleansing with cooled boiled water with cleansing with normal saline and cleansing with distilled water compared with cleansing with cooled boiled water.  We compared wound cleansing with tap water, distilled water, cooled boiled water or saline with each other or with no cleansing. It is unclear if any of these interventions have an effect on the number of wounds which become infected. It is also unclear if they have an effect on healing (number of wounds healed; change in wound size; and rate of wound healing); costs; pain; or patient satisfaction.  We are unsure if the interventions have an effect because not enough participants received each intervention to reliably assess their effects. The way that the studies were designed and conducted also means that the results may not reliably reflect the effects of the interventions. This is partly due to uncertainty over how participants were assigned to the treatments. It is also possible that many participants and healthcare professionals were aware of which treatments were being used. How up to date is this review? We searched for studies that had been published up to 20 May 2021.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 109, "title": "Error traps in acute pain management in children.", "authors": "Vecchione, Tricia M.; Agarwal, Rita; Monitto, Constance L.", "journal": "Paediatric anaesthesia", "year": "2022", "vol": "32(9):982-992", "doi": "10.1111/pan.14514", "abstract": "Providing effective acute pain management to hospitalized children can help improve outcomes, decrease length of stay, and increase patient and parental  satisfaction. Error traps (circumstances that lead to erroneous actions or  undesirable consequences) can result in inadequately controlled pain, unnecessary  side effects, and adverse events. This article highlights five error traps  encountered when managing acute pain in children. They include failure to  appropriately assess pain, optimally utilize regional anesthesia, select suitable  systemic analgesics, identify and treat medication-related side effects, and  consider patient characteristics when choosing medication or dosing route. These  issues are easily addressed when the clinician is cognizant of ways to  anticipate, identify, and mitigate or avoid these errors.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 110, "title": "NIH's Helping to End Addiction Long-term(SM) Initiative (NIH HEAL Initiative) Clinical Pain Management Common Data Element Program.", "authors": "Wandner, Laura Dover; Domenichiello, Anthony F.; Beierlein, Jennifer et al.", "journal": "The journal of pain", "year": "2022", "vol": "23(3):370-378", "doi": "10.1016/j.jpain.2021.08.005", "abstract": "The Helping to End Addiction Long-term Initiative (NIH HEAL Initiative) is an aggressive trans-NIH effort to speed solutions to stem the national opioid public  health crisis, including through improved pain management. Toward this end, the  NIH HEAL Initiative launched a common data element (CDE) program to ensure that  NIH-funded clinical pain research studies would collect data in a standardized  way. NIH HEAL Initiative staff launched a process to determine which pain-related  core domains should be assessed by every clinical pain study and what  questionnaires are required to ensure that the data is collected uniformly. The  process involved multiple literature reviews, and consultation with experts  inside and outside of NIH and the investigators conducting studies funded by the  initiative. Ultimately, 9 core pain domains, and questionnaires to measure them,  were chosen for studies examining acute pain and chronic pain in adults and  pediatric populations. These were augmented with dozens of study-specific  supplemental questionnaires to enable uniform data collection methods of outcomes  outside of the core domains. The selection of core domains will ensure that  valuable clinical pain data generated by the initiative is standardized, useable  for secondary data analysis, and useful for guiding future research, clinical  practice decisions, and policymaking. PERSPECTIVE: The NIH HEAL Initiative  launched a common data element program to ensure that NIH-funded clinical pain  research studies would collect data in a standardized way. Nine core pain domains  and questionnaires to measure them were chosen for studies examining acute pain  and chronic pain in adults and pediatric populations.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 9, "title": "Multisensory stimulation to reduce procedural pain in retinopathy of prematurity: A randomized controlled trial.", "authors": "Tasdemir, Halil Ibrahim", "journal": "Nursing in critical care", "year": "2025", "vol": "30(4):e13200", "doi": "10.1111/nicc.13200", "abstract": "BACKGROUND: Retinopathy is frequently seen in the neonatal intensive care unit (NICU), and its examination is a painful procedure for infants. AIM: This  randomized active-controlled trial aimed to investigate the impact of  multisensory stimulation (MSS) on neonatal pain during retinopathy of prematurity  (ROP) examinations, in comparison with a white noise (WN) and control group  receiving standard care. STUDY DESIGN: Conducted as a three-arm, randomized  controlled trial, the study was implemented in the NICU of a local university  hospital. Recruitment spanned from July 2023 to November 2023, with preterm  infants (gestational age < 37 weeks) randomly assigned to either a MSS, WN or a  control group. MSS components included visual, auditory, tactile, olfactory and  gustatory stimuli, all designed to create a synergistic, comforting environment  for the infant during the procedure. Procedural pain, heart rate and oxygen  saturation were assessed at various stages before and after ROP examinations.  RESULTS: Analysis of 90 participants revealed that the MSS group exhibited lower  Premature Infant Pain Profile (PIPP) scores than the WN and control groups (mean  difference: -2.12, 95% confidence interval [CI]: -2.62 to -1.62; odds ratio [OR]:  0.004, 95% CI [0.001, 0.012], p < 0.001). Additionally, heart rates were  significantly lower in the MSS group (mean difference: -15.3 beats/min, 95% CI:  -20.5 to -10.1; OR: 0.025, 95% CI [0.008, 0.073], p < .001) and oxygen saturation  levels were higher (mean difference: 3.2%, 95% CI: 1.8% to 4.6%; OR: 1.12, 95% CI  [1.05, 1.20], p < .001) than in the other groups. CONCLUSIONS: MSS emerges as a  favourable, safe and non-pharmacological intervention for pain management in ROP  and similar procedures. RELEVANCE TO CLINICAL PRACTICE: Multisensory stimulation  can be effectively integrated into the routine care provided by critical care  nurses during retinopathy of prematurity examinations in preterm infants. This  non-pharmacological intervention offers a practical approach for critical care  nurses to reduce procedural pain and improve physiological stability in this  vulnerable population.", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 118, "title": "Cognitive Behavior Therapy Tailored to Anxiety Symptoms Improves Pediatric Functional Abdominal Pain Outcomes: A Randomized Clinical Trial.", "authors": "Cunningham, Natoshia R; Kalomiris, Anne; Peugh, James et al.", "journal": "J Pediatr", "year": "2021", "vol": "230:62-70.e3", "doi": "10.1016/j.jpeds.2020.10.060", "abstract": "OBJECTIVES: To evaluate the feasibility of a stepped care model, and establish the effect of a tailored cognitive behavioral therapy, the Aim to Decrease Anxiety and Pain Treatment (ADAPT), compared with standard medical treatment as usual on pain-related outcomes and anxiety. STUDY DESIGN: Eligible patients between the ages of 9 and 14 years with functional abdominal pain disorders (n = 139) received enhanced usual care during their medical visit to a gastroenterologist. Those that failed to respond to enhanced usual care were randomized to receive either a tailored cognitive behavioral therapy (ADAPT) plus medical treatment as usual, or medical treatment as usual only. ADAPT dose (4 sessions of pain management or 6 sessions of pain and anxiety management) was based on presence of clinically significant anxiety. Outcomes included feasibility, based on recruitment and retention rates. Response to ADAPT plus medical treatment as usual vs medical treatment as usual on pain-related outcomes and anxiety measures was also investigated using a structural equation modeling equivalent of a MANCOVA. Anxiety levels and ADAPT dose as moderators of treatment effects were also explored. RESULTS: Based on recruitment and retention rates, stepped care was feasible. Enhanced usual care was effective for only 8% of youth. Participants randomized to ADAPT plus medical treatment as usual showed significantly greater improvements in pain-related disability, but not pain levels, and greater improvements in anxiety symptoms compared with those randomized to medical treatment as usual only. Anxiety and ADAPT treatment dose did not moderate the effect of treatment on disability nor pain. CONCLUSIONS: Tailoring care based on patient need may be optimal for maximizing the use of limited psychotherapeutic resources while enhancing care. TRIAL REGISTRATION: ClinicalTrials.gov: NCT03134950.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 10, "title": "Strategies to minimize procedure-related pain and anxiety: lessons from pediatric dermatology.", "authors": "Abouchaleh, Nadine; Bayart, Cheryl", "journal": "Current opinion in pediatrics", "year": "2024", "vol": "36(4):406-410", "doi": "10.1097/MOP.0000000000001371", "abstract": "PURPOSE OF REVIEW: Recent studies have suggested that prolonged or repeated episodes of general anesthesia early in childhood may adversely affect  neurodevelopment. This, combined with rising healthcare costs and decreasing  access, has sparked interest in performing pediatric procedures in the office  setting when possible. It is essential to address the physical and psychological  discomfort that often accompany this experience, particularly in children. RECENT  FINDINGS: Healthcare providers performing procedures on children can draw from a  spectrum of established techniques, new technology, and novel use of medications  to decrease peri-procedural pain and anxiety. These techniques include  distraction, optimization of local anesthesia, and mild to moderate sedation.  SUMMARY: We recommend using a combination of techniques to minimize pain and  anxiety to improve safety, decrease healthcare costs, improve patient experience,  and prevent childhood trauma and persistent negative perception of the healthcare  system.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 8, "title": "Acceptability and Usability of Smileyscope Virtual Reality for Paediatric Pain Management During Burn Procedures: Perspectives of Patients, Carers and  Clinicians.", "authors": "Storey, Kristen; Dimanopoulos, Tanesha A.; Plummer, Karin et al.", "journal": "Journal of advanced nursing", "year": "2025", "vol": "81(3):1568-1582", "doi": "10.1111/jan.16417", "abstract": "AIM: To explore clinician, child and parent acceptability and usability of the Smileyscope VR device in the context of addressing the unique pain and distress  needs of young burn patients. DESIGN: A survey comprising closed and open-ended  questions. METHOD: Descriptive statistics analysed participant characteristics,  pain and analgesia. Qualitative content was collected from April 2022-August 2022  and analysed to identify barriers and enablers. Categories were then mapped onto  the Capabilities, Opportunities and Motivation-Behaviour Wheel (COM-B) framework.  RESULTS: Smileyscope was found to be effective for reducing pain and anxiety  during dressing changes by both patients (n = 39) and parents (n = 37).  Clinicians (n = 35) reported high self-efficacy and willingness to reuse the  device. However, concerns arose regarding the device's fit and the need for  age-appropriate programmes. CONCLUSION: Smileyscope demonstrated promise in  reducing procedural pain and distress. The device is well accepted by all  participants implying ease of implementation. Feedback suggests further program  development and fitting optimisation is required. IMPLICATIONS FOR THE PROFESSION  AND/OR PATIENT CARE: Improved procedural pain has proven to decrease wound  healing times, decreasing possible need for further scar management and long-term  consequences after sustaining a burn injury. Smileyscope use in rural hospitals  presents valuable opportunities for optimising early paediatric burn pain.  IMPACT: Increased burn pain can delay wound healing and have long term physical  and psychological impact on patients. Smileyscope was well received within this  cohort; however, improvements in device design and programmes were suggested.  This study shows the potential for use of Smileyscope as a non-pharmacological  approach to improving paediatric burn pain and distress. PATIENT OR PUBLIC  CONTRIBUTION: While our study included patients, parents and clinicians as  research participants, there was no patient or public contribution in the design  or conduct of the study, analysis or interpretation of the data.", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 33, "title": "Management of Procedural Pain and Anxiety in Youth With Autism Spectrum Disorder: A Scoping Review.", "authors": "Leblanc, Laurence; Genest, Christine; Villemaire, Jade et al.", "journal": "Pain management nursing : official journal of the American Society of Pain Management Nurses", "year": "2024", "vol": "25(3):265-284", "doi": "10.1016/j.pmn.2024.02.004", "abstract": "BACKGROUND: Although there is a body of literature on the implementation of interventions to manage procedural pain and anxiety in youth with autism spectrum  disorders (ASD), we found no literature presenting the current state of knowledge  on this topic. OBJECTIVES: To review the state of knowledge on interventions for  the management of procedural pain and anxiety in children and adolescents with  ASD. METHOD: A scoping review using PRISMA-ScR was conducted. DATA SOURCES:  PubMed, MEDLINE, all EBM reviews, Embase, APA PsychInfo, EBSCO CINAHL, and  ProQuest Dissertations and Theses Global databases were searched. Gray literature  was also searched. ANALYSIS METHOD: Braun and Clarke's (2006) model for thematic  analysis in psychology was used to synthesize the search results. RESULTS: Thirty  articles were selected. Analysis of the extracted data revealed four elements of  intervention for better management of procedural pain and anxiety in the study  population: 1) characteristics of the procedure and the immediate environment; 2)  parent-child interactions; 3) health care provider-child interactions; and 4)  direct pharmacological and nonpharmacological interventions. IMPLICATIONS FOR  NURSING PRACTICE: Nurses must be able to implement appropriate interventions for  the management of procedural pain and anxiety in youth with an autism spectrum  disorder.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 29, "title": "Parenting pain away: Quasi-experimental study of an eHealth learning platform to evaluate acceptability, feasibility, and utilisation of parent-led pain  management.", "authors": "Hughes, Brianna; Martin-Misener, Ruth; Latimer, Margot et al.", "journal": "Scandinavian journal of caring sciences", "year": "2024", "vol": "38(4):960-972", "doi": "10.1111/scs.13297", "abstract": "AIM: To evaluate the impact of an eHealth educational resource about infant procedural pain management, given during the prenatal period, on feasibility,  acceptability, knowledge, self-efficacy, and involvement. BACKGROUND: Routine  health care requires newborns to have painful procedures (e.g., intramuscular  injection). The impacts of untreated pain in neonates are widely recognised but  adoption of effective procedural pain management strategies in clinical practice  varies. There is clear evidence supporting the effectiveness of parent-led pain  management during procedures (e.g., skin-to-skin care) and reputable resources to  raise awareness among parents are warranted. Our team co-created Parenting Pain  Away, a website to equip parents with evidence to assist with managing the pain  of procedures and empower them to be involved. METHODS: A quasi-experimental  evaluation using a pre/post intervention design with low-risk expectant parents.  RESULTS: Of the 41 participants, before intervention exposure participants were  familiar or had used skin-to-skin care (n = 33), breastfeeding (n = 30) and  sucrose (n = 13) as pain management. Most participants (n = 38) desired more  information on how to be involved. Providing access to Parenting Pain Away during  pregnancy was supported and participants ranked the website above average using  the System Usability Scale. Parenting Pain Away did not have a statistically  significant influence on outcomes. Participants reported variation in clinical  support with parent-led pain management. CONCLUSION: A multifaceted approach is  recommended to maintain infant procedural pain management. IMPLICATIONS FOR THE  PROFESSION AND PATIENT CARE: Equipping parents with knowledge related to infant  pain management using an eHealth approach satisfied their information desires.  The study findings are important considerations for perinatal care providers,  policy makers, and families to finally achieve adequate procedural pain  management. REPORTING METHOD: This study used the STROBE checklist, adhering to  EQUATOR guidelines. PATIENT AND PUBLIC CONTRIBUTION: A stakeholder group  (expectant parents, parents, perinatal researchers, clinicians, and  administrators) was created to inform the study design and intervention.", "dec_r1": "EXCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 47, "title": "Nonpharmacological Interventions to Mitigate Procedural Pain in the NICU: An Integrative Review.", "authors": "Sutton, Rana; Lemermeyer, Gillian", "journal": "Advances in neonatal care : official journal of the National Association of Neonatal Nurses", "year": "2024", "vol": "24(4):364-373", "doi": "10.1097/ANC.0000000000001164", "abstract": "BACKGROUND: Small infants experience a myriad of stimuli while in the Neonatal Intensive Care Unit (NICU), with many being painful or stressful experiences,  although medically necessary. PURPOSE: To determine what is known about  nonpharmacological developmental care interventions used in the NICU to mitigate  procedural pain of infants born under 32 weeks gestation. SEARCH/STRATEGY: Five  electronic databases were searched: Medline, CINAHL, Scopus, Embase and the  Cochrane Library. The inclusion criteria were as follows: experimental and  nonexperimental studies from all publication years with infants born at less than  32 weeks gestational age; peer-reviewed research articles studying  nonpharmacological interventions such as skin-to-skin care, facilitated tucking,  nonnutritive sucking, hand hugs, and swaddling; and English language articles.  Our search yielded 1435 articles. After the elimination of 736 duplicates, a  further 570 were deemed irrelevant based on their abstract/titles. Then, 124  full-text articles were analyzed with our inclusion and exclusion criteria.  FINDINGS: Twenty-seven studies were reviewed. Sucrose, facilitated tucking,  pacifier, skin-to-skin care, and human milk appeared to lessen pain experienced  during heel sticks, suctioning, nasogastric tube insertions, and echocardiograms.  All nonpharmacological interventions failed to prove efficacious to adequately  manage pain during retinopathy of prematurity (ROP) examinations. IMPLICATIONS  FOR PRACTICE: Evidence review demonstrates that healthcare practitioners should  use nonpharmacological measures to help prevent pain from day-to-day procedures  in the NICU including heel sticks, nasogastric tube insertions, suctioning,  echocardiograms, and subcutaneous injections. IMPLICATIONS FOR RESEARCH: Future  research is necessary to better understand and measure how pain is manifested by  very small premature infants. Specific research on mitigating the pain of  examinations for retinopathy of prematurity is also needed.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 58, "title": "Development, evaluation and adaptation of a critical realism informed theory of procedural pain management in preterm infants: The PAIN-Neo theory.", "authors": "De Clifford-Faugère, Gwenaëlle; Aita, Marilyn; Arbour, Caroline et al.", "journal": "Journal of advanced nursing", "year": "2023", "vol": "79(6):2155-2166", "doi": "10.1111/jan.15525", "abstract": "AIM: To present the development, evaluation and adaptation of the PAIN-Neo theory. DESIGN: Theory development. DATA SOURCES: A review of literature was  conduct from 1980 to 2021. RESULTS: Using a critical realism paradigm, this paper  presents the PAIN-Neo theory, which was developed from an analysis of existing  theoretical perspectives on paediatric procedural pain, empirical studies  conducted with preterm infants, and the research team's pain management  expertise. The theory was then empirically tested and fine-tuned. IMPLICATIONS  FOR NURSING: The PAIN-Neo theory highlights that the neonatal nurse is part of a  larger picture as she is influenced by factors related to her unit, hospital and  country of practice. This theory emphasizes the importance of parental  involvement in pain management, which is consistent with family-centred nursing  practices. CONCLUSION: The PAIN-Neo theory reflects the complexity of pain  management nursing. This theory is innovative and specific enough to guide  practice, structure research projects and contribute to the body of knowledge in  the discipline of nursing.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 246, "title": "Percepción del personal de enfermería sobre el manejo del dolor en neonatos", "authors": "Collados-Gómez, L; Camacho-Vicente, V; Gonzalez-Villava, M et al.", "journal": "Enferm Intensiva", "year": "2018", "vol": "29(1):41-47", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E2 — Neonatos en UCI neonatal", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 245, "title": "The pain of children with sickle cell disease: the nursing approach.", "authors": "Campelo, Lívia Maria Nunes; Oliveira, Nayara Fernandes; Magalhães, Juliana Macêdo et al.", "journal": "Rev Bras Enferm", "year": "2018", "vol": "71(suppl 3):1381-1387", "doi": "10.1590/0034-7167-2016-0648", "abstract": "OBJECTIVE: To describe how nurses identify the pain in children with sickle cell disease (SCD) and to list the strategies used by them in the evaluation and control of pain. METHOD: This is a qualitative, descriptive and exploratory research, performed through semi-structured interviews with 13 nurses. The interviews were transcribed and after this process the qualitative data were organized according to thematic analysis. RESULTS: This study showed that the nurses can identify pain in children with SCD from the signals they emit, such as: constant crying, restlessness, facial expressions and verbal reports. Pain is difficult to evaluate due to the lack of instruments, such as a pain scale. For pain control they use emotional support, promotion of comfort and the administration of drugs prescribed by the doctor. FINAL CONSIDERATIONS: The nurses recognize the pain of the child and use pharmacological and non-pharmacological methods to control it but have difficulties to assess it.", "dec_r1": "EXCLUIR", "mot_r1": "E1 — Población oncológica", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 244, "title": "The Feasibility of Using the BrightHearts Biofeedback-Assisted Relaxation Application for the Management of Pediatric Procedural Pain: A Pilot Study.", "authors": "Burton, Karen L. O.; Morrow, Angela M.; Beswick, Brooke V. et al.", "journal": "Pain practice : the official journal of World Institute of Pain", "year": "2018", "vol": "18(8):979-987", "doi": "10.1111/papr.12696", "abstract": "OBJECTIVE: The objective of this pilot study was to assess the acceptability and feasibility of using BrightHearts, a biofeedback-assisted relaxation application  (app), in children undergoing painful procedures. METHODS: Thirty children 7 to  18 years of age undergoing a medical procedure (peripheral blood collection,  botulinum toxin injection, or intravenous cannula insertion) participated.  Participants used BrightHearts, a heart rate-controlled biofeedback-assisted  relaxation training app delivered via an iPad with heart rate measured through a  pulse oximeter worn on the ear or thumb. Feasibility was assessed through  observations and patient, parent/carer, and healthcare professional feedback.  Patient, parent/carer, and healthcare professional satisfaction with BrightHearts  was rated using investigator-developed surveys. RESULTS: Eighty-three percent of  child participants reported that they found BrightHearts helpful during the  procedure and that they would use BrightHearts again. All parents and 96% of  healthcare professionals indicated they would use BrightHearts again. Sixty-four  percent of healthcare providers perceived that BrightHearts assisted with the  ease of performing the procedure. Qualitative analyses found 2 themes: (1)  BrightHearts calms through providing distraction and biofeedback and (2) the  impact of BrightHearts on the procedure. CONCLUSIONS: This pilot study  demonstrates the feasibility of using biofeedback-assisted relaxation delivered  via the BrightHearts app in children undergoing peripheral blood collection and  cannulation. Future studies are required to evaluate BrightHearts' efficacy in  reducing pain and anxiety during painful procedures and distinguish the effects  of a biofeedback-mediated app from distraction.", "dec_r1": "EXCLUIR", "mot_r1": "E7 — Tipo de artículo no válido", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 224, "title": "Tokenism or true partnership: Parental involvement in a child's acute pain care.", "authors": "Vasey, Jackie; Smith, Joanna; Kirshbaum, Marilynne N. et al.", "journal": "Journal of clinical nursing", "year": "2019", "vol": "28(9-10):1491-1505", "doi": "10.1111/jocn.14747", "abstract": "AIMS AND OBJECTIVES: To explore parental involvement in the child's acute pain care and establish ways in which parental preferences for involvement in their  child's care can be identified, facilitated and enhanced by nurses. BACKGROUND:  Despite growing evidence supporting effective acute pain management in children  and the availability of national and international practice guidelines, children  still experience acute pain. Involving parents in their child's pain care has  been identified as being a central tenet of pain management in children. DESIGN  AND METHODS: A qualitative study using an ethnographical approach with  nonparticipant observation and follow-up semi-structured interviews was  undertaken. Nurses (n = 14), parents (n = 41), grandparents (n = 2), other  relative (n = 1) and children (n = 30) participated. The framework approach  underpinned data analysis. Consolidated criteria for reporting qualitative  research (COREQ) enabled comprehensive reporting of the study. RESULTS: Three  concepts emerged from the data: \"parents as advocates for their child,\" \"nurses  promoting involvement and partnership\" and \"nurses unintentionally preventing  involvement and partnership.\" Variations in the way parents were involved in  their child's pain care were identified. Despite family-centred care being the  dominant model of involving families in their child's care, evidence of this  being implemented was limited. Parents attempted to advocate effective pain care  for their child, whether or not they were supported by nurses. CONCLUSIONS:  Parental involvement in their child's acute pain care can improve the child's  pain experience, reduce parental anxiety and increase parents' satisfaction in  care. Nurses aspired to involve parents in pain care, but did not always enact  this in practice. RELEVANCE FOR PRACTICE: Children deserve optimum pain care,  which includes parental involvement. Parental involvement underpinned by the  principles of family-centred care was poorly implemented. Parents attempted to be  involved and advocate for their child's pain care whether or not they were  supported by nurses. An alternative approach for supporting parents to advocate  in their child's acute pain care is offered, the \"Partnership in Pain Care  Model.\"", "dec_r1": "INCLUIR", "mot_r1": "", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 132, "title": "Oxycodone target concentration dosing for acute pain in children.", "authors": "Morse, James D.; Hannam, Jacqueline A.; Anderson, Brian J. et al.", "journal": "Paediatric anaesthesia", "year": "2021", "vol": "31(12):1325-1331", "doi": "10.1111/pan.14282", "abstract": "BACKGROUND: Oxycodone pharmacokinetics have been described in premature neonates through to obese adults. Covariate influences have been accounted for using  allometry (size) and maturation of oxycodone clearance with age. The target  concentration is dependent on pain intensity that may differ over pain duration  or between individuals. METHODS: We assumed a target concentration of  35 mcg.L(-1) (acceptable range ±20%) to be associated with adequate analgesia  without increased risk of adverse effects from respiratory depression.  Pharmacokinetic simulation was used to estimate dose in neonates through to obese  adults given intravenous or parenteral oxycodone. RESULTS: There were 84% of  simulated oxycodone concentrations within the acceptable range during maintenance  dosing. Variability around the simulated target concentration decreased with age.  The maturation of oxycodone clearance is reflected in changes to  context-sensitive halftime where clearance is immature in neonates compared with  older children and adults. The intravenous loading and maintenance doses for a  typical 5-year-old child are 100 mcg.kg(-1) and 33 mcg.kg(-1) .h(-1) . In a  typical adult, the loading dose is 100 mcg.kg(-1) and maintenance dose  23 mcg.kg(-1) .h(-1) . CONCLUSION: Simulation was used to suggest loading and  maintenance doses to attain an oxycodone concentration of 35 mcg.L(-1) predicted  in adults. Although the covariates age and weight contribute 92% variability for  clearance, there remains variability accounting for 16% of concentrations outside  the target range. Duration of analgesic effect after ceasing infusion is  anticipated to be longer in neonates where context-sensitive halftime is greater  than older children and adults.", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 127, "title": "Low-Dose Ketamine Infusion as Adjuvant Therapy during an Acute Pain Crisis in Pediatric Patients.", "authors": "Li, Cecilia; Doellner, Courtney; Leis, Aleda et al.", "journal": "Journal of pain & palliative care pharmacotherapy", "year": "2021", "vol": "35(1):31-37", "doi": "10.1080/15360288.2021.1873216", "abstract": "Recent studies in pediatric patients have suggested that ketamine, an N-methyl-D-aspartate receptor (NMDA) antagonist, given at sub-anesthetic doses  can effectively decrease pain scores, provide analgesic effects, and in some  cases, reduce opioid requirements. Our study aims to assess impact of low-dose  ketamine on reducing pain scores and total opioid requirements during an acute  pain crisis in pediatric patients. From November 2016 to December 2018, eight  patients between the ages of 2 and 17 years admitted to the pediatric intensive  care unit (PICU) were treated with LDK infusions to manage severe,  opioid-refractory, acute pain crises. Subjective pain scores and total morphine  milligram equivalent (MME) intake before, during, and after ketamine infusion  were collected through a structured chart review. Overall, the addition of  ketamine appeared to reduce subjective pain scores and opioid requirements. Two  patients were in palliative care and expired shortly after ketamine was started  and two patients were discharged within 48 hours of LDK infusion cessation.  Ketamine seemed to reduce heart rate and had no appreciable effect on respiratory  rate, blood pressure, or oxygen saturation. Hallucination was reported in one  patient which resolved upon dose reduction. LDK infusion could be considered as  an adjuvant therapy to optimize pain control in pediatric patients experiencing  acute pain crises. Further investigation with a larger patient population is  warranted to establish the effects of LDK on pain improvement and reducing total  opioid requirements.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 82, "title": "Low-dose intranasal dexmedetomidine premedication improves epidural labor analgesia onset and reduces procedural pain on epidural puncture: a prospective  randomized double-blind clinical study.", "authors": "Sun, Hao; Ma, Xiang; Wang, Shengyou et al.", "journal": "BMC anesthesiology", "year": "2023", "vol": "23(1):185", "doi": "10.1186/s12871-023-02146-5", "abstract": "BACKGROUND: Epidural labor analgesia is a safe and effective method of pain management during labor with the drawbacks of delayed onset and maternal distress  during epidural puncture. This study aimed to determine whether pretreatment with  intranasal low-dose dexmedetomidine effectively shortens the onset of analgesia  and reduces procedural pain. METHODS: In this prospective, randomized  double-blind trial, nulliparous patients were randomly assigned to either the  intranasal dexmedetomidine group or the control group. The intranasal  dexmedetomidine group received 0.5 μg/kg dexmedetomidine intranasally, and the  control group received an equal volume of normal saline intranasally. Both groups  were maintained with a programmed intermittent epidural bolus. The primary  outcome was the onset time of analgesia and scores of pain related to the  epidural puncture. RESULTS: Seventy-nine patients were enrolled, and 60 completed  the study and were included in the analysis. The time to achieve adequate  analgesia was significantly shorter in the intranasal dexmedetomidine group than  in the control group (hazard ratio = 2.069; 95% CI, 2.187 to 3.606; P = 0.010).  The visual analogue scale pain scores during epidural puncture in the intranasal  dexmedetomidine group were also significantly lower than those in the control  group (2.0 (1.8-2.5) vs. 3.5 (3.3-4.5), P ≤ 0.001, Table 2). Pretreatment with  intranasal dexmedetomidine before epidural labor analgesia was associated with  improved visual analogue scale pain scores and Ramsay scores, less consumption of  analgesics and higher maternal satisfaction (P < 0.05). No differences were  observed for labor and neonatal outcomes or the incidence of adverse effects  between the two groups. CONCLUSIONS: Pretreatment with intranasal dexmedetomidine  before epidural labor analgesia yielded a faster onset of analgesia and decreased  epidural puncture pain without increasing adverse effects. Pretreatment with  intranasal dexmedetomidine may be a useful adjunct for the initiation of epidural  analgesia, and further investigation should be encouraged to determine its  utility more fully. TRIAL REGISTRATION: This trial was prospectively registered  at Chictr.org.cn on 29/05/2020 with the registration number ChiCTR2000033356 (  http://www.chictr.org.cn/listbycreater.aspx ).", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 72, "title": "Eficacia del óxido nitroso como sedoanalgesia en pacientes pediátricos para procedimientos menores en áreas de hospitalización y urgencias", "authors": "Méndez López, Cathaysa; García Hernández, María Noelia", "journal": "Revista ROL de enfermería", "year": "2023", "vol": "46(5):308-319", "doi": "", "abstract": "", "dec_r1": "EXCLUIR", "mot_r1": "E5 — Intervención no realizada por enfermería", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 91, "title": "Nursing theories developed to meet children's needs: a scoping review", "authors": "Dantas, Ana Márcia Nóbrega; Santos-Rodrigues, Renata Clemente dos; Silva Júnior, José Nildo de Barros et al.", "journal": "Rev. Esc. Enferm. USP", "year": "2022", "vol": "56:e20220151-e20220151", "doi": "10.1590/1980-220x-reeusp-2022-0151en", "abstract": "ABSTRACT  Objective: To map the nursing theories developed to meet children's needs.  Method: The JBI methodology and the PRISMA guided this scoping review. The search took place between October and November 2021, based on the PCC mnemonic: P (Population) - a child aged 0 to 9 years; C (Concept) - nursing theories; C (Context) - nursing.  Results: We identified 2,242 publications and selected 21 manuscripts consisting of nursing theories to meet children's feeding needs, child pain, a child with asthma, diabetes, obesity, epilepsy, Congenital Zika Syndrome, autism spectrum disorder; theory for care in Intensive Care Units; health promotion to premature babies; procedures in Intensive Care Units; theory for nursing diagnosis ineffective breathing pattern in children with congenital heart disease; sleep associated with child development; parent-child interaction; nurse-child relationship; and child's consultation.  Conclusion: The nursing theories mapped have the potential to outline the course of nursing care to children's needs highlighted in the studies that made up the sample.", "dec_r1": "EXCLUIR", "mot_r1": "E4 — Ámbito quirúrgico/UCI", "dec_r2": "DUDOSO", "mot_r2": "", "arb_dec": "", "arb_mot": ""}, {"id": 86, "title": "Paracetamol (acetaminophen) or non‐steroidal anti‐inflammatory drugs, alone or combined, for pain relief in acute otitis media in children", "authors": "de Sévaux, JL.H.; Damoiseaux, RAMJ; van de Pol, AC et al.", "journal": "Cochrane Database of Systematic Reviews", "year": "2023", "vol": "(8):nan", "doi": "10.1002/14651858.CD011534.pub3", "abstract": "Abstract - Background Acute otitis media (AOM) is one of the most common childhood infectious diseases. Pain is the key symptom of AOM and central to children's and parents' experience of the illness. Because antibiotics provide only marginal benefits, analgesic treatment including paracetamol (acetaminophen) and non‐steroidal anti‐inflammatory drugs (NSAIDs) is regarded as the cornerstone of AOM management. This is an update of a review first published in 2016. Objectives Our primary objective was to assess the effectiveness of paracetamol (acetaminophen) or NSAIDs, alone or combined, compared with placebo or no treatment in relieving pain in children with AOM. Our secondary objective was to assess the effectiveness of NSAIDs as compared with paracetamol in children with AOM. Search methods We searched the Cochrane Central Register of Controlled Trials (CENTRAL), Issue 5, April 2023; MEDLINE (Ovid, from 1946 to May 2023), Embase (from 1947 to May 2023), CINAHL (from 1981 to May 2023), LILACS (from 1982 to May 2023), and Web of Science Core Collection (from 1955 to May 2023). We searched the WHO ICTRP and ClinicalTrials.gov for completed and ongoing trials (23 May 2023). Selection criteria We included randomised controlled trials comparing the effectiveness of paracetamol or NSAIDs, alone or combined, for pain relief in non‐hospitalised children aged six months to 16 years with AOM. We also included trials of paracetamol or NSAIDs, alone or combined, for children with fever or upper respiratory tract infections if we were able to extract subgroup data on pain relief in children with AOM either directly or after obtaining additional data from study authors. We extracted and summarised data for the following comparisons: paracetamol versus placebo, NSAIDs versus placebo, NSAIDs versus paracetamol, and NSAIDs plus paracetamol versus paracetamol alone. Data collection and analysis We used standard methodological procedures expected by Cochrane. We rated the overall certainty of evidence for each outcome of interest using the GRADE approach. Main results We included four trials (411 children) which were assessed at low to high risk of bias. Paracetamol versus placebo Data from one trial (148 children) informed this comparison. Paracetamol may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 10% versus 25%, risk ratio (RR) 0.38, 95% confidence interval (CI) 0.17 to 0.85; number needed to treat for an additional beneficial outcome (NNTB) 7; low‐certainty evidence). The evidence is very uncertain about the effects of paracetamol on fever at 48 hours (RR 1.03, 95% CI 0.07 to 16.12; very low‐certainty evidence) and adverse events (RR 1.03, 95% CI 0.21 to 4.93; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus placebo Data from one trial (146 children) informed this comparison. Ibuprofen may be more effective than placebo in relieving pain at 48 hours (proportion of children with pain 7% versus 25%, RR 0.28, 95% CI 0.11 to 0.70; NNTB 6; low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen on fever at 48 hours (RR 1.06, 95% CI 0.07 to 16.57; very low‐certainty evidence) and adverse events (RR 1.76, 95% CI 0.44 to 7.10; very low‐certainty evidence). No data were available for our other outcomes of interest. NSAIDs versus paracetamol Data from four trials (411 children) informed this comparison. The evidence is very uncertain about the effect of ibuprofen versus paracetamol in relieving ear pain at 24 hours (RR 0.83, 95% CI 0.59 to 1.18; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 0.91, 95% CI 0.54 to 1.54; 3 RCTs, 183 children; low‐certainty evidence); and four to seven days (RR 0.74, 95% CI 0.17 to 3.23; 2 RCTs, 38 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on mean pain score at 24 hours (0.29 lower, 95% CI 0.79 lower to 0.20 higher; 3 RCTs, 111 children; very low‐certainty evidence); 48 to 72 hours (0.25 lower, 95% CI 0.66 lower to 0.16 higher; 3 RCTs, 108 children; very low‐certainty evidence); and four to seven days (0.30 higher, 95% CI 1.78 lower to 2.38 higher; 2 RCTs, 31 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol in resolving fever at 24 hours (RR 0.69, 95% CI 0.24 to 2.00; 2 RCTs, 39 children; very low‐certainty evidence); 48 to 72 hours (RR 1.18, 95% CI 0.31 to 4.44; 3 RCTs, 182 children; low‐certainty evidence); and four to seven days (RR 2.75, 95% CI 0.12 to 60.70; 2 RCTs, 39 children; very low‐certainty evidence). The evidence is very uncertain about the effect of ibuprofen versus paracetamol on adverse events (RR 1.71, 95% CI 0.43 to 6.90; 3 RCTs, 281 children; very low‐certainty evidence); reconsultations (RR 1.13, 95% CI 0.92 to 1.40; 1 RCT, 53 children; very low‐certainty evidence); and delayed antibiotic prescriptions (RR 1.32, 95% CI 0.74 to 2.35; 1 RCT, 53 children; very low‐certainty evidence). No data were available on time to resolution of pain. NSAIDs plus paracetamol versus paracetamol alone Data on the effec
